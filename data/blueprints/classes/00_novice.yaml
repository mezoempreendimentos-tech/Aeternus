  strength: 1.0
  dexterity: 1.0
  constitution: 1.0
  intelligence: 1.0
  wisdom: 1.0
  charisma: 1.0

# Equipamento Inicial (VNUMs dos itens que ele ganha ao criar)
starting_gear:
  - "01010303010" # Garrafa de Cerveja (Exemplo)
  - "01010303011" # Adaga (Exemplo)