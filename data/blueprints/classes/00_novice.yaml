# data/blueprints/classes/00_novice.yaml
vnum: "class_novice"
name: "Novato"
description: "Um aventureiro em início de jornada, aprendendo os caminhos do mundo."
playable: true
remort_required: false

# Atributos Base (O que ele ganha por nível)
base_hp: 100
hp_per_level: 10
mana_per_level: 5
