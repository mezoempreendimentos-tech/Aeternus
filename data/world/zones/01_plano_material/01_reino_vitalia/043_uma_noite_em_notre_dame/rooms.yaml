  local_id: '4366'
  name: Praça da Concórdia
  vnum: '01010434366'
- description: 'Você chega ao final da praça, pelo lado oriental e à sua frente há
    uma

    hospedaria, na qual pode ser lido o seguinte aviso: " Fechado para

    reformas.  Desculpe-nos pelo transtorno que isto possa causar a você. "

    A oeste encontra-se a entrada do Quartel General e Escola de

    Mosqueteiros.'
  exits:
    east:
      target_vnum: 01010434388
    south:
      target_vnum: '01010434366'
    west:
      target_vnum: 01010434368
  local_id: '4367'
  name: Praça de Revolução
  vnum: '01010434367'
- description: 'Você continua pela praça, e não vê nada interessante ao redor, mas
    você

    nota que este local não parece ser muito seguro.  Ao norte você vê uma porta

    para o quartel general dos Mosqueteiros.  Se você quiser entrar, basta

    abri-la.'
  exits:
    east:
      target_vnum: '01010434367'
    north:
      target_vnum: '01010434370'
    south:
      target_vnum: '01010434365'
    west:
      target_vnum: 01010434369
  local_id: '4368'
  name: A Entrada para o Quartel General dos Mosqueteiros
  vnum: 01010434368
- description: "Você chega ao final da praça, pelo lado ocidental, e vê que bem à\
    \ sua\nfrente há um velho edifício com grandes janelas.  Ã\x89 o quartel general\
    \ dos\nMosqueteiros.  A sua entrada fica ao leste."
  exits:
    east:
      target_vnum: 01010434368
    south:
      target_vnum: '01010434364'
  local_id: '4369'
  name: Praça de Revolução
  vnum: 01010434369
- description: 'Você está na sede central do Quartel General dos Mosqueteiros, e este
    é

    apenas o átrio do edifício.  Você nota que este local não é muito elegante

    e percebe que as paredes foram pintadas com o mesmo tom de azul do teto,

    feito de pedra.  O chão é a única coisa que o faz lembrar da importância

    deste lugar, pois é feito do mais branco e mais caro mármore.  Ao leste

    você pode ver um refeitório.'
  exits:
    east:
      target_vnum: '01010434371'
    north:
      target_vnum: '01010434372'
    south:
      target_vnum: 01010434368
  local_id: '4370'
  name: A Entrada para o Quartel General dos Mosqueteiros
  vnum: '01010434370'
- description: 'Você está em um refeitório francês, localizado dentro do Quartel General

    dos Mosqueteiros.  Este local possui várias mesas e cadeiras, nas quais os

    soldados que protegem o Rei podem se sentar para beber um café ou comer

    algo antes de irem trabalhar.'
  exits:
    west:
      target_vnum: '01010434370'
  local_id: '4371'
  name: O Refeitório Francês
  vnum: '01010434371'
- description: "Você está em um grande corredor.  Ã\x80 sua frente há uma pequena\
    \ fonte de\nmármore verde, porém há uma corrente impedindo que você prossiga.\
    \  Você\npode ir ao leste ou oeste, em direção a um corredor dentro do Q.G dos\n\
    Mosqueteiros, ou você pode voltar para a entrada, ao sul."
  exits:
    east:
      target_vnum: '01010434373'
    south:
      target_vnum: '01010434370'
    west:
      target_vnum: 01010434386
  local_id: '4372'
  name: Um Corredor no Quartel General dos Mosqueteiros
  vnum: '01010434372'
- description: 'Você está na passagem oriental, e percebe que há inúmeros quadros
    que

    foram cuidadosamente colocados nas paredes, o que é algo bastante comum

    na França.  A passagem segue para o norte, onde você pode encontrar os

    quartos dos Mosqueteiros, ou o calabouço.  O pátio ao leste está fechado,

    e não há como entrar, mas você ainda pode ir para o oeste ou para o norte.'
  exits:
    north:
      target_vnum: '01010434374'
    west:
      target_vnum: '01010434372'
  local_id: '4373'
  name: A Passagem Oriental
  vnum: '01010434373'
- description: 'Você continua na passagem oriental e nota que este lugar, embora

    grande, não é nada interessante.  O edifício tem um estilo romano, o que

    significa que não existem muitas janelas aqui, parecendo mais com uma

    fortaleza.  Este local não é muito saudável para se viver, pois é

    absolutamente frio e úmido por dentro.'
  exits:
    north:
      target_vnum: '01010434375'
    south:
      target_vnum: '01010434373'
  local_id: '4374'
  name: A Passagem Oriental
  vnum: '01010434374'
- description: 'Você está na interseção oriental, entre a passagem e um corredor.  Você

    pode ir para oeste, leste ou voltar para sul.'
  exits:
    east:
      target_vnum: '01010434376'
    south:
      target_vnum: '01010434374'
    west:
      target_vnum: 01010434379
  local_id: '4375'
  name: A Intersecção Oriental
  vnum: '01010434375'
- description: 'Você está no corredor oriental, cujas paredes são grandes e espessas.

    Este local pode ter sido uma fortaleza durante a idade das trevas.  Você

    voltar, ou continuar seguindo para o leste.'
  exits:
    east:
      target_vnum: '01010434377'
    west:
      target_vnum: '01010434375'
  local_id: '4376'
  name: O Corredor Oriental
  vnum: '01010434376'
- description: 'Você chega ao final deste corredor, e percebe que ao norte há um grande

    quarto onde os Mosqueteiros usam para descansar depois de um longo dia de

    trabalho.  Do lado direito deste quarto, há uma grande janela em arco de

    onde pode-se ver toda a cidade.  As paredes são cinzas como as pedras que

    encobrem o teto.'
  exits:
    north:
      target_vnum: 01010434378
    west:
      target_vnum: '01010434376'
  local_id: '4377'
  name: O Fim Oriental do Corredor
  vnum: '01010434377'
- description: 'Este é o quarto onde os Mosqueteiros podem descansar quando retornam

    de suas longas viagens de trabalho.  Aqui encontram-se várias muitas

    cadeiras e uma grande mesa de madeira, com alguns papéis sobre.  Todo o

    chão do quarto está coberto por um bonito tapete vermelho, e as paredes

    estão enfeitadas com bonitos quadros pintados a óleo.'
  exits:
    east:
      target_vnum: 01010434399
    south:
      target_vnum: '01010434377'
  local_id: '4378'
  name: O Quarto dos Mosqueteiros
  vnum: 01010434378
- description: 'Você está em outro corredor do Q.G dos Mosqueteiros.  Aqui pode-se
    ver

    uma porta de metal ao norte, que provavelmente deve se dirigir ao

    calabouço, onde estão encarcerados muitos ladrões e revolutionários.  A

    leste e oeste, você pode ver algumas interseções para alguns corredores ou

    passagens.'
  exits:
    east:
      target_vnum: '01010434375'
    north:
      target_vnum: 01010434380
    west:
      target_vnum: 01010434381
  local_id: '4379'
  name: Outro Corredor
  vnum: 01010434379
- description: 'Você está em um pequeno quarto, onde encontra-se uma pequena escada
    que

    segue para baixo.  Provavelmente deve guiar para o calabouço, onde os

    Mosqueteiros aprisionam os prisioneiros capturados na cidade, pois os dias

    atuais estão cheios de revolucionários.'
  exits:
    down:
      target_vnum: 01010434389
    south:
      target_vnum: 01010434379
  local_id: '4380'
  name: Um Passagem para o Calabouço
  vnum: 01010434380
- description: 'Você está na interseção ocidental, entre um corredor e uma passagem.  As

    saídas são para leste, oeste, ou voltar para sul.'
  exits:
    east:
      target_vnum: 01010434379
    south:
      target_vnum: 01010434385
    west:
      target_vnum: 01010434382
  local_id: '4381'
  name: A Interseção Ocidental
  vnum: 01010434381
- description: 'Você está no corredor ocidental cujas paredes são muito espessas.  Este

    lugar, bem como todos os outros daqui, é muito frio, pois foi totalmente

    construído  de pedras.  Nem as paredes ou o teto foram pintados, e logo ao

    chão há uma enorme barata.'
  exits:
    east:
      target_vnum: 01010434381
    west:
      target_vnum: 01010434383
  local_id: '4382'
  name: O Corredor Ocidental
  vnum: 01010434382
- description: 'Você chega ao final deste corredor, e pode ver uma grande janela em

    arco ao oeste. Ao norte há uma pequena escada que leva à torre.  Você

    percebe que apenas a entrada teve as paredes pintadas, pois aqui as

    paredes têm a cor da pedra cinzenta. Você pode voltar ou pode seguir para

    o norte.'
  exits:
    east:
      target_vnum: 01010434382
    north:
      target_vnum: 01010434384
  local_id: '4383'
  name: O Fim Ocidental do Corredor
  vnum: 01010434383
- description: 'Você está em um pequeno quarto, onde há uma pequena escada que se

    dirige a torre.  A torre é o local onde os Mosqueteiros observam a cidade,

    à procura de qualquer sinal de problemas.  O quarto está enfeitado com

    somente um quadro.  A escada é feita de pedra e muito resistente e segura,

    mas de qualquer modo, você precisa ter cuidado, pois os degraus são muito

    estreitos.'
  exits:
    south:
      target_vnum: 01010434383
    up:
      target_vnum: 01010434395
  local_id: '4384'
  name: Um Quarto Perto da Torre
  vnum: 01010434384
- description: 'Você continua na passagem ocidental, e aqui não há nada de interessante

    ou de importante.  A oeste, encontra-se a fonte de mármore verde, dentro

    do Q.G., mas há uma corrente impedindo que você prossiga.  De qualquer

    maneira, você não sente a menor vontade de ir para o pátio deste edifício.'
  exits:
    north:
      target_vnum: 01010434381
    south:
      target_vnum: 01010434386
  local_id: '4385'
  name: A Passagem Ocidental
  vnum: 01010434385
- description: 'Você está em uma passagem dentro do Q.G dos Mosqueteiros, que segue

    para o norte, e oeste, onde há uma grande porta, de onde você consegue

    ouvir alguns ruídos.  Estes sons não são de humanos, parece mais ser um

    cavalo.  Sendo assim, este local é provavelmente onde os cavalos dos

    Mosqueteiros descansam durante a noite.'
  exits:
    east:
      target_vnum: '01010434372'
    north:
      target_vnum: 01010434385
    west:
      target_vnum: 01010434387
  local_id: '4386'
  name: A Passagem Ocidental
  vnum: 01010434386
- description: 'Você está no estábulo onde os cavalos dos Mosqueteiros permanecem

    durante a noite.  Este local tem um terrível cheiro, e por alguns

    momentos, você imagina há quanto tempo estes cavalos estão sem tomar um

    banho.  A única que há aqui, são os cavalos e muito feno, para os

    alimentar.'
  exits:
    east:
      target_vnum: 01010434386
  local_id: '4387'
  name: Um Estábulo Francês
  vnum: 01010434387
- description: 'Você está em uma hospedaria francêsa. Este local é muito sujo e se

    encontra em decomposição.  Não é para menos que está sendo reformado.  Há

    pelo menos uma coisa muito bonita neste local: no teto há um belíssimo par

    de candelabros, feitos de ouro puro.  Você pode ver que há um recepcionista

    aqui, e talvez possa perguntar quando a hospedaria estará novamente aberta.'
  exits:
    west:
      target_vnum: '01010434367'
  local_id: '4388'
  name: Uma Hospedaria Francêsa
  vnum: 01010434388
- description: 'Você está em um escuro corredor dentro do Q.G. dos Mosqueteiros que

    segue em direção às celas, onde os revolocionários mais perigosos ficam

    presos.  Este local é muito frio e úmido, e você deveria ter muito

    cuidado ao tentar abrir uma das celas, pois os presos que aqui estão são

    muito perigosos.'
  exits:
    south:
      target_vnum: 01010434390
    up:
      target_vnum: 01010434380
  local_id: '4389'
  name: Um Corredor para as Celas
  vnum: 01010434389
- description: 'Você está em um corredor de pedra maciça que com certeza impede uma

    eventual fuga dos prisioneiros.  Até aqui, a única coisa que você

    conseguiu ver, foram enormes ratos e algumas baratas nojentas. Este lugar

    está tão frio, que você acha difícll que alguém possa sobreviver mais do

    que algumas horas.  Você nota, espantado, que este lugar parece absorver

    todos os sons, pois não é possivel ouvir qualquer prisioneiro gritando,

    ou qualquer outro barulho.'
  exits:
    north:
      target_vnum: 01010434389
    south:
      target_vnum: 01010434391
  local_id: '4390'
  name: Um Corredor no Calabouço
  vnum: 01010434390
- description: 'Você chega ao final este corredor e percebe que o local está se tornando

    cada vez mais frio e escuro.  Um tremor percorre todo o seu corpo, pois você

    percebe que se tornou absolutamente incapaz de usar seus poderes de magia

    neste local, e sabe que nem seus pergaminhos e varinhas irão funcionar

    aqui.  Você está rodeado por celas e se fosse realmente esperto, teria as

    deixado fechadas.'
  exits:
    east:
      target_vnum: 01010434392
    north:
      target_vnum: 01010434390
    south:
      target_vnum: 01010434394
    west:
      target_vnum: 01010434393
  local_id: '4391'
  name: O Final do Corredor do Calabouço
  vnum: 01010434391
- description: 'Você está em uma pequena cela dentro do calabouço do Q.G. dos

    Mosqueteiros.  Este local é muito escuro e úmido.  Bem, como você esperava

    que uma cela fosse?'
  exits:
    west:
      target_vnum: 01010434391
  local_id: '4392'
  name: Uma Cela do Calabouço
  vnum: 01010434392
- description: 'Este é um calabouço de segurança máxima.  A porta se fechou rapidamente

    e aqui você não consegue ouvir um único ruído, a não ser o som do seu

    coração batendo cada vez mais rápido e rápido.'
  exits: {}
  local_id: '4393'
  name: Uma Cela Silenciosa
  vnum: 01010434393
- description: 'Você está em uma pequena cela dentro dos calabouços do Q.G dos

    Mosqueteiros.  Este lugar é muito escuro e úmido.  Bem, como você esperava

    que uma cela fosse?'
  exits:
    north:
      target_vnum: 01010434391
  local_id: '4394'
  name: Uma Cela no Calabouço
  vnum: 01010434394
- description: 'Você está no alto de uma torre.  O local é muito pequeno e você pode

    ver uma lâmpada a óleo que deve ser usada pelo guarda à noite.  Existem

    quatro janelas aqui e através das quais pode-se ver o norte, sul, oeste, e

    até mesmo o leste da a cidade.  O lugar mais perto possível de se ver é a

    praça que fica ao sul.'
  exits:
    down:
      target_vnum: 01010434384
  local_id: '4395'
  name: Uma Torre no Q.G dos Mosqueteiros
  vnum: 01010434395
- description: 'Você está em uma estranha passagem, que parece mais ser uma caverna,

    porém muito bem iluminada, mas não há sinal de velas ou tochas.  Ao norte

    e ao sul, pode-se ver alguns estranhos portais que o levam para diferentes

    e estranhos lugares.  Abra esta pequena porta e entre, se puder.'
  exits:
    east:
      target_vnum: 01010434397
    west:
      target_vnum: 01010434396
  local_id: '4396'
  name: Uma Estranha Passagem
  vnum: 01010434396
- description: 'Você está em uma estranha passagem, que parece mais ser uma caverna,

    porém muito bem iluminada, mas não há sinal de velas ou tochas.  Ao norte

    e ao sul, pode-se ver alguns estranhos portais que o levam para diferentes

    e estranhos lugares.  Abra esta pequena porta e entre, se puder.'
  exits:
    east:
      target_vnum: 01010434397
    west:
      target_vnum: 01010434396
  local_id: '4397'
  name: Uma Estranha Passagem
  vnum: 01010434397
- description: 'Esta é outra loja de Lyon, e como se pode perceber, não é nada se
    for

    comparada com a loja mágica, que está ao leste.  Aqui você pode comprar

    muitas coisas diferentes, que poderão ser usadas no futuro, tais como

    tecidos, armas e armaduras.'
  exits:
    east:
      target_vnum: '01010434342'
  local_id: '4398'
  name: Uma Pequena Loja
  vnum: 01010434398
- description: 'Você se sente emocionado, pois afinal você está dentro de um corredor

    do Palácio Real.  Este local é enorme, e você imagina se talvez o Rei da

    França esteja por aqui.  Existem muitos ornamentos feitos de ouro maciço

    enfeitando as paredes, e o chão é feito com o melhor mármore do mundo.

    No teto, você pode ver alguns candelabros de ouro puro, e parece que no

    final do corredor encontra-se a Sala do Trono Real.'
  exits:
    west:
      target_vnum: 01010434378
  local_id: '4399'
  name: Corredor Real
  vnum: 01010434399
