- description: 'Você está na entrada do centro histórico da cidade de Paris, cujo

    monumento mais importante é a Praça Luís XIV, que é a mais bela praça que

    você já viu.  Você pode avançar, em direção ao norte.'
  exits:
    east:
      target_vnum: 01010434359
    north:
      target_vnum: '01010434361'
  local_id: '4360'
  name: O Centro Histórico de Paris
  vnum: '01010434360'
- description: 'Você está na Praça de Luís XIV, mas parece que este não vai ser o
    nome

    deste lugar por muito tempo, com tantos problemas que a monarquia vem

    enfrentando.  O lugar é repleto de árvores frondosas e então você

    pensa... "Em Paris, onde não é cheio de árvores?"  Você pode ver um pequeno

    aviso.'
  exits:
    east:
      target_vnum: '01010434362'
    north:
      target_vnum: '01010434365'
    south:
      target_vnum: '01010434360'
    west:
      target_vnum: '01010434363'
  local_id: '4361'
  name: A Entrada para a Praça Luís XIV
  vnum: '01010434361'
- description: 'Você está no lado oriental da Praça, e pode ver alguns revolucionários

    correndo e se escondendo nas casas que estão perto deste local.  Você se

    pergunta se foi uma boa idéia vir visitar a França.'
  exits:
    north:
      target_vnum: '01010434366'
    west:
      target_vnum: '01010434361'
  local_id: '4362'
  name: Praça Luís XIV
  vnum: '01010434362'
- description: 'Você está ao lado ocidental da Praça Luís XIV, e aqui pode-se ver

    alguns pombos se alimentando.  Você se sente mais incomodado aqui do que

    no Champs Elyseés, e pensa que talvez este não tenha sido o melhor momento

    para visitar a França, pois este parece ser um momento em que todos

    parecem estar nervosos com a monarquia.'
  exits:
    east:
      target_vnum: '01010434361'
    north:
      target_vnum: '01010434364'
  local_id: '4363'
  name: Praça Luís XIV
  vnum: '01010434363'
- description: 'Você continua na Praça de Paris, onde podem ser vistos alguns bancos
    de

    madeira nas laterais do gramado, e onde também pode ser visto alguns

    pombos comendo sementes espalhadas pelo chão.  Olhando para baixo, você

    observa que o pavimento é feito de granito, e que em algumas partes

    somente existe grama.  Este lugar é iluminado como toda Paris, com grandes

    postes a vela.'
  exits:
    east:
      target_vnum: '01010434365'
    north:
      target_vnum: 01010434369
    south:
      target_vnum: '01010434363'
  local_id: '4364'
  name: Praça da Concórdia
  vnum: '01010434364'
- description: 'Você está bem no centro da Praça, e pode observar uma enorme estátua
    do

    Rei.  Neste local, as únicas coisas vivas são dois pombinhos que estão

    empoleirados no topo da estátua.  Pelo menos eles acharam algum conforto.'
  exits:
    east:
      target_vnum: '01010434366'
    north:
      target_vnum: 01010434368
    south:
      target_vnum: '01010434361'
    west:
      target_vnum: '01010434364'
