    filho de Barahir, que foi assassinado pelo mal que habitava em Angband,
    quando o mundo era jovem.
    Beren se aproxima de você e lhe estende a mão!
  keywords:
  - beren
  long_desc: Beren, o amado de Lúthien Tinúviel e filho de Barahir está aqui.
  name: Beren
  vnum: 01010848401
- description: |-
    Você observa uma linda donzela élfica de cabelos dourados e pele suave.
    Lúthien Tinúviel é filha de Thingol, um rei élfico da Terra-média no tempo
    em que o mundo era jovem.  Tinúviel é considerada a mais bela entre todas as
    donzelas do seu reino.
  keywords:
  - luthien
  - tinuviel
  - elfa
  long_desc: Lúthien Tinúviel, a amada de Beren e filha de Thingol está aqui.
  name: Lúthien Tinúviel
  vnum: 01010848402
- description: |-
    Você observa um imponente elfo de cabelos escuros como as sombras da noite e
    coroado por um diadema de prata.  Seus olhos cinzentos como uma noite clara
    e ornados por uma luz como a das estrelas.  Em seu rosto, nem velho e nem
    jovem, existiam marcas memoráveis de muitas coisas, alegres e tristes.
    Filho do glorioso Eärendil e irmão de Elros, eram chamados também de
    Peredhil, ou meio-elfos.
  keywords:
  - elrond
  - elfo
  - senhor
  long_desc: Elrond, o senhor de Valfenda está aqui, reinando entre os celestiais
    elfos.
  name: Elrond
  vnum: 01010848403
- description: |-
