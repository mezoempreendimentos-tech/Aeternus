  - elfa
  name: Lúthien Tinúviel
  vnum: '8402'
- description: |-
    Você observa um imponente elfo de cabelos escuros como as sombras da noite e
    coroado por um diadema de prata.  Seus olhos cinzentos como uma noite clara
