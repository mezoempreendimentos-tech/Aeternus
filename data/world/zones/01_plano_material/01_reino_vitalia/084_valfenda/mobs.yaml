    suave e olhos brilhantes.  Arwen é filha do sábio senhor de Valfenda,
    Elrond.  Sua beleza é monumental e poucos mortais tiveram a oportunidade de
    olharem o brilho dos seus olhos.  Alguns anciões elfos acreditam que a
    figura da imponente Lúthien Tinúviel voltou à terra novamente no corpo da
    linda e majestosa Arwen, a estrela vespertina do seu povo.
  keywords:
  - arwen
  - undomiel
  - elfa
  long_desc: Arwen Undómiel, a estrela vespertina filha do senhor de Valfenda está
