    jovem, existiam marcas memoráveis de muitas coisas, alegres e tristes.
    Filho do glorioso Eärendil e irmão de Elros, eram chamados também de
    Peredhil, ou meio-elfos.
  keywords:
  - elrond
  - elfo
  - senhor
