    Ruidoságua, chamado também de rio Cinzento.  O volume de água é bastante
    grande.  O rio Cinzento segue a partir deste ponto até o grande Mar.  Ao seu
    redor você observa além das margens grandes campos abertos cobertos de grama
    e outros secos e sem vegetação.  Ao leste você observa as monumentais
    Montanhas Sombrias.  Ao norte você observa as velozes águas do rio
    Fontegris, ao nordeste você observa as águas do rio Ruidoságua e ao sudoeste
    você observa as águas volumosas do rio Cinzento.
