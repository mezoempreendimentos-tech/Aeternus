- description: |-
    Você está caminhando lentamente e com bastante atenção sobre umas das
    trilhas íngremes que dão acesso ao topo da magnífica torre de observação.
    Ao seu redor você observa o corpo da torre feito de pedra e em alguns
    trechos coberto por liquens e musgo.  Deste ponto da torre de observação
    você já é capaz de observar grande parte das terras que cercam a torre há
    grandes distâncias.  Ao norte você percebe as suaves Colinas do Vento, ao
    sul você ver as Colinas do Sul, ao oeste você observa a grande Estrada do
    leste cruzando inúmeros pontos de luz numa aldeia muito distante e ao leste
    você observa as Montanhas Sombrias.  A trilha segue na direção do topo e da
    base da monumental torre de observação.
