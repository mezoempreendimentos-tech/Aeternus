- description: |-
    Você chegou ao topo da monumental torre de observação, chamada também de
    Amon Sûl e construída nos dias do Reinado do Norte.  Ao seu redor você
    observa um círculo em ruínas, formando uma coroa desgastada sobre a antiga
    torre.  A paisagem das terras que circundam a grandiosa colina do Topo dos
    Ventos é esplendorosa e encantadora.  Ao norte você percebe as suaves
    Colinas do Vento, ao sul você ver as Colinas do Sul, ao oeste você observa a
    grande Estrada do leste cruzando inúmeros pontos de luz numa aldeia muito
    distante e ao leste você observa as Montanhas Sombrias.  Na direção da base
    da grande torre de observação você observa um trilha íngreme.
  exits:
    down:
      target_vnum: 01010848420
