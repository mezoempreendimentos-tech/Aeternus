- description: "Você está caminhando aflito entre as torcidas e apodrecidas árvores\
    \ e\njuncos do traiçoeiro Pântano dos Mosquitos.  Ao seu redor você observa\n\
    várias poças de lama e um terreno extremamente úmido.  Alguns galhos negros\n\
    secos formam uma sombria composição de formas assustadoras e misteriosas.  Ã\x80\
    \nsua frente e por todo o ambiente inúmeras nuvens de mosquitos se misturam ao\n\
    ar, dificultando sua respiração e sua movimentação.  Você olha para todos os\n\
    lados e percebe que todo o pântano está impregnado de pequeninos mosquitos.\n\
    Alguns pequenos olhos piscam entre os juncos e as moitas, emitindo estranhos\n\
    ruídos numa sinfonia sem fim de crique-craques.  Ao norte, noroeste e\nnordeste\
    \ você observa as horripilantes árvores negras do Pântano dos\nMosquitos."
