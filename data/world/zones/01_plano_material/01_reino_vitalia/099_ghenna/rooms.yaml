- description: |-
    Você está nas indescritíveis ruas da cidade de Ghenna.  A estrada
    continua ao leste e oeste, contornando suavemente em torno de um vale.
  exits:
    east:
      target_vnum: 01010999904
    west:
      target_vnum: 01010999943
