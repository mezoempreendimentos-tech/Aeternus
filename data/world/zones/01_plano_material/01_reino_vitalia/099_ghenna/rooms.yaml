- description: |-
    Fora do labirinto finalmente!  Mas o que é isso?  Você está na boca de
    uma grande caverna de aproximadamente 30 metros de diâmetro.  Um córrego de
    sangue corre pelos degraus de pedra que conduzem para cima - Ousas entrar?
  exits:
    down:
      target_vnum: 01010999999
    east:
      target_vnum: 01010999928
    north:
      target_vnum: 01010999925
    south:
      target_vnum: 01010999927
    up:
      target_vnum: 01010999934
    west:
      target_vnum: 01010999925
  local_id: '9933'
  name: A Boca da Grande Caverna
  vnum: 01010999933
- description: |-
    Você está por dentro da entrada da caverna onde um forte cheiro de
    enxofre o faz vomitar.  Grandes degraus de pedra levam para baixo, onde fica
    o labirinto de corpos.  Um córrego de sangue parece escorrer de algum lugar
    ao norte, um ruído parecido com um fole gigantesco pode ser ouvido.
  exits:
    down:
      target_vnum: 01010999933
    north:
      target_vnum: 01010999935
    up:
      target_vnum: 01010999938
  local_id: '9934'
  name: Dentro da Entrada da Caverna
  vnum: 01010999934
- description: |-
    Rapaz, o cheiro de enxofre tornou-se mais forte - YUCK!  Como se ainda
    não estivesse suficientemente ruim, há aproximadamente uma centena horríveis
    corpos desfigurados deitados aqui.  Parece que a carne foi mastigada de seus
    corpos ainda vivos para que tivessem dores terríveis.  A correnteza de
    sangue que você encontrou na entrada da caverna é muito maior aqui.
  exits:
    north:
      target_vnum: 01010999936
    south:
      target_vnum: 01010999934
  local_id: '9935'
  name: Devorado até a Morte
  vnum: 01010999935
- description: |-
    Esta é grande caverna tem a parte superior abobadada.  Um grande peitoril
    de pedra fica logo acima da sua cabeça derramando sobre você uma corrente
    continua de sangue e tripas.  Um áspero ruído de intestino sendo mastigado,
    alternado com um ruído de um gole de bebida, revolta seu estomago.  Após
    escutar isto... uma encorajadora voz fala repetidamente "Sim, sim, é isto...
    apenas mais alguns passos... você está quase lá".
  exits:
    south:
      target_vnum: 01010999935
    up:
      target_vnum: 01010999937
  local_id: '9936'
  name: A Entrada do Covil
  vnum: 01010999936
- description: |-
    Este peitoril é escorregadio, com o sangue de centenas de aventureiros
    que fizeram a besteira de entrar aqui.  Cadáveres, cadáveres por toda parte.
    Pelos menos você finalmente encontrou a origem daquele horrível odor de
    enxofre.  Uma negra substância fumegante está untada por toda parte nas
    paredes, causando o pânico.  Como se ainda não estivesse ruim o bastante,
    você repentinamente tem a sensação de que a sua vida está a ponto de
    terminar antes do tempo.
    ---> HASTA LA VISTA!
  exits:
    down:
      target_vnum: 01010999936
    up:
      target_vnum: 01010999953
  local_id: '9937'
  name: Um Covil Cheio de Cadáveres
  vnum: 01010999937
- description: |-
    Você está em uma caverna apertada do outro lado da entrada.  Mesmo se
    você não for claustrofóbico este local pode seguramente o tornar um.  Há um
    espaço para rastejar ao oeste.  Cuidado com a cabeça.
  exits:
    down:
      target_vnum: 01010999934
    west:
      target_vnum: 01010999939
  local_id: '9938'
  name: Uma Caverna
  vnum: 01010999938
- description: |-
    A caverna abriu-se para o interior de um túnel grande o suficiente para
    você ficar de pé.  Estalagmites e estalactites formaram-se no chão e no
    teto.  Há saídas ao leste, norte e oeste.
  exits:
    east:
      target_vnum: 01010999938
    north:
      target_vnum: 01010999940
    west:
      target_vnum: 01010999912
  local_id: '9939'
  name: O Túnel
  vnum: 01010999939
- description: "Você está em um túnel estreito onde é possível passar apenas rastejando.\n\
    Há uma curva para a direita, mas não consegue descobrir aonde irá levar.  Ã\x89\
    \ntão apertado aqui que não há como você retornar por este caminho pelo sul."
  exits:
    east:
      target_vnum: 01010999941
  local_id: '9940'
  name: Um Caminho Estreito
  vnum: 01010999940
- description: |-
    Você penetrou na mágica morada do grande Efreeti.  Feita em motivos
    orientais, este local vislumbra com todo o conforto que alguém pode desejar.
    Almofadas, tapetes e candelabros estão por toda parte.  Este certamente é um
    dos locais mais luxuosos que você já viu.  Ao norte está a proibida sala do
    tesouro, entrar lá é procurar a morte com certeza.
  exits:
    north:
      target_vnum: 01010999942
    up:
      target_vnum: 01010999953
    west:
      target_vnum: 01010999940
  local_id: '9941'
  name: A Morada do Efreeti
  vnum: 01010999941
- description: "Você cometeu um erro tolo, meu amigo.  Está é a tentação equivalente\
    \ a do\nfruto proibido.  Uma gigantesca mão emerge através de uma fenda que se\
    \ abre\nno tempo e o esmaga, como um inseto.\n\n------------------\n\nSPLAT!!\n\
    .\n.\n.  VOCÃ\x8A ESTÃ\x81 MORTO!!"
  exits:
    south:
      target_vnum: 01010999941
    up:
      target_vnum: 01010999941
  local_id: '9942'
  name: A Morte Certa
  vnum: 01010999942
- description: |-
    Você está em uma mofada área escondida atrás da parede do banheiro.  Uma
    estreita escadaria de granito conduz para baixo, na escuridão.
  exits:
    down:
      target_vnum: 01010999946
    south:
      target_vnum: 01010999923
  local_id: '9943'
  name: Um Local Mofado
  vnum: 01010999943
- description: |-
    Você alcançou a base da escadaria de granito.  Este parece ser o porão da
    Taverna Sangrenta.  Há um buraco no teto, o qual está sujo com excremento em
    sua volta pois lá de cima caiu uma grande montanha de fezes (que legal).
    Paredes ficam ao oeste, norte e sul - mas é possível passar pelo leste, em
    volta da pilha de estrume.
  exits:
    east:
      target_vnum: 01010999947
    up:
      target_vnum: 01010999945
  local_id: '9944'
  name: A Base da Escadaria de Granito
  vnum: 01010999944
- description: |-
    Você está em uma estreita escadaria de granito que em espirais suavemente
    conduz para baixo.  Você pode subir, ou descer de acordo com sua vontade.
  exits:
    down:
      target_vnum: 01010999944
    up:
      target_vnum: 01010999946
  local_id: '9945'
  name: A Escadaria de Granito
  vnum: 01010999945
- description: |-
    Você está em uma estreita escadaria de granito que em espirais suavemente
    conduz para baixo.  Você pode subir, ou descer de acordo com sua vontade.
  exits:
    down:
      target_vnum: 01010999945
    up:
      target_vnum: 01010999943
  local_id: '9946'
  name: Nos Degraus
  vnum: 01010999946
- description: |-
    Esta parte posterior do nicho é úmida, escura e cheia de pó.  Os tijolos
    das paredes mostram sinais de decadência - lascas vermelhas e negras estão
    espalhadas no chão.  Um velho barril de vinho do porto está quebrado e
    jogado em um canto, uma relíquia dos tempos felizes.  A única saída visível
    fica ao oeste.
  exits:
    south:
      target_vnum: 01010999948
    west:
      target_vnum: 01010999944
  local_id: '9947'
  name: Na Parte Posterior
  vnum: 01010999947
- description: |-
    Você começa a
    \
    \
    \E
    \S
    \C
    \O
    \R
    \R
    \E
    \G
    \A
    \R
    \.
    \.
    \.
    \

    E aterrisa num monte, próximo
    a um pequeno buraco no chão
    que cheira como algo cozinhando.
  exits:
    down:
      target_vnum: 01010999949
  local_id: '9948'
  name: Queda Livre
  vnum: 01010999948
- description: |-
    Wow!  Parece como se você estivesse no inferno... ou pelo menos, em uma
    pequena parte dele.  Chamas saltam nas paredes, causando clarões que enganam
    a sua visão.  Você pode com certa dificuldade perceber um vulto ao norte.
    Não há como retornar pelo caminho que você usou para chegar até aqui.  Você
    pode, entretanto, ir em direção ao leste, ao oeste e ao norte.
  exits:
    east:
      target_vnum: 01010999950
    north:
      target_vnum: 01010999952
    west:
      target_vnum: 01010999947
  local_id: '9949'
  name: Cercado de Labaredas
  vnum: 01010999949
- description: |-
    Um colchonete está encostado numa parede deste pequeno quarto de dormir,
    do outro lado um pentagrama invertido foi desenhado com sangue e uma maleta
    de objetos pessoais em frente.  A única saída é voltando em direção ao
    oeste.
  exits:
    west:
      target_vnum: 01010999949
  local_id: '9950'
  name: Um Quarto Provisório
  vnum: 01010999950
- description: |-
    Você está numa estrada da cidade de Ghenna.  Construída com pedras
    arredondadas e lisas, o caminho tornou-se escorregadio por causa do sangue
    de muitos e incautos aventureiros.
    Cuidado com seus passos!
  exits:
    east:
      target_vnum: 01010999903
    west:
      target_vnum: 01010999954
  local_id: '9951'
  name: A Estrada de Ghenna
  vnum: 01010999951
- description: |-
    Fogo, fogo por toda parte.  Uma plataforma de mármore negro está no
    centro das chamas apoiando uma negra cadeira de mármore a qual está vazia.
    Este parece ser algum tipo de trono.  As labaredas tornam todos os caminhos
    intransitáveis exceto por aquele que chegou e a direção sacra.
  exits:
    south:
      target_vnum: 01010999949
    up:
      target_vnum: 01010999953
  local_id: '9952'
  name: O Assento do Poder
  vnum: 01010999952
- description: |-
    Você está sob uma pilha de ossos.  O céu noturno transparece no vazio com
    o olhar de uma caveira humana sobre você.  Com um mínimo esforço para subir,
    você pode libertar-se.
  exits:
    up:
      target_vnum: 01010999903
  local_id: '9953'
  name: Abaixo dos Ossos
  vnum: 01010999953
- description: |-
    Você está em uma das muitas ruas em Ghenna.  Uma grande muralha bloqueia
    a passagem ocidental, mas pode-se seguir pelo norte, sul ou leste.
  exits:
    east:
      target_vnum: 01010999951
    north:
      target_vnum: 01010999955
    south:
      target_vnum: 01010999998
  local_id: '9954'
  name: As Ruas de Ghenna
  vnum: 01010999954
- description: |-
    Você está na rua que segue de norte a sul.  As pedras do calçamento
    machucam seus pés impiedosamente.  Ao oeste fica a muralha da cidade,
    enquanto uma construção incendiada está ao leste, é impossível permanecer
    indiferente aos rumores do que houve por aqui.
  exits:
    east:
      target_vnum: 01010999956
    north:
      target_vnum: 01010999957
    south:
      target_vnum: 01010999954
  local_id: '9955'
  name: As Ruas de Ghenna
  vnum: 01010999955
- description: |-
    Entulhos carbonizados preenchem totalmente este local, uma trave caiu
    transversalmente sobre um esqueleto esbranquiçado.  Ao oeste você consegue
    enxergar as ruas de Ghenna.  Você provavelmente quer sair desta edificação o
    mais rápido, afinal isto pode desmoronar a qualquer momento.
  exits:
    west:
      target_vnum: 01010999955
  local_id: '9956'
  name: Uma Construção Incendiada
  vnum: 01010999956
- description: |-
    Você está em uma esquina das ruas de Ghenna.  Ao oeste estão as muralhas
    da cidade ao passo que ao norte há uma porta.  A rua continua ao sul, e ao
    leste também.
  exits:
    east:
      target_vnum: 01010999901
    north:
      target_vnum: 01010999958
    south:
      target_vnum: 01010999955
  local_id: '9957'
  name: As Ruas de Ghenna
  vnum: 01010999957
- description: |-
    Este local está recheado de todos os tipos de objetos de couro.
    Chicotes, correntes e algemas estão dispostos de forma destacada por toda
    parte.  Uma cadeira foi posicionada no meio da sala com o intuito de
    satisfazer seus desejos.
  exits:
    south:
      target_vnum: 01010999957
  local_id: '9958'
  name: A Morada da Dominatrix
  vnum: 01010999958
- description: |-
    Este local estreito, conduz ao leste para o interior da escuridão e ao
    oeste dirige-se para a entrada da cidade.  Os pedregulhos de construções
    arruinadas tornaram qualquer outra saída impossível.
  exits:
    east:
      target_vnum: 01010999960
    west:
      target_vnum: 01010999901
  local_id: '9959'
  name: As Ruas de Ghenna
  vnum: 01010999959
- description: |-
    Há tanta sujeira nas ruas por aqui que, você, precisa caminhar em zigezag
    para desviar.  O contorno da estrutura é tudo o que restou do edifício que
    ficava ao sul.  A construção ao norte, porem, parece um pouco mais intacta.
    A rua termina indo-se em direção ao leste, numa montanha de entulhos.  Ao
    oeste, a rua continua por alguma distância.
  exits:
    east:
      target_vnum: 01010999966
    north:
      target_vnum: 01010999961
    south:
      target_vnum: 01010999962
    west:
      target_vnum: 01010999959
  local_id: '9960'
  name: As Ruas de Ghenna
  vnum: 01010999960
- description: |-
    Você está onde antigamente foi o comércio da cidade.  Um balcão se situa
    mais ao norte do local com um estrado caído sobre ele.  Bancos de madeira
    estão dispostos por toda a extensão deste salão.  As ruas da cidade de
    Ghenna ficam ao sul daqui.
  exits:
    south:
      target_vnum: 01010999960
  local_id: '9961'
  name: O Posto Comercial
  vnum: 01010999961
- description: |-
    Este local parece já ter sido um agradável lar.  O mobiliário, agora
    completamente estragado, recorda ao estilo da época vitoriana.  Uma frágil
    escadaria conduz para cima, ela parece bastante instável.  Melhor cuidar
    onde pisa.
  exits:
    north:
      target_vnum: 01010999960
    up:
      target_vnum: 01010999963
  local_id: '9962'
  name: Um Local Cheio de Lixo
  vnum: 01010999962
- description: |-
    Parece não ter sido uma boa idéia subir aqui.  O teto desmoronou em ambos
    os lados, bloqueando as saídas leste e oeste.  Um cheiro asqueroso de mofo
    emana de todas as partes.  Uma porta range sua dobradiça em direção ao
    norte.
  exits:
    down:
      target_vnum: 01010999962
    north:
      target_vnum: 01010999964
  local_id: '9963'
  name: O Andar Superior da Casa
  vnum: 01010999963
- description: |-
    Este, evidentemente, foi o quarto de uma criança.  Brinquedos (a maioria
    deles quebrados) estão espalhados por toda parte.  Um colchão apoiado contra
    a parede, completamente furado no meio, atrapalha a passagem.  Uma das
    bonecas daqui tem a forma absolutamente real... Muito estranho!
  exits:
    south:
      target_vnum: 01010999963
    west:
      target_vnum: 01010999965
  local_id: '9964'
  name: Um Quarto de Criança
  vnum: 01010999964
- description: |-
    Você está em um pequeno armário embutido.  Roupas de crianças, e caixas
    de sapatos estão espalhados, fedendo a mofo.  Aparentemente só há uma saída
    - leste.
  exits:
    down:
      target_vnum: 01010999911
    east:
      target_vnum: 01010999964
  local_id: '9965'
  name: Um Armário Destruído
  vnum: 01010999965
- description: |-
    Você está nas ruas de Ghenna.  A muralha da cidade fica ao leste,
    bloqueando sua saída.  Você pode seguir ao norte, sul e oeste.  Tome cuidado
    para não tropeçar nos muitos corpos espalhados nestas ruas.
  exits:
    north:
      target_vnum: 01010999968
    south:
      target_vnum: 01010999978
    west:
      target_vnum: 01010999960
  local_id: '9966'
  name: As Ruas de Ghenna
  vnum: 01010999966
- description: |-
    Esta estrada é bastante estreita, mas parece abrir-se em direção ao sul.
    Uma construção arruinada está ao oeste, e a muralha da cidade bloqueia a
    saída norte.
  exits:
    east:
      target_vnum: 01010999969
    south:
      target_vnum: 01010999902
  local_id: '9967'
  name: Uma Estrada em Ghenna
  vnum: 01010999967
- description: |-
    Esta estreita via segue de norte a sul.  A muralha da cidade eleva-se
    sobre você ao leste, e uma porta fica ao oeste, uma luz vermelha brilha sob
    ela.
  exits:
    north:
      target_vnum: 01010999969
    south:
      target_vnum: 01010999966
    west:
      target_vnum: 01010999970
  local_id: '9968'
  name: As Ruas de Ghenna
  vnum: 01010999968
- description: |-
    Você está em uma curva da estrada.  A muralha da cidade está ao norte, e
    ao leste as saídas estão impedidas.  Uma via estreita segue para o oeste.
  exits:
    south:
      target_vnum: 01010999968
    west:
      target_vnum: 01010999967
  local_id: '9969'
  name: Uma Curva na Estrada
  vnum: 01010999969
- description: |-
    Esta sala é iluminada pelo brilho de várias luzes vermelhas.  Mulheres, e
    vários brinquedos de prazer estão jogados pelo chão, o qual é coberto com um
    agradável tapete de pelúcia roxo.  Ao sul fica a sala de espera aonde você
    pode ver uma cama posta atrás de uma mesinha de vidro.
  exits:
    east:
      target_vnum: 01010999968
    south:
      target_vnum: 01010999971
  local_id: '9970'
  name: O Melhor Inferninho de Ghenna
  vnum: 01010999970
- description: |-
    Esta é uma curiosa sala de espera onde as pessoas podem relaxar enquanto
    aguardam.  Uma bela cama florida foi posta em frente a uma mesinha de centro
    de vidro cheia de revistas.  Ao oeste há uma escadaria.
  exits:
    north:
      target_vnum: 01010999970
    west:
      target_vnum: 01010999972
  local_id: '9971'
  name: A Sala de Espera
  vnum: 01010999971
- description: |-
    A escadaria fica aqui, um par de roupas intimas, uma feminina e outra
    masculina, foram deixadas no parapeito.  Asqueroso!  Ao leste fica a sala de
    espera.
  exits:
    east:
      target_vnum: 01010999971
    up:
      target_vnum: 01010999973
  local_id: '9972'
  name: A Base dos Degraus
  vnum: 01010999972
- description: |-
    Aparentemente as trabalhadoras do local são bastante relaxadas.  Há uma
    grande variedade de roupas espalhadas pelo chão - a maioria totalmente suja.
    Um corredor fica ao oeste, clareado por uma luz vermelha.
  exits:
    down:
      target_vnum: 01010999972
    west:
      target_vnum: 01010999974
  local_id: '9973'
  name: O Topo dos Degraus
  vnum: 01010999973
- description: |-
    O corredor segue para o leste e oeste, enquanto que ao norte uma porta
    está entreaberta, um aviso foi pendurado na maçaneta: "Não Perturbe!".
  exits:
    east:
      target_vnum: 01010999973
    north:
      target_vnum: 01010999975
    west:
      target_vnum: 01010999976
  local_id: '9974'
  name: Um Corredor no Andar Superior
  vnum: 01010999974
- description: |-
    Bem, se você tinha intenções amorosas com certeza elas desapareceram
    assim que olhou para este quarto.  Uma cama está aqui com um grande circulo
    molhado bem no meio.  Manchas de gordura estão na parede perto da cabeceira
    da cama, aparentemente são de alguém que se encostou nela.  O piso é
    pegajoso - você pode imaginar o porque.
  exits:
    south:
      target_vnum: 01010999974
  local_id: '9975'
  name: O Imundo Quarto de Dormir
  vnum: 01010999975
- description: |-
    Você alcançou o final do corredor.  Uma porta em direção ao sul está
    entreaberta, enquanto que o corredor continua ao leste, voltando por onde
    você veio.
  exits:
    east:
      target_vnum: 01010999974
    south:
      target_vnum: 01010999977
  local_id: '9976'
  name: O Final do Corredor
  vnum: 01010999976
- description: |-
    Este é o quarto da madame.  Uma grande cama fica na parede oposta da entrada, sob o teto feito inteiramente de espelhos.  Os dois candelabros que
    estão localizados de cada lado da cama são envoltos com um pano vermelho
    lançando assim um assustador brilho que ilumina o local.
  exits:
    north:
      target_vnum: 01010999976
  local_id: '9977'
  name: O Quarto da Madame
  vnum: 01010999977
- description: |-
    Este caminho encoberto leva para baixo, em direção à escuridão.  O ar é
    tão úmido por aqui que você consegue vê-lo.  Ao norte de onde está a
    passagem está descoberta.
  exits:
    down:
      target_vnum: 01010999979
    north:
      target_vnum: 01010999966
  local_id: '9978'
  name: Um Caminho Encoberto
  vnum: 01010999978
- description: |-
    Mas que inferno?!  Esta trilha é coberta por uma substância parecida com
    ectoplasma - é realmente nojento.  O caminho é tão escorregadio que torna
    impossível subir até aquele caminho encoberto.  A sua única opção é seguir
    ao oeste.
  exits:
    west:
      target_vnum: 01010999980
  local_id: '9979'
  name: Uma Trilha Enlodada
  vnum: 01010999979
- description: |-
    O lodo torna-se mais grosso na medida em que você segue adiante.  Há
    muitos animais mortos que aparentemente atolaram aqui.  Existem saídas ao
    norte e ao leste.
  exits:
    east:
      target_vnum: 01010999979
    north:
      target_vnum: 01010999981
  local_id: '9980'
  name: Uma Trilha Enlodada
  vnum: 01010999980
- description: |-
    Lodo, lodo por toda parte.  Um Anão ferido está deitado aqui, quase
    totalmente submerso neste lodo vermelho.  Talvez você acabe como ele...
    Você pode seguir ao oeste, ou também para o sul.
  exits:
    south:
      target_vnum: 01010999980
    west:
      target_vnum: 01010999982
  local_id: '9981'
  name: Uma Trilha Enlodada
  vnum: 01010999981
- description: |-
    O lodo parece diminuir um pouco aqui, de qualquer forma o caminho
    continua bastante escorregadio.  Uma clareira pode ser vista ao sul.
  exits:
    east:
      target_vnum: 01010999981
    south:
      target_vnum: 01010999983
  local_id: '9982'
  name: Uma Trilha Enlodada
  vnum: 01010999982
- description: |-
    Não há absolutamente nada daquela sujeira ectoplasmática por aqui.  Esta
    clareira é constituída por um barro vermelho, com algumas rochas espalhadas
    ao seu redor.  Aparentemente este é algum tipo de caminho antigo, para o sul
    você pode avistar o que parece ser a boca de uma caverna.
  exits:
    north:
      target_vnum: 01010999982
    south:
      target_vnum: 01010999984
  local_id: '9983'
  name: Uma Pequena Clareira
  vnum: 01010999983
- description: |-
    Você chegou à boca de uma pequena caverna, a qual é cortada para o
    interior de uma alto promontório.  Uma rudimentar escadaria talhada na rocha
    conduz para baixo, ao norte há uma pequena clareira.
  exits:
    down:
      target_vnum: 01010999985
    north:
      target_vnum: 01010999983
  local_id: '9984'
  name: A Boca de Uma Pequena Caverna
  vnum: 01010999984
- description: |-
    Esta pequena caverna subterrânea é o local mais úmido em que você já
    esteve.  A umidade escorre pelas lisas paredes rochosas formando um pequeno
    riacho, além de pingos gotejarem do teto sobre a sua cabeça.  Uma passagem
    conduz ao sul.
  exits:
    south:
      target_vnum: 01010999986
    up:
      target_vnum: 01010999984
  local_id: '9985'
  name: Uma Caverna Subterrânea
  vnum: 01010999985
- description: |-
    Você está em um longo túnel em declive que leva lentamente em direção ao
    sul.  As lisas paredes rochosas parecem suar - há MUITA umidade.
  exits:
    north:
      target_vnum: 01010999985
    south:
