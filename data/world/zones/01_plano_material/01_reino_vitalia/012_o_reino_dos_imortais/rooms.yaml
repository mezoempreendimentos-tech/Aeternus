  name: A Entrada para o Nível Superior
  vnum: '01010121212'
- description: 'Você está na sala dos Deuses de Vitália.  Aqui os Deuses se reúnem
    para

    descansar e conversar.  A porta da sala, ao sul, é protegida com uma espécie

    de barreira luminosa, para evitar que inferiores tenham acesso a esta sala.

    Há uma escada que leva a uma sala logo acima.'
  exits:
    south:
      target_vnum: '01010121212'
    up:
      target_vnum: '01010121207'
    west:
