  name: A Sala de Mensagens dos Imortais
  vnum: '01010121201'
- description: "O Cubo de Gelo é provavelmente a sala mais fria deste mundo.  Pelo\
    \ chão\nhá vários corpos de lutadores congelados.  Ã\x89 simplesmente aterrorizante.\n\
    O frio faz seus músculos doerem.  Tudo o que você pode fazer é rezar e se\ndesculpar\
    \ pelas más ações que vem realizando ultimamente.  Seja bom e pode\nser que alguém\
    \ lhe retire daqui."
  exits: {}
  local_id: '1202'
  name: O Cubo de Gelo
  vnum: '01010121202'
- description: 'Nesta sala, os Deuses criaram uma cópia exata do quadro de mensagens
    dos

    mortais, e desde então ela vem sendo usada como uma forma de comunicação

    entre os Mortais e Imortais.

    Ao norte você pode ver um belo jardim, e ao oeste você pode retornar para

    a Sala de Mensagens dos Imortais.'
  exits:
    north:
      target_vnum: '01010121210'
    west:
      target_vnum: '01010121201'
  local_id: '1203'
  name: A Sala do Quadro dos Mortais
  vnum: '01010121203'
- description: 'Você está em um lugar muito bonito.  Todo o Reino flutua sobre nuvens.

    O chão foi construído com grandes pedras brancas.  Há várias colunas que

    sustentam o teto, que brilha emitindo uma suave luz que ilumina o ambiente.

    Ao seu redor, várias mesas e cadeiras, que provavelmente os Deuses e Imortais

    usam para descansar do árduo trabalho de cuidar do mundo.

    Ao leste e oeste você pode ver todo o Reino de Vitália, uma visão

    maravilhosa.  Ao sul você vê a sala de reuniões e ao norte pode-se ver uma

    grande construção.'
  exits:
    east:
      target_vnum: 01010121281
    north:
      target_vnum: '01010121201'
    northeast:
      target_vnum: '01010121205'
    south:
      target_vnum: '01010121200'
    southeast:
      target_vnum: 01010121209
    west:
      target_vnum: 01010121280
  local_id: '1204'
  name: O Pátio do Reino dos Imortais
  vnum: '01010121204'
- description: 'O Escritório Postal dos Imortais é como a maioria dos outros, exceto
    que

    não é tão lento.  Assim, o servico postal nao conhece a ira dos Deuses.

    Pilhas de correspondências perdidas preenchem as paredes.

    O Pátio do Reino dos Imortais pode ser visto através da passagem ao

    sudeste. Há também uma porta ao leste.'
  exits:
    east:
      target_vnum: '01010121206'
    southeast:
      target_vnum: '01010121204'
  local_id: '1205'
  name: O Escritório Postal dos Imortais
  vnum: '01010121205'
- description: "Ã\x89 uma sala elegantemente decorada. Esta sala foi criada especialmente\
    \ para\nos Imortais que ainda estão em busca de experiência e conhecimento. Um\
    \ quadro\nde mensagens preso na parede pode ser usado para se comunicar com qualquer\n\
    Mortal de Vitália, de qualquer classe. Os Imortais mais experientes tem\ncontrole\
    \ maior sobre as mensagens deste quadro.\nAo leste uma passagem que o leva devolta\
    \ à Sala de Mensagens dos Imortais.\nAo oeste há uma porta."
  exits:
    east:
      target_vnum: '01010121201'
    west:
      target_vnum: '01010121205'
