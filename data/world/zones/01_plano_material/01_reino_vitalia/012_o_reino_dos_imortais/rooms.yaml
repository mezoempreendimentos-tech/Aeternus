  name: A Sala de Encontros Sociais
  vnum: '01010121206'
- description: 'Você está numa sala de muito respeito.  Esta é uma sala onde os Deuses

    Guardiães se reúnem para discutir os rumos de Vitália.  Tudo aqui está muito

    limpo, e há algumas imagens projetadas na parede.  Ao canto da sala, uma

    escada leva à sala logo abaixo desta.'
  exits:
    down:
      target_vnum: '01010121213'
  local_id: '1207'
  name: A Sala dos Guardiães de Vitália
  vnum: '01010121207'
- description: 'Esta sala é usada pelos Deuses para guardar temporariamente os objetos

    tomados dos maus-jogadores.  A única saída desta sala, a leste, leva devolta

    à Sala de Reunião dos Deuses.'
  exits:
    east:
      target_vnum: '01010121200'
  local_id: '1208'
  name: O Armário dos Deuses
  vnum: 01010121208
- description: 'Os Deuses usam esta sala para sacrificar os corpos e pertences de

    jogadores que ousam desafiar sua ira, ou outros objetos que acabam sendo

    perdidos.  Estranhamente, não há absolutamente nada pelo chão.'
  exits:
    northeast:
      target_vnum: '01010121204'
  local_id: '1209'
  name: "A Ã\x81rea de Sacrifícios"
  vnum: 01010121209
- description: "O solo de grama verde recém-cortada, as plantas e as árvores fazem\
    \ daqui\num lugar de uma beleza jamais vista.  Ã\x89 incrível como este jardim\n\
    maravilhoso possa ser mantido aqui, sobre as nuvens.  Nunca nenhum mortal\nconheceu\
    \ este lugar.\nA sua frente passa um pequeno córrego que segue para o norte. \
    \ Ao sul, um\nestreito caminho leva novamente ao Reino dos Imortais."
  exits:
    north:
      target_vnum: '01010121211'
    south:
      target_vnum: '01010121203'
  local_id: '1210'
  name: Os Jardins
  vnum: '01010121210'
- description: 'Você está nadando em um pequeno lago.  A água é refrescante e relaxante,

    e possui um poder muito revigorante.  Você poderia ficar dias inteiros aqui,

    se deliciando nestas águas.  Há um delicado perfume no ar, que provavelmente

    vem daquelas plantas às margens do lago.

    Ao sul você pode ver um bonito jardim.'
  exits:
    south:
      target_vnum: '01010121210'
  local_id: '1211'
  name: O Pequeno Lago
  vnum: '01010121211'
- description: 'Você está na entrada do nível superior do Reino dos Imortais.  A esta
    sala

    é elegante e bem arrumada.  Há uma sala ao norte, e corredores a leste e

    oeste.  Uma escada leva devolta ao nível inferior.'
  exits:
    down:
      target_vnum: '01010121201'
    east:
      target_vnum: '01010121215'
    north:
      target_vnum: '01010121213'
    west:
      target_vnum: '01010121214'
