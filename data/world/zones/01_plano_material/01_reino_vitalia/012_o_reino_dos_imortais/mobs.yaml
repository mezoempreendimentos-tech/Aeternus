- description: |-
    Saida do poco do abismo, soltando fumaca como uma fornalha, com
    o poder de escorpioes da terra, causa danos apenas aos homens que
    nao tem o selo de Deus na fronte...
    E' como um cavalo, emparelhado com outros para a guerra, tem
    reflexos dourados em sua cabeca, seus cabelos como o de uma mulher,
    seus dentes como os dentes de um leao, seu torax envolto em ferro
    e o ruido como o de mil cavalos... caudas semelhantes a do
    escorpiao, com ferroes e o poder de aflingir os homens...
    Cumpre a ordem de nao matar aos homens, mas de tormenta-los
    a ponto de buscarem a morte...
  keywords:
  - besta
  - apocalipse
  long_desc: A Besta solta fumaca e ruidos para tormentar os homens.
  name: a Primeira Besta do Apocalipse
  vnum: 01010121290
- description: |-
    Essa fera tem 7 cabecas e 10 chifres, com diademas sobre os chifres...
    E' semelhante `a uma pantera: os pes como de urso, e as faces como
    de leao...
    Ela possui a grande autoridade do trono do Dragao...
    Uma de suas cabecas tem uma grande cicatriz, e por causa dessa cicatriz todos
    seguem a Fera para prostarem-se diante do Dragao
  keywords:
  - fera
  - apocalipse
  long_desc: A Primeira Fera reina sobre o mundo dos mortais.
  name: a Primeira Fera do Apocalipse
  vnum: 01010121291
- description: |-
    Essa fera tem dois chifres como um cordeiro, mas fala como um dragao...
    Ela exerce todo o poder da primeira Fera, sob a vigilancia desta, e faz
    com que a terra e seus habitantes adorem a primeira Fera...
    Tb comunica o espirito `a imagem da Fera, de modo que essa imagem
    possa falar e fazer com que morra todo aquele que nao se prostrar
    diante da Fera.
    Essa mesma Fera fez com que todos os homens fossem marcados com
    o nome da Fera, na mao direita e na fronte, com o numero da Fera,
    e esse numero e' seiscentos e sessenta e seis.
  keywords:
  - fera
  - apocalipse
  long_desc: A Segunda Fera faz cumprir a vontade da Primeira Fera.
  name: a Segunda Fera do Apocalipse
  vnum: 01010121292
- description: |-
    Voce ve o Grande Drago do Apocalipse, criador das Feras do Apocalipse,
    Ele e' Vermelho como brasa, com tres cabecas, a primeira respira
    Agua, a segunda Ar e a terceira Terra, exalando Fogo pelas
    narinas e com o poder de acabar com a vida daqueles que
    o desafiarem...
  keywords:
  - dragao
  - apocalipse
  long_desc: O Grande Dragao vaga desorientado por Vitalia.
  name: o Grande Dragao do Apocalipse
  vnum: 01010121293
