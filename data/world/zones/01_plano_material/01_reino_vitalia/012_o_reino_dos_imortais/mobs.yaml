- description: |-
    Este espírito, tendo vivido todos seus dias no mundo dos mortais
    agora paga seus pecados fazendo trabalhos domésticos neste purgatório
    de almas.  Neste caso, estes trabalhos parecem ser a limpeza deste
    local para os Imortais.
  keywords:
  - ser
  - amorfo
  - espirito
  - vagueante
  long_desc: Um estranho ser amorfo vagueia por estas paredes, limpando-as eternamente.
  name: o espirito vagueante
  vnum: '01010121202'
