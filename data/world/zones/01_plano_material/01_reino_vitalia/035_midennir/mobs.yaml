- description: |-
    Esta imensa criatura alada parece realmente ameaçadora, a medida que circula
    a poucas polegadas de sua cabeça, batendo suas asas e chiando muito alto.
  keywords:
  - wyvern
  long_desc: Um wyvern monstruoso vagarosamente circula sobre sua cabeça.
  name: o wyvern
  vnum: '01010353500'
- description: |-
    Você se vê diante de uma pequena e esfarrapada criatura com músculos nodosos
    e uma pele verde e nojenta.  Não parece o tipo de pessoa que você convidaria
    para o jantar.
  keywords:
  - montanha
  - goblin
  long_desc: Um goblin da montanha está vagando sem rumo, resmungando para si mesmo...
  name: o goblin
  vnum: '01010353501'
- description: |-
    O tentente goblin está particularmente furioso e está escolhendo um de seus
    homens para bater, mas talvez quem bata seja você...
  keywords:
  - goblin
  - tenente
  long_desc: Um tenente goblin está aqui, tentando colocar seus homens em ordem.
  name: o tenente goblin
  vnum: '01010353502'
- description: |-
    O líder não parece muito feliz por você ter achado ele aqui.  Ele agarra sua
    espada curta e dispara em direção ao seu pescoço.
  keywords:
  - goblin
  - lider
  long_desc: O líder goblin inspeciona a sala.
  name: o líder goblin
  vnum: '01010353503'
- description: |-
    O pobre garoto tem inúmeros cortes e arranhões, mas parece estar bem.
    Aparentemente, ele foi o único sobrevivente da emboscada.
  keywords:
  - garoto
  - pequeno
  long_desc: Um garoto pequeno está sentado aqui, lambendo suas feridas.
  name: o garoto pequeno
  vnum: '01010353504'
- description: |-
    Agora, o estalajadeiro gasta a maior parte de seu tempo esperando por
    clientes, enquanto as noites são gastas vigiando os goblins.  Sua
    hospedaria não é mais o lugar feliz que foi no passado.
  keywords:
  - estalajadeiro
  long_desc: O estalajadeiro está de pé aqui, limpando os copos.
  name: o Estalajadeiro
  vnum: '01010353505'
- description: |-
    Você pode sentir o bafo de álcool do bardo do outro lado da sala.  Este
    pobre bardo está sentado aqui há bastante tempo, bebendo para se levar ao
    esquecimento.
  keywords:
  - bardo
  long_desc: Um bardo mal-humorado está aqui, bebendo para esquecer seus problemas.
  name: o bardo
  vnum: '01010353506'
- description: |-
    O homem é evidentemente um fora-da-lei e não tem escrúpulos em reduzir você a
    pequenos pedaços.
  keywords:
  - cavaleiro
  - negro
  long_desc: Um cavaleiro negro está aqui, montado em seu cavalo preto.
  name: o cavaleiro negro
  vnum: '01010353507'
