  name: Salão Bagunçado
  vnum: 01010161685
- description: 'Você se encontra dentro de um pequeno quarto cheio de farinha, grãos,

    frutas e morcegos pendurados.'
  exits:
    south:
      target_vnum: 01010161685
  local_id: '1686'
  name: A Dispensa
  vnum: 01010161686
- description: 'Esta cozinha não é limpa desde a criação dos seres humanos. O lixo
    e a

    comida estragada se espalham por sobre o chão e chegam a bater em seus

    joelhos. Sobre o fogão, uma panela fervendo. Uma mão humana está ali dentro,

    sendo cozida.'
  exits:
    west:
      target_vnum: 01010161685
  local_id: '1687'
  name: A Cozinha
  vnum: 01010161687
