  exits:
    north:
      target_vnum: '01010161671'
  local_id: '1670'
  name: O Tesouro
  vnum: '01010161670'
- description: 'Você está dentro de um quarto muito bem guardado. O lugar consegue
    ser

    ainda melhor construído do que os poços da mina e está iluminado por lanternas.'
