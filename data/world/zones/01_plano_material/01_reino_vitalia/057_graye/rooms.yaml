  local_id: '5723'
  name: A Frágil Pedra
  vnum: '01010575723'
- description: |-
    Você se encontra em uma pedra plana muito larga.  Você poderia deitar-se
    aqui e tirar uma bela soneca também se quisesse.  Ao sul você tem uma vista
    espetacular de toda a floresta.  Há também um outro calço para os pés seguro
    até o topo do penhasco, tudo para uma fácil escalada.
  exits:
    east:
      target_vnum: '01010575723'
    up:
      target_vnum: '01010575726'
  local_id: '5724'
  name: A Pedra
  vnum: '01010575724'
- description: |-
    "AAAAAHHHH!", você grita enquanto despenca em direção a terra.  O chão se
    aproxima e você se prepara para o impacto.  De repente, num piscar de olhos,
    você se sente flutuando em meio a uma luz branca.  Você percebe que há um
    brilho no olho dos deuses.

    "Sua hora ainda não chegou.." - eles profetizam.
  exits:
    down:
      target_vnum: '01010570050'
  local_id: '5725'
  name: OPA!!
  vnum: '01010575725'
- description: |-
    Você alcança o topo do penhasco e luta para manter-se de pé.  Por alguns
    instantes você consegue vislumbrar tudo, sem perder absolutamente nada de
    vista.  Para o sul e leste você vê a floresta vindo em direção à encosta do
    penhasco e ao norte você percebe uma clareira nas vizinhanças de uma pequena
    cidade.
  exits:
    down:
      target_vnum: '01010575724'
    north:
      target_vnum: 01010575728
