  name: O Mercado
  vnum: 01010525208
- description: 'Esta pequena rua lateral leva de leste a oeste para becos enquanto
    para o

    sul você vê o templo.  O uivar incessante atormenta a sua mente.'
  exits:
    east:
      target_vnum: '01010525243'
    south:
      target_vnum: '01010525210'
    west:
      target_vnum: 01010525228
  local_id: '5209'
  name: Uma Rua Lateral
  vnum: 01010525209
- description: 'Você está na área popular da cidade. Prédios arruinados de barro e
    pedra é

    tudo o que a visão tem a oferecer. A maioria desses lares não passam de

    pilhas de destroços, porém alguns parecem quase seguros para se arriscar a

    entrar.

    A rua continua a norte e sul e há construções ao lado da rua.'
  exits:
    east:
      target_vnum: '01010525244'
    north:
      target_vnum: 01010525209
    south:
      target_vnum: '01010525211'
    west:
      target_vnum: '01010525226'
  local_id: '5210'
  name: Uma Rua Lateral
  vnum: '01010525210'
- description: 'Esta pequena rua lateral chega do caminho pelo jardim ao sul. Ao seu
    redor

    estão grandes pilhas de destroços aonde eram as casas dos cidadãos. Um uivo

    solitário faz você se preocupar bastante com a sua segurança aqui.'
  exits:
    east:
      target_vnum: '01010525237'
    north:
      target_vnum: '01010525210'
    south:
      target_vnum: '01010525204'
    west:
      target_vnum: '01010525227'
  local_id: '5211'
  name: Uma Rua Lateral
  vnum: '01010525211'
- description: 'Esta pequena rua lateral leva ao sul, vinda do templo, para a área

    comercial da cidade.  A destruição que alcançou esta cidade não foi

    despropositada; estes prédios de importante aparência foram quase totalmente

    destruídos. Há um buraco na parede de uma grande estrutura ao leste.'
  exits:
    east:
      target_vnum: '01010525232'
    north:
      target_vnum: '01010525206'
    south:
      target_vnum: '01010525213'
    west:
      target_vnum: '01010525221'
  local_id: '5212'
  name: Uma Rua Lateral
  vnum: '01010525212'
- description: 'Esta pequena rua lateral está alinhada com os destroços de grandes

    prédios.  Ao oeste há um estrutura escura e ameaçadora enquanto ao leste

    há a entrada de uma pequena taverna.  A rua continua para o norte e o sul.'
  exits:
    east:
      target_vnum: '01010525230'
    north:
      target_vnum: '01010525212'
    south:
      target_vnum: '01010525214'
    west:
      target_vnum: 01010525219
  local_id: '5213'
  name: Uma Rua Lateral
  vnum: '01010525213'
- description: 'Você está no final de uma rua que leva ao centro da cidade.

    Uma longa ruela escura leva ao leste e ao oeste. Há, a sul, uma

    via totalmente calçada.'
  exits:
    east:
      target_vnum: 01010525229
    north:
      target_vnum: '01010525213'
    south:
      target_vnum: '01010757500'
    west:
      target_vnum: 01010525218
  local_id: '5214'
  name: Uma Rua Lateral
  vnum: '01010525214'
- description: 'Você encontra-se na base de uma alta torre construída para proteger
    a

    cidade de invasores.  Mas pelo jeito, não serviu de muita coisa.'
  exits:
    east:
      target_vnum: 01010525218
    north:
      target_vnum: '01010525216'
    up:
      target_vnum: '01010525247'
  local_id: '5215'
  name: Sob uma Torre de Guarda Arruinada
  vnum: '01010525215'
- description: 'Esta ruela leva aos fundos do que aparenta ser um açougue.  Você se

    incomoda com o fedor.  Ao sul há uma das torres de guarda da cidade.'
  exits:
    north:
      target_vnum: '01010525217'
    south:
      target_vnum: '01010525215'
  local_id: '5216'
  name: Uma Ruela
  vnum: '01010525216'
- description: 'Um grande balcão foi posto aqui com ganchos de metal e prateleiras
    de

    madeira ao fundo.  Pendurados pelos ganchos há pequenos pedaços de carne e

    outras coisas.  Este balcão está relativamente vazio, e uma súbita irrupção

    de uivos e gritos fazem você compreender o porquê.'
  exits:
    east:
      target_vnum: '01010525220'
    north:
      target_vnum: 01010525208
    south:
      target_vnum: '01010525216'
  local_id: '5217'
  name: O Açougue
  vnum: '01010525217'
- description: 'Uma estreita ruela leva a leste para uma rua mais larga e para oeste
    para

    uma das torres de guarda da cidade.'
  exits:
    east:
      target_vnum: '01010525214'
    west:
      target_vnum: '01010525215'
  local_id: '5218'
  name: Uma Ruela
  vnum: 01010525218
- description: "Você encontra-se no que foi outrora a sede da Ã\x9ANICA guilda da\
    \ cidade.\nMesas e cadeiras foram destroçadas e armas quebradas jazem ao chão\
    \ como se\numa grande batalha tivesse sido travada aqui.  Jogada ao lado da parede\
    \ ao\nfundo está uma bandeira negra em farrapos, com o símbolo das Trevas sobre\n\
    ela."
  exits:
    east:
      target_vnum: '01010525213'
  local_id: '5219'
  name: A Sede da Guilda
  vnum: 01010525219
- description: 'Uma grande carroça encontra-se aqui, carregando frutas apodrecidas
    e

    vegetais.  Moscas infestam tudo o que parece ser o último resquício de

    alimentos deixados na cidade.'
  exits:
    north:
      target_vnum: '01010525207'
    west:
      target_vnum: '01010525217'
  local_id: '5220'
  name: O Balcão de Produtos
  vnum: '01010525220'
- description: 'Aqui você encontra ferramentas e bigornas usadas para criarem várias
    armas

    e ítens.  As paredes foram "limpas" e poucas partes incompletas de armas e

    armaduras foram deixadas.'
  exits:
    east:
      target_vnum: '01010525212'
  local_id: '5221'
  name: A Forja
  vnum: '01010525221'
- description: 'Tapeçarias desgastadas e rasgadas e tapetes juntam-se em pilhas.  Robes

    sofisticados e vários artigos de vestuário são agora apenas farrapos.

    Você prende seu olhar nestas estranhas pilhas por um longo tempo até que

    um uivo penetrante atraí sua atenção, fazendo você concluir finalmente que

    tratam-se de camas.'
  exits:
    east:
      target_vnum: '01010525225'
    north:
      target_vnum: '01010525223'
    south:
      target_vnum: 01010525208
  local_id: '5222'
  name: O Balcão de Tapeçarias
  vnum: '01010525222'
- description: 'Uma estreita ruela leva ao norte para uma das torres de guarda, enquanto

    ao sul há um balcão repleto de roupas rasgadas e tapetes.'
  exits:
    north:
      target_vnum: '01010525224'
    south:
      target_vnum: '01010525222'
  local_id: '5223'
  name: Uma Ruela
  vnum: '01010525223'
- description: 'Você encontra-se abaixo de uma das torres de guarda, construídas para

    proteger a cidade de invasores.  Obviamente, ela falhou.'
  exits:
    east:
      target_vnum: 01010525228
    south:
      target_vnum: '01010525223'
    up:
      target_vnum: '01010525246'
  local_id: '5224'
  name: Abaixo da Torre de Guarda
  vnum: '01010525224'
- description: 'Uma mesa foi jogada ao chão, lançando finas jóias e gemas através
    do

    local.  A maioria destas peças encontra-se deformada e sem brilho, e poucas

    ainda podem ter algum valor.'
  exits:
    south:
      target_vnum: '01010525207'
    west:
      target_vnum: '01010525222'
  local_id: '5225'
  name: O Balcão de Joalherias
  vnum: '01010525225'
- description: 'Esta era outrora uma casa muito simples com nada mais que algumas
    poucas

    cadeiras e uma cama.  Uma fria lareira sugere que a cidade foi abandonada

    por um certo período.  Quase nada resta desta humilde casa.'
  exits:
    east:
      target_vnum: '01010525210'
  local_id: '5226'
  name: Uma Casa de Barro Arruinada
  vnum: '01010525226'
- description: 'Esta pequena casa foi totalmente destruída, deixando pilhas de destroços

    aqui e ali.  Poucas pilastras ainda encontram-se erguidas com palhas secas

    penduradas e um vento quente sopra através da casa.'
  exits:
    east:
      target_vnum: '01010525211'
  local_id: '5227'
  name: Uma Casa de Barro Arruinada
  vnum: '01010525227'
- description: 'Uma estreita ruela leva ao oeste para uma das torres de guarda e leste
    para

    uma pequena rua lateral.'
  exits:
    east:
      target_vnum: 01010525209
    west:
      target_vnum: '01010525224'
  local_id: '5228'
  name: Uma Ruela
  vnum: 01010525228
- description: 'Do lado de fora, este local aparenta ser uma pilha ordinária de escombros,

    mas no interior deste local arruinado você descobre o que seria uma loja

    cheia de armaduras, armas e vários outros bens.  Um pequeno sinal balança ao

    vento.'
  exits:
    west:
      target_vnum: '01010525214'
  local_id: '5229'
  name: Uma Loja Abandonada
  vnum: 01010525229
- description: 'Um glorioso local no seu início, esta taverna agora encontra-se em
    ruínas;

    mesas e cadeiras destruídas estão espalhadas pelo local, garrafas e copos

    quebrados e um pequeno palco destroçado.  Instrumentos musicais e objetos

    pessoais encontram-se jogados sob os destroços, mas as pessoas as quais

    estes objetos pertenciam não estão com eles.  Olhando acima você observa que

    o segundo andar inteiro e teto desmoronaram, deixando um largo buraco acima.'
  exits:
    west:
      target_vnum: '01010525213'
  local_id: '5230'
  name: A Taverna do Sol
  vnum: '01010525230'
- description: 'Você encontra-se em um grande salão ligado ao fim deste corredor,
    o qual

    leva ao norte para a área de recepção.  Pedestais e colunas tombaram e muitos

    dos objetos de valor foram roubados, sobrando apenas destroços.  Algumas

    poucas cadeiras sobraram bem como uma larga escrivaninha.  Ao leste

    encontra-se um arco coberto por vinhas o qual leva a um saguão particular.'
  exits:
    east:
      target_vnum: '01010525234'
    north:
      target_vnum: '01010525232'
  local_id: '5231'
  name: A Asa Sul da Prefeitura
  vnum: '01010525231'
- description: 'Esta é a principal área de recepção da prefeitura de Thalos.  As paredes

    foram totalmente queimadas e arranhadas e destroços encontram-se espalhados

    de parede a parede.  Um grande buraco feito na parede oeste permite você ver

    uma das ruas laterais.  Obviamente, ninguém também estará lhe observando

    hoje.  Os corredores levam ao sul e ao leste.'
  exits:
    east:
      target_vnum: '01010525233'
    north:
      target_vnum: '01010525202'
    south:
      target_vnum: '01010525231'
    west:
      target_vnum: '01010525212'
  local_id: '5232'
  name: A Prefeitura
  vnum: '01010525232'
- description: 'Aqui encontra-se os resquícios de um sofisticado escritório, possivelmente

    o do prefeito.  Algumas poucas plantas mortas e pedaços quebrados de mobília

    fazem deste local qualquer coisa, menos sofisticado.  A única coisa que

    permanece intacta é um pequeno armário de vidro.  Um longo corredor leva de

    volta ao oeste para a área de recepção e um arco coberto por heras leva ao

    sul para um saguão privado.'
  exits:
    south:
      target_vnum: '01010525234'
    west:
      target_vnum: '01010525232'
  local_id: '5233'
  name: A Asa Leste da Prefeitura
  vnum: '01010525233'
- description: 'Uma pena que esta destruição maciça tenha tocado este local outrora
    belo.

    O caminho de jardins do templo nada tem a ver com este jardim.  Flores e

    árvores foram esmagados ao chão e bancos de jardins arremessados contra as

    paredes.  Uma grande fonte de mármore no centro do saguão ainda permanece,

    resistindo a qualquer tentativa de destruir sua beleza.  Acima encontra-se

    os resquícios de uma das torres de guarda.  Arcos levam ao norte e oeste de

    volta para a prefeitura.'
  exits:
    north:
      target_vnum: '01010525233'
    west:
      target_vnum: '01010525231'
  local_id: '5234'
  name: Os Jardins Particulares e o Saguão de Thalos
  vnum: '01010525234'
- description: 'Esta era outrora o alojamento dos guardas de Thalos.  Agora apenas
    um local

    vazio, esta pequena casa ainda se mantém guardando ambas as entradas para a

    cidade e para a prefeitura.'
  exits:
    north:
      target_vnum: '01010525201'
  local_id: '5235'
  name: Uma Pequena Casa de Guarda
  vnum: '01010525235'
- description: 'Tudo o que resta desta casa são algumas pilhas espalhadas de destroços
    e

    uma enorme cratera.  Obviamente alguém ou algo importante habitava esta casa.

    Um uivo apavorante faz o seu sangue gelar.'
  exits:
    south:
      target_vnum: '01010525202'
  local_id: '5236'
  name: Uma Casa Arruinada
  vnum: '01010525236'
- description: 'Esta parece ser a mais alta estrutura ainda restante nesta cidade.  Poderia

    ser antes uma espécie de estalagem, mas agora não passa de uma grande desordem.

    A parede ao fundo foi derrubada, revelando uma entrada em outro prédio,

    através de outra parede derrubada.  Entre os dois prédios encontram-se algumas

    crateras e escombros. Uma velha escadaria de madeira leva acima para o segundo

    andar cujo piso parece ranger.'
  exits:
    east:
      target_vnum: 01010525238
    up:
      target_vnum: '01010525245'
    west:
      target_vnum: '01010525211'
  local_id: '5237'
  name: Um Prédio Alto
  vnum: '01010525237'
- description: 'Esta pequena casa não poderia ter servido de casa para mais de uma
    pessoa.

    Agora, com a parede ao fundo derrubada, ela pode abrigar bem mais.  Olhando

    ao redor, você pode ver prateleiras quebradas e mesas com vários frascos e

    sacos espalhando seu conteúdo por todo o chão.  Esta era possivelmente a

    loja de mágica desta cidade.  A entrada para leste está bloqueada, fazendo

    com que a única saída esteja, de volta, ao oeste.'
  exits:
    west:
      target_vnum: '01010525237'
  local_id: '5238'
  name: Uma Pequena Cabana
  vnum: 01010525238
- description: 'Uma estreita ruela leva ao sul para a rua principal e norte em direção
    à

    torre de guarda.  Vários uivos chegam a surpreendê-lo.'
  exits:
    north:
      target_vnum: '01010525240'
    south:
      target_vnum: '01010525201'
  local_id: '5239'
  name: Uma Ruela
  vnum: 01010525239
- description: 'Uma estreita ruela leva ao norte para uma das torres de guarda da
    cidade,

    enquanto ao sul conduz à rua principal.  Ao oeste encontra-se uma entrada para

    uma pequena casa bloqueada por destroços.'
  exits:
    north:
      target_vnum: '01010525241'
    south:
      target_vnum: 01010525239
  local_id: '5240'
  name: Uma Ruela
  vnum: '01010525240'
- description: 'Você encontra-se sob uma alta torre de guarda.  Estreitas ruelas conduzem
    ao

    oeste e ao sul e uma escada de frágil aparência leva acima, para a torre.

    Logo acima, você ouve os gritos de dezenas de lâmias famintas.  Cuidado!'
  exits:
    south:
      target_vnum: '01010525240'
    up:
      target_vnum: 01010525248
    west:
      target_vnum: '01010525243'
  local_id: '5241'
  name: Sob uma Torre de Guarda
  vnum: '01010525241'
- description: 'Esta era outrora a casa de banho para os cidadãos da cidade.  Jatos
    de água

    quente ainda jorram de um buraco no chão.  Obviamente há uma fonte de água

    quente localizada sob a cidade (fazendo a decisão de se construir uma cidade

    aqui muito mais justificada).  Uma observação mais aproximada revela um

    cadáver boiando ao lado, com a pele já derretida após meses de permanência

    neste local.  A parede oeste está derrubada, revelando outra casa arruinada.'
  exits:
    north:
      target_vnum: '01010525243'
    west:
      target_vnum: '01010525244'
  local_id: '5242'
  name: A Casa de Banho
  vnum: '01010525242'
- description: 'Uma estreita ruela leva ao oeste para uma pequena rua lateral e leste
    para

    uma das torres de guarda da cidade.  Grandes nuvens de vapor partem do prédio

    ao sul.'
