  name: O Mercado
  vnum: '01010525207'
- description: 'Você encontra-se no final da praça. Balcões e carroças estão lado
    a lado,

    cheios com restos de finas iguarias e exóticas especiarias.'
  exits:
    east:
      target_vnum: '01010525207'
    north:
      target_vnum: '01010525222'
    south:
      target_vnum: '01010525217'
