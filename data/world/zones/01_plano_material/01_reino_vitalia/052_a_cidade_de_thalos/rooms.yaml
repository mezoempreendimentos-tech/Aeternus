  exits:
    east:
      target_vnum: '5207'
    north:
      target_vnum: '5222'
    south:
      target_vnum: '5217'
  name: O Mercado
  vnum: '5208'
- description: |-
    Esta pequena rua lateral leva de leste a oeste para becos enquanto para o
