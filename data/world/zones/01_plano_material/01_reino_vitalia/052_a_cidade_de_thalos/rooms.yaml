- description: 'Você está no centro de uma grande praça alinhada em cada lado por
    cestas,

    carroças e balcões de todas as formas e tamanhos. Abandonadas, estas pequenas

    lojas ainda contêm alguns de seus produtos outrora vendidos a um público

    consumidor.'
  exits:
    east:
      target_vnum: '01010525205'
    north:
      target_vnum: '01010525225'
    south:
      target_vnum: '01010525220'
