  local_id: '329'
  name: Um Corredor Indescritível
  vnum: 01010030329
- description: 'Finalmente você chegou ao Oráculo!  Centenas de aventureiros falharam

    nesta busca, mas você, poderoso bravo, teve sucesso!  Alegra-te, por tudo o

    que você viu, é tudo seu, somente seu.  Use seus tesouros sabiamente meu

    amigo.  Eles podem ser a melhor coisa que já aconteceu a você, ou a pior

    maldição que alguém já proferiu...'
  exits:
    east:
      target_vnum: 01010030329
  local_id: '330'
  name: O Oráculo
  vnum: '01010030330'
- description: 'Você está em outro corredor que parece não um corredor, mas a junção
    de

    três passagens, então ele tem apenas uma parede.  Todas as direções podem

    guardar novas aventuras, e ainda, armadilhas e terror.'
  exits:
    east:
      target_vnum: '01010030332'
    north:
      target_vnum: '01010030333'
    south:
      target_vnum: '01010030326'
  local_id: '331'
  name: Um Corredor
  vnum: '01010030331'
- description: 'CAMINHO ERRADO!!!

    OOPS'
  exits: {}
  local_id: '332'
  name: Um Corredor
