  keywords:
  - dragao
  - aglandiir
  name: Aglandiir
  vnum: '3305'
- description: |-
    Este Cíclope atira pedras realmente bem.  Com um olho, porêm, acertar o alvo
    é outra coisa.  Ele olha para você e rosna ao errar você de novo!
  keywords:
  - ciclope
  name: o cíclope
  vnum: '3306'
- description: |-
    Ela é uma mulher e tanto, toda em cabelo e olhos, ao que parece.  Sua roupa é
    da mesma cor castanho-amarelado que sua pele e cabelo.  Os olhos azuis dela
    olham para você com surpresa e parecendo mostrar uma grande inteligência.
    Sua boca contrai-se zombando de você...
  keywords:
  - salle
  - woman
  name: Salle
  vnum: '3307'
- description: |-
    Este deve ser o maior homem que você já viu.  Ele tem mais de dois metros do
    pé à cabeça, e pesa uns bons 130 kilos -- a maior parte concentrada no seu
    bíceps e peitorais ao que parece.  Uma bainha decorada encontra-se junto à
    sua cintura, com o empunhador de uma adaga prateada aparecendo para fora...
    Um pequena arma para um grande homem!
  keywords:
  - homem
  - duwick
  name: Duwick
  vnum: '3308'
- description: |-
    Ele parece como um fazendeiro aposentado ganhando a vida honestamente
    trabalhando na hospedaria.  Mais poder para ele!
  keywords:
  - recepcionista
  name: o Recepcionista
  vnum: '3309'
- description: |-
    Ele é velho e grisalho, mas parece ter sido capaz de manter suas faculdades
    mentais através dos anos.  Um grande suéter de lã agasalha ele aquecendo-o.
    Seus olhos azuis dançam sobre você com diversão ao notar suas armas, mas ele
    não aparenta estar tão aterrorizado com isso.
  keywords:
  - dono
  - da
  - hospedaria
  name: o dono da hospedaria
  vnum: '3310'
- description: |-
    Ele parece mal cuidado, como se a forte personalidade das montanhas tivesse
    infectado ele com sua resistência.  Seu andar é decidido, sua face é
    desgastada, seus olhos frios e escuros.  Os outros saem do seu caminho
    quando ele passa.
  keywords:
  - cacador
  name: o caçador
  vnum: '3311'
- description: |-
    Ele parece apoquentado com a maneira com que ele rapidamente pega os pedidos
    e corre para os fundos para pegar a comida e para o bar conseguir as
    bebidas.  Ele não parece lhe dirigir uma olhadela no momento em que ele
    passa por você.
  keywords:
  - garcom
  name: um garçom
  vnum: '3312'
- description: |-
    Ela parece apoquentada com a maneira com que ela rapidamente pega os pedidos
