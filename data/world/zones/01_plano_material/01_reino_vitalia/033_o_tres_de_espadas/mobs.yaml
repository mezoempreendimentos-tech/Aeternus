    O copo está completamente limpo mas ele continua a limpá-lo.  Que figura!
  keywords:
  - homem
  - do
  - bar
  name: o homem do bar
  vnum: '3314'
- description: |-
    Eca!  Será que esse cara já viu algum banho?  Sua face, mãos, armas...
    Quase todas as partes dele estão cobertas com imundície, poeira, sujeira e
