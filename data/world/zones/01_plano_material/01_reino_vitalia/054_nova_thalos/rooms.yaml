  exits:
    east:
      target_vnum: 01010545491
    west:
      target_vnum: 01010545489
  local_id: '5490'
  name: Uma Passagem Escura
  vnum: 01010545490
- description: 'A pequena passagem termina aqui sem razão aparente.  Olhando em volta

    você vê uma pequena escada mal construída em meio a sujeira.  Subindo pela

    escada você encontra uma porta secreta no teto.  A passagem continua a oeste

    daqui.'
  exits:
    up:
      target_vnum: '01010545570'
    west:
      target_vnum: 01010545490
  local_id: '5491'
  name: Uma Passagem Escura
  vnum: 01010545491
- description: A pequena passagem continua a oeste e leste.
  exits:
    east:
      target_vnum: 01010545493
    west:
      target_vnum: 01010545482
  local_id: '5492'
  name: O Subterrâneo
  vnum: 01010545492
- description: A pequena passagem continua a oeste e leste.
  exits:
    east:
      target_vnum: '01010545500'
    west:
      target_vnum: 01010545492
  local_id: '5493'
  name: O Subterrâneo
  vnum: 01010545493
- description: 'Você está caminhando por uma estrada que liga o portão sul ao centro
    de

    Nova Thalos.  Aqui já é difícil ouvir os sonos do mercado, o que deixa o

    ambiente muito tranqüilo.  A praça comum fica ao norte, e a estrada continua

    para o sul.'
  exits:
    north:
      target_vnum: '01010545410'
    south:
      target_vnum: 01010545495
  local_id: '5494'
  name: A Estrada Sul
  vnum: 01010545494
- description: 'Você está caminhando por uma estrada que liga o portão sul ao centro
    de

    Nova Thalos.  Não há muitas pessoas caminhando por aqui, e o ambiente é

    muito tranqüilo, longe do barulho e o caos do mercado de Nova Thalos.  A

    estrada continua para o norte, e você pode ver uma ponte para o sul.  Para o

    leste e o oeste você vê fileiras de casas.  Provavelmente você está na parte

    residencial da cidade.'
  exits:
    down:
      target_vnum: '01010242400'
    east:
      target_vnum: '01010242411'
    north:
      target_vnum: 01010545494
    south:
      target_vnum: '01010545412'
    west:
      target_vnum: '01010242410'
  local_id: '5495'
  name: A Estrada Sul
  vnum: 01010545495
- description: 'Você está em uma estreita rua na cidade de Nova Thalos.  O caminho
    leva

    tanto à estrada principal que segue pelo norte da praça central, a oeste,

    quanto a uma enorme árvore de aparência muito suspeita, a leste.'
  exits:
    east:
      target_vnum: 01010494978
    west:
      target_vnum: '01010545421'
  local_id: '5496'
  name: Uma Estreita Rua
  vnum: 01010545496
- description: 'Você entá em uma rua de parelelepípedos aparentemente pouco usada.  Há
    a

    leste daqui uma estranha estrutura, enquanto a oeste fica o Passeio do

    Sultão.'
  exits:
    east:
      target_vnum: 010105418600
    west:
      target_vnum: 01010545418
  local_id: '5497'
  name: Uma Travessa do Passeio do Sultão
  vnum: 01010545497
- description: 'Você está em uma sala pequena onde pilhas de correspondências e

    encomendas são encontradas cobrindo as paredes.  Há muita desordem e sujeira

    por todos os lados.  Atrás do balcão há um velho senhor, esperando para

    atendê-lo.  Há uma discreta placa sobre o balcão.'
  exits:
    east:
      target_vnum: '01010545404'
  local_id: '5498'
  name: O Correio de Nova Thalos
  vnum: 01010545498
- description: 'Você está em um corredor parcamente iluminado.  O barulho do Demônio

    Dançante parece não chegar aqui, já que não é possível ouvir nada, nem vindo

    do norte, nem do sul. Uma placa chama sua atenção.'
  exits:
    north:
      target_vnum: '01010545402'
    south:
      target_vnum: '01010545650'
  local_id: '5499'
  name: Um Corredor Mal-iluminado
  vnum: 01010545499
- description: A pequena passagem continua a oeste e leste.
  exits:
    east:
      target_vnum: '01010545501'
    west:
      target_vnum: 01010545493
  local_id: '5500'
  name: O Subterrâneo
  vnum: '01010545500'
- description: A pequena passagem continua a oeste e leste.
  exits:
    east:
      target_vnum: '01010545502'
    west:
      target_vnum: '01010545500'
  local_id: '5501'
  name: O Subterrâneo
  vnum: '01010545501'
- description: A pequena passagem continua a oeste e leste.
  exits:
    east:
      target_vnum: 01010545488
    west:
      target_vnum: '01010545501'
  local_id: '5502'
  name: O Subterrâneo
  vnum: '01010545502'
- description: 'Você desce a escadaria no silencioso santuário interno.  Aqui se situa

    seu Mestre pronto para o ajudar quando o tempo é certo.  A câmara

    está completamente silenciosa.  A única saída óbvia é de volta para

    a escadaria, no Néctar.'
  exits:
    east:
      target_vnum: 01010545479
    up:
      target_vnum: 01010545519
  local_id: '5503'
  name: O Santuário dos Clérigos
  vnum: '01010545503'
- description: 'Você entrou na câmara do homem mais santificado em Nova Thalos.  O

    Alto Sacerdote aconselha o Sultão em todos os assuntos no mundo sacro.

    Do que você ouviu porém, este homem sagrado homem possui algum temperamento,

    e ele não parece muito feliz por você ter perturbado suas orações.

    A saída mais obvia é para sul.'
  exits:
    south:
      target_vnum: 01010545508
  local_id: '5504'
  name: A Câmara do Alto Sacerdote
  vnum: '01010545504'
- description: "Você está no altar do templo, a norte do Templo de Nova Thalos. Um\n\
    enorme altar feito em Ã\x94nix preta altamente polida está Ã  sua frente.\nAtrás\
    \ deste altar repousa uma estátua de doze pés de altura de Akbal,\no mais alto\
    \ deus em todas as terras."
  exits:
    south:
      target_vnum: 01010545509
  local_id: '5505'
  name: No Altar
  vnum: '01010545505'
- description: 'Filas e filas de tecidos repousam aqui, aguardando para serem

    Costuradas e proverem roupas.  Elas são trazidas do campo, tornadas

    roupas e tingidas em cores diferentes.  Um jovem garoto caminha

    até uma delas, a pega e sai.'
  exits:
    east:
      target_vnum: '01010545461'
  local_id: '5506'
  name: A Guilda dos Tecelães
  vnum: '01010545506'
- description: 'Você entrou em uma ocupada oficina cheia de pessoas correndo

    com várias ferramentas e materiais.  O ar está tenso com a pressa de

    completar os vários projetos e criações.'
  exits:
    west:
      target_vnum: '01010545461'
  local_id: '5507'
  name: A Guilda dos Artesões
  vnum: '01010545507'
- description: "O templo continua aqui, mas não na mesma escala.  O lugar ainda\n\
    parece imaculado.  Para o norte você vê a câmara do Alto Sacerdote\ne uma placa\
    \ na porta com GRANDES letras que lêem 'NÃ\x83O PERTURBE'\nPara o sul está a entrada\
    \ para a Guilda dos Clérigos."
  exits:
    east:
      target_vnum: 01010545509
    north:
      target_vnum: '01010545504'
    south:
      target_vnum: '01010545512'
  local_id: '5508'
  name: Dentro do Templo
  vnum: 01010545508
- description: 'Enormes pilares marmóreos ascendem por todos os seus lados, segurando
    o

    teto.  Entre cada um desses há cenas épicas da história religiosa de Nova

    Thalos.  Uma fila de esculturas estão voltadas para o púlpito, dedicando

    toda sua atenção.  O fundo carpete vermelho sob seus pés parece não ter uma

    marca de uso ou sujeira.'
  exits:
    east:
      target_vnum: '01010545510'
    north:
      target_vnum: '01010545505'
    south:
      target_vnum: '01010545513'
    west:
      target_vnum: 01010545508
  local_id: '5509'
  name: Dentro do Templo
  vnum: 01010545509
- description: 'Essa sala é nova no Templo, ela foi criada durante tempos difíceis
    que

    golpearam a cidade em décadas recentes.  Afortunadamente o Sultão armazenou

    um pouco das necessidades básicas para tal ocasião.  Estes dias a Sala de

    Doações depende da generosidade de ricos aventureiros, e uma maldição para

    aquele que entrar para roubar.'
  exits:
    west:
      target_vnum: 01010545509
  local_id: '5510'
  name: A Sala de Doações
  vnum: '01010545510'
- description: 'Quatro grandes estátuas de pedra habitam o museu.  Elas foram construídas

    pelo povo de Nova Thalos em ação de graça para os santos que eles acreditam

    terem salvado suas vidas.

    O museu continua para o sul.'
  exits:
    south:
      target_vnum: '01010545516'
    west:
      target_vnum: '01010545462'
  local_id: '5511'
  name: O Museu dos Grandes Deuses
  vnum: '01010545511'
- description: 'Este corredor empalidece com corredor principal, mas é belo de sua

    própria forma.  Homens carecas com roupões marrons podem ser vistos moendo e

    conversando silenciosamente uns entre os outros.  A norte está o caminho de

    volta para o próprio Templo, e a sul fica a entrada para o bar dos clérigos.'
  exits:
    north:
      target_vnum: 01010545508
    south:
      target_vnum: 01010545519
  local_id: '5512'
  name: A Entrada Para a Guilda dos Clérigos
  vnum: '01010545512'
- description: 'Você está antes do caminho de entrada para o Templo de Nova Thalos.  Dois

    grandes portões de ferro forjado ascendem abertos próximos a você.  Embora

    eles possam nem sempre serem usados pelos sacerdotes do Templo, estão

    prontos para defende-los, caso a cidade venha a estar novamente sob perigo.'
  exits:
    down:
      target_vnum: '01010545520'
    north:
      target_vnum: 01010545509
    south:
      target_vnum: '01010545520'
  local_id: '5513'
  name: Os Portões do Templo
  vnum: '01010545513'
- description: 'Você está em uma loja em que o chão está coberto por uma fumaça

    sutilmente rotativa.  Ahkeem parece ter um fascínio por coisas que não são

    desse mundo...  Pertences muito estranhos, de fato.'
  exits:
    south:
      target_vnum: '01010545414'
  local_id: '5514'
  name: Os Pertences de Ahkeem
  vnum: '01010545514'
- description: 'Este é um lugar ocupado.  Os clientes andam ao redor, enquanto barganham

    os preços da larga seleção de legumes.  Você ainda pode ouvir sua mãe

    dizendo: ''Coma suas verduras''.  Isso é provavelmente por que você está

    desperdiçando tempo na cidade de Nova Thalos e não com ela.

    Mas espere...  Vera parece com a sua mãe!'
  exits:
    south:
      target_vnum: '01010545416'
  local_id: '5515'
  name: As Verduras de Vera
  vnum: '01010545515'
- description: 'Quatro grandes estátuas de pedra habitam o museu.  Elas foram construídas

    pelo povo de Nova Thalos em ação de graça para os santos que eles acreditam

    terem salvado suas vidas.

    O museu continua para norte.'
  exits:
    north:
      target_vnum: '01010545511'
    west:
      target_vnum: '01010545463'
  local_id: '5516'
  name: O Museu dos Grandes Deuses
  vnum: '01010545516'
- description: 'Você entra em uma sala fria cuja única característica é uma velha

    escadaria de madeira espiralada que leva ao nível acima.  Você ouviu que

    acima daqueles degraus aguarda o velho mago capaz de ajudar você em seus

    estudos.'
  exits:
    east:
      target_vnum: 01010545518
    south:
      target_vnum: '01010545524'
    up:
      target_vnum: 01010545548
  local_id: '5517'
  name: A Base da Torre
  vnum: '01010545517'
- description: 'Você entra em um pátio ladrilhado com uma pequena fonte no meio.  Ao

    redor do pátio há quatro bancos de ferro trabalhado, com almofadas, onde os

    magos dessas terras sentam e trocam idéias.  Para oeste situa-se a torre das

    duas-histórias, onde o líder da Guilda dos magos executa seus experimentos.'
  exits:
    south:
      target_vnum: '01010545525'
    west:
      target_vnum: '01010545517'
  local_id: '5518'
  name: O Pátio dos Magos
  vnum: 01010545518
- description: 'Você se assusta pela generosidade deste lugar.  Do que você conhece
    dos

    clérigos, eles são supostamente pessoas humildes, dando todos os seus bens

    materiais por sua causa.  Talvez porque só os clérigos são permitidos a

    entrar neste bar, eles toleram isso da forma mais confortável possível.  No

    canto há uma escadaria que conduz abaixo, até a câmara de meditação.'
  exits:
    down:
      target_vnum: '01010545503'
    north:
      target_vnum: '01010545512'
  local_id: '5519'
  name: Néctar dos Deuses
  vnum: 01010545519
- description: 'Você está na reunião daqueles com sacras intenções.  Monges, bardos,

    paladinos e clérigos conversam, orando ou ouvindo as orações de seus

    companheiros.  Enormes degraus marmóreos conduzem até os portões do Templo e

    a Rua Principal fica para o sul.'
  exits:
    north:
      target_vnum: '01010545513'
    south:
      target_vnum: '01010545424'
    up:
      target_vnum: '01010545513'
  local_id: '5520'
  name: A Praça do Templo
  vnum: '01010545520'
- description: 'Você está em um grande edifício decorado com mármore negro e cetim

    vermelho.  Enormes pilares apoiam o alto teto curvado sobre sua cabeça.

    Enquanto mais você observa, mais você duvida da habilidade dos anões para os

    detalhes.  Fios prateados separam os blocos polidos que fazem o chão.'
  exits:
    east:
      target_vnum: '01010545414'
  local_id: '5521'
  name: O Banco
  vnum: '01010545521'
- description: 'Esta loja tem o aroma de frescas bestas massacradas.  Você se sente
    em

    casa.   Você vê uma organização satisfatória.  Os corpos...err...selecionados
    e

    pendurados em ganchos, sangram em panelas que escorrem direto para um único

    barril subterrâneo.   Para onde será que isso conduz...'
  exits:
    west:
      target_vnum: '01010545416'
  local_id: '5522'
  name: O Açougue
  vnum: '01010545522'
- description: 'A primeira coisa você nota conforme você entra nesta espaçosa loja,
    são

    as centenas de velas que revestem as estantes.  A névoa girando em torno de

    seus pés faz parecer que você entrou em um portal para outro plano.  Há uma

    mesa desorganizada próxima à parede oposta à entrada.'
  exits:
    south:
      target_vnum: 01010545429
  local_id: '5523'
  name: As Poções Da Bruxa
  vnum: '01010545523'
- description: 'Você entra em uma loja com estantes aglomeradas e pergaminhos amontoados.

    O dono parece trabalhar duro em sua mais recente criação mágica.

    Você vê uma pequena placa na parede.'
  exits:
    south:
      target_vnum: '01010545430'
  local_id: '5524'
  name: A Loja de Mágicas de Braheem
  vnum: '01010545524'
- description: 'O corredor de entrada é um pequeno quarto pobremente iluminado.

    Parece que seu único propósito é abrigar o poderoso feiticeiro

    que está vigiando a entrada.'
  exits:
    north:
      target_vnum: 01010545518
    south:
      target_vnum: '01010545431'
  local_id: '5525'
  name: A Entrada Para a Torre Dos Magos
  vnum: '01010545525'
- description: 'Esta pequena sala é somente um obstáculo para manter seres indesejados
    do

    lado de fora.'
  exits:
    north:
      target_vnum: '01010545423'
    south:
      target_vnum: '01010545533'
  local_id: '5526'
  name: A Entrada Para a Guilda dos Guerreiros
  vnum: '01010545526'
- description: "Uma das mais populares lojas em Nova Thalos, essa loja é sempre uma\n\
    colmeia de atividades.  Ã\x89 quase desumano o modo como um único homem pode\n\
    consertar todos os tipos de armaduras sem ajuda nenhuma.  Se você tem um\nitem\
    \ que precisa de reparos, simplesmente entregue para o homem atrás do\nbalcão.\n\
    Há uma pequena placa no balcão."
  exits:
    north:
      target_vnum: '01010545424'
  local_id: '5527'
  name: A Loja de Reparos
  vnum: '01010545527'
- description: 'A nova riqueza encontrada dessa bela cidade são os exóticos itens
    à venda

    aqui.  Você pensa no que será que irá acontecer se você digitar...  LIST...'
  exits:
    east:
      target_vnum: 01010545408
  local_id: '5528'
  name: O Armazém
  vnum: 01010545528
- description: 'O som de metal sendo martelado cresce conforme você entra na armaria.

    Garotos correm e carregam baldes de água e carvão por todos os lados.

    Alguns anões trabalham em setores da ferraria, atrás da loja, seus martelos

    trabalham rápida e continuamente.  As paredes são adornadas por todas as

    criações premiadas de Abdul.  Aqui comprar armaduras significa impedir

    monstros de te cortar em pequenos pedaços.   Uma nota na parede chama sua

    atenção.'
  exits:
    west:
      target_vnum: '01010545407'
  local_id: '5529'
  name: A Armoriaria de Abdul
  vnum: 01010545529
- description: 'Esta Guilda é reprovada pela maior parte da população de Nova Thalos,
    mas

    as leis de provisão e demanda são inquestionáveis.  Pessoas vêm aqui quando

    se sentem incapaz ou estão pouco dispostas lutar suas próprias batalhas.

    Por uma pequena taxa, você pode contratar um assassino.'
  exits:
    east:
      target_vnum: '01010545532'
    north:
      target_vnum: 01010545429
  local_id: '5530'
  name: A Guilda dos Mercenários
  vnum: '01010545530'
- description: Esse é o quarto de armazenamento para os mercenários a serem contratados.
  exits: {}
  local_id: '5531'
  name: A Guilda dos Mercenários
  vnum: '01010545531'
- description: 'Este pequeno e escuro quarto tem uma única tocha presa na parede como

    iluminação.  Há um pequeno banco de madeira e um livro sobre ele.  O

    assassino que vigia a entrada de ''estranhos'' aparece conforme você caminha.'
  exits:
    south:
      target_vnum: 01010545539
    west:
      target_vnum: '01010545530'
  local_id: '5532'
  name: A Entrada Para a Guilda dos Ladrões
  vnum: '01010545532'
- description: 'Grandes homens com enormes espadas bebem cerveja de canecas muito

    grandes.  Tudo nesta sala é GRANDE.  As largas mesas redondas estão

    desgastadas e possuem marcas das numerosas rixas de bar que ocorreram.  Pode

    ser uma boa idéia manter a boca fechada enquanto está por aqui.   Há uma saída

    a leste onde o mestre espadachim aguarda para treinar os alunos.'
  exits:
    east:
      target_vnum: '01010545534'
    north:
      target_vnum: '01010545526'
  local_id: '5533'
  name: O Afia Pedra
  vnum: '01010545533'
- description: 'Esta é um largo espaço gramado cheio de indivíduos, alguns esmurrando

    sacos e outros treinando com espadas.  A norte você vê um homem vestido em

    roupões pretos, ao contrário de seus camaradas, quem você assume ser seu

    mestre.'
  exits:
    east:
      target_vnum: '01010545473'
    west:
      target_vnum: '01010545533'
  local_id: '5534'
  name: Pátio de Prática e Torneio
  vnum: '01010545534'
- description: 'Um pequeno posto foi fixo aqui, mostrando a humilde seleção do lojista.

    Você nota que ele acrescentou alguns coisas à sua lista.'
  exits:
    north:
      target_vnum: 01010545408
  local_id: '5535'
  name: O Posto de Pão
  vnum: '01010545535'
- description: 'Você não consegue parar de tremer conforme observa a assustadora coleção

    de armas.  Enormes espadas e maldosos machados presos em estacas por toda a

    loja.  Um anão se senta em um banco no fundo da loja e martela sua mais nova

    criação.  Aqui você pode comprar raros e exóticos itens não encontrados em

    nenhuma outra parte do mundo.  Uma nota prende seu olhar.'
  exits:
    north:
      target_vnum: '01010545407'
  local_id: '5536'
  name: Instrumentos de Destruição de Igor
  vnum: '01010545536'
- description: 'Você está sobre um grosso tapete oriental cercado por todos os lados
    por

    prateleiras com numerosos bens de couro.  Há algumas mulheres sentadas em

    almofadas de couro trabalhando detalhes em jaquetas.'
  exits:
    east:
      target_vnum: '01010545466'
  local_id: '5537'
  name: A Velha Loja de Couro
  vnum: '01010545537'
- description: 'Você está dentro de uma hospedaria imunda, que aparentemente foi limpada

    a décadas.  Mesas de pôquer revestem as paredes e todos o encaram assim que

    você entra, você não sente muito bem vindo.  O bar possui inúmeros buracos

    de faca e o garçom parece esperar as suas ordens.'
  exits:
    west:
      target_vnum: '01010545467'
  local_id: '5538'
  name: Hospedaria do Contrabandista
  vnum: 01010545538
- description: 'Um sopro esfria seus ossos assim que você entra, entretanto você não
    vê

    nenhuma janela ou porta aberta.  Figuras cobertas espreitam nas sombras por

    todos os lados, e sussurram.  Um flash de aço o faz saber da quantidade de

    lâminas que há nessa multidão.  Assim que você rapidamente confere sua

    carteira, você nota uma pequena escadaria que conduz a baixo.'
  exits:
    down:
      target_vnum: '01010545546'
    north:
      target_vnum: '01010545532'
  local_id: '5539'
  name: O Unicórnio Imundo
  vnum: 01010545539
- description: 'Você está em uma grande sala usada para guardar mercadorias feitas
    na

    cidade antes de serem exportadas.  Todos os itens aqui são feitos em Nova

    Thalos e exportados para todas as partes do mundo.'
  exits:
    east:
      target_vnum: '01010545541'
    south:
      target_vnum: '01010545433'
  local_id: '5540'
  name: O Armazém
  vnum: '01010545540'
- description: 'Homens caminham e carregam engradados por todos os lados e escrevem
    seus

    achados.  Essa área do armazém é usada para armazenagem de materiais crus

    comprados em áreas fora da cidade.  Esses bens são, então, entregues para as

    várias associações.  A área de exportação do armazém fica a sul.'
  exits:
    south:
      target_vnum: '01010545434'
    west:
      target_vnum: '01010545540'
  local_id: '5541'
  name: O Armazém
  vnum: '01010545541'
- description: 'A madeira abaixo de seus pés range pelos anos banhadas em águas salgadas.

    Um velho homem com uma ondulada barba cinza está atrás do pequeno balcão

    esperando suas ordens.  Atrás dele há vários modelos de veleiros e enormes

    peixes.'
  exits:
    east:
      target_vnum: '01010545543'
    south:
      target_vnum: '01010545435'
  local_id: '5542'
  name: O Porto
  vnum: '01010545542'
- description: 'As paredes são cobertas com esboços de cascos.  Essa sala é usada
    pelo

    porto para as criações em esboços antes da construção em madeira.'
  exits:
    west:
      target_vnum: '01010545542'
  local_id: '5543'
  name: A Sala de Desenhos
  vnum: '01010545543'
- description: 'Como muitos armeiros, esse homem negocia na modelagem de metais.  Parece

    que a maioria de suas criações lidam com cavalos.  Nas paredes você vê

    muitas ferraduras feiras de ferro.  A sala é quente, tão quente quanto o

    deserto a sul daqui, e você se pergunta como alguém pode ficar aqui.'
  exits:
    south:
      target_vnum: '01010545437'
  local_id: '5544'
  name: A Forja
  vnum: '01010545544'
- description: 'Aqui não há nada que você não esperaria.  Várias baias seguram os

    Garanhões árabes escolhidos do Sultão, e cada uma possui seu próprio cocho

    para beber.  Um pequeno garoto vaga com uma pá para remover o subproduto

    ofensivo das bestas.'
  exits:
    east:
      target_vnum: 01010545549
    south:
      target_vnum: 01010545439
  local_id: '5545'
  name: Os Estábulos Reais
  vnum: '01010545545'
- description: 'Esse é um pátio oculto conhecido apenas por algumas pessoas em Nova

    Thalos.  Aqui você pode treinar as artes de roubar, arrombar fechaduras e se

    tornar quase invisível.  Uma pequena escadaria conduz abaixo, para o

    Unicórnio.'
  exits:
    south:
      target_vnum: 01010545489
    up:
      target_vnum: 01010545539
  local_id: '5546'
  name: O Pátio Secreto
  vnum: '01010545546'
- description: 'Esse é o lugar onde as pessoas da cidade amontoam seu lixo.  Devido
    aos

    constantes ventos vindos das montanhas, o cheiro é geralmente carregado para

    fora dos muros e para o deserto.'
  exits:
    south:
      target_vnum: '01010545442'
  local_id: '5547'
  name: O Depósito de Lixo
  vnum: '01010545547'
- description: 'Você está no topo de uma velha torre de rochas.  Ao longo das paredes

    centenas de poções, pergaminhos, e varinhas repousam em pura desordem.  Você

    vê um homem sentado, curvado sobre uma pequena mesa de madeira com duas

    provetas de líquidos borbulhantes à sua frente.  Ele olha para você assim

    que você entra e sorri amplamente.'
  exits:
    down:
      target_vnum: '01010545517'
  local_id: '5548'
  name: O Laborátório dos Magos
  vnum: 01010545548
- description: 'Não tão grande quanto os que você viu nas fazendas no campo, esse
    sótão

    de feno serve como área de armazenamento para os cavalos no estábulo.  O

    jovem garoto que você viu com a pá parece ter feito residência por aqui.'
  exits:
    west:
      target_vnum: '01010545545'
  local_id: '5549'
  name: O Sótão de Feno
  vnum: 01010545549
- description: 'Em nenhuma parte você viu uma demonstração tão obscena de riquezas
    como

    nesse corredor.  O Carpete felpudo sob seus pés faz você pensar que está

    andando em uma nuvem.  Candelabros de platina pendurados delicadamente do

    teto iluminam as tapeçarias que adornam as paredes.  A caimbra no seu pescoço

    diz a você que é hora de parar de olhar.  Para oeste ficam os numerosos

    corredores do palácio e o portão situa-se a leste.'
  exits:
    east:
      target_vnum: 01010545558
    north:
      target_vnum: '01010545560'
    south:
      target_vnum: '01010545557'
    west:
      target_vnum: '01010545605'
  local_id: '5550'
  name: A Grande Entrada
  vnum: '01010545550'
- description: 'Essas construções abrange uma vasta coleção de livros e documentos
    que

    foram comprados aqui pelo comitê responsável em recuperar o conhecimento

    perdido de Thalos.  Filas de estantes com livros em todas as condições

    preenchem as paredes.  O ar tem o aroma de pergaminho velho e cola.'
  exits:
    east:
      target_vnum: '01010545455'
  local_id: '5551'
  name: A Biblioteca
  vnum: '01010545551'
- description: 'Você vê que perdeu uma enorme festa.  Os zeladores estão aqui limpando
    os

    confetes e pedaços de comida.  Centenas de canecas de cerveja vazias nas

    mesas que rodeiam a pista de danças sugerem que os cidadãos adoram sua

    bebida.   Há ainda uma grande faixa na parede.'
  exits:
    east:
      target_vnum: '01010545456'
  local_id: '5552'
  name: O Salão de Danças
  vnum: '01010545552'
- description: 'Você está na cadeia.  Por alguma razão, alguém sente que você se

    comportou muito mal e que deve ser colocado a salvo por um tempo.'
  exits:
    north:
      target_vnum: '01010545444'
  local_id: '5553'
  name: A Prisão
  vnum: '01010545553'
- description: 'Você está dentro da cabeça administrativa da cidade.  Aqui as decisões

    relacionadas à política da cidade são feitas.  Embora a palavra do Sultão

    seja lei, ele normalmente gasta seu tempo em negócios fora da cidade.'
  exits:
    north:
      target_vnum: '01010545445'
  local_id: '5554'
  name: A Prefeitura
  vnum: '01010545554'
- description: 'As paredes nessa sala são cobertas com cavilhas que seguram vários
    tipo

    de arcos.  Há poucas pessoas trabalhando aqui, levando em consideração que

    habilidades vêem raramente de uma população geral.  Alguns garotos estão

    ocupados no canto preparando penas para os finos cabos que serão usados para

    fazer flechas.  Alguns artesãos elfos estão cuidadosamente inspecionando

    cada arco conforme são terminados.'
  exits:
    east:
      target_vnum: '01010545460'
  local_id: '5555'
  name: A Guilda dos Caçadores e Arqueiros
  vnum: '01010545555'
- description: 'Não há dúvida que os Anões aqui sabem o que estão fazendo.  Eles foram

    inestimáveis na construção dessa bela cidade.  Aqui eles são a mão-de-obra,

    fazendo o que eles fazem melhor.  Os martelos voam conforme esses talentosos

    artesãos transformam a rocha em blocos ornamentados, pilares, decorações e

    muitas outras coisas.'
  exits:
    west:
      target_vnum: '01010545460'
  local_id: '5556'
  name: A Guilda dos Pedreiros
  vnum: '01010545556'
- description: 'Você está dentro da parte sul dos dois postos principais de guarda.  O

    interior de pedra possui um ar espartano, só o necessário.  Umas poucas

    armas estão colocadas nas paredes em caso de serem necessárias.'
  exits:
    north:
      target_vnum: '01010545550'
  local_id: '5557'
  name: A Sala de Guarda
  vnum: '01010545557'
- description: 'Você está um pouco antes dos magníficos portões feitos em ouro sólido.

    Você se assombra com o esplendor das torres espiraladas além do portão.  A

    regra de todas as terras do leste reside neste fino palácio, e ele não é nem

    um pouco pobre.  A grande entrada fica além do portão, e o Passeio do Sultão

    fica para leste.'
  exits:
    east:
      target_vnum: '01010545420'
    west:
      target_vnum: '01010545550'
  local_id: '5558'
  name: Os Portões do Palácio
  vnum: 01010545558
- description: 'Você está em uma das quatro torres que guardam a cidade.  A vista
    daqui é

    maravilhosa!  Para oeste você vê as altas montanhas que dividem Nova Thalos

    de Midgaard.  O Rio Ishtar fui lentamente daquela direção.'
  exits:
    down:
      target_vnum: '01010545444'
  local_id: '5559'
  name: A Torre Noroeste
  vnum: 01010545559
- description: 'Você está na parte norte dos dois postos de guarda.  Fortes guardas
    estão

    sentados aqui, jogando cartas.  O Interior rochoso é limpo mas as paredes

    são rodeadas de armas e armaduras.   A única saída é a sul.'
  exits:
    south:
      target_vnum: '01010545550'
  local_id: '5560'
  name: A Sala da Guarda
  vnum: '01010545560'
- description: 'Seus passos ecoam o ladrilho da cozinha.  Na parede sul você vê o
    enorme

    fogão e uma enorme panela de cobre com água fervente.  O Chefe da cozinha

    está ocupado cortando vagem e outros vegetais na mesa de madeira para a

    janta.  Criados correm com utensílios para preparar lebres frescas.   Uma

    pequena porta conduz ao corredor a norte e a entrada para o saguão de jantar é

    para oeste.'
  exits:
    north:
      target_vnum: '01010545563'
    west:
      target_vnum: '01010545571'
  local_id: '5561'
  name: A Cozinha
  vnum: '01010545561'
- description: 'Você está em uma das quatro torres que guardam a cidade.  Para norte
    você

    vê as amplas plantações e então o forte.  A sul daqui você vê a cidade e

    além o Grande Deserto Oriental.'
  exits:
    down:
      target_vnum: '01010545454'
  local_id: '5562'
  name: A Torre Nordeste
  vnum: '01010545562'
- description: 'Você está no fim leste do corredor do sul.  Uma pequena entrada de

    criados dá acesso à cozinha e o corredor continua a oeste.'
  exits:
    south:
      target_vnum: '01010545561'
    west:
      target_vnum: '01010545572'
  local_id: '5563'
  name: Um Corredor
  vnum: '01010545563'
- description: 'A primeira coisa que você nota assim que entra nesse lugar estranho
    é o

    cheiro de bens de couro tostados.  A próxima coisa que chama sua atenção são

    as várias cores que essas pessoas transformarão as belas peles.  As pessoas

    estão transformando o couro e cortando nas formas que necessitam.

    Você nota uma pequena mensagem na parede.'
  exits:
    east:
      target_vnum: '01010545462'
  local_id: '5564'
  name: A Guilda dos Curtidores
  vnum: '01010545564'
- description: 'Você está no final leste do corredor norte.  A única saída é oeste
    exceto

    pela simples porta de madeira a norte.   Há uma placa dourada sobre a porta.'
  exits:
    north:
      target_vnum: '01010545566'
    west:
      target_vnum: '01010545574'
  local_id: '5565'
  name: Um Corredor
  vnum: '01010545565'
- description: 'Assim que você pisa nessa sala você sente que deixa o plano material.

    As paredes aqui são decoradas com lindos, azuleijos multi-coloridos.

    Há uma presença silenciosa no ar.  Você sente a presença do Todo-Poderoso.'
  exits:
    south:
      target_vnum: '01010545565'
  local_id: '5566'
  name: O Santuário de Alá
  vnum: '01010545566'
- description: 'Você está do lado de fora do portão de Nova Thalos.  A cidade fica
    a sul,

    e uma selva fica a norte.'
  exits:
    north:
      target_vnum: 01010545681
    south:
      target_vnum: '01010545422'
  local_id: '5567'
  name: Do Lado De Fora Do Portão Norte de Nova Thalos
  vnum: '01010545567'
- description: 'Você está do lado de fora dos muros protetores da cidade.  O maciço

    portão fica a oeste daqui, e o desconhecido te aguarda a leste.'
  exits:
    east:
      target_vnum: 01010545690
    south:
      target_vnum: '01010545570'
    west:
      target_vnum: '01010545431'
  local_id: '5568'
  name: Do Lado de Fora do Portão Leste de Nova Thalos
  vnum: 01010545568
- description: 'Você está do lado de fora dos muros da cidade, o portão de ferro fica
    a

    leste.  A cidade fica nesta direção e a estrada para Midgaard fica a oeste.'
  exits:
    east:
      target_vnum: '01010545423'
    west:
      target_vnum: 01010545618
  local_id: '5569'
  name: Do Lado de Fora do Portão Oeste de Nova Thalos
  vnum: 01010545569
- description: 'Você está em um pequeno caminho do lado de fora do muro leste da cidade.

    O chão parece bem pisado, e você não pode ver nenhuma saída aparente além da

    que há a norte.'
  exits:
    north:
      target_vnum: 01010545568
  local_id: '5570'
  name: Do Lado de Fora do Muro
  vnum: '01010545570'
- description: 'Uma grande mesa de carvalho, coberta por talheres de prata, pratos,
    uma

    toalha de mesa ornamentada com ouro, dominam o saguão.  Embora não haja

    ninguém ainda, os criados correm por todos os lados, arrumando a mesa e

    preenchendo-a com temperos.   A entrada da cozinha fica para leste, e duas

    grandes portas duplas conduzem ao corredor a norte.'
  exits:
    east:
      target_vnum: '01010545561'
    north:
      target_vnum: '01010545572'
  local_id: '5571'
  name: O Grande Saguão de Jantar
  vnum: '01010545571'
- description: 'Você está em um cruzamento de longos corredores.  Há duas largas portas

    duplas a sul.'
  exits:
    east:
      target_vnum: '01010545563'
    north:
      target_vnum: '01010545573'
    south:
      target_vnum: '01010545571'
    west:
      target_vnum: '01010545577'
  local_id: '5572'
  name: Um Corredor
  vnum: '01010545572'
- description: 'Você está em uma interseção dos corredores.  Corredores de madeira

    conduzem para todas as direções, exceto para oeste, o jardim do palácio pode

    ser ali.'
  exits:
    east:
      target_vnum: '01010545605'
    north:
      target_vnum: '01010545574'
    south:
      target_vnum: '01010545572'
    west:
      target_vnum: 01010545578
  local_id: '5573'
  name: Um Corredor
  vnum: '01010545573'
- description: 'Você chegou a um cruzamento T dos corredores.  Os corredores de madeira

    continuam a leste, oeste e sul.  Há uma pesada porta de ferro a norte.'
  exits:
    east:
      target_vnum: '01010545565'
    north:
      target_vnum: '01010545575'
    south:
      target_vnum: '01010545573'
    west:
      target_vnum: 01010545579
  local_id: '5574'
  name: Um Corredor
  vnum: '01010545574'
- description: 'Você entrou em uma sala úmida com paredes de rochas asperamente cortadas.

    Essa sala parece realmente fora de lugar, comparada a todo o esplendor do

    resto do palácio.   Uma grande grade de aço conduz a escuridão, e uma porta de

    ferro leva de volta para o corredor.'
  exits:
    down:
      target_vnum: 01010545591
    south:
      target_vnum: '01010545574'
  local_id: '5575'
  name: A Entrada para o Calabouço
  vnum: '01010545575'
- description: 'Esse é um quarto simples usado por visitantes convidados.  Um pequeno

    guarda roupa repousa próximo a parece leste com um espelho preso sobre ele.

    Uma grande cama com lençóis de cetim foi colocada no meio do quarto, contra

    a parede sul, abaixo de uma janela.  A única saída óbvia é de volta a norte,

    para o corredor.'
  exits:
    north:
      target_vnum: '01010545577'
  local_id: '5576'
  name: O Quarto dos Convidados
  vnum: '01010545576'
- description: 'O longo corredor continua aqui com uma porta de madeira na parede
    sul.

    Na parede norte está a foto de alguns nobres esquecidos que já governaram

    essas terras.'
  exits:
    east:
      target_vnum: '01010545572'
    south:
      target_vnum: '01010545576'
    west:
      target_vnum: 01010545582
  local_id: '5577'
  name: Um Corredor
  vnum: '01010545577'
- description: 'Você entrou nos jardins privados do Sultão.  Uma doce gota de orvalho

    atinge sua face, devido a umidade daqui.  Ao redor você vê milhares de

    plantas exóticas e flores.  O doce cheiro de jasmim e mel lembram seus

    felizes dias em casa.  Ao norte, através de várias árvores, você vê um

    delicado gazebo.   Um caminho conduz de volta ao corredor e a oeste está o

    gazebo.  A sua direita está uma placa dourada.'
  exits:
    east:
      target_vnum: '01010545573'
    west:
      target_vnum: 01010545583
  local_id: '5578'
  name: O Jardim do Sultão
  vnum: 01010545578
- description: 'A longa extensão do corredor continua a leste e oeste daqui.  O pequeno

    carpete vermelho que cobre a linha central está sempre abaixo de seus pés e

    um ocasional banco ou vaso de planta delineia as paredes.   Há uma porta para

    norte com uma placa nela.'
  exits:
    east:
      target_vnum: '01010545574'
    north:
      target_vnum: 01010545580
    west:
      target_vnum: 01010545584
  local_id: '5579'
  name: Um Corredor
  vnum: 01010545579
- description: 'Você está no tributo às virtudes do Sultão.  Grandes pinturas pendem
    de

    todas as paredes mostrando cenas da natureza, nudez, e gloriosas batalhas.

    Estranhas esculturas repousam em pedestais em cada canto da sala e espelhos

    estão colocados em locais estratégicos para que o observador possa ver uma

    escultura por inteiro logo a primeira vista.  Seus olhos, porém, são

    atraídos para uma pintura que domina a parede distante.'
  exits:
    south:
      target_vnum: 01010545579
  local_id: '5580'
  name: A Exposição de Arte
  vnum: 01010545580
- description: 'Esse é outro quarto para convidados.  Há um guarda-roupas contra a
    parede

    leste com um espelho e uma enorme cama com lençóis de cetim, contra a parede

    sul.'
  exits:
    north:
      target_vnum: 01010545582
  local_id: '5581'
  name: Um Quarto de Hospedes
  vnum: 01010545581
- description: 'Você alcançou o fim oeste do corredor sul.  A única saída fica a leste,

    exceto pelas portas nas paredes sul e oeste.'
  exits:
    east:
      target_vnum: '01010545577'
    south:
      target_vnum: 01010545581
    west:
      target_vnum: 01010545587
  local_id: '5582'
  name: Um Corredor
  vnum: 01010545582
- description: 'Caminhando através dos jardins você chega a uma pequena estrutura
    branca.

    O canto dos pássaros, o perfume das flores, ahhh...  Paraíso.    Você acredita

    que nunca esteve em um lugar mais calmo..'
  exits:
    east:
      target_vnum: 01010545578
  local_id: '5583'
  name: O Jardim Gazebo
  vnum: 01010545583
- description: 'Esse é o final oeste do corredor norte.  Duas portas foram colocadas
    nas

    paredes aqui, uma a norte, outra a oeste.'
  exits:
    east:
      target_vnum: 01010545579
    north:
      target_vnum: 01010545585
    west:
      target_vnum: 01010545589
  local_id: '5584'
  name: Um Corredor
  vnum: 01010545584
- description: 'Você está em uma câmara estéril enfileirada com nada menos que camas.  Os

    guardas vêm aqui para dormir, para que eles possam deixar o chão do palácio

    com permissão especial.    A única saída fica para sul.'
  exits:
    south:
      target_vnum: 01010545584
  local_id: '5585'
  name: A Sala da Guarda
  vnum: 01010545585
- description: 'Esse é um dos quartos de hospedagem para os guardas do palácio.  Estéril,

    comparado ao resto do palácio, você vê apenas camas aqui.  Nas paredes você

    vê fotos de cavaleiros conhecidos que honraram a Guarda do Sultão.'
  exits:
    north:
      target_vnum: 01010545587
  local_id: '5586'
  name: A Sala da Guarda
  vnum: 01010545586
- description: 'Essa é a sala onde o Sultão mantém as belas mulheres de seu palácio.  Há

    dez garotas aqui, vestidas apenas com seda, você quase pode ver através..

    Na parece oeste está um grande amontoado de travesseiros e uma jovem donzela

    sentada sobre eles.   Infelizmente para você apenas o Sultão é permitido entrar

    aqui.'
  exits:
    east:
      target_vnum: 01010545582
    north:
      target_vnum: 01010545588
    south:
