- description: 'Você está em uma grande taverna de decoração clara.  Tudo aqui dentro
    é

    suave e elegante, parecendo evocar as etéreas visões dos bons sonhos.

    Música é o que não falta, havendo no lugar uma atmosfera própria de sons e

    ruídos agradáveis.  O cheiro de comida se mistura ao das flores nos vasos, e

    as cores se refletem em espelhos e molduras de quadros.  Você fica

    maravilhado com as belas vozes que conversam animadamente aqui enquanto

    hábeis mãos fazem poesia com as notas musicais.'
