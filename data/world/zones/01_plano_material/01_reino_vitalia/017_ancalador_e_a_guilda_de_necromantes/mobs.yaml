- description: |-
    Parecendo ser um louco delirante,  o eremita vive em seu isolamento e não
    fala com ninguém a anos. O despenteado eremita puxa você para perto e
    começa a contar um estranho conto:

    "Há 600 anos atrás,  quando eu era apenas um rapaz,  um grande
    dragão dominava a região.  Seu nome era Ancalador.  Muitos heróis
    batalharam com ele,  mas todos falharam e morreram,  horrivelmente,
    eu presumo.  Mas um feiticeiro o desafiou a um duelo mágico.
    Ele também morreu,  como os outros,  mas em seu último suspiro
    o feiticeiro transformou o poderoso Ancalador em pedra!
    Muitos acreditavam que o reinado do dragão tinha acabado,  mas
    depois que as comemorações terminaram,  e a vida retornou ao seu
    ritmo tranquilo,  as pessoas começaram a reparar que a presença do
    dragão ainda podia ser sentida.  Ancalador continuava,  de fato,
    a manipular as mentes dos homens de dentro de sua prisão petrificada.
    Muitos acreditam que ele está planejando o dia em que ele poderá
    retornar ao seu corpo."

    O Eremita começa a tagarelar loucamente, quando lágrimas escorrem por sua
    dura face.
    Você não pode conseguir mais nada com ele.
  keywords:
  - eremita
  name: o eremita
  vnum: '1707'
