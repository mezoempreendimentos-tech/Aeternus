- description: 'Você move-se vagarosamente através das verdes videiras e da espessa
    grama

    Que cobre o chão do vale.  Parece que este lugar não tem recebido pessoas

    há décadas.  A sul, a terra eleva-se até um paredão coberto de vegetação,

    onde apenas um buraco se destaca.  A leste a vegetação abre-se para um

    caminho que leva a uma estranha encosta de pedra.'
  exits:
    east:
      target_vnum: '01010171701'
    south:
      target_vnum: 01010171758
  local_id: '1700'
  name: Um Vale Selvagem
  vnum: '01010171700'
- description: 'Você para diante da forma petrificada do Dragão Ancalador.  Você ainda

    pode perceber seu ódio da terra, que um dia foi sua.  Uma vaga sensação de

    maldade emana do ser petrificado, que um dia aterrorizou nações.'
  exits:
    east:
      target_vnum: '01010171702'
    west:
      target_vnum: '01010171700'
  local_id: '1701'
  name: Diante do Dragão
  vnum: '01010171701'
- description: 'Fileiras de dentes de pedra tão grandes que formam muros estão aqui.  Uma

    língua marcada com pedras está a leste,  atrás molares de pedra tão

    grandes quanto escudos de ferro.'
  exits:
    east:
      target_vnum: '01010171703'
    west:
      target_vnum: '01010171701'
  local_id: '1702'
  name: Na Boca do Dragão
  vnum: '01010171702'
- description: 'Você está atrás da boca do dragão.  A garganta continua para baixo
    e

    algo transpira do peito petrificado.'
  exits:
    down:
      target_vnum: '01010171704'
    west:
      target_vnum: '01010171702'
  local_id: '1703'
  name: Pelas Amígdalas de Pedra
  vnum: '01010171703'
- description: 'O chão é irregular -- o meio da passagem é mais baixo que os lados,
    que

    crescem como muros.  A passagem como um todo é ligeiramente inclinada,

    levando para o leste e para baixo.'
  exits:
    down:
      target_vnum: '01010171705'
    up:
      target_vnum: '01010171703'
  local_id: '1704'
  name: Uma Garganta de Pedra
  vnum: '01010171704'
- description: 'O túnel começa a perder sua inclinação, seguinto simplesmente na direção

    leste.  As formas do que pode ser músculos petrificados cobrem as paredes.'
  exits:
    east:
      target_vnum: '01010171706'
    up:
      target_vnum: '01010171704'
  local_id: '1705'
  name: Ainda Mais nas Profundezas da Garganta
  vnum: '01010171705'
- description: 'Você está numa junção de quatro caminhos.  A garganta do dragão continua

    a leste e oeste, mas na espremedura abaixo há  um lábio petrificado, você

    pode perceber túneis ao norte e ao sul.'
  exits:
    east:
      target_vnum: '01010171755'
    north:
      target_vnum: '01010171707'
    south:
      target_vnum: '01010171710'
    west:
      target_vnum: '01010171705'
  local_id: '1706'
  name: Uma Junção
  vnum: '01010171706'
- description: 'Essa passagem circular de pedra encurva-se gradualmente para cima,
    é um

    lugar muito iluminado e quente.'
  exits:
    south:
      target_vnum: '01010171706'
    up:
      target_vnum: 01010171708
  local_id: '1707'
  name: Um Túnel de Pedra
  vnum: '01010171707'
- description: Chamas antigas queimam aqui, esperando o renascimento de seu mestre.
  exits:
    down:
      target_vnum: '01010171707'
  local_id: '1708'
  name: Um Pulmão do Dragão
  vnum: 01010171708
- description: 'Palvras mágicas, que brilham com uma luz azul, estão cravadas nas
    paredes

    de pedra da câmara do coração de Ancalador.  A pureza da mágica contém

    o mal e forma uma sagrada balança de Neutralidade.  Parece que uma música

    amorosa está tocando aqui.'
  exits:
    north:
      target_vnum: '01010171755'
  local_id: '1709'
  name: O Coração do Dragão
  vnum: 01010171709
- description: 'Essa passagem de pedra é iluminada por uma grande luz e um calor violento

    parece vir do final da passagem.'
  exits:
    north:
      target_vnum: '01010171706'
    up:
      target_vnum: '01010171711'
  local_id: '1710'
  name: Um Túnel de Pedra
  vnum: '01010171710'
- description: 'Os fogos nucleares que energizavam o dragão com sua apavorante respiração

    estão aqui, e eles estão latentes a muito tempo, eles queimam você

    lentamente e fazem você arrepender-se de estar usando uma armadura de metal.'
  exits:
    down:
      target_vnum: '01010171710'
  local_id: '1711'
  name: Um Pulmão do Dragão
  vnum: '01010171711'
- description: 'A garganta de Ancalador acaba, revelando uma enorme caverna iluminada
    por

    assustadoras e difusas luzes verdes e amarelas.  Nada mais maravilhoso!  Uma

    ponte de madeira transpõe a caverna coberta por estalactites.  Um degrau

    abaixo leva, com segurança, ao chão da caverna, e a ponte segue a leste.'
  exits:
    down:
      target_vnum: '01010171720'
    east:
      target_vnum: '01010171713'
    west:
      target_vnum: '01010171755'
  local_id: '1712'
  name: Estômago de Ancalador
  vnum: '01010171712'
- description: 'Você não pode imaginar quem construiria uma ponte nesta fantástica

    caverna.  Grandes estalagmites crescem enquanto as assustadoras luzes

    parecem mover-se na névoa ao longe.  A ponte continua para o leste.'
  exits:
    down:
      target_vnum: '01010171716'
    east:
      target_vnum: '01010171714'
    west:
      target_vnum: '01010171712'
  local_id: '1713'
  name: Uma Ponte de Madeira
  vnum: '01010171713'
- description: 'Você está no meio da ponte de madeira.  Grandes estalagmites crescem
    ao

    seu redor e as luzes assustadoras continuam a dançar na névoa ao longe.

    A ponte continua para o leste e para o oeste.'
  exits:
    down:
      target_vnum: '01010171716'
    east:
      target_vnum: '01010171715'
    west:
      target_vnum: '01010171713'
  local_id: '1714'
  name: Uma Ponte de Madeira
  vnum: '01010171714'
- description: 'A floresta aqui é velha, semelhante ao resto da ponte. As mortais

    estalagmites continuam ao longe e mais luzes verdes e amarelas podem ser

    vistas na névoa ao longe.  A ponte acaba num pequeno planalto a leste.'
  exits:
    down:
      target_vnum: '01010171716'
    east:
      target_vnum: '01010171726'
    west:
      target_vnum: '01010171714'
  local_id: '1715'
  name: Uma Ponte de Madeira
  vnum: '01010171715'
- description: 'Você mergulha na ponte de madeira e encontra-se grudado entre várias

    estalagmites.  Mover-se machuca muito, e você não consegue lembrar-se de

    nenhuma mágica para escapar dessa situação.'
  exits: {}
  local_id: '1716'
  name: Uma Floresta de Estalagmite
  vnum: '01010171716'
- description: 'Estalagmites afiadas encontram-se aqui, criadas por pingos de mineral

    que caem das estalactites acima.  Poças de ácido preenchem cada fenda do

    duro chão da caverna.  A caverna continua para o sul e leste.'
  exits:
    east:
      target_vnum: 01010171718
    south:
      target_vnum: '01010171720'
  local_id: '1717'
  name: "A Floresta Ã\x81cida"
  vnum: '01010171717'
- description: 'As Estalagmites daqui são grandes e de tom arco-íris.  Poças de ácido

    gástrico estão espalhadas pelo chão.  A caverna expande-se em todas as

    direções exceto ao norte.'
  exits:
    east:
      target_vnum: 01010171719
    south:
      target_vnum: '01010171721'
    west:
      target_vnum: '01010171717'
  local_id: '1718'
  name: "A Floresta Ã\x81cida"
  vnum: 01010171718
- description: 'Afiadas estalagmites crescem, criadas por pingos de mineral que caem
    das

    estalactites acima.  Poças de ácido preenchem cada fenda do duro chão da

    caverna.'
  exits:
    south:
      target_vnum: '01010171722'
    west:
      target_vnum: 01010171718
  local_id: '1719'
  name: "A Floresta Ã\x81cida"
  vnum: 01010171719
- description: 'Você para em frente a uma maravilhosa visão.  Escondido entre a névoa
    no

    chão da caverna está uma floresta, de forma diferente, estalagmites afiadas

    rodeadas por poças de algo que deve ser os restos de ácido gástrico do

    dragão.'
  exits:
    east:
      target_vnum: '01010171721'
    north:
      target_vnum: '01010171717'
    south:
      target_vnum: '01010171723'
    up:
      target_vnum: '01010171712'
  local_id: '1720'
  name: "A Floresta Ã\x81cida"
  vnum: '01010171720'
- description: 'Você está no centro da caverna do estômago do dragão.  Uma ponte de

    madeira aparece ao longe.  Afiadas estalagmites equilibram-se aqui

    encontrando cada pingo que é lançado sobre elas.'
  exits:
    east:
      target_vnum: '01010171722'
    north:
      target_vnum: 01010171718
    south:
      target_vnum: '01010171724'
    west:
      target_vnum: '01010171720'
  local_id: '1721'
  name: "A Floresta Ã\x81cida"
  vnum: '01010171721'
- description: 'As estalagmites aqui são grandes e têm um tom de arco-íris.  Poças
    de

    ácido gástrico estão espalhadas pelo chão.  Um degrau leva a um grande

    planalto no fim da caverna.'
  exits:
    north:
      target_vnum: 01010171719
    south:
      target_vnum: '01010171725'
    west:
      target_vnum: '01010171721'
  local_id: '1722'
  name: "A Floresta Ã\x81cida"
  vnum: '01010171722'
- description: 'Névoa gira ao redor de um estranho ovo de casca de cristal.  A caverna

    continua para o norte e para o leste.'
  exits:
    east:
      target_vnum: '01010171724'
    north:
      target_vnum: '01010171720'
