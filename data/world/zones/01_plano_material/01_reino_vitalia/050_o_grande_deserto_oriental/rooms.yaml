- description: 'Este pequeno grupo de nômades do deserto, parou durante o dia para

    descansar e se refrescar neste oásis maravilhoso.  Três tendas e

    alguns camelos fazem parte do cenário.  De dentro de duas das tendas,

    você ouve vozes abafadas, obviamente surpresas com a sua visita.'
  exits:
    east:
      target_vnum: '01010505057'
    north:
      target_vnum: 01010505058
    south:
      target_vnum: '01010505030'
    west:
      target_vnum: '01010505025'
  local_id: '5056'
  name: Um Acampamento de Nômades
  vnum: '01010505056'
- description: 'Esta é uma pequena e simples tenda, em cujo interior poucas posses

    foram guardadas. Homens e mulheres jazem deitados por todos os lados,

    possivelmente são os escravos do líder deste bando.'
  exits:
    west:
      target_vnum: '01010505056'
  local_id: '5057'
  name: Dentro de Uma Pequena Tenda
  vnum: '01010505057'
- description: 'Aqui estão aproximadamente dez camelos, todos amarrados a algumas

    estacas cravadas no chão. Ao leste você vê uma pequena tenda e ao norte

    você vê uma tenda bem maior e muito mais luxuosa.'
  exits:
    east:
      target_vnum: 01010505059
    north:
      target_vnum: '01010505060'
    south:
      target_vnum: '01010505056'
    west:
      target_vnum: '01010505024'
  local_id: '5058'
  name: Ao lado dos Camelos
  vnum: 01010505058
- description: 'Esta tenda possui pouco mobiliário mas guarda, principalmente, os
    que

    são os protetores do bando. Quando você entra, sente que todos lhe fixam

    friamente.'
  exits:
    west:
      target_vnum: 01010505058
  local_id: '5059'
  name: A Tenda dos Guerreiros
  vnum: 01010505059
- description: 'Esta tenda é tão bem decorada em seu interior quanto no seu exterior.

    Um tapete foi cuidadosamente estendido sobre a areia e numerosas cestas

    enfileiram-se nas paredes.'
  exits:
    east:
      target_vnum: '01010505061'
    south:
      target_vnum: 01010505058
  local_id: '5060'
  name: A Tenda Principal
  vnum: '01010505060'
- description: 'Este é o local onde o líder deste grupo de nômades reside. Você

    examina cuidadosamente as belas tapeçarias, cestas e alguns pinturas

    que ali estão enfeitando o ambiente e conclui que, definitvamente,

    o dono desta tenda é muito rico.'
  exits:
    west:
      target_vnum: '01010505060'
  local_id: '5061'
  name: A Tenda Principal
  vnum: '01010505061'
- description: 'Você cuidadosamente começa a caminhar para o outro lado da ponte mas,

    de repente, a corda se rompe e você cai.......

    ...e cai

    ...e cai

    ...e cai

    ...e você encontra a morte nas pedras abaixo.'
  exits: {}
  local_id: '5062'
  name: A Ponte de Corda Esgarçada
  vnum: '01010505062'
- description: 'Sendo muito cuidadoso para não perder o equilíbrio, você dá uma olhada

    e acha que este canion deve ter mais ou menos 1/2 quilômetro de

    profundidade. Para o oeste há uma caverna escura que segue por debaixo

    das areias do deserto e sobre a sua cabeça há uma ponte de corda.'
  exits:
    up:
      target_vnum: '01010505052'
    west:
      target_vnum: '01010505064'
  local_id: '5063'
  name: A Borda de Vento
  vnum: '01010505063'
- description: 'O ar daqui é MUITO mais fresco que o de fora. Vindos do oeste, você

    ouve sons estranhos, mas não consegue ver nada.  A caverna se aprofunda

    na escuridão.'
  exits:
    east:
      target_vnum: '01010505063'
    west:
      target_vnum: '01010505065'
  local_id: '5064'
  name: A Entrada da Caverna
  vnum: '01010505064'
- description: 'Você acabou de tropeçar na casa de alguém.  Pelos tesouros largados

    displicentemente e as inúmeras carcaças apodrecendo, você diria que esta

    é a toca de um dragão. Dizer que tipo de dragão é este, você não poderia

    dizer com certeza. A caverna estreita fora em um túnel para o oeste.'
  exits:
    east:
      target_vnum: '01010505064'
    west:
      target_vnum: '01010505066'
  local_id: '5065'
  name: Uma Toca Misteriosa
  vnum: '01010505065'
- description: 'Este túnel parece entrar infinitamente atraves da escuridão. Você

    cuidadosamente vai apalpando as paredes para sentir por onde anda.'
  exits:
    east:
      target_vnum: '01010505065'
    west:
      target_vnum: '01010505067'
  local_id: '5066'
  name: Um Túnel Largo
  vnum: '01010505066'
- description: 'O túnel vai ficando muito estreito e você tem que se espremer para

    conseguir passar. O chão parece que se nivelou um pouco.'
  exits:
    east:
      target_vnum: '01010505066'
    south:
      target_vnum: 01010505068
  local_id: '5067'
  name: Um Túnel Mais Estreito
  vnum: '01010505067'
- description: 'Esta é a parte do túnel onde fica mais difícil de se mover, porque
    as

    paredes parecem que estão vindo ao seu encontro.'
  exits:
    north:
      target_vnum: '01010505067'
    west:
      target_vnum: 01010505069
