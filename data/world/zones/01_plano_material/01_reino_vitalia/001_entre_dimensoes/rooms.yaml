- description: "Você se encontra numa enorme redoma de cristal.  Uma leve névoa azulada\n\
    paira no ar e há um suave aroma de flores campestres.  Ao olhar para os\nlados\
    \ você encontra apenas seu reflexo no mais puro cristal já encontrado.\nEsta sala\
    \ o faz sentir calmo e relaxado, pronto para expandir seus\nconhecimentos sobre\
    \ nosso belíssimo Mundo de Vitália.  O único objeto que\nvocê observa é um pedestal\
    \ com um livro apoiado sobre ele.  Este é o Livro\nSagrado de Vitália.  Em sua\
    \ capa está contida a palavra @YPOLICY@n grafada em\nouro.  Ã\x80 sua frente você\
    \ percebe uma parte da névoa com um tom de azul mais\nforte - uma força mágica\
    \ e acolhedora pronta para lhe ensinar o caminho da\nsabedoria."
  exits: {}
  local_id: '186'
  name: A Sala da Sabedoria
  vnum: 01010010186
