- description: "O portão negro descascado fica ao norte.  A parede de pedra fica a\
    \ leste\ne oeste do portão.  Ã\x89 uma boa pergunta se o portão ainda funciona,\
    \ de tão\nvelho e acabado que parece.  O sul é usado como entrada principal para\
    \ algum\ntipo de encontro, talvez acadêmico, talvez militar.  Em todo caso, não\
    \ é usado\na um bom tempo."
  exits:
    south:
      target_vnum: 01010595901
    west:
      target_vnum: '01010505067'
  local_id: '5900'
  name: A Entrada Para o Manicômio
  vnum: 01010595900
- description: 'Uma fonte, seca, rachada, escurecida pelo limo, fica no centro deste

    pequeno pátio.  A fonte ostenta a figura de um homem, orgulhosamente no

    centro, com um tomo em uma das mãos e a outra em sua lapela.  Ainda há algum

    tipo de líquido no fundo da fonte, mas não parece ser segura sua consumação.'
  exits:
    east:
      target_vnum: 01010595903
    north:
      target_vnum: 01010595900
    south:
      target_vnum: 01010595902
    west:
      target_vnum: 01010595905
  local_id: '5901'
  name: Em uma Velha Fonte
  vnum: 01010595901
- description: 'Grandes construções cercam todos os lados, o que deveriam ser caminhos

    bem cuidados agora estão tomados por ervas daninhas, levam pelas construções

    e ao redor das mesmas.  Dois velhos prédios ficam a leste e oeste, e ao sul,

    uma construção menor, claro, ao norte fica a saída deste lugar.  A porta

    para a parte sul, obviamente, fica ao sul.'
  exits:
    east:
      target_vnum: 01010595904
    north:
      target_vnum: 01010595901
    south:
      target_vnum: 01010595931
    west:
      target_vnum: 01010595906
  local_id: '5902'
  name: Pelo Manicômio
  vnum: 01010595902
- description: 'As ervas daninhas quase cobrem todo o assoalho que costumava cobrir
    o

    chão aqui, apenas pequenos caminhos de pedra ainda são visíveis.  Uma vez,

    este lugar costumava ser algum tipo de fundação.  O que pode ter acontecido

    para que o lugar ficasse deste jeito, você pode apenas imaginar.'
  exits:
    south:
      target_vnum: 01010595904
    west:
      target_vnum: 01010595901
  local_id: '5903'
  name: Pelo Manicômio
  vnum: 01010595903
- description: 'O chão abaixo de você foi obviamente remendado aqui, neste pequeno
    pátio,

    as pedras ainda proíbem o crescimento das ervas daninhas.  Um prédio

    bastante antigo fica ao leste, suas portas principais ficam ao leste, uma

    delas balança loucamente em sua dobradiça.  Olhando mais de perto, você pode

    ver manchas de sangue perto da maçaneta e em sua moldura.  Um caminho

    perde-se ao sul entre as construções.'
  exits:
    east:
      target_vnum: 01010595907
    north:
      target_vnum: 01010595903
    south:
      target_vnum: 01010595934
    west:
      target_vnum: 01010595902
  local_id: '5904'
  name: Pelo Manicômio
  vnum: 01010595904
- description: 'Perto do oeste há uma porta que leva a um prédio bem antigo feito
    de

    pedra lascada.  O pátio a sua volta deve ter sido bastante bonito com a

    fonte em seu centro, cercado de grandes construções.  De qualquer forma,

    alguém ou alguma coisa causou todo este abandono.  Talvez uma fuga, talvez

    uma doença.  Podemos apenas imaginar.'
  exits:
    east:
      target_vnum: 01010595901
    south:
      target_vnum: 01010595906
    west:
      target_vnum: 01010595920
  local_id: '5905'
  name: Pelo Manicômio
  vnum: 01010595905
- description: 'Um longo prédio bastante antigo segue pelo norte e sul, formando o
    limite

    ocidental deste pátio.  Ao sul há um caminho que contorna as construções,

    levando para trás para o manicômio.  Deste ângulo, você pode ver um brilho

    bruxuleante vindo do prédio ao sul.'
  exits:
    east:
      target_vnum: 01010595902
    north:
      target_vnum: 01010595905
    south:
      target_vnum: 01010595935
  local_id: '5906'
  name: Pelo Manicômio
  vnum: 01010595906
- description: "O chão deste prédio é feito de concreto, qua já foi branco.  Ã\x89\
    \ agora\nnegro pelo tempo e negligente desuso.  Uma porta fica pela parede leste,\
    \ um\npequeno buraco se abre aqui, onde uma vez foi o lugar de um vidro.  A câmara\n\
    segue a norte daqui, um pequeno rastro de sangue velho segue pelo chão."
  exits:
    east:
      target_vnum: 01010595912
    north:
      target_vnum: 01010595908
    west:
      target_vnum: 01010595904
  local_id: '5907'
  name: A Câmara Interna do Manicômio
  vnum: 01010595907
- description: 'A câmara aqui parece muito com a câmara ao sul, a sujeira toma todo
    o

    lugar.  Outra porta fica ao leste, há uma abertura em seu centro onde parece

    que era o lugar de uma janela.  O rastro de sangue segue a norte para fim da

    câmara e segue para outra porta ainda.'
  exits:
    east:
      target_vnum: 01010595911
    north:
      target_vnum: 01010595909
    south:
      target_vnum: 01010595907
  local_id: '5908'
  name: A Câmara Interna da Academia
  vnum: 01010595908
- description: 'A câmara chega a um fim, uma porta fica ao leste seguindo para uma
    sala

    de aula.  O rastro de sangue, em sua maior parte seco, segue para a sala

    onde está muito escuro para que você possa ver alguma coisa lá dentro.  A

    câmara segue a sul na escuridão, para a saída.  Uma escada de concreto segue

    acima na escuridão, seus degraus estão cobertos de lixo e poeira.'
  exits:
    east:
      target_vnum: 01010595910
    south:
      target_vnum: 01010595908
    up:
      target_vnum: 01010595913
  local_id: '5909'
  name: A Câmara Interna da Academia
  vnum: 01010595909
- description: 'Esta pequena sala de vinte por vinte, foi uma vez usada como sala
    de aula

    para algum tipo de ensino que era passado aos pupilos que residiam neste

    manicômio.  Há um velho quadro negro, quebrado ao meio, ainda pendurado na

    parede ao sul, e as mesas e cadeiras usadas pelos pupilos ainda estão

    firmemente pregadas ao chão.  Obviamente, se as mesas e cadeiras tiveram de

    ser pregadas ao chão, houve necessidade de forçar a disciplina.'
  exits:
    west:
      target_vnum: 01010595909
  local_id: '5910'
  name: A Sala de Aula
  vnum: 01010595910
- description: 'Esta pequena sala tem três fileiras de mesas e cadeiras.  As cadeiras

    estão viradas para o sul, para um velho quadro negro e um espaço, onde

    deveria estar a mesa da professora, está vazio.  As cadeiras e mesas

    restaram apenas por estarem pregadas ao chão, para impor disciplina do modo

    antigo.'
  exits:
    west:
      target_vnum: 01010595908
  local_id: '5911'
  name: A Sala de Aula
  vnum: 01010595911
- description: 'Esta pequena sala tem três fileiras de mesas e cadeiras, todas colocadas

    a mesma exata distancia uma da outra e das paredes.  As paredes uma vez de

    gesso branco, agora trincado pelo tempo, abrindo grandes buracos nas antigas

    paredes brancas e lisas.  Lascivos desenhos adornam a superfície escura do

    gesso, clara evidência de que o lugar não está abandonado por completo.'
  exits:
    west:
      target_vnum: 01010595907
  local_id: '5912'
  name: A Sala de Aula
  vnum: 01010595912
- description: 'Estranho que não haja janelas no prédio todo, parece que este prédio

    deste tamanho foi feito inteiramente de tijolos de pedra e gesso, o que o

    tornara muito quente e extremamente mal ventilado.  Há uma porta na parede

    leste, o corredor segue ao sul.'
  exits:
    down:
      target_vnum: 01010595909
    east:
      target_vnum: 01010595918
    south:
      target_vnum: 01010595914
  local_id: '5913'
  name: O Corredor Superior
  vnum: 01010595913
- description: 'O corredor é tão coberto de pedregulhos e escombros do teto e das
    paredes

    que fica difícil sua travessia.  As paredes são rachadas e chamuscadas,

    manchadas de sangue em alguns lugares.'
  exits:
    east:
      target_vnum: 01010595917
    north:
      target_vnum: 01010595913
    south:
      target_vnum: 01010595915
  local_id: '5914'
  name: O Corredor Superior
  vnum: 01010595914
- description: 'Aqui no fim do corredor, o chão é coberto por pedaços de gesso e tijolos

    de pedra.  Há uma porta na parede leste, tomada pelo lixo que há no chão.

    Talvez um rápido pulo sobre os escombros permita que você aterrisse ao

    leste.'
  exits:
    east:
      target_vnum: 01010595916
    north:
      target_vnum: 01010595914
  local_id: '5915'
  name: O Corredor Interno
  vnum: 01010595915
- description: 'Lixo e escombros estão por todo o chão deste pequeno quarto.  Os restos

    das velhas mesas e cadeiras se acumulam quebradas pelo chão, em uma parede

    há um pequeno buraco que dá para a outra sala.'
  exits:
    west:
      target_vnum: 01010595915
  local_id: '5916'
  name: A Sala de Aula
  vnum: 01010595916
- description: 'O lixo que estava sobre todo o corredor, se derramou neste quarto
    - ou

    será vice versa?  - cobrindo o chão de sujeira.  Pedaços quebrados de

    madeira das mesas e cadeiras se amontoam dentre pedaços de metal esquecidos.'
  exits:
    west:
      target_vnum: 01010595914
  local_id: '5917'
  name: A Sala de Aula
  vnum: 01010595917
- description: "A sala é manchada com sangue, em todos os estágios de apodrecimento.\
    \  Ã\x89\nobvio que algumas manchas são mais velhas que as outras, umas até\n\
    relativamente frescas.  Há uma tonelada de entulho das paredes em colapso e\n\
    do teto, e o fedor é terrível."
  exits:
    west:
      target_vnum: 01010595913
  local_id: '5918'
  name: A Sala de Aula
  vnum: 01010595918
- description: 'O corredor termina com uma porta ao oeste.  A porta está aberta, apoiada

    ao chão, pendurada por uma dobradiça.  O entulho do prédio em decadência

    torna a passagem difícil.  O sangue emplastado nas paredes e o lixo no chão

    não contribuem muito também.'
  exits:
    south:
      target_vnum: 01010595920
    west:
      target_vnum: 01010595922
  local_id: '5919'
  name: O Fim do Corredor
  vnum: 01010595919
- description: 'Este corredor quase não pode ser chamado de corredor de tão devastado,

    tão arruinado pelas garras do tempo e pelos tijolos de pedra que as paredes

    não mais parecem segurar.  Há buracos nas paredes, abrindo uma brecha que dá

    a visão dos outros quartos arruinados.'
  exits:
    east:
      target_vnum: 01010595905
    north:
      target_vnum: 01010595919
    west:
      target_vnum: 01010595923
  local_id: '5920'
  name: O Corredor Interno
  vnum: 01010595920
- description: 'Este parece ter sido algum tipo de escritório ou administração.  Quem

    sabe, possivelmente ele tenha sido a recepção ou talvez onde os mais

    problemáticos eram ouvidos.  Quem pode dizer?'
  exits:
    west:
      target_vnum: 01010595924
  local_id: '5921'
  name: Um Velho Escritório
  vnum: 01010595921
- description: 'Este ao que parece foi algum tipo de escritório de quando o manicômio

    ainda estava ativo.  Pedaços de metal e de madeira tomam o chão desta sala,

    parecem ser os restos da mobília do escritório.'
  exits:
    east:
      target_vnum: 01010595919
  local_id: '5922'
  name: O Escritório Administrativo
  vnum: 01010595922
- description: 'O corredor continua seu decadente caminho até as profundezas do prédio,

    os buracos da parede ainda mostram outros quartos.  Tons de vermelho - o que

    parecem ser manchas de sangue - são muito freqüentes enquanto você segue seu

    caminho para dentro deste lugar amaldiçoado.  Pode ser uma boa idéia

    manter-se perto da saída.'
  exits:
    east:
      target_vnum: 01010595920
    south:
      target_vnum: 01010595924
  local_id: '5923'
  name: O Corredor Interno
  vnum: 01010595923
- description: 'Degraus levam para cima, estes, que estão pela metade, esmigalhados.

    Seria um grande ato de coragem seguir adiante.  Há uma porta ao leste.'
  exits:
    east:
      target_vnum: 01010595921
    north:
      target_vnum: 01010595923
    up:
      target_vnum: 01010595925
  local_id: '5924'
  name: A Base de uma Escada Caindo aos Pedaços
  vnum: 01010595924
- description: 'A escada fica bem abaixo, seus degraus quebrados abrem buracos prontos

    para engolir almas tolas o suficiente para descer.  Uma porta fica ao norte,

    um corredor segue a leste.'
  exits:
    down:
      target_vnum: 01010595924
    east:
      target_vnum: 01010595926
    north:
      target_vnum: 01010595927
  local_id: '5925'
  name: No Topo da Escada Caindo aos Pedaços
  vnum: 01010595925
- description: 'O corredor faz uma curva pela direita ao norte, levando para a escuridão.

    Os escombros são tantos quanto no nível superior e inferior.  Não há portas

    ou janelas a vista, mas há manchas de sangue - sempre presentes.'
  exits:
    north:
      target_vnum: 01010595928
    west:
      target_vnum: 01010595925
  local_id: '5926'
  name: O Corredor Escurecido
  vnum: 01010595926
- description: 'Parece ser bem pequeno este escritório privativo.  Há pedaços velhos
    da

    decoração, apodrecendo desde que a decadência veio a este lugar, o que

    indica que em alguma época este foi um lugar de conforto para algum alto

    administrador.'
  exits:
    south:
      target_vnum: 01010595925
  local_id: '5927'
  name: Um Velho Escritório
  vnum: 01010595927
- description: 'O corredor segue do norte ao sul, sem janelas ou portas em ambas as

    paredes.  Quase parece que o prédio inteiro foi borrifado com sangue, mas

    manchas de sangue persistem até aqui, no nível superior.'
  exits:
    north:
      target_vnum: 01010595930
    south:
      target_vnum: 01010595926
  local_id: '5928'
  name: O Corredor de Pedregulhos
  vnum: 01010595928
- description: 'Este obviamente foi o escritório de algum funcionário de alto escalão,

    como se ele fosse feito para entreter convidados e outras pessoas.  O chão

    ainda é parcialmente coberto com um carpete apodrecido e carcomido, assim

    como as paredes.'
  exits:
    east:
      target_vnum: 01010595930
  local_id: '5929'
  name: O Escritório
  vnum: 01010595929
- description: 'Os corredores terminam aqui, com uma porta ao oeste.  Pilhas de escombro

    sobem pelas paredes, fazendo da caminhada um desafio.  Há ainda as marcas de

    sangue em todo lugar, fazendo-o parecer pintado com alguma tinta macabra e

    mal cheirosa.'
  exits:
    south:
      target_vnum: 01010595928
    west:
      target_vnum: 01010595929
  local_id: '5930'
  name: O Fim do Corredor
  vnum: 01010595930
- description: 'Aqui era a recepção do deão do manicômio, há muito tempo, quando este

    ainda funcionava - era um manicômio oras.  O sangue que parece cobrir quase

    todo chão parece especialmente grosso aqui, as paredes são pegajosas ao

    toque, e o chão bastante grudendo.  Há uma pequena porta na parede leste.'
  exits:
    east:
      target_vnum: 01010595932
    north:
      target_vnum: 01010595902
  local_id: '5931'
  name: A Recepção
  vnum: 01010595931
- description: 'Este era a sala de estar do deão e de sua família, onde eles se

    encontravam, passavam algum tempo juntos e faziam suas refeições.  Os restos

    de uma velha mesa estão aqui, apenas uma perna restou das quatro originais,

    apoiando a mesa em um ângulo absurdo.'
  exits:
    south:
      target_vnum: 01010595933
    west:
      target_vnum: 01010595931
  local_id: '5932'
  name: A Sala de Estar
  vnum: 01010595932
- description: 'Este periclitante quarto é tudo o que restou de uma confortável câmara
    de

    descanso do deão e sua esposa.  Os travesseiros e lençóis há muito foram

    rasgados em pedaços e carregados pelos ratos, o que era roupa de cama, agora

    é um grande ninho.  O que restou da mobília é apenas uma pilha de madeira

    carcomida, e gesso que caiu das paredes.  E tudo está - claro - ensopado de

    sangue.'
  exits:
    north:
      target_vnum: 01010595932
  local_id: '5933'
  name: O Quarto
  vnum: 01010595933
- description: 'Em sua maior parte coberto de ervas daninhas e plantas escuras, este

    caminho é cheio de tijolos de pedra e lixo dos prédios a seu redor, tudo,

    coberto com um vermelho profundo, a cor do sangue.  Parece que o caminho foi

    limpo recentemente, embora ainda haja muitos escombros no caminho, o que

    torna sua passagem possível.  Ao sul uma luz bruxuleante pode ser vista.  Ao

    leste fica a entrada para uma pequena construção feita de pedra.'
  exits:
    east:
      target_vnum: 01010595938
    north:
      target_vnum: 01010595904
    south:
      target_vnum: 01010595936
  local_id: '5934'
  name: Um Caminho Confuso
  vnum: 01010595934
- description: "O caminho segue ao sul, em direção Ã  fonte de luz.  Ã\x80 luz bruxuleante,\n\
    pode-se ver marcas vermelhas e molhadas que foram espirradas por todo o\nchão,\
    \ nas velhas pedras algumas das manchas secaram.  Um terrível sentimento\nacompanha\
    \ este lugar, quase como uma antecipação da morte próxima.  Um\nprédio de pedra\
    \ sem telhado fica logo ao oeste."
  exits:
    north:
      target_vnum: 01010595906
    south:
      target_vnum: 01010595937
    west:
      target_vnum: 01010595940
  local_id: '5935'
  name: Um Caminho Errante
  vnum: 01010595935
- description: 'A fonte de luz bruxuleante é agora vista.  Ela vem de um grande belvedere

    de pedra, no meio do pátio.  O pátio é cercado por prédios escurecidos,

    todos mostrando sinais de destruição.  Há formas humanas vagando pelo pátio,

    algumas parecem estar dançando, outras parecem estar fazendo tarefas

    específicas.  No belvedere há algumas pessoas, todas em únissono parecem

    dizer alguma coisa com um som ainda não ouvido.  Olhando para o chão do

    pátio, sangue pode ser visto espirrado em grandes quantidades pelas pedras.

    Quase parece que foi vertido para saturar o lugar todo.'
  exits:
    north:
      target_vnum: 01010595934
    south:
      target_vnum: 01010595945
  local_id: '5936'
  name: Um Caminho Errante Perto do Pátio
  vnum: 01010595936
- description: 'O caminho entra em uma curva ao noroeste para um grande pátio de pedra,

    ornado com um enorme belvedere em seu centro.  Parece que o belvedere é a

    fonte de luz bruxuleante, como se algum tipo de fogo o estivesse consumindo.

    Ao longo do pátio há pessoas que parecem estar celebrando algum tipo de

    ritual, eles são muitos.'
  exits:
    north:
      target_vnum: 01010595935
    south:
      target_vnum: 01010595942
  local_id: '5937'
  name: Ao Norte do Pátio
  vnum: 01010595937
- description: 'Parece que os ocupantes dessa instituição eram ligeiramente periculosos,

    uma vez que guardas haviam de ser mantidos em alerta.  Este prédio é igual

    aos outros, decadente, caindo aos pedaços e manchado de sangue.'
  exits:
    east:
      target_vnum: 01010595939
    west:
      target_vnum: 01010595934
  local_id: '5938'
  name: Os Quartos dos Guardas
  vnum: 01010595938
- description: 'O prédio mais parece um matadouro.  Nada de valor foi deixado, apenas

    pedaços da mobília.  Este lugar deve ter sido deixado para apodrecer há

    muito tempo atrás.'
  exits:
    west:
      target_vnum: 01010595938
  local_id: '5939'
  name: Os Quartos dos Guardas
  vnum: 01010595939
- description: 'Em algum tempo aqui deve ter sido onde os moradores e visitantes do

    manicômio mantinham suas montarias.  O chão não mostra sinais de que fora de

    pedra, as paredes são todas de pedra crua, que não parecem terem sido

    erguidas com o propósito de dar algum conforto.'
  exits:
    east:
      target_vnum: 01010595935
    south:
      target_vnum: 01010595941
  local_id: '5940'
  name: Os Velhos Estábulos
  vnum: 01010595940
- description: 'O sangue aqui é tão presente quanto é em todos os lugares deste

    manicômio, borrifadas de vermelho decorando cada polegada.  Que tipo de

    crime horrível fora cometido aqui, de modo a jorrar sangue deste modo?  Que

    tipo de criatura faria uma coisa destas?'
  exits:
    north:
      target_vnum: 01010595940
  local_id: '5941'
  name: Os Velhos Estábulos
  vnum: 01010595941
- description: 'O pátio aqui é enorme, em seu centro há um grande belvedere que segura

    uma bruxuleante chama.  As pedras são pegajosas, aderindo à sola das botas e

    sandálias, causando efeito até aos mais corajosos.'
  exits:
    east:
      target_vnum: 01010595943
    north:
      target_vnum: 01010595937
    south:
      target_vnum: 01010595948
  local_id: '5942'
  name: O Pátio Principal do Manicômio
  vnum: 01010595942
- description: 'Este é o pátio principal do manicômio.  Um enorme belvedere de pedra
    é

    ostentado no centro, um caminho de pedra leva em todas as direções.  O chão

    é pegajoso, fazendo seu calçado grudar nele.'
  exits:
    east:
      target_vnum: 01010595944
    south:
      target_vnum: 01010595946
    west:
      target_vnum: 01010595942
  local_id: '5943'
  name: O Pátio Principal do Manicômio
  vnum: 01010595943
- description: 'Este pátio foi uma vez, obviamente, o centro de tráfego do manicômio

    durante o dia.  Um enorme belvedere de pedra fica ao sul daqui, um caminho

    largo leva a ele.  As pedras do pátio estão bem mais ensopadas de sangue que

    o resto do caminho pelo qual você passou, o chão é pegajoso a ponto de

    realmente tornar sua passagem difícil, pois seus calçados ficam presos.'
  exits:
