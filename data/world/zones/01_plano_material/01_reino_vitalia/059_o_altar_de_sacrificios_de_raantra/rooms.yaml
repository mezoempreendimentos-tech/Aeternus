  name: Os Degraus do Belvedere
  vnum: 01010595949
- description: 'Um prédio, de aparência importante, pelo menos parece, pois não tem

    manchas de sangue cobrindo as paredes interiores, fica ao oeste.  Portas

    duplas penduradas em suas dobradiças dão visão para o escuro e misterioso

    interior.  Pelo leste, degraus levam para o belvedere de pedra.'
  exits:
    east:
      target_vnum: 01010595949
    north:
      target_vnum: 01010595948
    south:
      target_vnum: 01010595952
    west:
      target_vnum: 01010595974
  local_id: '5950'
  name: A Entrada Para o Prédio
  vnum: 01010595950
- description: 'O chão do belvedere é de pedra, como o resto dos edifícios que compõem
    o

    manicômio, é gasto, o que indica grande movimento.  Esta área meio afundada

    forma um tipo de piscina, que provavelmente é cheia com grosso e escuro

    sangue.  Tochas são seguras em suportes de pedra no teto, quatro delas,

    iluminando bem este terrível lugar.'
  exits:
    east:
      target_vnum: 01010595956
    north:
      target_vnum: 01010595947
    south:
      target_vnum: 01010595954
    west:
      target_vnum: 01010595949
  local_id: '5951'
  name: O Altar de Raantra
  vnum: 01010595951
- description: 'O pátio dá para a parede de um prédio singular ao oeste.  A entrada
    para

    esta construção fica a norte, através de suas portas previamente abertas.'
  exits:
