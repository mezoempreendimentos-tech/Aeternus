  local_id: '5980'
  name: O Dormitório
  vnum: 01010595980
- description: 'Este quarto tem todas suas paredes quebradas, guardando apenas o vazio.

    Na parede sul há uma pequena porta de madeira, ainda bem segura em suas

    dobradiças.'
  exits:
    south:
      target_vnum: 01010595982
    up:
      target_vnum: 01010595977
  local_id: '5981'
  name: O Almoxarifado
  vnum: 01010595981
- description: 'Isto é o que os serventes do manicômio usavam como última arma contra
    os

    ''estudantes'' que saíam fora do controle.  A temperatura deste minúsculo

    cubículo deve cair mais ainda durante a noite, o chão é sujo assim, como as

    paredes.  Qualquer ''estudante'' que tivesse problemas com obediência era

    trazido aqui para esfriar o ânimo.'
  exits:
    north:
      target_vnum: 01010595981
  local_id: '5982'
  name: O Quarto Gelado
  vnum: 01010595982
- description: 'Este uma vez foi um caminho bem cuidado, cujas pedras, agora, estão

    quebras e ensopadas de sangue.  O caminho segue ao sul, e faz uma curva a

    leste, em direção a um grande prédio de pedra.'
  exits:
    south:
      target_vnum: 01010595984
    west:
      target_vnum: 01010595966
  local_id: '5983'
  name: Um Velho Caminho de Pedra
  vnum: 01010595983
- description: 'Este uma vez foi um caminho bem cuidado, cujas pedras, agora, estão

    quebras e ensopadas de sangue.  O caminho segue ao norte pelo pátio, e vira

    ao leste novamente, na direção ao grande prédio.'
  exits:
    east:
      target_vnum: 01010595985
    north:
      target_vnum: 01010595983
  local_id: '5984'
  name: Um Velho Caminho de Pedra
  vnum: 01010595984
- description: 'Este uma vez foi um caminho bem cuidado, cujas pedras, agora, estão

    quebras e ensopadas de sangue.  O prédio, que agora fica bem ao sul de você,

    pode ser adentrado através de uma porta ao leste.'
  exits:
    east:
      target_vnum: 01010595986
    west:
      target_vnum: 01010595984
  local_id: '5985'
  name: Um Velho Caminho de Pedra
  vnum: 01010595985
- description: 'O interior do prédio pode ser visto através de bruxuleantes luzes.

    Estranhas pessoas podem ser vistas dentro do prédio, aquecendo-se em

    fogueiras ou dormindo, miseráveis pelo chão.  O caminho segue pelo leste

    daqui, de volta ao pátio.'
  exits:
    south:
      target_vnum: 01010595987
    west:
      target_vnum: 01010595985
  local_id: '5986'
  name: A Entrada Para o Auditório
  vnum: 01010595986
- description: 'O lugar tem dimensões imensas, um enorme palco fica ao norte.  Pessoas

    encardidas e miseráveis se aglomeram em volta de pequenas fogueiras, ou

    dormem encolhidas no chão, esperando para serem a próxima Escolha.  Fileiras

    de cadeiras de pedra vão até o teto.'
  exits:
    north:
