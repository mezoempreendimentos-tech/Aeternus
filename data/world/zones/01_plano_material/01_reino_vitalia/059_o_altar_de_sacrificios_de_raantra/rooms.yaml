  vnum: 01010595947
- description: 'O pátio termina ao oeste, um pequeno edifício marca seu limite.  A

    entrada para o prédio fica ao sul, uma escada de altos degraus leva para o

    seu escuro interior.  Bem atrás do prédio uma alta torre pode ser vista se

    erguendo no céu da noite.'
  exits:
    east:
      target_vnum: 01010595946
    north:
      target_vnum: 01010595942
    south:
      target_vnum: 01010595950
  local_id: '5948'
  name: O Pátio do Manicômio
  vnum: 01010595948
