- description: 'Esta parte do pátio é de pedra, fica no meio de degraus que seguem
    para o

    belvedere.  O cheiro de sangue fresco no ar é bastante forte, as pedras

    deste pátio devem ser testemunhas de mortes diárias.'
  exits:
    east:
      target_vnum: 01010595947
    north:
