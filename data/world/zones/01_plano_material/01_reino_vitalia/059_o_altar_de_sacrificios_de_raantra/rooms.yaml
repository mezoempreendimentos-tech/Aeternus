- description: 'Este é o limite nordeste do pátio.  Uma velha capela abandonada fica
    ao

    leste, e a entrada a sul daqui.  Deste ângulo, uma alta torre pode ser

    vista, se erguendo da capela, de onde um sino ainda toca.  Um grande

    belvedere de pedra fica no centro do pátio, uma forte chama bruxuleia dentro

    dele.'
  exits:
    south:
      target_vnum: 01010595959
    west:
      target_vnum: 01010595945
  local_id: '5958'
  name: O Pátio Interno do Manicômio
  vnum: 01010595958
- description: 'A entrada da capela fica ao sul daqui, alguns degraus ficam ao leste

    levando para a porta principal.  Ao sudoeste, no centro do pátio, um grande

    belvedere celebra o progresso (?).  Pessoas de alguma outra raça podem ser

    vistas vagando pelo pátio.'
  exits:
    north:
      target_vnum: 01010595958
    south:
      target_vnum: 01010595960
    west:
      target_vnum: 01010595955
  local_id: '5959'
  name: O Pátio Interno do Manicômio
  vnum: 01010595959
- description: 'Os degraus levam direto para a porta da capela, de madeira esculpida
    que

    resistiu ao tempo.  A madeira deve ter sido muito bonita com seus desenhos

    de anjos e querubins em alto relevo, mas agora os anjos estão sujos de

    sangue, suas faces refletem algo horrível.  O pátio fica ao oeste.'
  exits:
    east:
      target_vnum: 01010595967
    north:
      target_vnum: 01010595959
    south:
      target_vnum: 01010595961
    west:
      target_vnum: 01010595956
  local_id: '5960'
  name: A Entrada da Capela
  vnum: 01010595960
- description: 'Este é o limite leste do pátio, a parede externa da capela fica a
    leste.

    A entrada da capela fica a norte, pelos degraus.'
  exits:
    north:
      target_vnum: 01010595960
    south:
      target_vnum: 01010595966
    west:
      target_vnum: 01010595957
  local_id: '5961'
  name: O Pátio do Manicômio
  vnum: 01010595961
- description: 'Este é o limite sudoeste do manicômio.  Um pequeno caminho leva ao
    redor

    de um enorme prédio que fica a sul daqui.  A cerimônia continua no belvedere

    ao nordeste.'
  exits:
    east:
      target_vnum: 01010595963
    north:
      target_vnum: 01010595952
    west:
      target_vnum: 01010595993
  local_id: '5962'
  name: O Pátio do Manicômio
  vnum: 01010595962
- description: 'Este é o limite sul do manicômio, limitado por um grande prédio cuja
    uma

    das entradas fica ao sul.  O belvedere fica ao nordeste, no centro do pátio.'
  exits:
    east:
      target_vnum: 01010595964
    north:
      target_vnum: 01010595953
    south:
      target_vnum: 01010595976
    west:
      target_vnum: 01010595962
  local_id: '5963'
  name: O Pátio do Manicômio
  vnum: 01010595963
- description: 'O belvedere fica ao norte daqui, no fim de alguns degraus.  Ao sul,
    há

    uma parede de pedra de uma das construções.  O sangue no chão parece nunca

    acabar.'
  exits:
    east:
      target_vnum: 01010595965
    north:
      target_vnum: 01010595954
    west:
      target_vnum: 01010595963
  local_id: '5964'
  name: O Pátio do Manicômio
  vnum: 01010595964
- description: 'Este é o final sul do pátio, onde ele termina em uma larga parede
    de

    pedra de um dos prédios.  Uma porta para a entrada deste prédio fica ao sul,

    o belvedere fica no centro do pátio - mais parece uma entrada pelos fundos.'
  exits:
    east:
      target_vnum: 01010595966
    north:
      target_vnum: 01010595957
    south:
      target_vnum: 01010595978
    west:
      target_vnum: 01010595964
  local_id: '5965'
  name: O Pátio do Manicômio
  vnum: 01010595965
- description: 'Esta é a curva sudeste do pátio.  Uma trilha segue ao leste entre
    as

    construções que limitam o pátio.  Ao longe, noroeste, um grande belvedere de

    onde emana uma luz profana.'
  exits:
    east:
      target_vnum: 01010595983
    north:
      target_vnum: 01010595961
    west:
      target_vnum: 01010595965
  local_id: '5966'
  name: O Pátio do Manicômio
  vnum: 01010595966
- description: 'Que grande lugar aqui deve ter sido.  As paredes são de pedra trabalhada,

    esculpidas com motivos angelicais.  Ao norte há uma porta, ao sul, a área

    principal de adoração.  Ao leste um pequeno quarto, cuja função é

    insondável.'
  exits:
    east:
      target_vnum: 01010595969
    north:
      target_vnum: 01010595968
    south:
      target_vnum: 01010595970
    west:
      target_vnum: 01010595960
  local_id: '5967'
  name: Na Entrada da Capela
  vnum: 01010595967
- description: 'Os ganchos de pedra nas paredes onde os clérigos costumavam pendurar
    seus

    hábitos e robes depois e antes de seus serviços.  Não há, obviamente, robes

    pendurados.  Este quarto, como a maioria dos quartos nas dependências deste

    manicômio, sucumbiu ao tempo e a decadência.  As paredes, assim como o chão,

    estão rachadas e quebradas.  Tudo é claro, coberto de manchas vermelhas.'
  exits:
    south:
      target_vnum: 01010595967
  local_id: '5968'
  name: A Chapelaria
  vnum: 01010595968
- description: 'Nada mais é, que um quarto cinco por cinco sem teto.  Olhando para
    cima,

    você pode ver que este alto cabo segue diretamente para a torre do sino, de

    onde o mesmo pode ser visto.  Algumas cordas estão penduradas, mas não podem

    ser alcançadas.  Elas deviam ligar alguma coisa até aqui, mas seja o que

    tenha sido, já apodreceu...'
  exits:
    west:
      target_vnum: 01010595967
  local_id: '5969'
  name: Pelo Cabo
  vnum: 01010595969
- description: 'A manchas onde candelabros se alinham diante do altar esculpido em
    pedra,

    de qualquer forma, tudo o que restou da majestade deste lugar são dois

    candelabros que restaram no altar.  Pareceria trabalho de algum vândalo ou

    ladrão, se não fosse a grande quantidade de sangue pelas pedras.'
  exits:
    north:
      target_vnum: 01010595967
  local_id: '5970'
  name: A Sala de Adoração da Capela
  vnum: 01010595970
- description: 'Inacreditavelmente, os lados interiores das paredes são escaláveis!

    Apenas mais um pouco e o sino pode ser alcançado, onde uma plataforma de

    pedra cerca o cabo.'
  exits:
    down:
      target_vnum: 01010595969
    up:
      target_vnum: 01010595972
  local_id: '5971'
  name: Pelo Cabo
  vnum: 01010595971
- description: 'O cabo que segue no interior da capela é na verdade a torre do sino.  Na

    parede norte há uma janela que leva para cima do telhado da capela.  Não

    parece que a torre seria acessível novamente, uma vez que você saia pelo

    telhado.'
  exits:
    down:
      target_vnum: 01010595971
    north:
      target_vnum: 01010595973
  local_id: '5972'
  name: A Torre do Sino
  vnum: 01010595972
- description: 'Não há nada de interessante neste telhado, exceto o fato deste ser
    o

    único lugar onde não há manchas de sangue.  Parece que o único modo de se

    descer, é pulando para o pátio abaixo de você.'
  exits:
    down:
      target_vnum: 01010595959
  local_id: '5973'
  name: O Telhado da Capela
  vnum: 01010595973
- description: 'Esta é uma pequena antecâmara onde em algum tempo um bibliotecário
    uma

    vez trabalhou e se certificou de que todos os livros estivessem em ordem.

    Não há mesa, nem secretária, ou bibliotecário, apenas quatro paredes aos

    pedaços.'
  exits:
    east:
      target_vnum: 01010595950
    south:
      target_vnum: 01010595975
  local_id: '5974'
  name: A Entrada da Biblioteca
  vnum: 01010595974
- description: 'A maioria das prateleiras que costumavam se alinhar pela parede, moldadas

    em pedra, agora

    Estão quebradas pelo chão, cheias de poeira.'
  exits:
    north:
      target_vnum: 01010595974
  local_id: '5975'
  name: A Biblioteca
  vnum: 01010595975
- description: 'A faculdade do manicômio manteve os restos de camas e mesas quebradas

    aqui, sem mencionar que neste prédio ficam todos os outros quartos dos

    ''estudantes'' do lugar.  Ainda há vestígios do que este quarto costumava ser,

    algumas velhas armações de aço - provavelmente camas - jogadas em uma

    parede, retorcidas.  Como qualquer outra parte deste manicômio, as paredes

    estão ensopadas em sangue assim, como o chão.'
  exits:
    north:
      target_vnum: 01010595963
    south:
      target_vnum: 01010595977
  local_id: '5976'
  name: O Alojamento da Faculdade
  vnum: 01010595976
- description: 'Aqui é onde os estudantes - ou doentes mentais - eram trazidos a noite.

    Não há mais mobília pelo quarto, apenas pedaços de gesso quebrado e tijolos

    de pedra.  Uma porta leva à base de uma escada.'
  exits:
    down:
      target_vnum: 01010595981
    east:
      target_vnum: 01010595979
    north:
      target_vnum: 01010595976
  local_id: '5977'
  name: O Dormitório
  vnum: 01010595977
