- description: "As ávores crescem adiante daqui, criando uma clareira.  A grama baixa\n\
    atapetam o chão.  Uma pequena nascente borbulha para fora do chão, saindo\ndentre\
    \ algumas pedras recobertas de musgo.  Uma pequena cascata é criada\nconforme\
    \ ela flui sobre as pedras.  O resplendor aquático parece brilhar\ncomo se uma\
    \ brisa vinda do leste apenas sobre o outro lado da cascata.  Ã\x89 um\nlugar\
    \ tranqüilo, um onde um viajante pode descansar sem se preocupar."
