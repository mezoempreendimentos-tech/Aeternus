    east:
      target_vnum: '01010656532'
  local_id: '6554'
  name: A Tesouraria
  vnum: '01010656554'
- description: 'Esta taverna animada é o coração social do reino dos anões de Strangelove.

    Barris de cerveja anã estão empilhados ao longo das paredes, e o ar está

    carregado com o aroma de carne assada e cerveja forte. Anões de toda a

    montanha se reúnem aqui para beber, comer e contar histórias de suas

    aventuras.'
  exits:
    east:
      target_vnum: '01010656512'
    north:
      target_vnum: '01010656556'
  local_id: '6555'
  name: A Taverna de Strangelove
  vnum: '01010656555'
- description: 'Uma cozinha robusta onde são preparadas as refeições hearty preferidas

    pelos anões. Enormes caldeirões borbulham sobre fornos de pedra, e carcaças

    de caça estão penduradas nas vigas do teto. O cheiro de pão recém-assado

    mistura-se com o aroma de ensopados temperados.'
  exits:
    south:
      target_vnum: '01010656555'
  local_id: '6556'
  name: A Cozinha da Taverna
  vnum: '01010656556'
- description: 'Esta é a forja mais avançada do reino dos anões, onde são criadas
    as

    armas e armaduras da realeza. O calor intenso das fornalhas rivaliza com

    o centro de um vulcão, e ferramentas especiais de precisão estão organizadas

    com cuidado militar. Apenas os mestres ferreiros mais habilidosos trabalham

    aqui.'
  exits:
    east:
      target_vnum: 01010656558
  local_id: '6557'
  name: A Forja Real de Strangelove
  vnum: '01010656557'
- description: 'Um arsenal impressionante contendo as melhores armas e armaduras do
    reino

    dos anões. Machados de guerra ornamentados estão expostos em suportes especiais,

    e armaduras de placas reluzem sob a luz das tochas. Cada peça representa o

    auge da metalurgia anã.'
  exits:
    north:
      target_vnum: 01010656559
    west:
      target_vnum: '01010656557'
  local_id: '6558'
  name: O Arsenal Real
  vnum: 01010656558
- description: 'Aqui os líderes anões se reúnem para discutir assuntos importantes
    do reino.

    Uma mesa de pedra circular domina o centro da sala, rodeada por cadeiras

    esculpidas especialmente para cada conselheiro. Mapas das minas e territórios

    anões decoram as paredes de granito.'
  exits:
    east:
      target_vnum: '01010656560'
    south:
      target_vnum: 01010656558
  local_id: '6559'
  name: A Sala do Conselho dos Anões
  vnum: 01010656559
- description: 'Os quartos privados da realeza anã são luxuosamente decorados com
    os

    melhores trabalhos em pedra e metal do reino. Móveis entalhados em granito

    negro contrastam com detalhes em ouro e mithril. Esta é a residência pessoal

    dos governantes de Strangelove.'
  exits:
    west:
      target_vnum: 01010656559
  local_id: '6560'
  name: Os Aposentos Reais
  vnum: '01010656560'
- description: 'Esta é a mina mais valiosa do reino dos anões, onde o precioso mithril
    é

    extraído das profundezas da montanha. Veios prateados brilham nas paredes

    de rocha, e o som de picaretas ressoa constantemente. A segurança aqui é

    extremamente rigorosa.'
  exits:
    north:
      target_vnum: '01010656562'
  local_id: '6561'
  name: A Grande Mina de Mithril
  vnum: '01010656561'
- description: 'Um túnel bem iluminado que leva às seções mais profundas da mina de
    mithril.

    Trilhos de minério correm pelo chão, e carrinhos carregados com minério

    precioso passam regularmente. O ar está fresco devido ao sistema de ventilação

    anão bem projetado.'
  exits:
    north:
      target_vnum: '01010656563'
    south:
      target_vnum: '01010656561'
  local_id: '6562'
  name: Túnel da Mina de Mithril
  vnum: '01010656562'
- description: 'Aqui o mithril bruto é refinado e purificado usando técnicas secretas

    dos anões. Fornos especiais operam em temperaturas extremas, e alquimistas

    anões trabalham com precisão para extrair a pureza máxima do metal precioso.

    O resultado são lingotes de mithril de qualidade incomparável.'
  exits:
    south:
      target_vnum: '01010656562'
  local_id: '6563'
  name: A Câmara de Refino
  vnum: '01010656563'
