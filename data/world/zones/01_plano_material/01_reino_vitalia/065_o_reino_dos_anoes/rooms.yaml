- description: |-
    Você está caminhando ao longo do caminho que leva para a Vila dos Anões.
    Em cima de você, você pode ver a Travessa, e para o norte o caminho continua
    em direção às montanhas.
  exits:
    north:
      target_vnum: '6501'
    up:
      target_vnum: '3502'
  name: O Caminho para a Vila dos Anões
  vnum: '6500'
- description: |-
    Agora você está na base de uma montanha irregular.  A floresta ao seu
    redor é muito densa e parece muito escura para o norte.
  exits:
    north:
      target_vnum: '6502'
    south:
      target_vnum: '6500'
  name: O Caminho na Base da Montanha
  vnum: '6501'
- description: |-
    Posicionando-se no meio da montanha, você pode facilmente ver a cidade
    para o sul, e o topo da montanha está muito perto para o norte.
  exits:
    north:
      target_vnum: '6503'
    south:
      target_vnum: '6501'
  name: O Caminho no Meio da Montanha
  vnum: '6502'
- description: |-
    Você está agora no topo da montanha.  Para o sul você avista o caminho
    levando para baixo da montanha.  Para o leste e oeste você vê entradas para
    o que lhe parece ser uma mina.
  exits:
    east:
      target_vnum: '6540'
    south:
      target_vnum: '6502'
    west:
      target_vnum: '6505'
  name: O Topo da Montanha
  vnum: '6503'
- description: |-
    Esta é um caminho estreito que leva para o Reino dos Anões.  Ele parece
    menos usado do que os outros, e é muito arrepiante.  O Caminho inicia-se
    logo ao sul e continua para o norte.
  exits:
    north:
      target_vnum: '6506'
    south:
      target_vnum: '6540'
  name: O Caminho Estreito
  vnum: '6504'
- description: |-
    Aqui é uma entrada para a montanha.  A porta parece muito bem construída,
    e você pode ouvir sons vindos do seu interior.
  exits:
    east:
      target_vnum: '6503'
    west:
      target_vnum: '6513'
  name: A Entrada para a Montanha
  vnum: '6505'
- description: |-
    Este é um estreito caminho que faz a curva para o leste aqui.  As árvores
    pendem sobre o caminho e estão muito crescidas.  O caminho estreito continua
    para o sul e para o leste.
  exits:
    east:
      target_vnum: '6507'
    south:
      target_vnum: '6504'
  name: Uma Curva no Caminho Estreito
  vnum: '6506'
- description: Este caminho é muito estreito e ele continua para o norte e oeste.
  exits:
    north:
      target_vnum: '6508'
    west:
      target_vnum: '6506'
  name: O Caminho Estreito
  vnum: '6507'
- description: |-
    Este caminho leva para o norte e sul.  Para o norte você pode ver uma
    porta e para o sul o caminho continua.
  exits:
    north:
      target_vnum: '6509'
    south:
      target_vnum: '6507'
  name: O Caminho Estreito Norte-Sul
  vnum: '6508'
- description: "Aqui o caminho curva-se para o oeste.  Ã\x80 sua frente, vocÃª pode\
    \ ver uma\nporta e o caminho continua para o oeste e sul."
  exits:
    north:
      target_vnum: '6510'
    south:
      target_vnum: '6508'
    west:
      target_vnum: '6522'
  name: A Porta para o Reino
  vnum: '6509'
- description: |-
    Você está num caminho que vai, finalmente, levar para o castelo.  Ele
    continua para o norte em direção ao castelo, e existe uma porta na parede
    localizada ao sul.
  exits:
    north:
      target_vnum: '6511'
    south:
      target_vnum: '6509'
  name: No Caminho para o Castelo
  vnum: '6510'
- description: |-
    Você está ainda no caminho para o castelo, ou de volta para a Vila dos
    Anões, dependendo da direção que você deseja ir.  O caminho continua para o
    norte e sul.
  exits:
    north:
      target_vnum: '6512'
    south:
      target_vnum: '6510'
  name: Ainda no Caminho para o Castelo
  vnum: '6511'
- description: |-
    Existe aqui uma porta para o castelo ao leste.  O castelo é elegantemente
    modelado, e se parece muito com um rolo de papel higiênico se observado do
    seu fim.  Existe um sinal que diz:

    ******************************************
    *  BEM VINDO AO CASTELO DE STRANGELOVE   *
    *       Aqui, celibato é proibido        *
    ******************************************
  exits:
    east:
      target_vnum: '6525'
    south:
      target_vnum: '6511'
    west:
      target_vnum: '6555'
  name: A Porta para o Castelo
  vnum: '6512'
- description: |-
    Tudo aqui é coberto de fuligem e muito sujo.  O caminho continua para o
    leste e norte, e existe uma porta para o oeste.
  exits:
    east:
      target_vnum: '6505'
    north:
      target_vnum: '6514'
    west:
      target_vnum: '6526'
  name: Dentro da Entrada
  vnum: '6513'
- description: |-
    Você está num caminho na vila dos anões que leva para o norte em direção
    das lojas e para o sul, em direção à extremidade desta área.
  exits:
    north:
      target_vnum: '6515'
    south:
      target_vnum: '6513'
  name: O Caminho
  vnum: '6514'
- description: |-
    Você está num caminho que leva para a Loja Couro e Dente ao oeste, e o
    caminho continua para o sul.
  exits:
    south:
      target_vnum: '6514'
    west:
      target_vnum: '6516'
  name: Uma Curva na Estrada
  vnum: '6515'
- description: |-
    Você está na Loja Couro e Dente.  Aqui você pode comprar as mais finas
    armas e armaduras anãs.  O caminho continua para o norte e leste.
  exits:
    east:
      target_vnum: '6515'
    north:
      target_vnum: '6517'
  name: A Loja Couro e Dente
  vnum: '6516'
- description: |-
    Você encontra-se no caminho para o norte da Loja Couro e Dente.  O
    caminho continua para o norte e para o oeste fica a Padaria do Cabeça de
    Granito.
  exits:
    north:
      target_vnum: '6518'
    south:
      target_vnum: '6516'
    west:
      target_vnum: '6535'
  name: O Caminho que Leva para o Norte da Loja
  vnum: '6517'
- description: |-
    Aqui o caminho curva-se para o leste em direção ao quartel.  Para o sul
    você pode ver as lojas.
  exits:
    east:
      target_vnum: '6519'
    south:
      target_vnum: '6517'
  name: Ao Norte das Lojas
  vnum: '6518'
- description: |-
    Aqui o caminho passa junto ao Hospital ao norte.  Ele continua para o
    leste em direção ao quartel, e para o oeste.
  exits:
    east:
      target_vnum: '6520'
    north:
      target_vnum: '6534'
    west:
      target_vnum: '6518'
  name: O Caminho junto ao Hospital
  vnum: '6519'
- description: Aqui o caminho continua a oeste e a leste para o quartel.
  exits:
    east:
      target_vnum: '6521'
    west:
      target_vnum: '6519'
  name: Um Caminho Próximo ao Quartel
  vnum: '6520'
- description: |-
    Aqui, ao sul, encontra-se a entrada para o quartel, e o caminho continua
    para o oeste.
  exits:
    south:
      target_vnum: '6523'
    west:
      target_vnum: '6520'
  name: A Entrada para o Quartel
  vnum: '6521'
- description: |-
    Você está na casa da guarda situada a oeste da entrada para o castelo.
    Existem aqui pôsters de nus femininos cobrindo as paredes.
  exits:
    east:
      target_vnum: '6509'
  name: A Casa da Guarda
  vnum: '6522'
- description: |-
    Aqui está a primeira das duas salas principais do quartel.  O quartel
    continua para o sul, e você pode deixar a sala para o norte.
  exits:
    north:
      target_vnum: '6521'
    south:
      target_vnum: '6524'
  name: A Primeira Sala do Quartel
  vnum: '6523'
- description: |-
    Aqui é a parte traseira do quartel dos anões.  Existem camas enfileiradas
    aqui, e existe um fedor intolerável.
  exits:
    north:
      target_vnum: '6523'
  name: A Parte Traseira do Quartel
  vnum: '6524'
- description: |-
    Você está dentro do castelo.  Ele tem um formato tubular e não tem muitas
    características especiais.  Existe um lance de escadas que levam para cima e
    uma porta que leva para fora do castelo, a oeste.
  exits:
    up:
      target_vnum: '6528'
    west:
      target_vnum: '6512'
  name: Dentro do Castelo de Strangelove
  vnum: '6525'
- description: |-
    Existe uma camada de sujeira no chão de pelo menos 7 centímetros de
    espessura!  Isto se deve, provavelmente, ao fato de que não muitas pessoas
    tenham passado por aqui por muitos meses.
  exits:
    down:
      target_vnum: '6527'
    east:
      target_vnum: '6513'
  name: O Depósito
  vnum: '6526'
- description: |-
    Esta sala cheira a vinho, e você apenas pode concluir que ela costumava
    ser usada como uma adega de vinhos em algum tempo.
  exits:
    up:
      target_vnum: '6526'
  name: A Adega de Vinho
  vnum: '6527'
- description: A escada continua em círculos para cima e para baixo daqui.
  exits:
    down:
      target_vnum: '6525'
    up:
      target_vnum: '6529'
  name: Na Escada Dentro do Castelo Strangelove
  vnum: '6528'
- description: |-
    Você está ainda circulando pela escada.  Você está começando a ficar
    tonto de dar voltas e voltas e voltas e voltas e voltas.  A escada continua
    para cima e para baixo.
  exits:
    down:
      target_vnum: '6528'
    up:
      target_vnum: '6530'
  name: Na Escada
  vnum: '6529'
- description: |-
    Você está no topo da escada dentro do castelo.  Existe uma saída para o
    leste e a escada leva para baixo.
  exits:
    down:
      target_vnum: '6529'
    east:
      target_vnum: '6531'
  name: No Topo da Escada
  vnum: '6530'
- description: |-
    Esta é a sala de espera da Rainha.  Aqui os homens literalmente
    'aguardam' pela rainha.  Você ouviu rumores de que a rainha realmente gosta
    de 'conhecer' seu povo, no sentido bíblico.
    O quarto da Rainha encontra-se para o norte e você pode avistar a escada
    para o oeste.
  exits:
    north:
      target_vnum: '6532'
    west:
      target_vnum: '6530'
  name: A Sala de Espera da Rainha
  vnum: '6531'
- description: |-
    Este é o quarto da Rainha.  A cama está toda amarrotada e existe uma
    pilha de lençóis sujos amontoados no canto.  Existe uma escada que leva para
    baixo, para fora do castelo, e você pode deixar esta sala para o sul.
    Existe, também, uma pequena porta de madeira para o oeste.  Existe um sinal
    que diz:

    ---------------------------------------------------------------
    | Estou ocupada agora, e não sei quando vou retornar, mas se  |
    | encontrar uma chave por aqui, pegue-a e POR FAVOR tente     |
    | conseguir meus comprimidos anti-concepcionais de volta.     |
    | Eu ouvi dizer que eles podem ser encontrados em algum lugar |
    | nas profundezas das minas.                                  |
    ---------------------------------------------------------------
  exits:
    down:
      target_vnum: '6533'
    south:
      target_vnum: '6531'
    west:
      target_vnum: '6554'
  name: O Quarto da Rainha
  vnum: '6532'
- description: |-
    Você está no lado norte do Castelo de Strangelove.  Você nota que você
    não está mais dentro da montanha.  Ao longo da linha do horizonte ao sul
    você vê montanhas que se elevam a grandes alturas.
    A única saída, entretanto, é de volta para cima da escada em direção ao
    Quarto da Rainha.
  exits:
    up:
      target_vnum: '6532'
  name: O Lado Norte do Castelo de Strangelove
  vnum: '6533'
- description: |-
    Você encontra-se dentro do Hospital dos Anões.  Ele cheira a álcool
    utilizado para limpeza, e existe sangue por todas as paredes.
  exits:
    south:
      target_vnum: '6519'
  name: O Hospital
  vnum: '6534'
- description: |-
    O aroma vindo desta sala é surpreendente.  Você quase pode sentir o gosto
    das massas e tortas dissolvendo na sua boca.
  exits:
    east:
      target_vnum: '6517'
  name: Padaria do Cabeça de Granito
  vnum: '6535'
- description: |-
    Este caminho é muito utilizado e existe uma entrada para as minas para o
    leste, enquanto que o caminho continua para o norte e oeste.
  exits:
    east:
      target_vnum: '6541'
    north:
      target_vnum: '6504'
    west:
      target_vnum: '6503'
  name: O Caminho Escuro
  vnum: '6540'
- description: |-
    Um pequeno caminho leva para baixo em direção às minas, enquanto o
    caminho continua para o oeste.
  exits:
    down:
      target_vnum: '6542'
    west:
      target_vnum: '6540'
  name: A Entrada da Mina
  vnum: '6541'
- description: |-
    Você encontra-se na base da fossa da mina.  O ar aqui é muito fuliginoso
    e ele é muito difícil de se respirar.  A fossa da mina leva para cima e a
    leste.
  exits:
    east:
      target_vnum: '6543'
    up:
      target_vnum: '6541'
  name: Na Base da Fossa da Mina
  vnum: '6542'
- description: |-
    Você está nas profundezas da mina, e você se sente muito inconfortável.
    O caminho continua para o leste e leva para a fossa da mina para o oeste.
  exits:
    east:
      target_vnum: '6544'
    west:
      target_vnum: '6542'
  name: Num Caminho Dentro da Mina
  vnum: '6543'
- description: |-
    Você está na encruzilhada na mina.  Existe uma porta para o norte, e o
    caminho continua para o sul, leste e oeste.
  exits:
    east:
      target_vnum: '6545'
    north:
      target_vnum: '6546'
    south:
      target_vnum: '6551'
    west:
      target_vnum: '6543'
  name: A Encruzilhada da Mina
  vnum: '6544'
- description: |-
    Você está dentro de uma área de depósito de materiais naturais que foram
    encontrados aqui embaixo.  Sua fundação não é muito robusta, visto que o
    apoio dela é muito fraco.
  exits:
    west:
      target_vnum: '6544'
  name: O Depósito de Carvão
  vnum: '6545'
- description: |-
    Você entrou no labirinto da mina.  Para o leste você pode ver algumas
    inscrições, e você pode sair para o sul.
  exits:
    east:
      target_vnum: '6547'
    south:
      target_vnum: '6544'
  name: O Labirinto da Mina
  vnum: '6546'
- description: |-
    Você está dentro do labirinto, mas não afastado o suficiente para você se
    perder.  Existe um inscrição na parede que diz:

    1    3    2    4
    N    L    N    S

    Isso não parece muito seguro, então não confie muito...
  exits:
    east:
      target_vnum: '6544'
    north:
      target_vnum: '6548'
    west:
      target_vnum: '6546'
  name: A Inscrição do Labirinto
  vnum: '6547'
- description: Você está num labirinto.
  exits:
    north:
      target_vnum: '6549'
    south:
      target_vnum: '6547'
    west:
      target_vnum: '6548'
  name: O Labirinto
  vnum: '6548'
- description: Você está num labirinto.
  exits:
    north:
      target_vnum: '6548'
    south:
      target_vnum: '6548'
    west:
      target_vnum: '6550'
  name: O Labirinto
  vnum: '6549'
- description: Você está num labirinto.
  exits:
    east:
      target_vnum: '6549'
    north:
      target_vnum: '6549'
    south:
      target_vnum: '6552'
    west:
      target_vnum: '6548'
  name: O Labirinto
  vnum: '6550'
- description: |-
    Este é a sala de depósito para equipamentos usados pelos mineiros anões.
    Ela é muito pequena e você pode notar que não são muitos mineiros que usam
    estes equipamentos.
  exits:
    north:
      target_vnum: '6544'
  name: A Sala de Equipamentos de Mineração
  vnum: '6551'
- description: "Você conseguiu solucionar o labirinto.  Você pode notar pelos últimos\n\
    movimentos pequenos que não existe a possibilidade de um trabalhador\nestúpido\
    \ ter conseguido resolver isto.  Parece muito solitário aqui.  Para o\nsul existe\
    \ uma sala deserta.  Para o norte, você avista o labirinto.  Existe\num sinal\
    \ situado acima da saída sul:\n\nAQUELES QUE ENTRAREM, PLANEJAM UMA OPORTUNA MORTE.\n\
    (ESPECIALMENTE SE VOCÃ\x8A FOR LEAL Ã\x80 RAINHA)"
  exits:
    north:
      target_vnum: '6550'
    south:
      target_vnum: '6553'
  name: O Final do Labirinto
  vnum: '6552'
- description: |-
    Você entrou na sala do guardião do labirinto.  Aqui existem pinturas da
    Rainha com dardos enfiados nelas.  Pintadas em spray nas paredes, existem
    expressões como 'a rainha deve sofrer' e 'Católicos Dominam'.
  exits:
    north:
      target_vnum: '6552'
  name: A Sala do Guardião do Labirinto
  vnum: '6553'
- description: |-
    Esta sala parece ser a Tesouraria da Rainha.  Existe uma saída, de volta
    para o leste.
  exits:
    east:
      target_vnum: '6532'
  name: A Tesouraria
  vnum: '6554'
- description: |-
    Esta taverna animada é o coração social do reino dos anões de Strangelove.
    Barris de cerveja anã estão empilhados ao longo das paredes, e o ar está
    carregado com o aroma de carne assada e cerveja forte. Anões de toda a
    montanha se reúnem aqui para beber, comer e contar histórias de suas
    aventuras.
  exits:
    east:
      target_vnum: '6512'
    north:
      target_vnum: '6556'
  name: A Taverna de Strangelove
  vnum: '6555'
- description: |-
    Uma cozinha robusta onde são preparadas as refeições hearty preferidas
    pelos anões. Enormes caldeirões borbulham sobre fornos de pedra, e carcaças
    de caça estão penduradas nas vigas do teto. O cheiro de pão recém-assado
    mistura-se com o aroma de ensopados temperados.
  exits:
    south:
      target_vnum: '6555'
  name: A Cozinha da Taverna
  vnum: '6556'
- description: |-
    Esta é a forja mais avançada do reino dos anões, onde são criadas as
    armas e armaduras da realeza. O calor intenso das fornalhas rivaliza com
    o centro de um vulcão, e ferramentas especiais de precisão estão organizadas
    com cuidado militar. Apenas os mestres ferreiros mais habilidosos trabalham
    aqui.
  exits:
    east:
      target_vnum: '6558'
  name: A Forja Real de Strangelove
  vnum: '6557'
- description: |-
    Um arsenal impressionante contendo as melhores armas e armaduras do reino
    dos anões. Machados de guerra ornamentados estão expostos em suportes especiais,
    e armaduras de placas reluzem sob a luz das tochas. Cada peça representa o
    auge da metalurgia anã.
  exits:
    north:
      target_vnum: '6559'
    west:
      target_vnum: '6557'
  name: O Arsenal Real
  vnum: '6558'
- description: |-
    Aqui os líderes anões se reúnem para discutir assuntos importantes do reino.
    Uma mesa de pedra circular domina o centro da sala, rodeada por cadeiras
    esculpidas especialmente para cada conselheiro. Mapas das minas e territórios
    anões decoram as paredes de granito.
  exits:
    east:
      target_vnum: '6560'
    south:
      target_vnum: '6558'
  name: A Sala do Conselho dos Anões
  vnum: '6559'
- description: |-
    Os quartos privados da realeza anã são luxuosamente decorados com os
    melhores trabalhos em pedra e metal do reino. Móveis entalhados em granito
    negro contrastam com detalhes em ouro e mithril. Esta é a residência pessoal
    dos governantes de Strangelove.
  exits:
    west:
      target_vnum: '6559'
  name: Os Aposentos Reais
  vnum: '6560'
- description: |-
    Esta é a mina mais valiosa do reino dos anões, onde o precioso mithril é
    extraído das profundezas da montanha. Veios prateados brilham nas paredes
    de rocha, e o som de picaretas ressoa constantemente. A segurança aqui é
    extremamente rigorosa.
  exits:
    north:
      target_vnum: '6562'
  name: A Grande Mina de Mithril
  vnum: '6561'
- description: |-
    Um túnel bem iluminado que leva às seções mais profundas da mina de mithril.
    Trilhos de minério correm pelo chão, e carrinhos carregados com minério
    precioso passam regularmente. O ar está fresco devido ao sistema de ventilação
    anão bem projetado.
  exits:
    north:
      target_vnum: '6563'
    south:
      target_vnum: '6561'
  name: Túnel da Mina de Mithril
  vnum: '6562'
- description: |-
    Aqui o mithril bruto é refinado e purificado usando técnicas secretas
    dos anões. Fornos especiais operam em temperaturas extremas, e alquimistas
    anões trabalham com precisão para extrair a pureza máxima do metal precioso.
    O resultado são lingotes de mithril de qualidade incomparável.
  exits:
    south:
      target_vnum: '6562'
  name: A Câmara de Refino
  vnum: '6563'
