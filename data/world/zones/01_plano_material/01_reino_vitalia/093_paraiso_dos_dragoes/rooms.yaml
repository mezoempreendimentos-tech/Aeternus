- description: "Você está em outra dimensão e arrepender-se-á profundamente por ter\n\
    entrado aqui.  Vê ao seu redor todos os tipos de peste da humanidade; todos\n\
    os males estão presentes nesta sala.  Ã\x80 frente enxerga pessoas sendo\nqueimadas\
    \ vivas, homens sendo desfigurados lentamente por doenças e crianças\npedindo\
    \ socorro.  Ao sul há uma enorme porta negra."
  exits:
