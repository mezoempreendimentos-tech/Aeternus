- description: |-
    O Dragão Branco é da cor da neve.  Seu corpo totalmente coberto por escamas
    brancas é facilmente camuflado em seu habitat natural. Um porém é que ele se torna facilmente
    visível fora dos lugares congelados.  Suas asas possuem uma beleza magnífica
    quando abertas, parecendo feitas de puríssima madrepérola.  O Ancião Branco possui apenas um chifre, bem no meio da sua
    cabeça.  Ele também é dono de uma rajada congelante de gelo.
  keywords:
  - dragao
  - anciao
  - branco
  name: o Ancião Dragão Branco
  vnum: '9304'
- description: |-
    O Ancião Dragão Azul possui escamas da cor do céu vitaliano, que magicamente
    mudam de tonalidade de acordo com as condições da abóboda celeste.  Seus
    olhos são de um intenso vermelho, como sangue.  Possuindo dois chifres em
    sua cabeça, geralmente é confundido com o próprio céu ao sobrevoar o deserto
    do paraíso dos dragões de Vitália ou áreas áridas.
  keywords:
  - dragao
  - anciao
  - azul
  name: o Ancião Dragão Azul
  vnum: '9305'
- description: |-
    O Ancião Dragão Verde possui escamas predominantemente verdes.  Possui ainda
    escamas amareladas, mas apenas na parte frontal do corpo (no pescoço e na
    barriga), além da cauda.  Sua cabeça ostenta dois chifres e sua mandíbula
    superior possui duas grandes presas, o que faz os seus inimigos tremerem.  O
    Ancião Verde é capaz de arriscar a própria vida pelos seus filhotes.
  keywords:
  - dragao
  - anciao
  - verde
  name: o Ancião Dragão Verde
  vnum: '9306'
- description: |-
    O Ancião Dragão Negro é um dos seres mais perversos de Vitália.  Seu corpo é
    coberto quase que predominatemente por escamas negras, tendo apenas na parte
    frontal do seu corpo, no pescoço, na barriga e na cauda, escamas cinzas.
    Suas asas negras e seus três chifres compõem uma das figuras mais
    aterrorizantes de Vitália.
  keywords:
  - dragao
  - anciao
  - negro
  name: o Ancião Dragão Negro
  vnum: '9307'
- description: |-
    O Ancião Dragão Vermelho possui escamas belíssimas, da cor de sangue.  Ele
    possui dois chifres enormes ao lado dos olhos e uma cauda com três espigões
    brancos que podem derrubar qualquer gigante.  Extremamente ganancioso, ele
    sempre menospreza seus inimigos.
  keywords:
  - dragao
  - anciao
  - vermelho
  name: o Ancião Dragão Vermelho
  vnum: '9308'
- description: |-
    O Ancião Dragão Amarelo é uma das criaturas mais belas e magníficas do
    paraíso dos dragões de Vitália.  Possui escamas em tons de amarelo-gualdo,
    sendo que os dois chifres que possui na cabeça são os maiores chifres
    encontrados em todos os dragões.  Suas potentes garras podem chegar a um
    metro e meio de comprimento.
  keywords:
  - dragao
  - anciao
  - amarelo
  name: o Ancião Dragão Amarelo
  vnum: '9309'
- description: |-
    O Dracolich ancião é uma das criaturas mais aterrorizantes do paraíso dos
    dragões de Vitália.  Ele é um dragão morto-vivo, que possui todos os poderes
    do dragão quando estava vivo, porém muito mais fortes e mortais.  O Ancião,
    por ser dragão mais velho desta espécie, não possui mais a carne e os órgãos
    do corpo que ele incorporou, pois sua magia de preservação não conseguiu
    manter nada além dos ossos.  Sua imensa figura é basicamente um grande
    esqueleto com sinistros olhos formados por apenas pontos de luz.  Ele
    aparenta possuir bem mais que mil anos.
  keywords:
  - anciao
  - dracolich
  name: o dracolich ancião
  vnum: '9310'
- description: |-
    O Dragão fantasma é uma criatura horripilante, aterrorizante, medonha.
    Você, quando consegue olhar diretamente para ele, observa uma alma presa
    dentro do seu corpo fantasmagórico.  O Dragão fantasma vive no paraíso dos
    dragões de Vitália, escondido do dracolich ancião, o juiz das almas dos
    dragões.
  keywords:
  - dragao
  - fantasma
  name: o dragão fantasma
  vnum: '9311'
- description: |-
    A Rainha dos dragões fadas possui uma alegria contagiante.  Suas belas asas
    produzem um brilho magnífico ao serem abertas.  A Rainha fada é pequenina,
    porém bastante bondosa e pacífica e não poupará esforços para ajudar um
    amigo em perigo.
  keywords:
  - dragoneza
  - fada
  - rainha
  name: a dragoneza fada rainha
  vnum: '9312'
- description: |-
    O Guarda-real possui a missão de proteger todos os seus irmãos e as pessoas
    que precisam de ajuda.  Ele possui asas verdes e escamas azuis.  Como todo
    dragão fada, ele é alegre e adora uma piada, principalmente quando a piada é
    sobre os visitantes.
  keywords:
  - dragao
  - fada
  - guarda
  - real
  name: um dragão fada guarda-real
  vnum: '9313'
- description: |-
    O Dragão fada possui escamas coloridas e asas azuis.  Ele adora pregar peças
    e contar piadas, principalmente com os visitantes.  O Dragão fada é muito
    pacífico e alegre. E está sempre disposto a ajudar os necessitados.
  keywords:
  - dragao
  - fada
  name: um dragão fada
  vnum: '9314'
- description: |-
    A Dragoneza fada possui escamas coloridas e asas cor de rosa.  Ela adora
    pregar peças e contar piadas, principalmente com os visitantes.  A Dragoneza
    fada é muito pacífica e alegre e está sempre disposta a ajudar os necessitados.
  keywords:
  - dragoneza
  - fada
  name: uma dragoneza fada
  vnum: '9315'
