- description: |-
    A Fada possui dois pares de asas coloridas e um pequenino corpo de humano.
    Ela é muito simpática e alegre, adora brincar com visitantes e possui o
    poder de prever acontecimentos.  Ela está usando um lindo vestido feito de
    pétalas de flores colhidas no paraíso.
  keywords:
  - fada
  name: uma fada
  vnum: '9322'
- description: |-
    O Filhote desde cedo possui a agressividade da mãe, porém não consegue usar
    suas mandíbulas de forma mortal.  Ele possui escamas num tom de verde muito
    claro, seus dois chifres ainda não se desenvolveram e sua fome é
    assustadora.
  keywords:
  - filhote
  - dragao
  - verde
  name: um filhote de dragão verde
  vnum: '9323'
- description: |-
    A Aranha-de-fogo é uma estranha criatura, que vive numa das cavernas do
    paraíso dos dragões de Vitália.  Alguns dizem que um mago vitaliano, em uma
    de suas experiências acabou criando num acidente estas incríveis criaturas.
    O Corpo da aranha-de-fogo não é atingido pelas chamas e elas odeiam água.
    A Aranha-de-fogo é do mesmo tamanho de um cão-de-guarda.
  keywords:
  - aranha
  - fogo
  name: uma aranha-de-fogo
  vnum: '9324'
- description: |-
    O Dromedário é uma espécie de camelo, que possui um pescoço curto e uma
    corcova.  Vive perambulando no deserto dos dragões de Vitália à procura de
    água e fugindo do ataque dos dragões do deserto.
  keywords:
  - dromedario
  name: um dromedário
  vnum: '9325'
- description: |-
    A Serpente negra possui escamas escuras como o sombrio pântano, seus olhos
    brilham como dois pontos de luz verde e suas presas enormes ficam expostas
    como se para mostrar seu veneno mortal.  De uns seis metros de comprimento,
    ela seria capaz de sufocar um gigante com sua esmagadora enroscada.
  keywords:
  - serpente
  - negra
  name: a serpente negra
  vnum: '9326'
- description: |-
    A Aparição do pântano é uma das criaturas mais assustadoras do paraíso, já
    que poucos são aqueles que conseguem escapar dela e de seu olhar negro.  Ela
    aparece e desaparece misteriosamente, sendo que até hoje ninguém sabe muita
    coisa a seu respeito.
  keywords:
  - aparicao
  name: a aparição do pântano
  vnum: '9327'
- description: |-
    O Cardume de peixes é bastante colorido, contendo peixes de todas as cores,
    formas e tamanhos.  Você consegue contar mais ou menos uns 50 peixes neste cardume
    magnífico.
  keywords:
  - cardume
  - peixes
  name: um cardume de peixes
  vnum: '9328'
- description: |-
    O Mensageiro da paz na verdade é um enorme pássaro com penas brancas, bico
    dourado e possuidor da força de um titã.  Sua missão é a de levar uma
    mensagem de paz para todos os povos de Vitália.  Raramente ele é visto, pois
    normalmente ele utiliza outras formas físicas, como a de humano, assumindo
    principalmente a identidade de uma crianças na sua função de semear a paz.
    O Mensageiro da paz é uma criatura divina e será sempre querida e amada por
    todos os Deuses e habitantes mortais ou imortais de Vitália.
  keywords:
  - mensageiro
  - paz
  name: o mensageiro da paz
  vnum: '9329'
