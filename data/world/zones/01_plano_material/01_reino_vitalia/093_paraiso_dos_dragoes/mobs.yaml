- description: |-
    O Dragão Dourado é enorme, de aparência justa e benevolente.  Suas escamas
    são de majesto dourado, reluzentindo como se tendo luz própria.  Os dois
    chifres, maiores que um homem adulto, lhe dão um ar de altivez realmente
    digno de um ser divino e supremo em sua raça.
  keywords:
  - dragao
  - anciao
  - dourado
  name: o Ancião Dragão Dourado
  vnum: '9300'
- description: |-
    O Dragão Prateado possui uma aparência magnífica.  Suas escamas prateadas
    brilham como se espalhassem bondade e fraternidade para todos os lados.
    Cinco chifres formam uma imponente coroa prateada em torno de sua cabeça.
  keywords:
  - dragao
  - anciao
  - prateado
  name: o Ancião Dragão Prateado
  vnum: '9301'
- description: |-
    O Dragão de Bronze é alegre e curioso, adora participar de aventuras, e de
    discutir e explanar suas opiniões com o grupo de aventura.  Suas escamas de
    bronze são de uma beleza esplendorosa e hipnótica.  Os três chifres e suas
    afiadas garras podem retalhar rapidamente qualquer infeliz ser que lhe
    ataque.
  keywords:
  - dragao
  - anciao
  - bronze
  name: o Ancião Dragão de Bronze
  vnum: '9302'
