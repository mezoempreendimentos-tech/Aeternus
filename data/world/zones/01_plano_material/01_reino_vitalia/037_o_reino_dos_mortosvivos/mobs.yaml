- description: |-
    Em um primeiro momento você diria que tem dez pés de comprimento.  Alguém
    que conhece melhor diria que é maior, porque dez pés é o que você pode ver
    ACIMA da água.  Possui uma cor bem verde e tem uma boca para sucção muito
    estranha.  Por dentro da boca há algo que perfura os ossos das vítimas e
    suga sua essência.
  keywords:
  - verme
  long_desc: Um longo verme parecido com uma sanguessuga nada em sua direção.
  name: um verme
  vnum: '01010373700'
- description: |-
    A água constantemente ferve e evapora em volta do corpo deste animal.  Há
    muito tempo atrás, Apocalipse recebeu esta enguia de Satã.  Em um pacto
    entre as duas forças do mal, o fogo infernal tomou a forma de uma enguia.
    Agora ela perambula eternamente pelo Mar Morto, atormentando os azarentos
    aventureiros.
  keywords:
  - enguia
  - satanica
  - flamejante
  long_desc: Um flamejante ser nada em sua direção.
  name: a enguia satãnica
  vnum: '01010373701'
- description: |-
    Alcançando o longo comprimento de vinte e cinco pés, este tubarão é um
    formidável caçador.  Muitos, ao tentarem alcançar os outros horrores do mar,
    normalmente caem para os tubarões.  Sua enorme boca revela fileiras de
    dentes afiadíssimos, que brilham com maldade.
  keywords:
  - tubarao
  - demoníaco
  long_desc: Uma barbatana triangular de um tubarão cruza a superfície da água.
  name: um demoníaco tubarão
  vnum: '01010373702'
- description: |-
    Esta é a mais perigosa besta que circula pelo Mar Morto.  Enormes asas a
    empurram pela água com tranquilidade.  Seu resistente couro pode resistir
    a diversos danos de armas.   A pontuda cauda possui um poderoso e mortal
    veneno, e que somente poucos, e poderosos seres conheçem o antidoto.
  keywords:
  - ixitxachityl
  - raia
  long_desc: Uma enorme raia do mar com sua afiada cauda mortal, emerge do fundo do
    oceano.
  name: Ixitxachityl
  vnum: '01010373703'
- description: |-
    Incontáveis lagrimas derramadas por aqueles do mundo mortal, gotejam por
    todos os lados e todo o tempo para o Espírito das Lágrimas.  Lágrimas
    frescas derraram no meio do nada e se tornam uma parte deste ser.  Toda sua
    existência depende destas lágrimas a ele fará tudo o que puder para
    mante-las precipitando.
  keywords:
  - espirito
  - lagrimas
  - forma
  - agua
  long_desc: Uma brilhante forma feita de água se aproxima de você.
  name: o Espírito das Lágrimas
  vnum: '01010373704'
- description: |-
    Na medida em que você olha a fundo nestes olhos profundos e vê seu sorriso,
    você percebe que esta abominação  verdadeiramente lhe leva ao sofrimento.
    O sofrimento de que todo ser sente alimentar e sustentar este espírito.
    Eternamente desejando mais sofrimento, ele se esforça para causar dor de
    todas as maneiras possíveis.
  keywords:
  - espirito
  - sofrimento
  long_desc: Um espírito com o corpo marcado pelo sofrimento anda em sua direção.
  name: o Espírito do Sofrimento
  vnum: '01010373705'
- description: |-
    Toda a tristeza de todos os reinos é o que forma o Espírito da Tristeza.
    Ele não tem uma forma definida, mas preferivelmente se pareçe uma névoa.
    Ele sabe que todos, no fundo de seus corações, possuem tristeza de alguma
    forma, e tempo.
  keywords:
  - espirito
  - tristeza
  long_desc: |-
    Um espírito que chora amargamente, começa a rir loucamente na medida em
    que o vê.
  name: o Espírito da Tristeza
  vnum: '01010373706'
- description: |-
    Desespero!  Desespero!  Desespero!  Desespero é do que vive este ser.  A
    névoa vibra e diminui na medida em que a quantidade de desespero no
    universo oscila.  Com a fome de procurar a essência do desespero, ele
    parece ser a causa!
  keywords:
  - espirito
  - desespero
  long_desc: Um nuvem negra de desespero se materializa em sua frente.
  name: o Espirito do Desespero
  vnum: '01010373707'
- description: |-
    Na medida em que a Morte lhe vê, ela levanta de seu trono.  Uma escura
    sombra toma a sala e o gemido dos mortos aumenta.  Somente um orgulhoso ser
    de mente aberta, sabe que agora ela trabalha abaixo da contenção de ferro
    do Apocalipse.  Nenhum erro, para este ser é morte, e somente morte.
  keywords:
  - morte
  - esqueleto
  long_desc: Um enorme, e coberto esqueleto está sentado em seu obscuro trono.
  name: a Morte
  vnum: 01010373708
- description: |-
    Fome, um dos Quatro Cavaleiros do apocalipse, é um ser que pode causar o
    máximo sofrimento com o leve toque de sua descarnada mão.  Estando em pé,
    ele expressa respeito, e uma aura de grandiosidade o circula.  Ele executa
    as ordens de Apocalipse.
  keywords:
  - fome
  - figura
  long_desc: Uma magra figura olha fixamente para você.
  name: a Fome
  vnum: 01010373709
- description: |-
    Pestilência é alguêm para se temer.  Com seu simples sopro, pode levar
    mundos inteiros à dor e agonia.  Toda criatura que carrega consigo o mal ou
    sofrimento, carregará também todo o seu poder.  Você só pode admirar o
    impressionante poder de Apocalipse, de poder reinar entre tantos seres
    poderosos sob seu comando.
  keywords:
  - pestilencia
  - figura
  long_desc: Uma grotesca figura, atormentada por muitas doenças, da um riso forçado
    para você.
  name: a Pestilência
  vnum: '01010373710'
- description: |-
    Enorme e poderoso, a Guerra é um ativo lutador e ainda um juiz no mesmo
    momento.  Com protuberantes e ondulados músculos, este ser é o insuperável
    guerreiro.  Treinado em todos os tipo de combate, estratégia, e luta,
    ninguêm seria capaz de derrota-lo, a não ser o próprio Apocalipse.
  keywords:
  - guerra
  - ser
  long_desc: Um ser com uma formidável armadura para seu trabalho na medida em que
    o vê.
  name: a Guerra
  vnum: '01010373711'
- description: |-
    Desde quando a necessidade do tempo surgiu, o Grande Mestre do Tempo esteva
    lá.  Ele tem visto as incontáveis criações e destruições de vários mundos
    no tempo em que você demoraria para estalar seus dedos.  Ele viu, ouviu, e
    sentiu tudo.  Usando seu enorme e forte poder, ele somente julga o que foi,
    o que é, e o que ainda está por vir...
  keywords:
  - grande
  - mestre
  - tempo
  long_desc: Tempo e espaço pediodicamente se substituem por este rugoso e velho ser.
  name: o Grande Mestre do Tempo
  vnum: '01010373712'
- description: |-
    O último mal vacila em seus olhos na medida em que Apocalipse observa-o com
    desprezo.  Ele tem o intenso prazer na destruição de mundos por suas mãos e
    da dos Quatro Cavaleiros.  Diferente dos Quatro Cavaleiros que fazem tudo
    pela necessidade de sustentar a vida, Apocalipse faz pelo simples prazer.
    Somente um ser, de nome já esquecido através do tempo, pode erguer-se
    frente ao fatal poder de Apocalipse.
  keywords:
  - apocalipse
  long_desc: Apocalipse,  o servidor da destruição, ergue-se em sua frente.
  name: Apocalipse
  vnum: '01010373713'
- description: |-
    A mais nova das três do Destino, Clotho é o espetáculo da visão.  Jovem
    e radiante, ela é cheia de vida.  O eterno e incontável trabalho de tear os
    fios da vida não parece perturbar nem a aborrecer, pois ela tem o grande
    prazer de ver o nascimento de incontáveis seres.
  keywords:
  - clotho
  - mulher
  - bonita
  - jovem
  long_desc: Uma bonita e jovem mulher pega um pouco mais de material para tecer.
  name: Clotho
  vnum: '01010373714'
- description: |-
    Atropos é a segunda do Destino, não tão radiante mas tão sábia quanto as
    outras duas irmãs.  Ainda, ela é a que faz a decisão fatal de determinar o
    comprimento das vidas.  Ela faz isso sem arrependimento ou mágoa, porque ela
    sabe que é assim que a vida funciona.
  keywords:
  - atropos
  - mulher
  - maduro
  - madura
  long_desc: Uma mulher de ar maduro sorri para você, na medida em que entra na sala.
  name: Atropos
  vnum: '01010373715'
- description: |-
    Lachesis é a mais velha das três do Destino.  Ela é sabia e bondosa.  Ela
    parece saber onde os incontáveis fios da vida, que foram marcados, estão e
    os convoca para descansarem em seu colo.  Com um macio toque, ela os corta
    onde está marcado.  Ela sabe que isto é como a vida vai, e sempre desta
    mesma maneira.
  keywords:
  - lachesis
  - velha
  - mulher
  long_desc: Uma mulher muito velha está aqui sentada , cortando o fio.
  name: Lachesis
  vnum: '01010373716'
- description: |-
    Esta é a múmia do Caos que já governou no lugar de Apocalipse.  Apocalipse
    elevou seus poderes e tirou o Caos de seu trono.  Em um acesso de humor,
    Apocalipse convocou o poder dos mortos e tornou o Caos em um dos mortos
    vivos deste local.  O tempo tem enfraquecido o Caos e a múmia é uma simples
    sombra do seu antigo poder.  Eternamente aprisionada nesta tumba, ela
    aguarda a presença de um mortal, para descontar toda sua frustação e raiva.
  keywords:
  - mumia
  - caos
  long_desc: A múmia se move lentamente para fora do caixão e vem em sua direção.
  name: a Múmia do Caos
  vnum: '01010373717'
- description: |-
    Esta aparição é definitivamente o fantasma do horror, e você ja sabe do que
    ele é capaz.  Translúcido e difícil de se ver através da sombra, esta é uma
    imunda surpresa para os descuidados aventureiros.
  keywords:
  - fantasma
  - horror
  long_desc: Um fantasma vem em sua direção, avançando!
  name: o Fantasma do Horror
  vnum: 01010373718
- description: "Chyron tem levado passageiros através do rio styx desde muito tempo.\
    \  Seus\nmovimentos são leves, ainda cautelosos, e ele nunca perdeu ninguÃ\x9F\
    m no rio.\nCom um silencioso olhar em sua direção, você sente que deveria paga-lo\
    \ para\nque ele o leve pelo rio, do que tentar ir sozinho."
  keywords:
  - chyron
  - esqueleto
  long_desc: Um esqueleto coberto se aproxima estendendo a mão pelo dinheiro do transporte.
  name: Chyron
  vnum: 01010373719
- description: |-
    Cerbero guarda o caminho para a Cripta.  Ele é maior do que qualquer canino
    que você já tenha visto em sua vida.  Sem contar no fato de que ele tem
    três cabeças, ele se move graciosamente e com ótima discrição.
  keywords:
  - cerbero
  - cachorro
  long_desc: Um enorme cachorro de três cabeças tenta lhe morder.
  name: Cerbero
  vnum: '01010373720'
- description: |-
    Um canino feito de um esqueleto vivo anda cautelosamente em sua direção.
    Menor do que um lobo, ele caça em grupos e sao eficientes matadores.  Seus
    demoníacos olhos brilham enquanto ele percebe a próxima refeição que você
    será.
  keywords:
  - cachorro
  - esqueleto
  long_desc: Um cachorro esqueleto range os dentes para você.
  name: um cachorro esqueleto
  vnum: '01010373721'
- description: |-
    Tendo bons sete pés de altura, o demônio de ossos gosta de tormentar os
    viajantes que passam por aqui.  Sem contar no fato de que ele se move muito
    lentamente e desajeitado, sua maciça estrutura de ossos lhe promove melhor
    proteção do que a maioria.  Se lhe acontecer de morrer aqui, na Ilha de
    Ossos, seria melhor que você voltasse aqui e pegasse suas coisas, antes que
    o demônio de ossos as pegassem!
  keywords:
  - demonio
  - ossos
  long_desc: Um humanóide feito de ossos está aqui, rindo com maldade.
  name: um demônio de ossos
  vnum: '01010373722'
- description: |-
    O buracos dos olhos vazados o fitam inexpressivamente, deixando-o nervoso.
    Este guerreio esqueleto guarda a de Ilha de visitantes não desejados.
  keywords:
  - esqueleto
  - guerreiro
  long_desc: Um guerreiro esqueleto está aqui, soprando poeira.
  name: um guerreiro esqueleto
  vnum: '01010373723'
- description: |-
    Com dentes que são tão grandes quanto você, este drgão pode se tornar um
    grande problema se for perturbado de seu calmo descanso.  Este é um
    sinistro sinal para se ter cuidado, com sua maciça costela se movendo, sem
    contar no fato de que ele não possui pulmões.  Repentinamente, ele se vira
    mostrando suas garras!  Sorte, foi só um pesadelo em seu sono.
  keywords:
  - esqueleto
  - dragao
  long_desc: Um enorme dragão esqueleto descansa aqui, dormindo.
  name: um dragão esqueleto
  vnum: '01010373724'
- description: |-
    Estúpido e criado somente para um propósito, o de destruir tudo o que possa
    vir a interferir nos planos de Apocalipse.  Altamente treinado nas artes
    negras de combate, este guerreiro é um notável oponente.
  keywords:
  - guereiro
  long_desc: Um guerreiro, nascido do fogo infernal, pratica suas habilidades.
  name: um guerreiro
  vnum: '01010373725'
- description: |-
    Maciço e poderosamente desenvolvido, o guerreiro zumbi foi trazido de
    volta à vida depois que Apocalipse soube de todo o seu conhecimento
    em combates.  Seu único propósito é o de treinar os guerreiros e o
    de simplesmente matar aqueles que não se encaixaram.
  keywords:
  - zumbi
  - guerreiro
  long_desc: Um sólido zumbi move-se graciosamente em sua direção!
  name: o guerreiro zumbi
  vnum: '01010373726'
- description: |-
    O General não é nada mais que uma carapaça de de fogo infernal contendo as
    almas dos guerreiros que lutaram pela maldade.  Estas almas fizeram um
    pacto com Apocalipse, total obediência por mais tempo de divertimento.
  keywords:
  - general
  long_desc: O General do Exército está andando, furiosamente queimando com seu fogo
    infernal.
  name: o General do Exército
  vnum: '01010373727'
- description: |-
    Muitas almas que estão aqui condenadas para sempre, por um pacto
    estabelecido entre Apocalipse e Satã, para vaguear em busca de mais almas
    para clamar pelo diabo.  Isto resultou na criação do Guardião das Almas, o
    perfeito guardião das terras sob o poder de Apocalipse.
  keywords:
  - guardiao
  - almas
  long_desc: O Guardião das Almas, armado com garras, ergue-se para rasgar a sua alma!
  name: o Guardião das Almas
  vnum: 01010373728
- description: |-
    Certamente indistinguível das outras sombras inocentes criadas pela luz, a
    Sombra da Morte procura destruir a sua sombra.  Quando ela mata, e dissolve
    o seu corpo, deste modo destruindo sua sombra, ela cresce ficando mais
    forte e mortal.
  keywords:
  - morte
  - sombra
  long_desc: Uma sombra das trevas começa a seguir a sua sombra.
  name: a Sombra da Morte
  vnum: 01010373729
- description: |-
    O Anjo da Morte não é alguém para se subestimar.  Tendo os olhos, cabelo,
    asas e vestimenta muito negras, o aspecto dele não é o de típico anjo
    bondoso.  Ele está aqui por algum motivo, qual?...  Isto é o que você tem
    que descobrir.
  keywords:
  - anjo
  - morte
  long_desc: Um anjo com asas negras, e uma maldosa lâmina na mão, aproxima-se de
    você.
  name: o Anjo da Morte
  vnum: '01010373730'
- description: |-
    Seu pequeno tamanho e deformidade o faz acreditar em sua grande força.
    Seus fortes e vigorosos braços são capazes de esmagar pedras em pedaços.
    Ele é tímido e solitário, fujindo da luz e da multidão.
  keywords:
  - encurvada
  - criatura
  - tumulo
  - ladrao
  long_desc: Uma encurvada criatura está aqui procurando por mais corpos.
  name: um ladrão de túmulos
  vnum: '01010373731'
- description: |-
    O guarda zumbi é completamente estúpido e isento de inteligência.  Tendo
    estado aqui, decadente, por anos, ele já se esqueceu de quais eram as suas
    ordens.  Portanto, ele simplesmente fica aqui, parado e imóvel como
    estátuas.
  keywords:
  - zumbi
  - guarda
  long_desc: Pedaços de carne descascam do zumbi, enquanto ele está em guarda.
  name: um guarda zumbi
  vnum: '01010373732'
- description: |-
    Estes gárgulas são as últimas coisas que restaram de uma importante raça
    antiga, que já governou este obscuro reino.  Elas reinaram com sabedoria e
    bondade.  Seus dias acabaram quando o Caos tomou o controle e ordenou uma
    guerra contra eles.  Olhando bem perto destes seres de pedra, você percebe
    que eles tem formas de pequenos dragões e gorilas.  Eles estão descansando,
    por anos, guardando suas energias esperando o momento para atacar o mal.
  keywords:
  - gargula
  - pedra
  - besta
  - estatua
  long_desc: Uma massiça estátua de uma besta irreconhecível está aqui.
  name: um Gárgula de Pedra
  vnum: '01010373733'
