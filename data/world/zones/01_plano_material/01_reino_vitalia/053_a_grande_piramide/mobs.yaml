    encanta com enigmas, proporcionando divertimento aos seus primos facilmente
    confundidos.
  keywords:
  - crioesfinge
  - esfinge
  long_desc: Uma crioesfinge observa você calmamente.
  name: a esfinge
  vnum: '01010535314'
- description: |-
    A poderosa androesfinge é uma criatura gigantesca, com o corpo de um leão,
