    asas.  São contados contos de faraós que ficaram surdos permanentemente ao
    ouvir o poderoso rugido desta esfinge.
  keywords:
  - androesfinge
  - esfinge
  long_desc: Uma poderosa androesfinge balança sua juba de leão.
  name: a androesfinge
  vnum: '01010535315'
- description: |-
    A grande esfinge se sobressai dez pés acima de você, repousando em estado de
    dormência.  Ela se tornou quase indistinguível da areia que a cerca, apesar
    de você ainda poder identificar os traços de uma bonita face que já ditou
    muitas regras.
  keywords:
  - grande
  - esfinge
  long_desc: Uma poderosa esfinge repousa na areia, dormente por séculos.
  name: a grande esfinge
  vnum: '01010535316'
- description: |-
    Assim que a luz que você carrega ilumina o rosto e o corpo da criatura, você
    pode ver que seus traços vão se definindo, preenchendo, endurecendo, ate que
    um homem aparentemente saudável se ergue diante de você, marcado apenas pelo
