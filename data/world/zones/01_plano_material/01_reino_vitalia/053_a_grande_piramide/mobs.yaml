    chocolate, e seu peito quase nem se mexe quando respira.
  keywords:
  - ramses
  - mumia
  long_desc: Você despertou o poderoso servo dos faraós, Ramsés.
  name: Ramsés, o Maldito
  vnum: '01010535317'
