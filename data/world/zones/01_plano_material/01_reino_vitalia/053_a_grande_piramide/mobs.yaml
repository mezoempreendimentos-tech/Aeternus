    dos seus primos mais velhos.
  keywords:
  - hieracoesfinge
  - esfinge
  long_desc: A hieracoesfinge lhe parece muito esperta.
  name: a hieracoesfinge
  vnum: '01010535312'
- description: |-
    A ginoesfinge é uma criatura tranqüila e amigável, tem o corpo de uma linda
    mulher de pele escura da cintura para cima, asas emplumadas e as hábeis
    pernas de um poderoso felino.  Agora ela está confusa, tentando resolver um
    enigma de sua prima crioesfinge.
  keywords:
  - ginoesfinge
  - esfinge
  long_desc: Uma ginoesfinge está sentada aqui, entretida por um enigma.
  name: a ginoesfinge
  vnum: '01010535313'
- description: |-
    A crioesfinge é uma criatura calma e amigável, tendo a cabeça de um carneiro
