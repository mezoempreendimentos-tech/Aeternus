    south:
      target_vnum: '01010070704'
  local_id: '725'
  name: Desesperadamente Perdido
  vnum: '01010070725'
- description: "Você protege seu pescoço do vento frio que sopra aqui.   Ã\x89 quando\
    \ você nota,\nnão mais de 200 jardas a frente, a infernal estrutura que é a Fortaleza.\
    \  Você\nsussurra uma oração de agradecimento por existirem ainda algumas árvores\
    \ para\nservirem de esconderijo.   Ã\x89 melhor que os residentes do lugar não\
    \ saibam da\nsua presença.   Uma força incontrolável o obriga a fitar a Fortaleza\
    \ e você\ntenta resistir...é inútil.   A oeste está um pequeno córrego.   Ao norte\
    \ fica a\nclareira, ao sul há uma pequena trilha que leva a um pequeno abrigo\
    \ em ruínas."
  exits:
    east:
      target_vnum: 01010070729
    north:
      target_vnum: '01010070717'
    south:
      target_vnum: '01010070734'
    west:
      target_vnum: 01010070719
  local_id: '726'
  name: Na Sombra da Fortaleza
  vnum: '01010070726'
- description: 'Você encontrou uma parte da parede exterior. As árvores foram podadas,

    fazendo um caminho ao redor do lugar que pertence à Senhora do Vazio interior,

    ao sul você vê o que parecem ser os portões principais.   Ao norte a parede

    desaparece na escuridão da Floresta Sombria.'
  exits:
    north:
      target_vnum: '01010070730'
    south:
      target_vnum: 01010070728
    west:
      target_vnum: '01010070717'
  local_id: '727'
  name: Contra a Parede
  vnum: '01010070727'
- description: 'Você encontrou uma parte da parede exterior.  As árvores foram podadas,

    fazendo um caminho ao redor do lugar que pertence à Senhora do Vazio

    interior, ao sul você vê o que parecem ser os portões principais.  Ao norte

    a parede desaparece na escuridão da Floresta Sombria.'
  exits:
    north:
      target_vnum: '01010070727'
    south:
      target_vnum: 01010070729
    west:
      target_vnum: '01010070706'
  local_id: '728'
  name: Contra a Parede
  vnum: 01010070728
- description: 'Você alcançou o Portão da Fortaleza de Ivian.  As altas e negras paredes
    de

    granito são bastante lisas.  O Portão é enorme, feito de ferro, brazonado com

    o símbolo da roda triangular.  Apenas as mais bravas almas considerariam

    entrar neste lugar terrível.  Há um portão ao leste.'
  exits:
    east:
      target_vnum: '01010070750'
    north:
      target_vnum: 01010070728
    west:
      target_vnum: '01010070726'
  local_id: '729'
  name: O Portão Frontal
  vnum: 01010070729
- description: 'Você encontrou uma parte da parede exterior.  As árvores foram podadas,

    fazendo um caminho ao redor do lugar que pertence à Senhora do Vazio interior,

    ao sul você vê o que parecem ser os portões principais.  Ao norte a parede

    desaparece na escuridão da Floresta Sombria.'
  exits:
    north:
      target_vnum: '01010070731'
    south:
