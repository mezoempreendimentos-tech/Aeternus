- description: Você está em uma sala com 10.000 pilares de mármore. Tenha um bom dia.
  exits:
    east:
      target_vnum: 01010070768
    south:
      target_vnum: '01010070766'
  local_id: '769'
  name: A Sala de 10.000 Pilares
  vnum: 01010070769
- description: 'Esta é a câmara de observação no topo da torre de observação.  Há
    um grande

    telescópio montado próximo à parede, proporcionando uma bela visão.  O centro

    da câmara possui uma robusta mesa de carvalho com uma modesta coleção de mapas

    e desenhos.  Uma escadaria em espiral conduz para baixo.'
  exits:
    down:
      target_vnum: 01010070759
  local_id: '770'
  name: A Câmara de Observação
  vnum: '01010070770'
