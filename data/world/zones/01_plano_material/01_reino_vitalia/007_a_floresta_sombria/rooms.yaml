- description: 'Você está em uma colina que tem uma vista para uma densa floresta
    de

    carvalhos.   O desprezo sopra em seu rosto, na forma de uma brisa fria.   No

    meio da floresta, despontando em meio as árvores está o pináculo da Fortaleza.

    O símbolo da roda triangular está em um dos lados da torre, para ser visto por

    todos.  Um caminho segue a leste para dentro da floresta.'
  exits:
    east:
      target_vnum: '01010070701'
    south:
      target_vnum: 01010080832
  local_id: '700'
  name: A Colina Perto da Floresta Sombria
  vnum: '01010070700'
- description: 'Um vento congelante vem de dentro da floresta.   Você está perto das
    árvores

    externas que revestem duas trilhas que levam ao coração da floresta.   Sua

    imaginação pode apenas esboçar os terrores malditos que o aguardam.

    Lembre-se: Você foi avisado!'
  exits:
    east:
      target_vnum: '01010070702'
    west:
      target_vnum: '01010070700'
  local_id: '701'
  name: Do Lado de Fora da Floresta Sombria
  vnum: '01010070701'
- description: 'Um pouco de luz penetra na folhagem da floresta.   Quase nenhuma planta

    ocupa o chão duro e rochoso.   Continuando adiante nesta floresta condenada,

    você logo estará em total escuridão.   De vez em quando uma assombrosa risada

    diabólica chega a seus ouvidos.   Isto faz calafrios percorrerem sua espinha.

    Você pode ver uma trilha ao sul e ao leste.   Ao norte há uma cabana.

    Ou você pode fugir daqui...'
  exits:
    east:
      target_vnum: '01010070707'
    north:
      target_vnum: '01010070703'
    south:
      target_vnum: '01010070704'
    west:
      target_vnum: '01010070701'
  local_id: '702'
  name: Os Arredores da Floresta Sombria
  vnum: '01010070702'
- description: 'Você está em uma cabana na floresta.   O tempo não foi gentil com
    esta

    estrutura.   Os troncos que compõem as paredes estão começando a apodrecer e

    pequenas aberturas nas paredes podem ser vistas.   O chão é de terra áspera.

    Quem quer que seja que tenha morado aqui, parece ter abandonado há muito tempo.

    Mas se você se aproximar, pode achar algo útil.'
  exits:
    south:
      target_vnum: '01010070702'
  local_id: '703'
  name: Uma Cabana Deserta
  vnum: '01010070703'
- description: 'A trilha seguida por você o levou a lugar algum.   Freqüentemente
    você pensa

    ver algum movimento atrás das árvores com o canto de seu olho.   Enquanto você

    olha ao redor, uma risada maléfica chega a seus ouvidos, ecoando pelas árvores,

    simplesmente se recusando a morrer. Você sente uma gota de suor escorrer pela

    sua nuca.'
  exits:
    north:
      target_vnum: '01010070702'
    south:
      target_vnum: '01010070705'
  local_id: '704'
  name: A Floresta Sombria
  vnum: '01010070704'
- description: Você está na Floresta Sombria.   Tenha um Bom Dia.
  exits:
    east:
      target_vnum: '01010070710'
    north:
      target_vnum: '01010070704'
    south:
      target_vnum: '01010070706'
  local_id: '705'
  name: A Floresta Sombria
  vnum: '01010070705'
- description: 'Você saiu da trilha que seguia e agora esta DESESPERADAMENTE PERDIDO!


    Não fique com medo.  EXISTE uma saída mas, será que você consegue encontrar?'
  exits:
    south:
      target_vnum: '01010070720'
  local_id: '706'
  name: Desesperadamente Perdido
  vnum: '01010070706'
- description: 'Esta é a maior árvore da floresta.   Ela é bem alta.   O limbo áspero
    se

    pendura dos galhos como ávidas mãos prontas para lhe estrangular até que o

    sangue comece a sair de sua boca.   Nas raízes jaz um herói.   Seu corpo está

    em decomposição mas a causa de sua morte é bastante óbvia.   O tolo herói fora

    decapitado.'
  exits:
    east:
      target_vnum: '01010070712'
    north:
      target_vnum: 01010070708
    west:
      target_vnum: '01010070702'
  local_id: '707'
  name: O Grande Carvalho
  vnum: '01010070707'
- description: 'As árvores se tornam mais largas pela frente.   Você tem que se espremer

    para seguir adiante.   Freqüentemente as árvores carregam antigas manchas de

    sangue em seus troncos.'
  exits:
    north:
      target_vnum: 01010070709
    south:
      target_vnum: '01010070707'
    west:
      target_vnum: '01010070706'
  local_id: '708'
  name: O Denso Bosque
  vnum: 01010070708
- description: "Você descobriu uma porção da parede exterior da Fortaleza de Ivian.\
    \  Ã\x81rvores\nao seu redor o impedem de explorar a parede, que é uma imponente\
    \ massa de\ngranito frio, negro e liso.   Assim que você se aproxima desta vil\
    \ Fortaleza,\nsua alma sabe que este não é um bom lugar para ser pego."
  exits:
    south:
      target_vnum: 01010070708
  local_id: '709'
  name: Caminho Sem Saída
  vnum: 01010070709
- description: 'Esta raquítica ponte coberta, cobre um bom pedaço do chão da floresta.

    Iluminada apenas por duas lanternas enferrujadas que saem de cavidades na

    parede.   Este lugar parece fornecer proteção dos frios ventos comuns da

    Floresta Sombria.   Você não sabe por que mas pelo menos aqui você pode

    encontrar alguma proteção dos males da floresta.'
  exits:
    down:
      target_vnum: '01010070711'
    east:
      target_vnum: 01010070719
    west:
      target_vnum: '01010070705'
  local_id: '710'
  name: A Ponte
  vnum: '01010070710'
- description: 'Você está em um desfiladeiro rochoso debaixo da ponte.   Vegetações
    esparsas

    crescem pelo solo intemperado.   A natureza criou declives que fazem da

    passagem, difícil.   Você pode imaginar que este lugar rapidamente se alaga

    com uma chuva mais forte.   Você espera que isto não aconteça enquanto você

    estiver aqui.'
  exits:
    south:
      target_vnum: '01010070733'
    up:
      target_vnum: '01010070710'
  local_id: '711'
  name: Debaixo da Ponte
  vnum: '01010070711'
- description: 'Quanto mais fundo você alcança, mais você duvida da sanidade de sua
    escolha.

    Mas você sabe que há grandes riscos em voltar.'
  exits:
    east:
      target_vnum: '01010070715'
    south:
      target_vnum: '01010070713'
    west:
      target_vnum: '01010070707'
  local_id: '712'
  name: Mais Fundo na Floresta Sombria
  vnum: '01010070712'
- description: 'O que este lugar está fazendo aqui? Iluminadas por algumas tochas,
    pessoas

    dançam pela noite ao som de uma música (??), ensurdecedora e diabólica que

    parece vir de lugar algum.   Você começa a duvidar de sua sanidade...'
  exits:
    north:
      target_vnum: '01010070712'
    south:
      target_vnum: '01010070714'
  local_id: '713'
  name: O Palácio das Ilusões
  vnum: '01010070713'
- description: 'Você agora está na pista de dança deste palácio infernal.   A luminosidade

    mal chega aqui, você está cercado de corpos, aparentemente sem vida, que se

    movimentam freneticamente ao som de assustadores ruídos que começam a ferir

    seus ouvidos.'
  exits:
    north:
      target_vnum: '01010070713'
    south:
      target_vnum: 01010070718
    west:
      target_vnum: '01010070744'
  local_id: '714'
  name: A Pista de Dança
  vnum: '01010070714'
- description: 'No coração da floresta, as coisas estão estranhamente calmas.   Mas
    a

    calmaria sempre precede a tormenta.   Na terra fofa, você vê claramente pegadas

    de um quadrúpede: um cavalo.   Ao redor das pegadas, o solo está chamuscado.

    Olhando em volta há alguns sinais de luta.   Alguém apostou tudo contra o que

    quer que seja que deixou as pegadas.   E perdeu.'
  exits:
    east:
      target_vnum: '01010070716'
    north:
      target_vnum: '01010070743'
    west:
      target_vnum: '01010070712'
  local_id: '715'
  name: O Sombrio Coração da Floresta
  vnum: '01010070715'
- description: 'As árvores abrem uma clareira aqui.   Há um enervante silêncio ao
    redor.

    Você olha para a clareira a medida que se aproxima e a reconhece pelo que ela
    é.

    Um matadouro.   Suas botas esmagam esqueletos decapitados de algumas criaturas

    infelizes.'
  exits:
    east:
      target_vnum: '01010070717'
    north:
      target_vnum: '01010070706'
    west:
      target_vnum: '01010070715'
  local_id: '716'
  name: Se Aproximando da Clareira
  vnum: '01010070716'
- description: 'Você está em uma clareira. A grama alcança seu joelho, embora ela
    tenha sido

    pisoteada em alguns lugares onde alguma criatura infeliz foi perseguida por

    algo realmente mal.   O vento chicoteia o mato, formando ondas através da grama.

    Lá fora o vento ruge e pode-se ouvir um gemido insano, maldito, que faz os pêlos
    de

    seu corpo se arrepiarem.'
  exits:
    east:
      target_vnum: '01010070727'
    north:
      target_vnum: '01010070742'
    south:
      target_vnum: '01010070726'
    west:
      target_vnum: '01010070716'
  local_id: '717'
  name: A Clareira Gramínea
  vnum: '01010070717'
- description: "Neste pequeno alongamento da pista de dança, algumas pessoas (se é\
    \ que se\npode chamar estes corpos de pessoas) se aglomeram.   Ao se aproximar,\
    \ você\npode notar um corpo ainda quente, de um homem em sua armadura de prata,\
    \ sendo\nbrutalmente esquartejado. Ã\x89 hora da Festa!"
  exits:
    north:
      target_vnum: '01010070714'
  local_id: '718'
  name: Hora da Festa!
  vnum: 01010070718
- description: "Você caminha através de um pequeno fluxo de água, que silenciosamente\
    \ varre\nas folhas mortas e outros pequenos escombros.   Ã\x89 uma pena que ela\
    \ não possa\nvarrer seu medo e tremor.   Você pode seguir ao leste daqui ou fugir\
    \ para o\noeste, para a segurança da ponte.   Outra opção é seguir este pequeno\
    \ rio até\no fim."
  exits:
    east:
      target_vnum: '01010070726'
    south:
      target_vnum: '01010070746'
    west:
      target_vnum: '01010070710'
  local_id: '719'
  name: "Um Pequeno Fluxo de Ã\x81gua"
  vnum: 01010070719
