- description: "VocÃª protege seu pescoÃ§o do vento frio que sopra aqui.   Ã\x89 quando\
    \ vocÃª nota,\nnão mais de 200 jardas a frente, a infernal estrutura que é a Fortaleza.\
    \  Você\nsussurra uma oração de agradecimento por existirem ainda algumas árvores\
    \ para\nservirem de esconderijo.   Ã\x89 melhor que os residentes do lugar nÃ£o\
    \ saibam da\nsua presença.   Uma força incontrolável o obriga a fitar a Fortaleza\
