- description: |-
    Um enorme bloco de pedra parece ter forma humana. Ele é forte o bastante
    para explodir qualquer coisa que tente passar por aqui.
  keywords:
  - homem
  - rocha
  - obsidiana
  name: um homem de rocha obsidiana
  vnum: '4800'
- description: |-
    Ele não tem mais de cinco pés de altura. Porém com seus guardiões ao seu
    lado, não necessita de estatura para impressiona-lo. Sua pele é
    cor-de-leite e seus olhos negros como carvão. Ele não tem nenhum cabelo
    na cabeça.
  keywords:
  - homem
  - palido
  name: o homem pálido
  vnum: '4801'
- description: |-
    Ela parece um peixe gigante e inteligente, com cerca de vinte pés de
    comprimento, sua pele é verde azulada com manchas de cor cinza.
  keywords:
  - mae
  - aboleth
  name: uma mãe aboleth
  vnum: '4802'
- description: Ele se parece com sua mãe porém é menor e não tem manchas cinza.
  keywords:
  - bebe
  - aboleth
  name: um bebê aboleth
  vnum: '4803'
- description: |-
    Seus olhos são vermelhos como brasas e suas presas estão prontas para o
    ataque.
  keywords:
  - largo
  - morcego
  name: um largo morcego
  vnum: '4804'
- description: |-
    Ele é um monte de carne podre e sangrenta que não tem cérebro e sabe
    apenas trabalhar.
  keywords:
  - escravo
  - imundo
  name: um escravo imundo
  vnum: '4805'
- description: |-
    Essa coisa parece um gigante com dentes. Anda de um lado para o outro
    procurando por restos perdidos em batalhas.
  keywords:
  - reptil
  - carnicento
  name: um réptil carnicento
  vnum: '4806'
- description: |-
    Ele parece um contemplador, com varios olhos e tentáculos. Você se sente
    desconfortavel quando encarca um dos olhos.
  keywords:
  - beijo
  - morte
  name: o beijo da morte
  vnum: '4807'
- description: |-
    Essa coisa não parece desejar intrusos. Ele é bastante ágil e está pronto
    para atacar...
  keywords:
  - chefe
  - bugbear
  name: o chefe bugbear
  vnum: '4808'
- description: |-
    Parece que o seu fim está próximo, ele decidiu matar você. Ele parece muito
    com os outros bugbears porém mais largo e com presas maiores.
  keywords:
  - lider
  - bugbear
  name: o líder bugbear
  vnum: '4809'
- description: Parece que esse bugbear sabe ler alguma coisa. Ele está lendo um Tomo
    Antigo.
  keywords:
  - bugbear
  - xama
  name: o bugbear Xamã
  vnum: '4810'
- description: |-
    Essa abominão da natureza geralmente descansa no escuro, em lugares
    fedorentos e semelhantes ao inferno. Vive mandando criaturas para a ilha
    da destruição.
  keywords:
  - criatura
  - profundezas
  name: a criatura das profundezas
  vnum: '4811'
- description: |-
    Dizem que esta criatura mística é nascida das sombras mais profundas e
    escuras. Ela é uma mistura de todos os horrores existentes na mente dos
    X'Raantra's.
  keywords:
  - feyr
  - dorminhoco
  name: um feyr dorminhoco
  vnum: '4812'
- description: |-
    Você tem a impressão de que esta estatua está viva. Suas garras estão
    mesmo se movendo?
  keywords:
  - gargula
  name: um gárgula
  vnum: '4813'
- description: |-
    Ele está curvado, abraçando os joelhos. Sua cabeça esta abaixada, de
    qualquer forma, parece que um dos olhos está encarando você.
  keywords:
  - gargula
  name: o gárgula
  vnum: '4814'
- description: |-
    Esse uivante, berrador e barulhento corcunda parece ameaçado, de qualquer
    forma nunca se sabe.
  keywords:
  - corcunda
  name: um corcunda
  vnum: '4815'
- description: |-
    Isso parece um giganteso touro com chifres como os de um minotauro.  Na
    realidade ele é um minotauro, porém o corpo não parece com o de um humano.
  keywords:
  - monstro
  name: o monstro
  vnum: '4816'
- description: |-
    Ele esta vestido com alguns trapos imundos e esfarrapados, o resto do corpo
    está coberto por asquerosos cabelos longos e pretos. A pele é toda cinzenta
    e escamosa.
  keywords:
  - diabinho
  name: um diabinho
  vnum: '4817'
- description: |-
    Ela é gigantesca, com aproximadamente nove pés de altura e bastante
    pesada.  Parece um cruzamento de homem e fantasma, suas garras podem
    arranhar e causar dor.
  keywords:
  - assombracao
  name: uma assombração
  vnum: '4818'
- description: |-
    Ele nao é nada mais que um monte de argila marrom no chão da caverna,
    entretanto emana um poder que esta sugando todo o calor deste local.  Está
    se movendo constantemente e seus braço parecem tentáculos prontos para
    ferir quem incomoda-lo.
  keywords:
  - monte
  - argila
  name: um monte de argila
  vnum: '4819'
- description: |-
    Ele não é tão largo - tem cerca de quatro pés de largura, mas não aparenta
    ter muita força. Ele deve estar esperando uma oportunidade para atacar.
  keywords:
  - homem
  - argila
  name: um homem de argila
  vnum: '4820'
- description: |-
    Ele está coberto com uma pele grossa, suas sobrancelhas sobem e descem
    deixando-o com uma aparência assustadora.
  keywords:
  - membro
  - bugbear
  name: um membro bugbear
  vnum: '4821'
- description: |-
    Ele provavelmente está tentando descobrir que tipo de homem tolo entraria
    no esconderijo de um Dragão.
  keywords:
  - dragao
  - profundezas
  name: o Dragão das profundezas
  vnum: '4822'
