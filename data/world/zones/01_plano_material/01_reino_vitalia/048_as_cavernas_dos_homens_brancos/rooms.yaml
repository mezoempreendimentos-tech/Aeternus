  local_id: '4882'
  name: Câmara de Espera
  vnum: 01010484882
- description: 'O salão continua a leste até o trono.  Nos cantos algumas criaturas

    esperam a chance de fazer um pedido ao Homem Pálido.'
  exits:
    east:
      target_vnum: 01010484884
    north:
      target_vnum: 01010484881
    south:
      target_vnum: 01010484886
    west:
      target_vnum: 01010484880
  local_id: '4883'
  name: Entrando na Câmara
  vnum: 01010484883
