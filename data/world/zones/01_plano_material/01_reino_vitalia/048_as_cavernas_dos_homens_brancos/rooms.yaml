  local_id: '4887'
  name: Câmara de Espera
  vnum: 01010484887
- description: 'Essa caverna é muito aberta.  E continua se abrinto até se tornar

    circular.  Uma câmara pequena ao sul não parece convidativa, entretanto

    nada impede de dar uma olhada.'
  exits:
    east:
      target_vnum: 01010484890
    south:
      target_vnum: 01010484889
    west:
      target_vnum: 01010484876
  local_id: '4888'
  name: A Caverna Ampla
  vnum: 01010484888
- description: 'Talvez não tenha sido boa idéia dar uma espiada.  A terrível criaturinha

    que mora neste lugar não parece nada hospedeira, e se ela não está aqui

    agora, pode voltar a qualquer instante.'
  exits:
    north:
      target_vnum: 01010484888
  local_id: '4889'
  name: A Câmara do Diabinho
