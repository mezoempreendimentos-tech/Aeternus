  vnum: '01010707007'
- description: |-
    O homúnculo aparenta ter uma forma humana, uns 5 metros de altura, tem uma
    pele de réptil esverdeada, asas rígidas e uma boca de morcego, com dentes
    que parecem ser venenosos.
  keywords:
  - homuncula
  - criatura
  long_desc: A criatura homúncula está aqui, olhando para você maliciosamente.
  name: a criatura homúncula
  vnum: 01010707008
- description: |-
    Ele é um monstro de cinco pés de altura, meio homem meio rato.  Ele respira
    fortemente enquanto aproxima-se de você.
  keywords:
  - morkot
  - sombrio
  long_desc: O morkot está aqui, esperando por alguém para MATAR!
  name: o morkot sombrio
  vnum: 01010707009
- description: |-
    A cabeça e o dorso do chr-eff'n é coberto de cobre, e tem olhos amarelos
    brilhantes.  A parte de baixo tem uma cor alaranjada.
  keywords:
  - chr-eff'n
  - chreffn
  long_desc: O chr-eff'n está rastejando aqui, procurando algo com seus olhos amarelos.
  name: o demônio chr-eff'n
  vnum: '01010707010'
- description: "O dragão vermelho encara você, raivosamente, como se estivesse aguardando\
    \ a\nsua chegada.  Ele diz 'Oh humano, VOCÃ\x8A me acordou...Hssss', enquanto\
    \ move-\nse para perto de você, 'Eu NUNCA posso dormir em paz...Hssss...'"
  keywords:
  - dragao
  - vermelho
  long_desc: O feroz dragão vermelho encara você, raivosamente.
  name: o dragão vermelho
  vnum: '01010707040'
- description: |-
    A bruxa do mar é tão horripilante que você sente um medo profundo: Grandes
    olhos amarelos e dentes afiados.  Suas orelhas são muito grandes, e ela tem
    pequenos chifres afiados.  Esse tipo de monstro é um dos grandes inimigos
    da beleza.
  keywords:
  - bruxa
  - mar
  long_desc: Uma bruxa do mar está nadando aqui.
  name: a bruxa do mar
  vnum: '01010707041'
- description: |-
    O naga é uma criatura com aparência de cobra.  Ela é coberta por escamas
    verde-ouro e com triângulos prateados em suas costas.  Seus olhos são
    dourados.  Ela nota que você está olhando fixamente para ela, então ela diz
    'Saia daqui.  Este caminho leva a criaturas malignas.'
  keywords:
  - naga
  - guardiao
  long_desc: A guardiã naga parece gostar de você.
  name: a guardiã naga
  vnum: '01010707042'
- description: |-
    O basilisco é um monstro reptiliano.  Ele tem oito patas, e fortes
    mandíbulas.  Ele é amarronzado com umas pintas amarelas.  Seus olhos são
    verde pálido.
  keywords:
  - basilisco
  - escamoso
  long_desc: O basilisco escamoso rasteja em sua direção, vagarosamente.
  name: o basilisco escamoso
  vnum: '01010707043'
- description: |-
    Ela parece, vagamente, uma bolha humana.  Grandes olhos negros, e uma boca
    com um pedaço que escapa do rosto.  A lêmure não parece interessada em você
    mas ela ataca de qualquer jeito.  Parece que a mente dela foi queimada.
  keywords:
  - bolha
  - lemure
  long_desc: A bolha lêmure desliza para perto de você preparando um ataque!
  name: a lêmure
  vnum: '01010707044'
- description: |-
    Numa primeira olhada você pensa que Jones é um Orc, mas quando ele chega
    mais perto você vê sua segunda cabeça.  Ele veste uma pele de animal como
    roupa, imunda e comida pelas traças.  Jones realmente fede...
  keywords:
  - jones
  - esmagador
  - ettin
  long_desc: Jones está em pé aqui espantado com você.
  name: Jones 'esmagador' ettin
  vnum: '01010707045'
- description: |-
    Quando você olha para Herald, você sente pena.  Suas roupas são realmente
    pobres, e uma de suas cabeças está pendurada.  Na corda que circunda sua
    cintura estão vários ratos e camundongos mortos.  Ele não cheira bem.
  keywords:
  - herald
  - rato
  - assassino
  - ettin
  long_desc: Herald está aqui parecendo meio confuso com a sua presença.
  name: Herald 'o assassino de ratos' ettin
  vnum: '01010707046'
