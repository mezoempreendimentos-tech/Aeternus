- description: |-
    Ele parece ter vindo de um filme de terror.  Ele realmente parece ser uma
    extaordinária figura feita de lama e ele parece ter comido uma alma humana
    no café da manhã e está com a intenção de comer o mesmo no jantar.
    - Que tal você?
  keywords:
  - monstro
  - lamacento
  - lama
  long_desc: Um horripilante Monstro lamaçento está, vagarosamente, surgindo da lama...
  name: o horripilante Monstro lamaçento
  vnum: '01010707000'
- description: |-
    Você nunca tinha visto, durante toda sua vida um morcego tão pequeno.   Você
    prefere que ele continue assim, pacífico, pendurado lá, dormindo.  Seus
    ossos gelam só de você pensar em acordar essa cruel criatura.
  keywords:
  - morcego
  - pequeno
  - ameacador
  long_desc: |-
    Um pequeno, porém ameaçador, morcego está pendurado no teto, obviamente
    dormindo.
  name: o pequeno morcego
