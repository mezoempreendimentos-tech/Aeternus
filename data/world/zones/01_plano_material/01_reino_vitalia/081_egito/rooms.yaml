  name: O Mercado de Iguarias
  vnum: 01010818124
- description: 'Eis uma construção ENORME feita de gigantescos blocos de pedra.Você
    se

    pergunta o quanto pesaria aquela edificação fabulosa erguida com o suor e o

    sangue dos súditos do faraó.  E nem ousa imaginar quantos sofreram e

    morreram por ela.'
  exits:
    south:
      target_vnum: 01010818121
    up:
      target_vnum: 01010818132
  local_id: '8125'
  name: A Entrada da Pirâmide
  vnum: 01010818125
- description: 'O lugar tem um ar misterioso, a atmosfera te convida a ficar..  O
    lugar

    eh no mínimo inusitado e extremamente atraente.'
  exits:
    west:
      target_vnum: 01010818123
  local_id: '8126'
  name: A Pequena Loja de Mágica
  vnum: 01010818126
- description: 'O imenso salão tem enormes colunas douradas e paredes decoradas em

    lápis-lazuli.  No centro você vê um trono de ouro maciço ornado com pedras

    preciosas.  Nele sentado, cercado por cortesãos, criados e escravos está

    o representante dos deuses na terra, o faraó!  A oeste você nota uma

    enorme porta de madeira maciça esculpida com motivos egípcios.'
  exits:
    east:
      target_vnum: 01010818123
    west:
      target_vnum: 01010818136
  local_id: '8127'
  name: A Sala do Faraó
  vnum: 01010818127
- description: 'Este corredor parece infindável com as suas incontáveis e misteriosas

    portas fechadas.

    Somente com muita sorte você encontrará a saída.'
