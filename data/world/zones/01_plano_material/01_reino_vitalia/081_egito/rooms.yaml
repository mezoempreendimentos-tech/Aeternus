- description: "Ã\x89 definitivamente uma rua agitada.  Você vê escravos sendo açoitados\
    \ por\nseus donos e mulheres carregando seus filhos.  A leste você pode ver a\n\
    cidade de Tebas com suas enormes construções."
  exits:
    east:
      target_vnum: 01010818121
    south:
      target_vnum: 01010818108
  local_id: '8120'
  name: O Alto Egito
  vnum: 01010818120
- description: 'Você nota que as as casas de barro tomam quase toda a rua; crianças,

    mulheres e homens passam apressados; você já começa a se sentir um intruso,

    mas, para seu alívio, eles parecem ocupados demais para notar sua presença.

    A leste você avista o mar e uma leve brisa marinha vem acariciar seu rosto.

    Ao norte você avista uma enorme construção.'
  exits:
    east:
      target_vnum: 01010818122
    north:
      target_vnum: 01010818125
    west:
      target_vnum: 01010818120
  local_id: '8121'
  name: Tebas
  vnum: 01010818121
- description: 'Na água você nota enorme quantidade de algas, o que pode dificultar
    sua

    navegação por aqui.  Ao redor você não vê mais nada a não ser água e mais

    água...  De cor avermelhada, uma vista estonteante!  Você poderia fitar o

    horizonte por horas seguidas.'
  exits:
    west:
      target_vnum: 01010818121
  local_id: '8122'
  name: O Mar Vermelho
  vnum: 01010818122
- description: 'Nossa, que barulho!  Vendedores gritam oferecendo suas iguarias de

    origem duvidosa e de qualidade mais incerta ainda.  Você pode ver mercadores

    de escravos, mulheres cheias de jóias, crianças roubando frutas e é tudo o

    que pode distingüir no meio da multidão.  Mas cuidado com seus pertences

    pois os vendedores não parecem ser únicos ladrões daqui.  A oeste você vê

    uma enorme construção.'
  exits:
    down:
      target_vnum: 01010818112
    east:
      target_vnum: 01010818126
    north:
      target_vnum: 01010818213
    south:
      target_vnum: 01010818160
    west:
      target_vnum: 01010818127
  local_id: '8123'
  name: O Mercado de Iguarias
  vnum: 01010818123
