  name: Uma Sacada
  vnum: 01010818146
- description: 'Os ministros governam a cidade deste prédio, sob a autoridade suprema
    do

    faraó.  Daqui mantém a ordem e impõe duros impostos ao povo.'
  exits:
    east:
      target_vnum: 01010818138
    west:
      target_vnum: 01010818152
  local_id: '8147'
  name: O Prédio do Governo
  vnum: 01010818147
- description: 'Sim, aqui é um banco; ou algo assim.  Deixar seu dinheiro nem sempre
    é

    seguro, pois é sempre sujeito a assaltos de ladrões ou confiscos do

    governo.  E isto lhe faz imaginar: afinal que diabos é seguro neste lugar

    ?!?'
  exits:
    north:
      target_vnum: 01010818138
  local_id: '8148'
  name: O Banco
  vnum: 01010818148
- description: 'Hum...  Finalmente um lugar calmo e pacífico onde o ar não chega a
    ser

    puro mas algumas árvores lhe dão frescor.  Há poucas pessoas ao redor e

    pássaros voam livremente.'
  exits:
    north:
      target_vnum: 01010818138
  local_id: '8149'
  name: Uma Praça
  vnum: 01010818149
