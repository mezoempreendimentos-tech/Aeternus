- description: 'Você se sente caindo em um enorme calabouço de cheiro fétido e pareces
    imundas.


    você cai

    .

    .

    .

    BLAFT

    E finalmente se estatela no chão sentindo seus ossos quebrarem-se, um

    gosto acre de sangue na garganta, dor, muita dor...  Adeus mundo cruel!'
  exits: {}
  local_id: '8131'
  name: O calabouço
  vnum: 01010818131
- description: 'O cheiro de mofo lhe sufoca; nao é um lugar agradável; a luz inexiste

    mas você se sente observado e assustado.  O lugar parece um labirinto e você

    reza para lembrar o caminho de volta.'
  exits:
    down:
      target_vnum: 01010818125
    east:
      target_vnum: 01010818145
    north:
      target_vnum: 01010818140
  local_id: '8132'
  name: Dentro da Pirâmide
  vnum: 01010818132
- description: 'Se é que este buraco pode ser chamado de sala...  Você percebe uma

    estranha movimentação na escuridão ao redor.  Há um sarcófago no qual por

    sorte você ainda não entrou.  O cheiro nauseabundo ainda lhe incomoda e o ar

    parece ser mais escasso.'
  exits:
    west:
      target_vnum: 01010818145
  local_id: '8133'
  name: A Sala Principal
  vnum: 01010818133
- description: "Ã\x89 uma ponte em ruínas que não inspira segurança alguma.  Sua origem\n\
    perde-se no tempo.  Por certo já passaram por ela senhores em liteiras\nconduzidas\
    \ por escravos, bestas carregadas de mercadorias, homens e\nanimais na labuta\
    \ diária.  Mas hoje, suas cordas rotas e seu madeirame\npodre mal permitem tocá-las\
    \ em passos vacilantes."
  exits:
    down:
      target_vnum: 01010818135
    east:
      target_vnum: 01010818135
    north:
      target_vnum: 01010818118
    south:
      target_vnum: 01010818213
  local_id: '8134'
  name: A Ponte
  vnum: 01010818134
- description: 'Você pensa: ih, caminho errado!

    você despenca em queda livre.... cai


    cai


    cai


    cai


    cai


    PLAFT!!

    Isso realmente doeu!'
  exits: {}
  local_id: '8135'
  name: O Abismo
  vnum: 01010818135
- description: 'Tudo parece reluzir nessa sala dourada; a luz do sol entra por uma

    janela deixando a sala mais iluminada ainda.  Dois sentinelas guardam a

    entrada da sala, e no centro dela está um divã onde uma linda mulher lhe

    observa.  Sua beleza é hipnótica.'
  exits:
    east:
      target_vnum: 01010818127
    west:
      target_vnum: 01010818128
  local_id: '8136'
  name: Aposentos de Nefertiti
  vnum: 01010818136
- description: 'Você percebe inúmeros instrumentos de tortura pela sala; há sangue
    no

    chão e nas paredes.  Você não quer ficar nem mais um minuto naquele lugar

    pois o cheiro pútrido que emana de um dos cantos da sala lhe sufoca.'
  exits:
    north:
      target_vnum: 01010818128
  local_id: '8137'
  name: A câmara do carrasco
  vnum: 01010818137
- description: "Ã\x89 a capital do reino, centro de todo o poder militar e religioso,\
    \ e sem\ndúvida sua cidade mais movimentada.  Ã\x89 quase impossível transitar\
    \ por suas\nruas, a multidão segue em todas as direções e você facilmente pode\
    \ se\nperder sem nada notar."
  exits:
    north:
      target_vnum: 01010818149
    south:
      target_vnum: 01010818148
    west:
      target_vnum: 01010818147
  local_id: '8138'
  name: Mênfis
  vnum: 01010818138
- description: 'Há dezenas de pessoas aqui, espremendo-se e acotovelando-se; não há

    mobílias, e pode-se entender o porquê.'
  exits:
    south:
      target_vnum: 01010818128
  local_id: '8139'
  name: A sala dos criados
  vnum: 01010818139
