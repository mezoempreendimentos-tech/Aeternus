    \ que ele\nexala."
  keywords:
  - embalsamador
  name: o embalsamador
  vnum: '8126'
- description: |-
    Ele segura em uma de suas mâos um pequeno frasco de natrão e na outra as
    vísceras de algum infeliz.  Sua face revela a loucura e o frieza de seu
    coração.
  keywords:
  - ajudante
  - embalsamador
  name: o ajudante de embalsamador
  vnum: '8127'
- description: |-
    Nefertiti, a rainha e consorte de Akhenaton, é uma jovem de beleza
    inigualável.  Seus olhos são de profundo negro com longas e espessas
    pestanas, fazendo par com carnudos lábios vermelhos dispostos em um rosto
    perfeito.  "A bela que chegou" é o significado de seu nome e perfeitamente
    descreve ela que é uma das mulheres mais belas e influentes dessa época.
  keywords:
  - nefertiti
  name: Nefertiti
  vnum: '8128'
- description: Ele é apenas um garoto sorridente sempre pronto para ajudar.
  keywords:
  - pajem
  name: o pajem
  vnum: '8129'
- description: Parece que ele ficaria eternamente em pé aqui. E sem reclamar...
  keywords:
  - eunuco
  name: o eunuco
  vnum: '8130'
- description: |-
    O criado veste roupas simples, o que combina perfeitamente com sua natureza
    humilde.  Ele está um pouco atrapalhado pois tenta servir bem a todos.
  keywords:
  - criado
  name: o criado
  vnum: '8131'
- description: Ele não parece muito confiável, porém muito inteligente.
  keywords:
  - banqueiro
  name: o banqueiro
  vnum: '8132'
- description: |-
    Ele não parece ser confiável o bastante para guardar seu dinheiro mas,
    afinal, você não tem escolha.
  keywords:
  - tesoureiro
  name: o tesoureiro
  vnum: '8133'
- description: |-
    Ele é uma bela ave de pernas e bico longos.  A maioria de suas penas, muito
    brancas, parecem especialmente destacar as preciosas plumas de cor azul oceano.
  keywords:
  - ibis
  name: o íbis
  vnum: '8134'
- description: Esse gato negro aparenta ser muito esperto e corajoso.
  keywords:
  - gato
  name: o gato
  vnum: '8135'
- description: Você fica assustado com a agressividade desse pequeno escaravelho negro...
  keywords:
  - escaravelho
  name: o escaravelho
  vnum: '8136'
- description: Esse rato nojento está todo coberto com um espessa e fétida camada
    de lama.
  keywords:
  - rato
  name: o rato
  vnum: '8137'
- description: |-
    Khons é o deus egípcio da Lua.  Ele lhe conta porque não pode aparecer o mês
    inteiro em toda sua glória: uma vez, jogando senet contra Thot, Khons
    impensadamente apostou parte de sua luz.  Thot acabou ganhando o jogo e
    Khons teve de se contentar em, todo mês, mostrar aos poucos sua luz até que,
    atingindo seu auge, comece a minguar.
  keywords:
  - khons
  name: Khons
  vnum: '8138'
- description: |-
    Você está perante Imothep (ou pelo menos o que restou dele), o
    sumo-sacertode do faraó.  Totalmente envolto em bandagens, exatamente como
    uma múmia, ele parece ter ressurgido do mundo dos mortos para vingar sua
    morte trazendo as 7 pragas do Egito.
  keywords:
  - imothep
  name: Imothep
  vnum: '8139'
- description: |-
    Akhenaton, um homem muito alto e magro, é conhecido principalmente por ser o
    faraó que cultuava apenas um deus: Aton, o Sol.  Ao lado de sua mulher, a
    bela Nefertiti, Akhenaton mantêm a paz no Egito.
  keywords:
  - akhenaton
  name: Akhenaton
  vnum: '8140'
- description: Ele aparenta muito sangue-frio e agilidade.
  keywords:
  - ladrao
  - homem
  name: o ladrão
  vnum: '8141'
- description: Você mal o vê diante da escuridão.
  keywords:
  - tumbas
  - ladrao
  - ladrão
  name: o ladrão de tumbas
  vnum: '8142'
- description: |-
    Esse parece ser uma espécie muito rara de cordoniz pois, diferente da
    coloração cinzenta e marrom comum, essa ave possui penas multicoloridas que
    parecem emitir um discreto brilho.  O cordoniz parece muito compenetrado em
    sua busca por comida.
  keywords:
  - cordoniz
  name: um raro cordoniz
  vnum: '8143'
- description: |-
    Vestindo roupas que algum dia foram claras, esse homem parece procurar
    urgentemente, com sua lamparina, por uma saída.
  keywords:
  - explorador
  - homem
  name: o explorador
  vnum: '8144'
- description: |-
    Essa enorme cobra passa quase despercebida nas quentes areias do deserto:
    seu couro tem a tonalidade certa para a camuflar.  Tenha muito cuidado para
    não pisar nessa mortífera víbora do Saara.
  keywords:
  - vibora
  - víbora
  - cobra
  name: a víbora
  vnum: '8145'
- description: |-
    A pobre criança parece ter se perdido de sua mãe: chama-a incessantemente
    enquanto lágrimas desesperadas rolam por sua face corada.
  keywords:
  - crianca
  - egipcia
  name: a criança egípcia
  vnum: '8146'
- description: |-
    Você se sente hipnotizado pelos olhos dessa serpente: parecem de fogo, com
    seu brilho se tornando mais fraco ou mais intenso.  De sua boca parece sair
    algum tipo de ácido fétido, o que lhe inspira não só medo como também
    repugnância.
  keywords:
  - serpente
  name: a Serpente
  vnum: '8147'
- description: |-
    Ele aparenta ser um lojista honesto e confiável mesmo tendo uma enorme arma
    presa em sua cintura.
  keywords:
  - harirf
  name: Harirf
  vnum: '8148'
- description: |-
    Ela é uma linda mulher que já chegou na meia-idade.  De porte elegante e
    sorriso sincero, Rafertine oferece a você alguns de seus pães.
  keywords:
  - rafertine
  name: Rafertine
  vnum: '8149'
- description: |-
    Musedic, com sua aparência asquerosa, é dono de um olhar matreiro que
    desperta admiração.
  keywords:
  - musedic
  name: Musedic
  vnum: '8150'
- description: |-
    Exalando um insuportável cheiro de mofo e carne pútrida, essa múmia parece
    disposta a fazer-lhe algum mal.  Você não sabe se fica mais assustado com
    sua enorme figura envolta em bandagens ou com os ferozes urros que saem do
    que deve ser sua boca.
  keywords:
  - mumia
  name: a múmia
  vnum: '8151'
- description: |-
    Esse soldado de feições sérias parece muito concentrado na defesa do
    patrimônio de seu faraó.
  keywords:
  - soldado
  - egipcio
  name: um soldado egípcio
  vnum: '8152'
