- description: |-
    Um jovem meio-elfo de longos cabelos negros, Pilgoras é conhecido por sua
    mania de colecionar coisas.  Sua maior obsessão parece ser completar a
    coleção de CARDS, e dizem que ele só precisa de mais três cartas para isso.
    Nesse momento, Pilgoras está usando uma grande lupa para analizar alguns
    CARD's, talvez a procura de mais uma raridade.
  keywords:
  - pilgoras
  long_desc: |-
    Pilgoras, o maior colecionador de CARD's de Vitália, mal percebe sua
    aproximação, absorto com sua coleção.
  name: Pilgoras
  vnum: 01010383802
- description: |-
    Esse garoto anda pelo museu sem nem prestar muita atenção nas maravilhas ao
    seu redor.  O tempo todo ele abraça com força um fichário preto, como se
    dentro houvesse um precioso tesouro.
  keywords:
  - garoto
  long_desc: Um garoto está aqui, abraçado à sua coleção de cards.
