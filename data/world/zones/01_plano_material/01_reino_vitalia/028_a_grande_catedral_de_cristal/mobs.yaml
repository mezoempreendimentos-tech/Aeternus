- description: |-
    Sulatnat é um antigo sacerdote de Vitália que, por seus grandes feitos
    e infinita sabedoria, foi eleito pelos Deuses como o responsável pelos
    ofícios da Grande Catedral.  Sua idade é um grande mistério, já que sua
    aparência é a de alguém que viveu muito mais que a grande maioria jamais
    sonharia em viver.   Sua barba branquinha é tão comprida, que muitas
    vezes os mais distraídos chegam a pisá-la e seu cabelo tão alvo quanto
    os flocos de neve recém caídos.  Ele está usando um grande manto branco
    tão longo, que encobrem seus pés e arrastam pelo chão e sobre seu
    coração, há uma espécie de bordado, donde se destaca o Brasão de
    Vitália e algumas palavras indecifráveis aos olhos dos leigos:
    @y"V'tah alyia enam luvieri enam lu'lyia"@n.
  keywords:
  - sulatnat
  - sacerdote
  - profeta
  - celebrante
  long_desc: Sulatnat, o Profeta está aqui, murmurando indecifráveis palavras.
  name: Sulatnat, o Sacerdote Profeta
  vnum: '01010282800'
- description: |-
    Extremamente simpático e muito sorridente, este homem parece ser muito
    experiente em sua profissão.   Incansável e atento, procura servir a todos com
    delicadeza e prontidão.  Seu traje elegante e discreto, revela o caráter firme
    e sólido de alguém, que mesmo estando em serviço, continua sereno e feliz.
  keywords:
  - Horacio
  - mordomo
  long_desc: Um mordomo sorridente lhe oferece um canapé.
  name: Horácio, o mordomo
  vnum: '01010282802'
