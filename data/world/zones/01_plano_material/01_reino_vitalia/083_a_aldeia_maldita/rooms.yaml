- description: |-
    Você passou por aquela cerca e veio parar aqui.  Você só vê rochas,
    inclusive, está sobre uma!  Você ouve um barulho de uma cachoeira.
  exits:
    north:
      target_vnum: 01010838349
    south:
      target_vnum: 01010838346
  local_id: '8348'
  name: Além da Aldeia
  vnum: 01010838348
- description: "Ã\x89 realmente lindo!  Sua água cai de uma altura descomunal, fazendo\
    \ assim\num barulho estrondoso.  Talvez essa seja a água mais cristalina que você\n\
    já tenha visto.  Ela forma um lindo lago em constante movimento, você\nconsegue\
