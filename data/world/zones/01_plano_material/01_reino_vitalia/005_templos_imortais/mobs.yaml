- description: |-
    Em um tom austero o elemental da pureza fica parado esperando sua decisão.
    Com muita tranquilidade ele pergunta novamente, "Você está pronto para seguir
    a peregrinação pelo caminho da purificação?"
  keywords:
  - elemental
  - pureza
  long_desc: |-
    A pureza do elemental a sua frente, reflete mais sua força que sua
    ingenuidade.
  name: o Elemental da Pureza
  vnum: '01010050500'
- description: |-
    Ao olhar para esta figura, uma sensação de preenchimento invade o seu
