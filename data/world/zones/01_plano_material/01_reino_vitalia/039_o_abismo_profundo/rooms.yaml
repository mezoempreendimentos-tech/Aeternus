    \ sólida mobília de mármore, coberta com a mais fina seda lhe convida a\ndescansar.\
    \  Há um grande vaso de alabastro branco sobre a lareira, e nele,\npintado em\
    \ sangue, pode-se ler a palavra \"PrIsÃ\x83o\"."
