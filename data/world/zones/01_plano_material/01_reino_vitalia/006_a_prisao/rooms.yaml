- description: "Você está na entrada da prisão.  Ã\x89 uma forte construção, feita\
    \ de grandes\nblocos, presos por um tipo de cimento.  No alto da construção, vários\n\
    arqueiros estão prontos para atacar.  A leste você vê o deserto, e a oeste\nestá\
    \ o grande portão da prisão."
  exits:
    east:
      target_vnum: 01010949422
    west:
      target_vnum: '01010060601'
  local_id: '600'
  name: A Entrada Para a Prisão
  vnum: '01010060600'
- description: 'Você está no interior das grandes muralhas da prisão.  Não há nada
    em

    volta, apenas areia e grandes rochas espalhadas.  Curiosamente há uma abertura

    ao chão, com uma escada.  Será que a prisão mesmo está alí embaixo?  A leste

    está o portão da prisão.'
  exits:
    down:
      target_vnum: '01010060602'
    east:
      target_vnum: '01010060600'
  local_id: '601'
  name: Dentro da Prisão
  vnum: '01010060601'
- description: 'Você está à base da escada do subterrâneo da prisão.  Aqui é tudo
    muito

    escuro, com uma fraca iluminação pelas tochas que estão afixadas ao longo das

    paredes.  A construção subterrânea é extremamente sólida e bem construída.

    Você vê um longo corredor à oeste.  Há sentinelas, cozinheiras e serviçais

    caminhando pelo corredor.  Acima de você, a escada leva para a parte aberta da

    prisão.'
  exits:
    up:
      target_vnum: '01010060601'
    west:
      target_vnum: '01010060603'
  local_id: '602'
  name: Na Entrada do Subterrâneo
  vnum: '01010060602'
- description: 'Você está caminhando pelos corredores da prisão.  Há saídas para as
    quatro

    direções.  Sentinelas, cozinheiras e serviçais caminham pelos corredores.  Ao

    norte você pode ver algo que se parece com uma cozinha.  Ao sul há um corredor

    mais sombrio.  A leste você vê uma pequena claridade, que deve indicar a saída

    para a parte aberta da prisão, e a oeste o corredor continua em direção aos

    calabouços.'
  exits:
    east:
      target_vnum: '01010060602'
    north:
      target_vnum: '01010060616'
    south:
      target_vnum: '01010060617'
    west:
      target_vnum: '01010060604'
  local_id: '603'
  name: Um Cruzamento de Corredores
  vnum: '01010060603'
- description: 'Você está caminhando pelos corredores dos calabouços.  Há pouco movimento

    por aqui.  A pouca iluminação proveniente das toxas afixadas às paredes é

    pouca para que você possa ver tudo com perfeição.  Ao norte e ao sul você pode

    ver calabouços.  O corredor continua a leste e oeste.'
  exits:
    east:
      target_vnum: '01010060603'
    north:
      target_vnum: '01010060632'
    south:
      target_vnum: '01010060633'
    west:
      target_vnum: '01010060605'
