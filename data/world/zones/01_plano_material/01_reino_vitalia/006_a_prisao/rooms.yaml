- description: 'Você está na cozinha desta prisão.  O odor na sala é típico de uma
    fossa,

    nojento...  Por uma pequena abertura na parede escorre água, que cai em um

    jarro de barro.  No centro da sala há um enorme caldeirão.  A única saída é

    para o sul.'
  exits:
    south:
      target_vnum: '01010060603'
  local_id: '616'
  name: A Cozinha
  vnum: '01010060616'
- description: 'Esta é uma sala menos movimentada da prisão.  Aqui os sentinelas guardam

    espadas, atiradeiras, arcos e flechas, e até as grandes bolas-de-ferro que são

    presas nos pés dos condenados.  Ao norte você retorna para o corredor, e ao

    oeste você vê uma outra sala.'
  exits:
    north:
      target_vnum: '01010060603'
    west:
      target_vnum: 01010060618
  local_id: '617'
  name: A Sala de Armamentos
  vnum: '01010060617'
- description: 'Você está em uma sala não muito interessante...  Você vê alguns artefatos

    diferentes por todos os lados, você reconhece uma guilhotina em um dos cantos

    da sala, e uma corda pindurada no teto, com um nó na ponta, suficiente para

    que sua cabeça entre nele...  Glup!  No chão há um buraco grande e fundo,

    e você sente um calafrio ao pensar o que deve haver lá embaixo.'
  exits:
    down:
      target_vnum: 01010060619
    east:
      target_vnum: '01010060617'
  local_id: '618'
  name: A Sala de Condenação
  vnum: 01010060618
- description: 'Você cai no fosso de crocodilos...  Eles são muitos, e vem em sua
    direção,

    famintos...  Você entra em pânico e tenta escapar daqui de qualquer forma, mas

    não consegue escalar as paredes.  Os crocodilos avançam rapidamente em sua

    direção, e sem chances de escapar, você acaba virando almoço de crocodilo...'
  exits:
    up:
      target_vnum: 01010060618
  local_id: '619'
  name: O Fosso
  vnum: 01010060619
- description: "Você está dentro do calabouço.  O chão e as paredes parecem fazer\
    \ séculos\nque não são lavadas.  Ã\x89 ligeiramente escuro, pois não há aberturas\
    \ que tragam\na luz solar para cá, e a luz fornecida pelas tochas presas às paredes\
    \ iluminam\nmuito pouco."
  exits:
    south:
      target_vnum: '01010060604'
