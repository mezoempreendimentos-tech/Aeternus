- description: |-
    A bela Andrômeda foi deixada aqui como oferenda pois só isso aplacaria a ira
    das divindades do mar.  Isso acenteceu pois sua mãe, a rainha Cassiopéia,
    disse ter beleza superior à das nereidas.  Não gostaram muito disso e
    puniram seu reino...  O sacrifício da princesa salvaria a todos, mas ela não
    é culpada do que houve.  E só Perseu pode salvá-la desse cruel fim.
