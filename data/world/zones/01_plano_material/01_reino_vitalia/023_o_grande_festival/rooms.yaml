- description: "Ã\x89 por aqui que os atores saem do palco e é também aqui o lugar\
    \ onde eles\ndescansam um pouco depois de uma apresentação e podem então tomar\
    \ uma gostosa\ncerveja inglesa, trazida por um dos membros do grupo. O palco,\
    \ propriamente\ndito, fica ao norte."
  exits:
    up:
      target_vnum: '01010232334'
    west:
      target_vnum: 01010232328
  local_id: '2372'
  name: A Saída do Lado Esquerdo do Palco
  vnum: '01010232372'
- description: 'Esta é o lugar onde os atores e atrizes se preparam antes de entrar
    em cena

    no palco, ensaiando suas falas ou simplesmente esperando quietos, pela sua vez.

    Muitas risadas nervosas e ajustes de última hora nos trajes que serão usados

    em cena, são feitos aqui mesmo.'
  exits:
    up:
      target_vnum: '01010232333'
    west:
      target_vnum: '01010232325'
  local_id: '2373'
  name: A Saída do Lado Direito do Palco
  vnum: '01010232373'
- description: 'Um pequeno riacho flui por sobre as pedras lisas de seu leito.  Seu
    ponto

    mais profundo não deve ter mais do que três ou quatro pés, e sua largura não

    deve exceder uns oito pés.  Os sons produzidos pela água são muito

    relaxantes, e este é o tipo de lugar que os artistas procuram para se

    inspirar.'
  exits:
    north:
      target_vnum: '01010232354'
    south:
      target_vnum: '01010232375'
  local_id: '2374'
  name: "Ã\x80 Margem de um Riacho"
  vnum: '01010232374'
- description: 'Bem, seus pés com certeza estão totalmente molhados agora!  A água
    está

    fria e muito clara e certamente é boa para se beber.  O caminho para a

    floresta fica ao norte.'
  exits:
    north:
      target_vnum: '01010232374'
  local_id: '2375'
  name: No Riacho
  vnum: '01010232375'
- description: 'O caminho está intransitável em qualquer direção que se olhe, com

    excessão daquele pelo qual você veio.  Contudo, o toco de um imenso carvalho

    que está caído neste local parece ser exatamente o lugar para se fazer um

    feitiço, ou até mesmo, quem sabe, para se passar a noite...'
  exits:
    east:
      target_vnum: '01010232353'
  local_id: '2376'
  name: O Toco do Bardo
  vnum: '01010232376'
- description: 'Este pequeno lugar é onde, ao final de todas as horas, uma nova história

    é contada para as crianças (e adultos também, em muitos casos) que estiverem

    reunidas ao redor do Toco, prontas para ouvir mais um dos contos tirados do

    Grande Tomo de Aventuras.  Com seus olhos muito abertos e em absoluto

    silêncio, elas se sentam no chão, mordendo seus lábios por causa do medo e

    da excitação - mas nunca saem antes do fim.'
  exits:
    west:
      target_vnum: 01010232338
  local_id: '2377'
  name: O Toco do Contador de Histórias
  vnum: '01010232377'
