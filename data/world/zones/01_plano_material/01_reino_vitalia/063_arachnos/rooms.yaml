- description: 'Grudento, Grudento, Grudento!  O chão está coberto de folhas, restos

    mortais de grilos, besouros, ratos, cães e até de humanos envoltos por

    teias.   Você começa a imaginar o que lhe espera à frente.  O ar é

    viciado aqui, e até a pouca luz que vem de cima parece ser absorvida

    pelas teias.'
  exits:
    north:
      target_vnum: '01010636302'
    south:
      target_vnum: '01010616132'
  local_id: '6301'
  name: A Entrada com Teias
  vnum: '01010636301'
- description: 'Você sente que andar aqui é muito bom, talvez bom até demais.  Os

    galhos estão cobertos de teias de aranha e parecem mais fortes que

    galhos comuns.   Há caminhos em quatro direções.  O da direita desce um

    pouco.'
  exits:
    east:
      target_vnum: '01010636305'
    north:
      target_vnum: '01010636304'
    south:
      target_vnum: '01010636301'
    west:
      target_vnum: '01010636303'
  local_id: '6302'
  name: A Passagem com Teias
  vnum: '01010636302'
- description: 'Zangões voam nessa sala.  As aberturas na parede têm forma de favo

    de mel e muitas das larvas e vespas que você vê, têm marcas em seus

    corpos.  Você percebe alguma ordem nas marcações.'
  exits:
    east:
      target_vnum: '01010636302'
  local_id: '6303'
  name: A Colméia das Vespas
  vnum: '01010636303'
- description: 'Outra passagem com teias, totalmente grudenta e úmida.  Pequenas

    aranhas enchem o ar.  Parece que elas são recém-nascidas.'
  exits:
    east:
      target_vnum: '01010636305'
    south:
      target_vnum: '01010636302'
  local_id: '6304'
  name: A Passagem com Teias
  vnum: '01010636304'
- description: 'Você ouve os sons dos aracnídeos se movendo acima.  O ritmo dos

    passos sugere uma ordem no movimento deles.  A luz parece mais forte

    acima.'
  exits:
    up:
      target_vnum: '01010636306'
    west:
      target_vnum: '01010636304'
  local_id: '6305'
  name: Abaixo do Caminho Ocupado
  vnum: '01010636305'
- description: 'Aranhas, aranhas, por todas as partes!  São quase tão eficazes quanto

    as formigas, mas com uma grande diferença: as aranhas aqui estão

    carregando corpos de formigas, e também corpos de ratos, lobos e

    humanos.'
  exits:
    down:
      target_vnum: '01010636305'
    south:
      target_vnum: '01010636307'
  local_id: '6306'
  name: No Caminho Ocupado
  vnum: '01010636306'
- description: 'Aranhas, aranhas, por todas as partes!  São quase tão eficazes quanto

    as formigas, mas com uma grande diferença: as aranhas aqui estão

    carregando corpos de formigas, e também corpos de ratos, lobos e humanos.'
  exits:
    east:
      target_vnum: 01010636308
    north:
      target_vnum: '01010636306'
  local_id: '6307'
  name: No Caminho Ocupado
  vnum: '01010636307'
- description: 'Aranhas, aranhas, por todas as partes!  São quase tão eficazes quanto

    as formigas, mas com uma grande diferença: as aranhas aqui estão

    carregando corpos de formigas, e também corpos de ratos, lobos e humanos.'
  exits:
