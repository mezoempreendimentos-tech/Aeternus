- description: 'Você está andando calmamente e de repente encontra uma pequena abertura

    que você, embora tenha passado por aqui várias vezes, nunca havia percebido.

    Ela parece seguir para o leste.'
  exits:
    east:
      target_vnum: 010219719701
    west:
      target_vnum: '01010616150'
  local_id: '19700'
  name: Uma Estrada Escondida
  vnum: 010219719700
- description: 'A pequena passagem revela uma subida não muito íngreme que você, com

    facilidade, vence caminhando para o leste.  Você pode retornar para a

    floresta de Haon-Dor voltando-se para o oeste ou seguir sua jornada para

    leste nesta pequena subida.'
  exits:
    east:
      target_vnum: 010219719702
    west:
      target_vnum: 010219719700
  local_id: '19701'
  name: Uma Pequena Subida
  vnum: 010219719701
- description: 'Você continua sua subida sem muita preocupação de onde este caminho
    o

    levará.  Seu espírito aventureiro o guia e você mal percebe o quanto já

    andou.  Logo adiante, a leste, você percebe a fim da subida e você ainda

    pode voltar pare oeste descendo rumo a Haon-Dor.'
  exits:
    east:
      target_vnum: 010219719703
    west:
      target_vnum: 010219719701
  local_id: '19702'
  name: A Subida
  vnum: 010219719702
- description: 'Subitamente o terreno fica plano facilitando sua caminhada.  Um caminho

    muito plano e de fácil acesso segue para o leste.  Para oeste há uma descida

    íngreme e difícil.'
  exits:
    east:
      target_vnum: 010219719704
    west:
      target_vnum: 010219719702
  local_id: '19703'
  name: O Final da Subida
  vnum: 010219719703
- description: 'Você caminha com facilidade nesta bela estrada sem saber o que o aguarda

    a seguir.  A estrada segue para Leste e Oeste sem nenhum obstáculo aparente.'
  exits:
    east:
      target_vnum: 010219719705
    west:
      target_vnum: 010219719703
  local_id: '19704'
  name: Uma Bela Estrada
  vnum: 010219719704
- description: 'Você caminha com facilidade nesta bela estrada sem saber o que o aguarda

    a seguir.  A estrada segue para Leste e Oeste sem nenhum obstáculo aparente.'
  exits:
    east:
      target_vnum: 010219719706
    west:
      target_vnum: 010219719704
  local_id: '19705'
  name: A Estrada
  vnum: 010219719705
- description: 'Continuando sua caminhada você de repente depara-se com uma entrada
    para

    uma caverna de dimensões incomensuráveis.  Por esta entrada (para o leste)

    poderiam passar 20 homens facilmente.  Talvez mais.  Você pensa duas vezes

    antes de decidir se continua rumo a esta caverna para o leste ou se volta

    pela bela estrada que segue para o oeste.'
  exits:
    east:
      target_vnum: 010219719707
    west:
      target_vnum: 010219719705
  local_id: '19706'
  name: Uma Caverna no Caminho.
  vnum: 010219719706
- description: 'Você está na entrada da caverna.  A luz de fora da caverna já não
    é tão

    intensa e você sente dificuldade em ver os detalhes do caminho para o leste.

    A caverna continua ampla nesta direção.'
  exits:
    east:
      target_vnum: 010219719708
    west:
      target_vnum: 010219719706
  local_id: '19707'
  name: A Entrada da Caverna
  vnum: 010219719707
- description: 'Sua luz ilumina bem o amplo ambiente e você pode ver a imensidão desta

    caverna.  Um longo corredor segue para o leste e a entrada está

    imediatamente a oeste daqui.'
  exits:
    east:
      target_vnum: 010219719709
    west:
      target_vnum: 010219719707
  local_id: '19708'
  name: Dentro da Caverna
  vnum: 010219719708
- description: 'O corredor segue no sentido oeste.  Uma entrada para o norte chama
    sua

    atenção e uma pequena "porta" revela uma "sala" ao sul.'
  exits:
    north:
      target_vnum: 010219719711
    south:
      target_vnum: 010219719710
    west:
      target_vnum: 010219719708
  local_id: '19709'
  name: Um Longo Corredor
  vnum: 010219719709
- description: 'Você entra em um pequeno quarto de pedras sem muito luxo ou aparatos.

    Provavelmente este lugar é (ou ao menos foi) usado para descanso da guarda

    noturna visto que uma cama de pedra sem conforto algum encontra-se no canto.

    A única saída é para o norte.'
  exits:
    north:
      target_vnum: 010219719709
  local_id: '19710'
  name: Um Quarto de Pedra
  vnum: 010219719710
- description: 'Um pequeno corredor segue no sentido norte sul.  O Corredor é bastante

    amplo e duas ou mais pessoas poderiam caminhar lado a lado por aqui sem

    problemas.  As paredes da caverna são limpas, embora você não tenha muitas

    condições de analisar devido a parca luminosidade de sua lanterna.  Você

    sente que está perto da entrada da caverna e isso o tranquiliza um pouco.'
  exits:
    north:
      target_vnum: 010219719712
    south:
      target_vnum: 010219719709
  local_id: '19711'
  name: O Caminho pela Caverna
  vnum: 010219719711
- description: 'Você continua seu caminho sem maiores imprevistos.  Seguindo para
    o sul

    você sabe que estará perto da entrada desta caverna maldita.  Ao norte você

    pode ver uma luz opaca provavelmente vinda de uma outra entrada.'
  exits:
    north:
      target_vnum: 010219719713
    south:
      target_vnum: 010219719711
  local_id: '19712'
  name: O Caminho pelo Caverna
  vnum: 010219719712
- description: "Ao chegar neste lugar você percebe enfim que esta caverna foi preparada\n\
    para esconder dos curiosos este vale enorme a sua frente.  A paisagem não é\n\
    nada belo de se ver..  Ã\x89 provável que a muito tempo atrás este vale tenha\n\
    sido habitado por elfos e que esta \"floresta\", agora devastada e sem vida,\n\
    tenha sido verde e bela.  Uma pequena placa caída no chão chama sua atenção.\n\
    Você pode seguir para o sul rumo a floresta de Haon-Dor ou descer um\npequeno\
    \ caminho a oeste que conduz ao vale."
  exits:
    south:
      target_vnum: 010219719712
    west:
      target_vnum: 010219719714
  local_id: '19713'
  name: A Vista para o Vale dos Orcs
  vnum: 010219719713
- description: 'Você se encontra no início da descida rumo ao vale.  Esta pequena
    trilha,

    onde não é possível caminhar lado a lado duas pessoas, segue para leste em

    uma descida menos confortável do que você gostaria e para o leste você pode

    facilmente alcançar a entrada da caverna que o conduzirá de volta à floresta

    de Haon-Dor.'
  exits:
    east:
      target_vnum: 010219719713
    west:
      target_vnum: 010219719715
  local_id: '19714'
  name: O Caminho Estreito
  vnum: 010219719714
- description: 'O Caminho segue no sentido Leste-Oeste.  Andando por este caminho

    Estreito você percebe que a vegetação num tom marrom esverdeado há muito

    perdeu o viço e isto torna este caminho bastante assustador.  Você percebe

    ainda que o caminho fica cada vez mais estreito e você deve tomar MUITO

    cuidado para não escorregar e quebrar o pescoço no precipício ao redor da

    trilha.'
  exits:
    east:
      target_vnum: 010219719714
    west:
      target_vnum: 010219719716
  local_id: '19715'
  name: O Caminho Estreito
  vnum: 010219719715
- description: 'Caminhando distraidamente você percebe (quase tarde demais) que o
    caminho

    vira neste ponto para o norte.  Você realmente escapou por pouco...  Um

    passo a mais para o oeste e você iria acabar se esborrachando no fundo do

    precipício.  Você suspira aliviado e retoma fôlego para continuar seu

    caminho.  Norte ou Leste..  Ou oeste...  Quem sabe?'
  exits:
    east:
      target_vnum: 010219719715
    north:
      target_vnum: 010219719718
    west:
      target_vnum: 010219719717
  local_id: '19716'
  name: Na Beira do Precipício
  vnum: 010219719716
- description: 'Durante a queda você tem visões de quando você era apenas uma criança..

    Sua vida passa rapidamente por sua cabeça até que esta encontre a derradeira

    e mortal rocha.


    Você está morto! R. I. P.'
  exits:
    east:
      target_vnum: 010219719716
  local_id: '19717'
  name: O Precipício
  vnum: 010219719717
- description: 'O caminho nesta parte torna-se bastante perigoso e segue no sentido

    Norte-Sul.  Qualquer deslize na direção errada e você sabe que a morte é

    certa.  Pouco se pode apreciar da paisagem aqui.'
