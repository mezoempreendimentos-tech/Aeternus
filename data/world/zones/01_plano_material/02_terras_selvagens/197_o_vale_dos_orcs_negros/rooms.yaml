- description: 'Você entra no quartel general central onde um sem número de orcs treina

    dia e noite sem parar.  Muitos nem percebem sua presença mas você se sente

    observado a todo tempo.  Uma pequena porta fechada parece levar para algum

    tipo de calabouço logo abaixo de seus pés.'
  exits:
    down:
      target_vnum: 010219719751
    south:
      target_vnum: 010219719749
  local_id: '19750'
  name: O Quartel General Central
  vnum: 010219719750
- description: 'A cena é horrível de se ver.  Grilhões presos às paredes por todos
    os

    cantos e várias partes de corpos presos a eles sem o menor cuidado.  Alguns

    parecem mesmo estar vivos, embora não seja possível explicar racionalmente

    isso..  Você tropeça em uma cabeça de uma criatura que parece ter sido um

    dia um belo elfo.  Um buraco na parede leste chama sua atenção embora você

    não saiba se será possível passar por ele.'
  exits:
    east:
      target_vnum: 010219719752
    up:
      target_vnum: 010219719750
  local_id: '19751'
  name: O Calabouço
  vnum: 010219719751
- description: 'Você passa com muita dificuldade pelo buraco na parede e percebe que
    ele

    foi usado em uma fuga desesperada.  Um longo corredor segue para o leste o

    você pode voltar para o calabouço esgueirando-se pelo buraco novamente.'
  exits:
    east:
      target_vnum: 010219719753
    west:
      target_vnum: 010219719751
  local_id: '19752'
  name: O Caminho de Fuga
  vnum: 010219719752
- description: O corredor estreito segue para leste ou oeste.
  exits:
    east:
      target_vnum: 010219719754
    west:
      target_vnum: 010219719752
  local_id: '19753'
  name: A Rota de Fuga
  vnum: 010219719753
- description: 'Nesta parte o corredor vira para o sul.  Olhando para oeste você lembra

    da dor dos que pereceram no calabouço.'
  exits:
    south:
      target_vnum: 010219719755
    west:
      target_vnum: 010219719753
  local_id: '19754'
  name: A Rota de Fuga
  vnum: 010219719754
- description: 'O corredor acaba de repente e você fica um pouco sem entender..  Olhando

    para cima você vê sobre sua cabeça uma bela corda típica dos elfos.  Esta

    corda poderia sustentar um elefante.  Você poderia subir por ela ou voltar

    para o sul rumo ao calabouço.'
  exits:
    north:
      target_vnum: 010219719754
    up:
      target_vnum: 010219719756
  local_id: '19755'
  name: Uma Corda
  vnum: 010219719755
- description: 'Depois de muita subida você finalmente vê onde ela o leva.  O caminho

    engenhoso traçado nesta fuga espetacular faz você sorrir de felicidade.  A

    astúcia deste hábil em fugas é invejável!  Para cima você percebe que

    alcançará o fim da corda.'
  exits:
    down:
      target_vnum: 010219719755
    up:
      target_vnum: 010219719714
  local_id: '19756'
  name: Uma Corda
