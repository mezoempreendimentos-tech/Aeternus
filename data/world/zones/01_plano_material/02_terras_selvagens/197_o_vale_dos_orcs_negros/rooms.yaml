  local_id: '19720'
  name: Uma Curva no Caminho
  vnum: 010219719720
- description: 'Você caminha com facilidade por este trecho não tão estreito quanto
    o que

    você pode observar a oeste.  Alguma vegetação pode ser vista ainda verde,

    embora em sua maioria a cor seja marrom e sem vida.  O Caminho segue no

    sentido Leste-Oeste.'
  exits:
    east:
      target_vnum: 010219719722
    west:
      target_vnum: 010219719720
  local_id: '19721'
  name: O Caminho não Tão Estreito
  vnum: 010219719721
- description: 'A vegetação rasteira de péssima aparência cobre seus pés dificultando
    a

    passagem por esta trilha.  Você se sente um pouco cansado mas nada que o

    faça parar para descansar.  Para o Leste você pode ver uma clareira que

    parece terminar em um precipício, embora você perceba que o vale não esteja

    tão distante para baixo.'
  exits:
    east:
      target_vnum: 010219719723
    west:
      target_vnum: 010219719721
  local_id: '19722'
  name: O Caminho não Tão Estreito
  vnum: 010219719722
- description: 'A pequena estrada parece terminar aqui e uma quase imperceptível descida

    pode ser vista a custo de muito esforço no canto da sala.  Algo de muito

    errado há nesta clareira..  Você não pode bem dizer o que é mas sente que o

    perigo está perto.  Além da descida você pode ir para oeste subindo o

    caminho de volta para a caverna.'
  exits:
    down:
      target_vnum: 010219719724
    west:
      target_vnum: 010219719722
  local_id: '19723'
  name: Uma Clareira
  vnum: 010219719723
- description: 'Você cai de uma altura aceitável.  O Tombo tira, por alguns instantes

    seus sentidos mas você os recobra facilmente depois de alguns segundos.

    Desta altura não é mais possível voltar para a clareira.  A sua frente, para

    o norte, você vê um enorme portão esculpido pela própria natureza em pedra

    nada polida.  Parece a entrada para o Vale.  Uma pequena placa pode ser

    vista caída no chão.  Sua única saída é para o norte rumo ao desconhecido.'
  exits:
    north:
      target_vnum: 010219719725
  local_id: '19724'
  name: O Portão de Entrada
  vnum: 010219719724
- description: "Você atravessa o portão entrando no vale propriamente.  Ã\x89 uma\
    \ verdadeira\ncidade toda contruída em madeira apodrecida arrancada da floresta\
    \ que agora\njaz sem vida nesta parte de Vitália.  Você teme, devido a proximidade,\
    \ pela\nfloresta de Haon-Dor.  Seu futuro não pode ser o mesmo!  Em sua raiva\
    \ você\nanceia por encontrar os responsáveis pela devastação deste lugar que deve\n\
    ter sido um dia morada de Robins, Esquilos e lobos selvagens.  Ã\x89 uma pena\n\
    mesmo.  Eles devem pagar por isso!!\nVocê pode seguir para o norte onde uma pequena\
    \ praça mostra algum\nmovimento ou voltar para o portão ao sul."
  exits:
    north:
      target_vnum: 010219719726
    south:
      target_vnum: 010219719724
  local_id: '19725'
  name: No vale dos Orcs
  vnum: 010219719725
- description: 'Você entra em uma praça de tamanho razoável e de iluminação não muito

    intensa.  Alguns orcs negros passeiam pelas ruas e alguns outros estão

    simplesmente parados nesta praça sem dar muita importância a sua chegada.

    No sentido Leste-Oeste você pode ver a Rua Morgoth.  Para o norte segue uma

    rua escura e você ainda pode ver o portão ao sul.'
  exits:
    east:
