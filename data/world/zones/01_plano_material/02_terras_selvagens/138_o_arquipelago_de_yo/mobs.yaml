- description: |-
    Você observa um magnífico dragão de platina com uma postura imponente e um
    brilho celestial.  Bahamut é um dos cinco filhos primogênitos de Yo, o
    senhor de toda a criação.  Ele foi o primeiro dragão metálico do mundo.
    Forjado com lava vulcânica, gases tóxicos e venenosos e fundido com pureza
    e honestidade.  Bahamut é o deus supremo e senhor de todos os bons dragões.
    No início dos tempos, após o nascimento dos cinco filhos primogênitos de Yo,
    Bahamut e Tiamat reproduziram, criando vários filhotes descendentes de
    variadas cores e tipos.  Bahamut reina triunfantemente em seu monumental e
    majestoso castelo flutuante.  Bahamut possui maravilhosas escamas
    branco-prateadas, suas asas possuem uma envergadura gigantesca e dois
    pequenos chifres em suas extremidades próximas a cabeça, um em cada asa e
    deles surgem brilhantes e surpreendentes raios que seguem para o chifre
    oposto.  Todos os dragões dourados são leais e fiéis a Bahamut, porém sete
    magníficos dragões dourados servem o glorioso Bahamut como reais
    conselheiros.
  keywords:
  - Bahamut
  - dragao
  - platina
  name: Bahamut
  vnum: '13800'
- description: |-
    Você observa o intrépido filho do celestial senhor dos dragões, Bahamut e da
    perversa e demoníaca Tiamat, a rainha dos dragões maléficos.  Em seu coração
    uma intensa batalha é eternamente travada.  A pureza e a honestidade do pai
    contra a perversidade e crueldade da mãe.  Você observa o musculoso corpo
    coberto por brilhantes escamas negras metálicas e os impetuosos olhos desta
    criatura que carrega um fardo tão pesado em seu coração.
  keywords:
  - dragao
  - negro
  - platina
  - filho
  - metalico
  name: o magnífico dragão negro de platina
  vnum: '13801'
