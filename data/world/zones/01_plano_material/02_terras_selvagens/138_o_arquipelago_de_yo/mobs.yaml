- description: |-
    Você observa o terrível dragão da noite que reina entre os morto-vivos e os
    caídos, Faluzure.  Um dos cinco filhos primogênitos de Yo.  Faluzure odeia
    todos os seus irmãos e principalmente Yo.  Ele está sempre envolvido nas
