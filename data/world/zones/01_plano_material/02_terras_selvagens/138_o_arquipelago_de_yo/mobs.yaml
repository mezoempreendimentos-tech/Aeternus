- description: |-
    Você observa um maravilhoso dragão de escamas pequenas e com um majestoso
    chifre de rubi e esmeralda.  Seus olhos azuis e sua sublime beleza, fazem
    dos raros dragões de diamante vermelho, com certeza uma das mais magníficas
