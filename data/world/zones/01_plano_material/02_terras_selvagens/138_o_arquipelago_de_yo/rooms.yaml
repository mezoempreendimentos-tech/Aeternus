- description: "Você está dentro do celestial salão do magnífico castelo flutuante\
    \ do\ndeus dos bons dragões, o poderoso Bahamut.  Ã\x80 sua frente você observa\
    \ um\nmajestoso trono dourado feito de um estranho metal brilhante.  Enormes\n\
