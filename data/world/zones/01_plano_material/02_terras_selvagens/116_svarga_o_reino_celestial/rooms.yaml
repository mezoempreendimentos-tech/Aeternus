- description: "...Ã\x89 tudo tão lindo, mas alguma coisa saiu errada...\nO rio continua,\
    \ só que tornou-se caudaloso demais para seu gosto, como se\napenas a presença\
    \ do naga dourado conseguisse acalmar as águas.  Constantes\nondas fazem seu barco\
    \ balançar de um lado para outro, fazendo-o lembrar de\nterríveis momentos que\
    \ pareciam estar longe demais para serem reais...\nTalvez Kanakajja só estivesse\
    \ tentando protegê-lo (de uma forma um tanto\nbizarra) enquanto impedia sua passagem...Mais\
    \ à frente você vê uma\nnévoa dourada que parece vir de uma parte do rio que você\
    \ não vê.  O barulho\naqui é muito grande, como se à frente houvesse uma enorme...@RCHACHOEIRA!@n"
