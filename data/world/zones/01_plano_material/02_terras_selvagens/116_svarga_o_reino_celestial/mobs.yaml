  - ajudante
  - cozinha
  long_desc: Um ajudante de cozinha está pegando alguns ingredientes.
  name: um ajudante de cozinha
  vnum: '010211611626'
- description: |-
    O pobre homem está como a maioria dos empregados do palácio: fazendo de
