  keywords:
  - convidada
  - dama
  - refinada
  - jovem
  long_desc: Uma refinada jovem, um tanto aflita, parece procurar a ajuda do sacerdote.
  name: uma dama convidada
  vnum: '010211611630'
- description: |-
    De impecável postura, essa senhora parece ver mais do que se pensa.  Ela
    olha para você e sorri, pois percebeu que você não foi exatamente convidado
    para a festa.  E agora?
  keywords:
  - senhora
  - convidada
  - bem-vestida
  long_desc: Uma senhora muito bem-vestida sorri para você.
