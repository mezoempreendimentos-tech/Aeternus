  keywords:
  - mensageiro
  - estranho
  long_desc: Um estranho mensageiro espera ser dispensado.
  name: o estranho mensageiro
  vnum: '010211611633'
- description: |-
    Nascida da espuma do mar de leite, essa apsara, assim como todas as outras,
    foi trazida por Lorde Indra para essa palácio no intuito de, além de
    permanecer a salvo, entreter o grande senhor com sua dança.  Ela usa uma
    estranha maquiagem que realça seus belos olhos, destacando ainda a brancura
    de sua pele e os longos cabelos negros, que estão soltos. Você agora sabe
    porque a dança das apsaras é tão famosa: elas simplesmente parecem flutuar...
  keywords:
  - dancarina
  - ninfa
  - apsara
  long_desc: Uma linda ninfa dança graciosamente ao som de uma música.
  name: uma linda apsara
  vnum: '010211611634'
- description: |-
    Indrani, esposa de Indra, é uma belíssima mulher de pele azeitonada e
    cabelos e olhos negros como azeviche. Seus traços fortes foram destacados
    com a tradicional maquiagem usada pelas mulheres daqui, e sua aparência é
    ainda mais majestosa devido às ricas jóias que ostenta. Conhecida por ser
    implacável, Indrani parece muito contrariada. Alguma coisa está acontecendo
    por aqui e ela não está gostando disso...
  keywords:
  - indrani
  - mulher
  - rainha
  long_desc: Uma verdadeira rainha está sentada em um dos tronos.
  name: Indrani
  vnum: '010211611635'
- description: |-
    Muito velha, mas aparentando juventude, Diti é uma mãe muito orgulhosa.
    Ela, tendo muito filhos, enumera no momento o nome de cada um e diz o que
    eles estão fazendo. Pelo que você entendeu, quarenta e nove deles moram no
    palácio, sendo que você já pode considerá-los "velhos conhecidos"...
  keywords:
  - diti
  - sorridente
  - mulher
  long_desc: Uma sorridente mulher parece fazer uma lista de nomes que nunca acaba.
  name: Diti
  vnum: '010211611636'
- description: |-
    Rudra é perigoso...  Possuidor de grande poder, ele é cruel com aqueles que
    lhe desagradam, mas assim como facilmente se torna devastador, pode ser
    compreensivo e bondoso.  Ele é exatamente como os ventos, sua arma
    favorita...
  keywords:
  - rudra
  - homem
  - sinistro
  long_desc: Um homem de aparência sinistra observa todos os seus movimentos.
  name: Rudra
  vnum: '010211611637'
- description: |-
    Arjuna, um dos filhos de Indra, é um renomado guerreiro e explorador.  Ele é
    um dos poucos homens que se atreveram a explorar Patala inteira, sendo esse
    motivo de orgulho para seu pai.  Tendo participado de muitas aventuras,
    Arjuna pode lhe dizer que um dos acontecimentos mais importantes de sua vida
    foi o emprendizado com Krishna, na época considerado apenas um simples
    auriga.  No momento, o jovem príncipe está preocupado com a movimentação no
    palácio...
  keywords:
  - arjuna
  - belo
  - jovem
  - guerreiro
  long_desc: Um belo e jovem guerreiro demonstra estar muito preocupado.
  name: Arjuna
  vnum: 010211611638
- description: |-
    Membro da corte de Lorde Indra, esse cantor é um dos estranhos seres
    celestiais cujos poderes e sabedoria vão além do que aparenta.  Sua canção
    sublime, chamada a "Voz da Natureza", faz com que você realmente tenha a
    impressão de estar ouvindo a música por trás do Mundo.
  keywords:
  - cantor
  - gandhava
  long_desc: Um magnífico cantor preenche seus ouvidos com uma bela canção.
  name: um gandhava
  vnum: 010211611639
- description: |-
    Esse Marut parece muito preocupado.  Seu senhor, Lorde Indra, teve de deixar
    às pressas o salão para cuidar de um problema.  Ele e alguns de seus irmãos,
    então, se prontificaram a proteger a corte caso alguma coisa de ruim
    acontecesse...
  keywords:
  - guardiao
  - marut
  long_desc: Um preocupado Marut ronda o salão.
  name: um guardião Marut
  vnum: '010211611640'
- description: |-
    Dizem as lendas que quando um mortal ouve a canção dos gandhavas,
    ele passa a saber coisas que nunca saberia nem que vivesse milhares de
    vidas. Sendo assim, você se sente um pouco mais sábio ao ouvir a "Voz da
    Natureza", a música daqueles que sabem o segredo da fabricação do soma.
  keywords:
  - gandhava
  - musico
  long_desc: Um dos músicos celestiais toca com maestria seu intrumento.
  name: um gandhava
  vnum: '010211611641'
- description: |-
    Uma das mais conhecidas apsaras, Urvasi acabou de se apresentar.
    Ela está muito cansada e no momento descansa sobre algumas almofadas.
    Não a perturbe.
  keywords:
  - urvasi
  - apsara
  long_desc: Uma apsara descansa sentada em algumas almofadas.
  name: Urvasi
  vnum: '010211611642'
- description: |-
    Ele nem pisca... Você pode fazer qualquer coisa que ele não se moverá.
    Esse guarda apenas deixará sua posição caso ocorra alguma coisa que
    realmente exija sua interferência.
  keywords:
  - guarda
  long_desc: Um guarda está imóvel em sua posição de guardar o salão.
  name: um guarda
  vnum: '010211611643'
- description: |-
    Um sábio na antiga prática da luta, o velho guarda é um dos mestres
    preferidos dos mais jovens.  Sabendo impor disciplina, com paciência ensina
    sua arte, conseguindo ainda passar importantes lições sobre a vida.
    Ele é um respeitado nobre da casta guerreira.
  keywords:
  - guarda
  - velho
  - treinador
  long_desc: Um dos guardas mais velhos está aqui, treinando outros guardas.
  name: um treinador da guarda
  vnum: '010211611644'
