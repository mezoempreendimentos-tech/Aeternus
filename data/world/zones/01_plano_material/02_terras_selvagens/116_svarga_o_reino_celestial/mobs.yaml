  vnum: '010211611620'
- description: |-
    Esse homem de feições sérias parece estar estudando atentamente um livro que
    parece ser bastante velho e precioso.  Ele parece alheio a tudo que acontece
    a seu redor, mas seria melhor você não chamar sua atenção...
  keywords:
  - guarda
  long_desc: Um dos guarda parece entretido com a leitura de um livro.
  name: um guarda
  vnum: '010211611621'
- description: |-
    Ele está muito atarefado... Uma festa de gala está sendo dada no palácio,
