- description: |-
    Ushas, a Sempre-Jovem, é a Alvorada que canta e dança embelezando esse reino
    celeste.  Sua pele é carmesim, como os céus do raiar do dia e seus cabelos
    azuis como o céu em plena luz.  De gestos muito graciosos, Ushas dança
    enquanto canta, convidando-o a ficar ali e apreciar o espetáculo de sua
    fonte de luz.  Cuidado, pois uma vez enfeitiçado por Ushas, sempre seu
    escravo.
  keywords:
  - ushas
  - alvorada
  - donzela
  long_desc: Uma linda donzela de pele carmesim canta sobre as águas douradas.
  name: Ushas, a Alvorada
  vnum: '010211611600'
- description: |-
    A bela menina, de pele azul como os céus e rosto radiante como as estrelas,
    faz parte da extensa corte que reside em Svarga.  Junto com seus 48 irmãos,
    ela auxilia Lorde Indra na condução de seu terrítorio.  Seus longos cabelos
    negros estão presos em uma grande trança e enfeitados com diversas pedras
    preciosas.  Apesar de sua aparência de indefesa menina, ela é muito mais
    velha que as vidas de vários anciões unidas, sabendo muito bem se defender.
  keywords:
  - marut
  - menina
  - graciosa
  - radiante
  long_desc: Uma graciosa menina de rosto radiante protege essas escadarias.
  name: uma Marut
  vnum: '010211611601'
- description: |-
    O pequeno rouxinol parece ter sido mandado aqui para saber quem é o intruso
    que encontrou a entrada de Svarga. Ele parece bastante inofensivo.
  keywords:
  - rouxinol
  - espiao
  - pequena
  - ave
  long_desc: Uma pequena ave parece o seguir, espionando.
  name: um rouxinol espião
  vnum: '010211611602'
- description: |-
    O pequeno peixe parece ter vindo da parte mais larga do regato, onde suas
    dimensões já são de um verdadeiro rio.  Provavelmente ele ficou curioso com
    sua presença, coisa que não acontece normalmente com peixes (pelo menos os
    que você conhece).
  keywords:
  - peixe
  - peixinho
  - pequeno
  - dourado
  long_desc: Um pequeno peixe dourado nada em sua direção.
  name: um peixinho dourado
  vnum: '010211611603'
- description: |-
    Essa yakshini, feita de vento, parece ter sido mandada para atrapalhar sua
    vida.  Seu corpo é estranhamente feito de vento, sendo que sua aproximação
    dá-lhe a mesma sensação de quando se corre contra uma ventania.  Você a vê
    como sendo um pequeno tornado negro, com dois pequenos olhos brilhantes em
    seu centro.
  keywords:
  - yakshini
  - vento
  - ser
  - estranho
  - demonio
  long_desc: Um estranho ser de vento tenta derrubar você.
  name: uma yakshini de vento
  vnum: '010211611604'
- description: |-
    O cozinheiro-chefe é um senhor que não só pratica a arte de cozinhar, como
    também a de saborear...  Ele, como em todo dia de festa, está bastante
    compenetrado em seus afazares, caprichando o máximo que pode na comida feita
    com carinho.
  keywords:
  - cozinheiro
  - chefe
  long_desc: O cozinheiro chefe está supervisionando um dos fogões, apreensivo.
  name: o cozinheiro-chefe
  vnum: '010211611605'
- description: |-
    Sempre sorridente, essa serviçal atende a todos os convidados que precisarem
    de sua ajuda. Afinal, ela é paga para isso...
  keywords:
  - servical
  long_desc: Uma serviçal atende alguns convidados.
  name: uma serviçal
  vnum: '010211611606'
- description: |-
    Esse menino é um dos famosos 49 Maruts que auxiliam Indra em seus afazeres.
    Sua pele parece imitar o tom dos céus, podendo passar do mais profundo
    negror ao mais radiante vermelho.  Longos cabelos negros tentam esconder um
    par de olhos brilhantes como estrelas.  Cuidado com ele...  Lembre-se que nem
    sempre os rostos mais inocentes são os mais indefesos.
  keywords:
  - marut
  - menino
  - belo
  - azulada
  long_desc: Um belo menino de pele azulada protege essas escadarias.
  name: um Marut
  vnum: 010211611608
- description: |-
    Kanakajja, ou Lótus de Ouro, é um naga extremamente grande e musculoso.  Sua
    pele é inteira dourada, não havendo sequer uma listra de outra cor.  Apenas
    seus olhos não são como ouro, sendo, na verdade, completa e assustadoramente
    negros.  Você não tem idéia do motivo que leva esse imenso naga a não
    deixá-lo prosseguir, mas pensa que talvez seja melhor não contrariá-lo...
  keywords:
  - kanakajja
  - naga
  - dourado
  - lotus
  - ouro
  long_desc: Um monstruoso naga dourado se ergue das águas do rio de ouro, ameaçando-o
    com sua arma.
  name: Kanakajja
  vnum: 010211611609
- description: |-
    Nidharta, um dos 49 Maruts, todos filhos de Diti, leva muito a sério sua
    tarefa de auxiliar Indra.  Ele tenta de todas as maneiras impedir que você
    chegue até o que há no fim do muro.  Cuidado, Maruts sabem ser mortais...
  keywords:
  - nidharta
  - marut
  - atento
  long_desc: Um atento Marut tenta impedir que você acompanhe o filete.
  name: Nidharta
  vnum: '010211611610'
- description: |-
    Idrksa percebe que você o está olhando e lentamente abre seus olhos.  Você
    fica quase cego com o brilho deles, o que faz o sério Idrksa dar uma
    repentina gargalhada.  Ele parece não considerá-lo uma ameaça pois novamente
    assume sua impassível posição, de olhos cerrados.
  keywords:
  - idrksa
  - marut
  - guarda
  long_desc: Um Marut guarda impassivelmente os portões do palácio.
  name: Idrksa
  vnum: '010211611611'
- description: |-
    Adrksa parece profundamente entediado.  Bocejando constantemente, ele tenta
    se distrair exercitando alguns golpes com sua arma.  Cuidado para não chamar
    muito a atenção dele: não será nada bom se você for escolhido para
    "ajudá-lo" em seus exercícios...
  keywords:
  - adrksa
  - marut
  - guarda
  long_desc: Um entediado Marut guarda os portões do palácio.
  name: Adrksa
  vnum: '010211611612'
- description: |-
    A estátua da pequena Marut graciosamente executa os passos de uma antiga
    dança.  Você fica extremamente surpreso com o espetáculo, principalmente
    porque essa não é Jyoti, e sim uma estátua dela.  As estátuas desse lugar
    parecem todas enfeitiçadas...
  keywords:
  - menina
  - estatua
  - jyoti
  - marut
  long_desc: A estátua de uma menina dançando parece tentar impedir que você saia
    daqui.
  name: a estátua de Jyoti
  vnum: '010211611613'
- description: |-
    O jovem príncipe Rama, ou melhor, sua estátua, conta-lhe qual motivo o traz
    aqui: sua querida esposa, Sita, foi raptada pelo terrível rei dos rakshasas,
    Ravana.  Sendo assim, ele escolheu aquele lugar para treinar antes de
    travar a batalha final contra o demônio e resgatar sua amada.
  keywords:
  - jovem
  - heroi
  - rama
  - estatua
  long_desc: A estátua de um jovem herói exercita suas habilidades com armas.
  name: a estátua de Rama
  vnum: '010211611614'
- description: |-
    Kadru, antiga ancestral dos nagas, é uma das mulheres de Kasyapa.  Sua
    estátua consegue afetá-lo da mesma maneira que uma verdadeira nagini
    afetaria: hipnotiza-o com sua beleza e com sua lenta e perigosa dança.
    Cuidado com Kadru...  Ela é extremamente inteligente e astuta, já tendo
    enganado até o sábio Indra ao roubar a amritá que estava sob sua guarda.
  keywords:
  - estatua
  - kadru
  - nagini
  long_desc: A estátua de uma gigantesca nagini monopoliza toda sua atenção.
  name: a estátua de Kadru
  vnum: '010211611615'
- description: |-
    O robusto Nandi flexiona uma de suas patas dianteiras e bufa, olhando-o
    desconfiado. Ele é considerado o guardião da entrada dos templos, o que
    o faz realmente detestar estranhos... Cuidado com essa estátua...
  keywords:
  - touro
  - branco
  - robusto
  - nandi
  - estatua
  long_desc: A estátua de um robusto touro branco parece preparar-se para atacar.
  name: a estátua de Nandi
  vnum: '010211611616'
- description: |-
    Essa estátua representa um renomado sábio a quem é atribuída a atual
    organização dos Vedas.  Vyasa também é o autor do Mahabharata, dos dezoito
    Puranas e dos Brahma Sutras.  Que senhor importante, não?
  keywords:
  - vyasa
  - sabio
  - estatua
  long_desc: A estátua de um senhor escrevendo aparece do nada na sua frente.
  name: a estátua do sábio Vyasa
  vnum: '010211611617'
- description: |-
    Ele parece ter tirado uma "folguinha" para tirar um cochilo... Se bem que
    é provável que ninguém consiga acordá-lo, pois nem o barulho que você fez nessa
