  keywords:
  - ajudante
  - cozinha
  long_desc: Um ajudante de cozinha corta alguns ingredientes.
  name: um ajudante de cozinha
  vnum: '010211611624'
- description: |-
    A cozinheira parece bastante aborrecida por não encontrar tudo
    que precisa... Talvez ela seja nova aqui.
  keywords:
  - cozinheira
  long_desc: Uma cozinheira procura na despensa os ingredientes que precisa.
