  keywords:
  - guarda
  - dorminhoco
  long_desc: Um dos guardas do palácio dorme tranqüilamente em uma das camas.
  name: o guarda dorminhoco
  vnum: 010211611618
- description: |-
    Ele parece realmente com fome, o que piora com o delicioso cheiro da refeição sendo
    preparada na cozinha, bem próxima daqui.
  keywords:
  - guarda
  - faminto
  long_desc: Um guarda está batendo seus talheres na mesa, exigindo que a comida chegue
    logo.
  name: o guarda faminto
  vnum: 010211611619
- description: |-
    Muito alto, esse homem é realmente forte. Ele parece estar passando por um treino
