    convidados...
  keywords:
  - senhor
  - elegante
  long_desc: Um elegante senhor assiste maravilhado o movimento das dançarinas.
  name: um senhor elegante
  vnum: '010211611632'
- description: "Ele é uma estranha criatura... Não é meio homem, meio serpente, como\
