- description: 'Você está prestes a vencer o desafio do Labirinto.  Você sente que
    um

    desafio bastante perigoso está por iniciar-se e pergunta (temeroso da

    resposta) se você está pronto para ele.  Sua Consciência lhe diz que você

    nasceu pronto para ele e você não veio até aqui para desistir!  Você pode

    ainda subir pela pequena passagem ou seguir para o sul.'
  exits:
    south:
      target_vnum: 010219819882
    up:
      target_vnum: 010219819880
  local_id: '19881'
  name: No Caminho da Vitória
  vnum: 010219819881
- description: 'Uma vez nessa sala não mais se pode desistir.  Você se prepara mais
    uma

    vez para uma luta contra as forças Malignas de Vitália.  Que a força e a

    coragem dos Deuses esteja com você.  Boa sorte - Você vê uma passagem para o

    sul.'
  exits:
    north:
      target_vnum: 010219819881
    south:
      target_vnum: 010219819883
  local_id: '19882'
  name: A Sala da Preparação
  vnum: 010219819882
- description: 'Tudo está muito confuso e sua visão distorcida pouco revela do que
    há

    nessa sala.  Você vê uma porta verde para o leste.'
  exits:
