  name: Rumando para o Perigo
  vnum: 010219819883
- description: "Uma luz verde ofusca seus olhos e o cheiro de enxofre entranha na\
    \ sua\nnarina.  Você pressente um mal enorme.  Ã\x89 hora de enfrentar seus medos\
    \ e\nVENCER!  Você vê uma porta para o leste e outra para oeste."
  exits:
