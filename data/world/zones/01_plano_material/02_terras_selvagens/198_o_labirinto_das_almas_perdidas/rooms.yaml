- description: 'Vencido o Primeiro desafio você para um pouco e retoma o fôlego para

    enfrentar o próximo.  Você vê uma porta amarela para o norte e uma porta

    para o oeste.'
  exits:
    north:
      target_vnum: 010219819886
    west:
      target_vnum: 010219819884
  local_id: '19885'
  name: A Sala da Preparação
  vnum: 010219819885
- description: "Uma forte luz amarela impede sua visão por um curto período de tempo.\n\
    Não o suficiente para distraí-lo para o mal que o assola nesta sala.  Ã\x89\n\
    hora de provar sua coragem e determinação.  Duas saídas: uma porta para o\nleste\
    \ e outra para o sul.  Você está pronto?  Então ATAQUE!!!"
  exits:
    east:
      target_vnum: 010219819887
    south:
      target_vnum: 010219819885
  local_id: '19886'
  name: Uma Sala Amarela
  vnum: 010219819886
- description: 'Falta pouco agora.  O último desafio está por vir e requer muita cautela.

    Nesta sala você pode se preparar e recobrar suas energias para o duelo

    final.  Uma porta vermelha segue para o leste e há uma porta para oeste.'
  exits:
    east:
