- description: 'Você está em frente a um longo lance de escadas feitos na rocha.  Logo

    acima de você, os degraus começam, enquanto para baixo, os degraus parecem

    continuar eternamente.'
  exits:
    down:
      target_vnum: '010213213201'
  local_id: '13200'
  name: Os Degraus que Descem Para o Mar
  vnum: '010213213200'
- description: 'Os degraus continuam descendo em direção ao mar, ou voltando para
    o topo

    do penhasco, dependendo para onde você vá.  Parece que talvez exista alguma

    espécie de caverna lá embaixo.'
  exits:
    down:
      target_vnum: '010213213202'
    up:
      target_vnum: '010213213200'
  local_id: '13201'
  name: Descendo os Degraus Rochosos
  vnum: '010213213201'
- description: 'As escadas continuam, entretanto você está mais perto da base agora.

    Parece que há uma abertura na rocha à leste.  Talvez seja apenas uma fenda

    simples, mas e depois, quem sabe?'
  exits:
    down:
      target_vnum: '010213213203'
    up:
      target_vnum: '010213213201'
  local_id: '13202'
  name: A Face do Penhasco
  vnum: '010213213202'
- description: 'Perto da base você realmente já pode sentir uma leve brisa trazendo
    o

    cheiro do mar, e agitando suas roupas.  Você começa a sentir que o seu dia

    vai melhorar - o mar pode fazer isso com as pessoas.'
  exits:
    down:
      target_vnum: '010213213204'
    up:
      target_vnum: '010213213202'
  local_id: '13203'
  name: Nos Degraus
  vnum: '010213213203'
- description: 'Você está na base de uma série de degraus que levam ao topo de um

    penhasco.  A praia se extende para leste e oeste além da sua visão.'
