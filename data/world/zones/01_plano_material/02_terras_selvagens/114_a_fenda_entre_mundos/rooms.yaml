- description: "Você está parado em frente a um pequeno pátio que leva a um portão\
    \ na\nmuralha.  As rochas que cobriam toda região param exatamente no caminho\
    \ que\nsegue ao lado dos altos muros negros, permitindo que se caminhe\ntranqüilamente\
    \ (?) por ali.  Tentando descobrir até onde a construção vai,\nvocê força seus\
    \ olhos para até onde a vista alcança e descobre que ela\nparece não terminar.\
    \  Ã\x89 possível ainda ver, ao longo da muralha postos onde\nestranhos seres\
    \ montam guarda.  Mas a visão do que está a norte é que o\nfascina mais..."
  exits:
    north:
      target_vnum: '010211411500'
    west:
      target_vnum: 010211411438
