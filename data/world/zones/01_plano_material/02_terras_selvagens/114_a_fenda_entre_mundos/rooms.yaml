- description: |-
    Você seguiu por aquilo que parecia um túnel de luz e chegou em um lugar
    completamente escuro e frio.  A sensação de vazio total é angustiante, e
    fica maior quando você percebe que qualquer som que faça se perde, sem ao
    menos dar indício de que encontrou alguma barreira para poder voltar.  A
    passagem que o trouxe até aqui parece ter sumido como que por mágica e,
    surgindo aparentemente do nada, um estranho vórtice de energia aparenta ser
    a única coisa que de fato existe por aqui.
  exits: {}
  local_id: '11400'
  name: Além da Luz
  vnum: '010211411400'
- description: "Você está no lugar que os antigos chamavam de fenda entre mundos.\
    \  Uma\ndensa névoa cobre tudo a seu redor, mas o ponto onde você se encontra\
    \ parece\nestar sendo particularmente iluminado.  O solo é gramado, muito verde,\
    \ e\nestá molhado, parecendo que antes de sua chegada aqui tenha chovido, mas\
    \ o\nfato de não haver nuvem alguma no céu o confunde.  Ã\x89 fácil andar por\
    \ aqui,\npois, apesar da dificuldade de se enxergar alguma coisa, não há\nirregularidades\
    \ no chão, nem sinal de que o sol vai se pôr."
  exits:
    east:
      target_vnum: '010211411403'
    north:
      target_vnum: '010211411402'
    south:
      target_vnum: '010211411402'
    west:
      target_vnum: '010211411403'
  local_id: '11401'
  name: A Fenda Entre Mundos
  vnum: '010211411401'
