- description: 'Ahhh... A entrada para a zona dos iniciantes! O lugar pelo qual você
    tem

    procurado. Bem, quando você estiver pronto, siga para o norte.'
  exits:
    north:
      target_vnum: 010218618601
  local_id: '18600'
  name: A Entrada para a Zona dos Iniciantes
  vnum: 010218618600
- description: 'Você se encontra entrando por um longo corredor.   Você pode ouvir
    o som

    de criaturas vagando por perto mas não pode dizer, com certeza, de onde

    o som vem exatamente.

    A saída fica ao leste, ao longo da antecâmara e ao sul de volta à entrada.'
  exits:
    east:
      target_vnum: 010218618602
    south:
      target_vnum: 010218618648
  local_id: '18601'
  name: O Começo da Passagem
  vnum: 010218618601
- description: 'Voce continua vagando pela antecâmara.   Não há nada de muito diferente
    por

    aqui mas você está certo de ter ouvido barulhos atrás da porta ao sul, e vindo

    do leste.  As paredes estão bem gosmentas e mofadas aqui... Eca!   Eles não

    podiam arrumar alguém para limpar este lugar?   O que os iniciantes não

    irão pensar?

    Bem, você pode continuar ao longo da antecâmara para leste ou oeste.'
  exits:
    east:
      target_vnum: 010218618603
    south:
      target_vnum: 010218618606
    west:
      target_vnum: 010218618601
  local_id: '18602'
  name: A Antecâmara Suja
  vnum: 010218618602
- description: 'Bem... você alcançou uma intersecção de duas passagens, para norte

    e leste a passagem se ilumina mas a antecâmara escura continua ao sul.'
  exits:
    east:
      target_vnum: 010218618646
    north:
      target_vnum: 010218618644
    south:
      target_vnum: 010218618607
    west:
      target_vnum: 010218618602
  local_id: '18603'
  name: Um Nexus
  vnum: 010218618603
- description: 'A passagem estreita é limpa e sem nenhuma decoração.   Termina abruptamente

    ao sul em uma pequena porta de carvalho, atrás da qual você ouve movimento...'
  exits:
    north:
      target_vnum: 010218618647
    south:
      target_vnum: 010218618612
  local_id: '18604'
  name: Uma Passagem Estreita
  vnum: 010218618604
- description: 'Credo... um escuro fosso de lixo.   Pior: o que é aquela coisa suja,
    cheia

    de lixo, olhando pra você de um canto?   ECCAAA!   Talvez você devesse voltar

    para cima, onde é um pouco mais seguro, a menos que você possa enfrentar

    aquela coisa nojenta...'
  exits:
    up:
      target_vnum: 010218618606
  local_id: '18605'
  name: O Fosso Escuro
  vnum: 010218618605
- description: 'Hmmm... este é um quartinho interessante.   Eca!!! e há uma pequena

    criatura interessante olhando prá você também.   Ele parece um pouco

    surpreso com sua intromissão.   Você pode partir pela porta ao norte ou leste,

    ou você pode ficar e aborrece-lo um pouco mais.   Também parece haver um poço

    aqui mas há uma grade bastante segura e pesada que o está cobrindo.'
  exits:
    down:
      target_vnum: 010218618605
    east:
      target_vnum: 010218618607
    north:
      target_vnum: 010218618602
  local_id: '18606'
  name: Um Pequeno Quarto
  vnum: 010218618606
- description: 'Que alegria! Mais dessa passagem chata! Será que existe algo mais
    excitante

    atrás daquela porta a oeste? Ou será que existem outras antecâmaras ao norte

    e ao sul?'
  exits:
    north:
      target_vnum: 010218618603
    south:
      target_vnum: 010218618611
    west:
      target_vnum: 010218618606
  local_id: '18607'
  name: Mais da Antecâmara
  vnum: 010218618607
- description: "Finalmente, voce está em campo aberto...  Ã\x89 tão bom respirar ar\
    \ fresco\nnovamente!  Você pode voltar àquele lugar nojento e fedorento ao leste\
    \ ou\nusar a saída a norte, que parece ser um ótimo atalho para o Templo."
  exits:
    east:
      target_vnum: 010218618609
    north:
      target_vnum: '01010000050'
  local_id: '18608'
  name: Um Campo Aberto no Grande Campo
  vnum: 010218618608
- description: 'Ahhh... Finalmente o final da antecâmara... Você pode sair ao ar livre

    ao oeste, ou voltar para leste e se certificar de não ter esquecido nada.'
  exits:
    east:
      target_vnum: 010218618610
    west:
      target_vnum: 010218618608
  local_id: '18609'
  name: O Final da Passagem
  vnum: 010218618609
- description: 'A antecâmara continua em direção ao leste e oeste... e as coisas parecem

    estar mais claras a oeste.'
  exits:
    east:
      target_vnum: 010218618611
    west:
      target_vnum: 010218618609
  local_id: '18610'
  name: Uma Antecâmara Iluminada
  vnum: 010218618610
- description: 'Outro canto da passagem e está tão sujo quanto o resto deste lugar,
    ou

    quem sabe, talvez até mais!!!   Há uma porta ao leste...Para onde ela levará?

    Ah!!! e a antecâmara continua para o oeste e norte.'
  exits:
    east:
      target_vnum: 010218618612
    north:
      target_vnum: 010218618607
    west:
      target_vnum: 010218618610
  local_id: '18611'
  name: Outro Canto
  vnum: 010218618611
- description: 'Várias garrafas e frascos se encontram aqui mas tudo parece bagunçado
    e

    inútil.   Aparentemente, o alquimista que trabalha aqui é realmente muito

    apegado à sua arte.   Há várias fórmulas e encantos escritos pelas paredes

    também... Será que ele não possui dinheiro para comprar papel?   Há uma porta

    ao norte e também uma escadaria escura num canto, que parece descer para algum

    lugar, com um grande aviso próximo a ela, que você talvez devesse ler...'
  exits:
    down:
      target_vnum: 010218618632
    north:
      target_vnum: 010218618604
    west:
      target_vnum: 010218618611
  local_id: '18612'
  name: A Sala do Alquimista
  vnum: 010218618612
- description: 'Este canto é bem parecido com os outros... Exceto por um pequeno brilho

    que você percebe, vindo do sul.   Poderia ser uma saída... Você espera...'
  exits:
    east:
      target_vnum: 010218618621
    south:
      target_vnum: 010218618629
  local_id: '18620'
  name: Uma Curva na Passagem
  vnum: 010218618620
- description: 'Esta é uma intersecção de uma longa passagem do leste-oeste com um

    corredor que segue para o sul.   O ar parece um pouco mais claro, como se você

    estivesse se aproximando de uma saída.'
  exits:
    east:
      target_vnum: 010218618622
    south:
      target_vnum: 010218618633
    west:
      target_vnum: 010218618620
  local_id: '18621'
  name: Uma Intersecção em "T" na Passagem
  vnum: 010218618621
- description: 'Aqui a passagem faz uma curva, vinda do norte e segue para o oeste.

    As paredes ainda são cobertas com os mesmos fungos nojentos que você tem visto,

    e você ouve sons de criaturas se movendo à sua volta...'
  exits:
    south:
      target_vnum: 010218618628
    west:
      target_vnum: 010218618621
  local_id: '18622'
  name: Outro Canto
  vnum: 010218618622
- description: 'Você pode ouvir criaturas se movendo à sua volta... E não são sons

    muito reconfortantes, não.   Talvez nem fosse bom mencionar nada sobre a

    mobília...As paredes acinzentadas são lisas, com uma imensa quantidade de fungo

    verde (ou alguma coisa) crescendo sobre elas.'
  exits:
    east:
      target_vnum: 010218618624
    south:
      target_vnum: 010218618627
  local_id: '18623'
  name: Um Canto na Antecâmara
  vnum: 010218618623
- description: 'Hmmm... A passagem faz uma curva para o sul, aqui.   Você começa a
    perceber

    que pode facilmente perder seu pertences se não for cuidadoso e começa a achar

    que talvez fosse melhor não perder muito tempo aqui...'
  exits:
    south:
      target_vnum: 010218618630
    west:
      target_vnum: 010218618623
  local_id: '18624'
  name: Outra Curva
  vnum: 010218618624
- description: 'A passagem se abre para um grande salão oval.   Não há nada de muito

    interessante por aqui...'
  exits:
    east:
      target_vnum: 010218618626
    south:
      target_vnum: 010218618631
  local_id: '18625'
  name: Uma Sala Maior
  vnum: 010218618625
- description: 'Esta é uma longa e estreita passagem que vai para o leste e oeste.   As

    paredes sao úmidas e cobertas com bolor e fungos.   O ar aqui é pouco

    saudável e você começa a querer sair daqui... e rápido!'
  exits:
    east:
      target_vnum: 010218618627
    west:
      target_vnum: 010218618625
  local_id: '18626'
  name: Uma Longa Passagem Leste-Oeste
  vnum: 010218618626
- description: 'Aqui a estreita passagem leste-oeste cruza com uma passagem mais larga

    ao norte e sul.   O ar é umido e há um cheiro de decadência e ruínas no ar.

    Realmente esse nao é um lugar muito agradável...'
  exits:
    east:
      target_vnum: 010218618628
    north:
      target_vnum: 010218618623
    south:
      target_vnum: 010218618632
    west:
      target_vnum: 010218618626
  local_id: '18627'
  name: Um Cruzamento de Corredores
  vnum: 010218618627
- description: 'Este quarto é pouco mais que um cruzamento de passagens.   Você sente
    uma

    leve brisa vinda da passagem ao norte mas tem um cheiro ruim...'
  exits:
    north:
      target_vnum: 010218618622
    west:
      target_vnum: 010218618627
  local_id: '18628'
  name: Um Canto do Quarto
  vnum: 010218618628
- description: 'Demora um tempo para você perceber que aquele brilho vermelho vem
    de um

    portal redondo no chão.  Parece como se tivessem pintado a gravura de uma

    estrada de terra no chão desta sala, com alguém correndo através dos campos,

    indo em direção a um templo.  Mais estranho ainda: é tão real, que você

    consegue sentir o vento dos campos e a movimentação do templo, vindos da

    pintura.'
  exits:
    down:
      target_vnum: '01010000050'
    east:
      target_vnum: 010218618630
    north:
      target_vnum: 010218618620
  local_id: '18629'
  name: A Sala Vermelha
  vnum: 010218618629
- description: 'A passagem norte-sul se divide para o leste, daqui.   Há um estrambólico

    brilho vermelho vindo desse lado também, como se fosse uma leve brisa.'
  exits:
    north:
      target_vnum: 010218618624
    south:
      target_vnum: 010218618634
    west:
      target_vnum: 010218618629
  local_id: '18630'
  name: Uma Passagem Dividida
  vnum: 010218618630
- description: 'Eca... Este lugar é nojento!   Você tenta se manter afastado das paredes

    mas a passagem é tão estreita, toda vez que você se mexe, você esbarra nelas,

    por mais cuidadoso que você esteja sendo.   Você está quase convencido de que

    o fungo que cobre estas paredes, está quase cobrindo você também.'
  exits:
    east:
      target_vnum: 010218618632
    north:
      target_vnum: 010218618625
    south:
      target_vnum: 010218618638
  local_id: '18631'
  name: Uma Passagem
  vnum: 010218618631
- description: "Ã\x89 escuro escuro, nojento e absurdamente frio aqui.   Você ouve\
    \ sons de\ncriaturas se movendo à sua volta... De algum modo, elas não soam nada\
    \ amigáveis.\nTalvez seja uma sábia atitude ter um pouco de cautela aqui..."
  exits:
    north:
      target_vnum: 010218618627
    south:
      target_vnum: 010218618635
    up:
      target_vnum: 010218618612
    west:
      target_vnum: 010218618631
  local_id: '18632'
  name: A Entrada
  vnum: 010218618632
- description: 'Bem... O que dizer?   Mais fungos!...mais sons estranhos!!!... e uma
    leve

    brisa vinda do norte.   Talvez fosse bom que você pudesse aprender a andar

    nesse lugar, não?'
  exits:
    east:
      target_vnum: 010218618634
    north:
      target_vnum: 010218618621
  local_id: '18633'
  name: Outro Canto
  vnum: 010218618633
- description: 'Frio, fedorento, e coberto por musgos esverdeados... que são bem parecidos

    com as sobras da verdura da semana.  Ainda assim, você não queria fazer nada

    aqui, apenas pretende sair o mais rápido possível.'
  exits:
    north:
      target_vnum: 010218618630
    south:
      target_vnum: 010218618637
    west:
      target_vnum: 010218618633
  local_id: '18634'
  name: Uma Intersecção de Passagens
  vnum: 010218618634
- description: 'Este lugar é nauseante...Certamente cheira como se algo (ou alguém)

    tivesse morrido aqui.   Você espera não ser o próximo mas, pelos sons que você

    ouve à sua volta, parece que alguma coisa tem outras idéias a este respeito.'
  exits:
    east:
      target_vnum: 010218618636
    north:
      target_vnum: 010218618632
  local_id: '18635'
  name: Uma Curva na Passagem
  vnum: 010218618635
- description: 'A passagem leste-oeste se divide ao sul daqui.   Tudo à sua volta
    tem

    cheiro de morte.   Realmente, o bolor e o fungo das paredes ajuda bastante,

    mas por outro lado... bem... você não gostaria de pensar sobre o que mais

    vive neste lugar.'
  exits:
    east:
      target_vnum: 010218618637
    south:
      target_vnum: 010218618639
    west:
      target_vnum: 010218618635
  local_id: '18636'
  name: Um Desvio para o Sul
  vnum: 010218618636
- description: 'A passagem vira aqui e dirige-se para o norte.   Você pressente que
    há algo

    à sua frente, se seguir por este caminho, mas não está muito certo disso.

    Você não está muito seguro se quer realmente saber algo além desse ponto.'
  exits:
    north:
      target_vnum: 010218618634
    west:
      target_vnum: 010218618636
  local_id: '18637'
  name: Mais Outro Canto
  vnum: 010218618637
- description: 'Voce quase tropeça ao entrar nesta sala... A sensação de não haver

    paredes em ambos os lados, deixa você um pouco nervoso e inquieto.   Você

    está vulnerável em todos os sentidos.   Você não pode nem imaginar o tamanho

    desta sala, pois a mesma se extende para o leste, muito mais do que a sua luz

    consegue alcançar...'
  exits:
    east:
      target_vnum: 010218618639
    north:
      target_vnum: 010218618631
  local_id: '18638'
  name: Uma Sala Grande
  vnum: 010218618638
- description: 'Quando você entra, sua luz reflete na parede a leste.   Parece que
    há

    palavras gravadas na parede e uma pintura cruel.   A oeste, a sala se estende

    além do alcance da sua luz e sombras escuras lhe deixam paranóico...

    Algo poderia se esconder lá.   Você está dolorosamente consciente, de como

    você fica exposto e frágil, quando não existem paredes à sua volta.'
  exits:
    north:
      target_vnum: 010218618636
    west:
      target_vnum: 010218618638
  local_id: '18639'
  name: Uma Sala Grande
  vnum: 010218618639
- description: 'Aqui a passagem entra em uma pequena sala.   A saída leva a leste
    e sul,

    e você vê uma maravilhosa e bastante grande (e de bom gosto) estátua, ao norte.'
  exits:
    east:
      target_vnum: 010218618641
    south:
      target_vnum: 010218618644
  local_id: '18640'
  name: A Sala da Estátua
  vnum: 010218618640
- description: 'Voce continua vagando pela antecâmara e repara nas bandeiras, pinturas
    e

    outras finas decorações que estão enfeitando as paredes ao longo da passagem.

    Parece muito diferente da passagem tão despojada e sem graça, de onde você veio.'
  exits:
    east:
      target_vnum: 010218618642
    west:
      target_vnum: 010218618640
  local_id: '18641'
  name: A Antecâmara
  vnum: 010218618641
- description: 'Aqui a sala se abre para uma grande sala, com alto teto abobadado.   Agora

    que você sai da passagem, você vê que a escada leva a uma sacada a céu aberto,

    que se debruça sobre a área.   Ao sul, a sala prolonga-se e outra escada é

    visível, unindo-se àquela que está à sua frente.'
  exits:
    south:
      target_vnum: 010218618647
    up:
      target_vnum: 010218618643
    west:
      target_vnum: 010218618641
  local_id: '18642'
  name: As Escadarias Norte
  vnum: 010218618642
- description: 'Aqui você pode olhar e observar o mundo a sua volta.   Construída
    em um

    semi-círculo que circunda todo o domo da sala, a sacada permite que você

    olhe em qualquer direção.   Ao extremo norte, você pode ver que os

    Grandes Campos de Midgaard se prolongam até as Montanhas Dragonhelm, ao norte.'
  exits:
    down:
      target_vnum: 010218618642
    south:
      target_vnum: 010218618645
  local_id: '18643'
  name: A Sacada
  vnum: 010218618643
- description: 'Uau! Que diferença da passagem ao sul.   Quem quer que mantenha esse
    lugar,

    deve realmente gostar de iniciantes.   As paredes e o chão são limpos e

    lindamente decorados.   Você repara em um interesante desenho no chão.'
  exits:
    north:
      target_vnum: 010218618640
    south:
      target_vnum: 010218618603
  local_id: '18644'
  name: Uma Antecâmara Iluminada
  vnum: 010218618644
- description: 'Aqui você pode olhar e observar o mundo a sua volta.   Construída
    em um

    semi-círculo que circunda todo o domo da sala, a sacada permite que você

    olhe para qualquer direção.   No extremo sul, você pode ver a grande Cidade de

    Midgaard.'
  exits:
    down:
      target_vnum: 010218618647
    north:
      target_vnum: 010218618643
  local_id: '18645'
  name: A Sacada
  vnum: 010218618645
- description: 'Uau!   Que diferença da passagem ao sul.   Quem quer que mantenha
    esse lugar,

    deve realmente gostar de iniciantes.   As paredes e o chão são limpos e

    lindamente decorados.   Você repara num interesante desenho no chão.'
  exits:
    east:
      target_vnum: 010218618647
    west:
      target_vnum: 010218618603
  local_id: '18646'
  name: Uma Antecâmara Iluminada
  vnum: 010218618646
- description: 'Aqui a sala se abre para uma grande sala, com alto teto abobadado.   Agora

    que você sai da passagem, você vê que a escada leva a uma sacada a céu aberto,

    que se debruça sobre a área.   Ao norte, a sala se prolonga e outra escada é

    visível, unindo-se àquela que está à sua frente.'
  exits:
    north:
      target_vnum: 010218618642
    south:
      target_vnum: 010218618604
    up:
      target_vnum: 010218618645
    west:
      target_vnum: 010218618646
  local_id: '18647'
  name: As Escadarias Sul
  vnum: 010218618647
- description: 'Ahhh...  A saída para a zona dos iniciantes!  Se você se cansou de
    ficar

    aqui, vá embora seguindo para oeste, onde fica um pequeno atalho que leva

    direto ao Templo.  Caso de mudado de idéia, siga norte.'
  exits:
    north:
      target_vnum: 010218618601
    west:
      target_vnum: '01010000050'
  local_id: '18648'
  name: A Saída para a Zona dos Iniciantes
  vnum: 010218618648
