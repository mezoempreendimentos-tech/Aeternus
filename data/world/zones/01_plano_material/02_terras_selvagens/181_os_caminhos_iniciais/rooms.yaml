- description: "Você está no local onde os aventureiros param para se abastecer com\n\
    comida antes de seguirem em suas jornadas.  Se você olhar bem, verá que\nalguma\
    \ alma caridosa deixou três pães de viagem aqui.  Pode pegar!  Ã\x89 seu\nagora!\
    \  Ã\x89 fácil...  Basta digitar @WGET PÃ\x83O@n até que todos os pães estejam\
    \ em\nsuas mãos.  E quando a fome bater, basta digitar @WEAT PÃ\x83O@n.  Ã\x89\
    \ bem saboroso,\nnão acha?  Notou que um imenso @Wpainel@n foi colocado na parede?\
    \  Que tal\nlê-lo?  Para seguir com a sua jornada, digite W."
