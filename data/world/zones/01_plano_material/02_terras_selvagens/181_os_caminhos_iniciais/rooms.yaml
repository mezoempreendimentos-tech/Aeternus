  name: Sala do Aprendizado
  vnum: 010218118115
- description: |-
    Que sala mais estranha...  São dezenas, talvez centenas de cabeças de
    animais empalhados.  Alguns estão expostos como se fossem troféus.  Outros
    parecem estar ali apenas para lembrar às criaturas dos grandes perigos que
    as aguardam.  Você observa que há uma pequenina @Wfrase@n escrita na parede.  O
    local, embora grande, lhe causa um certo mal estar e uma sensação um tanto
    claustrofóbica parece querer tomar conta de você.  Estranho, mas você sente
    como se mil olhos estivessem observando seus movimentos.  Uma sombra surge
    do nada e parece estar chegando bem perto.  São movimentos rasteiros,
    sinuosos e você pressente que alguma coisa está se erguendo à sua frente,
    pronta para atacá-lo.  Lembre-se de tudo aquilo que aprendeu até agora e
    coloque em prática sem medo.  Os Deuses estarão ao seu lado.
  exits:
    west:
      target_vnum: 010218118117
  local_id: '18116'
  name: Sala das Façanhas
  vnum: 010218118116
- description: "E você começa a perceber que já está mais seguro e que mal pode esperar\n\
    para iniciar suas batalhas.  Esta sala é práticamente o Início de sua\njornada\
    \ e você sente que seu coração começa a bater mais forte e observa que\nraios\
    \ de luz começam a envolver o seu corpo e uma imensa paz envolve seu e\nsua mente.\
    \  Você se sente seguro, pois recebeu as bençãos dos Deuses de\nVitália e compreende\
    \ que seu caminho será exatamente aquele que você\nescolher para trilhar.  E que\
    \ as recompensas virão na mesma proporção.\nÃ\x89 importante seguir conhecendo.\
    \  Uma @Wmensagem @n foi escrita para você.\nAntes de deixar esta sala, respire\
    \ fundo, concentre-se e Boa Jornada."
