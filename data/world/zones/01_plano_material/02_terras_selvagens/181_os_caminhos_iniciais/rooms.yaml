    \ os\nPontos Cardeais.  Um objeto foi deixado no chão.  Ã\x89 um @Wmapa@n.  Pegue-o.\
    \  Para\nfazê-lo, digite @WGET MAPA@n.  Na parede, um enorme @Wpainel@n brilha,\
