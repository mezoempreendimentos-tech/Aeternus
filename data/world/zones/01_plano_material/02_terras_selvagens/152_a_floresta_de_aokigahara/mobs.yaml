- description: |-
    Este homem move-se pelos jardins de Shizuka como uma brisa silenciosa. As suas
    roupas de algodão simples são da cor da terra, e as suas mãos, embora
    calejadas, tocam em cada folha e pétala com uma delicadeza infinita. O seu
    rosto está quase sempre escondido por um chapéu de palha de abas largas, mas
    quando o levanta, revela um olhar que reflete a paciência das estações.

    Ele é o guardião da beleza terrena de Shizuka. A sua tarefa não é dominar a
    natureza, mas sim ouvi-la e ajudá-la a expressar a sua mais perfeita canção.
    Ele compreende a linguagem da água, a necessidade de cada raiz e o sonho de
    cada semente. Para ele, a jardinagem não é trabalho, é uma forma de meditação
    ativa, um diálogo constante com a vida que floresce sob os seus cuidados.
