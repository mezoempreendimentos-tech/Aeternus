- description: |-
    Este homem parece tão antigo quanto as pedras do caminho que ele cuida. O seu
    rosto é um mapa de rugas profundas e serenas, e os seus olhos, quase fechados
    em constante meditação, contêm a paz de mil estações. Veste um hábito simples,
    de um cinzento desbotado, limpo e remendado em vários locais. As suas mãos,
    embora nodosas pela idade, movem-se com uma graça fluida e sem esforço.

    Ele não fala, nem parece notar a sua presença de forma direta. A sua existência
    está inteiramente focada na sua tarefa: varrer as folhas de bambu e as pétalas
    de cerejeira que caem, mantendo o Caminho da Purificação imaculado. Cada
    movimento da sua vassoura é lento, deliberado, não um trabalho, mas um ritual.
    Ele é a primeira personificação da filosofia de Shizuka: encontrar o sublime no
    serviço humilde.
