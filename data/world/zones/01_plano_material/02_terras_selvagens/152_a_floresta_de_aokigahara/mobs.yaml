- description: |-
    Este homem parece ter brotado do próprio solo do seu jardim. A sua pele é
    bronzeada pelo sol, e pequenas folhas e pétalas estão frequentemente presas no
    seu cabelo comprido e grisalho. As suas mãos estão manchadas com o sumo de
    plantas, e as suas unhas guardam a terra escura e fértil dos seus canteiros.
    Veste roupas simples de linho, práticas e sem adornos.

    Ele é um mestre da sabedoria da terra. Não usa feitiços ou encantamentos, mas
    sim o conhecimento profundo do espírito de cada planta. Ele sabe que raiz
    acalma uma febre, que folha fecha uma ferida e que flor afasta os pesadelos. O
    seu trabalho é uma alquimia silenciosa, uma conversa com a natureza. Ele
    representa a cura pura, o poder da vida a lutar contra a doença, um contraste
    direto com a corrupção antinatural que reside para lá do portão da cidade.
