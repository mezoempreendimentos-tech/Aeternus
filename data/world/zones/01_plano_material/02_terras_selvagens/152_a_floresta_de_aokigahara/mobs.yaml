- description: |-
    A sua beleza não é a da juventude, mas a da sabedoria. Veste um quimono de cor
    sóbria, e os seus longos cabelos escuros estão presos por um único pino de
    jade. Os seus óculos, de aros finos, repousam na ponta do nariz, e os seus
    olhos movem-se rapidamente, absorvendo textos em línguas que já morreram para o
    resto do mundo. Ela não caminha; ela desliza, os seus pés não fazendo qualquer
    som no chão de madeira da biblioteca.

    Ela é a memória viva de Shizuka. Conhece a história de cada pedra da cidade e o
    nome de cada espírito da floresta. O seu propósito não é apenas guardar o
    conhecimento, mas protegê-lo, partilhando-o apenas com aqueles que demonstram
    um verdadeiro desejo de compreender, e não de possuir. O seu silêncio é o de um
    vasto oceano de histórias, e cada palavra que pronuncia é escolhida com o
    cuidado de quem sabe o peso e o poder do saber.
