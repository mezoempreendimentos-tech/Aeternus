- description: |-
    A forma diante de si é uma ferida na realidade, um eco de uma pessoa que já não
    existe. A sua figura é vagamente humanoide, tecida a partir de fumo pálido e
    luar doentio, tremeluzindo dentro e fora da existência.

    Não possui traços faciais, apenas a sugestão de dois buracos vazios onde os
    olhos deveriam estar, dos quais escorrem rios silenciosos de uma tristeza
    líquida e escura. Os seus membros alongam-se e encolhem-se sem lógica, e o
    vento passa através dela sem mover um único fio do seu ser espectral. Um frio
    que não é natural emana dela, um frio que congela a alma em vez da pele.
