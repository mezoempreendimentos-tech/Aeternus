  vnum: '15230'
- description: |-
    Este jovem parece quase etéreo, a sua figura esguia envolta em sedas de cores
    pálidas que se agitam com a mais leve brisa. O seu cabelo escuro e comprido cai
    sobre um rosto de traços finos e pensativos. Os seus olhos não observam o
    mundo, mas parecem olhar através dele, vendo a poesia invisível que conecta
    todas as coisas. Ele não fala muito, preferindo ouvir o mundo a falar com ele.

    Ele é a voz da beleza de Shizuka. Enquanto outros a expressam com metal,
    madeira ou chá, ele fá-lo com palavras. Ele senta-se durante horas, a ouvir o
    sino de vento, a observar as carpas no lago ou a sentir a brisa, e depois, com
    movimentos rápidos do seu pincel, captura a essência desses momentos em versos
    que podem fazer um guerreiro chorar. Os seus poemas são tesouros, fragmentos da
    alma da cidade dados a quem tiver um coração para os ouvir.
