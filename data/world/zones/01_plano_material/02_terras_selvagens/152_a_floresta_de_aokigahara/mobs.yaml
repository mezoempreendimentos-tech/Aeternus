- description: |-
    A Senhora Chiyo pode ter cinquenta ou quinhentos anos; é impossível dizer. O
    seu cabelo é branco como a neve, preso num coque perfeito, mas a sua pele é
    lisa e o seu olhar é límpido e penetrante como o de uma jovem. Veste um quimono
    de seda simples, da cor do musgo após a chuva. Os seus movimentos são o epítome
    da economia e da graça; cada gesto, desde pegar na taça até verter a água, é
    uma lição de harmonia.

    Ela é o coração social e a guardiã das histórias de Shizuka. Falar com ela é
    mais do que uma conversa; é um ritual. As suas palavras são como as folhas de
    chá que ela serve: poucas, mas cheias de sabor e significado. Ela fala em
    metáforas e provérbios, e as suas lições sobre a cerimónia do chá são, na
    verdade, lições sobre a vida, a paciência e a forma de encontrar a beleza no
    momento presente. Muitos segredos e pedidos de ajuda começam com uma simples
    taça de chá partilhada.
  keywords:
  - mestra
  - cha
  - senhora
  - chiyo
  - mulher
  name: a Mestra do Chá, Senhora Chiyo
