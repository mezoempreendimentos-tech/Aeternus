- description: "Uma quietude reverente e o cheiro a séculos de conhecimento permeiam\
    \ este\nlugar. O ar é fresco e seco, com o aroma de papel de bambu antigo, tinta\
    \ e\ncouro curado. A sala é vasta, com um teto alto suportado por pilares de madeira\n\
    maciça. A luz é fraca, vinda de claraboias no alto, e os seus raios caem como\n\
    colunas de pó dourado, iluminando um labirinto de estantes altas feitas de\nbambu\
    \ escuro.\n\nEsta biblioteca é um tesouro silencioso. As estantes estão repletas\
    \ não de\nlivros encadernados, mas de milhares de rolos de pergaminho, cada um\
    \ amarrado\ncom uma fita de seda de cor diferente, e de finos códices de placas\
    \ de bambu\ncosidas. Não se ouve o virar de páginas, apenas o farfalhar ocasional\
    \ de um\nrolo a ser cuidadosamente aberto ou o deslizar silencioso de uma escada\
    \ de\nmadeira sobre rodas.\n\nHá uma sensação de tempo suspenso aqui, como se\
    \ cada pergaminho contivesse não\napenas palavras, mas os próprios momentos em\
    \ que foram escritos. Ã\x89 um lugar de\nestudo solitário e contemplação, onde\
    \ a história da cidade, os segredos da\nnatureza e as filosofias da paz são guardados\
    \ e protegidos. O silêncio não é\numa regra, mas uma consequência natural do respeito\
    \ pelo saber aqui contido."
  exits:
    north:
      target_vnum: '010215215261'
  local_id: '15263'
  name: Biblioteca dos Sussurros de Bambu
  vnum: '010215215263'
- description: "Este lugar desafia a arquitetura e a razão. Não há paredes, chão ou\
    \ teto no\nsentido convencional, mas um espaço que parece existir no coração de\
    \ uma\nestrela adormecida. Você está sobre uma plataforma de cristal que parece\n\
    flutuar num vazio de luz prateada e suave. Acima, abaixo e ao redor, filamentos\n\
    de energia pura, como as pétalas da grande Sakura, flutuam e dançam numa\ncorrenteza\
    \ silenciosa e eterna.\nO ar aqui não se respira, mas absorve-se. Ã\x89 pura serenidade,\
    \ uma energia que\nvibra numa frequência tão alta que silencia todos os pensamentos\
    \ e preenche o\nespírito com uma paz que transcende a compreensão. Não há som,\
    \ nem cheiro, nem\ntemperatura. Há apenas a sensação de estar na presença de um\
    \ poder primordial,\na fonte da aura que protege toda a Shizuka.\nNo centro do\
    \ espaço, a luz condensa-se numa esfera pulsante, que bate\nlentamente como um\
    \ coração cósmico. Não é um objeto a ser olhado, mas uma\npresença a ser sentida.\
    \ Este é o nexo, o ponto de ancoragem onde a paz se\nmanifesta como realidade.\
    \ Estar aqui é ser desfeito e refeito, é tocar no\nespírito guardião da cidade\
    \ e compreender, sem palavras, que a maior força do\nuniverso não é o poder, mas\
    \ a harmonia."
  exits:
    west:
      target_vnum: '010215215261'
