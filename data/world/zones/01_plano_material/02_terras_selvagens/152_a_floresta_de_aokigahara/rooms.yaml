- description: "O ar neste salão é rarefeito e cheira a tinta de sândalo e a papel\
    \ de arroz. Ã\x89\num espaço amplo e aberto, com um chão de madeira de cedro tão\
    \ polido que\nreflete a luz suave que entra por grandes janelas de papel. Não\
    \ há mobília,\nexceto por esteiras de tatami dispostas em ordem perfeita e pequenos\
    \ suportes\nde laca preta para pincéis e tinteiros. O silêncio aqui não é vazio,\
    \ mas\npreenchido por uma concentração intensa.\n\nEste é um lugar de disciplina\
    \ através da arte. Onde outros treinam com a\nespada, os monges e eruditos de\
    \ Shizuka treinam aqui com o pincel. Cada\nmovimento, cada respiração, é um exercício\
    \ de controlo e intenção. Nas paredes,\npendurados em rolos de seda, estão exemplos\
    \ de caligrafia, desde o traço mais\nsimples e perfeito de um círculo (enso) até\
    \ poemas complexos cujos caracteres\nfluem como um rio.\n\nA atmosfera é de uma\
    \ calma focada. Estar neste salão é sentir um impulso para\naquietar os seus próprios\
    \ pensamentos, para respirar mais devagar, para\nencontrar a clareza que precede\
    \ o ato de criação. Ã\x89 um testemunho de que a\nmaior força não reside no músculo,\
    \ mas na mente que pode encontrar a\nimobilidade no meio do movimento e a beleza\
    \ num único e perfeito traço de\ntinta."
