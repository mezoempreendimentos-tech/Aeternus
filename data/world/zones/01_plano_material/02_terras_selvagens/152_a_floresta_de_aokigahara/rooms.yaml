- description: "Este pequeno jardim é um refúgio de silêncio absoluto, um segredo\
    \ guardado para\naqueles que procuram a mais profunda concentração. O espaço é\
    \ murado por bambu\nalto e denso, que isola todos os sons do resto da cidade.\
    \ Não há plantas ou\nflores, apenas areia branca ancinhada em linhas retas e perfeitas,\
    \ e uma única\ne grande rocha negra, lisa e sem musgo, no centro exato.\n\nA luz\
    \ do sol cai diretamente sobre a rocha central, aquecendo-a suavemente,\nenquanto\
    \ o resto do jardim permanece numa sombra fresca. O contraste entre a\nluz e a\
    \ sombra, o branco da areia e o negro da rocha, cria um equilíbrio visual\nque\
    \ acalma a mente e foca o espírito. Este não é um jardim para ser admirado\npela\
    \ sua beleza, mas para ser usado como uma ferramenta para o esvaziamento da\n\
    mente.\n\nA atmosfera é de uma simplicidade austera e poderosa. O ar é imóvel.\
    \ Não há\ndistrações, nem cores, nem movimentos. Ã\x89 um lugar despojado de tudo\
    \ o que é\nsupérfluo, deixando apenas o essencial: o eu, e o caminho para o silêncio\n\
    interior. Sentar-se na borda de madeira que circunda a areia é sentir o mundo\
    \ a\ndesaparecer, até que apenas a respiração e a presença da rocha permaneçam."
  exits:
    south:
      target_vnum: '010215215262'
