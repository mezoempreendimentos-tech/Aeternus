    Ao seu redor você observa uma pequena lareira com algumas brasas em chamas,
    uma mesa de madeira iluminada por uma desgastada vela e algumas cadeiras.
    Sobre o belo piso feito com tábuas de madeira, você observa duas camas que
    pelas suas dimensões deixam claro que são utilizadas por pessoas grandes,
    homens de Bri ou viajantes do sul.  Na parede oeste, você observa uma ampla
    janela coberta por uma grossa cortina.  Ao sul você observa uma porta de
    madeira.
  exits:
    south:
      target_vnum: '14492'
  name: Um Quarto de Hóspede da Estalagem
  vnum: '14494'
- description: |-
    Você está dentro de um quarto de hóspede da agitada estalagem:  O Pônei
    Saltitante.  Ao seu redor você quatro pequenas camas cobertas com lençóis
    brancos, uma bela lareira com algumas brasas em chamas e uma pequena mesa
    cercada por quatro pequeninas cadeiras.  Na parede oeste, você observa uma
    grande janela coberta por uma grossa cortina cinza.  Ao sudeste você observa
    uma porta de madeira.
  exits: {}
  name: Um Quarto de Hóspede da Estalagem
  vnum: '14495'
- description: |-
    Você está caminhando sobre a grande estrada do leste.  Ao seu redor você
    observa alguns arbustos ao longo da estrada e ao sul as distantes colinas do
    sul.  Sobre o solo da estrada, você observa algumas pegadas incrustadas na
    lama e na areia que cobrem totalmente a estrada.  Ao norte você observa
    algumas luzes que surgem da isolada aldeia de Bri e mais além a floresta
    Chet.  Ao sul você observa uma pequena curva na grande estrada do leste.
  exits:
    north:
      target_vnum: '14473'
    south:
      target_vnum: '14497'
  name: A Grande Estrada do Leste
  vnum: '14496'
- description: |-
    Você está caminhando tranqüilamente sobre a grande estrada do leste.  Ao
    seu redor você observa a paisagem desértica da estrada e alguns arbustos que
    nascem ao longo dos limites da estrada.  Ao sul você observa muito distante
    as colinas do sul e ao norte você observa alguns pontos de luz, vindos da
    isolada aldeia de Bri.  Ao norte e ao leste você observa a continuação da
    grande estrada do leste.
  exits:
    east:
      target_vnum: '14498'
    north:
      target_vnum: '14496'
  name: A Grande Estrada do Leste
  vnum: '14497'
