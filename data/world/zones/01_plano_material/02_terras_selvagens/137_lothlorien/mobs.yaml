  - Nimrodel
  - elfa
  - donzela
  long_desc: Nimrodel, a donzela élfica está aqui, procurando Amroth.
  name: Nimrodel
  vnum: '010213713700'
- description: |-
    Você observa um alto e impávido elfo, seu nome é Amroth e seu coração está a
