    west:
      target_vnum: '010215715710'
  local_id: '15709'
  name: O Imenso Salão
  vnum: 010215715709
- description: "Ã\x89 um corredor como outro qualquer.  A não ser pelo silêncio...\
    \  Não é um\nsilêncio comum...  Ã\x89 um silêncio assustador, que lhe faz tremer\
    \ até os pés.\nNo final do corredor se encontra uma sala.  Quem sabe você não\
    \ encontre\nalguém lá.  E que não seja cego, de preferência."
  exits:
    east:
      target_vnum: 010215715709
    west:
      target_vnum: '010215715712'
