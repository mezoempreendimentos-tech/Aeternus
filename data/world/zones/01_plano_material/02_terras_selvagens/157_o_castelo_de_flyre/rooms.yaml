  vnum: '010215715744'
- description: 'Nossa!  Que medo!  Você pensou que existiria alguma criatura de 7
    cabeças

    aqui, mas tudo o que encontrou foi um velho esqueleto.  Agora, você sabe que

    veio para o caminho errado...  Voltar é a única saída.'
  exits:
    east:
      target_vnum: '010215715743'
    west:
      target_vnum: '010215715741'
  local_id: '15745'
  name: A Torre de Apoio
  vnum: '010215715745'
- description: 'Um quarto quase igual ao Quarto real.  Ao ver bonecas, e vários outros

    tipos de brinquedos espalhados, você julga que este deve ser o aposento de

    uma criança, provavelmente da princesa.  Mesmo no quarto de uma criança, o

    clima sinistro não deixa de existir...  Isso já está te dando alguns cabelos

    brancos...'
  exits:
    west:
      target_vnum: '010215715731'
  local_id: '15746'
  name: Um Pequeno Aposento
  vnum: '010215715746'
- description: 'Argh, que cheiro horrível!  Os cavalos aqui presentes infestaram o
    local

    com um cheiro insuportável, que lhe faz sair dali agora, antes que desmaie.

    Mesmo com o cheiro, você não pôde deixar de perceber que os cavalos também

    estavam imóveis...'
  exits:
    west:
      target_vnum: '010215715726'
  local_id: '15747'
  name: O Celeiro
  vnum: '010215715747'
- description: 'Argh, que cheiro horrível!  As vacas aqui presentes infestaram o local

    com um cheiro insuportável, que lhe faz sair dali agora, antes que desmaie.

    Mesmo com o cheiro, você não pôde deixar de perceber que as vacas também

    tinham algo de estranho...  Estavam imóveis.'
  exits:
    east:
      target_vnum: '010215715726'
  local_id: '15748'
  name: O Curral
  vnum: 010215715748
- description: 'Foi a gota d''água!  Aqui você não fica nem por 10 segundos.  O cheiro
    é 5

    vezes pior que o cheiro do curral ou do celeiro.  O silêncio incomoda, mas o

    cheiro é insuportável!  Sair daqui e nunca mais voltar parece ser uma ótima

    idéia.'
  exits:
    northwest:
      target_vnum: '010215715726'
  local_id: '15749'
  name: O Chiqueiro
  vnum: 010215715749
- description: "Ã\x89...  O cheiro daqui não é tão ruim assim, dá para agüentar. \
    \ E você\ncomeça a pensar: até os animais estão imóveis...  Mas as vacas continuam\n\
    dando leite, e as galinhas continuam botando ovos.  Mesmo quase mortos, o\nanimais\
    \ não param de fazer o que devem...  Muito estranho."
  exits:
    northeast:
      target_vnum: '010215715726'
  local_id: '15750'
  name: O Galinheiro
  vnum: '010215715750'
- description: "\"Que fome!  As cenouras parecem estar boas!\"  Você pensa... e estão,\
    \ de\nfato.  Uma plantação de cenoura!  Há quanto tempo você não via uma!  Há\n\
    quanto tempo você não comia uma!  Ã\x89 uma das plantações mais bem cuidadas que\n\
    você já viu.\nAo longe, você avista uma simples mulher, que colhe as cenouras\
    \ e as\ncoloca num cesto, não é preciso dizer o que essa mulher tem de estranho..."
  exits:
    east:
      target_vnum: '010215715752'
    north:
      target_vnum: '010215715726'
    west:
      target_vnum: '010215715755'
  local_id: '15751'
  name: A Plantação de Cenoura
  vnum: '010215715751'
- description: 'Tá aí um vegetal que você não sabe para que serve.  Ele é muito duro,
    e

    machuca os dentes.  Mas se existe, é porque alguma utilidade ele deve ter.

    E não lhe cabe descobrir qual é.  Seu dever agora é desvendar todo o mistério

    que ronda esse local...  Ou sair dele imediatamente.'
  exits:
    south:
      target_vnum: '010215715755'
    west:
      target_vnum: '010215715751'
  local_id: '15752'
  name: Milharal
  vnum: '010215715752'
- description: '"Morangos!  Que delícia!"  Estão vermelhinhos e se demorar mais um
    dia

    para serem degustados, irão apodrecer.  E é querendo evitar esse desperdício

    que uma simples mulher os está(va) colhendo.'
  exits:
    east:
      target_vnum: '010215715751'
    south:
      target_vnum: '010215715754'
  local_id: '15753'
  name: A Plantação de Morangos
  vnum: '010215715753'
- description: 'Milho, morango, leite, ovos, trigo...  Uma infinidade de coisas está

    depositada aqui.  E estão separadas, cada tipo em uma cesta.  Morangos em

    uma, milhos em outra...  Cada cesta está destinada a uma pessoa.'
  exits:
    north:
      target_vnum: '010215715753'
  local_id: '15754'
  name: O Depósito
  vnum: '010215715754'
- description: "Aqui não existe nada de especial...  Ã\x89 apenas uma plantação de\
    \ trigo.  O\nmais incrível, é que você sente o vento, mas não vê a plantação se\
    \ mexendo,\nnem um pouquinho...  Ela permanece imóvel."
  exits:
    north:
      target_vnum: '010215715752'
  local_id: '15755'
  name: A Plantação de Trigo
  vnum: '010215715755'
- description: 'Essa é a sala onde a Ave de Fogo depositava seus pertences mais

    preciosos.  Será que, após tantos séculos fechada, essa sala ainda

    guarda algo de valioso?'
  exits:
    up:
      target_vnum: '01010505025'
  local_id: '15756'
  name: A Ascensão
  vnum: '010215715756'
