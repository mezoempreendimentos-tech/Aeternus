- description: 'Papéis, papéis e mais papéis.  Todos espalhados pela pequena sala.  No

    meio da papelada, você encontra uma linda mulher, de cabelos loiros e olhos

    da cor do mel.  Você vai chegando cada ver mais perto da moça e...  Ahh! Ela

    também não lhe vê! Não lhe ouve!  Não percebe sua presença!  O que será isso?

    O que está acontecendo com esse lugar?  Será que seu destino será igual ao

    dos monarcas ou dessa moça?  Você tem duas opções: pode fugir daqui, ou

    continuar explorando o lugar.'
  exits:
    east:
      target_vnum: '010215715711'
  local_id: '15712'
  name: O Escritório
  vnum: '010215715712'
- description: "Ã\x89 uma cozinha muito bem limpa.  Não se vê nada sujo e a comida\
    \ cheira\nbem.  Nham nham...  O Chefe da Cozinha é bem competente.  Está tudo\
    \ no seu\ndevido lugar.  Estranhamente, ele esta como os outros habitantes desse\n\
    castelo: imóvel!  Mas, se não foi ele, quem fez toda essa comida?  Você\navista\
    \ uma porta aberta nos fundos."
  exits:
    east:
      target_vnum: 010215715718
    north:
      target_vnum: '010215715711'
    south:
      target_vnum: '010215715726'
  local_id: '15713'
  name: A Cozinha
  vnum: '010215715713'
- description: "Ã\x89 uma escada das mais luxuosas.  Existem alguns desenhos nela...\
    \  Ã\x89 o\nmesmo desenho que aparece no chafariz e na porta!  Que ave será essa?\
    \  E sua\ncuriosidade aumenta a cada passo que você dá."
  exits:
