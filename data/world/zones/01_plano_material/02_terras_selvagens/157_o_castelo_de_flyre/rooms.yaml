- description: 'Ahá!  Você sabia que deveria ter alguma passagem secreta naquele

    corredor.

    Depois de alguma procura você finalmente achou.  E está caindo, caindo...

    Não vê nem sente nada, mas você sabe de uma coisa: uma hora você vai

    encontrar o chão.  E nesse hora, você espera encontrar a resposta para todo

    o mistério que invadiu seus pensamentos.'
  exits:
    west:
      target_vnum: '010215715715'
  local_id: '15719'
  name: A Passagem Secreta
  vnum: 010215715719
- description: "Argh!  Quanto mais você anda, mais nojo você sente.  Agora a cena\
    \ é de\nvárias celas, com muitos ossos dentro delas.  Na parte de cima do castelo,\
    \ as\npessoas estavam imóveis, mas pareciam estar \"meio vivas\"...  Essas não.\
    \  As\npessoas (?) estão mortas!  Parece que esse lugar foi esquecido de sua\n\
    existência.  Ã\x89 um lugar horrendo, que você faz questão de não voltar nunca\n\
    mais."
