- description: 'Nossa, que diferença!  Depois de sair de uma floresta tão densa e
    escura,

    você chega num enorme campo.  A luz do sol quase lhe cega, tão desacostumado

    à luz você estava.  Bem ao longe, você avista uma pequena ponte, e além

    dela, um castelo.'
  exits:
    south:
      target_vnum: '010215715702'
    west:
      target_vnum: '01010616142'
  local_id: '15701'
  name: O Campo Aberto
  vnum: '010215715701'
- description: '"Oh-oh... Essa ponte não parece ser muito segura..." - você pensou.  E

    estava certo.  Mas mesmo assim tentou atravessá-la...  Tsc tsc...  Agora

    você está aí, pendurado no que sobrou dela...  Seus dedos estão doendo pois

    o sol é muito forte e a corda está quente.  Se gritar por socorro, ninguém

    irá te ouvir...  Só lhe resta subir, antes que os crocodilos do fosso pouco

    abaixo de você lhe comam vivo...'
  exits:
    east:
      target_vnum: '010215715703'
    north:
      target_vnum: '010215715701'
    south:
      target_vnum: '010215715704'
  local_id: '15702'
  name: A Ponte
  vnum: '010215715702'
- description: "Ooops...  Seus dedos não agüentaram e você escorregou.  Os crocodilos\n\
    estão lhe devorando brutalmente.  Lhe arrancam os braços, as pernas, a\ncabeça,\
    \ tudo.  Numa hora dessas você está morto, mas sua alma ainda continua\nlá, vendo\
    \ seu corpo ser estraçalhado.  Ã\x89 uma cena horrorosa, e é preciso ter\num estômago\
    \ muito forte, para agüentar vê-la."
  exits: {}
  local_id: '15703'
  name: O Fosso dos Crocodilos
  vnum: '010215715703'
- description: 'Ufa!  Depois de 4 longas e cansativas horas, você finalmente conseguiu,

    digamos, escalar a ponte.  Parabéns!  Agora você se encontra numa pequena

    praça, na frente de um imenso castelo.  Você vê o castelo através das águas

    de um chafariz que se encontra na sua frente.'
  exits:
    north:
      target_vnum: '010215715702'
    south:
      target_vnum: '010215715705'
  local_id: '15704'
  name: A Praça
  vnum: '010215715704'
- description: "Você se encontra no centro da praça e pode ver a sua frente um chafariz.\n\
    Ã\x89 lindo.  E jorra uma água tão cristalina que a imagem do castelo fica tão\n\
    nítida quanto se ele existisse dentro do Chafariz.  Ele é da forma de uma\nlinda\
    \ ave de fogo, a qual você nunca viu.  O castelo está à sua frente e\npara chegar\
    \ até ele, você terá que subir uma escadaria."
  exits:
    east:
      target_vnum: '010215715706'
    north:
      target_vnum: '010215715704'
    west:
      target_vnum: '010215715707'
  local_id: '15705'
  name: O Centro da Praça
  vnum: '010215715705'
- description: 'São feitas de pedra, e aparentam ter mais de 100 anos.  Possuem cerca
    de

    100 degraus, o que lhe faz ficar extremamente cansado.  Mas, enquanto para

    para descansar, você percebe que em certos locais dessa escadaria também

    existe um desenho da mesma ave de fogo do chafariz...  "Que ave será

    essa?" - você se pergunta...'
  exits:
    east:
      target_vnum: '010215715705'
    southeast:
      target_vnum: 010215715708
  local_id: '15706'
  name: A Escadaria
  vnum: '010215715706'
- description: 'São feitas de pedra, e aparentam ter mais de 100 anos.  Possuem cerca
    de

    100 degraus, o que lhe faz ficar extremamente cansado.  Mas, enquanto pára

    para descansar, você percebe que em certos locais dessa escadaria também

