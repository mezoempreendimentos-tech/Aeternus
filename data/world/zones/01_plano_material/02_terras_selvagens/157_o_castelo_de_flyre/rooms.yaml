  name: A Torre Principal
  vnum: '010215715742'
- description: 'Você literalmente desce muito mais depressa que se fosse pela escada.

    Você cai do alto da torre, e o impacto com o chão não foi nada agradável.

    Doeu.'
  exits: {}
