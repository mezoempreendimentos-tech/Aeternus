  vnum: '010215715740'
- description: "Ã\x89 escuro.  A luz do sol não consegue penetrar nesse local.  Até\
    \ agora,\ntodos os locais onde você explorou, ou possuía a luz do sol ou um castiçal\n\
    como fonte de luz.  Aqui não tem nada disso. Ã\x89 escuridão total, e sua fonte\n\
    de luz é muito bem vinda.  Quanto mais você sobe, mais a escuridão e o frio\n\
    aumentam.  Você tem a impressão de que o que te espera lá em cima não é coisa\n\
    boa.  Você chega num local onde existem 4 saídas: voltar, ir para leste, para\n\
    oeste, ou continuar subindo...  Agora é com você."
  exits:
