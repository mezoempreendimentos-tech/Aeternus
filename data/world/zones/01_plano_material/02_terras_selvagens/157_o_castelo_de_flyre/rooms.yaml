- description: 'Finalmente você encontra Flyre, a Ave do Fogo.  Ela é totalmente feita
    de

    fogo, e você não tem nem coragem de chegar perto.  Infelizmente a cela é

    pequena, e ficar longe dela é quase impossível.  Você faz de tudo para que

    ela não te perceba, e quando se dá conta, uma sensação de tristeza e de

    desânimo lhe invade o corpo, e vem à você a imagem de um quadro com seu

    nome, desenhando sua suposta imagem daquele momento.  Parece que o olhar de

    Flyre lhe hipnotizou, e ela está se aproximando de você, e está cada vez

    mais perto...  Mas a coragem para a luta não existe, e você só tem à suas

    mãos o medo que tomou seu corpo.  Ainda há tempo de fugir...'
  exits:
    up:
      target_vnum: '010215715756'
  local_id: '15725'
  name: A Cela Isolada
  vnum: '010215715725'
- description: "Ã\x89 um simples quintal, mas o silêncio continua.  Você não ouve\
    \ o canto de\nnenhum pássaro, nem mesmo do vento batendo nas várias plantações\
    \ ali\nexistentes...Nada.  Como isso é possível?  O que tão grave aconteceu, para\n\
    que esse castelo fosse enfeitiçado dessa forma, e perdesse toda a vida e\nalegria\
    \ que um dia, alí deverá ter existido?  São perguntas que, talvez, você\nnunca\
    \ terá as respostas..."
