- description: Sua bondade e soberania podem ser vistas em seus olhos. Seus cabelos
    negros assim como seu cavanhaque lhe dão um ar sóbrio, porêm o sorriso inocente
    que brilha em seus lábios demonstra a alegria de desposar a mais bela jovem de
    suas terras.
  keywords:
  - senhor
  - Jareth
  name: o Senhor das Terras de Jareth
  vnum: '10200'
- description: |-
    De uma beleza indescritível, seus olhos possuem o brilho do luar em uma
    noite sem estrelas, seu sorriso ilumina ainda mais sua bela face jovem.  Ela
    parece ter gostado de você, pois vem em sua direção com a intenção de
    cumprimentá-lo.
  keywords:
  - senhora
  - jovem
  - Jareth
  name: a Senhora das Terras de Jareth
  vnum: '10201'
- description: |-
    Ela é jovem e linda, escolhida a dedo pela Senhora para cumprir seus
    caprichos.  Seus modos são impecáveis, ela parece conhecer bastante o lugar
    para nunca ultrapassar seus limites.
  keywords:
  - dama
  - companhia
  name: a dama de companhia da Senhora
  vnum: '10202'
- description: Ele o cumprimenta claramente, seus olhos demonstram total adoração
    ao que faz e ao seu Senhor.
  keywords:
  - criado
  - particular
  name: o criado particular do Senhor
  vnum: '10203'
- description: |-
    Obviamente, um convidado que acabou ficando mais tempo do que devia.  As
    festas intermináveis representam um grande atrativo para este homem.  Claro,
    somado ao fato dele poder ter toda a bebida grátis.
  keywords:
  - irmão
  - bêbado
  name: o irmão da Senhora
  vnum: '10204'
- description: Ele não está, obviamente, acostumado com as formalidades da vida na
    corte e gasta a maior parte de seu tempo no campo, fazendo o que quer que seja
    que os cavaleiros fazem melhor.
  keywords:
  - irmão
  - cavaleiro
  name: o irmão do Senhor
  vnum: '10205'
- description: |-
    Ele parece mais do que feliz por descansar por este curto espaço de tempo,
    pensando que é melhor aqui neste celeiro do que lá dentro, onde há muito
    barulho e festa.
  keywords:
  - soldado
  - membro
  - menor
  name: um soldado
  vnum: '10206'
- description: Alguns homens parecem confortáveis parados mas este aqui está pronto
    para ação!
  keywords:
  - impaciente
  - soldado
  name: um soldado impaciente
  vnum: '10207'
- description: Ele fita o vazio a sua frente, pegando feno a sua volta e jogando ao
    ar.
  keywords:
  - soldado
  - entediado
  name: um soldado entediado
  vnum: '10208'
- description: |-
    A ama é meio doida, com certeza.  Ela quase verte lágrimas quando encontra
    alguma poeira em algum lugar.
  keywords:
  - ama
  name: a ama
  vnum: '10209'
- description: Afinal, o que pode fazer uma dama que espera, senão esperar?
  keywords:
  - dama
  - espera
  name: uma dama esperando por alguém
  vnum: '10210'
- description: |-
    O homem obviamente não está para a vida de festa e bebida, ele parece
    preocupado com o sentido da mesma.
  keywords:
  - sábio
  name: um sábio
  vnum: '10211'
- description: |-
    Ela é obviamente a companhia deste homem horroroso, que está deixando a maior
    parte do jantar no chão do castelo, neste exato momento.
  keywords:
  - dama
  name: uma dama
  vnum: '10212'
- description: |-
    Ele é velho, com pés de galinha no canto de seus olhos, que ele estica toda
    vez que dá uma nota mais alta.
  keywords:
  - artista
  - homem
  name: um artista
  vnum: '10213'
- description: |-
    Ele e seus ajudantes parecem mais do que satisfeitos por fazer o que estáo
    fazendo pelo Senhor e pela Senhora.
  keywords:
  - cozinheiro
  name: um cozinheiro
  vnum: '10214'
- description: Ele não diz nada, apenas o olha com curiosidade, procurando por sua
    montaria.
  keywords:
  - garoto
  - estábulo
  name: o garoto do estábulo
  vnum: '10215'
- description: |-
    Ele parece ter provado bastante de seu próprio produto noite passada e agora
    dorme como uma pedra.
  keywords:
  - vendendor
  - cerveja
  name: um vendedor de cerveja
  vnum: '10216'
- description: |-
    Parece que a Senhora é grande apreciadora da força necromante e dispõe dos
    serviços desta bela jovem que apesar da idade, aparenta grandes poderes.
  keywords:
  - fortuna
  - necromante
  name: Fortuna, a necromante
  vnum: '10217'
- description: Ele sorri para vocé quando você entra, o convidando a entrar e se sentar.
  keywords:
  - dominum
  - curandeiro
  name: Dominum, o curandeiro
  vnum: '10218'
