    No campo cercado com madeira, você vê um alto moinho cujas pás viram de

    acordo com o vento.  Para chegar nele, você deve seguir oeste, ou leste se

    quiser continuar pelo caminho.'
  exits:
    east:
      target_vnum: '010215515551'
    west:
      target_vnum: '010215515553'
  local_id: '15552'
  name: Um Caminho Lateral
  vnum: '010215515552'
- description: 'Você está na entrada de um campo de gramado muito verde, havendo nele
    uma

    ou outra planta de folhas escuras e pequenas flores coloridas.  No centro do

    campo, a oeste, há um grande moinho, e a leste um caminho escondido por

    árvores.'
  exits:
    east:
      target_vnum: '010215515552'
    west:
      target_vnum: '010215515554'
  local_id: '15553'
  name: O Campo do Moinho
  vnum: '010215515553'
