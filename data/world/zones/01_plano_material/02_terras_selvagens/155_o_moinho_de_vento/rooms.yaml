    oeste, há um grande moinho.'
  exits:
    east:
      target_vnum: '010215515553'
    west:
      target_vnum: '010215515555'
  local_id: '15554'
  name: O Campo do Moinho
  vnum: '010215515554'
- description: 'Você está em um campo de gramado muito verde, havendo nele uma ou
