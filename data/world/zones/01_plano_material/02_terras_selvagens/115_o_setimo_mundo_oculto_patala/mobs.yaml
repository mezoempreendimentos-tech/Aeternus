- description: |-
    Você se sente um anão perto desse enorme guarda naga.  As escamas de seu
    couro são negras, sendo que duas linhas de vermelho-sangue correm das
    laterais de cada olho, na parte humana, até a ponta de sua cauda, na parte
    serpente.  Os musculosos braços seguram com firmeza sua grande arma,
    enquanto todo o seu corpo se movimenta com graça, como numa dança de guerra.
    E mesmo com essa aparência um tanto o quanto monstruosa, ele é muito belo.
    Cuidado ao encarar seus brilhantes olhos vermelhos: dizem que é fatal.
  keywords:
  - forte
  - guarda
  - naga
  long_desc: Um forte guarda naga está aqui olhando ameaçadoramente para você.
  name: um Guarda Naga
  vnum: '010211511500'
- description: |-
    Khanti é como todas as naginis: dotada de beleza semi-divina, possui a
    formosura de uma mulher privilegiada e o encanto próprio das serpentes.
    Seus olhos dourados são amendoados e foram primorosamente maquiados, seus
    lábios pintados de carmesim e seu nariz e orelhas ostentam belas argolas com
    pequenas pedras inscrustradas.  Na testa, um pouco acima do centro de seus
    olhos, um belo bindi enfeita a região de seu ajna.  Uma estranha mistura de
    sari e armadura protege seu corpo metade humano, metade cobra.
  keywords:
  - khanti
  - nagini
  - guardia
  long_desc: Uma nagini de beleza hipnótica o encara, sibilando em uma língua que
    você não compreende.
  name: Khanti, a nagini Guardiã
  vnum: '010211511501'
- description: Esse... esse... esse arbusto está tentando atacar você!!
  keywords:
  - espinhal
  - espinhos
  long_desc: Um gigansteco espinhal tenta ferí-lo com seus espinhos.
  name: o espinhal agressivo
  vnum: '010211511502'
- description: |-
    Ele é nojento!  Parece uma grande bolha de lama com uma enorme boca disforme
    e dois pequenos buracos servindo de olhos.  Falando em seus olhos, uma fraca
    luz amarelada sai dos dois orifícios, dando ao monstro uma aparência ainda
    mais assustadora.
  keywords:
  - monstro
  - lama
  - massa
  - disforme
  long_desc: Uma disforme massa de lama parece vir em sua direção.
  name: o monstro de lama
  vnum: '010211511503'
- description: "Você já conclui que Khura é mais um Guardião de Patala.  Agora, uma\
    \ coisa\nque você não entende é: QUEM OU O QUE Ã\x89 KHURA???  Enquanto pensa\
    \ nisso, essa\nenorme coluna, que parece um braço cuja mão tenta agarrá-lo, ataca\
    \ você.\nCuidado com os espinhos.  Podem ser venenosos!!"
  keywords:
  - coluna
  - espinhais
  - espinhos
  - braco
  - khura
  long_desc: Uma enorme coluna de espinhais tenta envolvê-lo em seus espinhos.
  name: um Braço de Khura
  vnum: '010211511504'
- description: |-
    Diz a lenda que Kurma, a segunda encarnação do bondoso Vishnu, recuperou a
    Amritá para os deuses...  Caso isso seja verdade, você estará em sério
    apuros se tentar passar pela guarda do enorme réptil..
  keywords:
  - tartaruga
  - kurma
  long_desc: Uma enorme tartaruga tenta impedir que você se aproxime do Lótus.
  name: Kurma, a tartaruga
  vnum: '010211511505'
- description: "Esse pequeno demônio anda de um lado para o outro, impaciente e entediado\n\
    por não achar ninguém para \"brincar\"...  Ã\x89 até engraçado observar esse\n\
    serzinho amarelo: sua cabeça é grande demais para o corpo, enquanto sua boca\n\
    parece pequena demais para ocultar suas presas...  E que presas!!!"
  keywords:
  - demonio
  - rakshasa
  - pequeno
  long_desc: Um pequeno rakshasa percorre as colinas em busca de alguém para atormentar.
  name: o pequeno rakshasa
  vnum: '010211511506'
- description: |-
    Esse demônio de pele alaranjada parece estar no pior de seus dias, pois não
    para de praguejar enquanto chuta algumas pedrinhas.  Você desiste de caçoar
    de sua cabeça grande, principalmente ao ver que teria também de caçoar das
    maiores partes de seu corpo: as afiadas presas...
  keywords:
  - rakshasa
  - resmungao
  - grande
  - demonio
  long_desc: Um grande e resmungão rakshasa caminha por aqui.
  name: o rakshasa resmungão
  vnum: '010211511507'
- description: |-
    O esbelto naga se aproxima cada vez mais, parecendo não ser nada amigável.
    Sua pele, violeta, é inteira tatuada com magias próprias dos nagas, sendo
    seus caracteres ao mesmo tempo belos e ameaçadores.  Seus grandes olhos, da
    cor da pele, parecem emitir luz a partir de suas fendas muito oblíquas, o
    que o faz pensar ser esse uma habilidade de caçador.
  keywords:
  - naga
  - cacador
  - violeta
  long_desc: Um enorme naga de pele violeta nada em sua direção.
  name: um naga caçador
  vnum: 010211511508
- description: |-
    Parece que sua presença invasora já foi detectada em Patala: a nagini que o
    segue é uma rastreadora.  Após detectar-se invasores, cabe aos rastreadores
    encontrá-los.  O que acontece depois não se sabe ao certo...
  keywords:
  - nagini
  - silenciosa
  - rastreadora
  long_desc: Uma silenciosa nagini parece o seguir.
  name: uma nagini rastreadora
  vnum: 010211511509
- description: |-
    A gigantesca coluna de água é parte de Ikshumati, que já o havia avisado de
    que sua presença aqui não é bem-vista.  Cuidado com sua fúria.
  keywords:
  - gigansteca
  - coluna
  - agua
  long_desc: Uma gigantesca coluna de água se desprende de Ikshumati e avança em sua
    direção.
  name: uma coluna de água
  vnum: '010211511510'
- description: "Essa caçadora é tão bela quanto perigosa.  Ela nada com muita rapidez\
    \ até\nvocê, segurando firmemente sua arma.  Ã\x89 melhor sair daqui, pois já\
    \ sabem\nque há um intruso no reino... E ela o está caçando!"
  keywords:
  - nagini
  - cacadora
  long_desc: Uma nagini de olhar feroz começa a o perseguir.
  name: uma nagini caçadora
  vnum: '010211511511'
- description: |-
    Você se surpreende ao encontrar esse tipo de estudioso em um lugar que é,
    pelo menos para alguém que nunca tinha ouvido falar daqui, tão remoto.
    Deixando de lado a surpresa, você pergunta ao naga para onde ele está indo.
    Parecendo alheio às proibições quanto estrangeiros, o géografo o examina
    como se só agora o visse, respondendo finalmente que pretende estudar a
    região próxima à Coroa, pois há possibilidade de encontrar-se novas minas
    ali.  Ele tapa a própria boca como quem falou demais, e continua a caminhar
    falando sozinho.
  keywords:
  - curioso
  - geologo
  - naga
  long_desc: Um naga de ar curioso parece seguir rumo a Patala exterior.
  name: um naga geólogo
  vnum: '010211511512'
- description: "Num lugar famoso por produzir as mais raras jóias e possuir as mais\n\
    singulares gemas, uma especialista como essa nagini é alguém muito\nrespeitado.\
    \  Ela segue para a região externa de Patala para...  Você não\nsabe.  Ela parece\
    \ desaprovar sua presença aqui, mas não fará alarde algum,\njá que está muito\
    \ ocupada procurando suas anotações e praguejando contra alguém\nque devia a acompanhar\
    \ mas anda devagar demais para isso.  Ã\x89 melhor seguir\nseu caminho antes que\
    \ ela tenha tempo de pensar a respeito de você."
  keywords:
  - nagini
  - mineralogista
  long_desc: Uma nagini procura algo em uma valise enquanto caminha rumo ao portão
    externo.
  name: uma nagini mineralogista
  vnum: '010211511513'
- description: |-
    Aos poucos a furtiva figura se aproxima de você, abandonando sua
    forma vaga (produto, certamente, de alguma magia). Ela se densifica
    assumindo a aparência de um esbelto naga de pele e escamas negras.
    Ao longo de seu corpo você nota uma fileira de longos espinhos,
    também negros, de superfície tão lisa que parecem ser de vidro.
    Seu rosto, rude, ameaçador, e também atraente, não revela
    nada sobre sua pessoa. Você só consegue advinhar que está encrencado.
  keywords:
  - furtiva
  - vijay
  - figura
  - negra
  - naga
  - pantano
  long_desc: Uma furtiva figura negra se move à sua frente, quase oculta pela densa
    névoa.
  name: Vijay, o naga do pântano
  vnum: '010211511514'
