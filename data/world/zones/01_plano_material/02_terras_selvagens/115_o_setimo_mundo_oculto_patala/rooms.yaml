- description: "A trilha pela qual você veio tornou-se, de repente, totalmente de\
    \ terra.\nSumiram as pedras, restou lama e espinhos.  Ã\x81rvores escuras e retorcidas,\n\
    com raízes aéreas, crescem a seu redor nas áreas alagadas, enquanto grandes\n\
    espinhais seguem acompanhando caminho.  Vez ou outra você escuta o estranho\n\
    canto de pássaros nativos, mas não consegue ver nenhum.  A névoa densa que\ncobre\
    \ você não permite que você enxergue direito, fazendo-o escorregar na\nlama repetidas\
    \ vezes.  O caminho segue para sul, norte e sudeste."
  exits:
    north:
      target_vnum: '11544'
    south:
      target_vnum: '11543'
  name: Khura, O Pântano Arredio
  vnum: '11533'
