  local_id: '17706'
  name: O Pequeno Forte da Grande Muralha
  vnum: '010217617706'
- description: "Olhando ao redor você se deslumbra com a magnífica vista de uma grande\n\
    parte do território chinês.  Ã\x80 leste você pode ver que um pouco de neblina\n\
    cobre os morros, impossibilitando ver adiante.  Ã\x80 oeste e sul você pode ver\n\
    toda a extensão da Grande Muralha, inclusive a parte que você ja passou.\nUm pequeno\
    \ parapeito de pedra limita os extremos desta verdadeira torre de\nobservação.\
    \  A única saída é voltar pela escada, em direção ao piso\ninferior."
  exits:
    down:
      target_vnum: '010217617706'
  local_id: '17707'
  name: O Andar Superior do Forte
  vnum: '010217617707'
- description: |-
    Você está em uma pequena sala, muito mal iluminada.  Ao redor você
    observa algumas estantes com armas e armaduras; não muitas.  Alguns baús
    espalhados pela sala guardam o alimento necessário para alimentar aqueles
    que aqui residem, protegendo a muralha.  Uma porta de madeira encontra-se
    a nordeste.  Você pode voltar para o andar superior, subindo pela escada.
  exits:
