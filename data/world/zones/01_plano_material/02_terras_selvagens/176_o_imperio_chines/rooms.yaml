    \ proporcionando uma ótima sensação.  Por todos os lados pode-se ver\ndiversas\
    \ flores coloridas, e sentir o seu delicioso aroma campestre;\npode-se ver magníficas\
    \ árvores dos mais variados tamanhos e formas; uma\nverdíssima grama cobrindo\
    \ o solo; e muitos pássaros sobrevoando o local.  O\ncaminho pelo jardim segue\
    \ delimitado por uma bela estrada de pedras\nbrancas, com uma pequena cerca dourada\
    \ ao redor.  Ã\x80 norte você pode ver o\nenorme portão Shengwu, delimitando o\
    \ final da Cidade Proibida.  Você pode\ncontinuar pelo caminho à sul, ou seguir\
    \ para o norte, atravessando as\npequenas portas, em direção ao grande portão."
