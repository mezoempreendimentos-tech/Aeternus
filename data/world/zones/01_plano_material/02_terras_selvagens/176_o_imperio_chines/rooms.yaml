- description: "Este deserto parece ser imenso, se perdendo no horizonte.  Muitos\
    \ do que\njá se aventuraram aqui, acabaram morrendo sem nunca conseguir sair deste\n\
    deserto, denominado de amaldiçoado por alguns povos.  Olhando à sua\nvolta você\
    \ não vê nada além da branca e fina areia do deserto, formando\ngrandes e sinuosas\
