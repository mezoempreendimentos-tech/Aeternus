- description: "Você está no grande Palácio da Pureza Celestial, ou Palácio Qianqing.\n\
    Este é o palácio principal dentre aqueles da parte norte da Cidade\nProibida.\
    \  A partir daqui, você adentra nos ambientes diários do imperador,\nonde ele\
    \ vivia com suas esposas e concubinas, e seus filhos.  Ao redor\ndesta sala você\
    \ pode ver que a pintura nas paredes retratam cenas de\nbatalhas, dragões e algumas\
    \ fênix.  O teto foi todo pintado de vermelho e\ndourado, e o piso negro, coberto\
    \ por várias tapeçarias.  Quatro gorssas\ncolunas sutentam o vigoroso teto do\
    \ maior palácio da Cidade Proibida.  Ã\x80\nsua frente, ao norte, pode-se ver\
    \ uma enorme e impenetrável porta de ferro."
