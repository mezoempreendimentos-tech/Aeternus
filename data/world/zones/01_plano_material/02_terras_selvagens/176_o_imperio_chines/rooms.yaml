    assim como todas as paredes e colunas, pintadas cuidadosamente com figuras\nde\
    \ dragões.  Por toda a sala encontram-se inúmeros adereços, e muitos\nquadros,\
    \ com somente caracteres chineses, podem ser vistos pendurados pelas\nparedes.\
    \  Ã\x80 frente não encontram-se mais portas, seguindo o caminho em\ndireção à\
