- description: "Você está no andar inferior do portão de Shengwu.  O muro da Cidade\n\
    Proibida corta este portão no sentido leste-oeste.  Olhando ao redor você\npode\
    \ ver muitos pilares, sustentando o enorme peso do andar superior.  As\nparedes\
    \ foram pintadas em dourado, possuindo diversos adornos chineses, e\no piso coberto\
    \ com grandes blocos de pedra negra.  O teto foi delicadamente\npintado em vermelho\
    \ e azul, possuindo diversos desenhos de dragões.  No\nlado leste e oeste da grande\
    \ portão, você pode ver enormes escadas\nvermelhas, com o corrimão dourado, seguindo\
    \ para o andar superior.  Ã\x80 sua\nfrente, uma massiva porta de ferro, com o\
    \ triplo do seu tamanho, impede a\nentrada e saída de qualquer um à Cidade Proibida.\
    \  Você pode voltar à sul,\nou tentar inutilmente passar pelos enormes portões\
    \ à norte."
  exits:
    north:
      target_vnum: 010217617936
    south:
      target_vnum: 010217617914
    up:
      target_vnum: 010217617813
