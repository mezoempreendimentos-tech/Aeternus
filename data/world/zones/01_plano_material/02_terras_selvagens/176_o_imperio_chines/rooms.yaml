- description: "Você está na entrada do grande deserto de Gobi.  Aqui o aspecto é\
    \ um\npouco diferente do deserto anterior, escaldante e perigoso.  Ã\x80 sua volta\n\
    você só consegue ver areia, uma areia bem clara e fina, dificultando um\npouco\
    \ o seu caminhar.  Olhando para o horizonte você consegue ver uma\ngrande tempestade\
    \ de areia.  Seria inteligente se aventurar por este\nlocal?"
  exits:
    east:
      target_vnum: '010217617607'
    south:
      target_vnum: '010217617601'
    west:
      target_vnum: 01021764294
  local_id: '17600'
  name: O Deserto de Gobi
  vnum: '010217617600'
- description: "Este deserto parece ser imenso, se perdendo no horizonte.  Muitos\
    \ do que\njá se aventuraram aqui, acabaram morrendo sem nunca conseguir sair deste\n\
    deserto, denominado de amaldiçoado por alguns povos.  Olhando à sua\nvolta você\
    \ não vê nada além da branca e fina areia do deserto, formando\ngrandes e sinuosas\
    \ dunas que mudam periodicamente de lugar.  Por aqui\npode-se ver alguns pequenos\
    \ animais que se esgueiram por entre as dunas, à\nprocura de alimento.  Ã\x89\
    \ melhor você se apressar, ou poderá ser a próxima\nrefeição de algum animal."
  exits:
