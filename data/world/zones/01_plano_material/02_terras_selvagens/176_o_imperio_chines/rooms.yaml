- description: "Apesar de não ser muito grande, este local encontra-se muito enfeitado.\n\
    Ã\x80 sul você pode ver uma grande cama azul, e ao norte, uma grande janela\n\
    com uma vista espetacular.  Em um dos cantos da sala, há uma estante com\nvárias\
    \ espadas de diferentes tipos.  As quatro colunas que sustentam o teto\nforam\
    \ cuidadosamente pintadas em dourado, vermelho e azul, com desenhos de\nplantas\
    \ da região e de muitos dragões, o que você ja percebeu ser algo\nmuito comum\
