  vnum: '010217617742'
- description: "Você está em uma enorme ponte, com pelo menos 50 metros de extensão.\n\
    Esta ponte passa por cima do foço da cidade adiante, sendo uma das únicas\nformas\
    \ de entrada Ã  este local.  Ã\x80 frente encontra-se uma grande contrução\nvermelha,\
    \ com muitas colunas, e um telhado bem trabalhado com muitos\ndetalhes e uma forma\
    \ meio triangular.  O foço que passa por debaixo da\nponte possui águas escuras\
    \ e muito profundas, tornando quase impossível a\ntravessia à nado.  Olhando para\
    \ o leste e oeste, você pode ver que logo\napós o foço, há um enorme muro vermelho,\
    \ seguindo até onde seus olhos\nconseguem ver.  Você pode seguir em direção à\
    \ cidade indo para norte, ou\nvoltar para o sul."
  exits:
