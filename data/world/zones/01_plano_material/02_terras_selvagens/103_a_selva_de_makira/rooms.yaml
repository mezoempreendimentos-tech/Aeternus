  local_id: '10326'
  name: Pelo Pântano
  vnum: '010210310326'
- description: 'Finalmente você conseguiu sair daquele horroroso pântano.  Aqui a
    névoa

    já vai ficando para trás e a exuberante vegetação volta cobrindo todo o

    caminho com densas árvores e plantas.

    Você pode voltar ao pântano indo para o norte, ou seguir adiante indo

    para sul.'
  exits:
    north:
      target_vnum: '010210310326'
    south:
      target_vnum: 010210310328
  local_id: '10327'
  name: Pela Trilha
  vnum: '010210310327'
- description: 'Você está na margem de um grande e escuro rio.  Sua água é muito gelada

    mas essencial para a sobrevivência dos seres que aqui vivem.

    Na outra márgem do rio você parece ver um estranho tipo de moradia,

    parece que algum tipo de população primitiva mora ali.'
  exits:
    north:
      target_vnum: '010210310327'
    south:
      target_vnum: '010210310331'
  local_id: '10328'
  name: Na Margem do Rio
  vnum: 010210310328
- description: 'A nascente deste rio não passa de um pequeno lago, com uma vegetação

    absolutamente exuberante. Há muita umidade aqui e a água é muito límpida e

    transparente e através dela você pode ver muitos belos peixes de todas

    as cores e tamanhos.'
  exits:
    east:
      target_vnum: '010210310330'
  local_id: '10329'
  name: Na Nascente
  vnum: 010210310329
- description: 'Este rio é muito belo, mas parece ser muito profundo.  Daqui você
    tem

    uma bela visão de toda a selva que circula o rio, simplesmente lindo.

    O rio continua para leste e oeste.'
  exits:
    east:
      target_vnum: '010210310331'
    west:
      target_vnum: 010210310329
  local_id: '10330'
  name: No Rio
  vnum: '010210310330'
- description: 'Apesar de possuir uma coloração escura, talvez pela lama que há no
    fundo

    deste rio, ele aparenta ser tranquilo e muito bonito.

    O rio continua para leste e oeste.'
  exits:
    east:
      target_vnum: '010210310332'
    north:
      target_vnum: 010210310328
    west:
      target_vnum: '010210310330'
  local_id: '10331'
  name: No Rio
  vnum: '010210310331'
- description: 'O rio continua seu belo curso para leste e oeste.  Você talvez possa

    descer na margem logo ao sul.'
  exits:
    east:
      target_vnum: '010210310333'
    south:
      target_vnum: '010210310334'
    west:
      target_vnum: '010210310331'
  local_id: '10332'
  name: No Rio
  vnum: '010210310332'
- description: 'CUIDADO!  Ufa, você quase caiu na cachoeira, mas rapidamente se segurou

    em uma das pedras do rio.  A única saída e voltar pelo rio, pois pela

    cachoeira somente a morte você irá encontrar.'
  exits:
    west:
      target_vnum: '010210310332'
  local_id: '10333'
  name: Na Cachoeira
  vnum: '010210310333'
- description: 'Você está na outra margem do rio.  Ao sul há o que parece ser ruínas,
    e

    misteriosos sons podem ser ouvidos de lá.  Será que há algum perigo?

    Você pode tentar a sorte indo para sul ou pode voltar ao rio indo para

    norte.'
  exits:
    north:
      target_vnum: '010210310332'
    south:
      target_vnum: '010210310335'
  local_id: '10334'
  name: Na Margem
  vnum: '010210310334'
- description: 'Aqui há algumas construções, não muitas, espalhadas por todo o local,

    todas já em ruínas.  Diz a lenda do local, que aqui vivia uma civilização

    antiga mas que há muitos anos foi invadida e exterminada.

    Bom, pelo menos perigoso este local não aparenta ser.  Você pode voltar

    para o norte ou entrar nas ruínas indo para o sul.'
  exits:
    north:
      target_vnum: '010210310334'
    south:
      target_vnum: '010210310336'
  local_id: '10335'
  name: Pelas Ruínas
  vnum: '010210310335'
- description: 'Você está bem no centro do que já foi uma vila.  Aqui as ruínas fazem
    um

    círculo à sua volta e há um altar exatamente no local onde você está.

    Agora você sabe de onde vêm os misteriosos sons.  Estas ruínas estão

    assombradas, e você pode ver vários zumbis ao seu redor.  Talvez os mortos

    nunca tenham saído deste local e até hoje estão aqui, para matar aqueles que

    tentem adentrar a sua vila.

    A oeste ou sul, encontram-se pequenas construções e a leste, há o que

    parece ser um antigo templo.'
  exits:
    east:
      target_vnum: '010210310337'
    north:
      target_vnum: '010210310335'
    south:
      target_vnum: 010210310339
    west:
      target_vnum: '010210310340'
  local_id: '10336'
  name: Pelas Ruínas
  vnum: '010210310336'
- description: 'Esta sala parece ser um pouco maior do que as demais.  Aqui há alguns

    desenhos entalhados nas paredes que restaram e uma porta ao sul, que parece

    estar intacta.  Você pode voltar pelo oeste ou tentar passar pela porta a sul.'
  exits:
    south:
      target_vnum: 010210310338
    west:
      target_vnum: '010210310336'
  local_id: '10337'
  name: Pelas Ruínas
  vnum: '010210310337'
- description: 'Aqui parece ser onde o soberano desta antiga civilização ficava.  Há
    um

    grande trono, entalhado na pedra bruta, encostado na parede, e muitos

    entalhes por todas as paredes - pelo menos nas que restaram.

    A única saída e voltar ao norte.'
  exits:
    north:
      target_vnum: '010210310337'
  local_id: '10338'
  name: Uma Pequena Sala
  vnum: 010210310338
- description: 'Impressionante.  Aqui o forro desta construção já ruiu e o que restou

    foi um grupo de quatro paredes e a pequena entrada.  Você se assuta ao

    pensar que as quatro paredes que sobraram podem, a qualquer momento, despencar

    sobre você.  A única saída é voltar pelo norte.'
  exits:
    north:
      target_vnum: '010210310336'
  local_id: '10339'
  name: Pelas Ruínas
  vnum: 010210310339
- description: 'Você está dentro de uma ruína e as únicas coisas que você pode ver
    são

    pedaços de pedras quebrados e espalhados por todo o local e uma pequena

    inscrição na parede oeste.'
  exits:
    east:
      target_vnum: '010210310336'
  local_id: '10340'
  name: Pelas Ruínas
  vnum: '010210310340'
- description: 'Nossa!!! Só para andar neste local já é uma aventura.  Aqui tudo é
    coberto

    por uma densa vegetação, dificultando muito seu movimento.  Em meio às folhagens

    há uma pequena abertura no solo, parecendo ser a entrada para um túnel.'
  exits:
    down:
      target_vnum: '010210310342'
    south:
      target_vnum: '010210310303'
  local_id: '10341'
  name: Na Selva
  vnum: '010210310341'
- description: 'A descida pelo buraco é bem íngreme, fazendo com que você chegue a

    escorregar em alguns momentos.  Olhando para baixo, você não vê nada, além

    da total escuridão e só pode ouvir alguns estranhos sons de grunidos.'
  exits:
    down:
      target_vnum: '010210310343'
    up:
      target_vnum: '010210310341'
  local_id: '10342'
  name: Pela Descida
  vnum: '010210310342'
- description: 'A descida pelo buraco é bem íngreme, fazendo com que você até chegue
    a

    escorregar em alguns momentos.  Olhando para baixo, você não vê nada, além

    da total escuridão e só pode ouvir alguns estranhos sons de grunidos.'
  exits:
    down:
      target_vnum: '010210310344'
    up:
      target_vnum: '010210310342'
  local_id: '10343'
  name: Pela Descida
  vnum: '010210310343'
- description: 'Você está em uma pequena caverna.  Aqui você pode ouvir o som da água

    pingando e o som de que parece ser asas batendo.  O formato desta caverna

    é muito interessante, uma vez que ela já foi toda preenchida por água.'
  exits:
    down:
      target_vnum: 010210310348
    east:
      target_vnum: '010210310345'
    south:
      target_vnum: '010210310346'
    up:
      target_vnum: '010210310343'
    west:
      target_vnum: '010210310347'
  local_id: '10344'
  name: Na Caverna
  vnum: '010210310344'
- description: 'Esta sala é onde os morcegos deste local vivem, todos a espera de

    alimento.  O cheiro de podridão aqui é horrível e há pedaços de corpos em

    decomposição, que devem ser de aventureiros que alcançaram este lugar.'
  exits:
    west:
      target_vnum: '010210310344'
  local_id: '10345'
  name: A Sala dos Morcegos
  vnum: '010210310345'
- description: 'Há unica coisa que há aqui é uma grande parede a sua frente, e várias

    estalactites pela caverna.'
  exits:
    north:
      target_vnum: '010210310344'
  local_id: '10346'
  name: Pela Caverna
  vnum: '010210310346'
- description: 'Aqui é onde vive o Troll desta caverna.  Há sangue por todas as paredes

    e pedaços de ossos espalhados pelo chão.  "O Troll deve ser uma criatura

    faminta" ...pensa você.'
  exits:
    east:
      target_vnum: '010210310344'
  local_id: '10347'
  name: Toca do Troll
  vnum: '010210310347'
- description: Você está em um buraco.  E agora?
  exits:
    up:
