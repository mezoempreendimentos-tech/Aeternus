- description: 'Andando por entre as árvores, parece que você deixou a floresta e
    entrou

    em uma selva!  Aqui você encontra árvores e plantas exóticas que você nunca

    viu em lugar algum.'
  exits:
    east:
      target_vnum: '01010353522'
    north:
      target_vnum: '01010353522'
    south:
      target_vnum: '010210310301'
  local_id: '10300'
  name: O Começo da Selva
  vnum: '010210310300'
- description: 'A medida que vai se aprofundando na selva, você começa a ouvir estranhos

    sons de animais, vindo de todas direções e também consegue ouvir o som

    abafado de tambor, que está sendo tocado por alguém, em algum lugar não

    muito distante.  Tomara que os nativos sejam pacíficos!'
  exits:
    north:
      target_vnum: '010210310300'
    south:
      target_vnum: '010210310302'
  local_id: '10301'
  name: Entrando na Selva
  vnum: '010210310301'
- description: 'Você se encontra na junção de quatro caminhos.  O norte leva de volta
    para

    fora da selva, o leste parece levar a uma pequena trilha da qual o som de

    tambores pode ser ouvido, ao oeste existem algumas árvores espessas, e ao

    sul um pequeno caminho continua.'
  exits:
    east:
      target_vnum: '010210310303'
    north:
      target_vnum: '010210310301'
    south:
      target_vnum: '010210310316'
    west:
      target_vnum: 010210310309
  local_id: '10302'
  name: Entrando na Selva
  vnum: '010210310302'
- description: 'Você está em uma pequena trilha que leva para fora do caminho principal

    na selva.  Para o leste o som de tambores está ficando cada vez mais alto.

    Talvez você devesse voltar e procurar ajuda?'
  exits:
    east:
      target_vnum: '010210310304'
    north:
      target_vnum: '010210310341'
    west:
      target_vnum: '010210310302'
  local_id: '10303'
  name: Em uma Pequena Trilha
  vnum: '010210310303'
- description: 'Isto é o que parece um portão para um pequeno acampamento.  Até que
    poderia

    ser um bom lugar para descansar um pouco, mas você muda de idéia rapidamente

    ao ver crânios humanos espetados em lanças!'
  exits:
    east:
      target_vnum: '010210310305'
    west:
      target_vnum: '010210310303'
  local_id: '10304'
  name: O Portão de Entrada do Acampamento
  vnum: '010210310304'
- description: 'Nossa!  Você entrou em um acampamento de canibais!  Existem ossos
    jogados

    por todo o lugar, alguns deles óbviamente humanos!  Parece que você acaba de

    perder um grande banquete.  Talvez você deva sair antes que eles façam de

    você o convidado de honra do próximo!'
  exits:
    east:
      target_vnum: '010210310306'
    north:
      target_vnum: '010210310307'
    south:
      target_vnum: 010210310308
    west:
      target_vnum: '010210310304'
  local_id: '10305'
  name: No Acampamento
  vnum: '010210310305'
- description: 'Existem ganchos pendurados no teto que parecem ser usados para armazenar

    carne, mas que tipo de carne?  Use sua imaginação!'
  exits:
    west:
      target_vnum: '010210310305'
  local_id: '10306'
  name: A Loja de Alimentos
  vnum: '010210310306'
- description: 'Você entrou na sala que deve ser onde os canibais mantém suas mulheres

    quando eles estão fora caçando.  Existem peles de animais prontas para serem

    confeccionadas roupas para os canibais, e alguns acessórios da moda canibal!'
  exits:
    south:
      target_vnum: '010210310305'
  local_id: '10307'
  name: A Sala das Mulheres
  vnum: '010210310307'
- description: 'Esta é óbviamente a sala do chefe dos canibais.  Existem peles de
    animais

    estendidas diretamente sobre as paredes, com cruéis pinturas nelas.

    Essas peles devem valer muito dinheiro!'
  exits:
    north:
      target_vnum: '010210310305'
  local_id: '10308'
  name: A Sala do Chefe
  vnum: 010210310308
- description: 'As árvores parecem estar ficando mais espessas à medida que você avança

    para o oeste.  Existem vinhas penduradas nas árvores, e você acha que pode

    subir por elas.'
  exits:
    east:
      target_vnum: '010210310302'
    up:
      target_vnum: '010210310310'
    west:
      target_vnum: '010210310313'
  local_id: '10309'
  name: Em Direção aos Macacos!
  vnum: 010210310309
- description: 'Uau, essas árvores são altas!  Você acha que quase pode ver Midgaard

    daqui de cima.  Será que tem animais vivendo aqui?'
  exits:
    down:
      target_vnum: 010210310309
    north:
      target_vnum: '010210310311'
  local_id: '10310'
  name: "Nas Ã\x81rvores"
  vnum: '010210310310'
- description: 'Quando você pula para esta árvore você quase cai!  Aqui as árvores

    balançam, e você se sente cada vez menos seguro.  Talvez você devesse voltar

    lá para baixo.  Você também percebe um pedaço de pele de cobra pendurado em

    um galho.  Onde será que o seu dono está?'
  exits:
    north:
      target_vnum: '010210310312'
    south:
      target_vnum: '010210310310'
  local_id: '10311'
  name: "Nas Ã\x81rvores"
  vnum: '010210310311'
- description: 'Parece que você acaba de entrar num ninho de grandes cobras escaladoras

    de árvores!  Cuidado, deve haver veneno nas presas delas!'
  exits:
    south:
      target_vnum: '010210310311'
  local_id: '10312'
  name: "Nas Ã\x81rvores"
  vnum: '010210310312'
- description: 'O som de vários animais está ficando mais alto à medida que você se

    desloca para o oeste.  Parece que todos os primatas dessa selva estão tendo

    uma espécie de reunião!  Isso deve ser interessante.'
  exits:
    east:
      target_vnum: 010210310309
    west:
      target_vnum: '010210310314'
  local_id: '10313'
  name: Perto dos Macacos
  vnum: '010210310313'
- description: 'Este parece ser o local em que todos os primatas se reunem.  Parece
    que

    eles tiveram uma grande festa, você pode notar pela grande bagunça que eles

    fizeram aqui.'
  exits:
    east:
      target_vnum: '010210310313'
    north:
      target_vnum: '010210310315'
  local_id: '10314'
  name: A Sala de Reuniões
  vnum: '010210310314'
- description: 'Isto parece o lugar onde os primatas descansam após um grande encontro.

    Existem grandes folhas macias para servir de cama, e uma bela fonte no canto

    da sala.'
  exits:
    south:
      target_vnum: '010210310314'
  local_id: '10315'
  name: Próximo à Sala de Reuniões
  vnum: '010210310315'
- description: 'O aspecto denso de árvores e muita vegetação desta selva parece diminuir

    na medida em que você avança por este caminho.  Há uma densa névoa vinda do

    sul.  Você pode voltar pelo norte, se aventurar pelo desconhecido seguindo

    para sul ou ainda seguir uma curva que o caminho faz a oeste.'
  exits:
    north:
      target_vnum: '010210310302'
    south:
      target_vnum: '010210310317'
    west:
      target_vnum: '010210310350'
  local_id: '10316'
  name: Um Pequeno Caminho
  vnum: '010210310316'
- description: 'Espantoso!  Você está diante a um imenso pântano.  Este pântano está

    todo coberto por água, mas em algumas partes há só lama.  Uma grande e

    espessa névoa cobre toda esta região, fazendo com que você não consiga

    enxergar muito longe.  Um cheiro de carne apodrecida cobre toda esta região.

    Você pode voltar pelo norte, ou seguir explorando o pântano pelo sul.'
  exits:
    north:
      target_vnum: '010210310316'
    south:
      target_vnum: 010210310318
  local_id: '10317'
  name: A Entrada do Pântano
  vnum: '010210310317'
- description: 'Este pântano é enorme e misterioso.  Você olha adiante e parece não

    encontrar o seu fim, talvez pela densa névoa que o cobre.  Cuidado, seres

    horríveis podem habitar este misterioso local.'
  exits:
    east:
      target_vnum: '010210310321'
    north:
      target_vnum: '010210310317'
    south:
      target_vnum: 010210310319
  local_id: '10318'
  name: Pelo Pântano
  vnum: 010210310318
- description: 'Este pântano é enorme e misterioso.  Você olha adiante e parece não

