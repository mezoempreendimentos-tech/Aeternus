- description: |-
    Poseidon, o deus do mar, é filho dos Titãs Réia e Cronos, é marido de
    Anfitrite, uma das Nereidas, com quem ele teve um filho, Tritão.  Poseidon
    possuiu outros casos de amor, especialmente com ninfas de riachos e fontes,
    seus filhos são conhecidos pela selvageria e crueldade.
  keywords:
  - Poseidon
  long_desc: Poseidon, o deus do mar, está aqui com toda sua imponência.
  name: Poseidon
  vnum: 010210810800
- description: |-
    Tritão, o senhor dos tritões, é filho de Poseidon, deus do mar e de
    Anfitrite.  Ele possui todos os poderes do mar e o dom da profecia.  Alguns
    dizem que para vencê-lo bastava lhe dar uma taça de vinho, pois a bebida o
    fazia dormir.  O senhor dos tritões é conhecido como um deus violento, que
    com sua concha marinha fez com que os Titãs batessem em retirada na batalha
    entre os deuses e Titãs.
  keywords:
  - Tritao
  long_desc: Tritão, o senhor dos tritões, está aqui carregando em seu olhar a violência.
  name: Tritão
  vnum: 010210810801
- description: |-
    Tétis é a nereida mais bela, formosa e muito cobiçada por vários deuses.  A
    bela divindade marinha é esposa de Peleus, filha de Nereu e mãe de Aquiles.
    Uma lenda diz que ela mergulhou todos os filhos que teve com Peleus ainda
    recém nascidos no fogo para que os elementos mortais, provenientes de
    Peleus, fossem consumidos.  Contudo no sétimo filho, Tétis na tentativa de
    tornar seu filho um imortal, ela mergulhou o recém-nascido no rio Estige,
    rio subterrâneo que corria em Hades, mas o que a formosa divindade conseguiu
    foi torná-lo invulnerável.
  keywords:
  - tetis
  - nereida
  long_desc: Tétis, a formosa nereida, está aqui encantando você com a sua beleza.
  name: Tétis
  vnum: 010210810802
- description: |-
    Você observa um lindo corcel branco, com asas coloridas e de uma envergadura
    monumental.  Filho de Poseidon e da Górgona Medusa, Pégaso foi amansado por
    Minerva, que o deu de presente para as musas.  A fonte de Hipocreue, situada
    na montanha onde vivem as musas, Hélicon, foi aberta por um coice deste belo
    animal.
  keywords:
  - Pegaso
  long_desc: Pégaso, o corcel mágico, está aqui envergando suas belíssimas asas.
  name: Pégaso
  vnum: 010210810803
- description: |-
    Aquiles é o mais armipotente dos guerreiros gregos, filho de Tétis, a ninfa
    do mar, e de Peleus, o rei dos Mirmidões de Tessália.  Quando criança sua
    mãe mergulhou-o nas águas do rio Estige para torná-lo imortal.  As águas o
    fizeram invulnerável, exceto nos calcanhares, por onde sua mãe o segurou.
    Aquiles é o guerreiro mais temido por todos os inimigos da Grécia.
  keywords:
  - Aquiles
  long_desc: Aquiles, o guerreiro imortal, está aqui pensando em táticas de guerra.
  name: Aquiles
  vnum: 010210810804
- description: "Peleus é filho de Eaco, rei de Egina, marido de Tétis, a ninfa do\
    \ mar, e pai\nde Aquiles.  Uma lenda conta que Zeus e Poseidon mesmo amando Tétis,\
    \ após\nouvirem um oráculo profetizando que o filho gerado por Tétis se tornaria\n\
    mais poderoso que o pai, arranjaram um marido para ela. Peleus e Tétis se\ncasaram\
    \ diante de todos os deuses, faltando apenas a presença de Ã\x89ris, a\ndeusa\
    \ da discórdia, que com raiva por não ter sido convidada lançou um\nmagnífico\
    \ pomo de ouro com a maliciosa inscrição: \"à mais bela\",  dizem que\neste ato\
    \ iniciou a atual guerra de Tróia."
  keywords:
  - Peleus
  long_desc: Peleus, o rei dos Mirmidões de Tessália está aqui.
  name: Peleus
  vnum: 010210810805
- description: |-
    Menelau é o rei de Esparta, irmão de Agamemnon e marido de Helena.
    Você observa um grande guerreiro, que lutará com bravura e força para
    resgatar sua amada, Helena.
  keywords:
  - Menelau
  long_desc: Menelau, o rei de Esparta, está aqui procurando bravamente por Helena.
  name: Menelau
  vnum: 010210810806
- description: |-
    Príamos é o rei de Tróia, marido da rainha Hécuba e pai de mais de cem
    filhos, entre eles Heitor, o maior guerreiro de Tróia, e a profetisa
    Cassandra.  Príamos juntamente com Hécuba, apenas observam com muita
    ansiedade a batalha entre os gregos e troianos, de dentro dos muros da
    cidade.  Muito velho e cansado, Príamos fortalece o lado troiano pelo seu
    bom governo e pelas numerosas alianças com os seus vizinhos.
  keywords:
  - Priamos
  long_desc: Príamos, o rei de Tróia, está aqui observando com ansiedade as batalhas.
  name: Príamos
  vnum: 010210810807
- description: |-
    Páris possui um corpo de um grande atleta, forte e imponente.  Filho de
    Príamos e Hécuba, há muito tempo atrás uma profecia previu que Páris seria,
    um dia, a ruína de Tróia.  Essa profecia forçou seus pais a abandona-lo no
    Monte Ida, onde cresceu com os pastores, até ser reconhecido pelos seus
    verdadeiros pais e trazido de volta para dentro dos poderosos muros de
    Tróia.
  keywords:
  - Paris
  long_desc: Páris, o príncipe de Tróia, está aqui rezando para a deusa Afrodite.
  name: Páris
  vnum: 010210810808
- description: |-
    Você observa um grande centauro, ao olhar seu rosto você percebe sua experiência
    e as marcas do tempo.  Quíron recebeu lições de Apolo e Diana, tornando-se
    famoso por sua habilidade na caça, medicina, música e arte da profecia. Seus
    discípulos se tornaram grandes guerreiros, um deles foi o jovem Aquiles que foi
    criado por Quíron.
  keywords:
  - Quiron
  long_desc: Quíron, o mais sábio e justo dos centauros, está aqui orando para Apolo.
  name: Quíron
  vnum: 010210810809
- description: |-
    Você observa o lendário rei de Argos e Miscenas, Agamemnon.  Filho de Atreu
    e irmão do injuriado Menelau.  Seu olhar expressa a luta pela honra e pela
    promessa que todos os pretendentes da bela Helena, fizeram antes da sua
    escolha.  Todos os gregos que disputavam a mão da formosa Helena, juraram
    que defenderiam o grego escolhido por ela em todos os momentos que ele
    precisasse.  Agamemnon é um exemplo para os novos guerreiros gregos.
  keywords:
  - Agamemnon
  long_desc: Agamemnon, o comandante-chefe dos gregos, está aqui.
  name: Agamemnon
  vnum: 010210810810
- description: |-
    Você observa Heitor, o comandante-chefe das tropas troianas, o mais poderoso
    guerreiro troiano, filho do rei Príamos e da rainha Hécuba, e marido de
    Andrômaca.
  keywords:
  - Heitor
  long_desc: Heitor, o comandante-chefe dos troianos, está aqui.
  name: Heitor
  vnum: 010210810811
- description: |-
    Você observa Reso, o rei de Trácia, forte e destemido defendendo com
    bravura o brasão troiano.
  keywords:
  - Reso
  - rei
  long_desc: Reso, o rei de Trácia, está aqui apoiando os troianos.
  name: Reso
  vnum: 010210810812
- description: |-
    Você observa uma linda guerreira, que por trás de sua beleza existe uma
    força capaz de destronar reis e destruir montanhas.  Você observa
    Pentesiléia, a rainha das Amazonas, ela e suas guerreiras lutam pela causa
    de Tróia.  As Amazonas são mulheres guerreiras que excluem os homens de sua
    sociedade, elas ocasionalmente se relacionavam com homens de regiões
    vizinhas, as crianças do sexo feminino que nasciam eram treinadas desde
    criança para serem arqueiras para a guerra, e tinham o seio direito queimado
    para facilitar o manejo do arco, enquanto as crianças do sexo masculino que
    nasciam eram enviadas aos pais.
  keywords:
  - Pentesileia
  long_desc: Pentesiléia, a rainha das Amazonas, está aqui.
  name: Pentesiléia
  vnum: 010210810813
- description: |-
    Você observa Mêmnon, o rei da Etiópia, filho da deusa Aurora e do mortal
    Titono, o forte e bravo guerreiro negro, lutará pela causa de Tróia com toda
    sua honra e coragem, ajudando os parentes de seu pai.
  keywords:
  - Memnon
  long_desc: Mêmnon, o rei da Etiópia, está aqui olhando para você bravamente.
  name: Mêmnon
  vnum: 010210810814
- description: |-
    Você observa um guerreiro de estatura gigantesca e de grande coragem.  Ajax
    é o líder de Lócris, situada na Grécia Central.  Considerado um dos mais
    poderosos guerreiros de todas as tropas helênicas, Ajax só não é mais
    ilustre que o imortal Aquiles, no campo de batalha.
  keywords:
  - Ajax
  long_desc: Ajax, o líder de Lócris, está aqui olhando para você de cima para baixo.
  name: Ajax
  vnum: 010210810815
- description: "Você observa um guerreiro que traz em seu rosto o sentimento da angústia.\
    \  O\nrei de Ã\x8Dtaca abandonou sua esposa, Penélope, para defender o brasão\
    \ Helênico\nnas terras de Tróia.  Ulisses é o mais sábio entre os guerreiros gregos."
  keywords:
  - Ulisses
  long_desc: "Ulisses, o rei de Ã\x8Dtaca, está aqui pensando na sua bela Penélope."
  name: Ulisses
  vnum: 010210810816
- description: |-
    Você observa uma bela troiana bastante aflita e nervosa, sem saber o que
    poderá acontecer com seu marido, o poderoso guerreiro troiano, Heitor.
  keywords:
  - Andromaca
  long_desc: Andrômaca, a esposa de Heitor, está aqui ansiosa por notícias do marido.
  name: Andrômaca
  vnum: 010210810817
- description: |-
    Você observa Diomedes, um forte e imponente guerreiro grego, que possui
    várias habilidades atribuídas apenas aos heróis.  Suas habilidades só são
    superadas por Aquiles, o imortal.
  keywords:
  - Diomedes
  long_desc: Diomedes, o guerreiro herói, está aqui ostentando o brasão grego.
  name: Diomedes
  vnum: 010210810818
- description: |-
    Você observa Eaco, o rei de Egina, ilha habitada pelos Mirmidões, trazidos a
    vida graças aos poderes do glorioso deus Zeus.  Eaco é um bondoso e sábio,
    cordial e pacífico.
  keywords:
  - Eaco
  long_desc: Eaco, o rei de Egina, está aqui rezando em agradecimento a Zeus.
  name: Eaco
  vnum: 010210810819
- description: |-
    Você observa Pátroclo, o estimado amigo de Aquiles.  Pátroclo possui uma
    admirável coragem, e não pensaria duas vezes para defender seus amigos de
    qualquer forma de perigo.  Seus longos cabelos negros brilham como as
    estrelas nas noites de batalha entre gregos e troianos.
  keywords:
  - Patroclo
  long_desc: Pátroclo, o seguidor de Aquiles, está aqui.
  name: Pátroclo
  vnum: 010210810820
- description: |-
    Incrível !  Você não consegue acreditar que tal criatura exista realmente.
    Você observa o grande Leviatã nadando e percebe ao lado dele uma grande
    baleia, que poderia ser tragada pelo Leviatã a qualquer momento.  Suas
    escamas verdes e amarelas e suas barbatanas vermelhas dão um tom majestoso a
    tal criatura.
  keywords:
  - Leviata
  long_desc: O magnífico Leviatã está aqui, nadando nas mais profundas águas.
  name: Leviatã
  vnum: 010210810821
- description: |-
    Você observa Hécuba, a rainha de Tróia, esposa de Príamos e mãe de Heitor,
    Páris e Cassandra.  Hécuba é uma bela mulher e uma magnífica rainha, justa e
    bondosa.
  keywords:
  - Hecuba
  long_desc: Hécuba, a rainha de Tróia, está aqui com todo seu charme e beleza.
  name: Hécuba
  vnum: 010210810822
- description: |-
    Você observa a bela Helena, a mais bela de todas as mulheres gregas.  Filha
    de Zeus e Leda, e esposa de Menelau.
  keywords:
  - Helena
  long_desc: Helena, a mulher mais linda da Grécia, está aqui.
  name: Helena
  vnum: 010210810823
- description: |-
    Você observa a linda Cassandra de Tróia.  Filha do rei Príamos e da rainha
    Hécuba.  Recebeu o dom da profecia do Deus Apolo, com quem teve um romance,
    mas quando ela se recusou em se entregar a ele, Apolo fez com que o dom se
    tornasse inútil.  Ao decretar que ninguém acreditaria em suas predições.
  keywords:
  - Cassandra
  long_desc: Cassandra de Tróia está aqui, advertindo os troianos de muitos perigos.
  name: Cassandra
  vnum: 010210810824
- description: |-
    Forte e atento a qualquer movimento estranho dentro da cidade e nas suas
    redondezas.  O guarda troiano ostenta em sua armadura o imponente brasão de
    Tróia.  Brasão que ele defenderá com todo o vigor e bravura.
  keywords:
  - guarda
  - troiano
  long_desc: Um guarda troiano está aqui, protegendo a cidade de Tróia.
  name: um guarda troiano
  vnum: 010210810825
- description: |-
    Você observa o armipotente soldado troiano defendendo com orgulho e bravura
    sua terra e seu povo.  O soldado troiano é forte e possui uma expressão em
    seu rosto de força e perseverança, que assustaria qualquer soldado grego.
  keywords:
  - soldado
  - troiano
  long_desc: Um soldado troiano está aqui, esperando as ordens de seu comandante.
  name: um soldado troiano
  vnum: 010210810826
- description: |-
    Você observa um batalhão troiano.  São mais de duzentos soldados compactos
    prontos para atacar qualquer alvo.  No meio dos soldados o estandarte com o
    brasão troiano tremula ao vento, demonstrando resistência e força.
  keywords:
  - batalhao
  - troiano
  long_desc: Um batalhão troiano está aqui, lutando bravamente contra as tropas gregas.
  name: um batalhão troiano
  vnum: 010210810827
- description: |-
    Você observa um batalhão helênico prontos para investir mais uma vez contra
    os troianos.  O campo de batalha está cheio, o batalhão grego sozinho possui
    uns duzentos soldados.  O estandarte com o brasão grego tremula entre os
    poderosos soldados gregos.
  keywords:
  - batalhao
  - grego
  long_desc: Um batalhão grego está aqui, lutando contra as tropas troianas.
  name: um batalhão grego
  vnum: 010210810828
- description: |-
    Você observa um guarda grego, forte e imponente.  Ele defenderá a honra e a
    causa grega contra todos os que surgirem no seu caminho.
  keywords:
  - guarda
  - grego
  long_desc: Um guarda grego está aqui, protegendo o acampamento helênico.
  name: um guarda grego
  vnum: 010210810829
- description: |-
    Você observa o poderoso soldado grego.  Forte e corajoso, ele cumprirá todas
    as ordens do seu comandante para vencer a guerra contra os troianos.
  keywords:
  - soldado
  - grego
  long_desc: Um soldado grego está aqui, esperando as ordens de seu comandante.
  name: um soldado grego
  vnum: 010210810830
- description: |-
    Você observa espantado o poderio da tropa etíope.  Mais ou menos 150 bravos
    e fortes guerreiros negros, liderados por Mêmnon, o rei da Etíopia.
  keywords:
  - batalhao
  - etiope
  long_desc: Um batalhão etíope está aqui, defendendo os aliados do rei Mêmnon.
  name: um batalhão etíope
  vnum: 010210810831
- description: |-
    Você observa um cidadão troiano, seus traços e costumes são originários da
    Anatólia, região de costumes orientais, onde viviam os hititas.  O povo de
    Tróia possui uma beleza encantadora.  Fortes, inteligentes e unidos, os
    troianos construíram os anéis, as muralhas e conquistaram todas as terras de
    domínio troiano, especialmente as rotas marítimas de comércio.
  keywords:
  - cidadao
  - troiano
  long_desc: Um cidadão troiano está aqui, protegido pelas muralhas de Tróia.
  name: um cidadão troiano
  vnum: 010210810832
- description: |-
    Você observa uma cidadã troiana, seus traços e costumes são originários da
    Anatólia, região de costumes orientais, onde viviam os hititas.  O povo de
    Tróia possui uma beleza encantadora.  Fortes, inteligentes e unidos, os
    troianos construíram os anéis, as muralhas e conquistaram todas as terras de
