  vnum: 010210810841
- description: |-
    Você observa uma linda mulher troiana, tensa e ansiosa pelo fim da guerra de
    Tróia.  Esposa de Enéias e mãe de Ascânio, Creusa é uma mulher forte e
    atenciosa com todos ao seu redor.
  keywords:
  - Creusa
  long_desc: Creusa, a esposa de Enéias está aqui, ansiosa pelo fim da guerra.
  name: Creusa
  vnum: 010210810842
- description: |-
    Você observa um jovem troiano, filho de Enéias e de Creusa.  Ascânio tem na
