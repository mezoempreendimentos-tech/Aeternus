  keywords:
  - Ascanio
  long_desc: O jovem Ascânio está aqui em pé, olhando curiosamente para você.
  name: Ascânio
  vnum: 010210810843
- description: |-
    Você observa uma bela jovem, entregue a Aquiles numa partilha dos bens
    recebidos por vitórias nas batalhas, principalmente nas regiões vizinhas a
    Tróia.  Briseis foi tomada por Agamemnon, que tinha perdido sua escrava
    preferida Criseis.
  keywords:
  - Briseis
  long_desc: Briseis, a donzela de Aquiles está aqui, chorando com saudades dele.
  name: Briseis
  vnum: 010210810844
- description: |-
    Você observa uma linda guerreira, que por trás de sua beleza existe uma
