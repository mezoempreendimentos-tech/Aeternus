- description: |-
    O Grifo dourado é uma das criaturas mais belas de toda Vitália.  Suas penas
    e pêlos dourados refletem os raios do sol que atingem seu corpo.  Suas asas
    são enormes e suas garras poderiam retalhar em pedaços um gigante.  Uma
    antiga lenda vitaliana diz que: Dois jovens que juravam amor eterno fugiram
    por causa dos seus pais que pertenciam a famílias rivais: os armilianos e
    diomirianos, e nunca mais foram visto.  Será que os grifos são a chave para
    este mistério.
  keywords:
  - grifo
  - dourado
  name: um grifo dourado
  vnum: '10718'
