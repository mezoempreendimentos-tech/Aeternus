    isso numa batalha contra ele, é muito difícil de atingi-lo.  Seus olhos são
    dois pontos vermelhos que brilham em contraste com toda sua limpidez.
  keywords:
  - guardião
  - água
  name: o guardião da água
  vnum: '10722'
- description: |-
    O guardião do ar é um ser vitaliano, que não possui forma definida.  Seu
    corpo pode ser de um grande cavaleiro como de uma hora para outra ele tomar
    outra forma.  Contudo só a forma é modificada.  O guardião é quase
    imperceptível aos olhos humanos, apenas com magia os mortais conseguem
    observá-lo.
  keywords:
  - guardião
  - ar
  name: o guardião do ar
  vnum: '10723'
- description: |-
    O guardião da terra é um ser vitaliano, que possui uma resistência muito
    grande e dificilmente encontrado por todas as terras sagradas de Vitália.
    Seu corpo é constituído por terra e rochas resistentes, seus são dois pontos
    de luz brancos.  O guardião da terra protegerá o seu elemento de todos os
    males, principalmente da infertilidade.
  keywords:
  - guardião
  - terra
  name: o guardião da terra
  vnum: '10724'
- description: |-
