- description: |-
    Fireheart é o único sobrevivente dos diomirianos.  Que foram dizimados pelas
    guerras e conflitos com os armilianos pela posse das terras que hoje são
    chamadas de terras esquecidas.  Fireheart é alto e forte, você não consegue
    observa a sua pele, pois ele é totalmente coberto de chamas.  Contudo as
    suas chamas de fogo, só queimam o que ele quiser, ou seja os seus inimigos.
    Fireheart atualmente faz parte da tríade otaviana, tríade que prega a paz e
    a justiça entre os povos.
  keywords:
  - fireheart
  - diomiriano
  name: Fireheart
  vnum: '10703'
