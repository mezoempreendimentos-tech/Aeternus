- description: "Essa sala principal parece ser bem longa, dando espaço para os pacientes\n\
    vagarem. Ã\x89 provavelmente melhor deixá-los aqui fazendo apenas isso - você\n\
    realmente não quer mexer com a cabeça deles ou coisa assim...quer?"
  exits:
    east:
      target_vnum: '020120120106'
    west:
      target_vnum: 020120120109
  local_id: '20107'
  name: O Salão do Primeiro Andar
  vnum: '020120120107'
- description: |-
    Essa grande sala tem todo o espaço que esses novatos precisam para vagar
    por aí, trombando e falando com seus amigos imaginários. A sala abre-se para
    oeste e daqui você pode ver um grande número de novatos loucos. Talvez você
    devesse matá-los...Há um pequeno corredor levando para fora dessa
    sala ao leste.
  exits:
    east:
      target_vnum: '020120120110'
    west:
      target_vnum: '020120120105'
  local_id: '20108'
  name: O Salão do Primeiro Andar
  vnum: 020120120108
