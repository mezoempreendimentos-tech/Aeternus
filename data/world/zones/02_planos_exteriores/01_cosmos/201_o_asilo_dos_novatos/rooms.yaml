- description: "Ã\x89 aqui o topo da escadaria. O ar é quente e cheio de odores malignos\
    \ que\naguçam os seus sentidos. Dizem que a oeste há uma grande sala, onde funciona\n\
    uma espécie de laboratório onde fazem alguns experimentos.\nPara baixo você voltará\
    \ para o corredor principal."
  exits:
    down:
      target_vnum: '020120120110'
    west:
      target_vnum: '020120120150'
  local_id: '20149'
  name: As Escadas
  vnum: 020120120149
- description: "Ã\x89 uma grande sala, cheia de equipamentos e objetos (para o medo\
    \ de algumas\npessoas se machucarem). Um estofamento antigo e rasgado cobre as\
    \ paredes,\nmostrando que muitos pacientes já estiveram aqui para o bem da ciência.\
    \ O\npiso está sujo, em uma cor amarelada, fazendo qualquer um pensar que ele\n\
    não deveria estar aqui. Um campo de força está a oeste, enquanto que a\nescadaria\
    \ está a leste."
  exits:
    east:
      target_vnum: 020120120149
    north:
      target_vnum: '020120120152'
    south:
      target_vnum: '020120120155'
    west:
      target_vnum: '020120120151'
