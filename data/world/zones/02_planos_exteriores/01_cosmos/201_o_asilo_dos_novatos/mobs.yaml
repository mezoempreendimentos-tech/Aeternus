- description: |-
    Esse é o cérebro de um corpo que consegue reproduzir todas as diferentes
    personalidades que andam pelo Asilo dos Novatos.  Foi extraído de uma
    personalidade absolutamente diferente de tudo que se conhecia, para estudos,
    claro...  Mas, com o passar do tempo, ninguém conseguiu lembrar a quem
    pertencia originalmente esse cérebro, permanecendo ele sem corpo.  Ele
