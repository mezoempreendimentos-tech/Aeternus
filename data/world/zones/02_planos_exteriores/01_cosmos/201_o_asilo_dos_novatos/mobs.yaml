- description: |-
    Pequeno e perverso, Spike é um dos últimos gremlins infames que assombraram
    Vitália há muito tempo atrás. Escamoso e sujo, ele é forte quando é
    provocado. Ele chateia e atazana as pessoas por aqui, com esperança que
    algum dia alguém traga-lhe água.
  keywords:
  - Spike
  name: Spike, um Gremlin
  vnum: '20119'
- description: |-
    Um vilão notável, o Barba Ruiva foi finalmente capturado pelos cidadãos de
    Vitália e setenciado a viver no Asilo. Seu sorriso, tão grande quanto
    diabólico, demonstra as fórmulas maléficas que rondam sua mente.
    Apesar dos tratamentos aqui, ele permanece tão insano como sempre.
  keywords:
  - barba
  - ruiva
  name: Barba Ruiva, o pirata assassino
  vnum: '20120'
- description: |-
    Nero foi capturado após o grande incêndio de Roma. Um homem absolutamente
    ensandecido, que parece ter grande prazer em ver o sofrimento alheio e que
    foi sentenciado a viver neste Asilo até seus últimos dias, para que assim
    todos pudessem viver com relativa calma e paz de espírito.
  keywords:
  - Nero
  name: Nero, o imperador insano
  vnum: '20121'
- description: |-
    Lucrécia Borgia já foi muito estimada  por seus companheiros daqui, porém,
    ela perdeu toda essa estima quando não conseguiu reproduzir seus famosos
    venenos infalíveis. A frustração e as falhas acabaram por corromper a mente
    dessa rainha tirana. Ela permanece aqui, recebendo o melhor tratamento possível.
  keywords:
  - Lucrecia
  - Borgia
  - mulher
  name: Lucrécia Borgia
  vnum: '20122'
- description: |-
    Homem bem apessoado, com traços nobres e modos refinados, ninguém poderia
    suspeitar que está diante de um dos maiores assassinos da História.  Seu
    sorriso diabólico e o olhar irônico parecem atrair as pessoas, como se fossem
    moscas atraídas pelo mel. Cuidado.
  keywords:
  - Wlad
  - empalador
  name: Wlad, o Empalador
  vnum: '20123'
- description: |-
    Toulan foi, contra sua vontade, aprisionado aqui há poucos anos. Os
    incrédulos líderes de Velirian querem saber o incrível segredo de animar o
    inanimável. Ele relaxa aqui, com a esperança de que seu exército de
    marionetes venha e lhe tire desse lugar morto.
  keywords:
  - toulan
  name: Toulan, o Mestre das Marionetes
  vnum: '20124'
- description: |-
    Khan não veste nada mais do que uma capa. Uma mexa de cabelos brancos e
    olhos que refletem a insanidade comprovam que esse homem é perigoso. Ele
    constantemente fala algo sobre homens que viajaram no espaço.
  keywords:
  - genghis
  - khan
  name: Genghis Khan, o conquistador mongol
  vnum: '20125'
- description: "Depois de ser o grande comandante de todas as terras longÃ­nquas,\
