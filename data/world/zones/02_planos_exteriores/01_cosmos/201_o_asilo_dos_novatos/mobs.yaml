- description: |-
    Gargalhando maldosamente, Meth Cristal foi jogado aqui devido à sua mortal
    influência na sociedade de Vitália. Seu toque pode levar alguém à
    insanidade e pode ser fatal. Ele sorri maldosamente, procurando por mais
    pessoas inocentes para prender em sua teia de maldade.
  keywords:
  - cristal
  - meth
  name: Meth Cristal
  vnum: '20127'
- description: |-
    Palenre é um maníaco depressivo, devido à sua errada e imprevisível
    índole.  Freqüentemente esse solitário homem está em depressão, lamentando
    sobre os pais que nunca teve.
  keywords:
  - Palenre
  name: Palenre, o atormentado assassino das noites
  vnum: '20128'
- description: |-
    Depois de aterrorizar os pequenos cidadãos de Vitália, a Malvada Bruxa do
    Oeste foi capturada e mandada para cá para um tratamento mental. Alta e
    com uma aparência sinistra, ela não é alguém que se chamaria de bonita.
    Usando uma capa preta, ela se volta e se prepara para recitar um segundo
    feitiço.
  keywords:
  - malvada
  - bruxa
  - oeste
  name: a Malvada Bruxa do Oeste
  vnum: '20129'
- description: |-
    Tharnt não é um paciente daqui. Os donos do Asilo conhecem bem o seu
    poder e por isso permitem que ele ande livremente por aqui. O demônio está
    aqui somente quando alguém chama seu nome e pede por uma tortura
    inimaginável que, de alguma forma, levará à liberdade eterna.
  keywords:
  - Tharnt
  - demonio
  name: Tharnt, o Demônio
  vnum: '20130'
- description: |-
    Ryth está aqui há eras. Alto e musculoso, segurando um castiçal de prata em uma
    das mãos, ele é guiado pela vingança. Tentativas de reabilitação apenas
    aumentaram sua sede por vingança. Muitos dos seus adeptos estão aqui também,
    em solidariedade a ele.
  keywords:
  - ryth
  name: Ryth, o assassino requintado
  vnum: '20131'
- description: |-
    Um dos maiores assassinos da história de Vitália, Galenzi não aparenta ser
    tão perigoso. De fala singular, educado e demonstrando idéias de gênio,
    ele parece ser apenas um pacato cidadão vitaliano.
  keywords:
  - Galenzi
  name: Galenzi Lir, o canibal
  vnum: '20132'
- description: |-
    Henrique VIII foi jogado aqui depois que as pessoas perceberam sua grande
    tendência de cortar as cabeças das mulheres ao seu redor. Terapia e
    medicamentos foram utilizados, até que ele foi solto e outra cabeça de
    mulher foi cortada. Preso e mandado de volta, ele espera por reabilitação.
  keywords:
  - henrique
  - VIII
  name: Henrique VIII
  vnum: '20133'
- description: |-
    Um dos piores seres deste mundo, dá a impressão que ele se deixou ser trazido
    para o Asilo por algum motivo desconhecido.    Aqui ele passa a maior parte do
    seu tempo tentando fazer novos aliados para garantir sucesso nos seus planos
    mirabolantes de domínio e conquista mundial. Seus grandes olhos observam tudo
    atentamente, enquanto ele prepara alguma desordem suficientemente grande que
    possa garantir sua presença aqui.
  keywords:
  - Mahunt
  name: Mahunt, o dominador
  vnum: '20134'
- description: |-
    Hojenkis é um mistério para todos que o cercam. Apenas ele sabe o que se passa
    na sua mente louca. Uma coisa é certa, toda vez que ele matou alguém, sentiu-se
    bem e jamais teve o menor remorso.  Andando silenciosamente pela cela,
    ele pensa na sua próxima vítima.
  keywords:
