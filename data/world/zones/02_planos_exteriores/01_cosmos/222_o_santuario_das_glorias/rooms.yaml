- description: "E você pára.  Seu corpo parece não mais obedecer aos seus comandos,\n\
    tamanha emoção o envolve.  Lentamente você penetra neste lugar sagrado e\nsabe\
    \ que a partir de agora nada será como foi.  Imenso e glorioso, tem as\nparedes\
    \ totamente cobertas por um material absolutamente branco, que você\nnÃ£o sabe\
    \ definir se Ã© mÃ¡rmore ou nÃ£o.  Ã\x89 aqui, neste Templo esplendoroso,\nonde\
    \ estão gravadas as glórias de todo o passado e onde se registrarão as do\nfuturo.\
    \  Em algumas paredes, imensas pinturas ilustram as conquistas de\ntodos os bravos\
    \ e você fica impressionado com as cenas ali perpetuadas.\nEstranhamente, você\
    \ consegue ver através das paredes brancas e percebe que\nlá fora, em um grande\
    \ vale, há um número infinito de belíssimas estátuas."
  exits:
    east:
      target_vnum: '22206'
    south:
      target_vnum: '22208'
  name: O Templo das Glórias
  vnum: '22207'
- description: "Você deixou o Templo e segue em direção ao vale.  Tudo aqui parece\n\
    lembrar o quanto este lugar é especial e sagrado.  E você olha com respeito\n\
    para o imenso círculo de estátuas, que esculpidas com perfeição, revelam as\n\
    figuras daqueles que foram bravos e corajosos, dignos e honrados.  Tantas\ncenas\
    \ tomam conta dos seus pensamentos.  Tantas lembranças, tantos momentos\nde glória.\
    \  E você se orgulha, pois sabe que chegou até aqui por acreditar\nnestes príncipios.\
    \  E percebe que PODE fazer mais e que QUER fazer mais.\nNão pela conquista ou\
    \ pela fama, mas, por este mundo e pelas pessoas que\nvocê ama e respeita.  E\
    \ que se fizer parte desta imensa galeria, terá\ndeixado o maior de todos os legados:\
    \ o seu exemplo.  Você sabe que terá que\nlutar muito.  Não com pressa.  Nem por\
    \ ambição.  Mas porque quer deixar\nregistrado para todo o sempre que você também\
    \ lutou pela @CHONRA, DIGNIDADE e\nFRATERNIDADE@n.  Chegou a hora, vocÃª sente\
    \ isso!  Ã\x89 hora de fazer uma prece\naos Deuses pedindo suas bençãos e partir\
    \ para a luta!\nHá uma floresta a sudeste e além dela, parece haver uma interessante\n\
    construção."
  exits:
    north:
      target_vnum: '22207'
  name: O Vale das Glórias
  vnum: '22208'
- description: |-
    Lentamente você vai saindo deste lugar sagrado.  Seu coração está em paz,
    bem como a sua consciência.  Você sabe que daqui para frente será outra
    pessoa.  Alguém melhor, mais paciente, mais consciente de que para muitos é
    um exemplo.  Então o vento lhe sopra algumas palavras, encorajando-o a
    visitar aqueles que, de alguma forma, serviram de inspiração para a sua
    própria jornada.
    Há uma floresta a sudeste e uma interessante construção ao longe.
  exits: {}
  name: Saindo do Vale das Glórias
  vnum: '22209'
- description: |-
    Você continua sua caminhada.  Seu coração está em paz, bem como a sua
    consciência.  Você sabe que daqui para frente será outra pessoa.  Alguém
