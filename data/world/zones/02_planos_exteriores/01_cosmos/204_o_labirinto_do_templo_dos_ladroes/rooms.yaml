  exits:
    east:
      target_vnum: '020120420483'
    north:
      target_vnum: '020120420480'
    south:
      target_vnum: '020120420484'
  local_id: '20482'
  name: Jardim dos Ladrões
  vnum: '020120420482'
- description: |-
