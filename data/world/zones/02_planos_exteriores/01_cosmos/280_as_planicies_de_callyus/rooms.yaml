  exits:
    east:
      target_vnum: 020128028058
    north:
      target_vnum: 020128028078
    south:
      target_vnum: 020128028019
    west:
      target_vnum: 020128028021
  local_id: '28020'
  name: O Rio dos Heróis
  vnum: 020128028020
- description: |-
    A água está mais clara aqui.  Você se pergunta se isso é devido ao fato
    do rio fazer ser bem mais estreito aqui e das margens estarem mais próximas
    uma da outra do que ao oeste.
  exits:
    east:
      target_vnum: 020128028020
    west:
      target_vnum: 020128028022
