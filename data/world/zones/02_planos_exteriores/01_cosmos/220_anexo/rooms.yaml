- description: "Ao entrar neste lugar, a sua primeira impressão é que você acabou\
    \ de\nencontrar o Paraíso.  O lugar é absolutamente perfeito.  A Natureza parece\n\
    ter concentrado todas as suas forças para transformar este pequeno oásis em\n\
    sua obra-prima.  São flores tão delicadas e com perfumes tão sutis que seria\n\
    difícil descrever.  Uma pequenina fonte jorra sua água pura e cristalina e\nvocê\
    \ se sente enlevado com a suave melodia que os delicados pássaros azuis\nentoam,\
    \ sem parar, como se estivessem saudadando a sua presenÃ§a.  Ã\x81rvores\nmajestosas,\
    \ produzem sombra fresca e parecem convidar você à meditação.\nOuça o som do vento,\
    \ ouça o som da água...ouça seu coração...e encontre o\ncaminho para a felicidade."
  exits:
    down:
      target_vnum: '22031'
  name: Ouvindo as Palavras da Vida
  vnum: '22034'
- description: |-
    O aposento pequenino e muito claro mostra instantaneamente, que as
    pessoas que cuidam deste local são sérias e totalmente despojadas de
    qualquer tipo de apego material.  Embora simples, o local é tão sereno que
    dá vontade de aqui ficar.  As pequenas aberturas nas paredes, deixam filtrar
    a luz clara e de tons azulados e róseos, vindas das salas anexas a essa.
    Também se pode ouvir daqui, o som suave de água corrente.  A vida parece
    tomar conta desta sala.  Um pequeno mural está fixado na parede e este
    parece ser um importante meio de comunicação.
  exits:
    east:
      target_vnum: '22033'
    west:
      target_vnum: '22032'
  name: O Encontro da União e da Força
  vnum: '22035'
