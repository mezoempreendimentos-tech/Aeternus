- description: Um guarda de gelo está parado aqui, vigiando os portões.
  keywords:
  - guarda
  - gelo
  long_desc: |-
    Este guerreiro é feito completamente de gelo cristalino azulado. Seus olhos
    brilham com uma luz fria e seus movimentos são precisos e letais. Cada passo
    que ele dá deixa pequenos cristais de gelo no chão.
  name: um guarda de gelo
  vnum: '010000200200'
- description: Um soldado gelado patrulha esta área com determinação.
  keywords:
  - soldado
  - gelado
  long_desc: |-
    Este soldado vestia uma armadura completa antes de ser transformado em gelo.
    Agora, a armadura e o corpo formam uma única peça cristalina azul-esbranquiçada
    que reflete a luz de forma hipnotizante.
  name: um soldado gelado
  vnum: '010000200201'
- description: Um servo de gelo trabalha aqui silenciosamente.
  keywords:
  - servo
  - gelo
  long_desc: |-
    Este humanoide de gelo foi criado para servir no castelo. Seus movimentos
    são mecânicos mas eficientes, e ele parece não ter consciência própria,
    apenas seguindo ordens pré-estabelecidas.
  name: um servo de gelo
  vnum: '010000200202'
- description: O Capitão de Gelo comanda seus soldados com autoridade gelada.
  keywords:
  - capitao
  - gelo
  long_desc: |-
    Um imponente guerreiro de gelo com detalhes dourados congelados em seu peito.
    Sua presença irradia um frio intenso e sua experiência militar é evidente
    em cada movimento calculado. Uma aura azulada pulsa ao redor de seu corpo.
  name: o Capitão de Gelo
  vnum: '010000200203'
- description: A Rainha Gelada está sentada em seu trono de gelo cristalino.
  keywords:
  - rainha
  - gelada
  long_desc: |-
    Uma figura majestosa e aterrorizante. Sua beleza é sobrenatural, mas seus
    olhos azuis gelados não demonstram qualquer calor humano. Vestida com um
    manto que parece ser feito de neve cristalizada, ela controla todos os
    aspectos do inverno eterno deste castelo.
  name: a Rainha Gelada
  vnum: '010000200204'
- description: Um prisioneiro está aqui, tremendo de frio.
  keywords:
  - prisioneiro
  long_desc: |-
    Este pobre coitado foi capturado e trazido para as masmorras geladas.
    Seus lábios estão azuis de frio e ele mal consegue se mover devido
    à temperatura extremamente baixa das celas.
  name: um prisioneiro
  vnum: '010000200205'
- description: Um espírito translúcido do gelo flutua pela área.
  keywords:
  - espírito
  - gelo
  long_desc: |-
    Esta aparição etérea é a alma de alguém que morreu de frio no castelo.
    Agora está preso eternamente a este lugar, fadado a vagar pelos corredores
    gelados até o fim dos tempos.
  name: um espírito do gelo
  vnum: '010000200206'
- description: Um grande construto de gelo bloqueia a passagem.
  keywords:
  - construto
  - gelo
  long_desc: |-
    Uma criatura artificial massiva feita de blocos de gelo densamente comprimidos.
    Seus punhos são como martelos de guerra e seus movimentos são lentos mas
    devastadores. Runas geladas brilham em sua superfície.
  name: um construto de gelo
  vnum: '010000200207'
- description: Um elemental do gelo maior manifesta-se aqui.
  keywords:
  - elemental
  - gelo
  long_desc: |-
    Uma criação mágica pura do elemento gelo. Este ser não possui forma física
    definida, sendo uma massa de gelo e neve em constante movimento. Cristais
    afiados giram ao seu redor como lâminas cortantes.
  name: um elemental do gelo
  vnum: '010000200208'
- description: Uma aranha feita de cristais de gelo caminha pelas paredes.
  keywords:
  - aranha
  - cristal
  long_desc: |-
    Esta criatura aracnídea é completamente transparente, formada por cristais
    de gelo que se movem com precisão sobrenatural. Suas patas fazem um som
    delicado como sinos quando toca o chão gelado.
  name: uma aranha de cristal
  vnum: '010000200209'
- description: Um lobo feito de gelo uiva silenciosamente.
  keywords:
  - lobo
  - gelo
  long_desc: |-
    Este predador foi transformado em gelo, mas manteve todos os seus instintos
    selvagens. Seus olhos vermelhos brilham como rubis em contraste com seu
    corpo cristalino, e seu hálito forma nuvens de vapor gelado.
  name: um lobo do gelo
  vnum: '010000200210'
- description: Um bibliotecário de gelo cuida dos pergaminhos congelados.
  keywords:
  - bibliotecario
  - gelo
  long_desc: |-
    Este erudito foi transformado em gelo enquanto estudava os segredos do
    inverno eterno. Agora serve como guardião dos conhecimentos arcanos
    preservados no frio perpétuo da biblioteca do castelo.
  name: o bibliotecário de gelo
  vnum: '010000200211'
- description: Um cozinheiro de gelo prepara banquetes gelados.
  keywords:
  - cozinheiro
  - gelo
  long_desc: |-
    Ironia do destino: este cozinheiro que dedicou sua vida a preparar pratos
    quentes agora só consegue criar iguarias congeladas. Suas mãos de gelo
    ainda se movem com a habilidade de anos de experiência culinária.
  name: o cozinheiro de gelo
  vnum: '010000200212'
