- description: |-
    Você está em uma longa via calçada por pedregulhos.  As grandes pedras de
    granito foram firmemente ajustadas no chão e à medida em que você caminha,
    uma leve camada de pó se ergue, tomando conta de todo o caminho adiante.  A
    via está ladeada por arbustos e pequenas moitas, dando à estrada um aspecto
    bastante solitário.  A sensação de estar sendo vigiado está muito forte.  O
    passeio continua para o sul, se encontrando com uma estreita rua a norte.
  exits:
    north:
      target_vnum: '010205205214'
    south:
      target_vnum: '010307507501'
  name: Um Grande Passeio Pelos Pedregulhos
  vnum: '010307507500'
