- description: O Cavaleiro sem Cabeça, cavalgando em seu pesadelo, vem em sua direção!
  keywords:
  - cavaleiro
  - cabeca
  - cabeça
  long_desc: |-
    O cavaleiro procura eternamente por sua cabeça perdida.   Em um antigo uniforme
    militar ele se senta no topo de um poderoso pesadelo.   Ele se vira para você e
    levanta sua espada na direção de seu pescoço.
  name: o Cavaleiro sem Cabeça
  vnum: '010300700700'
- description: Um corpo está aqui, movendo-se freneticamente ao ritmo desta sinfonia
    infernal.
  keywords:
  - corpo
  - zumbi
  - morto
  - vivo
  - criatura
  long_desc: |-
    Seu corpo parece estar-se decompondo, este cadáver parece ter se esquecido
    de cair, tamanha a podridão de seu corpo.  Talvez você possa ajuda-lo...
  name: a Criatura
  vnum: '010300700701'
- description: Uma figueira está aqui, dançando loucamente em seu vaso, radical não?
  keywords:
  - planta
  - figueira
  long_desc: É uma figueira em um vaso, oras.
  name: uma figueira em um vaso
  vnum: '010300700702'
- description: Uma pequena criatura está procurando comida por aqui.
  keywords:
  - monstrinho
  - menor
  - criatura
  long_desc: |-
    É uma coisa pequena, no máximo com 30 centímetros.   Seu corpo curvado e
    verde se torce quase incontrolavelmente enquanto ele o esquadrinha,
    tentando avaliar o risco de fazer de você sua próxima refeição.
  name: a Criatura Menor
  vnum: '010300700705'
- description: Um duende de pele acinzentada está rondando ao redor.
  keywords:
  - duende
  long_desc: |-
    A criatura de pele acinzentada está rondando aqui. Ele carrega uma
    maça consigo e tem uma expressão sórdida.
  name: um duende
  vnum: '010300700706'
- description: Um monstro feito de cristal espreita aqui.
  keywords:
  - cristal
  - monsto
  long_desc: |-
    Quase invisível contra o fundo rochoso, o monstro de pedra
    passa quase despercebido.   Feito de cristais e minerais ele é lento mas poderoso.
  name: o Monstro de Cristal
  vnum: '010300700707'
- description: Um escorpião vermelho foge pelas pedras no chão.
  keywords:
  - escorpião
  - escorpiao
  - vermelho
  long_desc: |-
    Um aracnídeo do tamanho de duas mãos juntas, sua carapaça vermelha proporciona
    proteção a esta criatura enquanto seu ferrão goteja veneno.
  name: o escorpião vermelho
  vnum: '010300700708'
- description: Um dos Guardas malditos da Fortaleza está patrulhando a área aqui.
  keywords:
  - maldito
  - guarda
  long_desc: |-
    Uma armadura de placas é tudo o que veste o guarda.   Como um homem invisível
    em armadura visível ele anda eternamente pelos corredores da Fortaleza,
    protegendo-a de ameaças externas.
  name: o Guarda maldito
  vnum: '010300700710'
- description: Um Guardião espreita aqui esperando para chegar a você.
  keywords:
  - guardião
  - guardiao
  - guarda
  long_desc: |-
    Você não o vê até que ele quase esbarra em vocé.   O Guardião é um pesadelo
    que vaga na forma humana.   Ele se torce com movimenta copiosamente e
    articuladamente como se não tivesse controle de seus próprios movimentos.
  name: um Guardião
  vnum: '010300700711'
- description: O Ceifeiro em pessoa espera por alguém que possa desafiá-lo.
  keywords:
  - impiedoso
  - ceifeiro
  long_desc: |-
    Ele é a morte em pessoa.   O ceifeiro tem uma aparência muito severa.
    Suas mãos esqueléticas seguram sua foice.   Seu crânio é parcialmente
    escondido pelo seu robe negro.   Ele olha profundamente em seus
    olhos antes de lhe atacar.
  name: o Ceifeiro Impiedoso
  vnum: '010300700712'
- description: Um cabaleante zumbi patrulha a área aqui.
  keywords:
  - zumbi
  - legionario
  - legionário
  long_desc: |-
    É um corpo apodrecido que se move.   É um dos inúmeros soldados, o que
    lhes faltam em força corpórea é compensado por seu grande número.
  name: o zumbi legionário
  vnum: '010300700713'
- description: Uma gigantesca armadura negra está aqui, impedindo sua passagem adiante.
  keywords:
  - cavaleiro
  - negro
  - tempestuoso
  - armadura
  long_desc: |-
    Esta monstruosa armadura tem mais de dez pés de altura e cinco pés de largura.
    Quatro polegadas de grossura em seu ponto mais fino, a armadura é coberta em
    forma de runas arcanas que brilham com seu poder, polindo o metal escuro com
    um profano brilho verde que vem de dentro do Guarda Condenado.   Quem pode
    advinhar quantas almas foram aprisionadas aqui, para dar à armadura este poder.
  name: o Tempestuoso Cavaleiro Negro
  vnum: '010300700714'
- description: A Criatura Maior está na varanda roendo um osso de sua última vítima.
  keywords:
  - monstro
  - criatura
  - maior
  long_desc: |-
    Uma massa humana de volumosos músculos verde-acinzentados e dentes amarelados.
    Sempre e para sempre faminto.   Ele parece trazer suas vítimas aqui para comer em paz.
    Será você sua próxima vítima?
  name: a Criatura Maior
  vnum: '010300700715'
- description: Uma pequena criança encurvada, arroxeada, descansa aos pés do trono
    de Ivian.
  keywords:
  - pequena
  - encurvada
  - crianca
  - criança
  long_desc: |-
    Um pequeno delinqüente.   Distraído com os brinquedos infantis.   Brinca
    com chocalhos e estilingues.   Parece feliz com seu tipo de vida.
  name: a criança de Ivian
  vnum: '010300700716'
- description: Um prisioneiro desesperado está aqui, acorrentado ã parede.
  keywords:
  - prisioneiro
  - desesperado
  long_desc: |-
    Este patético indivíduo não tem sido alimentado há semanas.   Ele está muito
    magro de fome.   Ele olha para você, implorando por clemência.
  name: o Prisioneiro desesperado
  vnum: '010300700717'
- description: Ivian, a Senhora do Vazio Espiritual está sentada em seu trono, fitando
    você.
  keywords:
  - ivian
  - senhora
  long_desc: |-
    A Senhora do Vazio é bastante alta.  Ela personifica a beleza do céu em uma
    noite sem estrelas.   É uma beleza fria e distante, ainda que imensa e poderosa.
    Seu rosto liso parece uma porcelana sem defeitos, esculpida em sua maldade.   Os leves
    robes violeta que ela veste são movidos pela vastidão do espaço.   Ela senta em seu trono,
    fitando você, enquanto sua criança brinca a seu redor.
  name: Ivian, a Senhora do Vazio Espiritual
  vnum: '010300700719'
- description: Um guarda amaldiçoado está patrulhando as paredes exteriores da Fortaleza.
  keywords:
  - guarda
  - condenado
  - armadura
  long_desc: |-
    Como um homem invisível, em armadura visível, a armadura de placas animada foi rebaixada
    para a patrulha devido a sua inferior qualidade.
  name: o guarda-condenado
  vnum: '010300700730'
- description: Um dos Guardas malditos da Fortaleza está patrulhando a área aqui.
  keywords:
  - maldito
  - guarda
  long_desc: |-
    Uma armadura de placas é tudo o que veste o guarda.   Um homem invisível, vestido com armadura
    visível, ele anda eternamente pelos corredores da Fortaleza protegendo-a de ameaças externas.
  name: o Guarda Maldito
  vnum: '010300700740'
- description: Febre Escarlate está aqui, com sua mão em seu saber.
  keywords:
  - febre
  - escarlate
  long_desc: Ele é um guerreiro temido por sua sede de sangue. Sua espada e armadura
    estão cobertas pelo sangue de seus inimigos.
  name: Febre Escarlate
  vnum: '010300700750'
- description: Um drow negro está espreitando pela floresta.
  keywords:
  - negro
  - drow
  - cacador
  - caçador
  long_desc: |-
    É uma criatura de pele escura, com todas as finas características de sua raça.
    Seu cabelo é de um branco pálido.   Ele espreita você, segurando sua faca curva.
  name: o caçador Drow
  vnum: '010300700775'
- description: Um dos muitos insetos que há por aqui, voa ao seu redor, o importunando.
  keywords:
  - Mosquito
  - inseto
  long_desc: É um mosquito, o que mais você queria?
  name: um Mosquito
  vnum: '010300700780'
- description: Uma grande planta carnívora desponta entre as videiras daqui.
  keywords:
  - planta
  - carnivora
  - venus
  - carnívora
  - vênus
  long_desc: É uma Vênus carnívora. O que mais você quer?
  name: a Vênus carnívora
  vnum: '010300700781'
- description: A Banda Infernal está aqui.
  keywords:
  - banda
  long_desc: É simplesmente indescritível.
  name: a Banda Infernal
  vnum: '010300700799'
