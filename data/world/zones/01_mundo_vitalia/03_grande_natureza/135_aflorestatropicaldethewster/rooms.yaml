    bom lugar para descansar antes de viajar mais adiante.
  exits:
    south:
      target_vnum: '010313513534'
  name: Uma Cabana
  vnum: '010313513582'
- description: |-
    Os  volumosos  portões de Silverthorne fica ao oeste, formando uma grande
    sombra  sobre  você.  A  estrada  pela  qual  você  está andando é bastante
    estreita e nuvens de poeira sopram com a brisa. A floresta de altas árvores
    com  largas  folhas  verdes de todos os tipos cerca a estrada ao norte e ao
    sul. O caminho sujo e empoeirado segue pelo leste.
  exits:
    east:
      target_vnum: '010313513584'
    west:
      target_vnum: '010103103207'
  name: Um Caminho Sujo e Empoeirado
  vnum: '010313513583'
- description: |-
    A  estrada  pela  qual  você está andando é bastante estreita e nuvens de
    poeira  sopram com a brisa. Ocasionalmente uma larga folha se desprende das
    árvores  e espirala até alcançar o chão. A estrada suja continua ao leste e
    ao oeste, de onde também pode-se ver os muros de uma cidade.
  exits:
    east:
      target_vnum: '010313513585'
    west:
      target_vnum: '010313513583'
  name: Um Caminho Sujo e Empoeirado
  vnum: '010313513584'
- description: |-
