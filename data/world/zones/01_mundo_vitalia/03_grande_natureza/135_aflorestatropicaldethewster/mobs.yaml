  vnum: '010313513514'
- description: Um druida está aqui, meditando.
  keywords:
  - druida
  long_desc: |-
    Ele não parece muito feliz por você tê-lo interrompido, mas ele é educado
    demais para pedir que você saia.
  name: um druida
  vnum: '010313513515'
- description: Uma druidesa está aqui, olhando para você.
