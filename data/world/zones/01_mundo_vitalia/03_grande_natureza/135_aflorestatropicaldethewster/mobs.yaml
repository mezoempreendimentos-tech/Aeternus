    Ele parece ter centenas de anos.  Sua barba cinza contrasta fortemente com a
    falta de rugas em seu rosto.
  name: um druida ancião
  vnum: '010313513508'
- description: Uma Druidesa Anciã está aqui, alimentando alguns coelhos.
