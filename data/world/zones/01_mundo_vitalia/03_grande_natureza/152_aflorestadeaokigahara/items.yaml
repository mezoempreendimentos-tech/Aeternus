- action_desc: |-
    Esta não é uma simples ferramenta, mas um instrumento de meditação. O cabo é de
    um único colmo de bambu, tão polido pelo uso constante que adquiriu o brilho e
    a suavidade do marfim. As cerdas são de finas tiras do mesmo bambu, amarradas
    com um nó de corda de cânhamo que parece impossível de desatar. Não há um único
    espinho ou farpa; é perfeitamente lisa ao toque.

    Não foi feita para a limpeza, mas para a ordem. Varrer com ela não levanta pó,
    mas parece realinhar o mundo. Cada folha que move, cada pétala que desloca,
    parece fazê-lo com uma gentileza que honra a sua beleza, mesmo na queda.
    Segurá-la é sentir o peso de anos de serviço devoto e silencioso, e compreender
    a dignidade que existe na mais humilde das tarefas.
  description: Uma vassoura de bambu, gasta pelo uso, está aqui encostada.
  keywords:
  - vassoura
  - bambu
  - zelador
  name: a vassoura de bambu do zelador
  vnum: '010315215270'
- action_desc: |-
    Este cajado de amieiro já viajou por muitas léguas e testemunhou muitos
    horrores, e a sua história está gravada na sua superfície. A madeira é escura e
    endurecida, mas coberta por uma teia de pequenos entalhes e arranhões, cada um
    uma memória de um caminho perigoso ou de uma noite mal dormida sob estrelas
    estranhas. Não é reto, mas tem uma ligeira curvatura que se adapta
    perfeitamente à mão.

    A sua base está coberta por uma ponteira de ferro gasta, que um dia foi usada
    para encontrar apoio em rochas e gelo, mas que agora está silenciosa. O topo do
    cajado é liso e polido pelo toque constante de uma mão que procurava conforto e
    estabilidade. Não é uma arma, mas um companheiro. Carregá-lo é sentir o peso
    das estradas, mas também a resiliência de um espírito que nunca desistiu de
    procurar um lugar para descansar.
  description: Um cajado de madeira simples, mas robusto, foi deixado aqui.
  keywords:
  - cajado
