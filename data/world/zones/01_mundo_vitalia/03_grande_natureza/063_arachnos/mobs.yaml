- description: Uma aranha jovem está aqui, crescendo.
  keywords:
  - aranha
  - jovem
  long_desc: Ela parece recém-saída do ovo e esperta.  Suas presas ainda estão crescendo.
  name: uma aranha jovem
  vnum: '010306306301'
- description: Yevaud, o Usurpador de Midgaard está aqui, sorrindo maldosamente para
    você.
  keywords:
  - yevaud
  - dragao
  - usurpador
  long_desc: Velho, escamoso, mas ainda assim com muita amargura em si.
  name: Yevaud
  vnum: '010306306302'
- description: A aranha-lobo está aqui, lambendo suas presas ensanguentadas.
  keywords:
  - aranha
  - lobo
  long_desc: A aranha-lobo é peluda, muito peluda.
  name: a aranha-lobo
  vnum: '010306306303'
- description: O orc está preso na teia, e não consegue se soltar.
  keywords:
  - orc
  long_desc: |-
    Você vê maldade em seu olhar mas ele parece estar bem fraco, sem vida,
    e tudo o que ele pode fazer é olhar furiosamente para você, enquanto
    continua preso na teia.
  name: o orc
  vnum: '010306306304'
- description: A vespa rainha está aqui, pensando no quão saboroso você parece.
  keywords:
  - vespa
  - rainha
  long_desc: Você nota um olhar vidrado nos olhos dela.
  name: a vespa rainha
  vnum: '010306306305'
- description: Um zangão anda por aqui, executando ordens de seu mestre.
  keywords:
  - aranha
  - zangao
  long_desc: Um zangão comum.
  name: a aranha zangão
  vnum: '010306306306'
- description: Uma aranha etérea anda por aqui, viajando por mundos diferentes.
  keywords:
  - aranha
  - eterea
  long_desc: |-
    Ela vai e vem num piscar de olhos.  Parece ser realmente difícil acertá-la
    sem uma arma mágica.
  name: uma aranha etérea
  vnum: '010306306307'
- description: Um escravo humano de Arachnos trabalha sob condições cruéis aqui.
  keywords:
  - escravo
  - humano
  long_desc: |-
    O escravo não se importa com você, mas lutará como um guerreiro se atacado.
    Ele serve à aranha Imperatriz, Arachnos e se ele faz isso por vontade
    própria ou se foi seduzido você não poderá ter certeza.
  name: o escravo
  vnum: '010306306308'
- description: Um quasit aparece e desaparece, rindo de você.
  keywords:
  - quasit
  long_desc: |-
    Demoníaco em sua natureza, e muito travesso.  Ele estala seus dedos e
    cria um tesouro mágico!
  name: um quasit
  vnum: '010306306309'
- description: A aranha-pássaro estala suas poderosas mandíbulas.
  keywords:
  - aranha
  - passaro
  long_desc: A aranha-pássaro estala suas poderosas mandíbulas.
  name: a aranha-pássaro
  vnum: '010306306310'
- description: 'O eremita senta aqui e lhe adverte: ''Vá embora antes que seja tarde
    demais!'''
  keywords:
  - eremita
  long_desc: Um antigo guerreiro disfarçado é o que ele é na verdade, mas ele não
    é mau.
  name: o eremita
  vnum: '010306306311'
- description: O Guardião da Torre olha para você e imagina o quanto sua alma é pura.
  keywords:
  - guardiao
  - torre
  long_desc: |-
    Assim que olha para ele, você sente aqueles olhos penetrantes que
    mergulham nos seus.   Somente os imaculados podem ficar aqui com segurança.
  name: o Guardião da Torre
  vnum: '010306306312'
- description: O guardião obviamente não está fazendo seu trabalho.
  keywords:
  - guardiao
  long_desc: Ele parece ser um vagabundo, que dorme metade do tempo.
  name: o guardião
  vnum: '010306306313'
- description: Arachnos, a Imperatriz das Aranhas, lhe saúda com um sorriso maldoso.
  keywords:
  - arachnos
  - aranha
  - rainha
  - imperatriz
  long_desc: |-
    Ela é uma aranha muito atraente, com uma linda veste ornamentada.  Ela tenta
    lhe transformar em um de seus muitos escravos.  Ela não possui as presas
    venenosas das aranhas normais mas, como você pode observar, e ela não
    precisa disso, em absoluto.
  name: Arachnos
  vnum: '010306306314'
- description: A Ki-Rin sorri amigavelmente para você.
  keywords:
  - ki-rin
  long_desc: |-
    Ela é o ultimo baluarte de bondade neste reino.  Sua missão é algum dia
    libertar os escravos da Imperatriz.  Estando aprisionada aqui por uma
    eternidade, o poder maligno de Arachnos se alimenta da energia mágica
    dela.  Todavia, ela nunca se renderá em sua luta contra o mal e continuará
    seu trabalho de qualquer maneira que este se apresente.
  name: a Ki-Rin
  vnum: '010306306315'
- description: Um wormkin sem dentes brinca aqui.
  keywords:
  - dragao
  - wormkin
  - pequeno
  long_desc: É um pequeno dragão, e você quase se entristece ao pensar em matá-lo.
  name: o pequeno wormkin
  vnum: '010306306316'
- description: Um wormkin que cresceu um pouco demais olha para você com curiosidade.
  keywords:
  - dragao
  - wormkin
  - velho
  long_desc: |-
    Um dragão de tamanho médio -- parece que ele ainda não matou nada por
    si só, mas há uma primeira vez para tudo...
  name: o wormkin velho
  vnum: '010306306317'
