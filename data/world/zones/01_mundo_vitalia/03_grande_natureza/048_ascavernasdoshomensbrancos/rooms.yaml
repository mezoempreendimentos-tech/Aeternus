    south:
      target_vnum: '010304804884'
  name: Câmara de Espera
  vnum: '010304804882'
- description: |-
    O salão continua a leste até o trono.  Nos cantos algumas criaturas
    esperam a chance de fazer um pedido ao Homem Pálido.
  exits:
    east:
      target_vnum: '010304804884'
    north:
      target_vnum: '010304804881'
    south:
      target_vnum: '010304804886'
    west:
      target_vnum: '010304804880'
  name: Entrando na Câmara
  vnum: '010304804883'
- description: |-
    O salão continua a leste até o trono.  Nos cantos algumas criaturas
