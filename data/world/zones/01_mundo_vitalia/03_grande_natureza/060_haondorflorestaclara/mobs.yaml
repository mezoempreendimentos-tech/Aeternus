- description: John o Lenhador está aqui, a procura de árvores para cortar.
  keywords:
  - john
  - lenhador
  long_desc: |-
    Ele tem seis pés de altura e parece ser muito forte, com os músculos de seu
    peito quase estourando sua camisa xadrez.   Sua bonita figura está vestida
    com roupas de alguem que dá muito duro e sua expressão é de alguém que
    vive uma vida simples e pacífica.
  name: John o Lenhador
  vnum: '010306006000'
- description: O pequeno coelho está disparando na direção dos arbustos daqui.
  keywords:
  - pequeno
  - coelho
  long_desc: É uma criatura pequenina e peluda, com orelhas compridas e pés maiores
    ainda.
  name: o coelho
  vnum: '010306006001'
- description: Um urso enorme, marrom, com cara de estar faminto, está aqui.
  keywords:
  - urso
  - marrom
  long_desc: |-
    O urso é enorme, marrom, um peludo animal com garras muito grandes e dentes
    muito afiados.   De modo algum ele lembra aqueles ursinhos de brinquedos, tão
    lindinhos.
  name: o urso marrom
  vnum: '010306006002'
- description: Um coelho feroz está aqui, olhando para você com cara de faminto.
  keywords:
  - coelho
  - feroz
  long_desc: |-
    Esta pequena criatura peluda, com orelhas compridas e enormes pés, parece que
    foi atacada por coelhos com cólera, uma doença terrível, que transforma
    coelhinhos inocentes em criaturas ferozes e sedentas por sangue.
  name: o coelho feroz
  vnum: '010306006003'
- description: Um cervo da terra está calmamente pastando aqui.
  keywords:
  - corca
  - cervo
  - gamo
  long_desc: |-
    Esta é uma graciosa criatura, com pernas esguias e longas e com imensos olhos
    castanhos que olham fixamente para você, com grande interesse.
  name: o cervo da terra
  vnum: '010306006004'
- description: Uma raposa marrom está perseguindo coelhos por entre os arbustos daqui.
  keywords:
  - raposa
  - marrom
  long_desc: |-
    Ela é uma raposa grande, com uma pelagem marrom-avermelhada e uma longa e
    peluda cauda.
  name: a raposa marrom
  vnum: '010306006005'
- description: Um grande pássaro com uma das asas quebrada, está encolhidinho aqui.
  keywords:
  - passaro
  - grande
  long_desc: O pássaro parece que não vai viver muito, pelo jeito.
  name: o pássaro
  vnum: '010306006006'
- description: Um lince de tamanho médio está espreitando um pássaro, aqui.
  keywords:
  - gato
  - lince
  - gato-selvagem
  long_desc: |-
    O lince possui dentes e garras afiadas e provavelmente irá come-lo, no lugar do
    pássaro, se você lhe der chance.
  name: o lince
  vnum: '010306006007'
- description: Um pardal está ciscando na terra.
  keywords:
  - pardal
  long_desc: O pardal parece estar aproveitando bem a vida.
  name: o pardal
  vnum: '010306006008'
- description: Um tordo está ciscando por aqui, à procura de insetos para comer.
  keywords:
  - tordo
  long_desc: O tordo parece bem decidido em encontrar um inseto ou uma minhoca para
    comer.
  name: o tordo
  vnum: '010306006009'
- description: Um esquilo está aqui, procurando refúgio em sua toca.
  keywords:
  - esquilo
  long_desc: |-
    Ele sai um pouco de sua toca e o olha ansiosamente, parecendo estar torcendo
    silenciosamente para que você saia dali e o deixe sózinho.
  name: o esquilo
  vnum: '010306006010'
- description: Um peludo texugo marrom está deitado sobre uma tora aqui.
  keywords:
  - texugo
  long_desc: |-
    O texugo está acordando devagarinho e observando você de sua toca.  Você sabe
    que que ele não irá se mexer por um longo tempo.   Seus dentes e garras afiadas
    prendem a sua atenção, enquanto você fica considerando se deve ou não matá-lo.
  name: o texugo sonolento
  vnum: '010306006011'
- description: Um esquilo cinzendo, com um grosso e peludo rabo está a procura de
    nozes aqui.
  keywords:
  - esquilo
  - cinzento
  long_desc: |-
    Está feliz criatura parece que não liga a mínima para a sua presença e continua
    a sua busca por nozes, entre as folhas e os gravetos que estão espalhados
    no chão.
  name: o esquilo cinzento
  vnum: '010306006012'
- description: Um pequeno esquilinho marrom-avermelhado salta de árvore em árvore,
    aqui.
  keywords:
  - esquilinho
  long_desc: |-
    Ele é absurdamente hiper-ativo!!...este pequeno roedor parece que nunca se cansa
    de ficar correndo de um lado para o outro, de cima para baixo e em volta das
    árvores desta área.   Se você conseguisse pegá-lo, seria uma refeição e tanto,
    pensa você.
  name: o esquilinho
  vnum: '010306006013'
- description: Um grande corvo negro voa por aqui, procurando coisas para comer.
  keywords:
  - corvo
  - negro
  - passaro
  long_desc: |-
    O pássaro olha você com uma certa agressividade mas continua a procurar por
    comida.
  name: o grande corvo negro
  vnum: '010306006014'
- description: |-
    Um grotesco abutre, coberto por sangue e carniça, está aqui, se alimentando
    como louco.
  keywords:
  - grotesco
  - abutre
  - urubu
  long_desc: |-
    Você fica enjoado só de olhar para este animal nojento.   Pedaços de carniça
    ressecada, estão grudadas em seu bico e um organismo indentificável fica
    pulando em meio às suas penas.   Ele olha para você e o ataca, na tentativa
    de proteger o seu banquete.
  name: o grotesco abutre
  vnum: '010306006015'
- description: Um jovem alce está aqui, bebendo água no lago.
  keywords:
  - alce
  - gamo
  long_desc: |-
    Este jovem macho alce, está bebendo água na margem do lago e observando
    você, desconfiado.   Sua galhada ainda não está totalmente crescida, mas com
    certeza serão bastante expressivas dentro de alguns anos.
  name: o jovem alce
  vnum: '010306006016'
- description: Um peixe está nadando por aqui.
  keywords:
  - peixe
  long_desc: O peixe tem exatamente o tamanho certo para um excelente refeição.
  name: o peixe
  vnum: '010306006017'
- description: Um patinho está nadando no lago.
  keywords:
  - patinho
  long_desc: O patinho é adorável!   Ele se parece com uma bolinha de penugem.
  name: o patinho
  vnum: '010306006018'
- description: O pato está aqui, grasnando todo feliz.
  keywords:
  - pato
  long_desc: O pato é bastante gordo.   Ele parece estar aproveitando bem sua vida.
  name: o pato
  vnum: '010306006019'
