- description: Uma imensa árvore eleva-se à sua frente.
  keywords:
  - arvore
  - antiga
  - milenar
  - ancia
  long_desc: |-
    Suas raízes são extremamente grandes e inúmeras partes delas estão expostas,
    acima do chão.   Alguma coisa nelas faz você pensar que este não é um carvalho
    comum.

    O gigantesco tronco acinzentado parece tremer, como se estivesse suspirando
    profundamente.
  name: a árvore milenar
  vnum: '010306106110'
