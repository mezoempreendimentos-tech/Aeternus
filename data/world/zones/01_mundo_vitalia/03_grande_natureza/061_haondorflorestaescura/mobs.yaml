- description: Um lobo mau está aqui, rosnando com raiva para você.
  keywords:
  - lobo
  - mau
  long_desc: |-
    Ele é um lobo excepcionalmente grande, com uma grossa e negra cauda.   Saliva
    escorre rápidamente de suas brancas e longas presas.   Ele parece ser
    muito perigoso e bastante agressivo.
  name: o lobo mau
