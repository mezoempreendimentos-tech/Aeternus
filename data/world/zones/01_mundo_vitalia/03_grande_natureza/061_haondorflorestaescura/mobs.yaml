- description: |-
    Um enorme dragão verde está aqui, com seus olhos amarelos dardejando com
    ira.
  keywords:
  - dragao
  - verde
  long_desc: |-
    Este gigantesco réptil alado possui grossas escamas verdes cobrindo quase
    toda a extensão de seu corpo colossal.   Diversos buracos em suas pesadas
    asas, contam a história das inúmeras batalhas por ele vividas, bem como
    as diversas ranhuras dos chifres de sua cabeça.   Ele tem um cheiro
    insuportável, que apenas os dragões conseguem ter.
  name: o dragão verde
  vnum: '010306106112'
- description: Uma enorme aranha venenosa está aqui.
  keywords:
  - aranha
  - venenosa
  long_desc: |-
    Esta criatura nojenta tem o mesmo tamanho de uma pessoa rastejando.   Suas
    oito patas peludas lhe dão uma tremenda velocidade em práticamente qualquer
    tipo de superfície e suas possantes presas contém um poderoso veneno, capaz
    de paralizar ou matar em segundos.
  name: a enorme aranha venenosa
  vnum: '010306106113'
- description: A imensa e corpulenta Rainha Aranha está aqui.
  keywords:
  - rainha
  - aranha
  long_desc: |-
    Esta criatura nojenta tem o tamanho de um pequeno elefante.   Suas
    oito patas peludas lhe dariam uma tremenda velocidade em práticamente qualquer
    tipo de superfície, se ela não fosse tão gorda.   Seus enormes olhos
    arredondados, estão fixos em você.
  name: a Rainha aranha
  vnum: '010306106114'
- description: Shargugh, o elfo da Floresta está aqui, sorrindo maliciosamente para
    você.
  keywords:
  - shargugh
  - elfo
  - floresta
  long_desc: |-
    Esta pequenina criatura tem apenas três pés de altura, com seus revoltos
    cabelos castanhos e sua longa barba embaraçada.   Ele veste um estranho e
    esfarrapado traje marrom e verde e parece que ele está se divertindo muito.
  name: Shargugh
  vnum: '010306106115'
- description: |-
    O druida Ancião está aqui.  Ele parece estar bastante zangado com sua
    presença em sua casa.
  keywords:
  - druida
  - idoso
  - ancião
  long_desc: |-
    O druida parece ser bastante idoso.   Você poderia dizer que ele se trata de
    alguém quase santo, contudo, você sabe muito bem que ele é um adversário
    bastante difícil.
  name: o druida Ancião
  vnum: '010306106116'
- description: A Elfa negra Isha está aqui, observando você silenciosamente.
  keywords:
  - elfa
  - isha
  long_desc: |-
    Ela nada mais é, alem de maravilhosa, com sua pele negra como a noite e
    os cabelos brilhantes como raios prateados de luar.   Seu corpo esbelto
    está vestido com uma camisa cavada e saia curta, feita de escamas negras
    adornadas com fios de prata.   Suas costas estão cobertas por um grande
    manto com capuz, negro como sua pele e na cintura, um largo cinto de prata
    prende uma longa e delgada espada em seu bainha de prata.
  name: a Elfa negra Isha
  vnum: '010306106117'
