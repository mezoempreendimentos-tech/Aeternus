  name: o portentoso e altivo rei
  vnum: '010115715712'
- description: Uma governanta se encontra aqui, imóvel.
  keywords:
  - governanta
  - mulher
  long_desc: |-
    Essa parece ser uma daquelas pessoas que nunca estão satisfeitas com nada.
