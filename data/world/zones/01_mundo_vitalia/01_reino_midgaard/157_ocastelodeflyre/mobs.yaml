    Ela é alta e tem porte de rainha. Mas é uma camareira e, como tal, quer
    fazer seus afazeres da melhor maneira possível.
  name: a criada
  vnum: '010115715710'
- description: Uma jovem senhora muito linda e altiva, com porte de Rainha, está imóvel
    aqui.
  keywords:
  - rainha
  - senhora
  - altiva
  long_desc: |-
    Ela é linda, com seus olhos azuis e cabelos loiros. Sua beleza não é
    encontrada em nenhum outro lugar do mundo.
  name: a altiva e belíssima rainha
  vnum: '010115715711'
- description: Um jovem senhor altivo e com ares portentoso está aqui, imóvel.
