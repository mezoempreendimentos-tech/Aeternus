- description: Um pacato cidadão passeia por aqui.
  keywords:
  - pacato
  - cidadao
  long_desc: |-
    Ele é baixinho, gordo e de cabelos castanhos. Aparenta ser bem calmo e não
    se irritar facilmente.
  name: um pacato cidadao
  vnum: '010115715701'
- description: Um guarda está aqui, guardando a entrada.
  keywords:
  - guarda
  long_desc: |-
    Ele é forte e não está com uma cara muito boa. Parece estar ali na mesma
    posição à dias, sem comer ou beber. Sua armadura está muito enferrujada,
    mas ele parece não se importar.
  name: um guarda
  vnum: '010115715702'
- description: Uma linda mulher está organizando a papelada.
  keywords:
  - mulher
  - secretária
  long_desc: |-
    Ela é loira e tem olhos da cor do mel. Parece ser uma secretária e tem
    muito o que fazer.
  name: a secretária
  vnum: '010115715703'
- description: Um chefe de cozinha está aqui, cuidando do jantar.
  keywords:
  - chefe
  - cozinheiro
  long_desc: É gordo, mas parece cozinhar muito bem.
  name: o chefe da cozinha
  vnum: '010115715704'
- description: Um zumbi está aqui, indo em sua direção.
  keywords:
  - zumbi
  - bimuz
  long_desc: |-
    "Ele está morto, mas esqueceu de deitar"...você pensa. E fica andando pelos
    lugares, a fim de encontrar seu assassino. Sua pele de dissolve com um
    simples sopro, de tão frágil que é.
  name: Bimuz, o zumbi
  vnum: '010115715705'
- description: Um enorme rato está aqui.
  keywords:
  - rato
  - asqueroso
  long_desc: É uma ratazana horrível, uma das maiores que você já viu.
  name: um asqueroso rato gigante
  vnum: '010115715706'
- description: Um vigia está dormindo aqui.
  keywords:
  - vigia
  - guarda
  long_desc: |-
    Ele parece estar morto, mas não é bom arriscar. Pode estar dormindo apenas.
    Um sono profundo, você imagina, a julgar pela pacífica aparência que ele lhe
    transmite.
  name: o vigia
  vnum: '010115715707'
- description: Um imenso dragão verde está cuspindo fogo aqui.
  keywords:
  - neegre
  - dragao
  long_desc: |-
    Ele é imenso e não pára de cuspir fogo. Sua cor esverdeada é o que lhe faz
    ser diferente.
  name: Neegre, o dragão verde
  vnum: '010115715708'
- description: Uma linda ave está aqui e seu olhar mortal parece ser mortal.
  keywords:
  - flyre
  - ave
  long_desc: |-
    É linda e sua beleza é indescritível.  Contudo, embora maravilhosa, sua
    beleza lhe inspira uma sensação indiscritivelmente aterrorizante.  Talvez o
    pensamento de enfrentá-la não seja realmente uma boa idéia.
  name: Flyre, a ave lendária
  vnum: '010115715709'
- description: Uma camareira está aqui.
  keywords:
  - criada
  - camareira
