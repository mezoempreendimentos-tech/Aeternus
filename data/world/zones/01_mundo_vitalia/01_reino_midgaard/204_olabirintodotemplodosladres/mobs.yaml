- description: Um mago vaga pelo matagal, somente olhando os estragos.
  keywords:
  - mago
  - desapontado
  long_desc: |-
    Este pobre sujeito LANÇA o olhar para a destruição!  Ele o olha
    penetrantemente, começa a falar alguma coisa, mas algo em sua mente ocorre,
    e ele volta a caminhar.
  name: um mago desapontado
  vnum: '010120420400'
- description: Um clérigo passa por você, não notando sua presença, resmungando sozinho.
  keywords:
  - clerigo
  - desapontado
  long_desc: |-
    Este homem, usando roupas de clérigo, tem o olhar de alguém que
    quase pudesse matar a sangue frio! Atípico para um religioso...
  name: um clérigo desapontado
  vnum: '010120420401'
- description: |-
    Um guerreiro pronto para a batalha, passa por você furiosamente com passos
    largos, com uma espada na mão.
  keywords:
  - guerreiro
  - furioso
  long_desc: |-
    Ele está franzindo a sobrancelhas, mau-humorado, ele realmente tem um mau
    aspecto.
  name: um guerreiro furioso
  vnum: '010120420402'
- description: |-
    Um agitado ladrão vaga por este confim, disposto a matá-lo apenas para
    treinar.
  keywords:
  - ladrao
  - furioso
  long_desc: Ele simplesmente o olha e resmunga, nada mais.
  name: um ladrão furioso
  vnum: '010120420403'
- description: |-
    Uma pequena druida tenta passar por você, mas parece apenas um pouco fora do
    caminho.
  keywords:
  - druidesa
  - desatenta
  long_desc: Ela continua sem ao menos olhar em sua direção.
  name: uma druidesa desatenta
  vnum: '010120420404'
- description: |-
    Um ladrão aposentado serve bebida para todo mundo, às vezes servindo uma para
    ele.
  keywords:
  - garcom
  - bar
  - ladrao
  long_desc: |-
    Ele parece distrair os outros à medida que ele serve cinco bebidas de uma vez
    só sem errar.
  name: o garçom de bar
  vnum: '010120420405'
- description: |-
    Um ladrão vestido passeia por aqui, cabisbaixo em contemplação, com as mãos
    dentro da manga.
  keywords:
  - ladrao
  - vestido
  long_desc: |-
    Você olha o forte ladrão que, protegido por grande manto, cabisbaixo.  Sua
    forma de andar graciosa, sinuosa, não deixa dúvida que ele é um ladrão.
  name: um ladrão vestido
  vnum: '010120420406'
- description: O Menino da Cerveja está em pé aqui, olhando a Santa Cerveja.
  keywords:
  - menino
  - cerveja
  long_desc: Provavelmente é filho de um grande ladrão, pois todos o respeitam.
  name: o menino da cerveja
  vnum: '010120420407'
- description: |-
    Um clérigo está em pé aqui no altar, pronto para dar a benção para qualquer
    um que se ajoelhar no altar.
  keywords:
  - clerigo
  - altar
  long_desc: |-
    Vivendo uma vida dedicada a melhorar os ladrões, este homem é um modelo de
    virtude.
  name: o Clérigo do Altar
  vnum: '010120420408'
- description: Um clérigo está sentado aqui, lendo um livro.
  keywords:
  - clerigo
  long_desc: |-
    Seu olhar não demonstra preocupação alguma com esse mundo.  Apenas vendo o
    tempo passar.
  name: o clérigo
  vnum: '010120420409'
- description: O vendedor de armas está em pé aqui, vendendo suas armas.
  keywords:
  - vendedor
  - armas
  long_desc: |-
    Estranho um vendedor de armas vestindo roupas de mendigo.  Ele realmente tem que
    saber como usar suas armas.
  name: o vendedor de armas
  vnum: '010120420410'
- description: O lojista está em pé aqui.
  keywords:
  - lojista
  long_desc: Este homem sabe usar todos os artigos que vende aqui - e mais.
  name: o lojista
  vnum: '010120420411'
- description: |-
    O Grande Clérigo ladrão está em pé aqui, parecendo um pouco perdido nos
    próprios pensamentos.
  keywords:
  - grande
  - clerigo
  - ladrao
  long_desc: |-
    Os olhos dele parecem um pouco vermelho, os passos um pouco fora do rumo.
    Homem, este cara parece ter bebido muito.
  name: o Grande Clérigo
  vnum: '010120420412'
- description: O ladrão vendedor de armaduras convida você a entrar e olhar suas mercadorias.
  keywords:
  - vendedor
  - armadura
  - ladrao
  long_desc: Ele está usando uma armadura enfeitada, a mais estranha que você já viu!
  name: o ladrão vendedor de armadura
  vnum: '010120420413'
- description: A enviada de Dimas está aqui, pronta para espalhar os ensinamentos
    do herói.
  keywords:
  - ladra
  - enviada
  long_desc: Uma mulher esbelta se levanta antes de você entrar, sorrindo.
  name: a enviada de Dimas
  vnum: '010120420414'
- description: Uma bonita arrumadeira vaga pelo local pegando lixo.
  keywords:
  - arrumadeira
  long_desc: Escolhida pelo próprio Grande Clérigo, esta pequena ladra veio de Midgaard.
  name: a arrumadeira
  vnum: '010120420415'
- description: Um ladrão jardineiro está em pé aqui, mantendo as colheitas abundantes.
  keywords:
  - ladrao
  - jardineiro
  long_desc: Ele faz muito bem o seu trabalho, pois o jardim floresce exuberante.
  name: o ladrão jardineiro
  vnum: '010120420416'
- description: O balconista do Descanso para Ladrões espera mostrar um quarto para
    você.
  keywords:
  - balconista
  - hospedaria
  - ladrao
  long_desc: Este homem tem um olhar notável, notavelmente notável.
  name: o balconista da hospedaria
  vnum: '010120420417'
- description: |-
    Um guarda está em pé aqui, compartilhando uma cerveja com outro guarda.
    Ele te olha rapidamente, acha que você é uma boa pessoa, e volta a beber.
  keywords:
  - guarda
  - ladrao
  - bebado
  long_desc: |-
    Este homem parece estar bebendo o dia todo. As pernas estão balançando, seus
    olhos são avermelhados, e ele fede cerveja.  Porém, ele mantém o punhal em
    sua mão.
  name: o guarda bêbado
  vnum: '010120420459'
