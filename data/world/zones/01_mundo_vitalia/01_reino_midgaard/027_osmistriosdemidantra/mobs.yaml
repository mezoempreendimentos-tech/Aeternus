- description: Um homem astuto corre para frente e para trás gritando preços de mercadorias.
  keywords:
  - regateador
  long_desc: |-
    É alguém a quem você não confiaria suas coisas nem mesmo por um segundo.
    Sagaz, com os olhos pequeno e brilhantes movimentando-se nervosamente.  Mãos
    rápidas, sempre prontas para um momento oportuno para roubar algo.  O
    regateador é atualmente um ladrão disfarçado.
  name: um regateador
  vnum: '010102702700'
- description: Um pobre camponês anda em círculos, meio sem rumo.
  keywords:
  - campones
  long_desc: |-
    O camponês esteve trabalhando duro nos campos todo dia.  Ele está agora
    tirando um intervalo de todo aquele trabalho.
  name: um camponês
  vnum: '010102702701'
- description: Este grande e bruto homem irá moldar ou concertar qualquer coisa para
    você.
  keywords:
  - ferreiro
  long_desc: |-
    Músculos ondulados e as costas largas fazem este homem intimidar a maioria
    das pessoas.  Levantando o martelo ele acerta um novo golpe no metal quente.
  name: o ferreiro
  vnum: '010102702702'
- description: Um homem nervoso está aqui, reclamando do tempo.
  keywords:
  - chefe
  - homem
  long_desc: |-
    O chefe do estábulo é um homem nervoso.  Apesar de seus resmungos, seus
    olhos brilhantes revelam que eles tem um bom coração.  Ele nunca maltratou
    ninguém ou qualquer animal.  No entanto, isso não significa que ele não irá
    lutar bravamente se algum de seus amores estiver em apuros.
  name: o chefe do estábulo
  vnum: '010102702703'
- description: Um esbelto garoto caminha carregando baldes do água para os animais.
  keywords:
  - garoto
  long_desc: |-
    O garoto do estábulo realmente ama seu trabalho.  Ele fragilmente se importa
    com os animais, os quais amam ele.  Cabelos castanhos e olhos de cor azul
    escuro honram sua aparência.  Bronzeado do trabalho ao sol, é um prazer
    tê-lo à volta.
  name: o garoto do estábulo
  vnum: '010102702704'
- description: Uma mulher vestindo roupas extravagantes e chamativas, acena para você.
  keywords:
  - mulher
  - coquete
  long_desc: |-
    Não exatamente bonita e nem feia, esta senhora tem modos afetados demais
    para alguém como ela.
  name: uma senhora coquete
  vnum: '010102702705'
- description: Um nobre caminha adiante.
  keywords:
  - nobre
  long_desc: |-
    Carregando arrogância, o nobre o ridiculariza conforme você se aproxima
    dele.  Ele é realmente rico, especialmente quando você dá uma rápida olhada
    na rechonchuda carteira que ele carrega.  Ele deve ter grande crédito na
    guarda do castelo para estar passeando com tanto dinheiro.
  name: um nobre
  vnum: '010102702706'
- description: Um guarda esplendidamente vestido está em pé aqui.
  keywords:
  - guarda
  - real
  long_desc: |-
    Não seja enganado pelo uniforme do guarda real.  Ele é um matador letal e
    treinado.  Ele está em guarda, atento para qualquer problema.
  name: o guarda real
  vnum: '010102702707'
- description: Um Sentinela muito atento está sentado aqui.
  keywords:
  - guarda
  - atento
  - sentinela
  long_desc: |-
    Um Sentinela está sentado aqui olhando alguns papéis aparentemente
    importantes.  Ele encara você com cara de poucos amigos, ao lhe encontrar.
  name: um sentinela atento
  vnum: '010102702708'
- description: Um carcereiro repentinamente aparece perto de você, espada em punho!!
  keywords:
  - carcereiro
  long_desc: |-
    Um carcereiro vestido todo de preto aparece repentinamente ao seu lado com a
    espada em punho!!
  name: o carcereiro
  vnum: '010102702709'
- description: Um torturador está aqui rindo maldosamente.
  keywords:
  - torturador
  long_desc: |-
    Um torturador está aqui, rindo maldosamente conforme considera toda graça
    que você e ele terão.
  name: o torturador
  vnum: '010102702710'
- description: O Sr. Torturador está aqui esperando sua próxima vítima...VOCÊ!
  keywords:
  - torturador
  long_desc: |-
    O Sr. Torturador está aqui rindo maldosamente, esperando sua próxima
    vítima...VOCÊ!
  name: o torturador veterano
  vnum: '010102702711'
- description: O Mestre Torturador espera aqui.
  keywords:
  - mestre
  - torturador
  long_desc: O Mestre Torturador espera aqui, com muito sangue gotejando em sua mão.
  name: o Mestre Torturador
  vnum: '010102702712'
- description: O Guarda Carcerário está aqui, as chaves para a sua sala nas mãos dele.
  keywords:
  - guarda
  - carcerario
  long_desc: |-
    O guarda carcerário, vestido com um longo manto preto está aqui.  Ele segura
    as chaves para o seu quarto.
  name: o guarda carcerário
  vnum: '010102702713'
- description: A mamãe ursa dorme aqui, perto de sua cria.
  keywords:
  - mamae
  - ursa
  long_desc: |-
    Roncando alto, ela vira de um lado para outro, como se estivesse tendo um
    pesadelo.  Seria um pesadelo para você se ela acordasse e o visse perto de
    sua cria, já que ela tem cinco garras de três polegadas em cada pata.
  name: a mamãe ursa
  vnum: '010102702716'
- description: Um pequeno filhote dá alegres cambalhotas enquanto sua mãe dorme aqui
    perto.
  keywords:
  - filhote
  - urso
  long_desc: |-
    Um maço de pelos alegre, o filhote não sente medo.  Você sorri conforme ele
    dá saltos e cambalhotas, brincando com sua irmã.
  name: um filhote de urso
  vnum: '010102702717'
- description: Uma corça está aqui, comendo.
  keywords:
  - corca
  long_desc: |-
    Astuta e saudável, a corça é rápida para correr a menor sinal de perigo.
    Ela continua a mordiscar a exuberante grama, mantendo suas orelhas alerta a
    qualquer barulho não amigável.
  name: uma corça
  vnum: '010102702718'
- description: Uma raposa caminha silenciosamente, seguindo sua presa.
  keywords:
  - cinza
  - raposa
  long_desc: |-
    Pêlo cinza, orelhas de extremidade branca, e um rabo ocupado dá a essa
    criatura a sua identidade.  Ela olha para você durante um curto tempo e
    então continua a seguir sua presa antes que o rastro fique frio.
  name: uma raposa cinza
  vnum: '010102702719'
- description: Um pequeno pássaro salta ao redor no chão e então voa
  keywords:
  - passaro
  long_desc: |-
    Erguendo a cabeça e olhando para você, ela sai voando.  Pousando a uma curta
    distância de você, ela repete seu movimento bobo.
  name: um pássaro
  vnum: '010102702720'
- description: Uma pequena e colorida borboleta voa graciosamente.
  keywords:
  - borboleta
  long_desc: |-
    Ela está ocupada no trabalho de procurar por néctar doce.  Ela apenas para
    um momento para checar você, então ela voa alegre novamente.
  name: uma borboleta
  vnum: '010102702721'
- description: Um porco alegremente coberto com lama ronca alegremente.
  keywords:
  - porco
  long_desc: |-
    Pequeno e arredondado, ele rola na lama.  Roncando alegremente, parece que
    ele não se preocupa com o mundo
  name: um porco enlameado
  vnum: '010102702722'
- description: Uma vaca ruminando descansa no chão.
  keywords:
  - vaca
  long_desc: |-
    A vaca não é diferente de qualquer outra vaca que você já viu.  Estúpida e
    preguiçosa, ela descansa aqui, esperando pelo garoto do estábulo para
    alimentá-la.
  name: uma vaca preguiçosa
  vnum: '010102702723'
- description: Um cavalo muito forte está aqui, cochilando.
  keywords:
  - cavalo
  long_desc: |-
    Musculoso e grande, o cavalo se destaca dos outros e está aproveitando seu
    bem merecido descanso, depois de ter trabalhado duro todo o dia, nos campos.
  name: um cavalo muito forte
  vnum: '010102702724'
- description: Um cavalo com uma cicatriz de guerra está aqui, impaciente.
  keywords:
  - cavalo
  long_desc: |-
    Cicatrizes das incontáveis batalhas decoram o peito do cavalo.  Sua pata
    firmemente fincada no chão, parece ansiosa para estar livre novamente.
  name: um cavalo de guerra
  vnum: '010102702725'
- description: Um empedernido padeiro esta aqui, vendendo as suas recentes gostosuras
    assadas.
  keywords:
  - padeiro
  - empedernido
  long_desc: |-
    Ele parece muito cansado.  E depois de todo o serviço, ele ainda tem que
    acordar bem cedo, para assim ele poder vender os maravilhosos pães que você
    ama comer.
  name: o padeiro empedernido
  vnum: '010102702726'
- description: Um jovem ambicioso escudeiro está aqui.
  keywords:
  - jovem
  - escudeiro
  long_desc: |-
    O jovem escudeiro espera seu mestre voltar.  Conforme ele espera, ele está
    ocupado polindo a armadura do cavaleiro.  Algum dia este jovem espera entrar
    para o nível da nobreza e possibilitar a entrada nas festividades lá fora.
  name: um escudeiro
  vnum: '010102702727'
- description: Um homem está sentado atrás do balcão, girando uma adaga distraído.
  keywords:
  - vendedor
  long_desc: |-
    O vendedor de armas eh alto, magro e tem uma barbicha bem aparada.  Ele foi
    um homem de aluguel que viajou por todo o reino.  Ele esta cansado e aplica
    seu extenso conhecimento em um novo trabalho...  Negócios.
  name: o vendedor de armas
  vnum: '010102702728'
- description: Uma mulher com uma cicatriz na face está ocupada, mexendo com anéis
    de ferro.
  keywords:
  - fabricante
  - mulher
  long_desc: |-
    Ela que já foi uma reconhecida guerreira, havia parado de fazer armaduras
    depois de um acidente monstruoso que a deixou cega de um olho.  Foi assim
    que ela obteve aquela feia e comprida cicatriz na face.
  name: a fabricante de armaduras
  vnum: '010102702729'
- description: Uma mulher sorridente cumprimenta-o ao entrar na sala.
  keywords:
  - mulher
  long_desc: |-
    Esta é a mulher à quem pertence o crédito de fazer as delicias assadas que
    vê aqui.  Seu marido apenas vende e supervisiona outros aspectos da padaria.
  name: a mulher do padeiro
  vnum: '010102702730'
- description: Um homem imponente vestindo um manto real anda pela sala.
  keywords:
  - rei
  - jorus
  long_desc: |-
    Ele é um bom e generoso home que governou Midantra por um longo tempo.  Sob
    seu governo, o reinado viu nada além de prosperidade...  Até agora.
    Recentes relatos de falhas na colheita e doença espreitando as terras têm
    pesado bastante em sua mente ultimamente.
  name: o Rei Jorus
  vnum: '010102702731'
- description: Uma mulher de graciosidade e beleza aparece e cumprimenta-o gentilmente
  keywords:
  - rainha
  - elsa
  long_desc: |-
    A Rainha Elsa é casada e permaneceu fiel a seu marido por doze anos.  Uma
    boa e generosa mulher, ela é rápida em oferecer uma mão a quem precisa.  Ela
    tem sido o gênio por trás da política da corte, enquanto seu marido manuseia
    os negócios externos aos do castelo.
  name: a Rainha Elsa
  vnum: '010102702732'
- description: Um mercenario vaga procurando por maneiras de fazer dinheiro fácil.
  keywords:
  - mercenario
  long_desc: |-
    O mercenário é mais um ladrão do que um guerreiro.  Ele pode lutar bem para
    salvar sua pele, mas ele prefere deixar outro lutar.  Depois de tudo é fácil
    saquear um corpo do que saquear uma pessoa viva.
  name: um mercenário
  vnum: '010102702733'
- description: Alguma coisa escapa por entre a escuridão.
  keywords:
  - alguma
  - coisa
  - mulher
  long_desc: |-
    Esta mulher move-se silenciosamente, ela provavelmente pode caminhar por uma
    sala cheio de folhas secas e se aproximar de alguém sem ser notada.  Tal
    habilidades tem sido proveitosa para ela em seus assaltos.
  name: Alguma coisa
  vnum: '010102702734'
- description: Uma jovem ambiciosa escudeira está aqui.
  keywords:
  - jovem
  long_desc: |-
    Uma alta garota está aqui, ocupada afiando armas. Uma das poucas a ocupar o
    tradicional nível dominado por homens, ela não parece amedrontada pela tarefa
    à sua frente. Na verdade, ela aceita e aproveita o desafio.
  name: uma jovem
  vnum: '010102702735'
- description: Um grisalho veterano de muitas guerras olha assim que você entra na
    sala.
  keywords:
  - treinador
  - grisalho
  - veterano
  long_desc: |-
    Agitando a mão cheia de sangue, ele lhe dá as boas vindas, da entrada de sua
    tenda.  Rapidamente mapeando ao seu redor, ele percebe que você não está
    precisando de atenção médica e volta a limpar intrumentos cirúrgicos.  Forte
    e de mãos firmes, mostra que o Treinador não é especialista apenas em itens
    cirúrgicos, mas com armas também.
  name: o treinador
  vnum: '010102702736'
- description: Uma mulher alta e flexível está sentada em sua mesa, organizando eventos
    do dia.
  keywords:
  - paladina
  long_desc: |-
    A mais poderosa guerreira de toda a Midantra não é o que alguém esperava que
    fosse, segundo mencionavam as lendas.  Para iniciantes, ela não é cruel nem
    faz o tipo que está entediada por causa de tantas lutas.  Ela é agradável e
    suas habilidades em batalha é que a mantiveram intacta e linda.  Um punhal e
    uma adaga estão em seu cinto, assim como uma espada de lamina longa descansa
    em pé, ao lado da mesa.
  name: uma linda paladina
  vnum: '010102702737'
- description: Um cavaleiro em uma brilhante armadura branca sorri assim que entra
    na tenda.
  keywords:
  - cavaleiro
  - branca
  - rosa
  long_desc: |-
    Um querido amigo da Paladina, ele viajou de longe para ajudar a organizar os
    Campos de Treinamento.  Ainda que não seja um homem alto nem musculoso, ele
    se move com a graciosidade de um gato.  Seus olhos observam tudo que se move
    ao redor.  Um veterano de várias batalhas, ele não conhece o medo.
  name: o Cavaleiro da Rosa Branca
  vnum: '010102702738'
- description: Um homem guiado pela sede de sangue salta em sua direção!
  keywords:
  - homem
  long_desc: |-
    Um tipo sombrio que nenhum confia completamente, o homem de fama irá fazer
    qualquer coisa que puder para ganhar fama e atenção.  O que ele faz
    frequentemente nem sempre é bom.  Mesmo que as pessoas o notem, ele sempre
    irá fazer algo meio duvidoso...
  name: um homem de fama
  vnum: '010102702739'
- description: Um cavaleiro, novo nessas terras, assume posição defensiva conforme
    se aproxima.
  keywords:
  - distraido
  - cavaleiro
  long_desc: |-
    Ouvindo sobre os Campos de Treinamente para cavaleiros, ele veio de longe
    para chegar aqui.  Com o grande objetivo de ficar famoso um dia, ele
    aprimora suas habilidades.
  name: um cavaleiro distraído
  vnum: '010102702740'
- description: Uma imensa criatura feia nada para a superfície e repentinamente mergulha.
  keywords:
  - sanguessuga
  long_desc: |-
    Esta sanguesuga é maior que a maioria.  Alcançando o tamanho de três pés,
    isto não é algo que você gostaria que grudasse na sua perna, sugando todo
    seu sangue!
  name: uma sanguessuga
  vnum: '010102702741'
- description: Um desajeitado monstro surge das turvas profundezas arremessando-se
    em sua direção.
  keywords:
  - monstro
  long_desc: |-
    Um réptil gigantesco, o mostro do canal é feito para a vida no fosso.
    Grandes olhos ajudam-no a ver na escuridão e uma poderosa calda o empurra
    pela água com facilidade.  Quatro braços musculosos e duas pernas fazem esse
    monstro poderoso em uma luta.
  name: o monstro do canal
  vnum: '010102702742'
- description: Um nobre cervo bufa conforme você se aproxima dele.
  keywords:
  - cervo
  long_desc: |-
    O cervo ostenta um grande chifre de doze pontos.  Tendo sido caçado por esse
    chifre, o cervo se tornou desconfiado quando se trata de seres humanos.
  name: um nobre cervo
  vnum: '010102702743'
- description: Rizzo está próximo de sua carroça, vendendo suas mercadorias aqui.
  keywords:
  - supervisor
  - geral
  - Rizzo
  long_desc: |-
    Rizzo é um veterano aposentado do exército, que retornou à sua tradição
    familiar de vender mercadorias variadas.  Apesar de já ter um pouco de
    idade, sua força e graça ainda são bem evidentes em seus movimentos.
  name: Rizzo, o supervisor geral da loja
  vnum: '010102702744'
- description: Rangendo os rentes raivosamente, um cavaleiro vestido de preto convida-o
    a lutar!
  keywords:
  - cavaleiro
  - negro
  - espinho
  long_desc: |-
    Banido para sempre da irmandade dos Paladinos por ter cometido horríveis
    crimes contra o reino, o Cavaleiro do Espinho Negro carrega muita raiva
    dentro de si.  O vermelho em seus olhos mostra que ele vive pela vontade e
    prazer de matar a qualquer custo.
  name: o Cavaleiro do Espinho Negro
  vnum: '010102702745'
