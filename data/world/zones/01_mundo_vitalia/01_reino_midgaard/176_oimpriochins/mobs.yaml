  name: um cidadão de Xi'an
  vnum: '010117617604'
- description: Chaoyang está aqui, com alguns fios de palha nas mãos.
  keywords:
  - chaoyang
  long_desc: |-
    Chaoyang é conhecido como o dono do armazém de Xi'an.  Ele possui uma idade
    avançada, apresentando muita fraqueza e simplicidade, mas mesmo assim
    produz produtos de ótima qualidade.  Chaoyang está usando o traje cinza
    claro típico da região, e possui os cabelos e a barba muito branca e longa.
  name: Chaoyang
  vnum: '010117617605'
- description: Tse-Ling o sauda, e aguarda atrás do balcão.
  keywords:
  - tse-ling
  long_desc: |-
    Tse-Ling é uma senhora muito baixa e já muito velha.  Ela usa na cabeça um
    chapéu de palha típico chinês, e veste alguns trajes de seda.  Apesar de
    seu aspecto simples e caseiro, Tse-Ling parece fazer deliciosos alimentos.
  name: Tse-Ling
  vnum: '010117617606'
- description: Guanghua está aqui, sentando em um banquinho, enquanto toma seu chá.
  keywords:
  - guanghua
  long_desc: |-
    Guanhua é um senhor muito admirado em Xi'an.  Mesmo muito velho, e fraco,
    ele produz maravilhosos tecidos de seda, coloridos e de ótima qualidade.
    Ele veste uma de suas peças de seda preta, e usa na cabeça um chapéu de
    palha característico chinês.
  name: Guanghua
  vnum: '010117617607'
- description: O exército de Xi'an está aqui, treinando para a próxima batalha.
  keywords:
  - exercito
  - xi'an
  long_desc: |-
    Este exército é enorme.  Nele você pode ver cavalaria, infantaria,
    arqueiros, entre outros, formando uma verdadeira máquina de guerra.  Todos
    do exército usam o mesmo tipo de traje, sendo uma túnica colorida,
    dependendo a cor em sua função, e uma armadura por cima.  Além de armas,
    eles carregam com benevolência alguns brasões chineses.
  name: o exército de Xi'an
  vnum: '010117617608'
- description: Uma serpente do deserto se esgueira por aqui.
  keywords:
  - serpente
  - deserto
  long_desc: |-
    A serpente do deserto tem um tamanho médio e uma coloração marrom.  Se
    ergueira rapidamente pelas areias do deserto atrás de alimento, que
    normalmente são presas fáceis à ela.
  name: uma serpente do deserto
  vnum: '010117617609'
- description: O Guarda oriental da Grande Muralha está aqui, pronto para defende-la
    a qualquer custo.
  keywords:
  - guarda
  - muralha
  - oriental
  long_desc: |-
    Ele aparenta um aspecto muito forte e valente.  Ele é responsável pela
    guarda do forte oriental da Grande Muralha.  Possuindo longos cabelos
    negros, e uma bela túnica de seda negra, coberto por uma grande armadura,
    este guarda não parece ser um alvo fácil.
  name: o Guarda oriental da Grande Muralha
  vnum: '010117617610'
- description: Um soldado chinês está aqui, protegendo a Grande Muralha.
  keywords:
  - soldado
  - chines
  long_desc: |-
    Ele veste uma armadura simples, e carrega sempre preparado sua arma em
    mãos.  Pronto para defender a muralha, ele faria qualquer coisa para matar
    qualquer invasor que por acaso se aproxime.
  name: um soldado chinês
  vnum: '010117617611'
- description: O Guardião da muralha empunha suas armas assim que percebe sua presença.
  keywords:
  - guardiao
  long_desc: |-
    Apesar do povo chinês ser muito baixo, este guardião é o contrario, sendo
    além de alto, muito forte.  Ele veste os característicos trajes chineses e
    um chapéu de palha pontudo na cabeça.  Em seu corpo você pode ver uma bela
    armadura negra.  E suas mãos você pode ver que ele empunha dois grandes
    bastões de madeira, com uma enorme e afiadíssima lâmina, pronta para
    dilacerar aquele que invadir sua morada.
  name: o Guardião da muralha
  vnum: '010117617612'
- description: O guarda da Grande Muralha está aqui, defendento a entrada.
  keywords:
  - guarda
  - entrada
  long_desc: |-
    Este guarda empunha uma enorme lança, pronto para usa-la contra aqueles
    que tentarem invadir a morada de seu imperador.
  name: o guarda da entrada
  vnum: '010117617613'
- description: O mural começa a se transformar, dando vida aos Nove Dragões chineses.
  keywords:
  - nove
  - dragoes
  - dragao
  long_desc: |-
    Você pode ver os enormes Nove Dragões chineses, sendo três deles laranjas,
    quatro azuis e dois brancos.  Os Nove Dragões são conhecidos pela sua fúria
    com os desconhecidos.  Daqueles que ja tentaram enfrenta-los, nenhum
    sobreviveu até hoje.  Apesar de serem diferentes nas cores, todos
    apresentam o mesmo aspecto físico.  São muito alongados e finos, tendo o
    aspecto de cobra, mas muito maior.  Todos tem enormes garras em cada uma
    das quatro patas, e na boca, afiadissimos dentes, capazes de dilacerar a
    carne com facilidade.
  name: os Nove Dragões
  vnum: '010117617614'
- description: Uma concubina imperial está aqui, assustada com a sua presença.
  keywords:
  - concubina
  long_desc: |-
    Ela é uma das mulheres mais lindas que você já viu.  A concubina possui um
    cabelo muito escuro, e longo até os ombros, e os olhos muito esticados.  A
    sua pele é muito clara como a neve, e ela vesta uma longa e fina túnica
    vermelha de seda.
  name: uma concubina
  vnum: '010117617615'
- description: O guardião dos portões da Cidade Proibida o encara com benevolência.
  keywords:
  - guardiao
  long_desc: |-
    Apesar de não ser um homem muito alto, ele é um dos mais fortes que você já
    viu.  Ele veste uma grossa armadura de couro negra, e um belo chapéu
    triângular na cabeça.  Você também percebe que ele possui os cabelos e
    bigode muito negros e longos.  O guardião está disposto a dar a sua vida
    para proteger a cidade imperial.
  name: o guardião da entrada
  vnum: '010117617616'
- description: Dois grandes leões chineses de bronze protegem a passagem.
  keywords:
  - leao
  - leoes
  long_desc: |-
    A feição destes animais é incrível.  São enormes e fortíssimos leões.  No
    lado direito encontra-se a fêmea, segurando uma grande esfera de bronze com
    a pata direita, e no lado esquerdo o macho, segurando uma esfera de bronze
    semelhante com a pata esquerda.  Ambos se portam mostrando suas enormes
    presas, para amedontrar os intrusos da Cidade Proibida.
  name: os leões de bronze
  vnum: '010117617617'
- description: O guardião da torre oriental sul o olha com desprezo, encarando-o.
  keywords:
  - guardiao
  long_desc: |-
    O guardião da torre é um homem de estatura média, e aparenta ter seus
    trinta anos de idade.  Ele veste uma bela armadura vermelha, e empunha uma
    enorme lança pontiaguda.  Você pode perceber o olhar penetrante do
    guardião, atento a cada movimento seu.
  name: o guardião da torre
  vnum: '010117617618'
- description: O guardião da torre oriental norte o olha com desprezo, encarando-o.
  keywords:
  - guardiao
  long_desc: |-
    O guardião da torre é um homem de estatura média, e aparenta ter seus
    trinta anos de idade.  Ele veste uma bela armadura verde, e empunha uma
    enorme lança.  Você pode perceber o olhar penetrante do guardião, atento
    a cada movimento seu, pronto para ataca-lo.
  name: o guardião da torre
  vnum: '010117617619'
- description: O guardião da torre ociental norte o olha com desprezo, encarando-o.
  keywords:
  - guardiao
  long_desc: |-
    O guardião da torre é um homem de estatura média, e aparenta ter seus
    trinta anos de idade.  Ele veste uma bela armadura amarela, e empunha uma
    enorme lança.  Apesar de muito forte e bem armado, ele aparentar estar
    muito cansado, devido ao intenso trabalho de cuidar da torre.
  name: o guardião da torre
  vnum: '010117617620'
- description: O guardião da torre ociental sul o olha com desprezo, encarando-o.
  keywords:
  - guardiao
  long_desc: |-
    O guardião da torre é um homem de estatura média, e aparenta ter seus
    trinta anos de idade.  Ele veste uma bela armadura branca, e empunha uma
    enorme lança.  Você pode perceber o olhar penetrante do guardião, atento
    a cada movimento seu.
  name: o guardião da torre
  vnum: '010117617621'
- description: Um eunuco está aqui, empunhando uma enorme lança.
  keywords:
  - eunuco
  long_desc: Este enorme eunuco é o guardião das conubinas do imperador chinês.
  name: um eunuco
  vnum: '010117617622'
- description: Um sacerdote budista está aqui, orando profundamente.
  keywords:
  - sacerdote
  - budista
  long_desc: |-
    Você pode ver que ele já é muito velho.  Olhando para o sacerdote, você
    percebe que ele é totalmente careca, e veste-se com alguns panos enrolados
    ao corpo, e uma sandália de couro.
  name: um sacerdote budista
  vnum: '010117617623'
- description: Um sacerdote budista o olha com espanto, tentando se proteger.
  keywords:
  - sacerdote
  - budista
  long_desc: |-
    Você pode ver que ele já é muito velho.  Olhando para o sacerdote, você
    percebe que ele é totalmente careca, e veste-se com alguns panos enrolados
    ao corpo, e uma sandália de couro.
  name: um sacerdote budista
  vnum: '010117617624'
- description: Um guarda imperial empunha as suas armas, pronto para te atacar.
  keywords:
  - guarda
  - imperial
  long_desc: |-
    Olhando para o guarda imperial, você pode ver que ele está usando todo
    um aparato militar.  Ele veste uma grande armadura vermelha, e por
    debaixo, uma grande roupa de seda branca.  Você pode ver que ele possui
    longos cabelos negros, que formando trancinhas; e na cabeça ele usa um
    doa característicos chapéus triangulares chineses.  Assim que o guarda
    percebe a sua presença, você pode ver que ele avança até você, tentando
    proteger com a própria vida o seu imperador.
  name: o guarda imperial
  vnum: '010117617625'
- description: Uma chinesa está aqui, cantarolando alegremente.
  keywords:
  - chinesa
  long_desc: |-
    Esta chinesa está com o rosto todo maquiado de branco e rosa, e os cabelos
    enrolados em na nuca, pronta para a próxima ópera.  Ela veste um longo
    vestido de seda azul, com bordados de flores rosa, e junto ao rosto, ela
    veste uma estranha, mas muito enfeitada, máscara.
  name: uma chinesa
  vnum: '010117617626'
- description: Uma chinesa anda de um lado para o outro, tentando decorar o seu texto.
  keywords:
  - chinesa
  long_desc: |-
    Esta chinesa está com o rosto todo maquiado de branco e rosa, e os cabelos
    enrolados em na nuca, pronta para a próxima ópera.  Ela veste um longo
    vestido de ceda azul, com bordados de flores rosa, e junto ao rosto, ela
    veste uma estranha, mas muito enfeitada, máscara.
  name: uma chinesa
  vnum: '010117617627'
- description: Xiezhi está aqui, descansando sob as sombras das árvores.
  keywords:
  - xiezhi
  long_desc: |-
    Xiezhi é o símbolo da justiça para os chineses.  Ele é um unicórnio
    lendário, tendo a cabeça e as garras de um dragão dragão, e o rabo de
    leão.  Em seu nariz você pode ver uma pequenina argola vermelha.
  name: Xiezhi
  vnum: '010117617628'
- description: O imponente imperador chinês Qing está aqui, sentado em seu trono.
  keywords:
  - imperador
  - qing
  long_desc: |-
    Olhando para o imperador chinês, você pode ver que ele aparenta ter seus
    cinqüenta anos.  O imperador veste po cima do corpo uma enorme túnica de
    seda amarela, com bordados de dragões em dourado.  Na cabeça do imperador
    você pode ver uma enorme e bela coroa.  Você pode ver também que o
    imperador empunha a enorme alabarda imperial chinesa.
  name: Qing, o imperador chinês
  vnum: '010117617629'
- description: Um guarda está aqui, vigiando o local.
  keywords:
  - guarda
  long_desc: |-
    Olhando para o guarda, você pode ver que ele veste uma armadura simples no
    corpo, sobre uma túnica de seda, e empunha pequena espada de ferro.
  name: um guarda chinês
  vnum: '010117617630'
- description: Uma grande ave descansa aqui, com todo o corpo em chamas.
  keywords:
  - fenix
  - ave
  long_desc: |-
    Olhando para a Fênix, você pode vêr que sua plumagem é a combinação de
    cinco cores vivas.  Diz as lendas que a Fênix se sacrifica no fogo, e
    renasce das próprias cinzas, sendo assim uma ave imortal.  A Fênix é a
    representação de todos os elementos da natureza, e dizem os chineses, que
    quando ela aparece, é porque um bom imperador está no poder.
  name: Fênix
  vnum: '010117617631'
- description: Ci Xi, a imperatriz chinesa está aqui, observando a beleza do local.
  keywords:
  - imperatriz
  - ci
  - xi
  long_desc: |-
    Ci Xi é uma mulher muito bela.  Olhando para a imperatriz, você pode ver
    que ela possui longos cabelos negros e uma estatura não muito alta.  Ela
    também veste uma bela túnica chinesa azul, bordada em dourado com vários
    dragões.
  name: Ci Xi, a imperatriz
  vnum: '010117617632'
- description: Um belo dragão de bronze está imóvel aqui, parecendo uma estátua.
  keywords:
  - dragao
  - bronze
  long_desc: |-
    Este dragão possui o corpo muito alongado, e quatro grandes patas; duas
    frontais e duas posteriores.  Em suas patas você pode ver grandes e
    afiadíssimas garras; assim como em sua boca, na qual encontram-se muitos
    dentes afiados.  Uma particularidade deste dragão é que ele possui o corpo
    todo em chamas, e de uma forma estranha, este fogo não parece queima-lo.
  name: o Dragão de bronze
  vnum: '010117617633'
