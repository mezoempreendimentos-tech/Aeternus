    triangular e pontudo, característico dos chineses.  Ao olhar em sua face,
    você observa que ele tem os olhos puxados e uma aparência inocente.
  name: uma cidadã de Xi'an
  vnum: '010117617603'
- description: Um cidadão de Xi'an está aqui, carregando alguns sacos.
  keywords:
  - cidadao
  - xi'an
  long_desc: |-
    Você percebe que ele usa um simples traje cinza claro, e um chapéu de palha
