- description: Um pequeno escorpião passa rapidamente por você.
  keywords:
  - escorpiao
  long_desc: |-
    Este é um típico escorpião amarelado do deserto de Gobi.  Mesmo sendo
    pequeno, seu veneno pode ser letal.
  name: um escorpião
  vnum: '010117617600'
- description: Um grande lagarto o encara ferozmente.
  keywords:
  - lagarto
  long_desc: |-
    Este lagarto possui o corpo todo coberto escamas verdes e muito rígidas.
    Ao observar sua presença, ele abre sua boca mostrando suas enormes presas.
  name: um lagarto
  vnum: '010117617601'
- description: Um cidadão de Xi'an está aqui, o observando estanhamente.
  keywords:
  - cidadao
  - xi'an
  long_desc: |-
    Você percebe que ele usa um simples traje cinza claro, e um chapéu de palha
    triangular e pontudo, característico dos chineses.  Ao olhar em sua face,
    você observa que ele tem os olhos puxados, e uma longa barba e bigodes
    negros.
  name: um cidadão de Xi'an
  vnum: '010117617602'
- description: Uma cidadã de Xi'an está aqui, apressada com seus afazeres.
  keywords:
  - cidada
  - xi'an
  long_desc: |-
