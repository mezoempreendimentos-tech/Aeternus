- description: Peter, o Capitão da Guarda Real, anda por aí inspecionando.
  keywords:
  - peter
  - capitao
  - guarda
  - real
  long_desc: |-
    Como todos os membros da Guarda, Peter veste uma armadura de correntes
    exigida deles como um uniforme. Mesmo que todos os outros guardas
    pareçam muito bem treinados, você se dá conta que nenhum deles teria
    alguma chance contra este homem numa luta. Ele mede, pelo menos, 2
    metros e mesmo assim se move com uma graça felina. Ele, atualmente, irradia
    força e confiança, e você luta contra uma súbita pressão para
    voltar a si ao ver ele.
  name: Peter, o Capitão da Guarda Real
  vnum: '010115015012'
