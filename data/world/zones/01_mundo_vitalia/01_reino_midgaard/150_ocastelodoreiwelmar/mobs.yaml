  vnum: '010115015014'
- description: Atirado em um canto você enxerga Ergan, vulgo o Assassino de Townsbridge.
  keywords:
  - ergan
  - assassino
  long_desc: |-
    Você recorda da época, há uma década atrás, quando as notícias do dia
    eram como este homem havia trucidado a população inteira da pequena
    vila de Townsbridge. Ele foi preso e aqui está ele - uma sombra do
    indiscutível grande guerreiro que ele uma vez fora, mas ainda considerado
    como se o fosse.
