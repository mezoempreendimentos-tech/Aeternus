- description: A recepcionista está aqui, sentada, disposta a lhe dar uma informação.
  keywords:
  - recepcionista
  - mulher
  long_desc: |-
    A recepcionista é uma bela mulher, ostentando longos cabelos negros e uma
    face sem defeitos.  Ela está sentada em frente ao balcão, pronta para dar
    uma informação.
  name: a recepcionista
  vnum: '010122022020'
- description: O vendedor de jornais está aqui, carregando um fardo de jornais.
  keywords:
  - vendedor
  - jornaleiro
  - garoto
  long_desc: |-
    O vendedor de jornais é um garoto gordinho e baixo, que sua muito.  Em seu
    pescoço, está pendurada uma placa, que diz "Jornal de Vitália,
    Imparcialidade e Preço Baixo".  Quando ele o vê, corre em sua direção,
    oferecendo o jornal.  Ele carrega um fardo de jornais embaixo do braço.
  name: o vendedor de jornais
  vnum: '010122022021'
- description: O mensageiro está aqui, levando notícias para a redação.
  keywords:
  - mensageiro
  - garoto
  long_desc: |-
    O mensageiro é um garoto magro e mirrado, vestindo roupas vermelhas.  Ele
    carrega um saco cheio de papéis, parecendo ser muito pesado, mas sem se
    preocupar.
  name: o mensageiro
  vnum: '010122022022'
- description: Um homem está aqui, operando a máquina, com os ouvidos tampados.
  keywords:
  - operador
  long_desc: |-
    O operador da máquina é um homem com um longo bigode branco e um par de
    óculos, aparentando ser muito simpático.  Ele faz seu trabalho com
    determinação, abaixando e levantando manivelas, girando roletes e trocando
    letras da prensa.  Ele usa uma tiara protegendo seus ouvidos do barulho.  É
    melhor não atrapalhá-lo em seu serviço.
  name: o operador da máquina
  vnum: '010122022023'
- description: Honireves, um ser envolto em Luz, sorri para você e lhe oferece uma
    mensagem.
  keywords:
  - Honireves
  - ser
  - amigo
  - luz
  - iluminado
  long_desc: |-
    Honireves é um ser iluminado, que emana paz e amor e acima de tudo, consegue
    lhe transmitir a certeza de que você é alguém muito especial e que todas as
    criaturas são por ele amadas de forma incondicional.  Ele estende suas mãos
    em sua direção e lhe oferece uma das suas maravilhosas mensagens.  Leia com
    atenção.
  name: Honireves, um amigo iluminado
  vnum: '010122022030'
