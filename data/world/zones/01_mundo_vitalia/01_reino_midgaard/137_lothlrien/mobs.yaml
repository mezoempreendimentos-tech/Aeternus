- description: Nimrodel, a donzela élfica está aqui, procurando Amroth.
  keywords:
  - Nimrodel
  - elfa
  - donzela
  long_desc: |-
    Você observa uma linda donzela élfica de uma beleza magnífica.  Nimrodel
    expressa claramente em seu rosto um sentimento de angústia.  A celestial
    elfa se perdeu do seu povo, quando os anões acordaram um terrível mal nas
    montanhas.
  name: Nimrodel
  vnum: '010113713700'
- description: Amroth, o amado elfo de Nimrodel está aqui, procurando Nimrodel.
  keywords:
  - Amroth
  - elfo
  long_desc: |-
    Você observa um alto e impávido elfo, seu nome é Amroth e seu coração está a
    procura da sua metade:  A linda e celestial Nimrodel.  Você observa uma
    triste expressão de angústia estampada no rosto dele.
  name: Amroth
  vnum: '010113713701'
- description: Haldir de Lórien, um dos guardiões de Lórien está aqui.
  keywords:
  - Haldir
  - elfo
  long_desc: |-
    Você observa o belo Haldir de Lórien.  Alto, forte e de cabelos prateados,
    Haldir de Lórien possui um olhar encantador e demonstra a força e coragem do
    seu povo nos seus olhos.  Haldir de Lórien é irmão dos belos elfos Orophin e
    Rúmil de Lórien.
  name: Haldir de Lórien
  vnum: '010113713702'
- description: Rúmil de Lórien, um dos guardiões de Lórien está aqui.
  keywords:
  - Rumil
  - elfo
  long_desc: |-
    Você observa um magnífico elfo de cabelos prateados e pele alva.  Rúmil de
    Lórien é um dos guardiões da floresta dourada de Lothlórien e dos Galadhrim.
    Rúmil é irmão de Haldir e Orophin de Lórien.
  name: Rúmil de Lórien
  vnum: '010113713703'
- description: Orophin de Lórien, um dos guardiões de Lórien está aqui.
  keywords:
  - Orophin
  - elfo
  long_desc: |-
    Você observa um jovem e belíssimo elfo de Lothlórien.  Orophin de Lórien é
    um dos guardiões da floresta dourada de Lothlórien e dos Galadhrim.  Orophin
    é irmão de Haldir e Rúmil de Lórien.
  name: Orophin de Lórien
  vnum: '010113713704'
- description: Galadriel, a senhora de Lórien está aqui, emitindo paz para todo o
    seu povo.
  keywords:
  - Galadriel
  - elfa
  - senhora
  long_desc: |-
    Você observa a Filha de Finarfin, Galadriel é a mais bela elfa de todos da
    casa de Finwë.  Seu cabelo possuem reflexos de ouro como se tivesse captado
    numa rede o esplendor de Laurelin.  É a mais alta e valente, com uma bondade
    e sabedoria que poucos possuem.  Nasceu nas Terras Imortais de Valinor.  A
    celestial senhora de Lothlórien está vestida com trajes completamente
    brancos.  Galadriel possui um enorme poder e vive pacificamente ao lado do
    seu povo, os Galadhrim.
  name: Galadriel
  vnum: '010113713705'
- description: Celeborn, o senhor de Lórien está aqui, observando o brilho de Lórien.
  keywords:
  - Celeborn
  - elfo
  - senhor
  long_desc: |-
    Você observa o celestial senhor de Lórien.  Belo, alto e com uma postura
    imponente.  Celeborn possui lindos cabelos prateados e longos, e veste
    trajes completamente brancos.  O Senhor de Lothlórien vive ao lado da bela
    Galadriel na maravilhosa cidade de Caras Galadhon.
  name: Celeborn
  vnum: '010113713706'
- description: Um belo elfo de Lórien está aqui, olhando para você alegremente.
  keywords:
  - elfo
  long_desc: |-
    Você observa um belo elfo de cabelos prateados e de uma postura imponente.
    Os Galadhrim vivem na gloriosa Caras Galadhon e cultivam a paz e a harmonia
    entre os povos.
  name: um elfo de Lórien
  vnum: '010113713707'
- description: Uma bela elfa de Lórien está aqui, sorrindo para você.
  keywords:
  - elfa
  long_desc: |-
    Você observa uma majestosa elfa de Lórien de belos cabelos dourados bastante
    longos e olhos encantadores.  Os Galadhrim vivem na gloriosa Caras Galadhon
    e cultivam a paz e a harmonia entre os povos.
  name: uma elfa de Lórien
  vnum: '010113713708'
- description: Uma linda criança elfa está aqui, brincando no seu imaginário mundo.
  keywords:
  - crianca
  - elfa
  long_desc: |-
    Você observa uma bela criança elfa de cabelos prateados e olhos
    encantadores.  Ao chegar mais próximo dela, você a observa brincando em
    seu mundo mágico e imaginário.
  name: uma linda criança elfa
  vnum: '010113713709'
- description: Um lindo pássaro prateado está aqui, cantando sem parar belas melodias.
  keywords:
  - passaro
  - prateado
  long_desc: |-
    Você observa um maravilhoso pássaro de penas prateadas que emitem um brilho
    intenso e magnífico.
  name: um lindo pássaro prateado
  vnum: '010113713710'
- description: Um belo esquilo dourado está aqui, saltando sobre troncos de mallorns.
  keywords:
  - esquilo
  - dourado
  long_desc: |-
    Você observa um lindo e brincalhão esquilo dourado que vive nas florestas
    douradas de Lothlórien.
  name: um belo esquilo dourado
  vnum: '010113713711'
