- description: Um gigante guerreiro está aqui, protegendo este local.
  keywords:
  - guarda
  - guardiao
  - gigante
  - guerreiro
  long_desc: |-
    Apesar da aparência austera e sombria, ele está imensamente feliz
    pois recebeu a maior honra de todas: Proteger os Portões de Valhala!
  name: O Guardião dos Portais
  vnum: '010122222200'
- description: |-
    Robin Hood está aqui, com um sorriso aberto nos lábios, feliz por saber
    que você pode finalmente compreender seus motivos.
  keywords:
  - robin
  - hood
  - principe
  - ladroes
  - ladrao
  long_desc: |-
    Ele é jovem, não deve passar dos 25 anos.  Antes, ele foi Robin de LocksLei,
    um nobre possuidor de terras.  Mas o destino lhe reservou outra coisa...  A
    morte de seu pai, o confisco de suas terras, sua fuga e a oportunidade de se
    tornar um herói!  Ele é agora Robin Hood, O Príncipe dos Ladrões.
  name: Robin Hood, o Príncipe dos Ladrões
  vnum: '010122222201'
- description: O gigante Hans Tadden está aqui, estendendo os braços em sua direção.
  keywords:
  - hans
  - tadden
  long_desc: |-
    Ele está com uma barba enorme...  Pelo visto, há anos ele não se barbeia e
    pelo jeito, há muito tempo ele não sabe o que é tomar um bom banho.  Mas o
    importante não é o seu cheiro ou sua aparência.  O que importa de fato são
    os seus atos, suas atitudes como homem.  E nisto, ele é rei.  Lembre-se:
    você está diante do maior de todos os exploradores.
  name: Hans Tadden
  vnum: '010122222202'
- description: A Essência do Rei Arthur está aqui, pronto para ensinar-lhe suas lições.
  keywords:
  - essencia
  - arthur
  - rei
  long_desc: |-
    Você está diante da essência daquele que foi o maior de todos os Reis.
    Lembre-se que é preciso muita honra e muita dignidade para poder compreender
    sua mensagem e que ele, o maior de todos, escolheu uma cabana simples, para
    ensiná-lo.
  name: a Essência do Rei Arthur
  vnum: '010122222203'
- description: |-
    Jasão, o Grande Líder dos 50 Argonautas está aqui, feliz por poder lhe
    encontrar.
  keywords:
  - jasao
  - argonautas
  long_desc: |-
    O grande Jasão e seus Argonautas: cinqüenta heróis gregos dotados de dons
    especiais.  Partiram para Cólquida, onde buscaram o poderoso Velocino de
    Ouro.
  name: Jasão, o Líder dos 50 Argonautas
  vnum: '010122222204'
