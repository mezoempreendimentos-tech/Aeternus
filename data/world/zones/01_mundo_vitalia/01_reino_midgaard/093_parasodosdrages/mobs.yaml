- description: O Ancião Dragão Dourado está aqui, com seu coração justo e bondoso.
  keywords:
  - dragao
  - anciao
  - dourado
  long_desc: |-
    O Dragão Dourado é enorme, de aparência justa e benevolente.  Suas escamas
    são de majesto dourado, reluzentindo como se tendo luz própria.  Os dois
    chifres, maiores que um homem adulto, lhe dão um ar de altivez realmente
    digno de um ser divino e supremo em sua raça.
  name: o Ancião Dragão Dourado
  vnum: '010109309300'
- description: O Ancião Dragão Prateado está aqui, procurando alguém em perigo.
  keywords:
  - dragao
  - anciao
  - prateado
  long_desc: |-
    O Dragão Prateado possui uma aparência magnífica.  Suas escamas prateadas
    brilham como se espalhassem bondade e fraternidade para todos os lados.
    Cinco chifres formam uma imponente coroa prateada em torno de sua cabeça.
  name: o Ancião Dragão Prateado
  vnum: '010109309301'
- description: O Ancião Dragão de Bronze está aqui, esperando uma nova aventura.
  keywords:
  - dragao
  - anciao
  - bronze
  long_desc: |-
    O Dragão de Bronze é alegre e curioso, adora participar de aventuras, e de
    discutir e explanar suas opiniões com o grupo de aventura.  Suas escamas de
    bronze são de uma beleza esplendorosa e hipnótica.  Os três chifres e suas
    afiadas garras podem retalhar rapidamente qualquer infeliz ser que lhe
    ataque.
  name: o Ancião Dragão de Bronze
  vnum: '010109309302'
- description: Tiamat, a dragão de cincos cabeças está aqui, olhando fixamente para
    você.
  keywords:
  - dragao
  - tiamat
  long_desc: |-
    Tiamat possui cinco cabeças, sendo a central vermelha e a única que fala.
    É necessária muita cautela, pois cada cabeça lança um ataque diferente e
    Mortal.  Da direita para esquerda você observa aterrorizado as cabeças do
    Poderoso Tiamat: a primeira é negra e espirra uma rajada de ácido; em
    seguida você observa a azul que lança raios; a terceira é a cabeça central,
    vermelha, que possui uma mortal baforada de fogo; à esquerda da central está
    a verde, cujo ataque é um mortal gás venenoso; já a última cabeça, branca,
    ataca usando uma poderosa rajada de gelo.  Tiamat possui dentro de si todas
    as chagas e males do mundo.  É perversa e cruel.
  name: Tiamat
  vnum: '010109309303'
- description: O Ancião Dragão Branco está aqui, pronto para congelar sua próxima
    vítima.
  keywords:
  - dragao
  - anciao
  - branco
  long_desc: |-
    O Dragão Branco é da cor da neve.  Seu corpo totalmente coberto por escamas
    brancas é facilmente camuflado em seu habitat natural. Um porém é que ele se torna facilmente
    visível fora dos lugares congelados.  Suas asas possuem uma beleza magnífica
    quando abertas, parecendo feitas de puríssima madrepérola.  O Ancião Branco possui apenas um chifre, bem no meio da sua
    cabeça.  Ele também é dono de uma rajada congelante de gelo.
  name: o Ancião Dragão Branco
  vnum: '010109309304'
- description: O Ancião Dragão Azul está aqui, vigiando seu território.
  keywords:
  - dragao
  - anciao
  - azul
  long_desc: |-
    O Ancião Dragão Azul possui escamas da cor do céu vitaliano, que magicamente
    mudam de tonalidade de acordo com as condições da abóboda celeste.  Seus
    olhos são de um intenso vermelho, como sangue.  Possuindo dois chifres em
    sua cabeça, geralmente é confundido com o próprio céu ao sobrevoar o deserto
    do paraíso dos dragões de Vitália ou áreas áridas.
  name: o Ancião Dragão Azul
  vnum: '010109309305'
- description: O Ancião Dragão Verde está aqui, mal-humorado como sempre.
  keywords:
  - dragao
  - anciao
  - verde
  long_desc: |-
    O Ancião Dragão Verde possui escamas predominantemente verdes.  Possui ainda
    escamas amareladas, mas apenas na parte frontal do corpo (no pescoço e na
    barriga), além da cauda.  Sua cabeça ostenta dois chifres e sua mandíbula
    superior possui duas grandes presas, o que faz os seus inimigos tremerem.  O
    Ancião Verde é capaz de arriscar a própria vida pelos seus filhotes.
  name: o Ancião Dragão Verde
  vnum: '010109309306'
- description: O Ancião Dragão Negro está aqui, sombrio como a morte.
  keywords:
  - dragao
  - anciao
  - negro
  long_desc: |-
    O Ancião Dragão Negro é um dos seres mais perversos de Vitália.  Seu corpo é
    coberto quase que predominatemente por escamas negras, tendo apenas na parte
    frontal do seu corpo, no pescoço, na barriga e na cauda, escamas cinzas.
    Suas asas negras e seus três chifres compõem uma das figuras mais
    aterrorizantes de Vitália.
  name: o Ancião Dragão Negro
  vnum: '010109309307'
- description: O Ancião Dragão Vermelho está aqui, procurando novos tesouros.
  keywords:
  - dragao
  - anciao
  - vermelho
  long_desc: |-
    O Ancião Dragão Vermelho possui escamas belíssimas, da cor de sangue.  Ele
    possui dois chifres enormes ao lado dos olhos e uma cauda com três espigões
    brancos que podem derrubar qualquer gigante.  Extremamente ganancioso, ele
    sempre menospreza seus inimigos.
  name: o Ancião Dragão Vermelho
  vnum: '010109309308'
- description: O Ancião Dragão Amarelo está aqui, preparando uma nova armadilha.
  keywords:
  - dragao
  - anciao
  - amarelo
  long_desc: |-
    O Ancião Dragão Amarelo é uma das criaturas mais belas e magníficas do
    paraíso dos dragões de Vitália.  Possui escamas em tons de amarelo-gualdo,
    sendo que os dois chifres que possui na cabeça são os maiores chifres
    encontrados em todos os dragões.  Suas potentes garras podem chegar a um
    metro e meio de comprimento.
  name: o Ancião Dragão Amarelo
  vnum: '010109309309'
- description: O Dracolich Ancião está aqui, esperando a próxima alma para ser julgada.
  keywords:
  - anciao
  - dracolich
  long_desc: |-
    O Dracolich ancião é uma das criaturas mais aterrorizantes do paraíso dos
    dragões de Vitália.  Ele é um dragão morto-vivo, que possui todos os poderes
    do dragão quando estava vivo, porém muito mais fortes e mortais.  O Ancião,
    por ser dragão mais velho desta espécie, não possui mais a carne e os órgãos
    do corpo que ele incorporou, pois sua magia de preservação não conseguiu
    manter nada além dos ossos.  Sua imensa figura é basicamente um grande
    esqueleto com sinistros olhos formados por apenas pontos de luz.  Ele
    aparenta possuir bem mais que mil anos.
  name: o dracolich ancião
  vnum: '010109309310'
- description: O Dragão Fantasma está aqui, escondido do juiz das almas.
  keywords:
  - dragao
  - fantasma
  long_desc: |-
    O Dragão fantasma é uma criatura horripilante, aterrorizante, medonha.
    Você, quando consegue olhar diretamente para ele, observa uma alma presa
    dentro do seu corpo fantasmagórico.  O Dragão fantasma vive no paraíso dos
    dragões de Vitália, escondido do dracolich ancião, o juiz das almas dos
    dragões.
  name: o dragão fantasma
  vnum: '010109309311'
- description: A Dragoneza Fada Rainha está aqui, lançando rajadas coloridas de alegria.
  keywords:
  - dragoneza
  - fada
  - rainha
  long_desc: |-
    A Rainha dos dragões fadas possui uma alegria contagiante.  Suas belas asas
    produzem um brilho magnífico ao serem abertas.  A Rainha fada é pequenina,
    porém bastante bondosa e pacífica e não poupará esforços para ajudar um
    amigo em perigo.
  name: a dragoneza fada rainha
  vnum: '010109309312'
- description: Um Dragão Fada, guarda-real, está aqui protegendo todos os seus irmãos.
  keywords:
  - dragao
  - fada
  - guarda
  - real
  long_desc: |-
    O Guarda-real possui a missão de proteger todos os seus irmãos e as pessoas
    que precisam de ajuda.  Ele possui asas verdes e escamas azuis.  Como todo
    dragão fada, ele é alegre e adora uma piada, principalmente quando a piada é
    sobre os visitantes.
  name: um dragão fada guarda-real
  vnum: '010109309313'
- description: Um Dragão fada está aqui, lançando rajadas coloridas em sua direção.
  keywords:
  - dragao
  - fada
  long_desc: |-
    O Dragão fada possui escamas coloridas e asas azuis.  Ele adora pregar peças
    e contar piadas, principalmente com os visitantes.  O Dragão fada é muito
    pacífico e alegre. E está sempre disposto a ajudar os necessitados.
  name: um dragão fada
  vnum: '010109309314'
- description: Uma Dragoneza fada está aqui, fazendo piadas sobre você e rindo da
    sua cara.
  keywords:
  - dragoneza
  - fada
  long_desc: |-
    A Dragoneza fada possui escamas coloridas e asas cor de rosa.  Ela adora
    pregar peças e contar piadas, principalmente com os visitantes.  A Dragoneza
    fada é muito pacífica e alegre e está sempre disposta a ajudar os necessitados.
  name: uma dragoneza fada
  vnum: '010109309315'
- description: O Guardião da Harmonia está aqui, protegendo o paraíso dos dragões.
  keywords:
  - guardiao
  - harmonia
  long_desc: |-
    O Guardião é alto, forte e imponente.  É possível observar uma fonte de luz
    azul emanando do seu peito.  Sua missão consiste em proteger o paraíso dos
    dragões de Vitália de todos os males, se for preciso com sua própria vida.
  name: o guardião da harmonia
  vnum: '010109309316'
- description: O Guardião da Paz está aqui, protegendo o paraíso dos dragões.
  keywords:
  - guardiao
  - paz
  long_desc: |-
    O Guardião é alto, forte e imponente.  É possível observar uma fonte de luz
    branca emanando do seu peito.  Sua missão consiste em proteger o paraíso dos
    dragões de Vitália de todos os males, se for preciso com sua própria vida.
  name: o guardião da paz
  vnum: '010109309317'
- description: O Senhor do Tempo está aqui, escrevendo o passado, o presente e o futuro.
  keywords:
  - tempo
  long_desc: |-
    Ele é um homem velho que carrega as marcas de sua existência pelo seu corpo.
    Pouco se sabe para falar dele.  Apenas que veste seu lendário manto azul.
  name: o tempo
  vnum: '010109309318'
- description: Um Duende está aqui, preparando a próxima travessura.
  keywords:
  - duende
  long_desc: |-
    O Duende é uma criatura pequenina, com as bochechas gordinhas e rosadas e
    que adora fazer travessuras.  Ele costuma conviver junto com dragões-fadas e
    fadas.  Seu olhar é irônico e misterioso.  Veste roupas de couro feitas por
    ele mesmo e pintadas com vários tons de tinta.
  name: um duende
  vnum: '010109309319'
- description: Uma Duende está aqui, preparando a próxima travessura.
  keywords:
  - duende
  long_desc: |-
    A Duende é uma criatura pequenina, com as bochechas gordinhas e rosadas e
    que adora fazer travessuras.  Ela costuma conviver junto com dragões-fadas e
    fadas.  Seu olhar é irônico e misterioso.  Veste roupas de couro feitas por
    ela mesma e pintadas com vários tons de tinta.
  name: uma duende
  vnum: '010109309320'
- description: Uma Fada está aqui, emanando alegria e felicidade para todos os lados.
  keywords:
  - fada
  long_desc: |-
    A Fada possui dois pares de asas coloridas e um pequenino corpo de humano.
    Ela é muito simpática e alegre, adora brincar com visitantes e possui o
    poder de prever acontecimentos.  Ela está usando um lindo vestido feito de
    pétalas de flores colhidas no paraíso.
  name: uma fada
  vnum: '010109309322'
- description: Um Filhote de dragão verde está aqui, esperando a mãe chegar com a
    comida.
  keywords:
  - filhote
  - dragao
  - verde
  long_desc: |-
    O Filhote desde cedo possui a agressividade da mãe, porém não consegue usar
    suas mandíbulas de forma mortal.  Ele possui escamas num tom de verde muito
    claro, seus dois chifres ainda não se desenvolveram e sua fome é
    assustadora.
  name: um filhote de dragão verde
  vnum: '010109309323'
- description: Uma Aranha-de-fogo está aqui, com seu corpo coberto de chamas.
  keywords:
  - aranha
  - fogo
  long_desc: |-
    A Aranha-de-fogo é uma estranha criatura, que vive numa das cavernas do
    paraíso dos dragões de Vitália.  Alguns dizem que um mago vitaliano, em uma
    de suas experiências acabou criando num acidente estas incríveis criaturas.
    O Corpo da aranha-de-fogo não é atingido pelas chamas e elas odeiam água.
    A Aranha-de-fogo é do mesmo tamanho de um cão-de-guarda.
  name: uma aranha-de-fogo
  vnum: '010109309324'
- description: Um Dromedário está aqui, procurando por um oásis.
  keywords:
  - dromedario
  long_desc: |-
    O Dromedário é uma espécie de camelo, que possui um pescoço curto e uma
    corcova.  Vive perambulando no deserto dos dragões de Vitália à procura de
    água e fugindo do ataque dos dragões do deserto.
  name: um dromedário
  vnum: '010109309325'
- description: Uma Serpente negra do pântano está aqui, com as presas cheias de veneno.
  keywords:
  - serpente
  - negra
  long_desc: |-
    A Serpente negra possui escamas escuras como o sombrio pântano, seus olhos
    brilham como dois pontos de luz verde e suas presas enormes ficam expostas
    como se para mostrar seu veneno mortal.  De uns seis metros de comprimento,
    ela seria capaz de sufocar um gigante com sua esmagadora enroscada.
  name: a serpente negra
  vnum: '010109309326'
- description: Uma Aparição do pântano está aqui, olhando o dono do seu próximo corpo.
  keywords:
  - aparicao
  long_desc: |-
    A Aparição do pântano é uma das criaturas mais assustadoras do paraíso, já
    que poucos são aqueles que conseguem escapar dela e de seu olhar negro.  Ela
    aparece e desaparece misteriosamente, sendo que até hoje ninguém sabe muita
    coisa a seu respeito.
  name: a aparição do pântano
  vnum: '010109309327'
- description: Um Cardume de peixes está aqui, nadando com toda sua beleza nas águas.
  keywords:
  - cardume
  - peixes
  long_desc: |-
    O Cardume de peixes é bastante colorido, contendo peixes de todas as cores,
    formas e tamanhos.  Você consegue contar mais ou menos uns 50 peixes neste cardume
    magnífico.
  name: um cardume de peixes
  vnum: '010109309328'
- description: O Mensageiro da paz está aqui, sereno e puro como uma criança.
  keywords:
  - mensageiro
  - paz
  long_desc: |-
    O Mensageiro da paz na verdade é um enorme pássaro com penas brancas, bico
    dourado e possuidor da força de um titã.  Sua missão é a de levar uma
    mensagem de paz para todos os povos de Vitália.  Raramente ele é visto, pois
    normalmente ele utiliza outras formas físicas, como a de humano, assumindo
    principalmente a identidade de uma crianças na sua função de semear a paz.
    O Mensageiro da paz é uma criatura divina e será sempre querida e amada por
    todos os Deuses e habitantes mortais ou imortais de Vitália.
  name: o mensageiro da paz
  vnum: '010109309329'
