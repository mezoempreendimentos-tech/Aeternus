  keywords:
  - mumia
  - rabscuttle
  long_desc: Só bandagens, sem personalidade.
  name: a Mumia de Rabscuttle
  vnum: '010100900902'
- description: Um lagarto gigante está aqui.
  keywords:
  - lagarto
  - gigante
  long_desc: |-
    Esta escamosa criatura parece bem adaptada ao seu habitat subterrâneo.
