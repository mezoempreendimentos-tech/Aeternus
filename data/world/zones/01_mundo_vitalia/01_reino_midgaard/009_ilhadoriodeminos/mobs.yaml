  keywords:
  - minos
  - rei
  - minotauro
  long_desc: Ele cheira muito ruim.
  name: Rei Minos o Minotauro
  vnum: '010100900907'
- description: Uma grande tartaruga dragão emerge movendo a água em ondas altas.
