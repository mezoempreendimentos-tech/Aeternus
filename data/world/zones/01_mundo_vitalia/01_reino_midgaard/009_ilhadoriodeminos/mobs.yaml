- description: O homba esvoaça em sua volta.
  keywords:
  - homba
  long_desc: |-
    Parte falcão, parte urso, parte lobo. Parte a parte, e faz-se um horrível
    total.
  name: o homba
  vnum: '010100900900'
- description: O maior espadachim do mundo está na sua frente, zombando da sua cara.
