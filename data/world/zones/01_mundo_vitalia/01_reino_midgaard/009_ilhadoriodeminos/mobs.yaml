  name: General Woundwort
  vnum: '010100900904'
- description: Franz, capanga de Minos, está aqui para malhar você.
  keywords:
  - franz
  - capanga
  long_desc: |-
    Franz não é frutinha.  Ele é muito musculoso e parece como se pudesse
    espremer sua cabeça como uma uva.
  name: Franz o Capanga
  vnum: '010100900905'
- description: Hanz está aqui flexionando seus musculos e espremendo uvas.
  keywords:
  - hanz
  - capanga
  long_desc: |-
    Hanz não é frutinha.  Ele é muito musculoso e parece como se pudesse levantar
    um dragão.
  name: Hanz o Capanga
  vnum: '010100900906'
- description: Rei Minos, o Minotauro, está aqui, esperando para lhe fazer sangrar
