- description: Um grande leão sujo e medonho está aqui!
  keywords:
  - leão
  long_desc: |-
    Veja so os dentes, parece que ele poderia acabar com você em poucos segundos!
    Tomara que ele não esteja com fome!
  name: um leão realmente forte
  vnum: '010110310300'
- description: Um guarda está aqui, vigiando o portão.
  keywords:
  - guarda
  - nativo
  long_desc: |-
    Vestido com pele de animais, e cheirando como se ele não tomasse banho em um
    mês, você pode ver que ele não é nada civilizado!
  name: um guarda
  vnum: '010110310301'
- description: Um canibal está aqui, parecendo faminto!
  keywords:
  - canibal
  long_desc: |-
    Parece um pouco com os guardas que estavam no portão, com uma diferença.
    Este aqui tem pedaços de carne e sangue por todo o corpo. Adivinhe, de onde será?
  name: um canibal
  vnum: '010110310302'
- description: Um canibal feliz está aqui.
  keywords:
  - canibal
  long_desc: |-
    Este canibal está realmente feliz porque ele conseguiu o ultimo pedaço de
    uma pobre garotinha que acidentalmente encontrou esse lugar!
  name: um canibal feliz
  vnum: '010110310303'
- description: A próxima refeição aguarda no chão.
  keywords:
  - mulher
  long_desc: |-
    Parece que ela está aqui há dias só esperando para ser devorada! Você
    poderia acabar com o sofrimento dela!
  name: uma mulher
  vnum: '010110310304'
- description: Uma mulher canibal olha pra você e lambe os beiços!
  keywords:
  - mulher
  - canibal
  long_desc: |-
    Eca! Você pode ver pequenos insetos voando ao redor do seu corpo. Ela
    consegue ter a aparência ainda pior que os homens canibais, e isso é
    algo sério!
  name: uma mulher canibal
  vnum: '010110310305'
- description: O chefe canibal parece bastante irritado com a sua invasão!
  keywords:
  - chefe
  - canibal
  long_desc: |-
    Este cara parece ser da pesada! Talvez você tenha entrado no meio de uma
    refeição. Tomara que você não vire o próximo prato!
  name: o chefe canibal
  vnum: '010110310306'
- description: Uma enorme cobra rasteja por aqui!
  keywords:
  - cobra
  long_desc: Esta cobra parece ser perigosa, sem dúvida. Veja só as presas!
  name: uma cobra
  vnum: '010110310307'
- description: Um pequeno macaco mal educado gesticula para você!
  keywords:
  - macaco
  - pequeno
  long_desc: Esse macaquinho é muito mal educado!
  name: um pequeno macaco
  vnum: '010110310308'
- description: Um grande primata está aqui.
  keywords:
  - primata
  long_desc: Peludo, mal cheiroso, e desagradável. Que tal deixá-lo sozinho?
  name: um grande primata
  vnum: '010110310309'
- description: Uma primata fêmea está aqui saltitando, selvagem!
  keywords:
  - primata
  - fêmea
  long_desc: Ela é bem parecida com os outros primatas. Cheira mal, horrível.
