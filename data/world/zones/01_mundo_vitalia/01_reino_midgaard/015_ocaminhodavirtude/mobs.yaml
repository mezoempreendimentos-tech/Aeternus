- description: Você resiste ao desejo de desviar seus olhos da visão de um verdadeiro
    Deus.
  keywords:
  - alá
  - ala
  - deus
  - criador
  long_desc: |-
    A visão para cada homem é diferente, um espelho da verdadeira natureza de
    cada corpo e alma.  A princípio, um homem velho orgulhoso e amargo, em
    seguida sua mão gentil se faz extendida e um sorriso e jardins...muitos
    jardins.
  name: Alá O Criador
  vnum: '010101501500'
- description: O arcanjo Miguel se vira e começa a observar você.
  keywords:
  - miguel
  - anjo
  - arcanjo
  long_desc: |-
    A princípio, você não vê nada além de um brilho luminoso e reconfortante e
    então a imagem se firma subtamente, e você vê um rosto, olhos, mãos...mas
    isto também vai se esvanecendo e você não vê mais nada...
  name: Miguel
  vnum: '010101501501'
- description: O arcanjo Gabriel sorri e começa a lhe dizer algo.
  keywords:
  - gabriel
  - anjo
  - arcanjo
  long_desc: |-
    Conhecido como o Mensageiro, é este o anjo que tem transmitido a Divina
    Palavra para os profetas escolhidos.  Em troca, trouxe o Selo dos Profetas
    de uma miraculosa jornada para a sagrada cidade de Jerusalém.
  name: Gabriel
  vnum: '010101501502'
- description: O arcanjo Rafael o observa com expressão séria, em desaprovação.
  keywords:
  - rafael
  - anjo
  - arcanjo
  long_desc: |-
    É impossível ter uma visão tangível do arcanjo.  Ele não é nada que seja
    humano e com um mero sussurro, ele dispersa cada imagem que você tenta criar
    em sua mente.
  name: Rafael
  vnum: '010101501503'
- description: Uriel, o anjo da escuridão, está aqui guardando o caminho adiante.
  keywords:
  - uriel
  - anjo
  - arcanjo
  long_desc: |-
    Depois da queda do portador da luz, o Senhor precisou do serviço de outrem,
    e foi esse anjo, Uriel, que subiu os degraus mais altos.
  name: Uriel
  vnum: '010101501504'
- description: O querubim da espada flamejante olha para você e começa a rir.
  keywords:
  - querubim
  long_desc: |-
    O monstro a sua frente não parece nada mais do que um bebê ou uma jovem
    criança, embrulhada em um brilhante pano branco, mas assim que você tenta
    seguir adiante, a besta primeiro sorri maldosamente, depois solta uma
    estridente gargalhada, puxa sua espada e bloqueia o caminho.
  name: o querubim
  vnum: '010101501505'
- description: Um louco, bêbado zombeteiro está sentado aqui, perdido em seu profundo
    estorpor.
  keywords:
  - zombeteiro
  long_desc: |-
    Ele está vagamente atento a seu olhar.  Rindo suavemente, você o ouve
    murmurar alguma coisa meio obscura: dragões, o templo, a queda do grandioso
    império.  Ele ri de você e toma outro aperitivo.
  name: o zombeteiro
  vnum: '010101501506'
- description: Um gênio dança no ar diante de seus olhos, escarnecendo de você.
  keywords:
  - gênio
  - duende
  - genio
  long_desc: |-
    Você ouviu lendas sobre estas criaturas, pequenos demônios maldosos, que
    poderiam ser aprisionados em garrafas e lâmpadas, capazes de realizar todo
    tipo de desejos.  Para você, ele parece nada mais do que um irritante e
    pequeno duende.
  name: o gênio
  vnum: '010101501507'
- description: Um homem velho, fracassado e agitado, se levanta e começa a gritar
    com o mundo.
  keywords:
  - velho
  - homem
  - fracassado
  long_desc: |-
    Ele veste um uniforme com aparência gasta, decorado com medalhas que ele
    mesmo fez.  Mandíbula aberta e grandes bolsas de gordura contornam seus
    olhos feios e cheios de ódio.  Um tufo de cabelo escuro se espalha por sua
    testa, e sua mão direita treme e treme...
  name: o velho fracassado
  vnum: '010101501508'
- description: O louco Califa de Hakin está aqui, dissecando um jovem garoto.
  keywords:
  - califa
  - hakim
  - hakin
  long_desc: |-
    Com uma pele muito escura e imensos olhos tão brancos...  Coberto apenas por
    uma túnica de lã barata, ele não toma banho há meses, e nem tem comido nada
    há dias e ainda assim, seu sorriso é tão encantador...
  name: o Califa de Hakin
  vnum: '010101501509'
- description: Judas Escariotes se aproxima lentamente, estendendo seus braços para
    um abraço.
  keywords:
  - judas
  - escariotes
  long_desc: |-
    Você não vê nada além da tristeza de um homem que poderia vender seu próprio
    Deus.
  name: Judas Escariotes
  vnum: '010101501510'
- description: Um Faraó foi mandado para cá como recompensa por uma vida cheia de
    maldades.
  keywords:
  - faraó
  - farao
  long_desc: |-
    Ricamente vestido e com o porte arrogante de quem tem muito amor pelo poder,
    ele olha para você com ares de um forçado contentamento.
  name: um Faraó
  vnum: '010101501511'
- description: Abu Baquir, o primeiro dos Escolhidos, lamenta sobre a morte do Profeta.
  keywords:
  - abu
  - baquir
  - primeiro
  - califa
  long_desc: |-
    Você vê um homem simples, vestido com um escuro robe e sem adornos,
    encurvado e pensativo, revivendo as memórias de um homem que ele pensou que
    nunca morreria.
  name: Abu Baquir
  vnum: '010101501512'
- description: Você vê Umar, o segundo dos Escolhidos, os sucessores do Profeta.
  keywords:
  - umar
  - segundo
  - califa
  long_desc: |-
    Você está pasmo diante da devoção deste homem.  Ele olha para voc� com
    tristeza, dizendo: "Eu não desejo lutar com você, mas se você recusar a
    verdade da Palavra, então eu devo."
  name: Umar
  vnum: '010101501513'
- description: O terceiro dos bem aventurados Califas, Otomano, está diante de você.
  keywords:
  - otomano
  - terceiro
  - califa
  long_desc: |-
    Ele foi escolhido como líder, por um grupo de invejosos rivais que não
    teriam como escolher nenhum outro alem dele.  Com a memória do Profeta
    desaparecendo rapidamente da mente dos fiéis ele pouco pode fazer, e no
    final foi morto por seus inimigos.
  name: Otomano
  vnum: '010101501514'
- description: Você está diante de Ali, o último dos Escolhidos.
  keywords:
  - ali
  - quarto
  - último
  - califa
  long_desc: |-
    Alguns o vêem como o mais proximo de Deus dentre os Califas, aquele que
    merece de nós, mais respeito e maior reverência.  Alguns ainda o o vêm como
    um homem cismado, um herege, a ser morto e esquecido.  Olhe para ele agora e
    decida por si só.
  name: Ali
  vnum: '010101501515'
- description: Você contempla o mais belo de todos os anjos, Iblis, o anjo caído.
  keywords:
  - anjo
  - belo
  - iblis
  long_desc: |-
    Ele sorri calmamente, e começa a contar-lhe sobre a vez em que ele não pode
    se ajoelhar, não pode prostar-se diante da humanidade.  E então ele
    gesticula para você, sorrindo, e lhe mostra a imagem de todas as tentações
    que serão suas se você o seguir.
  name: Iblis o anjo caído
  vnum: '010101501516'
- description: Você faz uma pausa nervosa assim que uma voz sussurra sobre o seu ombro.
  keywords:
  - iblis
  - satã
  - sata
  - tentação
  - tentacao
  - voz
  long_desc: |-
    Não há uma figura física presa à presença que domina este lugar, apenas uma
    risada atormentada, gemendo, gritando e implorando.
  name: Tentação, a voz de satã
  vnum: '010101501517'
- description: |-
    Um dragão furioso volta-se na sua direção de maneira extremamente insinuante
    para sua alma.
  keywords:
  - serpente
  - dragão
  - dragao
  - satã
  - sata
  - iblis
  long_desc: |-
    A serpente da Babilônia, o antigo monstro violeta, que tem assistido a
    humanidade sucumbir diante de seu poder, olha para você como se você fosse a
    última de suas vítimas.
  name: o dragão da fúria
  vnum: '010101501518'
- description: O fogo do inferno a seu redor é dominado por um volumoso demônio em
    chamas.
  keywords:
  - demônio
  - demonio
  - fogo
  long_desc: |-
    Você não vê nada a não ser o inexorável ódio flamejante do senhor do mundo
    inferior que você teme ser seu destino.
  name: o demônio
  vnum: '010101501519'
- description: Deitado no chão, embrulhado em mantas, está o mais inocente dos bebês.
  keywords:
  - bebê
  - bebe
  - inocente
  long_desc: O Bebê está pouco atento a sua presença, perdido em um sonolento bocejo.
  name: o bebê inocente
  vnum: '010101501520'
- description: Você se detêm, surpreso diante da visão de um adolescente fitando o
    horizonte.
  keywords:
  - garoto
  - adolescente
  long_desc: |-
    Ele é jovem, e ainda não viu toda a dor deste mundo.  Você segue seu olhar e
    nota que ele está contemplando as belezas da lua.
  name: o garoto adolescente
  vnum: '010101501521'
- description: Um homem de meia idade está aqui, ajoelhado em oração.
  keywords:
  - homem
  long_desc: |-
    Ele parece cansado, as linhas da idade marcam sua face mas em seu roupão,
    ajoelhado, ele é a imagem perfeita do contentamento.
  name: o homem
  vnum: '010101501522'
- description: Você é subjugado pela presença de uma alma que transcendeu seu corpo.
  keywords:
  - alma
  long_desc: |-
    Você sente certos gostos e cheiros, os ventos pelos jardins.  Nada pode
    explicar ou descrever esta perfeição, esta felicidade absoluta.
  name: a alma sem corpo
  vnum: '010101501523'
