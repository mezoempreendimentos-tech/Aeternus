- description: Shamus, o errante, está advertindo você sobre a maldade que há no local.
  keywords:
  - shamus
  - errante
  long_desc: |-
    Você vê um homem, calvo e de estrutura grosseira, vestindo um manto branco.
    Ele escutou as histórias desta cidade de trevas, e veio para cá como
    missionário.
  name: Shamus
  vnum: '010109909900'
- description: Uma escangalhada pilha de farrapos e ossos está aqui.
  keywords:
  - tumular
  - criatura
  - ossos
  long_desc: |-
    Você vê um morto-vivo, a única razão de sua existência é a de proteger seu
    túmulo na colina.
  name: a criatura tumular
  vnum: '010109909901'
- description: O espírito de uma mulher há muito tempo morta flutua aqui.
  keywords:
  - banshee
  - mulher
  - morta
  long_desc: |-
    Este demônio é o espírito de uma perversa elfa, algo realmente raro.
    Seu cabelo é desordenado e revolto, além dela estar vestida em trapos
    esfarrapados.
  name: a Banshee
  vnum: '010109909902'
- description: Um enorme monstro com muitas bocas está aqui.
  keywords:
  - argus
  - monstro
  long_desc: |-
    Este é um enorme monstro, parecido com uma ameba, mas com um olho
    central com a pupila tripartida, e outra centena de olhos adaptados
    sobre as muitas e afiadas bocas dentadas...
  name: o Argus
  vnum: '010109909903'
- description: Um grande Bicho-Papão está aqui, preparado para atacar.
  keywords:
  - bicho-papão
  - bicho
  - papao
  - papão
  long_desc: |-
    Grande e muito forte, esta criatura é recoberta por pêlos avermelhados.
    Apesar de possuir uma aparência humanóide, ele parece possuir o sangue
    dos mais terríveis predadores.
  name: o Bicho-Papão
  vnum: '010109909904'
- description: Alguém todo quebrado está aqui, parecendo ameaçador.
  keywords:
  - quebrado
  long_desc: |-
    Este cara é realmente feio!  Ele tem a cabeça de um ogro, um pé de aranha,
    um pé humano, e várias outras partes de corpos incompatíveis.
  name: alguém todo quebrado
  vnum: '010109909905'
- description: Um capanga está parado aqui, preparado para defender o covil de seu
    mestre.
  keywords:
  - capanga
  long_desc: Isto se parece com uma tartaruga ninja, exceto por ele ser um sapo.
  name: o capanga
  vnum: '010109909906'
- description: Uma grande planta exalando odores putrefatos está aqui, enojando o
    ambiente.
  keywords:
  - planta
  long_desc: Você vê uma gigantesca vênus armadilha de mosca, com dentes de 6 polegadas.
  name: um homem-planta
  vnum: '010109909907'
- description: Uma Gorgimera ruge ao você entrar, e o ATACA!!!
  keywords:
  - gorgimera
  long_desc: |-
    Este monstro possui três cabeças, de um górgona, de um leão, e de um cruel
    dragão. Isto tem a parte traseira de um grande e negra górgona, e a parte
    dianteira de um gigantesco leão, com asas castanhas de um dragão.
  name: a Gorgimera
  vnum: '010109909908'
- description: Um cavaleiro da morte está aqui, desdenhando de você.
  keywords:
  - morte
  - cavaleiro
  long_desc: |-
    Um grosseiro esqueleto, sua face de caveira é negra e recoberta por restos
    de carne podre.
  name: o Cavaleiro da Morte
  vnum: '010109909909'
- description: Uma enorme cobra deita-se aqui, mastigando um corpo humano.
  keywords:
  - abismo
  - dragao
  - cobra
  long_desc: |-
    O dragão do abismo possui tonalidades marrons e tem cerca de 2,5 metros de
    comprimento. Conhecido por assumir várias formas, este animal é extremamente
    perigoso e seria melhor você sair de seu lar imediatamente.
  name: o dragão do abismo
  vnum: '010109909910'
- description: O traidor está parado aqui, gritando.
  keywords:
  - traidor
  - anao
  long_desc: |-
    Você vê um anão com olhos brancos e brilhantes, sem pupilas.  A pele é
    branca, mas ele parece ainda bastante vigoroso.
  name: o Anão traidor
  vnum: '010109909911'
- description: Um elfo errante está aqui, procurando os seres malignos da região.
  keywords:
  - elfo
  long_desc: |-
    Você vê um atraente rapaz, tem cerca de 1,5 metros de altura, com olhos
    cintilantes e fraca complexão.  Apesar de pequeno, ele mostra ser bastante
    flexível e ágil.
  name: o elfo errante
  vnum: '010109909912'
- description: Um espírito está levitando aqui, com um cruel sorriso em sua face.
  keywords:
  - efreeti
  - espirito
  long_desc: |-
    Você vê um poderoso bruxo despido da cintura para cima, vestido apenas com
    um par de chinelos, calças de cor púrpura, e um bracelete cintilante de
    muitas cores.
  name: o Efreeti
  vnum: '010109909913'
- description: Uma mulher está sentada na cama, de costas para você.
  keywords:
  - medusa
  - mulher
  long_desc: |-
    Bem, você provavelmente não deveria olhar para esta mulher, pois, ela é
    realmente feia.  Mas suponho que você queira saber o quão feia.
  name: a Medusa
  vnum: '010109909914'
- description: Um grande, estúpido Orc está movimentando-se pesadamente aqui.
  keywords:
  - estúpido
  - orc
  long_desc: Ele é simplesmente horrível...
  name: o Orc
  vnum: '010109909915'
- description: Há um garçom parado aqui, aguardando por suas ordens.
  keywords:
  - garcom
  long_desc: É uma pessoa pequena, com pinos perfurando a carne em seu rosto...
  name: o garçom
  vnum: '010109909916'
- description: Um cidadão de Ghenna está aqui.
  keywords:
  - cidadão
  long_desc: |-
    Você vê uma pessoa imunda, a muito insana devido a destruição de sua
    maravilhosa cidade.
  name: um cidadão de Ghenna
  vnum: '010109909917'
- description: Uma velha senhora (obviamente perdida) está tentando vender maquiagem.
  keywords:
  - senhora
  - velha
  - vendedora
  long_desc: |-
    Você vê uma velha senhora, de vestido cor de rosa.  Em seus braços ela
    carrega uma caixa de papel crepe em forma de coração.
  name: uma vendedora
  vnum: '010109909918'
- description: Um forte homem está prostrado aqui, aparentemente rezando.
  keywords:
  - mestre
  - espadachim
  - homem
  long_desc: |-
    Um homem com uma grande barba negra, o mestre espadachim de Ghenna está
    tatuado com runas da cabeça aos pés.  Envolto em mortalhas vermelhas, ele
    empunha uma espada de impressionante beleza, a qual emite zunidos cortando
    o ar assim que ele o ataca.
  name: o mestre espadachim de Ghenna
  vnum: '010109909923'
- description: Parece que um pé está saindo da parede!
  keywords:
  - parede
  - pé
  long_desc: An undefined string.
  name: um pé saindo da parede
  vnum: '010109909931'
- description: Parece que um braço está saindo da parede!
  keywords:
  - parede
  - braço
  long_desc: An undefined string.
  name: um braço saindo da parede
  vnum: '010109909932'
- description: Uma grande estátua de um humanóide esculpida em granito, está aqui.
  keywords:
  - estatua
  - rocha
  - golem
  long_desc: |-
    Isto se parece com uma escultura em rocha de um ser humanóide de corpo
    extremamente anguloso, como um esboço de assustador homem.  Ele tem mais de
    3, 5 metros de altura, lançando uma sombra sobre você.
  name: o golem de rocha
  vnum: '010109909933'
- description: |-
    Uma boneca está apoiada contra a parede, esquecida pela criança que
    um dia a teve.
  keywords:
  - boneca
  long_desc: |-
    Parece com um típico brinquedo de criança.  Tem cerca de 30 centímetros
    de altura, e parece ser de argila.
  name: a boneca
  vnum: '010109909964'
- description: Uma jovem, de aparência inocente está sentada aqui, lendo um revista.
  keywords:
  - mulher
  long_desc: Ela encara você, e pisca o olho.
  name: uma mulher
  vnum: '010109909971'
- description: Lester está aqui, apenas observando o movimento.
  keywords:
  - lester
  long_desc: Você observa um homem de má aparência, e percebe que está babando.
  name: Lester
  vnum: '010109909972'
- description: Uma mulher desdentada está sentada na cama.
  keywords:
  - mulher
  long_desc: |-
    Um olho, sem dentes e com uma pele branca, esta mulher parece o seu
    pior pesadelo.
  name: a mulher
  vnum: '010109909975'
- description: Um Anão está deitado aqui.
  keywords:
  - morto
  - anao
  long_desc: Você não vê nada de especial.
  name: o Anão
  vnum: '010109909981'
- description: Um Maedar está aqui na penumbra.
  keywords:
  - maedar
  long_desc: Você vê um musculoso e careca humanóide, vestido em uma túnica.
  name: o Maedar
  vnum: '010109909985'
- description: Um Maedar está aqui na penumbra.
  keywords:
  - maedar
  - mestre
  long_desc: Você vê um musculoso e careca humanóide, vestido em uma túnica.
  name: o mestre Maedar
  vnum: '010109909986'
- description: Roger, o elfo guerreiro está aqui procurando por criaturas malignas
    para matar.
  keywords:
  - elfo
  - roger
  long_desc: |-
    Você vê um jovem elfo, tem apenas cerca de 130 anos, ele age como se estivesse
    em uma cruzada.  Vestido numa armadura reluzente, persegue os agentes do mal
    tentando erradica-los da face do planeta.
  name: Roger
  vnum: '010109909987'
- description: Um fraco e pequeno dragão esta parado aqui, olhando para você com profundos
    olhos azuis.
  keywords:
  - dragao
  - dragonet
  long_desc: |-
    Você vê o que parece ser a miniatura de um dragão, com aproximadamente o tamanho
    de um chihuahua.
  name: o Dragonet
  vnum: '010109909989'
- description: A maior barata que você já viu está aqui, olhando para você.
  keywords:
  - barata
  long_desc: Você vê uma barata de aproximadamente 70 centímetros de comprimento.
  name: a barata
  vnum: '010109909994'
- description: O Deepspawn está em pé aqui, preparado para lhe matar.
  keywords:
  - deepspawn
  long_desc: |-
    Isto parece com uma grande esfera elástica, cinza e marrom.  Seis braços
    projetam-se de seu corpo; três são braços-tentáculo, e três são
    braços-mandíbula, terminando em bocas de muitos dentes.  Tem também cerca de
    40 olhos flexíveis, longos e retráteis, que observam você de forma
    ameaçadora.
  name: o Deepspawn
  vnum: '010109909997'
