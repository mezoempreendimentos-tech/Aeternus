- description: Um fedorento, desagradável e gordo javali está aqui, gemendo.
  keywords:
  - javali
  long_desc: Que cheiro é esse?
  name: um javali
  vnum: '010112112100'
- description: Um lotus negro está aqui, preparado para avançar em sua próxima vítima.
  keywords:
  - lotus
  - negro
  long_desc: Uma desagradável e perigosa criatura.
  name: o Lotus Negro
  vnum: '010112112101'
- description: |-
    Um rato com dentes afiados se esconde em um canto, rangendo seus
    terríveis dentes.
  keywords:
  - rato
  - com
  - dentes
  - afiados
  long_desc: |-
    Maior do que um típico rato, ele anda através da sombra.
    Seus pequenhos maus olhos se mostram em alerta e brilham com uma
    estranha lus.  Eles podem ser perigosos, com seus vários dentes
    afiadíssimos.
  name: um rato com dentes afiados
  vnum: '010112112102'
- description: Um pequeno demônio rasteja aqui, pronto para lutar.
  keywords:
  - pequeno
  - demonio
  long_desc: Pequeno e forte, este demônio parece ser muito malvado.
  name: o pequeno demônio
  vnum: '010112112103'
- description: Um cérbero ronda por você, observando-o.
  keywords:
  - cerbero
  long_desc: Liso e hábil, um notável adversário.
  name: o cérbero
  vnum: '010112112104'
- description: Você vê uma lesma gigante aqui, bloqueando seu caminho.
  keywords:
  - lesma
  - gigante
  long_desc: Urgh!! Essa coisa é repugnante!
  name: uma lesma gigante
  vnum: '010112112105'
- description: Um Anão negro está aqui, sorrindo para você.
  keywords:
  - anao
  - negro
  long_desc: |-
    Ele pode ser sorridente, mas que isso não quer dizer que ele goste de
    você.
  name: o anão negro
  vnum: '010112112106'
- description: Um grande lobo caminha em sua direção, uivando horrivelmente.
  keywords:
  - grande
  - lobo
  long_desc: |-
    Parece pequeno, perto de tantos outros animais e deve ser bem macio e
    rápido, este animal parece aguçar a sua curiosidade.
  name: o grande lobo
  vnum: '010112112107'
- description: Um bola verde rastejante vagarosamente avança em sua direção.
  keywords:
  - bolor
  - bola
  - rastejante
  long_desc: Com aparência verde, gelatinoso e meio rugosa, parece cheia de ódio.
  name: o bolor rastejante
  vnum: '010112112108'
- description: A enorme sanguessuga está aqui, pronta para jantar.
  keywords:
  - enorme
  - sanguessuga
  long_desc: Este bicho enorme e visguento tem um aspecto que lhe dá asco.
  name: a enorme sanguessuga
  vnum: '010112112109'
- description: Um leão Jamuuran está aqui, esperando pela chance de matar.
  keywords:
  - leao
  - jamuuran
  long_desc: Que perfeição este animal é.
  name: um Leão Jamuuran
  vnum: '010112112110'
- description: Um Jor está aqui, meio vesgo por causa da luz ofuscante.
  keywords:
  - jor
  long_desc: 'Imagine isso: ele tem a aparêcia de um orc, só que bem pior...'
  name: um Jor
  vnum: '010112112111'
- description: Um Diurge está aqui, batendo em seu escudo, pronto para lutar.
  keywords:
  - diurge
  long_desc: |-
    Essa coisa tem uma pele negra acizentada, cabelo vermelho metálico
    e um rosto tremendamente feio.
  name: o Diurge
  vnum: '010112112112'
- description: Aqui se ergue um Beemonte, planejando vê-lo morto.
  keywords:
  - beemonte
  long_desc: Ele o fita atentamente e ataca.
  name: o beemonte
  vnum: '010112112113'
- description: Um pequeno e forte Caiveh está aqui, com uma espada nas mãos.
  keywords:
  - caiveh
  long_desc: |-
    Pequeno e ágil, esta apavorante máquina de luta espera por sua
    próxima vítima.
  name: um Caiveh
  vnum: '010112112114'
- description: O Drakian está aqui, parecendo meio impaciente.
  keywords:
  - drakian
  long_desc: Na medida que você começa a examiná-lo, ele ataca!
  name: o Drakian
  vnum: '010112112115'
- description: O Crixna está em pé aqui, olhando aborrecido para você.
  keywords:
  - Crixna
  long_desc: |-
    Ele parece ter dentro de si uma fúria imensa, pois seus movimentos são
    frenéticos e agressivos. Seus braços rodopiam, em movimento de ataque.
  name: o Crixna
  vnum: '010112112116'
- description: Um Wyrm acorda de seu descanso e ataca.
  keywords:
  - wyrm
  long_desc: 'Bem...você sabe: é um wyrm!'
  name: um Wyrm
  vnum: '010112112117'
- description: Um Djinni está aqui, orgulhoso e confiante.
  keywords:
  - djinni
  long_desc: |-
    Este Djinni olha em seu olho e parece zombar de você, como se já
    tivesse decidido que você não será capaz de ter uma luta digna de ser
    levada a sério.
  name: um djinni
  vnum: '010112112118'
- description: Um basilisco furtivamente vai em sua direção, tentando furar seu olho.
  keywords:
  - basilisco
  long_desc: Ele se parece com um bebê dragão e é letal como um deles.
  name: um basilisco
  vnum: '010112112119'
- description: Voce é confrontado com um Saltitante Dervixe.
  keywords:
  - saltitante
  - dervixe
  long_desc: |-
    É uma criatura rápida e você imagina que sua morte também será muito
    rápida.
  name: um saltitante dervixe
  vnum: '010112112120'
- description: Uma imponente Quimera está sentada no centro da sala.
  keywords:
  - quimera
  - leao
  - bode
  - dragao
  long_desc: |-
    Uma estranha criatura esta, com três cabeças: leão, bode e dragão, esta quimera
    pode se tornar agitada quando perturbada.
  name: uma quimera aparentemente calma
  vnum: '010112112121'
- description: Um Ciclope se vira diante de você e arreganha os dentes maldosamente.
  keywords:
  - ciclope
  long_desc: Este ser de um olho só, observa você como se fosse uma deliciosa refeição.
  name: um ciclope
  vnum: '010112112122'
- description: Uma Hidra Gigante olha para você através da sala.
  keywords:
  - hidra
  - gigante
  long_desc: Esta criatura parece ser um perigoso adversário.
  name: uma Hidra Gigante
  vnum: '010112112123'
- description: Um impressionante gigante lhe ataca assim que o vê.
  keywords:
  - enorme
  - gigante
  long_desc: Esta enorme criatura não está totalmente feliz por estar presa aqui.
  name: um Enorme Gigante
  vnum: '010112112124'
- description: Um Ogro Ghazban se curva sobre você, pisando sobre os corpos no chão.
  keywords:
  - ogro
  - ghazban
  long_desc: |-
    Ele parece possuir somente o desejo de destruir. Esta coisa não passa
    de um maldito bastardo.
  name: um Ogro Ghazban
  vnum: '010112112125'
- description: Um peludo Cynamolgus caminha pesadamente, balançando seu enorme porrete.
  keywords:
  - cynamolgus
  - peludo
  long_desc: ECA! Só de olhar você sente seu estômago enjoar.
  name: o peludo Cynamolgus
  vnum: '010112112126'
- description: Um Troll Negro pula de um canto escuro, atacando pelo lado!
  keywords:
  - troll
  - negro
  long_desc: Feio, verruguento e muito, muito malvado.
  name: um Troll Negro
  vnum: '010112112127'
- description: Um Cavaleiro Khordovian, preso por traição, olha você e oferece um
    desafio.
  keywords:
  - Cavaleiro
  - khordovian
  long_desc: |-
    Oh Céus! Ele tem a aparência tão nobre que você práticamente lamenta
    ter que matá-lo.
  name: o Cavaleiro Khordovian
  vnum: '010112112128'
- description: Aqui está ele - o Fabuloso Minotauro.
  keywords:
  - minotauro
  long_desc: |-
    Enormes unhas, cauda cheia de espinhos, possui a cabeça de touro e o
    toráx de um homem absolutamente descomunal, seus dentes são tão grandes
    que você custa a crer que esta coisa seja real!
  name: o Grande Minotauro
  vnum: '010112112129'
