- description: Uma terrível criatura tumular está aqui, olhando friamente para você.
  keywords:
  - criatura
  - tumular
  long_desc: |-
    Você observa uma horripilante criatura tumular, que lança um olhar frio e
    assustador sobre você.  Sua pele pálida e em decomposição torna ainda mais
    terrível a sua aparência.
  name: uma criatura tumular
  vnum: '010114414400'
- description: Um braço em decomposição foi deixado aqui, exalando um odor terrível.
  keywords:
  - braco
  - rastejante
  long_desc: |-
    Você observa sobre o chão um braço humano em decomposição.  Algumas
    cicatrizes feitas por alguma lâmina ou por garras, marcam a sua pele
    totalmente retalhada.
  name: um braço rastejante
  vnum: '010114414401'
- description: Um pônei gorducho pasta tranqüilamente aqui.
  keywords:
  - ponei
  - bolo
  - fofo
  long_desc: |-
    Você observa um velho e gordo pônei de pêlo brilhante e bastante macio.  O
    simpático Bolo-fofo pertence ao senhor Tom Bombadillo.
  name: Bolo-fofo
  vnum: '010114414402'
- description: Um velho porteiro está aqui, vigiando o portão oeste de Bri.
  keywords:
  - porteiro
  - larry
  long_desc: |-
    Você observa um velho homem narigudo e de sombracelhas grossas, seu rosto
    bastante marcado pelo tempo mostra os sinais da sua longa vida.  De repente,
    o velho Larry caminha na sua direção e lhe pergunta de forma grosseira:
    @B"O que você quer, e de onde veio?"@n
  name: Larry, o porteiro de Bri
  vnum: '010114414403'
- description: Cevado Carrapicho, o dono da Pônei Saltitante está aqui, correndo sem
    parar.
  keywords:
  - cevado
  - carrapicho
  long_desc: |-
    Você observa um homem gordo e baixo, careca e de rosto vermelho, porém muito
    simpático.  O agitado Cevado Carrapicho é o dono da movimentada estalagem:
    O Pônei Saltitante.  Vestido com um avental branco, o velho Cevado corre de
    um lado para o outro tentando atender todos os seus clientes.
  name: Cevado Carrapicho
  vnum: '010114414404'
- description: Nob, o empregado hobbit da estalagem está aqui, sorrindo para você.
  keywords:
  - nob
  - hobbit
  - empregado
  long_desc: |-
    Você observa um pequenino hobbit de aparência alegre e pés bem peludos.  Nob
    é um dos empregados da estalagem:  O Pônei Saltitante.
  name: Nob, o empregado hobbit
  vnum: '010114414405'
- description: Um engraçado gato negro está aqui, olhando para os pratos sobre as
    mesas.
  keywords:
  - gato
  - negro
  long_desc: |-
    Você observa um engraçado gato de pêlo suave e negro.  Este belo gato
    pertence ao hobbit Bob, que trabalha cuidando dos animais do estábulo da
    estalagem do senhor Cevado Carrapicho.
  name: um gato negro
  vnum: '010114414406'
- description: Bob, o empregado hobbit da estalagem está aqui, cuidando dos animais.
  keywords:
  - bob
  - hobbit
  - empregado
  long_desc: |-
    Você observa um pequenino hobbit gorducho e de pés bastante peludos.  Bob
    trabalha no estábulo da estalagem do senhor Cevado Carrapicho e possui um
    engraçado gato negro, que vez por outra faz malabarismos para alegrar os
    fregueses da Pônei Saltitante.
  name: Bob, o empregado hobbit
  vnum: '010114414407'
- description: Um homem de Bri está aqui, olhando para você curiosamente.
  keywords:
  - homem
  - bri
  long_desc: |-
    Você observa um homem bastante forte, troncudo, baixo e de cabelos
    castanhos.  Ele lhe observa com um olhar amigável e faz um sinal de boas
    vindas para você.  Os homens de Bri não pertencem a ninguém além de si
    próprios, segundo suas próprias histórias, foram os habitantes originais e
    eram descendentes dos primeiros homens que ocuparam o Oeste do mundo-médio.
  name: um homem de Bri
  vnum: '010114414408'
- description: Uma bela mulher de Bri está aqui, cuidando da sua casa.
  keywords:
  - mulher
  - bri
  long_desc: |-
    Você observa uma linda mulher de Bri de cabelos castanhos claros e de olhar
    bastante expressivo.
  name: uma mulher de Bri
  vnum: '010114414409'
- description: Um anão viajante está aqui, procurando um local para se abrigar.
  keywords:
  - anao
  - viajante
  long_desc: |-
    Você observa um troncudo anão de barba e cabelos longos.  Sua aparência não
    é das melhores e seu rosto expressa um sentimento de cansaço.
  name: um anão viajante
  vnum: '010114414410'
- description: Um misterioso guardião está aqui, sentado num dos cantos da estalagem.
  keywords:
  - guardiao
  long_desc: |-
    Você observa um homem bastante alto e de pele mais escura que os homens de
    Bri.  Nos dias de hoje, poucos homens como este são visto.  Eles são
    chamados de guardiões e vagam à vontade para o lado do sul e para o leste,
    chegando até as Montanhas Sombrias.  O povo de Bri não costumava fazer
    amizade com eles.
  name: um guardião
  vnum: '010114414411'
- description: Bill Samambaia está aqui, olhando para você com um sorriso sarcástico.
  keywords:
  - bill
  - samambaia
  long_desc: |-
    Você observa o aproveitador Bill Samambaia.  De pele morena, magro e com um
    olhar repugnante, Bill Samambaia possui o nome sujo em toda a aldeia de Bri.
    Ele adora fazer maldades para se divertir e costuma receber visitas de
    estranhas pessoas do sul.
  name: Bill Samambaia
  vnum: '010114414412'
- description: Um pequenino hobbit de Bri está aqui, cuidando dos seus afazeres.
  keywords:
  - hobbit
  - bri
  long_desc: |-
    Você observa um pequenino e simpático hobbit nativo de Bri.  Os pequeninos
    de Bri juram que o assentamento hobbit da aldeia de Bri é o mais antigo do
    mundo, fundado antes mesmo que o rio Brandevin fosse atravessado e o Condado
    colonizado.  Gentis e amigáveis, os alegres hobbits de Bri, certamente não
    são como os seus parentes do Condado imaginam.
  name: um hobbit de Bri
  vnum: '010114414413'
- description: Uma simpática hobbit de Bri está aqui, cuidando das suas tarefas.
  keywords:
  - hobbit
  - bri
  long_desc: |-
    Você observa uma bela e simpática hobbit nativa de Bri.  Os pequeninos
    de Bri juram que o assentamento hobbit da aldeia de Bri é o mais antigo do
    mundo, fundado antes mesmo que o rio Brandevin fosse atravessado e o Condado
    colonizado.  Gentis e amigáveis, os alegres hobbits de Bri, certamente não
    são como os seus parentes do Condado imaginam.
  name: uma hobbit de Bri
  vnum: '010114414414'
- description: Um estranho forasteiro está aqui, observando o agitado bar da estalagem.
  keywords:
  - homem
  - forasteiro
  long_desc: |-
    Você observa um estranho homem coberto por um manto negro, que lhe impede de
    espreitar o misterioso rosto deste forasteiro.  Você percebe que ele observa
    cuidadosamente todas as pessoas do bar e seus pertences.
  name: um estranho forasteiro
  vnum: '010114414415'
- description: Alguns viajantes seguem tranqüilamente pela estrada.
  keywords:
  - viajantes
  long_desc: |-
    Você observa um grupo de viajantes formado por dez homens fortes e altos,
    que seguem para alguma cidade distante, carregando consigo várias
    mercadorias.
  name: alguns viajantes
  vnum: '010114414416'
- description: Um alegre grupo de anões está aqui, sentado ao redor de uma animada
    mesa.
  keywords:
  - grupo
  - anoes
  long_desc: |-
    Você observa um alegre grupo formado por seis anões viajantes de terras
    distantes, que estão hospedados na movimentada estalagem do senhor Cevado
    Carrapicho.  Como todos os grupos que passam pela aldeia de Bri, uma parada
    na estalagem para recuperar as forças e cantar um pouco é sempre bem vinda.
  name: um grupo de anões
  vnum: '010114414417'
- description: Um barulhento grupo de homens de Bri está aqui, conversando no bar.
  keywords:
  - grupo
  - homens
  - bri
  long_desc: |-
    Você observa vários homens de Bri cantando, conversando e bebendo muita
    cerveja numa grande mesa num dos cantos do bar da estalagem o Pônei
    Saltitante.  O barulho perto deles é ensurdecedor e desagradável.
  name: um grupo de homens de Bri
  vnum: '010114414418'
- description: Um feliz grupo de hobbits de Bri está aqui, sentado ao redor de uma
    mesa.
  keywords:
  - grupo
  - hobbits
  - bri
  long_desc: |-
    Você observa um pequeno grupo formado por alguns pequeninos hobbits da
    aldeia de Bri.  Sentados ao redor de uma grande mesa de madeira, eles
    conversam e cantam canções antigas.
  name: um grupo de hobbits de Bri
  vnum: '010114414419'
- description: Um velho porteiro está aqui, vigiando o portão sul da aldeia de Bri.
  keywords:
  - velho
  - porteiro
  long_desc: |-
    Você observa um velho homem de Bri com várias marcas deixadas pelo tempo em
    seu rosto.  O velho porteiro guardará incansavelmente o portão sul da aldeia
    de Bri, cumprindo assim sua tarefa e protegendo todos os moradores da
    aldeia.
  name: o porteiro do portão sul
  vnum: '010114414420'
- description: Um belo pônei está aqui, aguardando os cuidados do seu dono.
  keywords:
  - ponei
  long_desc: Você observa um lindo e simpático pônei de pelo suave e brilhante.
  name: um belo pônei
  vnum: '010114414421'
- description: Um magnífico cavalo está aqui, descansando no estábulo.
  keywords:
  - cavalo
  long_desc: |-
    Você observa um belíssimo cavalo de postura impetuosa e pelo suave e branco.
    Seus cascos brilham refletindo os raios luminosos que surgem da sua luz.
  name: um imponente cavalo
  vnum: '010114414422'
- description: Um lindo pássaro colorido está aqui, cantando sem parar belas melodias.
  keywords:
  - passaro
  - colorido
  long_desc: |-
    Você observa um maravilhoso pássaro de penas coloridas que emitem um brilho
    intenso e magnífico.
  name: um lindo pássaro colorido
  vnum: '010114414423'
