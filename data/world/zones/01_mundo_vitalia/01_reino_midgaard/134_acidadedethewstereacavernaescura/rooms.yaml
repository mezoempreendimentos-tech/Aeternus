    north:
      target_vnum: '010113413450'
    south:
      target_vnum: '010113413457'
  name: Uma Caverna Escura
  vnum: '010113413453'
- description: |-
    O  caminho chega a um abrupto fim, a única coisa que resta é este pequeno
