  exits:
    south:
      target_vnum: '010113413450'
    west:
      target_vnum: '010113413447'
  name: A Caverna Escura
  vnum: '010113413448'
- description: |-
    A água pinga das paredes, formando pequenas poças. Você pode sentir outros
