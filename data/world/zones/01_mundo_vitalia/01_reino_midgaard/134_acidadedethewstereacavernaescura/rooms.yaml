    estreita.
  exits:
    east:
      target_vnum: '010113413442'
    west:
      target_vnum: '010113413440'
  name: Uma Caverna Escura
  vnum: '010113413441'
- description: |-
    Você precisou se ajoelhar para conseguir passar através desta passagem, se
