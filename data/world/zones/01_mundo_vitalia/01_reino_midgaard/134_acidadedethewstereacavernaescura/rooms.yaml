    north:
      target_vnum: '010113413440'
    south:
      target_vnum: '010113413445'
  name: A Caverna Escura
  vnum: '010113413444'
- description: |-
    A  caverna  faz uma pequena interseção aqui, saídas ficam ao norte, sul e
    leste. E o horrível cheiro, continua a vir do sul.
  exits:
    east:
      target_vnum: '010113413446'
    north:
      target_vnum: '010113413444'
    south:
      target_vnum: '010113413449'
  name: Uma Interseção
  vnum: '010113413445'
- description: A caverna continua a leste e oeste. Há musgo crescendo nas paredes
