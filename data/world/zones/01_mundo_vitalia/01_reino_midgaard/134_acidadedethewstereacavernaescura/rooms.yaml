    assobio vindo do leste, o cheiro detestável continua a vir do sul.
  exits:
    east:
      target_vnum: '010113413455'
    north:
      target_vnum: '010113413451'
    south:
      target_vnum: '010113413458'
  name: Uma Caverna Escura
  vnum: '010113413454'
- description: |-
    A caverna forma uma pequena toca. Corpos de animais e ossos cobrem o chão
