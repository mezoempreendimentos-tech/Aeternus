  exits:
    east:
      target_vnum: '010113413430'
    north:
      target_vnum: '010113413432'
    south:
      target_vnum: '010113413435'
    west:
      target_vnum: '010113413410'
  name: "O Caminho Pela Ã\x81rvore"
  vnum: '010113413434'
- description: |-
    Você está em uma velha casa empoleirada acima de Thewster. Há buracos nas
    paredes  e  o  chão  não parece ser muito firme. Esta casa lhe da o péssimo
    sentimento de que você irá cair a qualquer momento.
  exits:
    north:
      target_vnum: '010113413434'
  name: Uma Casa Velha
  vnum: '010113413435'
- description: |-
    Este  pequeno  restaurante acomodado entre dois galhos possui em seu lado
    sul,  uma enorme janela, de onde se pode ver a floresta enquanto se come. A
    porta fica ao norte.
  exits:
    north:
      target_vnum: '010113413430'
  name: O Restaurante Sion
  vnum: '010113413436'
- description: O túnel não continua por muito longe. Ele agora segue a leste e sul.
  exits:
    east:
      target_vnum: '010113413441'
    south:
      target_vnum: '010113413444'
  name: Uma Interseção Subterrânea
  vnum: '010113413440'
- description: |-
    Você  pode ouvir a água pingando das pedras enquanto você caminha através
