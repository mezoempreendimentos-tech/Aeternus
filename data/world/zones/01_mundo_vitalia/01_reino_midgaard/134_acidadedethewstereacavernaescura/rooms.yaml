    north:
      target_vnum: '010113413448'
    south:
      target_vnum: '010113413453'
  name: Uma Caverna Escura
  vnum: '010113413450'
- description: O pequeno fluxo faz uma curva ao sul.
  exits:
    east:
      target_vnum: '010113413452'
    south:
      target_vnum: '010113413454'
    up:
      target_vnum: '010313613634'
  name: Um Buraco
  vnum: '010113413451'
- description: |-
    A caverna faz uma abrupta parada aqui. As poças formaram um pequeno fluxo
