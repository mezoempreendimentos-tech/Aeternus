  exits:
    east:
      target_vnum: '010113413448'
    west:
      target_vnum: '010113413446'
  name: A Caverna Escura
  vnum: '010113413447'
- description: |-
    A  caverna  faz  uma curva aqui, e agora segue a sul e a oeste. Você pode
