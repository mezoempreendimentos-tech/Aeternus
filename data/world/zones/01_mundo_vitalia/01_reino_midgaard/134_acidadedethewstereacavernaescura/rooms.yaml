  exits:
    north:
      target_vnum: '010113413449'
    west:
      target_vnum: '010113413451'
  name: Uma Caverna Escura
  vnum: '010113413452'
- description: |-
    A  caverna continua a norte e a sul. Este detestável cheiro parece vir do
