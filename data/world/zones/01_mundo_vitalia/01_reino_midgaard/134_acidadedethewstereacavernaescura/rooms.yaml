      target_vnum: '010313513552'
    west:
      target_vnum: '010113413442'
  name: A Entrada da Caverna
  vnum: '010113413443'
- description: |-
    A  caverna  se  alarga,  tornando mais fácil a passagem, embora ainda lhe
