- description: um Monge Shaggy está tranquilamente parado aqui.
  keywords:
  - monge
  - shaggy
  long_desc: |-
    Este homem parece ser um monge comum, exceto pela sua enorme estatura e pelo
    corpo coberto de um pelo marrom e liso mesmo nas palmas das mãos.  Ele o
    encara repentinamente.
  name: o Monge Shaggy
  vnum: '010113313301'
- description: Uma Estátua de Prata foi colocada no canto.
  keywords:
  - estatua
  - prata
  long_desc: |-
    Bem, ela não parece humana.  Parece mais um conjunto de armaduras.  Mas que
    diabos ela foi virar para olhar para você?
  name: a Estatua de Prata
  vnum: '010113313302'
- description: O templar de Mateon está aqui olhando pela janela.
  keywords:
  - templar
  long_desc: |-
    Este homem dedicou toda sua vida a Mateon e ao homem atrás da máscara.  Ele
    se vira lentamente e o olha sem expressão.
  name: o templar de Mateon
  vnum: '010113313303'
- description: Mateon, o defensor do búfalo, encara você!
  keywords:
  - mateon
  - cavaleiro
  long_desc: |-
    Mateon é um homem ENORME.  Um homem muito ZANGADO.  Ele não deixará você
    chegar PERTO do homem mascarado.
  name: o grande Cavaleiro Mateon
  vnum: '010113313304'
- description: Uma arrumadeira está aqui tentando dar um jeito na bagunça.
  keywords:
  - arrumadeira
  - mulher
  long_desc: |-
    A arrumadeira parece perturbada e olha de relance para você, com jeito de
    estar simplesmente aterrorizada.
  name: a arrumadeira
  vnum: '010113313305'
- description: Um homem vestindo uma máscara dourada observa você.
  keywords:
  - taurus
  - homem
  long_desc: |-
    Você olha para este homem e percebe algo engraçado.  Ele parece ter
    dificuldades em manter-se com as duas pernas.  Conforme você olha ele vai se
    despindo.  Você percebe sua pele sob o manto.  Ele retira finalmente a
    máscara e você vê um enorme búfalo com um anel no nariz.  "Belo anel", você
    pensa.
  name: Taurus
  vnum: '010113313306'
- description: Um acólito está aqui procurando uma vassoura.
  keywords:
  - acolito
  long_desc: |-
    O Acólito está a procura de uma vassoura.  Ele está heróicamente tentando
