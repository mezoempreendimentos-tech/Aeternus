- description: Um feiticeiro anda de um lado para o outro, atrás do balcão, falando
    sozinho.
  keywords:
  - feiticeiro
  long_desc: |-
    O feiticeiro parece velho e senil mas mesmo assim ele parece ser um feiticeiro
    muito poderoso. Ele está vestido com roupas finas, e está usando muitos anéis
    e braceletes da melhor qualidade.
  name: o feiticeiro
  vnum: '010103003000'
- description: O padeiro olha você calmamente, limpando a farinha em seu rosto com
    a mão.
  keywords:
  - padeiro
  long_desc: |-
    Um gordo e bem apessoado padeiro. Mas você pode ver que ele possui muitas
    cicatrizes em seu corpo.
  name: o padeiro
  vnum: '010103003001'
- description: Um merceeiro está atrás do balcão, com um olhar ligeiramente impaciente.
  keywords:
  - merceeiro
  long_desc: |-
    Um merceeiro alto, que consegue carregar dois sacos de trigo, pesando 200
    libras cada um, em seus ombros.
  name: o merceeiro
  vnum: '010103003002'
- description: Um vendedor de armas está parado aqui.
  keywords:
  - vendedor
  long_desc: |-
    Ele é um jovem vendedor de armas, que ainda tem muita coisa para aprender,
    mas que está ansioso para lhe vender os seus mais novos instrumentos de
    carnificina e destruição.
  name: o vendedor de armas
  vnum: '010103003003'
- description: Um armeiro está aqui, mostrando a sua nova (e previamente usada) armadura.
  keywords:
  - armeiro
  long_desc: |-
    Um armeiro velho mas muito forte. Ele já fêz mais armaduras em sua vida do
    que você poderia imaginar.
  name: o armeiro
  vnum: '010103003004'
- description: Um capitão aposentado está parado aqui, vendendo embarcações.
  keywords:
  - capitao
  - stolar
  long_desc: Este capitão comeu mais tubarões em sua vida do que você matou insetos.
  name: Capitão Stolar
  vnum: '010103003006'
- description: Um marinheiro está parado aqui, esperando para ajudar você.
  keywords:
  - marinheiro
  long_desc: Ele parece ser forte como um lobo-do-mar.
  name: o marinheiro
  vnum: '010103003007'
- description: Tio Juan está aqui, pronto para receber as suas ordens.
  keywords:
  - tio
  - juan
  long_desc: Olhando para ele não se sabe ao certo se ele é um clandestino ou não.
  name: tio Juan
  vnum: '010103003008'
- description: Wally o vendedor de água está parado atrás do balcão.
  keywords:
  - wally
  - vendedor
  long_desc: |-
    Wally é um pouco distraído mas parece ser muito forte.  Ele tem um copo de
    água natural da Fonte de Midgaard nas mãos.  Quando nota você, imediatamente
    ele exibe a sua excelente coleção de águas minerais, das quais ele muito se
    orgulha.
  name: Wally o vendedor de água
  vnum: '010103003009'
- description: O chefe dos carteiros está aqui, pronto para lhe ajudar com a correspondência.
  keywords:
  - carteiro
  - agente
  - postal
  long_desc: |-
    O agente postal parece ser um homem velho feliz, porêm já um pouco lento.
    Ele se preocupa com a reputação do SCM (Serviço de Correio de Midgaard),
    porquê muitas pessoas parecem achar que este serviço está lento.  Talvez se
    ele escovasse as teias de aranha do seu uniforme, passaria uma impressão
    melhor.
  name: o agente postal
  vnum: '010103003010'
- description: Moe o Cartógrafo está aqui, sentado em sua escrivaninha.
  keywords:
  - moe
  - cartografo
  - cartógrafo
  long_desc: |-
    Moe é um homem idoso, que viajou muito no passado. Agora, ele escreve mapas
    para ajudar aos novos aventureiros a atingirem suas conquistas pelo mundo
    afora.
  name: Moe o Cartógrafo
  vnum: '010103003011'
- description: A recepcionista está sentada em sua mesa, sorrindo para você.
  keywords:
  - recepcionista
  long_desc: |-
    Atarefada e atrapalhada, ela parece muito sobrecarregada.  Suas roupas tem
    diversos rasgos e furos, provavelmente causados pelas tracas que sobrevivem em
    meio a tantos papeis velhos.
  name: a recepcionista
  vnum: '010103003012'
- description: Um caçador de aventuras está parado aqui, procurando por sua presa.
  keywords:
  - caçador
  - aventuras
  long_desc: |-
    O caçador de aventuras é um homem bem alto e forte, muito bem treinado nas
    artes de caçar e matar. Se eu fosse você, eu não o aborreceria. Pode ser
    extremamente perigoso para sua saúde.
  name: o caçador de aventuras
  vnum: '010103003015'
- description: O vendedor de jornais está aqui, carregando um fardo de jornais.
  keywords:
  - vendedor
  - jornaleiro
  - garoto
  long_desc: |-
    O vendedor de jornais é um garoto gordinho e baixo, que sua muito.  Em seu
    pescoço, está pendurada uma placa, que diz "Jornal de Vitália,
    Imparcialidade e Preço Baixo".  Quando ele o vê, corre em sua direção,
    oferecendo o jornal.  Ele carrega um fardo de jornais embaixo do braço.
  name: o vendedor de jornais
  vnum: '010103003016'
- description: Sua mestre-guia está aqui, estudando um livro de magia.
  keywords:
  - mestre-guia
  - mago
  long_desc: |-
    Embora sua mestre-guia pareça velha e cansada, você pode ver claramente a
    imensa sabedoria que ela possui.  Ela está usando uma delicada roupa mágica
    e você nota que ela está inteira envolvida por uma suave aura de tonalidade
    azul.
  name: a mestre-guia dos magos
  vnum: '010103003020'
- description: Seu mestre-guia está orando para o seu Deus, aqui.
  keywords:
  - mestre-guia
  - sacerdote
  long_desc: |-
    Você não tem nenhuma dúvida de que este mestre-guia verdadeiramente está
    perto de seu Deus; ele tem um olhar calmo, amoroso.  Você nota que ele é
    rodeado por uma aura branca.
  name: o mestre-guia dos clérigos
  vnum: '010103003021'
- description: Uma mendiga está sentada aqui, ela poderia ser a sua mestre-guia?
  keywords:
  - mestre-guia
  - mendiga
  - ladra
  long_desc: |-
    Você nota que quando a sua mestre-guia se move, você não consegue perceber.
    Este é o jeito do verdadeiro ladrão. Ela está vestida com roupas pobres, e
    possui a aparência de uma mendiga.
  name: a mestre-guia dos ladrões
  vnum: '010103003022'
- description: Seu mestre-guia está parado aqui, amolando um machado.
  keywords:
  - mestre-guia
  long_desc: |-
    Este é seu mestre. Grande e forte, com músculos imensos. Várias cicatrizes
    espalhadas pelo seu corpo, provam que ele já estava usando seus braços muito
    antes de você nascer. Ele tem um olhar tranqüilo em sua face.
  name: o mestre-guia dos guerreiros
  vnum: '010103003023'
- description: Um feiticeiro está guardando a entrada.
  keywords:
  - feiticeiro
  long_desc: |-
    Ele é um mago experiente que se especializou na área da Magia de Combate.
    Ele está aqui para tomar conta da Guilda dos Magos. Seu conhecimento profundo
    de magias ofensivas e defensivas, fazem dele um oponente mortal.
  name: o feiticeiro
  vnum: '010103003024'
- description: Um cavaleiro templar está guardando a entrada.
  keywords:
  - cavaleiro
  - templar
  long_desc: |-
    Ele é um guerreiro especialmente treinado que pertence à ordem militar da
    Fé.  O dever dele é proteger os crentes de perseguições e ataques traiçoeiros.
    Sua devoção religiosa combinada é sua habilidade superior fazem dele
    um oponente mortal.
  name: o cavaleiro templar
  vnum: '010103003025'
- description: Um assassino está guardando a entrada.
  keywords:
  - assassino
  long_desc: |-
    Ele é um ladrão que se especializou em matar os outros de maneira tão
    eficiente quanto possível, utilizando-se para isso, de todos os tipos de
    armas. O conhecimento superior que ele possui, o faz saber como, quando e
    onde usar de forma combinada e cautelosa estas armas. Isso faz dele um
    oponente mortal.
  name: o assassino
  vnum: '010103003026'
- description: Um cavaleiro está guardando a entrada.
  keywords:
  - cavaleiro
  long_desc: |-
    Ele é um guerreiro especialista que foi condecorado por incontáveis atos
    heróicos. O dever dele é proteger a Guilda dos Espadachins. Sua habilidade
    extrema combinada com sua experiência em guerras, faz dele um mortal oponente.
  name: o cavaleiro
  vnum: '010103003027'
- description: Seu mestre-guia está aqui, alegremente dissertando sobre filosofia.
  keywords:
  - mestre
  - guia
  - druidas
  long_desc: |-
    Você se sente calmo na presença desse sábio: seus bondosos olhos transmitem
    muita segurança, acalmando o coração mais agitado e despertando a mente mais
    preguiçosa.  Ele poderá passar-lhe todos os ensinamentos druídicos, mas
    exigirá de você a conduta daquele que acredita em um ideal.
  name: o mestre-guia dos druidas
  vnum: '010103003028'
- description: Uma sorridente druidisa guarda a entrada da Confraria.
  keywords:
  - guardia
  - confraria
  - druidisa
  long_desc: |-
    A guardiã da Confraria irradia juventude, mesmo sendo um dos membros mais
    antigos da Confraria.  Responsável pela segurança do refúgio dos sacerdotes
    em Midgaard, ela pacientemente guarda sua entrada, bloquando-a com sua
    poderosa magia.
  name: a guardiã da Confraria
  vnum: '010103003029'
- description: O seu mestre-guia é um alto e magro sapo, empuleirado em uma vitoria-régia.
  keywords:
  - mestre
  - guia
  - sapo
  - caco
  - ranger
  long_desc: |-
    De uma forma estranha quase faz sentido, já que um sapo é uma criatura da natureza, que ele fosse seu
    mestre-guia. Exceto que ele está cantando e tocando um banjo
    Ele está vestido de verde, de um tom um pouco mais escuro que a pele dele.
  name: o mestre-guia dos rangers
  vnum: '010103003030'
- description: A caçadora se diverte com a espada dela enquanto guarda a entrada.
  keywords:
  - guarda
  - cacadora
  long_desc: |-
    A caçadora é alta, atraente e mortal. Não brinque com ela, ela não gosta
    de encrenqueiros. Dizem que ela consaguiu este emprego depois
    de sozinha matar todos os monstros de nível alto doque hoje é uma área
    para iniciantes. O único motivo para ela não ser a mestra é porquê ela
    não sabe cantar.
  name: a caçadora
  vnum: '010103003031'
- description: Uma bem jovem garçonete está aqui.
  keywords:
  - garconete
  - garota
  long_desc: |-
    Esta jovem garota poderia enganar um membro de outra associação, mas
    você sabe que ela é durona. Ela é muito amigável, um pouco paqueradora
    até, mas terrível para qualquer um que a tire do sério.
    Ela é especialista em egos feridos e membros arrancados.
  name: a garçonete
  vnum: '010103003032'
- description: Um barman calmamente observa você, enquanto mistura gradativamente
    uma bebida.
  keywords:
  - barman
  long_desc: Um barman com aspecto cansado que odeia desordens em seu bar.
  name: o barman
  vnum: '010103003040'
- description: Um garçom está andando de um lado pro outro.
  keywords:
  - garcom
  - garçom
  long_desc: Um garçom com aspecto cansado.
  name: o garçom
  vnum: '010103003041'
- description: Um homem que agora leva uma vida quieta e pacífica como garçom, está
    aqui.
  keywords:
  - garcom
  - garçom
  long_desc: |-
    Este homem obviamente foi um famoso feiticeiro em seus dias de juventude.
    Você instantaneamente reconhece aquele rosto, assim que olha para ele.
  name: o garçom
  vnum: '010103003042'
- description: Um garçom que parece ter perdido contato com Deus, está parado aqui.
  keywords:
  - garcom
  - garçom
  long_desc: |-
    Este garçom faz você se sentir como se tivesse que ficar de joelhos e
    e começar a adorar Deus. Naaah.
  name: o garçom
  vnum: '010103003043'
- description: Um garçom que sabe onde seus fregueses guardam seu dinheiro, está parado
    aqui.
  keywords:
  - garcom
  - garçom
  long_desc: Hmmm... gostaria de saber onde ele arrumou aquela moeda que ele est�
    brincando.
  name: o garçom
  vnum: '010103003044'
- description: Um garçom está aqui.
  keywords:
  - garcom
  - garçom
  long_desc: |-
    Parece que este sujeito poderia facilmente matar você sem derrubar nenhuma
    das garrafas de bebida que ele carrega
  name: o garçom
  vnum: '010103003045'
- description: Encardido está parado aqui, ansioso para servir uma bebida especial
    para você.
  keywords:
  - encardido
  long_desc: |-
    Encardido parece realmente... hmm... imundo. Ele gosta de manter os seus
    fregueses felizes, mas não mexa com ele ou ele poderá ficar realmente MUITO
    bravo.
  name: Encardido
  vnum: '010103003046'
- description: Um simpático garçom de traços celtas enxuga alguns copos com uma toalha.
  keywords:
  - garcom
  - garçom
  long_desc: |-
    Ele já é m senhor de idade, mas sua límpida e constante risada o faz
    parecer um druida ainda jovem, cheio de energia.  Você repara em sua
    cabeleira ruiva, que, assim como a longa barba encaracolada, está começando
    a ficar branca.
  name: o garçom
  vnum: '010103003047'
- description: Sua mestra está aqui, estudando algumas partituras.
  keywords:
  - mestra
  - trovadora
  long_desc: |-
    Sua mestra, uma senhora de riso solto e voz poderosa, parece estar
    cantarolando mesmo ao falar.  Seus cabelos são brancos, curtos e arrepiados,
    os olhos negros brilhantes, o rosto redondo de bochechas e nariz rosados.
    Quando ela fala é como se a sua frente se descortinasse uma enorme tela de
    um quadro em que tudo tem vida, movimento.  Suas lições devem ser ouvidas
    atentamente e assimiladas pois o conhecimento dos bardos permite enxergar-se
    o mundo por trás do mundo...
  name: a mestra trovadora
  vnum: '010103003048'
- description: Um bardo protege a entrada.
  keywords:
  - bardo
  - sentinela
  long_desc: |-
    Protegido por longo manto, esse alto bardo assovia traqüilamente enquanto
    protege a entrada que leva ao Clube de Bardos. Sua aparência despreocupada
    oculta a esperteza e agilidade de um homem de mil talentos e cujos olhos,
    na cabeça coberta, brilham observando tudo.
  name: o bardo sentinela
  vnum: '010103003049'
- description: Uma mulher canta as opções de bebida que o bar oferece.
  keywords:
  - atendente
  - mulher
  long_desc: |-
    Saltitante feito uma pulga risonha (??), a atendente passa prá lá e pra cá
    cantando sobre qualquer coisa em que fixe seus olhos mais de cinco segundos.
    No momento ela inventou uma canção a respeito das bebidas do bar.  O refrão
    é algo como: "... e gulpt!  HIC!  HIC!  HIC!"
  name: a atendente
  vnum: '010103003050'
- description: Seu mestre bardo está aqui a cantar.
  keywords:
  - mestre
  - bardo
  long_desc: |-
    Seu mestre, um sábio conhecedor da música do mundo, vê tudo com seus olhos
    de pura poesia: desde o silêncio mais profundo até o mais sublime da magia.
    Ele o ensinará que cantar, tocar e criar é só mais uma forma de tornar
    a vida mais cheia de belezas e que uma de suas mais sérias missões
    é afugentar o mal e sua teia de tristezas.
  name: o mestre bardo
  vnum: '010103003051'
- description: Um senhor de alvas suíças e espessas sobrancelhas limpa o balcão.
  keywords:
  - gambrinus
  - senhor
  long_desc: |-
    Gambrinus é um senhor alto e barrigudo, de nariz avermelhado e olhos quase
    sempre fechados de tanto rir.  Seus cabelos, brancos e já ralos, envolvem a
    cabeça e terminam em suíças cuidadosamente aparadas, da mesma cor que os
    poucos fios da careca e das espessas e rebeldes sobrancelhas.  Toda vez que
    ele vende algo, experimenta uma pequena porção do mesmo produto. Diz que é
    só para experimentar, mas tente imaginá-lo após um dia de trabalho...
  name: Gambrinus
  vnum: '010103003052'
- description: Um homem alto de vasta cabeleira castanha afina alguns instrumentos.
  keywords:
  - bardo
  - bernardo
  long_desc: |-
    Bernardo lembra um urso: grande e forte, de pele bronzeada e cabelos
    encaracolados sempre rebeldes.  Um certo brilho brincalhão nunca deixa seus
    olhos escuros, estes protegidos pelas espessas sobrancelhas sempre
    despenteadas.  O sorriso amistoso consegue suavizar sua ameaçadora figura
    que, apesar de parecer desajeitada, é ágil e hábil, produzindo finos
    instrumentos e tocando-os com maestria e emoção.
  name: o bardo Bernardo
  vnum: '010103003053'
- description: Um Pacificador está aqui, pronto para agir ao primeiro sinal de problema.
  keywords:
  - pacificador
  long_desc: Ele parece muito forte e sábio. Parece que ele não fala com QUALQUER
    um.
  name: o Pacificador
  vnum: '010103003059'
- description: Um sentinela está parado aqui.
  keywords:
  - sentinela
  long_desc: Um grande, forte, solidário e confiável sentinela.
  name: o sentinela
  vnum: '010103003060'
- description: Um zelador anda de um lado para o outro, limpando tudo.
  keywords:
  - zelador
  long_desc: Que trabalho pesado ele tem.
  name: o zelador
  vnum: '010103003061'
- description: Um fido bestial está aqui, fuçando no lixo, a procura de comida.
  keywords:
  - cachorro
  - fido
  long_desc: |-
    O fido é um cachorro pequeno que tem um cheiro muito ruim e seus dentes estão
    cheios de pedaços de carne apodrecida grudadas.
  name: o fido bestial
  vnum: '010103003062'
- description: Um mercenário está aqui, esperando por trabalho.
  keywords:
  - mercenario
  - mercenário
  long_desc: |-
    Ele tem um aspecto de ser muito mau, e você sabe que ele faria qualquer
    coisa por dinheiro.
  name: o mercenário
  vnum: '010103003063'
- description: Um bêbado feliz, cantando a plenos pulmões.
  keywords:
  - bebado
  - bêbado
  long_desc: Um bêbado que parece estar muito feliz, e que carrega muito dinheiro.
  name: o bêbado
  vnum: '010103003064'
- description: Uma mendiga está aqui, pedindo algumas moedas.
  keywords:
  - mendiga
  long_desc: A mendiga parece que está farta da vida.
  name: a mendiga
  vnum: '010103003065'
- description: Um odif laitseb está aqui, andando de trás prá frente.
  keywords:
  - odif
  - laitseb
  long_desc: O odif é um deus pequeno que foi transformado por algum cachorro.
  name: o odif laitseb
  vnum: '010103003066'
- description: Um sentinela está aqui, tomando conta do portão.
  keywords:
  - sentinela
  long_desc: Um grande, forte, solidário e confiável sentinela.
  name: o sentinela
  vnum: '010103003067'
- description: Uma bolha gelatinosa verde e gosmenta está aqui, chupando restos de
    escombros.
  keywords:
  - bolha
  - gelatinosa
  - verde
  long_desc: Uma coisa medonha de se olhar; é enorme, esverdeado e se parece com uma
    bolha.
  name: a bolha gelatinosa verde
  vnum: '010103003068'
- description: O Garoto da Loja da Animais está aqui, acariciando algo peludo em suas
    mãos.
  keywords:
  - animais
  - loja
  - garoto
  long_desc: Assim que você olha para ele, ele abre suas mãos e mostra um rato!
  name: o Garoto da Loja de Animais
  vnum: '010103003089'
- description: Um pequeno gatinho leal está aqui.
  keywords:
  - gatinho
  long_desc: O gatinho parece ser um gracioso, pequenino e destemido lutador.
  name: o gatinho
  vnum: '010103003090'
- description: Um pequenino e leal cachorrinho está aqui.
  keywords:
  - cachorrinho
  long_desc: O cachorrinho parece ser um gracioso, pequenino e destemido lutador.
  name: o cachorrinho
  vnum: '010103003091'
- description: Um pequeno, rápido e leal cão-de-caça está aqui.
  keywords:
  - cao
  - cão
  long_desc: O cão-de-caça parece ser um lutador destemido.
  name: o cão-de-caça
  vnum: '010103003092'
- description: Um grande e leal rottweiler está aqui.
  keywords:
  - rottweiler
  long_desc: O rottweiler parece ser um forte e destemido lutador.
  name: o rottweiler
  vnum: '010103003093'
- description: Um lobo grande e bem treinado está aqui.
  keywords:
  - lobo
  long_desc: O lobo parece ser forte e um lutador que desconhece o medo.
  name: o lobo
  vnum: '010103003094'
- description: Belchior, o Gerente do Brechó, está muito preocupado com sua comissão.
  keywords:
  - belchior
  - gerente
  long_desc: |-
    Belchior é um senhor interessante, irriquieto e parece estar bastante
    preocupado com alguma coisa.   Suas roupas estão tão empoeiradas!
    Pelo jeito dele, as vendas não andam muito boas.
  name: Belchior, o Gerente do Brechó
  vnum: '010103003095'
- description: Uma mulher esta ajudando os iniciantes aqui.
  keywords:
  - Maria
  - novata
  - instrutora
  long_desc: |-
    Cabelos curtos e castanhos claros.
    Apesar de possuir apenas um olho, ela esta atenta a tudo oque seus alunos fazem. Parece ser uma aventureira bem experiente.
  name: Maria, a instrutora de iniciantes
  vnum: '010103003096'
