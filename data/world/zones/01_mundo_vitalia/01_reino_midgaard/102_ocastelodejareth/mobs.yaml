- description: O Senhor lhe acena com a cabeça e sorri.
  keywords:
  - senhor
  - Jareth
  long_desc: Sua bondade e soberania podem ser vistas em seus olhos. Seus cabelos
    negros assim como seu cavanhaque lhe dão um ar sóbrio, porêm o sorriso inocente
    que brilha em seus lábios demonstra a alegria de desposar a mais bela jovem de
    suas terras.
  name: o Senhor das Terras de Jareth
  vnum: '010110210200'
- description: A Senhora olha para você, bastante curiosa a seu respeito.
  keywords:
  - senhora
  - jovem
  - Jareth
  long_desc: |-
    De uma beleza indescritível, seus olhos possuem o brilho do luar em uma
    noite sem estrelas, seu sorriso ilumina ainda mais sua bela face jovem.  Ela
    parece ter gostado de você, pois vem em sua direção com a intenção de
    cumprimentá-lo.
  name: a Senhora das Terras de Jareth
  vnum: '010110210201'
- description: |-
    A dama de companhia anda por todo o castelo, para ter certeza de que tudo
    está perfeito.
  keywords:
  - dama
  - companhia
  long_desc: |-
    Ela é jovem e linda, escolhida a dedo pela Senhora para cumprir seus
    caprichos.  Seus modos são impecáveis, ela parece conhecer bastante o lugar
    para nunca ultrapassar seus limites.
  name: a dama de companhia da Senhora
  vnum: '010110210202'
- description: O criado particular do senhor lhe cumprimenta solenemente.
  keywords:
  - criado
  - particular
  long_desc: Ele o cumprimenta claramente, seus olhos demonstram total adoração ao
    que faz e ao seu Senhor.
  name: o criado particular do Senhor
  vnum: '010110210203'
- description: O irmão da Senhora está aqui, apoiado no parapeito da janela.
  keywords:
  - irmão
  - bêbado
  long_desc: |-
    Obviamente, um convidado que acabou ficando mais tempo do que devia.  As
    festas intermináveis representam um grande atrativo para este homem.  Claro,
    somado ao fato dele poder ter toda a bebida grátis.
  name: o irmão da Senhora
  vnum: '010110210204'
- description: Um cavaleiro muito bem vestido em suas armaduras está aqui, quase sem
    se mover.
  keywords:
  - irmão
  - cavaleiro
  long_desc: Ele não está, obviamente, acostumado com as formalidades da vida na corte
    e gasta a maior parte de seu tempo no campo, fazendo o que quer que seja que os
    cavaleiros fazem melhor.
  name: o irmão do Senhor
  vnum: '010110210205'
- description: Um soldado da tropa do irmão do Senhor está deitado no feno.
  keywords:
  - soldado
  - membro
  - menor
  long_desc: |-
    Ele parece mais do que feliz por descansar por este curto espaço de tempo,
    pensando que é melhor aqui neste celeiro do que lá dentro, onde há muito
    barulho e festa.
  name: um soldado
  vnum: '010110210206'
- description: Um impaciente soldado caminha para frente e para trás esperando por
    seu capitão.
  keywords:
  - impaciente
  - soldado
  long_desc: Alguns homens parecem confortáveis parados mas este aqui está pronto
    para ação!
  name: um soldado impaciente
  vnum: '010110210207'
- description: |-
    Um entediado soldado está encostado no poste de madeira do celeiro, esperando
    por algo acontecer.
  keywords:
  - soldado
  - entediado
  long_desc: Ele fita o vazio a sua frente, pegando feno a sua volta e jogando ao
    ar.
  name: um soldado entediado
  vnum: '010110210208'
- description: Uma estranha ama arruma o quarto da Senhora, deixando tudo em ordem.
  keywords:
  - ama
  long_desc: |-
    A ama é meio doida, com certeza.  Ela quase verte lágrimas quando encontra
    alguma poeira em algum lugar.
  name: a ama
  vnum: '010110210209'
- description: Uma dama ansiosa, anda de um lado para o outro, procurando por sua
    Senhora.
  keywords:
  - dama
  - espera
  long_desc: Afinal, o que pode fazer uma dama que espera, senão esperar?
  name: uma dama esperando por alguém
  vnum: '010110210210'
- description: Um sábio está aqui, descansando de um longo dia.
  keywords:
  - sábio
  long_desc: |-
    O homem obviamente não está para a vida de festa e bebida, ele parece
    preocupado com o sentido da mesma.
  name: um sábio
  vnum: '010110210211'
- description: |-
    Uma dama está aqui, piscando sugestivamente para você, por tráz das costas do
    bêbado á sua frente.
  keywords:
  - dama
  long_desc: |-
    Ela é obviamente a companhia deste homem horroroso, que está deixando a maior
    parte do jantar no chão do castelo, neste exato momento.
  name: uma dama
  vnum: '010110210212'
- description: Um homem com um violino se curva com vigor ao tocar seu instrumento.
  keywords:
  - artista
  - homem
  long_desc: |-
    Ele é velho, com pés de galinha no canto de seus olhos, que ele estica toda
    vez que dá uma nota mais alta.
  name: um artista
  vnum: '010110210213'
- description: Um cozinheiro trabalha na cozinha, mantendo a comida fresca e saborosa.
  keywords:
  - cozinheiro
  long_desc: |-
    Ele e seus ajudantes parecem mais do que satisfeitos por fazer o que estáo
    fazendo pelo Senhor e pela Senhora.
  name: um cozinheiro
  vnum: '010110210214'
- description: O garoto do estábulo sorri para você, procurando por seu cavalo.
  keywords:
  - garoto
  - estábulo
  long_desc: Ele não diz nada, apenas o olha com curiosidade, procurando por sua montaria.
  name: o garoto do estábulo
  vnum: '010110210215'
- description: Um vendedor de cerveja está deitado na cama, roncando bastante. ZZZzzzZZZzzz
  keywords:
  - vendendor
  - cerveja
  long_desc: |-
    Ele parece ter provado bastante de seu próprio produto noite passada e agora
    dorme como uma pedra.
  name: um vendedor de cerveja
  vnum: '010110210216'
- description: Fortuna, a necromante, espera pacientemente pelo retorno da Senhora.
  keywords:
  - fortuna
  - necromante
  long_desc: |-
    Parece que a Senhora é grande apreciadora da força necromante e dispõe dos
    serviços desta bela jovem que apesar da idade, aparenta grandes poderes.
  name: Fortuna, a necromante
  vnum: '010110210217'
- description: |-
    Dominum, o curandeiro do castelo, descansa em uma cama, lendo um livro de
    magias.
  keywords:
  - dominum
  - curandeiro
  long_desc: Ele sorri para vocé quando você entra, o convidando a entrar e se sentar.
  name: Dominum, o curandeiro
  vnum: '010110210218'
