- description: A Estátua do Guardião dos Clans está aqui, parecendo ser realmente
    viva.
  keywords:
  - grifo
  - guardiao
  - estatua
  - guardião
  - estátua
  long_desc: |-
    O enorme Grifo é recoberto por escamas amarelo-almiscarado e seus
    pêlos são totalmente marrons.  Um imenso par de asas nas costas, com
    penas brancas e cinzas, envergadas ao máximo.  Suas quatro patas estão
    fincadas no chão e seus olhos atentos estão voltados para você, seguindo
    atentamente seus passos.  Sua cauda longa balança, como se estivesse
    impaciente.  Ei! Espere ai! Sua cauda está balançando?? O Grifo é real,
    está vivo e não parece disposto a conversar muito!
  name: o Grifo Guardião
  vnum: '010100400400'
- description: Uma jovem linda e sorridente lhe dá as boas-vindas.
  keywords:
  - Hemengarda
  - secretaria
  - secretária
  long_desc: |-
    Extremamente simpática e sorridente, esta jovem mulher parece ser muito
    eficiente em sua profissão.  Incansável, anda de um lado para o outro,
    sem deixar de sorrir um único instante, o que parece indicar, que ela está
    bastante feliz com suas tarefas.  "Que linda jovem!"...É o que você pensa ao
    olhar para ela, esta jovem na flor da idade, com lindos olhos azuis e longos
    cabelos dourados.   Você se encanta ao ouvi-la dizer: "Olá..."  Seu traje
    elegante e discreto, revela o caráter firme e sólido de alguém, que mesmo
    estando em serviço, continua sereno e feliz.
  name: Hemengarda, a secretária ocupada
  vnum: '010100400401'
