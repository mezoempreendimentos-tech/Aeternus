- description: Uma criança gnomo está brincando por aqui.
  keywords:
  - crianca
  - gnomo
  long_desc: |-
    O pequenino jovem rústico possui uma aparência tão inocente brincando com o
    seu bumerangue que a única coisa que você sente vontade de fazer é carrega-lo
    no colo e abraça-lo.
  name: uma criança gnomo
  vnum: '010101601600'
- description: Uma mulher gnomo está parada aqui, tentando parecer maravilhosa.
  keywords:
  - mulher
  - gnomo
  long_desc: |-
    A mulher é baixinha, pele áspera, mas ela age como se fosse uma mulher mil
    vezes mais bonita. Ela começa a parecer atraente para você...
  name: uma mulher gnomo
  vnum: '010101601601'
- description: Um homem gnomo está andando por aqui, a caminho do seu trabalho.
  keywords:
  - homem
  - gnomo
  long_desc: |-
    Este é o clássico exemplo de um gnomo. Ele aparenta ser pequeno e frágil e
    ao mesmo tempo, uma criatura extremamente inteligente que poderia surpreender
    você.
  name: um homem gnomo
  vnum: '010101601602'
- description: Um cientista vaga por aí, perdido em profundos pensamentos.
  keywords:
  - gnomo
  - cientista
  long_desc: |-
    Você vê um gnomo que está completamente distraído com alguma invenção que ele
    está prestes a criar. Seu cabelo é branco, mas ele aparenta ser razoavelmente
    forte.
