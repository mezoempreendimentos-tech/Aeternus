- description: Um renomado cavaleiro o golpeia com suas luvas e lhe desafia!
  keywords:
  - cavaleiro
  - renomado
  long_desc: |-
    O cavaleiro de renome está montado sobre um cavalo de guerra.  Ele carrega
    uma lança, e você pode ver seu brasão estampado sobre o manto que cobre sua
    montaria.  As cores de sua flâmula tremulam ao vento, carregada por seu fiel
    escudeiro.
  name: o renomado cavaleiro
  vnum: '010117317301'
- description: Um escudeiro está aqui, trazendo um recado de seu senhor.
  keywords:
  - escudeiro
  long_desc: |-
    O escudeiro está aqui em uma missão para seu senhor.  Vestindo trapos mal
    cheirosos, seu olhar e gestos aparentam pressa.
  name: o escudeiro
  vnum: '010117317302'
- description: Um cavaleiro nobre olha para você de cima a baixo de sua montaria.
  keywords:
  - cavaleiro
  - nobre
  long_desc: |-
    O cavaleiro nobre veste uma armadura completa.  Montado em seu cavalo,
    carrega uma grande lança.
  name: o cavaleiro nobre
  vnum: '010117317303'
- description: O rei Arthur, sentado em seu trono, espera o retorno do Graal.
  keywords:
  - arthur
  - rei
  long_desc: |-
    O Rei Arthur é um homem truculento de barbas negras.  Sua armadura possui um
    brasão com o sinal de um dragão dourado.  Em sua estranha bainha, carrega
    Excalibur.
  name: Rei Arthur
  vnum: '010117317304'
- description: Sir Benlad golpeia-o com suas luvas e te desafia!
  keywords:
  - benlad
  - cavaleiro
  long_desc: |-
    Sir Benlad veste sua famosa armadura verde, conhecida principalmente por ser
    impenetrável a armas comuns.  Como arma, carrega um imenso machado de
    guerra.
  name: Sir Benlad de Haudtesert
  vnum: '010117317305'
- description: Sir Galahad, campeão da cavalaria, filho de Lancelot e Elaine, está
    aqui.
  keywords:
  - galahad
  - cavaleiro
  long_desc: |-
    Sir Galahad veste sua armadura alva e, como arma, usa uma espada de duas
    mãos (foi Sir Galahad quem completou a busca ao Graal na saga Arturiana).
  name: Sir Galahad
  vnum: '010117317306'
- description: 'Um cavaleiro vestindo uma armadura negra lhe diz: "NINGUÉM DEVE PASSAR"'
  keywords:
  - negro
  - cavaleiro
  long_desc: |-
    O Cavaleiro Negro veste uma armadura da cor do mais nobre ébano e usa um
    elmo com viseira em sua cabeça.  Ele permanece descansando sobre sua espada
    de duas mãos.
  name: o cavaleiro negro
  vnum: '010117317307'
- description: Um cavaleiro em uma armadura de várias cores está aqui.
  keywords:
  - gareth
  - cavaleiro
  - beumains
  long_desc: |-
    Sir Gareth, irmão mais novo de Gawaine e de Gaheris, e também conhecido como
    Beaumains, veste com orgulho sua armadura e seu escudo de várias cores.  Ele
    espera ansiosamente pela oportunidade de salvar uma donzela em apuros.
  name: Sir Gareth
  vnum: '010117317308'
- description: Sir Garlon, o cavaleiro invisível, está esperando aqui.
  keywords:
  - garlon
  - cavaleiro
  long_desc: |-
    Sir Garlon (o vilão desprezível) está escondido aqui.  Seu poder de
    invisibilidade lhe foi concedido pela bruxa dos pântanos, no intuito de
    favorecer o progresso do mal.
  name: Sir Garlon
  vnum: '010117317309'
- description: Sir Gawaine, o forte, está em uma missão de vingança!
  keywords:
  - gawaine
  - cavaleiro
  long_desc: |-
    Sir Gawaine, o primo ruivo de Arthur, está montado, totalmente paramentado,
    e carregando sua grande espada Galantine.
  name: Sir Gawaine
  vnum: '010117317310'
- description: Sir Lamorak levanta sua espada bastarda enquanto te analisa.
  keywords:
  - lamorak
  - cavaleiro
  long_desc: |-
    Sir Lamorak, filho do Rei Pellinore, amante da Rainha Morgause, vencedor das
    doze de Morgana das Fadas e inimigo do Sir Gawaine, está totalmente
    equipado.
  name: Sir Lamorak
  vnum: '010117317311'
- description: Sir Lancelot, campeão da Távola Redonda, sorri para você.
  keywords:
  - lancelot
  - cavaleiro
  long_desc: |-
    Sir Lancelot, montando seu corcel branco, usa uma lustrosa armadura de aço.
    Sua viseira está levantada, e sua lança erguida em saudação a você.
  name: Sir Lancelot do Lago
  vnum: '010117317312'
- description: O poderoso Merlin está aqui murmurando sobre um livro.
  keywords:
  - merlin
  - mago
  long_desc: |-
    Merlin, filho de uma feiticeira e um dêmonio, profeta de Camelot, está
    vestido em um chambre cor de terra e carrega um bastão retorcido.  Sua longa
    e macia barba branca não oculta as bochechas rosadas e seus brilhantes olhos
    azuis.
  name: Merlin
  vnum: '010117317313'
- description: Uma bela mulher com um sorriso convidativo acena para você!
  keywords:
  - morgana
  - mulher
  long_desc: |-
    Morgana das Fadas, feiticeira maligna, algoz de Camelot, esbravejou ao
    perceber que você espiou através de seu disfarce.  Ela está vestindo roupões
    de seda, que escondem um pouco seu feio e detestável corpo retorcido.
  name: Morgana das Fadas
  vnum: '010117317314'
- description: O Rei Pellinore está aqui procurando pela Besta da Busca.
  keywords:
  - pellinore
  - rei
  long_desc: |-
    O Rei Pellinore conta a você que sua família tem procurado pela Besta da
    Busca já há várias gerações, e pergunta se você a viu.  Pellinore já passou
    da meia idade, mas ainda é um vigoroso combatente.
  name: Rei Pellinore
  vnum: '010117317315'
- description: |-
    Uma medonha criatura parda com um longo pescoço e patas de leão está aqui,
    distraindo-se com um fêmur.
  keywords:
  - besta
  - busca
  - criatura
  long_desc: An undefined string.
  name: a Besta da Busca
  vnum: '010117317316'
- description: Sir Tristão sorri afetuosamente para você.
  keywords:
  - tristao
  long_desc: |-
    Sir Tristão, pretendente de Isolda, é considerado por muitos como o segundo
    mais habilidoso com os braços, ficando atrás apenas de Lancelot.  Ele veste
    uma armadura e carrega uma espada de duas mãos.
  name: Sir Tristão de Lyoness
  vnum: '010117317317'
- description: |-
    Um garoto em uma armadura dourada sorri timidamente para você e lhe
    golpeia com sua pequena lança!
  keywords:
  - mordred
  - garoto
  long_desc: |-
    Mordred, filho bastardo de Arthur e Morgana, veste sua encantada armadura
    dourada e sua lança profana.
  name: Mordred
  vnum: '010117317318'
- description: Um renomado cavaleiro encantado ataca você duramente!
  keywords:
  - encantado
  - cavaleiro
  - renomado
  long_desc: |-
    O cavaleiro usa armadura enferrujada e carrega uma espada torta.  Tem um
    aspecto um tanto desalinhado para alguém como ele, e seus olhos se fixam
    vagamente em você!
  name: o Cavaleiro encantado de renome
  vnum: '010117317319'
- description: Um graduado cavaleiro encantado ataca voce duramente!
  keywords:
  - encantado
  - cavaleiro
  - graduado
  long_desc: |-
    Um graduado cavaleiro encantado está aqui em sua armadura enferrujada.  Seus
    olhos são vazios, sua espada quebrada e ele está muito desalinhado.
  name: o graduado Cavaleiro Encantado
  vnum: '010117317320'
- description: Uma dama em espera pestaneja para você!
  keywords:
  - dama
  - espera
  long_desc: |-
    A dama em espera aconchega-se mais a você, pressionando-lhe a contar os
    detalhes de sua última campanha de guerra.  Ela está vestindo um longo
    vestido e tem uma coroa de flores enfeitando seus cabelos.
  name: uma dama em espera
  vnum: '010117317321'
- description: |-
    Uma rainha com cabelos da cor das asas de corvo finge não lhe ver por detrás
    de seu leque.
  keywords:
  - rainha
  - guinevere
  long_desc: |-
    Guinevere conta a você a triste história sobre seu proibido amor com
    Lancelot.
  name: Rainha Guinevere
  vnum: '010117317322'
- description: Um escudeiro encantado encontra-se imóvel aqui.
  keywords:
  - escudeiro
  - encantado
  long_desc: |-
    O escudeiro encantado veste várias peças de roupa de couro, em um total
    estado de desordem.
  name: o Escudeiro Encantado
  vnum: '010117317323'
- description: Um cavaleiro em uma longa e esvoaçante capa branca balança uma maça
    aqui.
  keywords:
  - barant
  - rei
  - apres
  - cavaleiro
  long_desc: |-
    Barant Les Apres, o Rei dos Cem Cavaleiros está aqui.  Barant usa um capa
    branca e carrega uma maça presa a uma corrente.  Enquanto balança sua arma,
    sorri maliciosamente para você.
  name: Barant Les Apres
  vnum: '010117317324'
- description: Um bobo em roupas coloridas salta aqui!
  keywords:
  - bufao
  - dagonet
  - bobo
  long_desc: |-
    Dagonet, o bobo da corte de Arthur, é mestre em sua arte.  Ele dança sobre
    suas mãos enquanto faz malabarismo com um jogo de facas.  Você tem a
    impressão de que ele poderia se sair bem em uma briga.
  name: Dagonet
  vnum: '010117317325'
- description: Um cavaleiro com um capacete em forma de lobo gargalha com alegria!
  keywords:
  - cavaleiro
  - turquine
  long_desc: |-
    Turquine veste uma pesada armadura de elos de metal e um elmo de lobo.  Sua
    voz é cortante como um chicote, e seus olhos dardejantes rapidamente olham
    para a esquerda e direita.
  name: Turquine
  vnum: '010117317326'
- description: Um cavaleiro vestido com uma resplandecente armadura vermelha encara
    você!
  keywords:
  - perimones
  - cavaleiro
  long_desc: |-
    Perimones, o cavaleiro vermelho, tem barba e bigode ruivos.  Ele é um
    pequeno homem atarracado.  Sua armadura de rubi resplandece na luz solar, e
    ele usa o lenço vermelho de seda de Galenvine em sua manga.
  name: Perimones
  vnum: '010117317327'
- description: Uma donzela em perigo está aqui, gritando por socorro!
  keywords:
  - donzela
  - dama
  - mulher
  - angustiada
  long_desc: |-
    A donzela em perigo foi maldosamente atacada pelos rufiões.  Ela está com as
    mãos amarradas em suas costas.  Seus finos trajes estão sujos e
    esfarrapados.
  name: uma donzela em perigo
  vnum: '010117317328'
- description: Um nobre está parado aqui com toda a sua elegância.
  keywords:
  - nobre
  long_desc: |-
    O nobre veste o melhor algodão e lã disponíveis.  Ricas correntes o adornam,
    e uma bolsa que parece ser bastante pesada.  Ele aparenta querer ir a algum
    lugar.
  name: um nobre
  vnum: '010117317329'
- description: Um serviçal sujo se arrasta ao longo daqui.
  keywords:
  - serviçal
  long_desc: |-
    O serviçal veste trapos, cheira mal, e você até imagina poder ver piolhos
    nele.
  name: um serviçal
  vnum: '010117317330'
- description: Um mercador de roupas brilhantes oferta suas mercadorias para voce!
  keywords:
  - mercador
  long_desc: |-
    O mercador veste uma túnica brilhante para chamar atenção e expor suas
    mercadorias.
  name: um mercador
  vnum: '010117317331'
- description: Um monge está aqui murmurando em latim.
  keywords:
  - monge
  long_desc: |-
    O monge está vestindo um manto marrom com um capuz.  Ele amarrou suas
    vestimentas com um pedaço de corda.  O alto de sua cabeca é raspado à
    maneira dos fransciscanos.
  name: um Monge
  vnum: '010117317332'
- description: Um trovador está aqui, tocando uma alegre melodia.
  keywords:
  - trovador
  long_desc: O trovador, vestido com roupas de cores festivas, está tocando um bandolim.
  name: um trovador
  vnum: '010117317333'
- description: Um bardo se encontra aqui, entoando uma suave balada.
  keywords:
  - bardo
  long_desc: |-
    O bardo está vestindo polainas de seda, um colete de couro e uma brilhante
    camisa laranja.
  name: um bardo
  vnum: '010117317334'
- description: Um artista se encontra aqui, fazendo acrobacias com muita coragem!
  keywords:
  - artista
  long_desc: |-
    O artista esta virando estrelas e dando cambalhotas, numa sárie de
    vertiginosas acrobacias.
  name: um artista
  vnum: '010117317335'
- description: Um criado passa apressado.
  keywords:
  - criado
  long_desc: O criado segura uma travessa de comida quente, que parece estar deliciosa.
  name: um criado
  vnum: '010117317336'
- description: Um gigantesco demônio de escamas negras chegou para devorar sua alma!
  keywords:
  - demonio
  long_desc: |-
    O demônio mede 6 metros de altura, tem duas cabeças, o corpo coberto por
    escamas negras, a bocacheia de dentes afiados, 4 braços com garras cortantes
    como navalhas.  As cabeças são semelhantes à de morcegos, e seus olhos
    negros parecem estar fixos em você.  Quando respira, o chão que você pisa
    parece tremer, e o calor de sua baforada chega a lhe queimar.  É esse o
    demônio que ri de você em todos os seus pesadelos.  Merlin prendeu esse
    demônio aqui para usar seu poder na fabricação de itens mágicos, mas ele
    escapou algumas vezes, permitindo que distribuisse alguns dos artefatos que
    contribuiram na queda de Camelot (Morgan, lider dos Pict).
  name: um gigantesco demônio de escamas negras
  vnum: '010117317337'
- description: Iron Jack, o armoreiro de Camelot está aqui.
  keywords:
  - jack
  - iron
  long_desc: |-
    Iron Jack, que veste seu avental de forjador e polainas de couro, e tem os
    músculos dos braços bem definidos.
  name: Iron Jack
  vnum: '010117317338'
- description: Stirrup, o mestre de estrebarias de Camelot se encontra aqui.
  keywords:
  - stirrup
  - mestre
  long_desc: |-
    Stirrup é um homem pequeno, vestindo um gibão de couro e cheirando aos
    estábulos.
  name: Stirrup
  vnum: '010117317339'
- description: Um cavalo de montaria está aqui.
  keywords:
  - cavalo
  - montaria
  long_desc: |-
    O cavalo de montaria foi selado com arreios brilhantes.  Seus membros bem
    desenvolvidos parecem capazes de alcançar altas velocidades.
  name: um cavalo de montaria
  vnum: '010117317340'
- description: Um mediano cavalo de guerra está amarrado aqui.
  keywords:
  - cavalo
  - mediano
  long_desc: O mediano cavalo de guerra possui rédeas pesadas e estribos de couro.
  name: um mediano cavalo de guerra
  vnum: '010117317341'
- description: |-
    Um pesado cavalo de guerra raspa o chão com uma das patas e bufa em
    preparação para batalha!
  keywords:
  - cavalo
  - pesado
  long_desc: O pesado cavalo de guerra possui arreios de correntes e mede 17 palmos.
  name: um pesado cavalo de guerra
  vnum: '010117317342'
- description: Um invasor saxão está aqui, pronto para usar sua cabeca como trofeu!
  keywords:
  - invasor
  - saxao
  long_desc: |-
    O invasor saxão carrega seu sax, *sim, realmente é um novo nome para uma
    arma*, e está vestido com várias peles.
  name: um invasor saxão
  vnum: '010117317343'
- description: Uma escrava se encontra aqui, chorando pelas batalhas.
  keywords:
  - escrava
  long_desc: |-
    A escrava está suja e desmazelada, mas os vestígios de seu passado a fazem
    resistir.
  name: uma escrava
  vnum: '010117317344'
- description: Um chefe Saxão se encontra aqui, condunzindo seus invasores para a
    batalha!
  keywords:
  - chefe
  - saxao
  - render
  long_desc: |-
    Render, o chefe saxão (você sabe seu nome por causa do alarido geral), está
    envolto em despojos de guerra.  Tudo aquilo que você imaginar nele está
    coberto por piolhos.
  name: um chefe saxão
  vnum: '010117317345'
- description: |-
    Um guarda da fronteira norte se encontra aqui, impassivelmente bloqueando a
    fronteira contra intrusos.
  keywords:
  - guarda
  - fronteira
  - norte
  long_desc: |-
    O guarda da fronteira norte veste uma armadura de elos metálicos e está
    armado com uma espada comum.
  name: um guarda da fronteira norte
  vnum: '010117317346'
- description: |-
    O comandante de posto mais avançado do norte se encontra aqui, seguro no
    respeito de seus homens.
  keywords:
  - comandante
  - avancado
  - norte
  long_desc: |-
    O comandante superior é um endurecido, grisalho veterano possuidor da
    astúcia de quem passou a vida conduzindo homens em batalhas sem fim.
  name: o comandante de posto mais avançado do norte
  vnum: '010117317347'
- description: |-
    Um membro de um clã escocês está aqui, pronto para confiscar sua mulher e
    seu uísque!
  keywords:
  - membro
  - escoces
  long_desc: |-
    O membro de um clã escocês esta usando um kilt, sandálias de couro, e cobre
    seus ombros com uma longa tira de tecido.  Ele empunha um bonito espadão
    escocês de aproximadamente 4' de tamanho.
  name: um membro de um clã escocês
  vnum: '010117317348'
- description: |-
    O Chefe do clã escocês se encontra aqui, confiscando as mulheres e o uísque
    dos membros de seu clã!
  keywords:
  - chefe
  - cla
  - escoces
  long_desc: |-
    O Chefe do clã escocês avança sobre você.  Ele tem a aparência de quem
    facilmente pegaria uma árvore e a sacudiria inteira, de uma ponta a outra
    para depois atira-la longe, com um dos lados apontando em direção oposta a
    ele.  Ele tem a aparência de quem levanta um fardo pesado de feno com um
    garfo a mais de 20 pés acima do solo.  Ele tem a aparência de quem pode
    tomar goela abaixoum barril de cerveja e ainda encontrar espaço para beber
    seu uísque.  Ele tem a aparência de quem...
  name: o Chefe do clã escocês
  vnum: '010117317349'
- description: Um servo atarefado está aqui, cultivando os campos para a colheita.
  keywords:
  - servo
  - atarefado
  long_desc: O servo segura um instrumento de fazenda e usa trapos para se cobrir.
  name: um servo atarefado
  vnum: '010117317350'
- description: Um invasor Anglo está aqui, incendiando cabanas e violentando mulheres!
  keywords:
  - invasor
  - anglo
  long_desc: |-
    O invasor Anglo é alto, com cabelos loiros, e usa um elmo de chifres.  Ele
    carrega um escudo e seu Anglo, uma angulosa lâmina semelhante a uma espada.
    Sua armadura é parcialmente de couro.
  name: um invasor Anglo
  vnum: '010117317351'
- description: O chefe Anglo se encontra aqui, liderando o massacre!
  keywords:
  - chefe
  - anglo
  long_desc: |-
    O chefe Anglo é um homem gigantesco, coberto de sangue, que ri
    estrondosamente a cada morte.
  name: o chefe Anglo
  vnum: '010117317352'
- description: Uma unidade de cavalaria está aqui, flanqueando as linhas inimigas.
  keywords:
  - cavalaria
  - unidade
  long_desc: |-
    A unidade de cavalaria consiste em cerca de 30 cavaleiros montados em
    medianos cavalos de guerra.
  name: a unidade de cavalaria
  vnum: '010117317353'
- description: Uma unidade de infantaria está aqui, lutando as hordas de Picts.
  keywords:
  - unidade
  - infantaria
  long_desc: |-
    A unidade de infantaria tem aproximadamente 50 escudeiros e servos armados
    com lanças.
  name: a unidade de infantaria
  vnum: '010117317354'
- description: Uma horda de Picts se encontra aqui, lutando com as tropas de Camelot.
  keywords:
  - horda
  - pict
  - picts
  long_desc: |-
    A horda de Picts consiste em cerca de 500 soldados pobremente armados e
    protegidos.
  name: a horda de picts
  vnum: '010117317355'
- description: O líder dos Picts se encontra aqui, retirando-se da batalha.
  keywords:
  - lider
  - pict
  long_desc: |-
    O líder dos Picts está coberto por tinta azul, que lhe dá um amedrontador ar
    demoníaco, e é intensificado por seu elmo de chifres de rena.
  name: o líder dos Picts
  vnum: '010117317356'
- description: Persante de Inde está aqui, guiando as tropas de Camelot.
  keywords:
  - persante
  - cavaleiro
  long_desc: |-
    Persante é chamado de "o cavaleiro azul" devido a sua armadura de um azul
    brilhante.  Ele monta seu belo corcel, e está tremulando seu galhardete
    azul.
  name: Persante de Inde
  vnum: '010117317357'
- description: Dodinas le Savage está aqui, defendendo o centro da linha!
  keywords:
  - dodinas
  - cavaleiro
  long_desc: |-
    Dodinas é um furacão em armas e artes marciais, pressentindo tudo que se
    aproxima.  Ele está montado sobre seu famoso corcel Rue.
  name: Dodinas le Savage
  vnum: '010117317358'
- description: Lionel se encontra aqui, desmontado, e lutando por sua vida!
  keywords:
  - lionel
  - cavaleiro
  long_desc: |-
    Lionel está coberto por sangue, e caminha meio atordoado.  Parece que vai
    cair.
  name: Lionel
  vnum: '010117317359'
- description: Gaheris (irmão de Gawaine) se encontra aqui, derrubando os invasores.
  keywords:
  - gaheris
  - cavaleiro
  long_desc: |-
    Gaheris tem longos cabelos ruivos, e monta um garanhão cinzento.  Ele está
    extremamente furioso com os anglos e procura um caminho para chegar ao
    chefe.
  name: Gaheris
  vnum: '010117317360'
- description: |-
    O comandante de posto mais avançado do sul esta aqui, seguro no respeito de
    seus homens.
  keywords:
  - comandante
  - avancado
  - sul
