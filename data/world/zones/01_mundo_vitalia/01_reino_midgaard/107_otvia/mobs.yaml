  name: um ancião otaviano
  vnum: '010110710716'
- description: Yasmim, a líder dos otavianos, está aqui, trazendo em seus olhos união
    e paz.
  keywords:
  - yasmim
  - líder
  - otaviana
  long_desc: |-
    Yasmim é a líder dos otavianos e representante de seu povo na tríade da
    justiça.  Sua pele é suave e de cor azul, seus cabelos são negros e seus
    olhos são cintilantes.  Yasmim é generosa e pacífica, lidera seu povo com
    justiça e união, diferente de alguns líderes que governam com terror e
    trevas.
  name: Yasmim, a líder dos otavianos
  vnum: '010110710717'
- description: Um grifo dourado está aqui, com sua beleza e imponência.
  keywords:
  - grifo
  - dourado
  long_desc: |-
    O Grifo dourado é uma das criaturas mais belas de toda Vitália.  Suas penas
    e pêlos dourados refletem os raios do sol que atingem seu corpo.  Suas asas
    são enormes e suas garras poderiam retalhar em pedaços um gigante.  Uma
    antiga lenda vitaliana diz que: Dois jovens que juravam amor eterno fugiram
    por causa dos seus pais que pertenciam a famílias rivais: os armilianos e
    diomirianos, e nunca mais foram visto.  Será que os grifos são a chave para
    este mistério.
  name: um grifo dourado
  vnum: '010110710718'
- description: O Cedro gigante está aqui, fingindo ser uma árvore normal.
  keywords:
  - cedro
  - gigante
  long_desc: |-
    O cedro gigante é uma criatura centenária, sua pele é extremamente
    resistente e seu mal humor é incrível.  Se o dia estiver chuvoso saia de
    perto dele.
  name: o cedro gigante
  vnum: '010110710719'
- description: Um gumbly está aqui, olhando para você pedindo carinho.
  keywords:
  - gumbly
  long_desc: |-
    Os gumblys são pequeninos seres que vivem na floresta mística boreal e foram
    domesticados e trazidos para Otávia como animais de estimação.  São
    carinhosos e adoram crianças.
  name: um gumbly
  vnum: '010110710720'
- description: O guardião do fogo está aqui, protegendo com muito ardor sua fonte
    de vida.
  keywords:
  - guardião
  - fogo
  long_desc: |-
    O guardião do fogo é um ser vitaliano, que possui toda sua pele coberta por
    chamas de fogo.  É por essa razão que muitos dizem que os diomirianos são
    filhos do guardião do fogo.  Seus olhos possuem um brilho azul que fascina
    qualquer pessoa.  Ele defenderá com muito ardor, fervor e paixão a essência
    de sua vida.
  name: o guardião do fogo
  vnum: '010110710721'
- description: O guardião da água está aqui, protegendo a essência da sua vida.
  keywords:
  - guardião
  - água
  long_desc: |-
    O guardião da água é um ser vitaliano, que possui um corpo quase
    transparente.  A forma do seu corpo se molda como a mente dele quiser, por
    isso numa batalha contra ele, é muito difícil de atingi-lo.  Seus olhos são
    dois pontos vermelhos que brilham em contraste com toda sua limpidez.
  name: o guardião da água
  vnum: '010110710722'
- description: O guardião do ar está aqui, protegendo seu elemento vital.
  keywords:
  - guardião
  - ar
  long_desc: |-
    O guardião do ar é um ser vitaliano, que não possui forma definida.  Seu
    corpo pode ser de um grande cavaleiro como de uma hora para outra ele tomar
    outra forma.  Contudo só a forma é modificada.  O guardião é quase
    imperceptível aos olhos humanos, apenas com magia os mortais conseguem
    observá-lo.
  name: o guardião do ar
  vnum: '010110710723'
- description: O guardião da terra está aqui, protegendo com muito fervor sua fonte
    de vida.
  keywords:
  - guardião
  - terra
  long_desc: |-
    O guardião da terra é um ser vitaliano, que possui uma resistência muito
    grande e dificilmente encontrado por todas as terras sagradas de Vitália.
    Seu corpo é constituído por terra e rochas resistentes, seus são dois pontos
    de luz brancos.  O guardião da terra protegerá o seu elemento de todos os
    males, principalmente da infertilidade.
  name: o guardião da terra
  vnum: '010110710724'
- description: O guardião do quinto elemento está aqui, semeando o amor em seu coração.
  keywords:
  - guardião
  - quinto
  long_desc: |-
    O guardião do amor é um ser vitaliano, que diferente dos outros guardiões
    não possui tal força ou resistência.  Suas batalhas são ganhas através do
    olhar e da conversar, que atingem diretamente no coração e nos sentimentos
    das pessoas.
  name: o guardião do quinto elemento
  vnum: '010110710725'
- description: Um pássaro azul está aqui, cantando sem parar uma melodia maravilhosa.
