- description: Um cidadão otaviano está aqui, olhando para você pacificamente.
  keywords:
  - cidadão
  - otaviano
  long_desc: |-
    Os cidadões otavianos possuem uma pele suave de cor azul, seus cabelos são
    negros e seus olhos são  cintilantes.  São fortes e altos, contudo quando
    estáo presentes em algum local semeiam a paz e a fraternidade dos povos.  Os
    otavianos são por natureza pacificadores e conselheiros, principalmente
    quando existe conflitos entre povos vitalianos.
  name: um cidadão otaviano
  vnum: '010110710701'
