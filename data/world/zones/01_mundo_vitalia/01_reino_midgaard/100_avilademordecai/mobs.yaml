- description: |-
    Um homem está aqui, fazendo qualquer que seja a tarefa que Mordecai o
    mandou fazer.
  keywords:
  - aldeão
  - homem
  long_desc: |-
    O aldeão se assemelha a qualquer outro homem que você conheça em qualquer
    rua de Vitália.
  name: o aldeão
  vnum: '010110010000'
- description: |-
    você vê uma magra aldeã parada aqui parecendo doente, pálida e patética
    como todo o Inferno.
  keywords:
  - magra
  - mulher
  - aldeã
  long_desc: |-
    A mulher poderia provavelmente ser bonita, se não fosse suas costelas
    aparecendo pelo mal fabricado e raquítico vestido.
  name: a magra aldeâ
  vnum: '010110010001'
- description: Caspan imediatamente reconhece que você não é um dos cidadãos de Mordecai
    e ataca!
  keywords:
  - tenente
  - caspan
  - soldado
  long_desc: |-
    Forte, alto, e poderoso como o Inferno, esse homem pode provavelmente
    rasgar você de membro a membro.
  name: Tenente Caspan
  vnum: '010110010002'
- description: Penelope se encontra aqui, bonita como uma Deusa.
  keywords:
  - penelope
  long_desc: |-
    Com algumas pequenas gorduras bem localizadas, Penelope aparenta saber
    alguns truques com cartas.
  name: Penelope
  vnum: '010110010003'
- description: Um dos soldados de Mordecai marcha aqui, atento nos seus serviços.
  keywords:
  - soldado
  - mordecai
  long_desc: |-
    Vestido em velhas roupas de combate, esses soldados apresentam um
    angustiante conjunto.
  name: o soldado
  vnum: '010110010004'
- description: |-
    Uma pequena menina de doze anos se encontra aqui, realizando pequenos
    furtos, como ordenado por Mordecai.
  keywords:
  - pequena
  - aldeia
  - ladra
  - menina
  long_desc: |-
    A garota aparenta estar fraca e abatida. Quem sabe você não deveria ter
    pena dela?
  name: a pequena ladra
  vnum: '010110010005'
- description: Uma criança coberta por desagradáveis trapos passa por aqui.
  keywords:
  - pálida
  - criança
  - trapos
  long_desc: |-
    A criança, vestida nos mais sujos trapos, olha para você com seus olhos
    inocentes, e sorri um sorriso sem dentes.
  name: a pálida criança em trapos
  vnum: '010110010006'
- description: Uma mulher grávida está sentada aqui, comendo coxa de galinha com mel.
  keywords:
  - grávida
  - mulher
  long_desc: |-
    A mulher olha para você com esperança e pergunta,
    "Trouxe alguma torta?!?"
  name: a mulher grávida
  vnum: '010110010007'
- description: Um cachorro com três patas passa mancando por você.
  keywords:
  - três
  - patas
  - cachorro
  long_desc: |-
    Esse pulguento, abatido, quase morto de fome cachorro olha
    tristemente para você e continua mancando em frente.
  name: o cachorro com três patas
  vnum: '010110010008'
- description: |-
    Uma bruxa sem dente se encontra aqui, com um grande sorriso, tentando
    parecer atraente.
  keywords:
  - bruxa
  - dente
  long_desc: |-
    Quando a bruxa vê que você demonstra interesse, seu sorriso fica maior.
    Ela lentamente levanta, estica suas pernas e pisca sugestivamente.
  name: a bruxa sem dente
  vnum: '010110010009'
- description: Mordecai está aqui, orgulhoso, desafiador, e sujo.
  keywords:
  - mordecai
  long_desc: Mordecai é uma figura ameaçadora. O verdadeiro Senhor dos Mendigos.
  name: Mordecai
  vnum: '010110010010'
- description: Uma galinha olha para você, com nenhuma preocupação na vida além de
    ciscar.
  keywords:
  - andarilha
  - galinha
  long_desc: As vezes você se pergunta se sua vida seria melhor se você fosse uma
    galinha.
  name: a galinha
  vnum: '010110010011'
- description: Uma mulher está aqui, se coçando por causa de piolhos.
  keywords:
  - mulher
  - piolhente
  long_desc: A mulher se coça freneticamente enquanto cata piolhos de sua cabeça.  Ela
    não parece se incomodar que a vejam assim.
  name: a mulher piolhenta
  vnum: '010110010012'
- description: Um pequeno ladrãozinho está aqui escondido, contando suas moedas.
  keywords:
  - orfão
  - escondido
  - pequeno
  - ladrãozinho
  - moleque
  long_desc: |-
    As mãos de mendigo e os astutos olhos dão a esse pequeno moleque uma
    aparência de criminoso. Ele está vasculhando a sua bolsa inspecionando o
    que roubou. Talvez algo seja seu.
  name: o pequeno ladrãozinho
  vnum: '010110010013'
- description: Um velho homem de mal humor está aqui, reclamando do clima.
  keywords:
  - homem
  - velho
  long_desc: Ele é um homem velho e mal-humorado. E só.
  name: o velho homem de mal humor
  vnum: '010110010014'
