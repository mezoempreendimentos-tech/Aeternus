- description: Um sacerdote está aqui, expressando algumas palavras.
  keywords:
  - sacerdote
  long_desc: |-
    Os olhos do imponente sacerdote brilham com uma estranha luz, parecendo que
    sugam sua energia.  Você se sente cada vez mais fraco ao encarar esse homem
    de aparência sombria.
  name: um sacerdote
  vnum: '010108108101'
- description: Um cidadão egípcio está em pé aqui.
  keywords:
  - cidadao
  - egipcio
  long_desc: |-
    O cidadão é apenas mais um dos humildes homens que servem fielmente ao
    faraó.
  name: o cidadão egípcio
  vnum: '010108108102'
- description: Uma bela jovem está aqui tentando agradar a todos.
  keywords:
  - esposa
  - farao
  - bela
  - jovem
  long_desc: |-
    Ela é uma bela jovem que, ao lado das outras esposas do faraó, vive apenas
    em função de seu marido, perdendo assim os melhores anos de sua vida.  Você
    nota um estranho brilho em seus olhos...
  name: a esposa do faraó
  vnum: '010108108103'
- description: Um escravo está aqui trabalhando arduamente.
  keywords:
  - escravo
  long_desc: |-
    O escravo aparenta não se alimentar há muito tempo.  Suas costas nuas,
    curvadas como se carregassem um grande peso, são cheias de cicatrizes e
    feridas, todas devido às chicotadas.  Sua face é totalmente marcada pelo
    tempo e pelo cansaço.
  name: o escravo
  vnum: '010108108104'
- description: Um camponês está aqui a procura de trabalho.
  keywords:
  - campones
  long_desc: |-
    O camponês é apenas um homem humilde que trabalha arduamente para pagar seus
    impostos.
  name: o camponês
  vnum: '010108108105'
- description: Um Vizir está em pé aqui.
  keywords:
  - vizir
  long_desc: |-
    Reconhecido facilmente por ser dono de um olhar frio e ar prepotente, este é
    o homem mais importante do império.  O Vizir veste roupas ricamente
    ornamentadas, contrastando em muito com a plebe que o cerca.
  name: o Vizir
  vnum: '010108108106'
- description: Um Imakhu está aqui recolhendo impostos.
  keywords:
  - imakhu
  long_desc: Ele é mais um honrado homem do Império.
  name: o Imakhu
  vnum: '010108108107'
- description: Um Nomarca está aqui tomando conta de seu distrito.
  keywords:
  - nomarca
  long_desc: Apenas mais um barão...
  name: o Nomarca
  vnum: '010108108108'
- description: Um escriba está aqui fazendo anotações.
  keywords:
  - escriba
  long_desc: Vestindo apenas uma tanga, o escriba segue anotando tudo o que vê.
  name: o escriba
  vnum: '010108108109'
- description: Um Hemutiu está em pé aqui.
  keywords:
  - hemutiu
  long_desc: |-
    Esse simples artesão, vestido somente trapos, trabalha humildemente para os
    mais ricos.
  name: um Hemutiu
  vnum: '010108108110'
- description: Radumah está aqui observando você.
  keywords:
  - radumah
  long_desc: |-
    Ele é um homem magro de sorriso suspeito.  Você acha muito estranho o jeito
    esperançoso com que ele o olha...
  name: Radumah
  vnum: '010108108111'
- description: Sobek está aqui acariciando um pequeno animal que está em suas mãos.
  keywords:
  - sobek
  long_desc: |-
    Sobek, o deus egípcio protetor dos animais, possui cabeça de crocodilo e
    corpo humano.  Ele é, aparentemente, bastante ameaçador.
  name: Sobek
  vnum: '010108108112'
- description: Thot está em pé aqui denominando algumas coisas.
  keywords:
  - thot
  long_desc: |-
    Thot, o de cabeça de íbis, é o mensageiro dos Deuses.  Ele carrega uma
    caneta e um pergaminho com os quais escreve sobre todas as coisas desse
    mundo.
  name: Thot
  vnum: '010108108113'
- description: Seth está aqui protegendo as areias do Egito.
  keywords:
  - seth
  long_desc: |-
    Seth é o deus cuja benevolência se restringe às forças do deserto.  Assim,
    ele protege o Egito dos estrangeiros.
  name: Seth
  vnum: '010108108114'
- description: Com benevolência, Sekmet fita você.
  keywords:
  - sekmet
  long_desc: |-
    Você pode notar que, debaixo de suas vestes negras, Sekmet possui um corpo
    escultural. Sua cabeça de leoa, porém, dá-lhe uma aparencia assustadora.
  name: Sekmet
  vnum: '010108108115'
- description: Rá envolto por seus raios solares, está aqui.
  keywords:
  - ra
  - rá
  long_desc: |-
    Você está diante do Grande Deus Sol.  Seu corpo, coberto por vestes
    douradas, emana uma amarelada luz quente.
  name: Rá
  vnum: '010108108116'
- description: Hórus está sentado aqui observando a todos.
  keywords:
  - horus
  - hórus
  long_desc: |-
    Hórus, o deus com cabeça de falcão, é o protótipo sagrado do faraó. Seu
    corpo jovem é robusto e saudável, digno de um grande guerreiro.  Consigo ele
    carrega carrega a justiça e a honestidade.
  name: Hórus
  vnum: '010108108117'
- description: Hátor parece estar em outra realidade.
  keywords:
  - hator
  - hátor
  long_desc: |-
    A Deusa do Céu, Hátor, é uma bela mulher que leva sobre a cabeça o disco
    solar entre um par de chifres de vaca.  Seus costumes são... peculiares.
  name: Hátor
  vnum: '010108108118'
- description: Ptah está aqui contemplando as areias do Egito.
  keywords:
  - ptah
  long_desc: |-
    Você observa esse homem barbado com o corpo totalmente enrolado em
    bandagens, exatamente como uma múmia.  Sua cabeça está coberta por uma
    espécie de capuz, enquanto suas mãos, cruzadas na frente de seu corpo,
    seguram um Ankh e um Djed.
  name: Ptah
  vnum: '010108108119'
- description: "Ã\x8Dsis, adornada com suas jÃ³ias, estÃ¡ em pÃ© aqui."
  keywords:
  - isis
  - ísis
  long_desc: "Ã\x8Dsis Ã© uma bela mulher de meia-idade que, vestida em trajes da\
    \ mais fina lÃ£\ne linho bordados com ouro e prata, graciosamente ostenta um grande\
    \ número de\njóias."
  name: "Ã\x8Dsis"
  vnum: '010108108120'
- description: Bes está aqui com uma criança nos braços.
  keywords:
  - bes
  long_desc: |-
    Barbado, com o aspecto ao mesmo tempo selvagem e cômico de duende, Bes, o
    protetor das mulheres grávidas e das crianças, é sempre mostrado nas imagens
    egípcias de frente e não de perfil, como convencionalmente as pessoas são
    representadas no Egito.  Isso o faz se perguntar por que Bes recebe esse
    tipo de tratamento...
  name: Bes
  vnum: '010108108121'
- description: Anúbis está aqui vigiando as tumbas.
  keywords:
  - Anubis
  - anúbis
  long_desc: |-
    Anúbis, o Deus dos mortos, tem corpo de homem e cabeça de chacal.  Seus
    olhos são tão vermelhos quanto assustadores e sua alma tão negra quanto a
    aura que o cerca.
  name: anúbis
  vnum: '010108108122'
- description: Osíris está aqui com um olhar não muito agradável.
  keywords:
  - osiris
  - osíris
  long_desc: |-
    Osíris é o deus egípicio da morte e ressurreição.  Vestindo uma mortalha
    branca, sua aparência é de um moribundo: seu corpo exala um cheiro putrefato
    e sua pele parece estar em decomposição.
  name: Osíris
  vnum: '010108108123'
- description: O faraó está aqui governando a cidade do alto de seu trono.
  keywords:
  - seth
  - farao
  - faraó
  long_desc: |-
    Ele homem de aparência nobre e ar arrogante.  Seus ricos trajes são os mais
    finos já vistos sobre as areias do Egito.
  name: Seth I
  vnum: '010108108124'
- description: O carrasco avança sobre você ameaçadoramente.
  keywords:
  - carrasco
  long_desc: |-
    Você apenas consegue vislumbrar um par de olhos assustadoramente frios por
    detrás da viseira de seu capacete.  Segurando um enorme machado nas mãos, o
    carrasco caminha lentamente em sua direção.
  name: o carrasco
  vnum: '010108108125'
- description: Um homem sombrio está aqui embalsamando um corpo.
  keywords:
  - embalsamador
  long_desc: "Olhando para o embalsamador você nota sangue e resquícios de tecido\
    \ humano\nem suas vestes.  Ã\x89 difÃ­cil nÃ£o notar tambÃ©m o fedor putrefato\
    \ que ele\nexala."
  name: o embalsamador
  vnum: '010108108126'
- description: O ajudante de embalsamador está em pé aqui.
  keywords:
  - ajudante
  - embalsamador
  long_desc: |-
    Ele segura em uma de suas mâos um pequeno frasco de natrão e na outra as
    vísceras de algum infeliz.  Sua face revela a loucura e o frieza de seu
    coração.
  name: o ajudante de embalsamador
  vnum: '010108108127'
- description: Nefertiti está aqui repousando em seu divã.
  keywords:
  - nefertiti
  long_desc: |-
    Nefertiti, a rainha e consorte de Akhenaton, é uma jovem de beleza
    inigualável.  Seus olhos são de profundo negro com longas e espessas
    pestanas, fazendo par com carnudos lábios vermelhos dispostos em um rosto
    perfeito.  "A bela que chegou" é o significado de seu nome e perfeitamente
    descreve ela que é uma das mulheres mais belas e influentes dessa época.
  name: Nefertiti
  vnum: '010108108128'
- description: Um pajem está em pé aqui.
  keywords:
  - pajem
  long_desc: Ele é apenas um garoto sorridente sempre pronto para ajudar.
  name: o pajem
  vnum: '010108108129'
- description: Um eunuco está em pé aqui.
  keywords:
  - eunuco
  long_desc: Parece que ele ficaria eternamente em pé aqui. E sem reclamar...
  name: o eunuco
  vnum: '010108108130'
- description: Um atarefado criado está aqui.
  keywords:
  - criado
  long_desc: |-
    O criado veste roupas simples, o que combina perfeitamente com sua natureza
    humilde.  Ele está um pouco atrapalhado pois tenta servir bem a todos.
  name: o criado
  vnum: '010108108131'
- description: O banqueiro está em pé aqui.
  keywords:
  - banqueiro
  long_desc: Ele não parece muito confiável, porém muito inteligente.
  name: o banqueiro
  vnum: '010108108132'
- description: O tesoureiro está aqui contando dinheiro.
  keywords:
  - tesoureiro
  long_desc: |-
    Ele não parece ser confiável o bastante para guardar seu dinheiro mas,
    afinal, você não tem escolha.
  name: o tesoureiro
  vnum: '010108108133'
- description: Um íbis está aqui a sobrevoar sua cabeça.
  keywords:
  - ibis
  long_desc: |-
    Ele é uma bela ave de pernas e bico longos.  A maioria de suas penas, muito
    brancas, parecem especialmente destacar as preciosas plumas de cor azul oceano.
  name: o íbis
  vnum: '010108108134'
- description: Um gato percorre a sala rapidamente.
  keywords:
  - gato
  long_desc: Esse gato negro aparenta ser muito esperto e corajoso.
  name: o gato
  vnum: '010108108135'
- description: Um escaravelho está aqui procurando por comida.
  keywords:
  - escaravelho
  long_desc: Você fica assustado com a agressividade desse pequeno escaravelho negro...
  name: o escaravelho
  vnum: '010108108136'
- description: Um rato está aqui tentando subir na sua perna.
  keywords:
  - rato
  long_desc: Esse rato nojento está todo coberto com um espessa e fétida camada de
    lama.
  name: o rato
  vnum: '010108108137'
- description: Khons está aqui mirando o firmamento.
  keywords:
  - khons
  long_desc: |-
    Khons é o deus egípcio da Lua.  Ele lhe conta porque não pode aparecer o mês
    inteiro em toda sua glória: uma vez, jogando senet contra Thot, Khons
    impensadamente apostou parte de sua luz.  Thot acabou ganhando o jogo e
    Khons teve de se contentar em, todo mês, mostrar aos poucos sua luz até que,
    atingindo seu auge, comece a minguar.
  name: Khons
  vnum: '010108108138'
- description: Imothep se aproxima de você lentamente.
  keywords:
  - imothep
  long_desc: |-
    Você está perante Imothep (ou pelo menos o que restou dele), o
    sumo-sacertode do faraó.  Totalmente envolto em bandagens, exatamente como
    uma múmia, ele parece ter ressurgido do mundo dos mortos para vingar sua
    morte trazendo as 7 pragas do Egito.
  name: Imothep
  vnum: '010108108139'
- description: Akhenaton está em pé aqui.
  keywords:
  - akhenaton
  long_desc: |-
    Akhenaton, um homem muito alto e magro, é conhecido principalmente por ser o
    faraó que cultuava apenas um deus: Aton, o Sol.  Ao lado de sua mulher, a
    bela Nefertiti, Akhenaton mantêm a paz no Egito.
  name: Akhenaton
  vnum: '010108108140'
- description: Um homem vestido todo de preto está rondando esse lugar.
  keywords:
  - ladrao
  - homem
  long_desc: Ele aparenta muito sangue-frio e agilidade.
  name: o ladrão
  vnum: '010108108141'
- description: Um ladrão de tumbas está aqui buscando um tesouro.
  keywords:
  - tumbas
  - ladrao
  - ladrão
  long_desc: Você mal o vê diante da escuridão.
  name: o ladrão de tumbas
  vnum: '010108108142'
- description: Um cordoniz está aqui ciscando o chão.
  keywords:
  - cordoniz
  long_desc: |-
    Esse parece ser uma espécie muito rara de cordoniz pois, diferente da
    coloração cinzenta e marrom comum, essa ave possui penas multicoloridas que
    parecem emitir um discreto brilho.  O cordoniz parece muito compenetrado em
    sua busca por comida.
  name: um raro cordoniz
  vnum: '010108108143'
- description: Um homem parece estar perdido por aqui.
  keywords:
  - explorador
  - homem
  long_desc: |-
    Vestindo roupas que algum dia foram claras, esse homem parece procurar
    urgentemente, com sua lamparina, por uma saída.
  name: o explorador
  vnum: '010108108144'
- description: Uma enorme cobra está rastejando pelo chão.
  keywords:
  - vibora
  - víbora
  - cobra
  long_desc: |-
    Essa enorme cobra passa quase despercebida nas quentes areias do deserto:
    seu couro tem a tonalidade certa para a camuflar.  Tenha muito cuidado para
    não pisar nessa mortífera víbora do Saara.
  name: a víbora
  vnum: '010108108145'
- description: Uma criança está aqui procurando por sua mãe.
  keywords:
  - crianca
  - egipcia
  long_desc: |-
    A pobre criança parece ter se perdido de sua mãe: chama-a incessantemente
    enquanto lágrimas desesperadas rolam por sua face corada.
  name: a criança egípcia
  vnum: '010108108146'
- description: Uma enorme serpente está aqui, encarando você.
  keywords:
  - serpente
  long_desc: |-
    Você se sente hipnotizado pelos olhos dessa serpente: parecem de fogo, com
    seu brilho se tornando mais fraco ou mais intenso.  De sua boca parece sair
    algum tipo de ácido fétido, o que lhe inspira não só medo como também
    repugnância.
  name: a Serpente
  vnum: '010108108147'
- description: Harirf está aqui polindo suas botas.
  keywords:
  - harirf
  long_desc: |-
    Ele aparenta ser um lojista honesto e confiável mesmo tendo uma enorme arma
    presa em sua cintura.
  name: Harirf
  vnum: '010108108148'
- description: Uma bela mulher está aqui a vender pães.
  keywords:
  - rafertine
  long_desc: |-
    Ela é uma linda mulher que já chegou na meia-idade.  De porte elegante e
    sorriso sincero, Rafertine oferece a você alguns de seus pães.
  name: Rafertine
  vnum: '010108108149'
- description: Musedic está aqui tramando alguma coisa.
  keywords:
  - musedic
  long_desc: |-
    Musedic, com sua aparência asquerosa, é dono de um olhar matreiro que
    desperta admiração.
  name: Musedic
  vnum: '010108108150'
- description: Uma múmia arrasta-se em sua direção.
  keywords:
  - mumia
  long_desc: |-
    Exalando um insuportável cheiro de mofo e carne pútrida, essa múmia parece
    disposta a fazer-lhe algum mal.  Você não sabe se fica mais assustado com
    sua enorme figura envolta em bandagens ou com os ferozes urros que saem do
    que deve ser sua boca.
  name: a múmia
  vnum: '010108108151'
- description: Um soldado egípcio está de guarda aqui.
  keywords:
  - soldado
  - egipcio
  long_desc: |-
    Esse soldado de feições sérias parece muito concentrado na defesa do
    patrimônio de seu faraó.
  name: um soldado egípcio
  vnum: '010108108152'
