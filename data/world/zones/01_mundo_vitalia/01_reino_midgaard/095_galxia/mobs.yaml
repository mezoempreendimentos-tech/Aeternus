  - ana
  - branca
  long_desc: |-
    Como a gigante vermelha, ela também possui a obrigação de proteger a
    galáxia.  Mas ela planeja fugir sorrateiramente.  E parece ter muitos
    truques escondidos.
  name: uma anã branca
  vnum: '010109509506'
- description: Uma gigantesca nebulosa formando uma cabeça de cavalo está aqui.
  keywords:
  - cavalo
  - nebulosa
  - cabeca
  long_desc: |-
    Você consegue ver sua bela forma mergulhada na escuridão desse lugar.  Ela
