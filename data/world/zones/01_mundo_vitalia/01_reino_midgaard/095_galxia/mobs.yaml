    ninguém.
  name: a nebulosa cabeça de cavalo
  vnum: '010109509507'
- description: A pobre Andrômeda está acorrentada na parede, sofrendo...
  keywords:
  - andromeda
  long_desc: |-
    A bela Andrômeda foi deixada aqui como oferenda pois só isso aplacaria a ira
    das divindades do mar.  Isso acenteceu pois sua mãe, a rainha Cassiopéia,
    disse ter beleza superior à das nereidas.  Não gostaram muito disso e
    puniram seu reino...  O sacrifício da princesa salvaria a todos, mas ela não
    é culpada do que houve.  E só Perseu pode salvá-la desse cruel fim.
  name: Andrômeda
  vnum: '010109509508'
- description: O poderoso Hércules está aqui trabalhando em um de seus desafios.
  keywords:
  - hercules
  long_desc: |-
    Num momento de loucura (esta causada por sua vingativa madrasta), Hércules
    matou sua família.  Recobrando a sanidade, o poderoso herói, desejando ser
    punido, passa a obedecer às ordens do rei de Tirinto, que lhe propõe dez
    (acrecentando, no final, mais dois) desafios considerados impossíveis de se
    realizar. Tendo êxito nos doze trabalhos, Hércules pode seguir com sua vida.
  name: o Poderoso Hércules
  vnum: '010109509509'
- description: O grande Pégasus anda por aqui calmamente.
  keywords:
  - pegasus
  long_desc: |-
    Nascido do sangue da górgona Medusa, Pégasus é um belíssimo cavalo
    alvo dotado de asas. Ele pode voar de um lugar para o outro rapidamente,
    não importanto a distância.
  name: o grande Pégasus
  vnum: '010109509510'
