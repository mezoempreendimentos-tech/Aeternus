  - nebulosa
  - jovem
  long_desc: |-
    A jovem nebulosa não possui forma definida: ela é apenas um nuvem de
    poeira cósmica.
  name: uma jovem nebulosa
  vnum: '010109509503'
- description: Você percebe que um veloz cometa vem em sua direção.
