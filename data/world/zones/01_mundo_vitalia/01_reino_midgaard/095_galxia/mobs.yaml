  vnum: '010109509504'
- description: Uma enorme gigante vermelha está aqui, sendo forçada a proteger a galáxia.
  keywords:
  - gigante
  - vermelha
  long_desc: Hm.. talvez ela não seja tão forte assim. Ou talvez seja.
