- description: O horrível demônio da sepultura está aqui, medindo-o dos pés à cabeça.
  keywords:
  - demônio
  - demonio
  - buraco
  - poço
  - toca
  - sepultura
  long_desc: |-
    Eca....que criatura nojenta!  Ela é negra e verde e completamente limbosa.
    E está babando por todos os lados....E parece ser má também.  Como pode
    existir algo assim?
  name: o demônio da sepultura
  vnum: '010118618601'
- description: O monstro novato está parado aqui com um olhar tão confuso!! Mate-o!!!
    Mate-o!
  keywords:
  - monstro
  - novato
  long_desc: |-
    Este pequeno demônio é uma criatura singular.  Ele até que não parece ser
    perigoso mas você não pode ter muita certeza.  Ele tem apenas 4 pés de
    altura mas possui um corpo bastante musculoso...talvez fosse melhor você
    perguntar a ele se ele precisa de alguma ajuda, não acha?  Ah!!  Que nada!
    Melhor matar mesmo!
  name: o monstro novato
  vnum: '010118618602'
- description: O dragão-bebê de estimação de alguém está aqui, perdido e xeretando
    por tudo.
  keywords:
  - dragão
  - bebê
  - dragao
  - bebe
  long_desc: |-
    Aaaaaahhh...que amor!  Um dragâo bebê tão pequenininho!  Ele tem apenas 3
    pés de altura e você fica querendo apertá-lo até cansar....não, na verdade o
    que vocé quer mesmo é matar o bichinho!  Mas lembre-se de uma coisa: até
    mesmo os dragões pequenos podem causar um grande problema.
  name: o dragão-bebê
  vnum: '010118618603'
- description: O Guarda Novato está aqui se perguntando para onde teria ido o dragão.
  keywords:
  - novato
  - guarda
  - monstro
  long_desc: |-
    O Guarda tem também a incumbência de tomar conta dos dragõezinhos de
    estimação do Alquimista mas parece que ele não está fazendo um trabalho
    muito bom não.  Ele olha para você e diz: "Você não viu aquele dragão?  O
    Mestre irá me arrancar a cabeça se eu não encontrar o bichinho!"
  name: o Guarda Novato
  vnum: '010118618604'
- description: O Alquimista Novato está tentando fazer alguma coisa aqui.
  keywords:
  - alquimista
  - novato
  long_desc: |-
    Esse sujeito peludo tem uma aparência muito engraçada.  Ele parece estar bem
    ocupado, tentando misturar um líquido a outro.
  name: o Alquimista Novato
  vnum: '010118618605'
- description: Um pequeno réptil nojento está correndo pelo chão, bem aos seus pés.
  keywords:
  - réptil
  - reptil
  - coisa
  - inseto
  - pavoroso
  - nojento
  long_desc: |-
    Iiiiiiieeeeeeca!!!!  Se alguma vez limpassem este lugar, com certeza estes
    vermes imundos, pequenos, cheios de pernas e marrons não estariam aqui!
  name: o réptil nojento
  vnum: '010118618606'
- description: Um jovem MUITO magro....parece até um zumbi!!
  keywords:
  - novato
  - zumbi
  long_desc: |-
    Este rapaz foi solto aqui há muito tempo atrás...ele agora é muito mais
    zumbi do que homem.  Você deveria sentir pena dele por causa disso...mas
    espere!!  Ele parece que está querendo atacá-lo!
  name: o zumbi novato
  vnum: '010118618607'
- description: Uma pequena criatura travessa (um demônio talvez?) está se esgueirando
    por aqui.
  keywords:
  - demônio
  - demonio
  - diabo
  - travesso
  long_desc: |-
    Esta pequena criatura verde com alguns traços humanos possui um longo rabo
    pontudo.  É difícil de descrevê-la porque muito antes que seus olhos possam
    dar uma boa examinada nela, a coisa dispara na direção das sombras e some.
  name: o diabo travesso
  vnum: '010118618608'
- description: O Grande Minotauro está se perguntando que sabor você teria.
  keywords:
  - minotauro
  long_desc: |-
    Um homem poderoso, com a cabeça de um touro.  E parece ser tão forte quanto
    um touro mas não tem jeito de ser muito esperto não.  Mas já que você o está
    analisando...bem...não parece que ele é muito mais feroz do que qualquer
    outro touro que você tenha visto antes....e ele está vindo direto em sua
    direção.
  name: o Poderoso Minotauro
  vnum: '010118618609'
- description: O espectro escuro está se escondendo nas sombras.
  keywords:
  - espectro
  - fantasma
  long_desc: |-
    O fantasma de um aventureiro morto há muito tempo...esconde-se aqui a espera
    de uma chance de levar à morte qualquer um que cruze o seu caminho.
  name: o espectro escuro
  vnum: '010118618610'
- description: Um novato está aqui chateando e importunando você.
  keywords:
  - novato
  - chato
  - imbecil
  long_desc: |-
    Que imbecil!!!  Ele não se cala!..e ainda por cima fica fazendo os
    comentários mais absurdos sobre tudo!  Melhor calar a boca dele com a fria
    lâmina de aço de uma espada!
    HAHAHAHAHAHAHAHAHAHA!
  name: o imbecil chato
  vnum: '010118618611'
- description: um novato com cara de retardado está aqui.
  keywords:
  - novato
  - retardado
  - ignorante
  long_desc: |-
    Que idiota!  Ele deve ser o tipo que faz cada uma das perguntas que foram
    respondidas pelos professores pelo menos umas 3 vezes.  Este rapaz
    simplesmente não entende absolutamente nada que digam para ele.  Melhor
    acabar logo com a mediocridade dele.
  name: o novato ignorante
  vnum: '010118618612'
- description: Uma novata está aqui, falando à beça.
  keywords:
  - novata
  - tagarela
  long_desc: |-
    Bem, pelo menos esta garota parece ser bem legal.  Claro, ela fala muito mas
    mesmo assim ela parece ser bem amistosa.  Parece que existe um motivo para
    ela estar aqui, ao contrário dos outros que você já viu.
  name: a novata tagarela
  vnum: '010118618613'
- description: Um novato está aqui vagabundeando sem destino.
  keywords:
  - novato
  - perdido
  long_desc: |-
    Hummm...já
    faz algum tempo que ele está por aqui e ele está muito longe de
    casa a esta hora.  Não pense que ele sabe onde ele está não.  Quem sabe você
    não o ajuda um pouco.
  name: o novato perdido
  vnum: '010118618614'
- description: Um novato está aqui e ele tem jeito de estar bastante seguro sobre
    as coisas.
  keywords:
  - novato
  - esperto
  long_desc: |-
    Aqui está uma pessoa que tem tudo.  Bons equipamentos também.  Será que ele
    leu os arquivos de ajuda?
  name: o novato esperto
  vnum: '010118618615'
