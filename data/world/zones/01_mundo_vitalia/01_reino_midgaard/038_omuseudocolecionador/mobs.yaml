- description: Uma linda fada o recebe com um grande sorriso.
  keywords:
  - fada
  - recepcionista
  - Philomena
  long_desc: |-
    Philomena, a recepcionista do Museu, é na verdade uma eladrin, uma
    representante da raça das fadas nobres.  De aparência jovial e simpática,
    dizem que foi com a ajuda da magia dela que os CARD's pintados pelo
    Explorador se espalharam por Vitália.  Philomena olha para você com seus
    belíssimos olhos cor de jade e lhe estende uma entrada.
    - \tMSão 10.000 moedas por favor.\n
  name: Philomena
  vnum: '010103803800'
- description: Um enorme golem de mithril parece querer barrar seu caminho.
  keywords:
  - golem
  - mithril
  long_desc: |-
    Um massivo golem feito do precioso e mágico mithril monta guarda na entrada
    do Museu.  É bom você não quebrar nada lá dentro, pois ele provavelmente é o
    segurança daqui, e você não vai querer se meter com um tipo desses.  Uma
    pequena placa foi pendurada em seu pescoço, com os dizeres:
    "Favor ter sua entrada em mãos para adentrar no Museu".
  name: um golem de mithril
  vnum: '010103803801'
- description: |-
    Pilgoras, o maior colecionador de CARD's de Vitália, mal percebe sua
    aproximação, absorto com sua coleção.
  keywords:
  - pilgoras
  long_desc: |-
    Um jovem meio-elfo de longos cabelos negros, Pilgoras é conhecido por sua
    mania de colecionar coisas.  Sua maior obsessão parece ser completar a
    coleção de CARDS, e dizem que ele só precisa de mais três cartas para isso.
    Nesse momento, Pilgoras está usando uma grande lupa para analizar alguns
    CARD's, talvez a procura de mais uma raridade.
  name: Pilgoras
  vnum: '010103803802'
- description: Um garoto está aqui, abraçado à sua coleção de cards.
  keywords:
  - garoto
  long_desc: |-
    Esse garoto anda pelo museu sem nem prestar muita atenção nas maravilhas ao
    seu redor.  O tempo todo ele abraça com força um fichário preto, como se
    dentro houvesse um precioso tesouro.
  name: um garoto
  vnum: '010103803803'
