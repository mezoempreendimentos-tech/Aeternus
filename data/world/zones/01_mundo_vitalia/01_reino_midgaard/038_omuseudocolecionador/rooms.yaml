    \ da\nFloresta Han-dor.  Você pisca, surpreso, e enquanto dá os primeiros passos,\
    \ o\nambiente ao seu redor se transforma no Abismo Profundo.  Você caminha\nmaravilhado\
    \ pela sala, que agora se transforma numa florida rua de Lindrel, e\nfica claro\
    \ que aqui é possível desfrutar de TODAS as áreas de Vitália.  Você\npode ver\
    \ as listas de CARDÂ´S das SÃ©ries Ã\x81reas aparecerem cada hora num lugar\n\
    diferente.  Por falar nisso, onde foi parar a porta por onde você entrou?"
  exits:
    down:
      target_vnum: '010103803803'
    east:
      target_vnum: '010103803803'
