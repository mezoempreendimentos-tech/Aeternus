  vnum: '010102002100'
- description: Um Avatar de Hades está aqui, guardando a entrada.
  keywords:
  - avatar
  - hades
  long_desc: |-
    Você se vê diante de um avatar do deus Hades, irmão de Zeus e soberano dos
    reinos inferiores.  Hades é o guardião dos espirítos que não ganharam
    entrada no sagrado Monte Olimpo e governa seu sombrio reino com mão de
    ferro.  Conhecido por não permitir que nenhuma alma volte de seu reino da
    morte, ele concedeu essa honra aos membros do Exército Suicida, que em troca
    têm o dever de escoltar sua esposa Perséfone quando ela viaja entre o reino
    dos vivos e dos mortos.  Hades então colocou aqui seu avatar como prova
    desse acordo.  Trajando uma esplêndida armadura de titânio e empunhando uma
    bela espada forjada no coração de um vulcão, o Avatar de Hades parece ser um
    guerreiro forte e imbatível, capaz de aniquilar exércitos inteiros.
    O Avatar de Hades olha para você de forma tão intensa que você começa a
    tremer.
  name: um Avatar de Hades
  vnum: '010102002101'
- description: Um estranho animal de duas cabeças e duas aves pousadas sobre seu dorso
    está aqui.
  keywords:
  - tríade
  - suicidas
  long_desc: |-
    Você está diante de um grande cachorro de duas cabeças em cujos ombros repousam
    duas aves.  Estes três belos animais, que são os mascotes do Exército, formam
    um trio bem intrigante.   Criados juntos desde filhotes, hoje são inseparáveis.
    O falcão Olho de Rá, presente do próprio deus Hórus, representa para os
    Suicidas a promessa da vida, que deve ser defendida a qualquer custo.  Kami
    Kase, o cão negro de duas cabeças, filhote de Cérberus, os lembra de seu
    compromisso de lutar até a morte pelo bem.  E finalmente Falkes, uma
    maravilhosa ave fênix, cujo ovo foi encontrado no tesouro do dragão derrotado
    pelos Suicidas originais, é a própria esperança que a morte não é o fim,
    mas parte de um ciclo no qual a vida sempre há de renascer.   Os mascotes
    suicidas estão em excelente condição.
  name: a tríade dos Suicidas
  vnum: '010102002102'
- description: Um espírito se encontra aqui, guardando o portão.
  keywords:
  - espírito
  long_desc: |-
    Olhando para ele, você sente que conhece de algum lugar, mas não se recorda
    de onde.  Pensando bem, este espirito é a rainha Iris, que após ter morrido,
    se tornou a guardiã dos Vingadores.  Você não consegue ver os traços de seu
    corpo, mas pode perceber que ela carrega consigo um lindo sorriso, que lhe
    faz pensar que mesmo após ter morrido, vive feliz perto de sua aldeia.
  name: o Espírito
  vnum: '010102002110'
- description: Um enorme anjo está aqui, protegendo a entrada.
  keywords:
  - anjo
  long_desc: |-
    Este anjo é indescritivel.  Sua beleza faz você logo perceber que se
    assemelha muito com Miuma, A Deusa de Iris.  Ela é irmã de Miuma, chama-se
    Miaguy.  Após sua morte, Miaguy foi transformada em uma linda anja por ordem
    divina e até hoje, guarda o portão dos vingadores, para que nenhum intruso
    ou pessoa impura, adentre este ambiente sagrado.
  name: o Anjo
  vnum: '010102002111'
- description: Raish, Principe dos Raios está aqui, guardando a entrada.
