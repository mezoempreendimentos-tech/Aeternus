- description: Um Avatar de Hela está aqui, guardando a entrada.
  keywords:
  - avatar
  - hela
  long_desc: "Você se vê diante de um avatar da deusa Hela, a dama da morte e rainha\
    \ de\nHell, o reino nÃ³rdico dos mortos.  Ã\x89 Hela quem guarda os espÃ­ritos\
    \ dos\nguerreiros vikings que não tiveram a sorte de morrer em batalha, e este\n\
    avatar representa o pacto que a deusa tem com o Exército Suicida de Vitália,\n\
    que comandará o exército das almas que mais uma vez marcharão sobre a terra\n\
    no dia do Ragnarok.  Com a aparência de uma bela e séria jovem loura de\nolhos\
