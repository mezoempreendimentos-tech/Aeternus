- description: Um enorme dragão negro está descansando aqui.
  keywords:
  - flame
  - dragão
  long_desc: |-
    Este é Flame, o Dragão das Trevas.  Enviado por Tenebra para ajudar seus
    cinco discípulos na batalha contra a Salamandra e proteger o Templo de
    Tenebra, este poderoso dragão tem as escamas negras e reluzentes que ficam
    mais resistentes conforme sua ira aumenta.  Ele é astuto e ardiloso e seu
    olhar contém uma grande frieza.  Suas garras são laminas grandes e afiadas,
    com um poderoso veneno que mata em instantes.  Pode-se sentir seu hálito
    quente à distância e sua chama negra é fatal.
  name: Flame, o Dragão das Trevas
  vnum: '010102002172'
