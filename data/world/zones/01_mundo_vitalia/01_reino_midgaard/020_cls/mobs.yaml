  vnum: '010102002000'
- description: Anluzir está flutuando aqui, emanando sua luz por toda a sala.
  keywords:
  - anluzir
  long_desc: |-
    Seu pelo branco reflete e intencifica toda a luz que existe em volta.  Seus
    olhos emitem uma grande sensação de paz, sua crina branca como as nuvens
    flutua como se um vento mágico a deixa-se sempre ouriçada.  Suas longas asas
    fazem leves e graciosos gestos para manter esse belíssimo animal flutuando
    no ar.
  name: Anluzir
  vnum: '010102002001'
- description: Existe um tritão em pé observando seus movimentos.
  keywords:
  - tritão
  long_desc: |-
    Um ser metade homem metade peixe, ele parece ter sua força expressa pela
    dureza do olhar desafiador que ele lança sobre você.
  name: o Tritão
  vnum: '010102002010'
- description: Uma bela sereia está aqui guardando a entrada.
  keywords:
  - sereia
  long_desc: |-
    Um ser metade mulher metade peixe, este belo ser o encanta com os seus olhos
    fixos na entrada.  Talvez um aventureiro inexperiente cairia em tais
    caprichos.
  name: a Sereia
  vnum: '010102002011'
- description: Um anjo de enorme beleza está aqui, bloqueando o caminho com suas asas.
  keywords:
  - anjo
  long_desc: |-
    Quando você olha para ele sente uma enorme calma, e ao mesmo tempo fica
    abismado com um ser de tamanha beleza e graça.  Ele possui enormes asas,
    empunha uma bela espada num braço e segura um escudo noutro.  Ambos os
    objetos foram marcados com símbolos sagrados.  Você se sente incapaz de
    lutar com ele e, mesmo que estivesse em condições, jamais o venceria.
  name: um anjo
  vnum: '010102002020'
- description: Um Elfo Ancião aqui se encontra, envolto em sombras.
  keywords:
  - elfo
  - ancião
  - mitra
  long_desc: |-
    Ora você vê apenas a silhueta, ora você a vê por completo.  A figura está
    desaparecendo...  Tem olhos tão brilhantes quanto a luz do sol, o que torna
    quase impossível olhá-la diretamente.  Não se pode dizer que é alta, nem que
    tem a força de um guerreiro, mas ela lhe parece poderosa mesmo assim.
    Carrega em suas mãos três pedras (aparentemente muito preciosas), e em cada
    uma delas você pode ver uma mancha negra, que lhe causa arrepios...  O
    Ancião aparenta ser de eras há muito esquecidas, e de sabedoria sem tamanho.
    Veste roupas simples e em sua bainha está uma lâmina de beleza incomparável.
    Poucos instantes depois, a figura desaparece.  Será tudo isso fruto de sua
    imaginação?...
  name: o elfo ancião
  vnum: '010102002021'
- description: Jasmin, a arcanja está aqui protegendo os grandes portões.
  keywords:
  - jasmin
  - arcanja
  long_desc: |-
    Jasmin é uma arcanja com enormes asas brancas.  Sua pele macia como o
    algodão, suave como uma pena e seus olhos da cor da mais pura água lhe
    fascina.
    Antigas lendas dizem que se um anjo perder uma pena de sua asa, ele perde
    uma virtude, e, apenas pedindo "a cura" para Jasmin que esta pena poderá
    voltar.  Jasmin apesar de sua beleza, mostra uma grande força de combate.
  name: Jasmin, a Arcanja
  vnum: '010102002030'
- description: Lucipher, o demônio está aqui protegendo os grandes portões.
  keywords:
  - lucipher
  - demônio
  long_desc: |-
    Lucipher é um ser com um corpo avermelhado e com uma pele dura como uma
    rocha.  Seu olhar obscuro e suas mãos flamejantes lhe assusta.  Bardos dizem
    que Lucipher se arrependeu de seus atos e pediu aos Grandes Mestres o
    perdão, então, a partir deste dia ele protege as Virtudes.
    Lucipher esta aqui brincando com suas façanhas com fogo...eu não o encararia
    se fosse você.
  name: Lucipher, o Demônio
  vnum: '010102002031'
- description: Kentaurus, o centauro-guardião está aqui segurando seu belo machado.
  keywords:
  - kentaurus
  - centauro
  long_desc: |-
    Kentaurus é um centauro, um monstro metade humano e metade cavalo.  Ele
    segura um enorme machado e no seu pescoço existe uma bolsa contendo muitos
    pergaminhos, você imagina que aquilo pode conter os segredos mais obscuros
    deste lugar e de sua história.  Kentaurus apesar de sua aparencia robusta
    contém um sorriso amigável.
    Kentaurus é muito falador... não fique aí olhando-o por muito tempo... ele
    começará a contar suas looooooongas aventuras.
  name: Kentaurus, o Centauro
  vnum: '010102002032'
