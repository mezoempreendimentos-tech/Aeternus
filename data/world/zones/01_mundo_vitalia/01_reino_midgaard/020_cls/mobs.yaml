  - brilhante
  - sol
  long_desc: |-
    Ao olhar para esse ser diferente de tudo o que você já viu, você se lembra
    da luz do sol, uma luz braca e pura que faz você se esquecer de todas as
    dores e problemas de sua vida.  Você se lembra do grande Solis em seu
    momento de glória, como se a luz irradiada por essa esfera, fosse a mesma
    que iluminou Solis em sua mais gloriosa oração.
