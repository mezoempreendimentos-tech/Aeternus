    escolhem os mortos".  Quando galopavam em suas cavalgadas, o brilho de seus
    escudos produzia nos céus nórdicos uma luz estranha, a chamada aurora
    boreal
  name: Siegrune
  vnum: '010112612634'
- description: Grimgerde, a sétima valquíria está aqui, montada em seu corcel.
  keywords:
  - Grimgerde
  long_desc: |-
