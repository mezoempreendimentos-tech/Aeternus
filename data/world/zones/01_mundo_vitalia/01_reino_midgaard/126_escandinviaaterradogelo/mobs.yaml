- description: Odin, o deus criador está aqui, olhando fixamente para você.
  keywords:
  - Odin
  - deus
  - criador
  long_desc: |-
    Você observa Odin, o deus criador e senhor de Asgard.  Odin possui um olhar
    penetrante e sábio.  No início da vida, Odin e seus irmãos Vili e Ve mataram
    o gigante Ymir e formaram com o seu corpo a terra, com seu sangue os mares,
    com seus ossos as montanhas, com seus cabelos as árvores, com seu crânio o
    céu e com seu cérebro as nuvens carregadas de neve e granizo.  Com a testa
    de Ymir, os deuses formaram Midgaard, que foi destinada a morada dos homens.
    Odin e seus irmãos ainda criaram os períodos do dia e da noite e as estações
    do ano, para que finalmente fossem criados os seres humanos.
  name: Odin
  vnum: '010112612600'
- description: Herda, a deusa da sabedoria está aqui, abençoando todos os seres da
    terra.
  keywords:
  - Herda
  - deusa
  long_desc: |-
    Você observa uma bela mulher de pele branca, olhos verdes como o mar e
    cabelos dourados como o mais puro ouro.  Herda é a deusa da sabedoria, o
    espírito da terra e a mãe das belas valquírias.
  name: Herda
  vnum: '010112612601'
- description: Vili, o deus criador está aqui, admirando a sua criação.
  keywords:
  - Vili
  - deus
  - criador
  long_desc: |-
    Você observa Vili, o deus criador.  Vili é conhecido pela sua sabedoria e
    pela razão.  No início da vida, Vili e seus irmãos Odin e Ve mataram o
    gigante Ymir e formaram com o seu corpo a terra, com seu sangue os mares,
    com seus ossos as montanhas, com seus cabelos as árvores, com seu crânio o
    céu e com seu cérebro as nuvens carregadas de neve e granizo.  Com a testa
    de Ymir, os deuses formaram Midgaard, que foi destinada a morada dos homens.
    Vili e seus irmãos ainda criaram os períodos do dia e da noite e as estações
    do ano, para que finalmente fossem criados os seres humanos.
  name: Vili
  vnum: '010112612602'
- description: Ve, o deus criador está aqui, admirando a fisionomia dos seres humanos.
  keywords:
  - Ve
  - deus
  - criador
  long_desc: |-
    Você observa Ve, o deus criador.  Ve é conhecido pela seu dom da palavra,
    pela sua fisionomia expressiva e pelos seus sentidos aguçados.  No início
    da vida, Ve e seus irmãos Odin e Vili mataram o gigante Ymir e formaram com
    o seu corpo a terra, com seu sangue os mares, com seus ossos as montanhas,
    com seus cabelos as árvores, com seu crânio o céu e com seu cérebro as
    nuvens carregadas de neve e granizo.  Com a testa de Ymir, os deuses
    formaram Midgaard, que foi destinada a morada dos homens.  Ve e seus irmãos
    ainda criaram os períodos do dia e da noite e as estações do ano, para que
    finalmente fossem criados os seres humanos.
  name: Ve
  vnum: '010112612603'
- description: Frei, o deus da fertilidade está aqui, a procura de Gerda.
  keywords:
  - Frei
  - deus
  - fertilidade
  long_desc: |-
    Você observa Frei, o deus da fertilidade e irmão da deusa Freia.  Frei é
    responsável pela chuva, pelo brilho do sol e por todos os frutos da terra.
  name: Frei
  vnum: '010112612604'
- description: Freyr, o deus do sol está aqui, olhando para você amistosamente.
  keywords:
  - Freyr
  - deus
  - sol
  long_desc: |-
    Você observa um homem vestido com vestes delicadas e transparentes.  Freyr é
    o deus do sol, sob cuja luz os elfos luminosos estavam sempre brincando.
  name: Freyr
  vnum: '010112612605'
- description: Thor, o senhor dos trovões está aqui, imponentemente olhando para você.
  keywords:
  - Thor
  - deus
  - senhor
  - trovoes
  long_desc: |-
    Você observa Thor, o senhor dos trovões e soberano do magnífico palácio de
    Bilskirnir.  Filho de Odin, Thor é o mais forte entre os homens e os deuses,
    sendo respeitado por todos os homens, deuses e gigantes, que estes últimos
    aprenderam a respeita-lo através de sua força e seu martelo.
  name: Thor
  vnum: '010112612606'
- description: Tir, o deus da batalha está aqui, mutilado pelo lobo Fenris.
  keywords:
  - Tir
  - deus
  - batalha
  long_desc: |-
    Você observa o poderoso deus da batalha, Tir, o general do panteão nórdico.
    Tir é o deus mais corajoso e destemido de todos os deuses.  Na tenebrosa
    missão de prender o lobo Fenris, filho de Loge.  Os deuses pediram aos
    espíritos da montanha, que fizessem para eles uma corrente poderosa, que
    prendesse Fenris.  Está corrente foi formada por seis coisas:  O ruído
    produzido pelo andar de um gato, a barba das mulheres, as raízes das pedras,
    a respiração dos peixes, os nervos dos ursos e o cuspo das aves.  Depois de
    pronta a corrente ficou tão lisa e macia como se fosse seda.  O lobo Fenris
    logo desconfiou das intenções dos deuses e só consentiu em ser amarrado se
    um deus enfiasse a mão em sua boca para garantir que a corrente seria
    retirada mais tarde.  Tir logo se ofereceu e quando o lobo Fenris verificou
    que não podia se livrar, cortou com os dentes a mão de Tir.  Tir é filho de
    Odin e irmão de Thor.
  name: Tir
  vnum: '010112612607'
- description: Loge, o caluniador de deuses está aqui, imaginando um novo ato condenável.
  keywords:
  - Loge
  - deus
  - caluniador
  long_desc: |-
    Você observa Loge, também chamado por alguns de Loki.  Loge é belo e bem
    feito de corpo, mas possui um temperamento caprichoso e maus instintos.
    Ele pertence à raça dos gigantes, contudo se meteu a força entre os deuses e
    vive de criar dificuldades para eles, e livrá-los, depois do perigo.  Loge
    possui três filhos:  O lobo Fenris, a serpente de Midgaard e Hela, a morte.
  name: Loge
  vnum: '010112612608'
- description: Friga, a deusa da fertilidade está aqui, observando a terra com amor.
  keywords:
  - Friga
  - deusa
  - fertilidade
  long_desc: |-
    Você observa uma bela sacerdotisa nua de cabelos longos.  Friga é a esposa
    do deus todo poderoso Odin, além de representar a fertilidade, Friga é
    considerada a mãe terra.
  name: Friga
  vnum: '010112612609'
- description: Freia, a deusa mais protegida está aqui, admirando as flores.
  keywords:
  - Freia
  - deusa
  long_desc: |-
    Você observa uma bela mulher de cabelos longos negros e olhos verdes.  Freia
    é irmã do deus Frei, o deus da fertilidade.  Ela ama a música, a primavera e
    todos os amantes podem invocá-la com proveito.
  name: Freia
  vnum: '010112612610'
- description: Balder, o bom está aqui, emocionado pelo seu regresso a terra dos vivos.
  keywords:
  - Balder
  - deus
  long_desc: |-
    Você observa Balder, o deus do sol e do verão.  Filho de Odin e Friga,
    Balder é o deus mais jovem e mais belo dentre todos os deuses.  Balder em
    vida sempre foi um deus adorável e bondoso.  Porém um belo dia, Balder foi
    atormentado com horríveis pesadelos que mostravam que sua vida corria um
    grande perigo.  Logo em seguida Balder contou aos deuses, que resolveram
    conjugar o perigo que o ameaçava.  Então, Friga, a esposa de Odin, conseguiu
    que o fogo e a água, o ferro e todos os outros metais, as pedras, as árvores
    , as feras, as aves, os peixes e os seres que rastejam jurassem que nenhum
    deles faria mal a Balder.  Contudo Odin, não satisfeito com tudo isso e
    assustado com o destino de seu filho, resolveu consultar a profetisa
    Angerbode, uma giganta, mãe de Fenris, de Hela e da serpente de Midgaard.
    Contudo Angerbode morreu antes da consulta de Odin, e os outros deuses
    julgando suficiente o que Friga fizera, divertiam-se, utilizando Balder como
    alvo.  Alguns ativaram dardos, outros pedras, outros o feriam com suas
    espadas, mas por mais que fizessem, Balder continuava vivo e saudável.  Até
    que Loge invejoso surgiu em sua vida e articulou um terrível plano que
    acabou lhe tirando a vida.  Friga esqueceu de uma única planta, que teria
    sido julgada por ela jovem demais para jurar, o visco do lado oriental do
    Valhala.  Loge aproveitando-se da cegueira de uma velha, entregou um pedaço
    de madeira, cuja a ponta estava impregnada do visco e dirigiu com o seu
    braço o braço da velha, que lançou o pedaço de madeira, que atravessou o
    corpo de Balder, que caiu sem vida.  Com certeza, nunca se testemunhara,
    quer entre os deuses quer entre os homens, atrocidade comparável a essa.
  name: Balder
  vnum: '010112612611'
- description: Iduna, a guardiã da caixa da mocidade está aqui.
  keywords:
  - Iduna
  - guardia
  long_desc: |-
    Você observa uma bela mulher de cabelos loiros e olhos azuis.  Iduna é a
    esposa do deus Bragi, o deus da poesia.  Ela é a guardiã da caixa de maçãs
    que os deuses, quando sentem a velhice se aproximando, provavam, para
    recuperar, imediatamente a mocidade.
  name: Iduna
  vnum: '010112612612'
- description: Brage, o deus da poesia está aqui, cantando uma linda canção.
  keywords:
  - Brage
  - deus
  long_desc: |-
    Você observa o deus da poesia, Brage.  Os seus cantos recordam os feitos dos
    guerreiros e sua esposa Iduna é a guardiã da mocidade.
  name: Brage
  vnum: '010112612613'
- description: Njord, o deus do mar está aqui, protegendo os marinheiros e pescadores.
  keywords:
  - Njord
  - deus
  long_desc: |-
    Você observa Njord, o deus do mar e protetor dos pescadores e marinheiros.
    Njord é um poderoso guerreiro, forte e concessor de riquezas.
  name: Njord
  vnum: '010112612614'
- description: Urdur, a deusa do destino está aqui, olhando para trás.
  keywords:
  - Urdur
  - norns
  - deusa
  long_desc: |-
    Você observa a silhueta de uma mulher coberta por um vestido de seda branca.
    Urdur é uma das três Norns, deusas donas do destino e responsáveis de cuidar
    da monumental raiz que penetra em Asgard.  Urdur é a dona do passado.  Todas
    as manhãs, as Norns fazem chover hidromel sobre suas raízes que penetra em
    Asgard, para que as folhas permaneçam verdes.
  name: Urdur
  vnum: '010112612615'
- description: Verdande, a deusa do destino está aqui, observando o presente.
  keywords:
  - Verdande
  - norns
  - deusa
  long_desc: |-
    Você observa a silhueta de uma mulher coberta por um vestido de seda azul.
    Verdande é uma das três Norns, deusas donas do destino e responsáveis de
    cuidar da monumental raiz que penetra em Asgard.  Verdande é a dona do
    presente.
  name: Verdande
  vnum: '010112612616'
- description: Skuld, a deusa do destino está aqui, sorrindo do seu futuro.
  keywords:
  - Skuld
  - norns
  - deusa
  long_desc: |-
    Você observa a silhueta de uma mulher coberta por um vestido de seda verde.
    Skuld é uma das três Norns, deusas donas do destino e responsáveis de cuidar
    da monumental raiz que penetra em Asgard.  Skuld é a dona do futuro.
  name: Skuld
  vnum: '010112612617'
- description: Trudr, a força está aqui, olhando para você.
  keywords:
  - Trudr
  - forca
  long_desc: |-
    Você observa um poderoso homem, forte e belo.  Trudr é um dos filhos de Thor,
    também conhecido como a força.  Você com certeza descobrirá rapidamente o
    porque de chamarem Trudr, de a força.
  name: Trudr
  vnum: '010112612618'
- description: Magni, o poder está aqui, abrindo fendas nas montanhas com o olhar.
  keywords:
  - Magni
  - poder
  long_desc: |-
    Você observa um homem de estatura mediana, mas que esconde por trás deste
    corpo frágil, um poder imenso.  Poder este capaz de transformar uma montanha
    em pó, de partir um titã ao meio e de arrasar todo um exercito de guerreiros
    vikings apenas com um olhar.  Magni é um dos filhos de Thor, também conhecido
    como o poder.
  name: Magni
  vnum: '010112612619'
- description: Modi, a inteligência está aqui, observando os pequenos seres do universo.
  keywords:
  - Modi
  - inteligencia
  long_desc: |-
    Você observa Modi, um dos filhos de Thor.  Também conhecido como a
    inteligência, Modi sempre tem a solução para todos os problemas.
  name: Modi
  vnum: '010112612620'
- description: Hela, a morte, está aqui, com sua fisionomia horrível e amedrontadora.
  keywords:
  - Hela
  - morte
  long_desc: |-
    Você observa uma das criaturas mais assustadoras e horríveis de todas as
    sagradas terras de Vitália.  Hela é filha de Loge e da giganta Angerbode.
    Ela foi atirada por Odin ao Niffleheim e recebeu o poder de dominar nove
    mundos ou regiões, nos quais distribui aqueles que lhe são enviados, isto é,
    os que morreram em consequências da velhice ou da doença.  Seu palácio se
    chama Elvinder, sua mesa é a Fome, sua faca, a Inanição, o atraso, seu
    criado, a Vagareza, sua criada, o Precipício, sua porta, a Preocupação, sua
    cama e os Sofrimentos formavam as paredes dos seus aposentos.  Hela é
    facilmente reconhecida, pois seu corpo era metade cor-de-carne e metade azul
    , e tinha uma fisionomia horrível e amedrontadora.
  name: Hela
  vnum: '010112612621'
- description: Siegfried está aqui, a procura do dragão Fafnir.
  keywords:
  - Siegfried
  long_desc: |-
    Você observa um poderoso e imponente guerreiro.  Siegfried perdeu seu pai
    muito cedo.  Ele foi criado pelo odiado anão Mime, que apenas o criou para
    que quando Siegfried crescesse, matasse o dragão Fafnir para que Mime
    podesse conquistar o anel mágico.  Siegfried possui uma poderosa arma, a
    espada mágica do seu pai, a espada de Balmung.  Que foi forjada por ele
    mesmo, depois de várias tentativas do anão ferreiro nibelungo, Mime, que
    não possuía a coragem necessária para forjá-la, mesmo sendo experiente nessa
    arte.
  name: Siegfried
  vnum: '010112612622'
- description: Haquem, o poderoso guerreiro do gelo está aqui.
  keywords:
  - Haquem
  long_desc: |-
    Você observa um armiponente guerreiro, forte e poderoso.  Haquem é um dos
    mais temidos guerreiros do gelo.
  name: Haquem
  vnum: '010112612623'
- description: Alberish, o guardião do anel de Nibelungos está aqui.
  keywords:
  - Alberish
  - anao
  - guardiao
  long_desc: |-
    Você observa um guerreiro com um olhar bastante estranho.  Alberish
    conseguiu acumular um imenso tesouro escravizando seus irmãos.  Por causa do
    Anel, Alberish, o Nibelungo, rejeitou o amor.  Oprimiu seus irmãos e
    governou-os com disciplina férrea.
  name: Alberish
  vnum: '010112612624'
- description: Heindall, o vigia dos deuses está aqui, atento a qualquer perigo.
  keywords:
  - Heindall
  long_desc: |-
    Você observa Heindall, o vigia dos deuses de Asgard.  Heindall monta guarda
    na fronteira do céu, para impedir os gigantes de passar pela ponte Bifrost.
    Heindall dorme menos que um pássaro e enxerga tanto de noite quanto de dia
    num raio de cem milhas.  Ele possui tão bons ouvidos que podia ouvir o ruído
    da relva crescendo e da lã crescendo em um carneiro.
  name: Heindall
  vnum: '010112612625'
- description: Um gigantesco dragão está aqui, protegendo o tesouro de Andvari está
    aqui.
  keywords:
  - Fafnir
  - gigantesco
  - dragao
  - anao
  long_desc: |-
    Você observa um gigantesco dragão branco.  Suas garras possuem o tamanho de
    um humano adulto e seus dentes além de serem enormes, ainda possuem as
    marcas de sangue da sua última refeição.
  name: Fafnir
  vnum: '010112612626'
- description: Um monstruoso gigante está aqui, olhando você de cima para baixo.
  keywords:
  - gigante
  long_desc: |-
    Você observa um assustador morador de Jotunheim.  Seus pés poderiam lhe
    esmagar a qualquer momento.  Entre as nuvens você observa os seus ombros e
    em suas mãos enormes poderia ser sustentado todo um reino.  Os gigantes
    representam o caos e foram criados pelos deuses, que os elimina e implantam
    a ordem.
  name: um gigante de Jotunheim
  vnum: '010112612627'
- description: Um guerreiro Einherjar está aqui, protegendo Asgard e seus deuses.
  keywords:
  - Einherjar
  long_desc: |-
    Você observa um celestial guerreiro, que defenderá Asgard e seus deuses a
    qualquer custo.  Os Einherjars são heróis mortos em batalhas que são levados
    pelas valquírias até o Valhala.  Apenas os guerreiros mortos em batalhas e
    com suas armas na mão teriam esse destino.  OS guerreiros mortos por doenças
    ou velhice seriam levados para Hela, em Niffhelheim.  Os Einherjars passam o
    dia lutando entre si e durante a noite banqueteando-se no grande salão do
    palácio Valhala.  Odin comanda o exercito dos Einherjars para proteger os
    deuses e Asgard, no dia do crepúsculo dos deuses, o Ragnarok.
  name: um Einherjar
  vnum: '010112612628'
- description: Brunnhilde, a líder das valquírias está aqui, montada em seu corcel.
  keywords:
  - Brunnhilde
  - lider
  long_desc: |-
    Você observa uma bela guerreira montada num belo corcel.  As valquírias são
    guerreiras virgens, que cavalgam corcéis, armadas de elmos e lanças.  Odin,
    desejoso de reunir grande número de heróis no Valhala, a fim de poder
    enfrentar os gigantes quando chegasse o dia da luta decisiva, mandava
    escolher em todos os campos de batalha os que deveriam ser mortos.  As
    valquírias eram as mensageiras de Odin, e seu nome significa "as que
    escolhem os mortos".  Quando galopavam em suas cavalgadas, o brilho de seus
    escudos produzia nos céus nórdicos uma luz estranha, a chamada aurora
    boreal.
  name: Brunnhilde
  vnum: '010112612629'
- description: Helmwige, a segunda valquíria está aqui, montada em seu corcel.
  keywords:
  - Helmwige
  long_desc: |-
