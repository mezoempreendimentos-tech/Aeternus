- description: Um sacerdote hofgodi está aqui, recolhendo o tributo hoftoll.
  keywords:
  - hofgodi
  - sacerdote
  long_desc: |-
    Você observa um velho sacerdote hofgodi coberto com um manto vermelho com
    bordados dourados.  O sacerdote todo ano recolhe o tributo de hoftoll, para
    a sua própria manutenção.
  name: um sacerdote hofgodi
  vnum: '010112612638'
- description: Eric, o rei viking dos clãs suecos está aqui.
  keywords:
  - Eric
  - rei
  long_desc: |-
    Você observa um velho viking, porém forte e alto como um gigante.  Eric
    governa todos os clãs vikings da Suécia.  O rei Eric costuma oferecer seus
    prisioneiros capturados durante os ataques vikings aos navios de outras
    nações ou guerreiros capturados durante as invasões vikings as cidades das
    terras desconhecidas.
  name: Eric
  vnum: '010112612639'
- description: Anidhogge, a escuridão está aqui, corroendo a raíz perpetuamente.
  keywords:
  - Anidhogge
  - escuridao
  long_desc: |-
    Você observa uma criatura assustadora.  Anidhogge não possui forma definida,
    é uma forma gasosa negra, que muda de forma dependendo de suas necessidades
    e da direção do vento.  Anidhogge se alimenta da fonte de Niffhelheim e
    corroí perpetuamente a raiz que penetra em Niffhelheim.
  name: Anidhogge
  vnum: '010112612640'
- description: Gerda, a mais bela das mulheres está aqui.
  keywords:
  - Gerda
  long_desc: |-
    Você observa Gerda, a mais bela mulher de todas as terras escandinavas.
    Seu olhar é majestoso como a luz divina e sua pele macia como o mar.  Gerda
    encantou Frei, que ao subir no trono de Odin, do qual se pode ver todo o
    universo, e , olhou em torno e encontrou no reino dos gigantes uma linda
    donzela, e desde então foi tomado de tanta tristeza, que não pode mais
    dormir, beber ou falar.
  name: Gerda
  vnum: '010112612641'
- description: Tialfi, o criado de Thor está aqui, olhando fixamente para você.
  keywords:
  - Tialfi
  - criado
  long_desc: |-
    Você observa o jovem Tialfi, criado de Thor, o senhor dos trovões.  Tialfi é
    o mais veloz na corrida de todos os homens, sempre acompanhava Thor em suas
    aventuras, carregando sua mochila que continha as suas provisões.
  name: Tialfi
  vnum: '010112612642'
- description: Hermod, o ágil está aqui, esperando notícias de Hela sobre Balder.
  keywords:
  - Hermod
  - agil
  long_desc: |-
    Você observa Hermod, filho de Odin, apelidado de o ágil.  Hermod se ofereceu
    a fazer a viagem à morada de Hela e oferecer-lhe um resgate para que ela
    permitisse a volta do amado Balder, ao reino dos vivos.  Odin entregou o seu
    cavalo, Sleipnir, que tinha oito patas e corria mais que o vento para
    levá-lo para Niffelheim.  Hermod ofereceu o regaste e Hela pediu um tempo
    para decidi e verificar se Balder era mesmo tão amado pelos deuses.
  name: Hermod
  vnum: '010112612643'
- description: O atraso, o criado de Hela está aqui.
  keywords:
  - atraso
  - criado
  long_desc: |-
    Você observa uma horripilante sombra.  O atraso é o criado da morte, Hela.
    Ele vaga pelas terras de Niffheleim, cuidando e semeando as trevas.
  name: o atraso
  vnum: '010112612644'
- description: A avareza, a criada de Hela está aqui.
  keywords:
  - avareza
  - criada
  long_desc: |-
    Você observa uma assustadora sombra.  A avareza é a criada da morte, Hela.
    Ela vaga pelas trevas de Niffheleim, cuidando das terras e levando as
    notícias e acontecimento do mundo dos mortos para a terrível Hela.
  name: a avareza
  vnum: '010112612645'
- description: Eric, o ruivo está aqui, espalhando ondas de sangue por onde passa.
  keywords:
  - Eric
  - ruivo
  long_desc: |-
    Você observa um homem alto e forte, de cabelos loiros e sujos.  Com um olhar
    irônico e assustador.  Eric, o ruivo, espalha o terror e muito sangue em
    todos os lugares, que percorre com seu companheiro Leif Ericsson.  Os dois
    vikings sanguinários foram expulsos da península escandinava e partiram
    rumo a terra do gelo.
  name: Eric, o ruivo
  vnum: '010112612646'
- description: Leif Ericsson, o sanguinário está aqui, procurando uma briga.
  keywords:
  - Leif
  - Ericsson
  long_desc: |-
    Você observa um sanguinário viking.  Leif Ericsson é o companheiro do temido
    Eric, o ruivo.  Quando os dois se juntam sempre o sangue de inocentes é
    derramado.  Leif Ericsson foi expulso da península escandinava, junto com
    Eric, o ruivo.
  name: Leif Ericsson
  vnum: '010112612647'
- description: Aegir, o gigante do mar está aqui.
  keywords:
  - Aegir
  - gigante
  - mar
  long_desc: |-
    Você observa um poderoso gigante.  Aegir é o senhor dos mares gelados.  Seu
    corpo é uma verdadeira muralha de corais e seus cabelos são longos como as
    algas dos mares gelados.
  name: Aegir
  vnum: '010112612648'
- description: Zorgerdr, o gigante do gelo está aqui, observando as terras escandinavas.
  keywords:
  - Zorgerdr
  - gigante
  - gelo
  long_desc: |-
    Você observa um poderoso gigante do gelo.  Coberto com a pele de mais de
    dez dragões brancos, este gigante poderia lhe esmagar como uma formiga.  Os
    gigantes representam o caos para o mundo e para deuses, com o exercito de
    Odin a ordem deve ser implantada.  Os gigantes de gelo possuem o poder de
    provocarem as tempestades e os ventos.
  name: Zorgerdr
  vnum: '010112612649'
- description: Irpa, o gigante de gelo está aqui, provocando fortes ventanias.
  keywords:
  - Irpa
  - gigante
  - gelo
  long_desc: |-
    Você observa o poderoso gigante de gelo, Irpa, capaz de provocar grandes
    tempestades, apenas soprando ou batendo uma das suas mãos sobre a outra.
  name: Irpa
  vnum: '010112612650'
- description: Mime, o nibelungo feio está aqui.
  keywords:
  - Mime
  - anao
  - nibelungo
  long_desc: |-
    Você observa Mime, um ganancioso anão, que criou Siegfried depois da morte
    da sua mãe, Sieglinde.  Com uma única intenção:  Que quando Siegfried
    crescesse, ele matasse o dragão, que guarda o tesouro de Andvari, para que
    depois Mime se apoderar-se do anel mágico.  Mime é um dos mais engenhosos
    ferreiros entre os nibelungos, forjou várias espadas para o uso do jovem,
    Siegfried, mas cada uma delas foi despedaçada pelo poderoso braço que a
    empunhava.
  name: Mime
  vnum: '010112612651'
- description: Thryn, o rei dos gigantes de gelo está aqui, imponente e assustador.
  keywords:
  - Thryn
  - rei
  - gigante
  - gelo
  long_desc: |-
    Você observa um magnífico gigante de gelo, Thryn, o rei dos gigantes de
    gelo.  Thryn coberto pela pele de milhares de focas, possui um olhar
    terrível e temido por todos.  Como a maioria dos gigantes, ele vive em
    Jotunheim.
  name: Thryn
  vnum: '010112612652'
- description: Skrymir, o gigante de gelo está aqui.
  keywords:
  - Skrymir
  - gigante
  - gelo
  long_desc: |-
    Você observa um assustador gigante de gelo.  Skrymir vive nas terras geladas
    de Jotunheim, liderado pelo rei dos gigantes de gelo, Thryn.  Você observa
    todo o corpo dele, com exceção da sua cabeça, que está coberta por nuvens.
  name: Skrymir
  vnum: '010112612653'
- description: Utgard-loki, o rei de Utgard e senhor das ilusões está aqui.
  keywords:
  - utgard
  long_desc: |-
    Você observa um homem de estatura prodigiosa, forte e imponente.  Rei de
    Utgard e senhor das ilusões, Utgard-loki possui centenas de seguidores e
    fiéis, que defenderam a cidade de Utgard e as terras de Jotunheim, a
    qualquer custo.
  name: Utgard-loki
  vnum: '010112612654'
- description: Logi, o fogo está aqui.
  keywords:
  - Logi
  - fogo
  long_desc: |-
    Você observa um magnífico gigante de cabelos ruivos e olhos vermelhos.
    @RSerá Logi alguma das ilusões criadas por Utgard-loki ?@n
  name: Logi
  vnum: '010112612655'
- description: Angerbode, a giganta profetisa está aqui.
  keywords:
  - Angerbode
  - giganta
  - profetisa
  long_desc: |-
    Você observa uma majestosa giganta.  Angerbode é amante de Loge e mãe das
    três aberrações:  Fenris, o lobo, de Hela, a morte, e da serpente de
    Midgaard, Jormungand.  Angerbode é sempre consultada pelos deuses sobre o
    futuro.
  name: Angerbode
  vnum: '010112612656'
- description: Greyfell, o cavalo de Siegfried está aqui, olhando para você curiosamente.
  keywords:
  - Greyfell
  - cavalo
  long_desc: |-
    Você observa um belo cavalo branco e de cascos dourados.  Greyfell foi um
    presente entregue a Siegfried por Odin, sendo Greyfell descendente direto de
    Sleipnir, o cavalo do deus Odin.
  name: Greyfell
  vnum: '010112612657'
- description: Hugin, o corvo mensageiro de Odin está aqui, contando-lhe sobre seus
    vôos.
  keywords:
  - Hugin
  - corvo
  long_desc: |-
    Você observa um belo corvo negro.  Suas penas negras brilham ao tocarem a
    luz e seus olhos flamejantes são capazes de avistar uma formiga em qualquer
    floresta e avistar o menor peixe no maior rio.  Contudo, Hugin voa o dia
    todo sobre o mundo e, quando volta, conta ao deus tudo que viu e ouviu.
  name: Hugin
  vnum: '010112612658'
- description: Munin, o corvo mensageiro de Odin está aqui, contando-lhe sobre seus
    vôos.
  keywords:
  - Munin
  - corvo
  long_desc: |-
    Você observa um belo corvo negro.  Suas penas negras brilham ao tocarem a
    luz e seus olhos flamejantes são capazes de avistar uma formiga em qualquer
    floresta e avistar o menor peixe no maior rio.  Contudo, Munin voa o dia
    todo sobre o mundo e, quando volta, conta ao deus tudo que viu e ouviu.
  name: Munin
  vnum: '010112612659'
- description: Geri, o lobo de Odin está aqui, ao lado do senhor de Asgard.
  keywords:
  - Geri
  - lobo
  long_desc: |-
    Você observa um poderoso lobo branco, com garras e um olhar assustador.
    Geri pertence ao exercito de Odin, que o alimenta com toda a carne que é
    colocada diante dele, uma vez que ele próprio não tem necessidade de se
    alimentar, a não ser com o hidromel, que lhe serve tanto de comida como de
    bebida.
  name: Geri
  vnum: '010112612660'
- description: Freki, o lobo de Odin está aqui, ao lado do senhor de Asgard.
  keywords:
  - Freki
  - lobo
  long_desc: |-
    Você observa um poderoso lobo branco, com garras e um olhar assustador.
    Geri pertence ao exercito de Odin, que o alimenta com toda a carne que é
    colocada diante dele, uma vez que ele próprio não tem necessidade de se
    alimentar, a não ser com o hidromel, que lhe serve tanto de comida como de
    bebida.
  name: Freki
  vnum: '010112612661'
- description: Schrinnir, o javali da fartura está aqui.
  keywords:
  - Schrinnir
  - javali
  long_desc: |-
    Você observa um javali enorme e misterioso.  O javali Schrinnir abastece com
    suas carnes todo o exercito de Odin.  A fartura da carne do javali, deve-se
    ao fato de que embora o javali seja cozido todas as manhãs, ele fica inteiro
    novamente todas as noites.
  name: Schrinnir
  vnum: '010112612662'
- description: Heidrum, a fonte de hidromel está aqui.
  keywords:
  - Heidrum
  - cabra
  long_desc: |-
    Você observa uma bela cabra branca com as tetas cheias de hidromel.  Heidrum
    fornece hidromel em abundância aos heróis do exercito de Odin.
  name: Heidrum
  vnum: '010112612663'
- description: Fenris, o monstruoso lobo está preso aqui.
  keywords:
  - Fenris
  - lobo
  long_desc: |-
    Você observa uma criatura aterrorizante.  Fenris, filho de Loki e da giganta
    profetisa Angerbode, é uma ameaça aos homens e aos deuses.  O jovem deus da
    batalha Tir já sentiu sua fúria.  Quando Fenris estava sendo aprisionado
    pelos deuses, ele pediu para que como garantia de que a corrente usada para
    prendê-lo seria retirada mais tarde, alguém enfiasse a mão dentro da boca
    dele.  Tir bastante corajoso colocou a mão dentro da boca de Fenris, que
    quando verificou que não podia livrar-se e que os deuses não iriam soltá-lo,
    cortou com os dentes a mão de Tir.  Fenris ainda jovem foi aprisionado na
    pequena ilha de Lyngvi, no lago de Amsvartnir.
  name: Fenris
  vnum: '010112612664'
- description: Sleipnir, o cavalo de Odin está aqui, com sua postura magnífica.
  keywords:
  - Sleipnir
  - cavalo
  long_desc: |-
    Você observa um magnífico cavalo branco de oito patas e cascos de ouro.
    Sleipnir é cria de Loge, que dado de presente ao todo poderoso Odin.
    Sleipnir é um dos mais majestosos cavalos de Asgard e possui a fama de
    correr mais que o vento.
  name: Sleipnir
  vnum: '010112612665'
- description: Gulltopp, o cavalo de Heindall está aqui.
  keywords:
  - Gulltopp
  - cavalo
  long_desc: |-
    Você observa um belo cavalo negro e de cascos de prata.  Gulltopp pertence
    ao guardião Heindall, e quando é cavalgado as terras por onde ele pisa
    tremem.  Gulltopp é fiel a Heindall e possui ele como seu único dono.
  name: Gulltopp
  vnum: '010112612666'
- description: Jormungand, a serpente de Midgaard está aqui.
  keywords:
  - Jormungand
  - serpente
  long_desc: |-
    Você observa a monumental serpente de Midgaard, Jormungand.  Filha de Loge e
    da giganta profetisa Angerbode, ela foi lançada no oceano por Odin, pois
    no oceano ela estaria cercada pelas terras que o cercam.  Jormungand é
    bastante temida pelos deuses e homens, por sua força e seu tamanho.  A
    serpente cresceu a tal ponto que, enfiando a cauda na boca, rodearia toda a
    terra.
  name: Jormungand
  vnum: '010112612667'
- description: O verme de Midgaard está aqui, pronto para defender a cidade Midgaard.
  keywords:
  - Verme
  long_desc: |-
    Você observa o gigantesco verme de Midgaard.  Diz a lenda que todas as vezes
    que os moradores e a cidade de Midgaard correm perigo, a estatua do verme de
    Midgaard feita de bronze e pedras tomará vida e defenderá com todas as suas
    forças a cidade de ataques malignos.
  name: o verme de Midgaard
  vnum: '010112612668'
- description: Gullinkambi, o galo do Valhala está aqui, despertando os Einherjars.
  keywords:
  - Gullinkambi
  - galo
  long_desc: |-
    Você observa um belo e majestoso galo de penas brilhantes e bico de prata.
    Gullinkambi canta todos os dias no palácio Valhala para despertar o exercito
    do deus Odin.  Os deuses confiam também que Gullinkambi dará o alarme da
    chegada do Ragnarok.
  name: Gullinkambi
  vnum: '010112612669'
- description: Nidhogg, o dragão da escuridão está aqui, roendo uma raiz de Yggdrasil.
  keywords:
  - Nidhogg
  - dragao
  long_desc: |-
    Você observa um monstruoso e terrível dragão de olhos flamejantes e garras
    enormes sujas de sangue.  A vida de Nidhogg é um ciclo assustador.  Ele vive
    sempre roendo a raiz de Yggdrasil que mergulha em Niffheleim, contudo quando
    Nidhogg começa a prejudicar a árvore, a águia guardiã de Yggdrasil, desce
    voando e o ataca.  Bastante ferido Nidhogg lambe as feridas, que aos poucos
    vão sendo curadas e com isso Yggdrasil tem tempo de se recuperar também.
    Quando todas as feridas de Nidhogg estão curadas, dar-se início a um novo
    ciclo.
  name: Nidhogg
  vnum: '010112612670'
- description: Uma bela águia está aqui, observando você do topo da Yggdrasill.
  keywords:
  - aguia
  - guardia
  long_desc: |-
    Você observa uma magnífica águia de penas douradas e garras cristal.  Ela é
    a guardiã da celestial Yggdrasill e defenderá a árvore de todos os males.
  name: a águia guardiã de Yggdrasil
  vnum: '010112612671'
- description: Tanngnost, o bode de Thor está aqui, esperando os arreios da carruagem.
  keywords:
  - Tanngnost
  - bode
  long_desc: |-
    Você observa um belo bode branco de chifres magníficos.  Tanngnost pertence
    ao senhor dos trovões e servirá sempre ao seu senhor.
  name: Tanngnost
  vnum: '010112612672'
- description: Tanngrisni, o bode de Thor está aqui, esperando os arreios da carruagem.
  keywords:
  - Tanngrisni
  - bode
  long_desc: |-
    Você observa um belo bode branco de chifres magníficos.  Tanngrisni pertence
    ao senhor dos trovões e servirá sempre ao seu senhor.
  name: Tanngrisni
  vnum: '010112612673'
- description: Ratatosk, o esquilo de Yggdrasil está aqui, correndo para cima e para
    baixo.
  keywords:
  - Ratatosk
  - esquilo
  long_desc: |-
    Você observa um pequenino esquilo cinzento, que não para de correr do topo
    da belíssima Yggdrasil até a sua raiz que mergulha em Niffheleim.  Ratatosk
    leva os insultos do dragão, Nidhogg, para a águia guardiã de Yggdrasil, que
    fica no topo da árvore.
  name: Ratatosk
  vnum: '010112612674'
- description: Dvalin, o soberano dos anões do subterrâneo está aqui.
  keywords:
  - Dvalin
  - soberano
  - anao
  long_desc: |-
    Você observa uma criatura bastante estranha.  Feia, nariguda, de uma cor
    escura e suja.  Dvalin é o soberano dos anões do subterrâneo de Niffhelim.
    Seus súditos apreciam somente à noite, pois evitam o sol como o inimigo mais
    mortal, uma vez que, os raios solares atingissem sobre eles, os
    transformavam imediatamente em pedras.
  name: Dvalin
  vnum: '010112612675'
- description: Dain, o soberano dos elfos luminosos está aqui, emanando uma luz celestial.
  keywords:
  - Dain
  - soberano
  - elfo
  long_desc: |-
    Você observa uma das criaturas mais bondosas e celestiais de todas as terras
    de Vitália.  Seres de grandes poderes, os elfos luminosos são dotados de
    grande beleza, mais brilhantes que o sol e vestem roupas delicadas e
    transparentes.  Dain possui cabelos louros e olhos azuis, que lhe trazem a
    paz, apenas com um simples olhar.  Dain é o soberano dos elfos luminosos.
  name: Dain
  vnum: '010112612676'
- description: Uma assustadora alma está perambulando por aqui.
  keywords:
  - alma
  - assustadora
  long_desc: |-
    Você observa uma horripilante alma vagante de Niffheleim.  Os guerreiros que
    falecem por doenças ou por velhice, terão suas almas encaminhadas ao reino
