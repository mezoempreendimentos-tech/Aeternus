- description: Poseidon, o deus do mar, está aqui com toda sua imponência.
  keywords:
  - Poseidon
  long_desc: |-
    Poseidon, o deus do mar, é filho dos Titãs Réia e Cronos, é marido de
    Anfitrite, uma das Nereidas, com quem ele teve um filho, Tritão.  Poseidon
    possuiu outros casos de amor, especialmente com ninfas de riachos e fontes,
    seus filhos são conhecidos pela selvageria e crueldade.
  name: Poseidon
  vnum: '010110810800'
- description: Tritão, o senhor dos tritões, está aqui carregando em seu olhar a violência.
  keywords:
  - Tritao
  long_desc: |-
    Tritão, o senhor dos tritões, é filho de Poseidon, deus do mar e de
    Anfitrite.  Ele possui todos os poderes do mar e o dom da profecia.  Alguns
    dizem que para vencê-lo bastava lhe dar uma taça de vinho, pois a bebida o
    fazia dormir.  O senhor dos tritões é conhecido como um deus violento, que
    com sua concha marinha fez com que os Titãs batessem em retirada na batalha
    entre os deuses e Titãs.
  name: Tritão
  vnum: '010110810801'
- description: Tétis, a formosa nereida, está aqui encantando você com a sua beleza.
  keywords:
  - tetis
  - nereida
  long_desc: |-
    Tétis é a nereida mais bela, formosa e muito cobiçada por vários deuses.  A
    bela divindade marinha é esposa de Peleus, filha de Nereu e mãe de Aquiles.
    Uma lenda diz que ela mergulhou todos os filhos que teve com Peleus ainda
    recém nascidos no fogo para que os elementos mortais, provenientes de
    Peleus, fossem consumidos.  Contudo no sétimo filho, Tétis na tentativa de
    tornar seu filho um imortal, ela mergulhou o recém-nascido no rio Estige,
    rio subterrâneo que corria em Hades, mas o que a formosa divindade conseguiu
    foi torná-lo invulnerável.
  name: Tétis
  vnum: '010110810802'
- description: Pégaso, o corcel mágico, está aqui envergando suas belíssimas asas.
  keywords:
  - Pegaso
  long_desc: |-
    Você observa um lindo corcel branco, com asas coloridas e de uma envergadura
    monumental.  Filho de Poseidon e da Górgona Medusa, Pégaso foi amansado por
    Minerva, que o deu de presente para as musas.  A fonte de Hipocreue, situada
    na montanha onde vivem as musas, Hélicon, foi aberta por um coice deste belo
    animal.
  name: Pégaso
  vnum: '010110810803'
- description: Aquiles, o guerreiro imortal, está aqui pensando em táticas de guerra.
  keywords:
  - Aquiles
  long_desc: |-
    Aquiles é o mais armipotente dos guerreiros gregos, filho de Tétis, a ninfa
    do mar, e de Peleus, o rei dos Mirmidões de Tessália.  Quando criança sua
    mãe mergulhou-o nas águas do rio Estige para torná-lo imortal.  As águas o
    fizeram invulnerável, exceto nos calcanhares, por onde sua mãe o segurou.
    Aquiles é o guerreiro mais temido por todos os inimigos da Grécia.
  name: Aquiles
  vnum: '010110810804'
- description: Peleus, o rei dos Mirmidões de Tessália está aqui.
  keywords:
  - Peleus
  long_desc: "Peleus é filho de Eaco, rei de Egina, marido de Tétis, a ninfa do mar,\
    \ e pai\nde Aquiles.  Uma lenda conta que Zeus e Poseidon mesmo amando Tétis,\
    \ após\nouvirem um oráculo profetizando que o filho gerado por Tétis se tornaria\n\
    mais poderoso que o pai, arranjaram um marido para ela. Peleus e Tétis se\ncasaram\
    \ diante de todos os deuses, faltando apenas a presenÃ§a de Ã\x89ris, a\ndeusa\
    \ da discórdia, que com raiva por não ter sido convidada lançou um\nmagnífico\
    \ pomo de ouro com a maliciosa inscrição: \"à mais bela\",  dizem que\neste ato\
    \ iniciou a atual guerra de Tróia."
  name: Peleus
  vnum: '010110810805'
- description: Menelau, o rei de Esparta, está aqui procurando bravamente por Helena.
  keywords:
  - Menelau
  long_desc: |-
    Menelau é o rei de Esparta, irmão de Agamemnon e marido de Helena.
    Você observa um grande guerreiro, que lutará com bravura e força para
    resgatar sua amada, Helena.
  name: Menelau
  vnum: '010110810806'
- description: Príamos, o rei de Tróia, está aqui observando com ansiedade as batalhas.
  keywords:
  - Priamos
  long_desc: |-
    Príamos é o rei de Tróia, marido da rainha Hécuba e pai de mais de cem
    filhos, entre eles Heitor, o maior guerreiro de Tróia, e a profetisa
    Cassandra.  Príamos juntamente com Hécuba, apenas observam com muita
    ansiedade a batalha entre os gregos e troianos, de dentro dos muros da
    cidade.  Muito velho e cansado, Príamos fortalece o lado troiano pelo seu
    bom governo e pelas numerosas alianças com os seus vizinhos.
  name: Príamos
  vnum: '010110810807'
- description: Páris, o príncipe de Tróia, está aqui rezando para a deusa Afrodite.
  keywords:
  - Paris
  long_desc: |-
    Páris possui um corpo de um grande atleta, forte e imponente.  Filho de
    Príamos e Hécuba, há muito tempo atrás uma profecia previu que Páris seria,
    um dia, a ruína de Tróia.  Essa profecia forçou seus pais a abandona-lo no
    Monte Ida, onde cresceu com os pastores, até ser reconhecido pelos seus
    verdadeiros pais e trazido de volta para dentro dos poderosos muros de
    Tróia.
  name: Páris
  vnum: '010110810808'
- description: Quíron, o mais sábio e justo dos centauros, está aqui orando para Apolo.
  keywords:
  - Quiron
  long_desc: |-
    Você observa um grande centauro, ao olhar seu rosto você percebe sua experiência
    e as marcas do tempo.  Quíron recebeu lições de Apolo e Diana, tornando-se
    famoso por sua habilidade na caça, medicina, música e arte da profecia. Seus
    discípulos se tornaram grandes guerreiros, um deles foi o jovem Aquiles que foi
    criado por Quíron.
  name: Quíron
  vnum: '010110810809'
- description: Agamemnon, o comandante-chefe dos gregos, está aqui.
  keywords:
  - Agamemnon
  long_desc: |-
    Você observa o lendário rei de Argos e Miscenas, Agamemnon.  Filho de Atreu
    e irmão do injuriado Menelau.  Seu olhar expressa a luta pela honra e pela
    promessa que todos os pretendentes da bela Helena, fizeram antes da sua
    escolha.  Todos os gregos que disputavam a mão da formosa Helena, juraram
    que defenderiam o grego escolhido por ela em todos os momentos que ele
    precisasse.  Agamemnon é um exemplo para os novos guerreiros gregos.
  name: Agamemnon
  vnum: '010110810810'
- description: Heitor, o comandante-chefe dos troianos, está aqui.
  keywords:
  - Heitor
  long_desc: |-
    Você observa Heitor, o comandante-chefe das tropas troianas, o mais poderoso
    guerreiro troiano, filho do rei Príamos e da rainha Hécuba, e marido de
    Andrômaca.
  name: Heitor
  vnum: '010110810811'
- description: Reso, o rei de Trácia, está aqui apoiando os troianos.
  keywords:
  - Reso
  - rei
  long_desc: |-
    Você observa Reso, o rei de Trácia, forte e destemido defendendo com
    bravura o brasão troiano.
  name: Reso
  vnum: '010110810812'
- description: Pentesiléia, a rainha das Amazonas, está aqui.
  keywords:
  - Pentesileia
  long_desc: |-
    Você observa uma linda guerreira, que por trás de sua beleza existe uma
    força capaz de destronar reis e destruir montanhas.  Você observa
    Pentesiléia, a rainha das Amazonas, ela e suas guerreiras lutam pela causa
    de Tróia.  As Amazonas são mulheres guerreiras que excluem os homens de sua
    sociedade, elas ocasionalmente se relacionavam com homens de regiões
    vizinhas, as crianças do sexo feminino que nasciam eram treinadas desde
    criança para serem arqueiras para a guerra, e tinham o seio direito queimado
    para facilitar o manejo do arco, enquanto as crianças do sexo masculino que
    nasciam eram enviadas aos pais.
  name: Pentesiléia
  vnum: '010110810813'
- description: Mêmnon, o rei da Etiópia, está aqui olhando para você bravamente.
  keywords:
  - Memnon
  long_desc: |-
    Você observa Mêmnon, o rei da Etiópia, filho da deusa Aurora e do mortal
    Titono, o forte e bravo guerreiro negro, lutará pela causa de Tróia com toda
    sua honra e coragem, ajudando os parentes de seu pai.
  name: Mêmnon
  vnum: '010110810814'
- description: Ajax, o líder de Lócris, está aqui olhando para você de cima para baixo.
  keywords:
  - Ajax
  long_desc: |-
    Você observa um guerreiro de estatura gigantesca e de grande coragem.  Ajax
    é o líder de Lócris, situada na Grécia Central.  Considerado um dos mais
    poderosos guerreiros de todas as tropas helênicas, Ajax só não é mais
    ilustre que o imortal Aquiles, no campo de batalha.
  name: Ajax
  vnum: '010110810815'
- description: "Ulisses, o rei de Ã\x8Dtaca, estÃ¡ aqui pensando na sua bela PenÃ©lope."
  keywords:
  - Ulisses
  long_desc: "Você observa um guerreiro que traz em seu rosto o sentimento da angústia.\
    \  O\nrei de Ã\x8Dtaca abandonou sua esposa, PenÃ©lope, para defender o brasÃ£o\
    \ HelÃªnico\nnas terras de Tróia.  Ulisses é o mais sábio entre os guerreiros\
    \ gregos."
  name: Ulisses
  vnum: '010110810816'
- description: Andrômaca, a esposa de Heitor, está aqui ansiosa por notícias do marido.
  keywords:
  - Andromaca
  long_desc: |-
    Você observa uma bela troiana bastante aflita e nervosa, sem saber o que
    poderá acontecer com seu marido, o poderoso guerreiro troiano, Heitor.
  name: Andrômaca
  vnum: '010110810817'
- description: Diomedes, o guerreiro herói, está aqui ostentando o brasão grego.
  keywords:
  - Diomedes
  long_desc: |-
    Você observa Diomedes, um forte e imponente guerreiro grego, que possui
    várias habilidades atribuídas apenas aos heróis.  Suas habilidades só são
    superadas por Aquiles, o imortal.
  name: Diomedes
  vnum: '010110810818'
- description: Eaco, o rei de Egina, está aqui rezando em agradecimento a Zeus.
  keywords:
  - Eaco
  long_desc: |-
    Você observa Eaco, o rei de Egina, ilha habitada pelos Mirmidões, trazidos a
    vida graças aos poderes do glorioso deus Zeus.  Eaco é um bondoso e sábio,
    cordial e pacífico.
  name: Eaco
  vnum: '010110810819'
- description: Pátroclo, o seguidor de Aquiles, está aqui.
  keywords:
  - Patroclo
  long_desc: |-
    Você observa Pátroclo, o estimado amigo de Aquiles.  Pátroclo possui uma
    admirável coragem, e não pensaria duas vezes para defender seus amigos de
    qualquer forma de perigo.  Seus longos cabelos negros brilham como as
    estrelas nas noites de batalha entre gregos e troianos.
  name: Pátroclo
  vnum: '010110810820'
- description: O magnífico Leviatã está aqui, nadando nas mais profundas águas.
  keywords:
  - Leviata
  long_desc: |-
    Incrível !  Você não consegue acreditar que tal criatura exista realmente.
    Você observa o grande Leviatã nadando e percebe ao lado dele uma grande
    baleia, que poderia ser tragada pelo Leviatã a qualquer momento.  Suas
    escamas verdes e amarelas e suas barbatanas vermelhas dão um tom majestoso a
    tal criatura.
  name: Leviatã
  vnum: '010110810821'
- description: Hécuba, a rainha de Tróia, está aqui com todo seu charme e beleza.
  keywords:
  - Hecuba
  long_desc: |-
    Você observa Hécuba, a rainha de Tróia, esposa de Príamos e mãe de Heitor,
    Páris e Cassandra.  Hécuba é uma bela mulher e uma magnífica rainha, justa e
    bondosa.
  name: Hécuba
  vnum: '010110810822'
- description: Helena, a mulher mais linda da Grécia, está aqui.
  keywords:
  - Helena
  long_desc: |-
    Você observa a bela Helena, a mais bela de todas as mulheres gregas.  Filha
    de Zeus e Leda, e esposa de Menelau.
  name: Helena
  vnum: '010110810823'
- description: Cassandra de Tróia está aqui, advertindo os troianos de muitos perigos.
  keywords:
  - Cassandra
  long_desc: |-
    Você observa a linda Cassandra de Tróia.  Filha do rei Príamos e da rainha
    Hécuba.  Recebeu o dom da profecia do Deus Apolo, com quem teve um romance,
    mas quando ela se recusou em se entregar a ele, Apolo fez com que o dom se
    tornasse inútil.  Ao decretar que ninguém acreditaria em suas predições.
  name: Cassandra
  vnum: '010110810824'
- description: Um guarda troiano está aqui, protegendo a cidade de Tróia.
  keywords:
  - guarda
  - troiano
  long_desc: |-
    Forte e atento a qualquer movimento estranho dentro da cidade e nas suas
    redondezas.  O guarda troiano ostenta em sua armadura o imponente brasão de
    Tróia.  Brasão que ele defenderá com todo o vigor e bravura.
  name: um guarda troiano
  vnum: '010110810825'
- description: Um soldado troiano está aqui, esperando as ordens de seu comandante.
  keywords:
  - soldado
  - troiano
  long_desc: |-
    Você observa o armipotente soldado troiano defendendo com orgulho e bravura
    sua terra e seu povo.  O soldado troiano é forte e possui uma expressão em
    seu rosto de força e perseverança, que assustaria qualquer soldado grego.
  name: um soldado troiano
  vnum: '010110810826'
- description: Um batalhão troiano está aqui, lutando bravamente contra as tropas
    gregas.
  keywords:
  - batalhao
  - troiano
  long_desc: |-
    Você observa um batalhão troiano.  São mais de duzentos soldados compactos
    prontos para atacar qualquer alvo.  No meio dos soldados o estandarte com o
    brasão troiano tremula ao vento, demonstrando resistência e força.
  name: um batalhão troiano
  vnum: '010110810827'
- description: Um batalhão grego está aqui, lutando contra as tropas troianas.
  keywords:
  - batalhao
  - grego
  long_desc: |-
    Você observa um batalhão helênico prontos para investir mais uma vez contra
    os troianos.  O campo de batalha está cheio, o batalhão grego sozinho possui
    uns duzentos soldados.  O estandarte com o brasão grego tremula entre os
    poderosos soldados gregos.
  name: um batalhão grego
  vnum: '010110810828'
- description: Um guarda grego está aqui, protegendo o acampamento helênico.
  keywords:
  - guarda
  - grego
  long_desc: |-
    Você observa um guarda grego, forte e imponente.  Ele defenderá a honra e a
    causa grega contra todos os que surgirem no seu caminho.
  name: um guarda grego
  vnum: '010110810829'
- description: Um soldado grego está aqui, esperando as ordens de seu comandante.
  keywords:
  - soldado
  - grego
  long_desc: |-
    Você observa o poderoso soldado grego.  Forte e corajoso, ele cumprirá todas
    as ordens do seu comandante para vencer a guerra contra os troianos.
  name: um soldado grego
  vnum: '010110810830'
- description: Um batalhão etíope está aqui, defendendo os aliados do rei Mêmnon.
  keywords:
  - batalhao
  - etiope
  long_desc: |-
    Você observa espantado o poderio da tropa etíope.  Mais ou menos 150 bravos
    e fortes guerreiros negros, liderados por Mêmnon, o rei da Etíopia.
  name: um batalhão etíope
  vnum: '010110810831'
- description: Um cidadão troiano está aqui, protegido pelas muralhas de Tróia.
  keywords:
  - cidadao
  - troiano
  long_desc: |-
    Você observa um cidadão troiano, seus traços e costumes são originários da
    Anatólia, região de costumes orientais, onde viviam os hititas.  O povo de
    Tróia possui uma beleza encantadora.  Fortes, inteligentes e unidos, os
    troianos construíram os anéis, as muralhas e conquistaram todas as terras de
    domínio troiano, especialmente as rotas marítimas de comércio.
  name: um cidadão troiano
  vnum: '010110810832'
- description: Uma cidadã troiana está aqui, observando atentamente as crianças.
  keywords:
  - Cidada
  - troiana
  long_desc: |-
    Você observa uma cidadã troiana, seus traços e costumes são originários da
    Anatólia, região de costumes orientais, onde viviam os hititas.  O povo de
    Tróia possui uma beleza encantadora.  Fortes, inteligentes e unidos, os
    troianos construíram os anéis, as muralhas e conquistaram todas as terras de
    domínio troiano, especialmente as rotas marítimas de comércio.
  name: uma cidadã troiana
  vnum: '010110810833'
- description: Uma criança troiana está aqui, brincando e correndo pelas ruas da cidade.
  keywords:
  - crianca
  - troiana
  long_desc: |-
    Você observa uma linda criança troiana.  Agitada e brincalhona, ela corre
    sem parar brincando com as outras crianças da cidade.
  name: uma criança troiana
  vnum: '010110810834'
- description: Um artesão troiano está aqui, pensando na sua próxima obra.
  keywords:
  - artesao
  - troiano
  long_desc: |-
    Você observa um artesão troiano.  Suas obras estão espalhadas por todas as
    casas da cidade.  Mesas, cadeiras, estantes, vários objetos produzidos pelas
    sábias e habilidosas mãos do mestre troiano.  Suas mãos expressam a força
    necessária para realizar seu trabalho, mas seu rosto expressa o prazer e a
    felicidade de produzir com tanta alegria seu ofício.
  name: um artesão troiano
  vnum: '010110810835'
- description: O mestre-artesão grego está aqui, construindo uma enorme peça de xadrez.
  keywords:
  - mestre
  - artesao
  - grego
  long_desc: |-
    Você observa o mestre-artesão grego pensativo e trabalhador.  Com várias
    plantas e instrumentos nas mãos, ele trabalha incansavelmente para terminar
    o mais rápido possível sua obra.
  name: o mestre-artesão grego
  vnum: '010110810836'
- description: Um comerciante troiano está aqui, oferecendo suas especiarias.
  keywords:
  - comerciante
  - troiano
  long_desc: |-
    Você observa um comerciante troiano.  Suas especiarias são originárias de
    várias regiões do mundo de Vitália, graças aos domínios troianos nas
    principais rotas marítimas de comércio.

    &ROlá visitante!  Queres alguns dos meus produtos?&w
  name: um comerciante troiano
  vnum: '010110810837'
- description: Laocoonte, o sacerdote troiano está aqui, alertando sobre os perigos.
  keywords:
  - Laocoonte
  - sacerdote
  long_desc: |-
    Você observa Laocoonte, o sacerdote troiano.  Laocoonte é um velho sábio,
    que vez por outra está alertando os troianos sobre os perigosos gregos.  Ao
    percebe que você está olhando para ele, Laocoonte olha fixamente para você e
    fala num tom misterioso: "Seja o que for, receio os gregos, mesmo quando
    trazem presentes."
  name: Laocoonte
  vnum: '010110810838'
- description: Sínon, o fugitivo grego está aqui, escondido observando a agitação
    de Tróia.
  keywords:
  - Sinon
  long_desc: |-
    Você observa seu olhar estranho, como se escondesse algum mistério.  Sínon
    chegou a Tróia como fugitivo dos gregos, dizendo que era maltratado pelos
    seguidores de Menelau.  Sua intuição não erra, ele sabe de algo que não
    contou a ninguém.
  name: Sínon
  vnum: '010110810839'
- description: Enéias, o guerreiro troiano está aqui, rezando para sua mãe.
  keywords:
  - Eneias
  long_desc: |-
    Você observa o filho de Afrodite, Enéias.  Forte e corajoso, Enéias espalha
    o terror nas linhas gregas durante as batalhas.
  name: Enéias
  vnum: '010110810840'
- description: Anquises, o sábio troiano está aqui, olhando para você simpaticamente.
  keywords:
  - Anquises
  long_desc: |-
    Você observa um velho e experiente homem, pai de Enéias e cidadão troiano.
    Sábio e justo, Anquises é sempre procurado pelos mais jovens e pelas crianças
    para conta-las suas histórias.
  name: Anquises
  vnum: '010110810841'
- description: Creusa, a esposa de Enéias está aqui, ansiosa pelo fim da guerra.
  keywords:
  - Creusa
  long_desc: |-
    Você observa uma linda mulher troiana, tensa e ansiosa pelo fim da guerra de
    Tróia.  Esposa de Enéias e mãe de Ascânio, Creusa é uma mulher forte e
    atenciosa com todos ao seu redor.
  name: Creusa
  vnum: '010110810842'
- description: O jovem Ascânio está aqui em pé, olhando curiosamente para você.
  keywords:
  - Ascanio
  long_desc: |-
    Você observa um jovem troiano, filho de Enéias e de Creusa.  Ascânio tem na
    figura do pai, o maior exemplo e orgulho para a sua vida.
  name: Ascânio
  vnum: '010110810843'
- description: Briseis, a donzela de Aquiles está aqui, chorando com saudades dele.
  keywords:
  - Briseis
  long_desc: |-
    Você observa uma bela jovem, entregue a Aquiles numa partilha dos bens
    recebidos por vitórias nas batalhas, principalmente nas regiões vizinhas a
    Tróia.  Briseis foi tomada por Agamemnon, que tinha perdido sua escrava
    preferida Criseis.
  name: Briseis
  vnum: '010110810844'
- description: Uma linda amazona está aqui, esperando as ordens de Pentesiléia.
  keywords:
  - amazona
  long_desc: |-
    Você observa uma linda guerreira, que por trás de sua beleza existe uma
    força capaz de destronar reis e destruir montanhas.  As Amazonas são
    mulheres guerreiras que excluem os homens de sua sociedade, elas
    ocasionalmente se relacionavam com homens de regiões vizinhas, as crianças
    do sexo feminino que nasciam eram treinadas desde criança para serem
    arqueiras para a guerra, e tinham o seio direito queimado para facilitar o
    manejo do arco, enquanto as crianças do sexo masculino que nasciam eram
    enviadas aos pais.
