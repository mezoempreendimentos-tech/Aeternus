  name: o guardião amarelo
  vnum: '010119819814'
- description: Um guardião de roupas vermelhas está em pé aqui.
  keywords:
  - guardiao
  - vermelho
  long_desc: |-
    Ao olhá-lo mais de perto você percebe que esta figura imponente de vestes
    bonitas na cor vermelha não sabe bem o que guarda.  Sua visão foi tirada
