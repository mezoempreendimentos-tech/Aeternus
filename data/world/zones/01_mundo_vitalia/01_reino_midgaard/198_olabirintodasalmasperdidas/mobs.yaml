  name: o guardião vermelho
  vnum: '010119819815'
- description: Um fantasma de um aventureiro perdido vaga por aqui.
  keywords:
  - fantasma
  - aventureiro
  long_desc: |-
    Você tenta olhar para esta figura e acaba olhando através dela..  O que você
    esperava?  É um fantasma!
  name: o fantasma do aventureiro
  vnum: '010119819816'
- description: Um fantasma de aparência imponente está aqui.
  keywords:
  - guerreiro
  - fantasma
  long_desc: |-
    Ao olhar para este fantasma você percebe que sua maneira de vestir-se e agir
    tem uma beleza especial somente vista em guerreiros honrados.  Ele
    provavelmente fora, em tempos idos, um guerreiro muito valoroso.  Sua
    expressão de dor mostra que essa honra foi-lhe tirada.  Você lembra da lenda
    escrita numa das salas deste labirinto e alguma coisa diz que este é o
    guerreiro citado na história.
  name: o fantasma do guerreiro
  vnum: '010119819817'
- description: Uma bela mulher passeia pelo campo.
  keywords:
  - dama
  - mulher
  - bela
  long_desc: |-
    Você olha para esta bela mulher tipicamente do campo e percebe o quanto a
    vida pode ser bela e descomplicada.
  name: a dama do campo
  vnum: '010119819818'
- description: Uma figura estranha e sombria parece rezar logo ali.
  keywords:
  - necromante
  - figura
  - estranha
  - sombria
  long_desc: |-
    Em sua infância, os mais velhos contavam uma lenda sobre um jovem padre que
    escondera-se em um labirinto para estudar as magias malignas de convocação
    dos mortos.  Ao olhar para esta figura você reconhece este NECROMANTE.
  name: o necromante
  vnum: '010119819819'
- description: Parado a sua frente o guardião da sua ultima esperança de sair daqui.
  keywords:
  - guardiao
  - esperanca
  long_desc: |-
    Ele tem a chave para sua saída... se você é um aventureiro descuidado e saiu
    para uma exploração sem seu @WPERGAMINHO DE RETORNO@n, talvez ele possa ajudar,
    embora você não saiba bem como...
  name: o guardião da esperança
  vnum: '010119819820'
- description: Um ladrão fantasma vaga por aqui. Protejam seus bolsos!
  keywords:
  - ladrao
  - fantasma
  long_desc: |-
    Sempre em busca de novos tesouros, a medida que você olha para ele, este
    pequeno ladrão fixa os olhos demoradamente em você e desaparece, surgindo
    num piscar de olhos em outra posição.  É notoriamente um fantasma.
  name: o ladrão fantasma
  vnum: '010119819821'
