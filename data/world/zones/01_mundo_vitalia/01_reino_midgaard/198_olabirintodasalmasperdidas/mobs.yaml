- description: Um imponente guardião cuida da passagem.
  keywords:
  - guardiao
  - entrada
  long_desc: |-
    Você vê um guerreiro alto e forte.  Sua missão, assim como a de seus
    antecessores é guardar a entrada do labirinto e permitir que apenas os mais
    bravos e destemidos entrem.
  name: o guardião da entrada
  vnum: '010119819800'
- description: Um centauro vaga pelo labirinto.
  keywords:
  - centauro
  long_desc: |-
    Você vê uma figura mística que não acreditava existir..  Um centauro.  Sua
    parte homem é bela e sua parte cavalo é muito forte.  Ele parece olhar para
    você com um olhar indiferente..
  name: um centauro
  vnum: '010119819801'
- description: Uma pequena fada passeia pelo labirinto.
  keywords:
  - fada
  - labirinto
  long_desc: |-
    Ao olhar para esta fada você vê uma bela criatura que guarda um poder que você
    mesmo desconhece..  Ela é a guardiã do labirinto e de seus segredos.
  name: a fada do labirinto
  vnum: '010119819802'
- description: Um aventureiro perdido procura uma saída.
  keywords:
  - aventureiro
  - perdido
  long_desc: |-
    Você olha para o aventureiro e percebe que alguns de seus equipamentos são
    muito bonitos e raros... talvez alguns deles tenham sido encontrados aqui
    no labirinto pois ele parece estar aqui há muito tempo.
  name: um aventureiro
  vnum: '010119819803'
- description: Um guerreiro experiente lidera um grupo.
  keywords:
  - guerreiro
  - lider
  - grupo
  long_desc: |-
    Ao olhar para este guerreiro você logo nota que ele é o líder do grupo.  Seu
    semblante marcado revela sua experiência em expedições como esta.  Seus
    seguidores o respeitam e obedecem pois confiam nele.  É melhor não mexer com
    esse guerreiro.
  name: o guerreiro do grupo
  vnum: '010119819804'
- description: Um mago ajuda seus companheiros com magias.
  keywords:
  - mago
  - grupo
  long_desc: |-
    Ao olhar para este mago você logo nota que ele tem bastante experiência em
    combates.  Sua magia é poderosa e ele a usa para deixar seus companheiros
    mais fortes e resistentes, bem como para destruir os inimigos do grupo em
    batalhas sangrentas.
  name: o mago do grupo
  vnum: '010119819805'
- description: Um ladrão está parado no canto imperceptível.
  keywords:
  - ladrao
  - grupo
  long_desc: |-
    Ao olhar para este típico representante da classe dos ladinos você percebe
    que suas habilidades são usadas para ajudar o grupo a evoluir e a atacar os
    inimigos que por ventura apareçam em sua jornada.  Ele brinca com uma faca e
    você percebe um conjunto de equipamentos para abrir fechaduras em sua
    cintura.
  name: o ladrão do grupo
  vnum: '010119819806'
- description: Um clérigo abençoa seus companheiros para o combate.
  keywords:
  - clerigo
  - padre
  - grupo
  long_desc: |-
    Ao olhar pare este clérigo você percebe que ele está sempre pronto para
    ajudar seu grupo com suas magias de cura e suas auras poderosas.
  name: o clérigo do grupo
  vnum: '010119819807'
- description: Um belo cavalo com um único chifre passeia por aqui.
  keywords:
  - unicornio
  - cavalo
  long_desc: |-
    Ao olhar para este cavalo você percebe tratar-se de uma criatura sagrada.
    Poucos destes podem ser vistos por Vitália e você se sente privilegiado em
    ver um unicórnio e a pureza de seu olhar.
  name: um unicórnio
  vnum: '010119819808'
- description: Uma bela mulher procura seu cavalo pelo labirinto.
  keywords:
  - amazona
  - mulher
  long_desc: |-
    Ao olhar pare esta bela mulher você percebe que se trata de uma guerreira
    experiente.  Ela olha para você sem medo e pergunta: 'Você viu um cavalo
    branco?'.
  name: uma amazona
  vnum: '010119819809'
- description: Um demônio amarelado está aqui.
  keywords:
  - amarelo
  - demonio
  long_desc: |-
    Uma luz maligna irradia do corpo do demônio impedindo uma visão melhor de
    seu corpo.  Você não precisa de ver os detalhes para saber que ele oferece
    GRANDE perigo.
  name: o demônio amarelo
  vnum: '010119819810'
- description: Um demônio esverdeado ostenta um sorriso malígno.
  keywords:
  - verde
  - demonio
  long_desc: |-
    Quando você olha para este demônio ele olha para você e diz friamente: 'HORA
    DE MORRER!!!'
  name: o demônio verde
  vnum: '010119819811'
- description: Um terrível demônio vermelho espera calmamente para atacar.
  keywords:
  - demonio
  - vermelho
  long_desc: |-
    O Demônio olha para você com um olhar indiferente.  Você percebe que sua
    vida nada vale para esta criatura.  Sua maldade é evidente em todos os
    sentidos.  Você pode senti-la no ar, pode quase mesmo tocá-la.
  name: o demônio vermelho
  vnum: '010119819812'
- description: Um guardião de roupas verdes está em pé aqui.
  keywords:
  - guardiao
  - verde
  long_desc: |-
    Ao olhá-lo mais de perto você percebe que esta figura imponente de vestes
    bonitas na cor verde não sabe bem o que guarda.  Sua visão foi tirada ainda
    jovem e ele parece ter sido treinado sua vida inteira para guardar a chave
    verde e os mistérios que esta porta esconde.
  name: o guardião verde
  vnum: '010119819813'
- description: Um guardião de roupas amarelas está em pé aqui.
  keywords:
  - guardiao
  - amarelo
