- description: Um morcego está aqui, pronto pra sugar seu sangue.
  keywords:
  - morcego
  long_desc: |-
    Este terrível animal possui dentes afiados e tem um aspecto horripilante.
    Sedento por sangue, ele olha faminto para você.
  name: o morcego
  vnum: '010509709701'
- description: O Dragão Negro está aqui.
  keywords:
  - dragão
  - negro
  long_desc: |-
    Você vê um enorme dragão de pele negra e com uma imensa cauda.  Possuidor de
    uma inacreditável força e com a habilidade de soltar imensas laberadas de
    fogo, ele demonstra ser terrivelmente forte e hábil.
  name: o Dragão Negro
  vnum: '010509709702'
- description: O escaravelho está aqui, faminto por carne....
  keywords:
  - escaravelho
  long_desc: |-
    Você pode ver um gigantesco triturador de carne, com suas mandíbulas afiadas
    ele pode facilmente devorar um boi em minutos.
  name: o escaravelho
  vnum: '010509709703'
- description: A Serpente está aqui.
  keywords:
  - serpente
  long_desc: |-
    Essa gigantesca serpente possui o corpo coberta por escamas e em sua face
    há enormes ferrões, capazes de perfurar até a mais forte das armaduras.
  name: a serpente
  vnum: '010509709704'
- description: Uma aranha caranguejeira está aqui.
  keywords:
  - aranha
  - caranguejeira
  long_desc: |-
    Possuidora de enormes tentáculos, corpo totalmente negro e coberto com
    enormes pelos.  Seu veneno pode ser mortal.
  name: a aranha caranguejeira
  vnum: '010509709705'
- description: O Deus do Reino das Pedras está dormindo aqui.
  keywords:
  - deus
  - monstro
  - pedra
  long_desc: |-
    Feito todo em pedra esse terrivel monstro é praticamente imortal.  Sua pele
    feita em rocha é impenetrável.
  name: o Deus do Reino das Pedras
  vnum: '010509709706'
