- description: Um horripilante Monstro lamaçento está, vagarosamente, surgindo da
    lama...
  keywords:
  - monstro
  - lamacento
  - lama
  long_desc: |-
    Ele parece ter vindo de um filme de terror.  Ele realmente parece ser uma
    extaordinária figura feita de lama e ele parece ter comido uma alma humana
    no café da manhã e está com a intenção de comer o mesmo no jantar.
    - Que tal você?
  name: o horripilante Monstro lamaçento
  vnum: '010507007000'
- description: |-
    Um pequeno, porém ameaçador, morcego está pendurado no teto, obviamente
    dormindo.
  keywords:
  - morcego
  - pequeno
  - ameacador
  long_desc: |-
    Você nunca tinha visto, durante toda sua vida um morcego tão pequeno.   Você
    prefere que ele continue assim, pacífico, pendurado lá, dormindo.  Seus
    ossos gelam só de você pensar em acordar essa cruel criatura.
  name: o pequeno morcego
  vnum: '010507007001'
- description: Um enorme rato de esgoto, raivoso, está aqui.
  keywords:
  - rato
  - esgoto
  long_desc: An undefined string.
  name: o rato de esgoto
  vnum: '010507007002'
- description: A pequena Aranha peluda, está aqui, ocupada com sua teia.
  keywords:
  - aranha
  - pequena
  - peluda
  long_desc: An undefined string.
  name: a pequena Aranha
  vnum: '010507007003'
- description: O gigante, besouro da terra está aqui.
  keywords:
  - besouro
  - gigante
  - terra
  long_desc: An undefined string.
  name: o gigante besouro terra
  vnum: '010507007004'
- description: A larva gigante está aqui, em sua simples existência.
  keywords:
  - larva
  - gigante
  long_desc: An undefined string.
  name: a larva
  vnum: '010507007005'
- description: A cobra rasteja perto de você. Ela parece bastante medíocre.
  keywords:
  - cobra
  long_desc: An undefined string.
  name: a cobra
  vnum: '010507007006'
- description: O demônio andarilho olha fixamente para você com uma admiração comovente.
  keywords:
  - andarilho
  - demonio
  long_desc: |-
    O demônio andarilho é muito magro.  Ele está vestido com um manto cinza.
    Ele não parece querer companhia em sua viagem.
  name: o demônio andarilho
  vnum: '010507007007'
- description: A criatura homúncula está aqui, olhando para você maliciosamente.
  keywords:
  - homuncula
  - criatura
  long_desc: |-
    O homúnculo aparenta ter uma forma humana, uns 5 metros de altura, tem uma
    pele de réptil esverdeada, asas rígidas e uma boca de morcego, com dentes
    que parecem ser venenosos.
  name: a criatura homúncula
  vnum: '010507007008'
- description: O morkot está aqui, esperando por alguém para MATAR!
  keywords:
  - morkot
  - sombrio
  long_desc: |-
    Ele é um monstro de cinco pés de altura, meio homem meio rato.  Ele respira
    fortemente enquanto aproxima-se de você.
  name: o morkot sombrio
  vnum: '010507007009'
- description: O chr-eff'n está rastejando aqui, procurando algo com seus olhos amarelos.
  keywords:
  - chr-eff'n
  - chreffn
  long_desc: |-
    A cabeça e o dorso do chr-eff'n é coberto de cobre, e tem olhos amarelos
    brilhantes.  A parte de baixo tem uma cor alaranjada.
  name: o demônio chr-eff'n
  vnum: '010507007010'
- description: O feroz dragão vermelho encara você, raivosamente.
  keywords:
  - dragao
  - vermelho
  long_desc: |-
    O dragão vermelho encara você, raivosamente, como se estivesse aguardando a
    sua chegada.  Ele diz 'Oh humano, VOCÊ me acordou...Hssss', enquanto move-
    se para perto de você, 'Eu NUNCA posso dormir em paz...Hssss...'
  name: o dragão vermelho
  vnum: '010507007040'
- description: Uma bruxa do mar está nadando aqui.
  keywords:
  - bruxa
  - mar
  long_desc: |-
    A bruxa do mar é tão horripilante que você sente um medo profundo: Grandes
    olhos amarelos e dentes afiados.  Suas orelhas são muito grandes, e ela tem
    pequenos chifres afiados.  Esse tipo de monstro é um dos grandes inimigos
    da beleza.
  name: a bruxa do mar
  vnum: '010507007041'
- description: A guardiã naga parece gostar de você.
  keywords:
  - naga
  - guardiao
  long_desc: |-
    O naga é uma criatura com aparência de cobra.  Ela é coberta por escamas
    verde-ouro e com triângulos prateados em suas costas.  Seus olhos são
    dourados.  Ela nota que você está olhando fixamente para ela, então ela diz
    'Saia daqui.  Este caminho leva a criaturas malignas.'
  name: a guardiã naga
  vnum: '010507007042'
- description: O basilisco escamoso rasteja em sua direção, vagarosamente.
  keywords:
  - basilisco
  - escamoso
  long_desc: |-
    O basilisco é um monstro reptiliano.  Ele tem oito patas, e fortes
    mandíbulas.  Ele é amarronzado com umas pintas amarelas.  Seus olhos são
    verde pálido.
  name: o basilisco escamoso
  vnum: '010507007043'
- description: A bolha lêmure desliza para perto de você preparando um ataque!
  keywords:
  - bolha
  - lemure
  long_desc: |-
    Ela parece, vagamente, uma bolha humana.  Grandes olhos negros, e uma boca
    com um pedaço que escapa do rosto.  A lêmure não parece interessada em você
    mas ela ataca de qualquer jeito.  Parece que a mente dela foi queimada.
  name: a lêmure
  vnum: '010507007044'
- description: Jones está em pé aqui espantado com você.
  keywords:
  - jones
  - esmagador
  - ettin
  long_desc: |-
    Numa primeira olhada você pensa que Jones é um Orc, mas quando ele chega
    mais perto você vê sua segunda cabeça.  Ele veste uma pele de animal como
    roupa, imunda e comida pelas traças.  Jones realmente fede...
  name: Jones 'esmagador' ettin
  vnum: '010507007045'
- description: Herald está aqui parecendo meio confuso com a sua presença.
  keywords:
  - herald
  - rato
  - assassino
  - ettin
  long_desc: |-
    Quando você olha para Herald, você sente pena.  Suas roupas são realmente
    pobres, e uma de suas cabeças está pendurada.  Na corda que circunda sua
    cintura estão vários ratos e camundongos mortos.  Ele não cheira bem.
  name: Herald 'o assassino de ratos' ettin
  vnum: '010507007046'
