    A cada passo você pode sentir uma estranha sensação de que está sendo
    observado.  Tudo ao seu redor é muito lindo, um belo campo florido, talvez
    este o verdadeiro paraiso.  Para oeste você o inicio do caminho e para leste
    a trilha se alonga.
  exits:
    east:
      target_vnum: '010509809856'
    west:
      target_vnum: '010509809854'
  name: O Caminho dos Sábios
  vnum: '010509809855'
- description: |-
    O cheiro de lugar é muito inspirador, uma suave fragância de lavanda se
    espalha por todo esse campo.  Sua trilha retorna a oeste e continua ao sul.
  exits:
    south:
      target_vnum: '010509809857'
    west:
      target_vnum: '010509809855'
  name: O Caminho dos Sábios
  vnum: '010509809856'
- description: |-
    A trilha é estreita, por todos os lados há flores campestres.  Até onde
    sua vista alcança há somente flores e um bonito céu azul.  A trilha segue
    para norte e leste.
  exits:
    east:
      target_vnum: '010509809858'
    north:
      target_vnum: '010509809856'
  name: O Caminho dos Sábios
  vnum: '010509809857'
- description: |-
    A cada passo a curiosidade aumenta.  Talvez seja melhor começar a pensar
    em qual é seu verdadeiro objetivo, a sensação de observado aumenta cada vez
    mais.  Sua trilha segue a oeste e a leste.
  exits:
    east:
      target_vnum: '010509809859'
    west:
      target_vnum: '010509809857'
  name: O Caminho dos Sábios
  vnum: '010509809858'
- description: |-
    Você está diante da escolha de seu verdadeiro objetivo, a sua escolha
    mudará toda sua trajetória.  Se seu objetivo nesse mundo é explorar e ganhar
    muita experiência e acha que já sabio o suficiente então parta rumo ao
    norte, pois lá encontrará terras inexploradas.  Se seu objetivo, seja esse
    mesmo, mas acha que ainda não é sabio o bastante, então parta rumo ao sul,
    pois lá existe o aprendizado.  Diante dessas duas escolhas se você se achar
    um aventureiro que tem medo de explorar e prefere voltar as suas origens
    para repensar no seu destino, então siga a leste, pois lá está o inicio de
    tudo.
  exits:
    east:
      target_vnum: '010509809860'
    north:
      target_vnum: '010509809861'
    south:
      target_vnum: '010509809862'
  name: O Destino
  vnum: '010509809859'
- description: |-
    Você está no caminho dos que querem voltar e rever suas origens.  Siga a
    leste e veja onde tudo começou.
  exits:
    east:
      target_vnum: '010000000050'
  name: O Caminho dos Sábios
  vnum: '010509809860'
- description: |-
    Você está no caminho dos exploradores que acham que já sabem o suficiente
    Siga ao norte e explore terras jamais conhecidas.
  exits:
    north:
      target_vnum: '010509809800'
  name: O Caminho dos Sábios
  vnum: '010509809861'
- description: |-
    Você está no caminho dos exploradores que acham que os sábios são aqueles
    que reconhecem que ainda existe muito para se aprender.  Siga ao sul e vá
    ao encontro da sabedoria.
  exits:
    south:
      target_vnum: '010509809863'
  name: O Caminho dos Sábios
  vnum: '010509809862'
- description: |-
    Certamente você fez a escolha mais correta.  "O mais sábios de todos é
    aquele que reconhece sua burrice".  Daqui pra frente sua dignidade e honra
    serão provadas, se você passar por essa provação, será merecedor de conhecer
    os segredos da vitória.  Seu caminho é para leste...
  exits:
    east:
      target_vnum: '010509809864'
  name: O Caminho para a Ascensão
  vnum: '010509809863'
- description: |-
    Você está diante de uma bonita entrada, feita no mais puro dos mármores
    sua beleza é magnífica.  O caminho a ser seguido é ao norte, onde pode ser
    visto um camiho florido e enfeitado com lindas pedras.
  exits:
    north:
      target_vnum: '010509809865'
  name: A Entrada da Ascensão
  vnum: '010509809864'
- description: |-
    O caminho seguido por você é muito pessoal, aqui ninguem pode lhe ajudar
    e a cada escolha você jamais verá que jamais poderá voltar.  Seja digno e
    honrado pois só assim poderá realmente ser aclamado como um sábio.
  exits:
    north:
      target_vnum: '010509809866'
  name: O Caminho da Ascensão
  vnum: '010509809865'
- description: |-
    Nada existe ao seu redor, por onde você olha só existe uma névoa, tudo
    que era florido agora sumiu e a cada passo você nota que o caminho na suas
    costas some.
  exits:
    east:
      target_vnum: '010509809867'
  name: O Caminho da Ascensão
  vnum: '010509809866'
- description: |-
    Há névoa por toda parte, mesmo a mais intensa das luzes não é capaz de
    iluminar seu caminho nesse nevoeiro.  Aqui é sua primeira provação, pense
    bem antes de fazer sua escolha, pois NÃO poderá voltar atrás.
    Ao norte você pode ver alguns equipamentos, alguns deles jamais visto em
    todo esse mundo, talvez algum deles possa iluminar seu caminho.
    Ao sul seu caminho parece ficar um pouco mais claro, é possivel ver a
    sala de doações de um clan, que com certeza não é de seus amigos, mas lá
    existem equipamentos que podem iluminar esse nevoeiro.
    A leste a escuridão é cada vez mais intensa, porem lá no fundo é possivel
    notar um velho mago, certamente ela está perdido no meio dessa nevoa tambem.
  exits:
    east:
      target_vnum: '010509809868'
    north:
      target_vnum: '010509809870'
    south:
      target_vnum: '010509809869'
  name: A Primeira Provação
  vnum: '010509809867'
- description: É possivel ver aquele pobre velho.  Siga a leste ao seu encontro.
  exits:
    east:
      target_vnum: '010509809871'
  name: A Escolha
  vnum: '010509809868'
- description: É possivel ver uma grande sala de equipamentos.  Siga ao sul para entrar.
  exits:
    south:
      target_vnum: '010103003063'
  name: A Escolha
  vnum: '010509809869'
- description: É possivel ver um enorme monte de equipamentos.  Siga ao norte para
    entrar.
  exits:
    north:
      target_vnum: '010103003063'
  name: A Escolha
  vnum: '010509809870'
- description: |-
    Certamente você preferiu ajudar esse pobre mago....um vento muito forte
    faz com que essa névoa se espalhe, uma luz intensa transforma aquele velho
    mago em um magnífico anjo.  Siga seu ensinamentos, pois o que lhe for dito
    será de grande utilidade no futuro próximo.  Após ouvir seus ensinamentos
    siga seu caminho a norte.
  exits:
    north:
      target_vnum: '010509809872'
  name: O Templo da Luz
  vnum: '010509809871'
- description: |-
    Tudo volta a ser florido, e aquele cheiro de lavanda invade suas narinas.
    O caminho é muito belo e segue a leste.
  exits:
    east:
      target_vnum: '010509809873'
  name: O Caminho da Ascensão
  vnum: '010509809872'
- description: |-
    O cheiro de lavanda aumenta cada vez mais.  Provavelmente a mais bela
    das mulheres é merecedora de tal perfume.  Com essa fragância seria capaz de
    amolecer o coração das mais terrivel das víboras.
  exits:
    north:
      target_vnum: '010509809874'
  name: O Caminho da Ascensão
  vnum: '010509809873'
- description: |-
    Você está diante da sua segunda escolha, seu caminho pode ser dificil ou
    fácil basta que sua sabia experiencia lhe guie.
    Ao leste vem um cheiro insuportável, é possível ver um campo de guerra, o
    cheiro que invade suas narinas é o de seus companheiro mortos, talvez seja
    melhor abandonar essa provação e ir ajuda-los.
    Ao norte o cheiro de lavanda aumenta, um caminho florido e bonito, é
    possível notar que há pedras de cores douradas por todo a chão.
    A oeste é o inicio do caminho, você pode retornar ao principio e refazer
    escolhas.
  exits:
    east:
      target_vnum: '010509809875'
    north:
      target_vnum: '010509809876'
    west:
      target_vnum: '010509809877'
  name: A Segunda Provação
  vnum: '010509809874'
- description: |-
    É possível ver um campo de batalha e um corpo ferido caído ao chão. Siga
    a leste, pois é seu destino.
  exits:
    east:
      target_vnum: '010509809878'
  name: A Escolha
  vnum: '010509809875'
- description: |-
    É possível ver um caminho muito florido e lindo.  Siga seu destino ao
    norte.
  exits:
    north:
      target_vnum: '010103003065'
  name: A Escolha
  vnum: '010509809876'
- description: É possível ver o inicio.  Siga a oeste e parta do principio.
  exits:
    east:
      target_vnum: '010000000050'
  name: A Escolha
  vnum: '010509809877'
- description: |-
    Mais uma vez sua escolha foi sabia.  Uma luz azulada invade todo esse
    campo, lentamente o corpo caido se levanta, como que por milagre ou por amor
    divino, ele se transforma em um anjo muito bonito.  Escute o que esse anjo
    tem a lhe falar.
  exits:
    north:
      target_vnum: '010509809879'
  name: O Templo do Amor
  vnum: '010509809878'
- description: |-
    O maravilhoso cheiro de lavanda e o céu são dignos dos deuses.  Você pode
    sentir que está próximo do céu pois um sentimento puro invade seu coração.
  exits:
    east:
      target_vnum: '010509809880'
  name: O Caminho da Ascensão
  vnum: '010509809879'
- description: |-
    Estranhamento toda aquela alegria sumiu, aparentemente nada mais existe,
    é como se você estivesse num plano vazio, por todos os lados nada existe e
    nada há para ser contemplado.
  exits:
    east:
      target_vnum: '010509809881'
  name: O Caminho da Ascensão
  vnum: '010509809880'
- description: |-
    Você está diante de mais teste, ao seu redor nada existe além dos
    caminhos a serem por você trilhados.  Escute seu coração e construa sua
    história.  O vazio ao seu redor, só será preenchido com sua fé.
  exits:
    east:
      target_vnum: '010509809884'
    north:
      target_vnum: '010509809883'
    south:
      target_vnum: '010509809885'
    west:
      target_vnum: '010509809882'
  name: A Terceira Provação
  vnum: '010509809881'
- description: |-
    Nada existe além da sua imaginação, por todos os lados há somente um
    abismo infinito.  Dê mais um passo rumo a sua sorte...siga a oeste.
  exits:
    west:
      target_vnum: '010509809886'
  name: O Vazio
  vnum: '010509809882'
- description: |-
    Nada existe além da sua imaginação, por todos os lados há somente um
    abismo infinito.  Dê mais um passo rumo a sua sorte...siga ao norte.
  exits:
    north:
      target_vnum: '010000000050'
  name: O Vazio
  vnum: '010509809883'
- description: |-
    Nada existe além da sua imaginação, por todos os lados há somente um
    abismo infinito.  Dê mais um passo rumo a sua sorte...siga a leste.
  exits:
    east:
      target_vnum: '010000000050'
  name: O Vazio
  vnum: '010509809884'
- description: |-
    Nada existe além da sua imaginação, por todos os lados há somente um
    abismo infinito.  Dê mais um passo rumo a sua sorte...siga ao sul.
  exits:
    south:
      target_vnum: '010000000050'
  name: O Vazio
  vnum: '010509809885'
- description: |-
    Você percebe que o chão se forma aos seus pés, o abismo por você temido
    agora é um belissimo campo florido, que outrora você havia comtemplado.  O
    maravilhoso cheiro de lavanda, volta a invadir sua narinas.  E como que por
    milagre uma maravilhosa flor começa a se desabrochar, emitindo um luz
    intensa capaz de cega-lo...  E essa imensa luz começa a tomar forma do mais
    belo de todos o anjos, ouça o que ele tem a lhe ensinar...  Após ouvi-lo seu
    caminho é para o norte.
  exits:
    north:
      target_vnum: '010509809887'
  name: O Templo da Honestidade
  vnum: '010509809886'
- description: |-
    Você está no caminho que poucos conseguirão trilhar, demonstre ser
    realmente digno de por seus pés nesse caminho, pois somente os deuses de
    Vitalia, outrora percorreram esse caminho.  Ao norte você pode uma luz
    intensa e talvez seu unico destino.
  exits:
    north:
      target_vnum: '010509809888'
  name: O Caminho da Ascensão
  vnum: '010509809887'
- description: |-
    Por todos os lados você ver imagens incríveis, é como se fosse pintado um
    belíssimo quadro diante de seus olhos.  Batalhas sangrentas entre os deuses
    de Vitalia e o mal, lindas paisagens jamais vistas por você, a ira e a
    tristeza dos deuses diante dos traidores, a festa dos que com fé, muita
    dignidade e acima de tudo honra, escreveram a história de suas vidas.  Seu
    caminho chega a uma bela escada, apenas suba.
  exits:
    up:
      target_vnum: '010509809889'
  name: O Caminho da Ascensão
  vnum: '010509809888'
- description: |-
    Você sobe cada vez mais em uma magnífica escada feita em mármore, é
    incrível a beleza desse lugar, além de todo aquele jardim, o cheiro de
    lavanda as imagens passadas diantes de seus olhos, você pode ver um Altar de
    pedra polida.  Uma beleza nunca vista por seus olhos, suba diante desse
    altar pois é seu destino.
  exits:
    up:
      target_vnum: '010509809890'
  name: A Escadaria de Mármore
  vnum: '010509809889'
- description: |-
    Um magnífico altar, em suas paredes é possivel toda a história e lendas
    de Vitalia, imagens dos grandes deuses desse mundo são aqui retradas, a
    beleza e coragem desses deuses parecem ser passadas para você.  Lá no alto
    você a imagem de um belo anjo, estranhamente essa imagens parece criar vida.
    A imagem cria vida e uma anjo em forma de luz se faz presente, ouça o que
    ele tem lhe dizer, depois dê um passo atrás para que seu destino se abra...
  exits:
    down:
      target_vnum: '010509809800'
  name: O Altar dos Dignos
  vnum: '010509809890'
