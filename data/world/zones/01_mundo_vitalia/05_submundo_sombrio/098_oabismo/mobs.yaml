- description: O temível Cérbero está aqui.
  keywords:
  - cerbero
  long_desc: |-
    Este terrivel cão de três cabeças está faminto.  Guardião desse lugar, ele
    jamais perdeu uma batalha contra os que invadem seus dominios.
  name: Cérbero
  vnum: '010509809801'
- description: O Ciclope gigante está de guarda aqui.
  keywords:
  - ciclope
  - gigante
  long_desc: |-
    Esse gigantesco Ciclope, possuidor de uma força extrema é capaz de ver um e
    sentir o cheiro de um intruso a distância, mesmo possuindo somente um olho.
  name: o Ciclope gigante
  vnum: '010509809802'
- description: O Monstro de Pedra está dormindo aqui.
  keywords:
  - monstro
  - pedra
  long_desc: |-
    Feito todo em pedra esse terrivel monstro é praticamente imortal.  Sua pele
    feita em rocha é impenetrável.
  name: o Monstro de Pedra
  vnum: '010509809803'
- description: O Mal Supremo está diante de você.
  keywords:
  - mal
  - supremo
  long_desc: |-
    Está criatura abominável parece ser um fonte de energia maléfica.  Você
    sente toda a maldade que invade essa sala, é praticamente impossivel definir
    sua forma, uma grande nevoa negra te impede de ver a face dessa terrivel
    criatura.
  name: o Mal Supremo
  vnum: '010509809804'
- description: O Dragão invisível está aqui.
  keywords:
  - dragao
  - invisivel
  long_desc: |-
    Você vê um enorme dragão de pele negra e com uma imensa cauda.  Possuidor de
    uma inacreditável força e com a habilidade de ficar invisível aos seus olhos
    é capaz de soltar imensas laberadas de fogo.  Ele demonstra ser muito forte
    e hábil.
  name: o dragão invisível
  vnum: '010509809805'
- description: O Anjo da Luz está aqui, para lhe guiar.
  keywords:
  - anjo
  - luz
  long_desc: |-
    Ele é muito grande, uma imensidão de luzes ao seu redor. Você tenta olhar
    mas é praticamente impossivel ver seu rosto. As luzes ofuscam seu olhos e
    parecem preencher o vazio de seu coração.
  name: o Anjo da Luz
  vnum: '010509809806'
- description: O Anjo do Amor está aqui, para lhe guiar.
  keywords:
  - anjo
  - amor
  long_desc: |-
    Ele é enorme, seu poder é repleto de amor e compreensão. Você tenta olhar
    mas é praticamente impossivel entender a sensação de paz e conforto que esse
    gigantesco clarão de luzes emitem.
  name: o Anjo do Amor
  vnum: '010509809807'
- description: O Anjo da Honestidade está aqui, para lhe guiar.
  keywords:
  - anjo
  - honestidade
  long_desc: |-
    Uma luz muito grande é somente o que você vê.  Seus olhos são cegados por
    toda clareza e luminosidade e seu coração parece sentir o poder da honra e
    honestidade que emana desse poderoso anjo.
  name: o Anjo da Honestidade
  vnum: '010509809808'
- description: O Anjo da Vitória está aqui, para lhe guiar.
  keywords:
  - anjo
  - vitoria
  long_desc: |-
    É imcompreensível o poder desse anjo.  É protetor dos vitoriosos, guiados
    pela luz e possuidores de grande honestidade. Abençoado seja você por ser
    digno de estar na presença dessa divindade angelical.
  name: o Anjo da Vitória
  vnum: '010509809809'
