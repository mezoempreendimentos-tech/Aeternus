- description: Você vê uma criatura gigantesca, completamente envolvida em chamas,
    guardando o portão adiante.
  keywords:
  - efreeti
  - criatura
  - gigante
  - chamas
  long_desc: |-
    Seja lá o que estiver atrás desse portão, deve ser bem interessante.  Para
    saber você terá que passar por ele.
  name: um efreeti gigante
  vnum: '010503903902'
- description: Uma planta com muitas armadilhas em forma de disco cresce em meio a
    ossos amontoados aqui.
  keywords:
  - Venus
  - Armadilha
  - Mosca
  long_desc: |-
    Movendo-se sempre calmamente, você percebe que seus tentaculos são
    extremamente mortíferos.  Você se pergunta se isso pode sentir sua presença
    daqui, ou se sente apenas o que toca seus discos.
  name: a Venus Armadilha de Mosca
  vnum: '010503903903'
- description: Uma massiva besta parecida com uma árvore aparece diante de você.
  keywords:
  - traira
  - besta
  - arvore
  long_desc: |-
    Grandes olhos vermelhos brilham na escuridão assim que isso acorda.  Essa
    coisa se move quase graciosamente para algo tão grande.  Você vê uma
    multidão de garras que se inclinam e vêm em sua direção.
  name: uma traíra
  vnum: '010503903904'
- description: No chão, várias fossas de sangue se unem, formando uma criatura diante
    de você.
  keywords:
  - morte
  - vermelha
  - fossas
  - sangue
  - criatura
  long_desc: |-
    Completamente feita de sangue, essa criatura disforme se move lentamente em
    sua direção.  Tudo que ela toca é coberto com um sangue escuro e grosso.  Um
    largo rastro de sangue fica por onde isso passa.
  name: morte vermelha
  vnum: '010503903905'
- description: Um espírito demoníaco aparece diante de você, brandindo garras negras.
  keywords:
  - praga
  - negra
  - espirito
  long_desc: |-
    Mais escura que as sombras, você percebe que ela não possui face.  Você
    percebe o brilho de suas garras quando ela pula da escuridão.
  name: a praga negra
  vnum: '010503903906'
- description: Uma figura pálida e magra materializa-se do chão.
  keywords:
  - febre
  - amarela
  - figura
  long_desc: |-
    Alto e magro, isso parece estar infectado por todas as doenças do mundo.
    Sua pele é tão esticada que ele possui uma aparência esquelética.  Um calor
    intenso irradia dele, como se estivesse em chamas por dentro.
  name: a febre amarela
  vnum: '010503903907'
- description: Um gigantesco esqueleto lhe fita de seu trono assim que você entra.
  keywords:
  - demilich
  - esqueleto
  long_desc: |-
    O esqueleto vivo de algum ancião de alguma raça desconhecida levanta-se de
    seu trono quando lhe vê. Olhos com aparência maligna brilham de seu crânio.
    Cantando algo em uma língua desconhecida, ele subtamente pula em sua
    direção.
  name: Demilich
  vnum: '010503903908'
- description: Um esqueleto vestido com armaduras de um cavaleiro surge diante de
    você.
  keywords:
  - esqueleto
  - cavaleiro
  - morte
  long_desc: |-
    Coberto por uma magnífica armadura, ele parece olhar através de você.  Uma
    das mãos se levanta, sinalizando que você não deve seguir adiante.  A outra
    mão desembanha sua grande espada e a empunha com uma facilidade mortífera.
  name: o cavaleiro da morte
  vnum: '010503903909'
- description: Kalas, o Senhor do Abismo, caminha adiante.
  keywords:
  - kalas
  long_desc: |-
    Um poderoso homem com a face coberta de cicatrizes de incontáveis batalhas
    que lutou em nome do mal.  Sua bela face ainda mostra a crueldade que ele
    conhece.  Seus olhos negros brilham em lembrança de sua reputação.
  name: Kalas
  vnum: '010503903910'
- description: Um estranho baú foi posto no canto da sala, rodeado de ossos.
  keywords:
  - mimico
  - bau
  long_desc: |-
    Um estranho baú que ainda não foi arrombado.  Ele parece estar vivo (?) e
    respirando (?).
  name: o mímico
  vnum: '010503903911'
- description: Uma pilha de ossos proxima à escrivaninha de repente começa a se unir
    e se levanta.
  keywords:
  - magistrado
  - esqueleto
  - ossos
  long_desc: |-
    Ele se poe imponentemente diante de você, vestindo algumas vestes de um
    juiz.  Uma voz fantasmagórica vinda dele sussura: "Culpado..  Culpado..
    Culpado..  Culpado...  Culpado....".  Subitamente, ele empunha seu grande
    martelo e lança em sua direção com uma força incalculável!
  name: o Magistrado
  vnum: '010503903912'
- description: Uma tempestade gigante extremamente zangada vem em sua direção.
  keywords:
  - tempestade
  long_desc: |-
    Uma gigantesca figura desajeitada rodeada por uma névoa aparece diante de
    você.  Você pode ver fortes cargas elétricas nascendo de seu corpo em
    direção ao solo.
  name: a tempestade gigante
  vnum: '010503903913'
- description: Uma pequena criatura palida surge da escuridão.
  keywords:
  - escravo
  - criatura
  long_desc: Atravacado e bem pálido, a vida desse ser são esses túneis escuros.
  name: um pequeno escravo da caverna
  vnum: '010503903914'
- description: Um forte zumbi guerreiro se põe diante de você, guardando o castelo.
  keywords:
  - zumbi
  - guerreiro
  - abismo
  long_desc: |-
    Ele parece um feroz lutador, capaz de cortar você ao meio como um galho de
    árvore.  Isso é, se sua espada não lhe empalar primeiro.
  name: um zumbi guerreiro do Abismo
  vnum: '010503903915'
- description: Um pequeno e magro demônio zomba de você com um sorriso maligno.
  keywords:
  - demonio
  - bael
  long_desc: |-
    Bael é um espirito em forma de serpente que se move usando seus dois
    poderosos braços.  Assim que ele lhe vê, ele salta e ergue seu peito.  Suas
    mãos, agora livres, vêm na direção de sua alma.
  name: o Bael
  vnum: '010503903916'
- description: Um grande demônio massivo surge diante de seus olhos, da escuridão.
  keywords:
  - svern
  - demonio
  long_desc: |-
    Seu corpo coberto de músculos e com garras em formato de adagas fazem o
    Svern uma criatura com a qual não se deve brincar.  Ele é extremamente alto,
    bem acima de sua cabeça.
  name: um Svern
  vnum: '010503903917'
- description: Um demônio com o formato de uma ave desce dos ares em sua direção.
  keywords:
  - vrock
  - demonio
  - ave
  long_desc: |-
    O Vrock parece ser um cruzamento entre uma ave de rapina e alguma raça de
    humanoide.  Isso só seria possivel com a intervençao das forças demôniacas.
    Seu forte bico curvado parece extremamente letal.
  name: a Vrock
  vnum: '010503903918'
- description: Um gigantesco dragão com a pele em decomposição se move diante de você.
  keywords:
  - valik
  - zumbi
  - dragao
  long_desc: |-
    Aliado do mal, ele é considerado o segundo ser mais poderoso próximo a
    Damorask.  Valik esteve aqui desde o começo dos tempos.  Um dos mais
    poderosos seres está diante de você, você nota que em sua boca caberiam
    facilmente 5 homens.
  name: Valik, o dragão zumbi
  vnum: '010503903919'
- description: Uma figura, uma vez humana, feita de gelo levanta seus braços para
    a árvore assim que você se aproxima.
  keywords:
  - damorask
  - figura
  - gelo
  long_desc: |-
    Apesar de ser feito de gelo em seu local perpetuamente congelado, você nota
    que o tempo ainda afeita esse poderoso feiticeiro.  Olhos sábios e
    movimentos afetados pela idade desmentem seu mortífero poder.  Com um súbito
    movimento de sua mão, afiados fragmentos de gelo saltam do chão e começam a
    rodeá-lo.
  name: Damorask
  vnum: '010503903920'
- description: A estatueta move-se graciosamente em sua direção.
  keywords:
  - mimico
  - estatueta
  long_desc: An undefined string.
  name: o mímico
  vnum: '010503903921'
- description: Um gigantesco monolito de gelo vêm descontroladamente em sua direção.
  keywords:
  - monolito
  - gelo
  long_desc: |-
    Em tamanho, isso é um rival de Valik.  Valik, até mesmo em um ataque de
    fúria, pensaria duas vezes antes de enfrentar isso.  Seu corpo massivo
    parece ter sido cinzelado com uma camada impenetrável de gelo.
  name: um monolito gigante
  vnum: '010503903922'
- description: Uma besta da neve se põe diante de você, guardando a ilha.
  keywords:
  - besta
  - neve
  long_desc: |-
    A besta da neve parece brilhar misteriosamente.  Ela rosna para você assim
    que você tenta passar por ela para a ilha.  Ela foi posta aqui de sentinela
    pelo seu mestre Damorask.
  name: uma besta da neve
  vnum: '010503903923'
- description: Um grande pilar de gelo foi posto aqui.
  keywords:
  - pilar
  - gelo
  long_desc: |-
    Apenas um pilar feito de gelo, resistente e frio.  Seu contemplamento pode
    transforma-lo em uma estátua massiva de gelo se isso for desejado.
  name: um pilar de gelo
  vnum: '010503903924'
- description: Um yeti de água está aqui, guardando seu precioso rio.
  keywords:
  - yeti
  - agua
  long_desc: An undefined string.
  name: um yeti de água
  vnum: '010503903925'
- description: Do centro do redemoinho surgem sete cabeças de dragão que rosnam ao
    mesmo tempo para você.
  keywords:
  - pseudo-hidra
  - pseudo
  - hidra
  - dragao
  long_desc: |-
    Surgindo da água, um massivo corpo reptílico parece alcançar os céus.  Suas
    sete cabeças emitem um ensurdecedor ruído para você.  A Pseudo-Hidra
    vermelha é a ultima de uma grande raça anciã mortífera.  Uma explosão de
    chamas...  Um grande esguicho de ácido...  Uma mortal carga elétrica...  Uma
    rajada de gelo...  Um atordoante golpe de água...  Uma grossa névoa de gases
    venenosos...  Um bruxuleio de luz profana...  Algo lhe diz que a hidra é um
    adversário formidável.
  name: uma Pseudo-Hidra vermelha
  vnum: '010503903926'
- description: Uma gigantesca hidra de seis cabeças está aqui, adormecida.
  keywords:
  - hidra
  - gigante
  long_desc: |-
    Ela parece estar em um profundo sono mágico, mas talvez não por muito tempo.
    Uma das seis cabeças se move como se estivesse prestes a acordar.  Ela é bem
    maior do que um dragão comum e parece ser tão má quanto.
  name: uma hidra gigante
  vnum: '010503903927'
- description: Um velho homem com aparência sábia está aqui, afundado em sua insanidade.
  keywords:
  - feiticeiro
  - marfim
  - homem
  long_desc: |-
    Uma pura aura branca o rodea.  Apesar de seu corpo frágil, seus olhos são
    cheios de vida.  Ele continua eternamente confinado a essa sala por uma
    poderosa força maligna que não pode ser quebrada.  Calmamente, ele caminha
    para o vaso e se protege com ele.
  name: um feiticeiro de marfim
  vnum: '010503903928'
