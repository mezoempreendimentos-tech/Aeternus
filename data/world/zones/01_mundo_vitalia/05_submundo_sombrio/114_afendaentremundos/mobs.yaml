- description: Um ser de névoa gargalha histericamente.
  keywords:
  - yaksha
  - nevoa
  - ser
  - demonio
  long_desc: |-
    Você nunca viu um ser como esse...  Seu corpo é feito de névoa, o que o
    camufla muito bem, sendo possível apenas ver com clareza seu par de pequenos
    olhos vermelhos.  Em pouco tempo você percebe que ele pode deixar seu corpo
    mais denso, única vez que parece ser de matéria palpável.  Ele parece rir de
    sua expressão assustada.
  name: um yaksha de névoa
  vnum: '010511411400'
- description: Uma grande pedra pareceu se mexer.
  keywords:
  - pisacha
  - pedra
  - demonio
  - grande
  long_desc: |-
    Você examina a pedra e, surpreso, percebe que ela é na verdade um estranho
    ser tentando se esconder de você.  Seus braços e pernas, muito finos e
    longos, se dobram de maneira que ele, acocorado no chão, pareça uma grande
    pedra cinzenta coberta por alguns musgos, que nada mais são além dos cabelos
    e pêlos de seu corpo.  Ele parece inofensivo com seus olhos, tão cinzentos
    quanto sua própria sua pele, assustados.
  name: um pisacha-pedra
  vnum: '010511411401'
- description: Há um estranho monte de grama aqui.
  keywords:
  - pisacha
  - demonio
  - grama
  - monte
  long_desc: |-
    De pele marrom quase que completamente coberta por estranhos pêlos verdes,
    esse pequeno demônio tenta se camuflar o melhor possível.  Seus estranhos
    olhos parecem dois pedregulhos acinzentados que, colocados lado a lado sobre
    um monte de grama, brilham intensamente.  Mesmo que você o observe por
    horas, dificilmente perceberá seus movimentos.
  name: um pisacha-grama
  vnum: '010511411402'
- description: Um enorme morcego sobrevoa sua cabeça.
  keywords:
  - morcego
  - enorme
  long_desc: Esse morcego deve ter mais de um metro de envergadura. Enorme mesmo.
  name: um morcego
  vnum: '010511411403'
- description: Você percebe algo errado em sua sombra.
  keywords:
  - pisachi
  - sombra
  - ser
  - demonio
  long_desc: |-
    Assumindo a forma e o lugar de sua sombra, essa estranha pisachi parece mais
    parece estar tentando pregar-lhe uma peça do que fazer-lhe algum mal.  Seu
    corpo feito de sombra consegue, magicamente, tomar o lugar de qualquer
    sombra e ter a forma que quiser, a menos que a claridade do lugar que esteja
    seja muito grande: isso a mata.
  name: uma pisachi-sombra
  vnum: '010511411404'
- description: Um monstruoso cão guarda esse local.
  keywords:
  - cao
  - demonio
  - monstruoso
  long_desc: |-
    Grande como um urso, esse enorme cão negro mostra os afiados dentes enquanto
    acompanha cada um de seus movimentos com seus dois pares de olhos amarelos.
    Suas compridas patas, eficientes para saltar e correr, possuem garras tão
    grandes quanto suas presas, enquanto sua cauda negra, exatamente como um
    chicote, o ameaça estalando no ar.
  name: um cão-demônio
  vnum: '010511411405'
- description: Um senhor de ar cansado lê em voz alta o que está escrito em um grande
    livro.
  keywords:
  - chitragupta
  - senhor
  - guardiao
  - cansado
  - registros
  long_desc: |-
    Chitragupta é o ajudante de Yama desde que a primeira alma deixou seu corpo
    e veio parar aqui.  A função principal desse homem robusto e de baixa
    estatura é ler o livro da vida de cada um que chega para que Yama julgue
    para onde ele deve ser encaminhado, o que ele faz sem reclamar.  Apesar do
    ar cansado em seu rosto redondo, o guardião dos resgistros do além pode
    continuar com sua tarefa até o fim dos tempos pois, num lugar onde o tempo
    não existe, parar só atrapalharia seu trabalho.
  name: Chitragupta
  vnum: '010511411406'
- description: Um homem de semblante sombrio reflete enquanto seu ajudante lê em voz
    alta.
  keywords:
  - Yama
  - deus
  - morte
  - homem
  - sombrio
  long_desc: |-
    Yama é aquele que julga se as almas irão para os céus ou para os infernos do
    mundo.  Ele assume a forma que deseja, seja para assustar alguém, seja para
    tranqüilizar.  No momento, ele é um homem imenso de longos cabelos negros e
    um espesso e comprido bigode.  Seus olhos estão fechados e seu corpo
    completamente imóvel, indicando que ele vasculha a alma à sua frente para
    decidir para onde ela vai e quando voltará para uma nova audiência.
    Inesperadamente, o que você pensava ser uma cicatriz vertical entre as
    sobrancelhas de Yama se abre, revelando um terceiro olho que emite um forte
    facho de luz: ele chegou a um veredicto.
  name: Yama, o Deus da Morte
  vnum: '010511411407'
- description: Uma multidão de almas enfileiradas espera sua vez de ser julgada.
  keywords:
  - multidao
  - almas
  - fila
  - enfileiradas
  long_desc: |-
    As mais diferentes almas formam essa multidão...  Há humanos, demônios,
    animais e mais um enorme número de seres que você nunca viu na vida.  Alguns
    tem aparência muita etérea, luminosa, enquanto outros parecem ser ainda
    feitos de carne e osso.  Ao contrário do que você imaginava, quase ninguém
    aqui parece temer seu destino.
  name: a multidão de almas
  vnum: '010511411408'
- description: Um homem de vestes simples cumprimenta-o amavelmente.
  keywords:
  - narada
  - homem
  - simples
  - andarilho
  - divino
  long_desc: |-
    Narada é um homem iluminado que dedica sua vida a explorar todos os lugares
    destes mundos, aparecendo sempre no momento certo e na hora certa, levando
    um pouco de sua luz para qualquer ser que precise e cruze seu caminho.  Não
    se sabe onde suas andanças começaram nem onde elas terminarão, mas dizem que
    vez ou outra um ser aparece para ele e pergunta como estão as coisas no
    mundo.  Ele relata o que viu e segue seu caminho, parecendo estar em uma
    importante missão.
  name: Narada, o andarilho divino
  vnum: '010511411409'
- description: A imponente estátua de um guarda naga impede que você siga em frente.
  keywords:
  - estatua
  - naga
  - guarda
  long_desc: |-
    A enorme estátua do naga permanece como toda estátua deve ser: estática.
    Você tem a impressão de ter visto seus olhos, que se assemelham a dois rubis com
    uma esmeralda formando a oblíqua pupila, se mexerem, mas logo afasta essa
    idéia. Seu corpo, metade humano e metade serpente, é perfeito e, apesar
    da rigidez da pedra, parece ter a mobilidade da carne e músculos vivos.
  name: a estátua de um guarda naga
  vnum: '010511411410'
