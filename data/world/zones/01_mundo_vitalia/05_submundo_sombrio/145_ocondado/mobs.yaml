- description: Um pequenino hobbit está aqui, ajeitando a pena do seu chapéu.
  keywords:
  - hobbit
  - condestavel
  - pequenino
  long_desc: |-
    Você observa um pequeno hobbit bastante atento e sempre alerta para defender
    e resolver os "problemas" que possam surgir nas terras do Condado.  Com os
    seus pequeninos chapeis verdes com uma única pena amarela em cada um, os
    condestáveis, formam uma pequenina corporação que tem como função cuidar dos
    habitantes do Condado e manter sempre a tranqüilidade e a paz nessas terras.
    Devido a quase que total ausência de acontecimentos que venham atormentar a
    paz e a tranqüilidade dos habitantes do Condado, os condestáveis atualmente
    estão mais envolvidos em buscas para localizar animais perdidos.
  name: um condestável do Condado
  vnum: '010514514522'
- description: Um pequenino hobbit está aqui, vigiando as fronteiras do Condado.
