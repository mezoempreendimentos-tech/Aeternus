    chamados pelos habitantes do Condado, tinham como objetivo vigiar e cuidar
    para que forasteiros de qualquer tipo, grandes ou pequenos, não se
    transformassem num incômodo.
  name: um fronteiro do Condado
  vnum: '010514514523'
- description: O Senhor da Sede de Brandebuque está aqui, resolvendo os problemas
