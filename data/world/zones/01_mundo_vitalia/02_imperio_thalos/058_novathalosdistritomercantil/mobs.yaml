- description: |-
    Um homem bronzeado pelo sol do deserto inspeciona cuidadosamente cada arma
    antes de vendê-la. Suas mãos calejadas mostram anos de experiência no manuseio
    de armas, e seus olhos experientes conseguem detectar defeitos que outros
    poderiam ignorar.
  keywords:
  - mercador
  - armas
  - deserto
  long_desc: |-
    Este mercador especializado conhece intimamente as necessidades dos
    guerreiros do deserto. Ele vende apenas armas testadas e aprovadas para o
    clima árido de Nova Thalos.
  name: um mercador de armas
  vnum: '010205805801'
- description: |-
    Este homem pequeno e ágil conhece as especiarias mais raras do deserto.
    Seu nariz aguçado pode identificar qualquer tempero apenas pelo aroma, e
    ele guarda zelosamente os segredos das rotas comerciais que lhe fornecem
    os ingredientes mais exóticos.
  keywords:
  - comerciante
  - temperos
  long_desc: |-
    O comerciante de temperos é respeitado por chefs e curandeiros de toda
    Nova Thalos por sua habilidade em encontrar os ingredientes mais raros e
    de melhor qualidade.
  name: um comerciante
  vnum: '010205805802'
- description: |-
    Uma mulher sábia com conhecimento profundo das plantas medicinais do
    deserto. Suas mãos são suaves mas firmes, e ela trata cada paciente com
    compaixão genuína. Seu conhecimento das ervas curativas foi passado através
    de gerações de curandeiros.
  keywords:
  - curandeiro
  - deserto
  long_desc: |-
    Esta curandeira é procurada por viajantes de terras distantes devido à
    sua reputação de conseguir curar doenças que outros não conseguem tratar
    usando plantas únicas do deserto.
  name: um curandeiro
  vnum: '010205805803'
- description: |-
    Um homem corpulento e jovial que administra a pousada com eficiência e
    alegria. Ele conhece todos os comerciantes regulares pelo nome e sempre tem
    uma história interessante para contar sobre suas viagens pelo deserto.
  keywords:
  - estalajadeiro
  long_desc: |-
    O estalajadeiro é uma fonte valiosa de informações sobre rotas comerciais
    e condições do deserto. Sua pousada é um ponto de encontro para mercadores
    de toda a região.
  name: um estalajadeiro
  vnum: '010205805804'
- description: |-
    Este artesão musculoso domina as técnicas especiais necessárias para
    trabalhar metais no clima seco do deserto. Seu martelo ressoa com precisão,
    e cada peça que ele cria é adaptada para resistir às condições extremas
    da região.
  keywords:
  - ferreiro
  - deserto
  long_desc: |-
    O ferreiro do deserto é conhecido por criar ferramentas e armas que
    mantêm sua qualidade mesmo sob o sol escaldante e tempestades de areia
    de Nova Thalos.
  name: um ferreiro
  vnum: '010205805805'
- description: |-
    Este soldado disciplinado veste uma armadura adaptada para o clima do
    deserto. Sua postura alerta e movimentos precisos demonstram treinamento
    militar rigoroso. Ele leva muito a sério sua responsabilidade de proteger
    o distrito mercantil.
  keywords:
  - guarda
  - nova
  - thalos
  long_desc: |-
    Os guardas de Nova Thalos são treinados especificamente para combater
    no deserto e proteger as rotas comerciais vitais para a prosperidade da
    cidade.
  name: um guarda
  vnum: '010205805806'
- description: |-
    Um artesão habilidoso especializado em trabalhar couro usando técnicas
    tradicionais do deserto. Suas mãos experientes conseguem avaliar a qualidade
    do couro apenas pelo toque, e ele produz apenas artigos da mais alta qualidade.
  keywords:
  - mercador
  - couro
  long_desc: |-
    Este mercador é procurado por viajantes que precisam de equipamentos de
    couro resistentes às condições adversas do deserto.
  name: um mercador
  vnum: '010205805807'
- description: |-
    Um homem de aparência próspera que lida com moedas de várias regiões.
    Seus olhos treinados conseguem detectar moedas falsas instantaneamente, e
    ele mantém registros meticulosos de todas as transações financeiras.
  keywords:
  - cambista
  long_desc: |-
    O cambista é essencial para o comércio em Nova Thalos, facilitando
    transações entre mercadores de diferentes regiões com suas próprias moedas.
  name: um cambista
  vnum: '010205805808'
- description: |-
    Um veterano de guerra com cicatrizes que contam histórias de muitas
    batalhas. Sua presença comanda respeito imediato, e sua experiência tática
    é evidente na forma como organiza a defesa do distrito mercantil.
  keywords:
  - capitão
  - capitao
  - guarda
  long_desc: |-
    Este capitão experiente é responsável por manter a ordem no distrito
    mercantil e garantir que as rotas comerciais permaneçam seguras.
  name: um capitão
  vnum: '010205805809'
