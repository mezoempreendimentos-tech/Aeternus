- action_desc: Uma prateleira bem organizada contendo armas de qualidade.
  description: |-
    Uma robusta prateleira de madeira exibe cuidadosamente várias armas do
    deserto. Cada arma está posicionada para mostrar sua qualidade e artesanho,
    e todas foram testadas para resistir às condições extremas do deserto.
  keywords:
  - prateleira
  - armas
  name: uma prateleira
  vnum: '010205805801'
- action_desc: Um balcão cheio de especiarias exóticas do deserto.
  description: |-
    Este balcão de madeira aromática contém dezenas de pequenos recipientes
    com especiarias coloridas. Cada tempero é cuidadosamente rotulado e
    organizado por região de origem e intensidade de sabor.
  keywords:
  - balcão
  - temperos
  name: um balcão
  vnum: '010205805802'
- action_desc: Uma mesa organizada para a preparação de remédios curativos.
  description: |-
    Uma mesa baixa de madeira polida onde o curandeiro prepara seus remédios.
    Várias plantas medicinais secas estão organizadas em pequenos cestos, e
    ferramentas de preparação estão arrumadas com precisão.
  keywords:
  - mesa
  - cura
  name: uma mesa
  vnum: '010205805803'
- action_desc: O balcão principal da pousada onde os hóspedes se registram.
  description: |-
    Este balcão de madeira escura serve como centro de recepção da pousada.
    Um livro de registros está aberto, mostrando os nomes dos hóspedes atuais,
    e chaves de quartos estão organizadas em ganchos atrás do balcão.
  keywords:
  - balcão
  - pousada
  name: um balcão
  vnum: '010205805804'
- action_desc: Uma forja especialmente projetada para as condições do deserto.
  description: |-
    Esta forja especializada foi adaptada para trabalhar metais no clima
    seco do deserto. O fogo queima com uma chama intensa e controlada, e
    ferramentas especiais estão dispostas ao redor para criar equipamentos
    resistentes ao calor.
  keywords:
  - forja
  - deserto
  name: uma forja
  vnum: '010205805805'
- action_desc: Uma bancada especializada para o trabalho com couro.
  description: |-
    Uma bancada robusta onde o artesão trabalha o couro. Ferramentas de
    curtimento e modelagem estão organizadas cuidadosamente, e peles em
    vários estágios de processamento estão empilhadas ao lado.
  keywords:
  - bancada
  - couro
  name: uma bancada
  vnum: '010205805806'
- action_desc: Uma mesa profissional para transações de câmbio de moedas.
  description: |-
    Esta mesa elegante de madeira polida é onde as transações financeiras
    são realizadas. Balanças precisas para pesar moedas estão posicionadas
    sobre a superfície, junto com registros detalhados das taxas de câmbio.
  keywords:
  - mesa
  - câmbio
  name: uma mesa
  vnum: '010205805807'
