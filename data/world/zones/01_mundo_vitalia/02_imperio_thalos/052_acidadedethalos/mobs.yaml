- description: Você encontra o olhar mortal de um contemplador.
  keywords:
  - contemplador
  long_desc: |-
    Ele possui um grande olho central que projeta um raio anti-mágica e dez
    tentáculos com olhos sobre o corpo arredondado, os quais podem fazer tudo
    desde enfeitiçá-lo até lhe desintegrar. Contempladores não são conhecidos por
    sua personalidade.
  name: o poderoso contemplador
  vnum: '010205205200'
- description: Uma estranha lâmia encontra-se aqui, aguardando sua próxima refeição.
  keywords:
  - lamia
  - besta
  long_desc: |-
    Esta é uma criatura com a parte superior do corpo de uma linda mulher mas
    com a parte inferior de uma fera quadrúpede.  Ela lambe os lábios ao olhar
    para você, ambiciosamente.
  name: a lâmia
  vnum: '010205205201'
- description: Um resistente baú está em um dos cantos da sala.
  keywords:
  - mímico
  - bau
  long_desc: |-
    Um resistente baú de madeira preso com faixas de ferro e uma pesada fechadura
    na frente.
  name: o mímico
  vnum: '010205205202'
- description: Dois esqueletos estão esmagados sob uma enorme pedra.
  keywords:
  - mímico
  - pedra
  - esqueletos
  long_desc: |-
    Uma enorme pedra parece ter sido jogada aqui de alguma forma, já que não
    existem pedras semelhantes na região.  Dois esqueletos abaixo dela são apenas
    isso, ossos... nenhum farrapo ou nada mais parece estar preso a eles.
  name: o mímico
  vnum: '010205205203'
- description: O piso de pedra desta casa parece ter sido rachado ao meio.
  keywords:
  - mimico
  - piso
  long_desc: |-
    Que desordem! Você pensa consigo mesmo o que poderia ter causado tamanha
    destruição.
  name: o mímico
  vnum: '010205205204'
- description: Alguns pedaços de vaso encontram-se espalhados pelo chão.
  keywords:
  - mimico
  - potes
  - pedacos
  long_desc: |-
    Os fragmentos parecem ter feito parte de um grande vaso de algum local,
    provavelmente antes da cidade tombar.
  name: o mímico
  vnum: '010205205205'
- description: Algumas tábuas de madeira estão empilhadas em uma plataforma baixa.
  keywords:
  - mimico
  - tábuas
  - madeira
  long_desc: |-
    O simples fato destas tábuas estarem sobre esta plataforma lhe faz acreditar
    que alguém esteve aqui antes de você...
  name: o mímico
  vnum: '010205205206'
- description: Um pequeno lagarto com chifres balança sua língua e rasteja bem em
    sua frente.
  keywords:
  - lagarto
  - chifres
  long_desc: Um pequeno e lindo lagarto -- bem, isso se você gostar de répteis!
  name: o lagarto de chifres
  vnum: '010205205207'
- description: Em um canto você vê um grande golem de pedra, mantendo a guarda.
  keywords:
  - golem
  - pedra
  long_desc: |-
    É um grande pedaço de rocha que foi mágicamente moldado em uma enorme
    criatura de pedra. Ele encontra-se aqui ainda guardando a cidade.
  name: o golem de pedra
  vnum: '010205205208'
