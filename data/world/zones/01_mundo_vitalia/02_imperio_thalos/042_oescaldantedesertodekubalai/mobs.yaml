- description: Algo com dentes extremamente afiados lhe observa, escondido na areia.
  keywords:
  - tam'ala
  - tamala
  long_desc: |-
    O Tam'ala é um predador que caça durante séculos pelo deserto.  Ninguém sabe
    realmente como é um Tam'ala, pois seu corpo sempre fica escondido sob as
    areias.  Pouquíssimas pessoas já escaparam de um ataque seu...
  name: o Tam'ala
  vnum: '010204204200'
- description: Um furioso redemoinho de areia surge diante de você.
  keywords:
  - areia
  - redemoinho
  - demonio
  long_desc: |-
    Ele é um irritante ser que habita o deserto Kubalai.  Pequeno
    e feito de milhões de grãos de areia e sujeira, ele parece vagar pelos
    desertos, atormentando os viajantes.  Um par de malignos olhos negros
    brilham no centro do redemoinho.
  name: um demônio de areia
  vnum: '010204204201'
- description: Uma cobra parda está enterrada na areia próxima aos seus pés.
  keywords:
  - parda
  - aspide
  - cobra
  long_desc: Essa cobra parece ser venenosa...
  name: uma áspide
  vnum: '010204204202'
- description: Um grande besouro rasteja por aqui, à procura de alimento.
  keywords:
  - areia
  - besouro
  long_desc: |-
    O besouro de areia é uma criatura inofensiva que vaga pelo deserto à
    procurando alimento.  Carregando sua pesada casca, ele é impérvio aos
    severos elementos de seu lar.  Quando ele anda, você apenas nota leves
    movimentos na areia.
  name: um besouro de areia
  vnum: '010204204203'
- description: Um poderoso funil de ar dança descontroladamente por aqui.
  keywords:
  - redemoinho
  - gigantesco
  - funil
  - ar
  long_desc: Cuidado para não ser tragado por ele!
  name: um gigantesco redemoinho
  vnum: '010204204204'
- description: Um cão Gra'lan passa rapidamente por você.
  keywords:
  - cao
  - gra'lan
  long_desc: |-
    Grande e esbelto, os Gra'lans lembram galgos, exceto por seres bem maiores.
    Grandes orelhas e olhos brilhantes mostram que essas criaturas são
    inteligentes e deve ser respeitadas.  Sua pele marrom empalidecida e sua
    habilidade mostram que ele é o melhor em uma caçada no deserto.
  name: um cão Gra'lan
  vnum: '010204204205'
- description: Um escorpião foge à sua aproximação.
  keywords:
  - escorpiao
  long_desc: Essa pequena criatura parece bastante aborrecida em vê-lo.
  name: um escorpião
  vnum: '010204204206'
- description: O Chefe dos Nômades está parado aqui.
  keywords:
  - chefe
  - nomade
  long_desc: |-
    O Chefe obteve justamente sua posição entre seu povo por desafiar o perigo
    dos Tam'ala.  Alto, forte e vestido adequadamente, isso mostra que esse
    homem conhece bem a severa vida no deserto.
  name: o Chefe Nômade
  vnum: '010204204207'
- description: Um homem alto está aqui, com o rosto coberto.
  keywords:
  - nomade
  - homem
  long_desc: |-
    Você observa atentamente a única parte do rosto desse homem que lhe é
    visível: seus olhos de negro tão profundo quanto a noite no deserto.  Ele
    parece atento a todos os movimentos a seu redor, inclusive os seus...
  name: um nômade
  vnum: '010204204208'
- description: Um homem com um sorriso alegre e um ar aventureiro está aqui.
  keywords:
  - nomade
  - cavaleiro
  - homem
  long_desc: |-
    Os cavaleiros são bravos indivíduos quem se aventuram no deserto para trazer
    comida e água.  Preparados e mentalmente fortes, eles são excelentes
    sobreviventes.  De todos os nômades daqui, os cavaleiros são a elite dos
    fortes.
  name: um cavaleiro nômade
  vnum: '010204204209'
- description: Uma mulher caminha por aqui.
  keywords:
  - nomade
  - mulher
  long_desc: |-
    Completamente coberta e protegida do rude ambiente, as mulheres nômades são
    tão fortes quantos os homens.  Crescida em um ambiente que desconsidera
    diferenças de gênero, ela é capaz de tudo que um homem for.  Essa é a única
    forma para que esse povo sobreviva no deserto.
  name: uma nômade
  vnum: '010204204210'
- description: Algo translúcido paira no ar, sorrindo malignamente para você.
  keywords:
  - translucido
  - genio
  - algo
  long_desc: |-
    Primeiramente, você pensou que esse gênio era apenas uma estranha coluna de
    fumaça...  Mas o par de brilhantes olhos e o sorriso sardônico lhe
    indicam que algo de muito perigoso está perante você.
  name: um gênio
  vnum: '010204204211'
- description: Um felino caminha lentamente pela areia.
  keywords:
  - sir'kas
  - felino
  long_desc: |-
    O pequeno Sir'kas se assemelha em muito com um lince, só que é bem
    menor e com orelhas bem mais pontudas. Seus belos olhos de felino são
    protegidos por pálbebras muito escuras, parecendo que ele usa maquiagem...
    Que engraçado!
  name: um Sir'kas
  vnum: '010204204212'
- description: Uma grande estátua está aqui, gasta pela abrasiva areia.
  keywords:
  - estatua
  long_desc: |-
    Essa estátua foi construída a muito tempo atrás, na mesma época e com as
    mesma rochas que se ergueram as grandes pirâmides.  Com cerca de 3 metros de
    altura, ela representa um deus que lhe é desconhecido e parece estar aqui
    para guardar um caminho agora soterrado.
  name: uma estátua
  vnum: '010204204213'
- description: Uma m�mia imunda rasteja em sua direção.
  keywords:
  - mumia
  - múmia
  long_desc: Essa múmia está caindo aos pedaços! E fedendo...
  name: uma múmia
  vnum: '010204204214'
- description: Um pássaro, feito de pedra, toma vida de repente diante de seus olhos.
  keywords:
  - ibis
  - íbis
  - passaro
  long_desc: "Ã\x8Dbis, venerado pelo povo da pirÃ¢mide, desfruta do santuÃ¡rio oferecido\
    \ aqui.\nUm gracioso pássaro com longas asas e pescoço, bico curvado, e plumagem\n\
    rosada é o símbolo da santidade daqui.  Ele se torna novamente uma estátua\nde\
    \ pedra em tempos de sofrimento, e reanima-se em tempos de alegria."
  name: um íbis
  vnum: '010204204215'
- description: Um grande verme de areia surge diante dos seus pés.
  keywords:
  - verme
  - areia
  long_desc: |-
    Você se surpreende com a enorme boca do verme: ele possui dentes recurvados,
    totalmente pontiagudos.  Normalmente eles ficam enterrados na areia e,
    quando sentem alguma possível presa acima deles, abrem imediatamente a
    bocarra e engolem-na inteira.  Parece que você teve sorte...
  name: um verme de areia
  vnum: '010204204244'
- description: Um urubu sobrevoa sua cabeça.
  keywords:
  - urubu
  long_desc: Ele parece faminto...
  name: um urubu
  vnum: '010204204252'
- description: Um camelo passeia por aqui.
  keywords:
  - camelo
  long_desc: Esse simpático camelo lhe parece familiar...
  name: um camelo
  vnum: '010204204256'
- description: O Grande Faraá está diante de você, perscrutando-lhe.
  keywords:
  - farao
  - faraó
  long_desc: |-
    O Grande Faraó está viajando por seu reino.  Vestido em esplendorosas roupas
    egípcias reais, ele segue em diante.  Um colar com um grande ankh dourado,
    um par de antigos braceletes de prata, pele de chita, e uma capa feita da
    plumagem de um íbis o fazem parecer um deus na terra.
  name: o Grande Faraó
  vnum: '010204204268'
- description: Você vislumbra uma miragem adiante.
  keywords:
  - miragem
  long_desc: Você está vendo coisa...
  name: uma miragem
  vnum: '010204204270'
- description: Uma Esfinge está aqui, coberta pela areia.
  keywords:
  - esfinge
  long_desc: |-
    A Esfinge foi coberta pelas areias por séculos, até a recente tempestade de
    areia trazê-la das profundezas da areia até a superfície.  Um massivo corpo
    de leão, e uma cabeça humana completam essa criatura.  Tendo vivido eras,
    essa é uma das mais sábias criaturas de todos os reinos.
  name: uma Esfinge
  vnum: '010204204274'
