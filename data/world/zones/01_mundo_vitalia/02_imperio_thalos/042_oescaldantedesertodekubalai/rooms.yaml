- description: |-
    O vasto oceano de areia continua, oprimido pelo ar sufocante.  Os severos
    ventos açoitam as dunas, levantando nuvens de poeira que chega a cegar seus
    olhos.  As dunas de areia de todos os tamanhos mudam lentamente ao sabor do
    vento.  O terreno parece se inclinar ao norte onde carapaças quebradas,
    exoesqueletos, e ossos podem ser vistos em meio às areias.  Uma pequena
    pletora, alguns magros arbustos e cactos podem ser vistos a alguma distância
    ao norte, oferecendo alguma esperança para escapar da turbulenta tempestade
    de areia.
  exits:
    east:
      target_vnum: '010204204240'
    north:
      target_vnum: '010204204247'
    south:
      target_vnum: '010204204230'
    west:
      target_vnum: '010204204238'
  name: O Deserto Escaldante de Kubalai
  vnum: '010204204239'
