- description: Uma pequena cobra venenosa serpenteia a seu redor.
  keywords:
  - venenosa
  - cobra
  long_desc: |-
    É uma pequena cobra, com escamas lisas como se fosse cerâmica.  A mordida
    venenosa desta cobra derrubou muitos faraós poderosos.
  name: a horrível cobra
  vnum: '010205305300'
- description: |-
    Uma enorme cobra naja ergue-se à sua frente e lentamente vai mostrando sua
    explendorosa cabeça, que se abre como se fôra um enorme leque de escamas.
  keywords:
  - cobra
  - naja
  long_desc: |-
    A cobra naja movimenta-se de forma sinuosa, rastejando de um lado para o
    outro, bem diante de você, exibindo sua incrível cabeça totalmente aberta,
    como se fosse um leque, e cujas cores fortes são usadas para distrair suas
    vítimas antes do bote.
  name: a cobra naja
  vnum: '010205305301'
- description: Um pequeno mangusto se esquiva pelo chão, caçando cobras.
  keywords:
  - mangusto
  long_desc: |-
    O mangusto é um roedor manhoso, um rápido caçador de perigosas cobras
    venenosas.  Ela cheira você, parecendo estar a procura de comida em suas
    mãos.
  name: o pequeno mangusto
  vnum: '010205305302'
- description: O guardião da pirâmide protege as tumbas dos intrusos.
  keywords:
  - guardiao
  - piramide
  long_desc: |-
    O guardião da pirâmide fez um juramento para destruir todos os ladrões de
    tumbas dos faraós.  Ele está totalmente vestido, dos pés a cabeça, com
    roupas cor de areia.
  name: o guardião da pirâmide
  vnum: '010205305303'
- description: Um furtivo ladrão de tumba está a procura do tesouro.
  keywords:
  - ladrao
  - tumba
  long_desc: O ladrão esbarra em você, e em seguida volta a se esconder na escuridão.
  name: um ladrão de tumba
  vnum: '010205305304'
- description: Ali Babá está aqui, procurando pelo tesouro do faraó.
  keywords:
  - ali
  - baba
  - ladrao
  long_desc: |-
    Você vê um homem alto, barbado, com olhos ambiciosos.  Ali Babá passou a sua
    vida roubando os outros.  Roubou inclusive recentemente, muitos itens bem
    debaixo do nariz dos guardiões da pirâmide.  Algum dia ele pode ser pego mas
    não hoje...
  name: Ali Babá
  vnum: '010205305305'
- description: Um pequeno tapete de tecido se encontra debaixo de seus pés.
  keywords:
  - magico
  - tapete
  long_desc: |-
    O tapete é simplesmente lindo, feito de um material sedoso.  Ele parece se
    levantar e tocar seu pé.  Espere, ele esta em pé, a poucos centímetros do
    chão!  Na verdade ele parece estar VIVO!
  name: o tapete magico
  vnum: '010205305306'
- description: Uma múmia vem em sua direção, incomodada com a sua presença.
  keywords:
  - mumia
  - cadaver
  long_desc: |-
    Você vê apenas a desfigurada carne humana em decomposição, animada pelo
    etéreo espírito de um morto.
  name: a múmia
  vnum: '010205305307'
- description: Um homem de areia brota do chão do deserto.
  keywords:
  - homem
  - areia
  long_desc: |-
    O homem de areia é exatamente isso: alguma coisa estranha, formada da areia
    do deserto.  Ele parece ser bastante grande e forte em sua casa de ventos
    quentes e arenosos.
  name: o homem de areia
  vnum: '010205305308'
- description: O Efreeti está aqui, envolto por uma coluna de fogo.
  keywords:
  - efreeti
  long_desc: |-
    O Efreeti é um poderoso ser, feito de fogo.  Ele contempla você com desdém e
    desprezo, com os braços cruzados sobre seu poderoso peito.
  name: o Efreeti
  vnum: '010205305309'
- description: Uma coluna de arenito esta aqui, esculpida em uma figura feminina.
  keywords:
  - coluna
  - cariatide
  long_desc: |-
    Na coluna foram esculpidas quatro figuras femininas bem formadas.  O arenito
    da cariátide é bem antigo mas você ainda pode ver uma espada letal, de
    pedra, nas mãos de cada figura.
  name: a cariátide
  vnum: '010205305310'
- description: O gênio surge dos confins de uma pequena lâmpada.
  keywords:
  - genio
  long_desc: |-
    O gênio é um poderoso ser feito do próprio ar e freqüentemente aprisionado
    em uma pequena lâmpada, usada para satisfazer os desejos de quem a encontra.
    Ele sorri para você, com os braços cruzados sobre sua pele azul, acariciando
    seu cavanhaque.
  name: o gênio
  vnum: '010205305311'
- description: A hieracoesfinge lhe parece muito esperta.
  keywords:
  - hieracoesfinge
  - esfinge
  long_desc: |-
    As hieracoesfinges são criaturas espertas, pequenas, mas sórdidas.  Possuem
    a cabeça de pássaro, com poderosas asas, e quatro patas prontas para rasgar
    suas vítimas em pedaços.  Eles costumam ter bastante inveja da superioridade
    dos seus primos mais velhos.
  name: a hieracoesfinge
  vnum: '010205305312'
- description: Uma ginoesfinge está sentada aqui, entretida por um enigma.
  keywords:
  - ginoesfinge
  - esfinge
  long_desc: |-
    A ginoesfinge é uma criatura tranqüila e amigável, tem o corpo de uma linda
    mulher de pele escura da cintura para cima, asas emplumadas e as hábeis
    pernas de um poderoso felino.  Agora ela está confusa, tentando resolver um
    enigma de sua prima crioesfinge.
  name: a ginoesfinge
  vnum: '010205305313'
- description: Uma crioesfinge observa você calmamente.
  keywords:
  - crioesfinge
  - esfinge
  long_desc: |-
    A crioesfinge é uma criatura calma e amigável, tendo a cabeça de um carneiro
    sobre o corpo de um felino bem peludo e asas como as de uma águia.  Ela se
    encanta com enigmas, proporcionando divertimento aos seus primos facilmente
    confundidos.
  name: a esfinge
  vnum: '010205305314'
- description: Uma poderosa androesfinge balança sua juba de leão.
  keywords:
  - androesfinge
  - esfinge
  long_desc: |-
    A poderosa androesfinge é uma criatura gigantesca, com o corpo de um leão,
    cuja face é como a de um homem relativamente simpático e um par volumoso de
    asas.  São contados contos de faraós que ficaram surdos permanentemente ao
    ouvir o poderoso rugido desta esfinge.
  name: a androesfinge
  vnum: '010205305315'
- description: Uma poderosa esfinge repousa na areia, dormente por séculos.
  keywords:
  - grande
  - esfinge
  long_desc: |-
    A grande esfinge se sobressai dez pés acima de você, repousando em estado de
    dormência.  Ela se tornou quase indistinguível da areia que a cerca, apesar
    de você ainda poder identificar os traços de uma bonita face que já ditou
    muitas regras.
  name: a grande esfinge
  vnum: '010205305316'
- description: Você despertou o poderoso servo dos faraós, Ramsés.
  keywords:
  - ramses
  - mumia
  long_desc: |-
    Assim que a luz que você carrega ilumina o rosto e o corpo da criatura, você
    pode ver que seus traços vão se definindo, preenchendo, endurecendo, ate que
    um homem aparentemente saudável se ergue diante de você, marcado apenas pelo
    seu último sono.  Seu cabelo é preto e macio, sua pele escura como
    chocolate, e seu peito quase nem se mexe quando respira.
  name: Ramsés, o Maldito
  vnum: '010205305317'
