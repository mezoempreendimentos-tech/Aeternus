- description: Um brownie da floresta refugia-se por aqui.
  keywords:
  - brownie
  - floresta
  long_desc: |-
    O brownie da floresta pisca para você e se esconde ligeiro.  Bastante
    amigável esta criaturinha.
  name: o brownie da floresta
  vnum: '010205705701'
- description: um lobo ronda por aqui procurando um coelho.
  keywords:
  - lobo
  long_desc: |-
    O lobo parece estar bastante faminto.  Você percebe que ele está pensando se
    VOCÊ não teria o mesmo gosto de um coelho.
  name: o lobo
  vnum: '010205705702'
- description: Um coelho pardo saltita alegremente.
  keywords:
  - coelho
  - pardo
  long_desc: |-
    O coelho olha em sua direção com seus grandes olhos castanhos e então bate
    em retirada..  OPA..  Lá vai seu almoço!
  name: o coelho pardo
  vnum: '010205705703'
- description: Um mateiro olha para você com um talo de mato pendendo de sua boca.
  keywords:
  - tomal
  - mateiro
  long_desc: |-
    O mateiro sorri disfarçando e com um sotaque desconhecido diz, 'Oi
    forasteiro - o nome é Tomal..  Como vai?'
  name: Tomal
  vnum: '010205705704'
- description: Uma forma sombria aparece da neblina.
  keywords:
  - demonio
  - guardiao
  - forma
  - sombria
  long_desc: |-
    Você vê uma tenebrosa combinação de dentes e garras, o guardião demônio está
    decidido a arrancar suas tripas.
  name: o guardião demônio
  vnum: '010205705705'
- description: O guarda de Graye vigia em seu posto.
  keywords:
  - guarda
  - sentinela
  - graye
  long_desc: |-
    O guarda sorri gentilmente dizendo, 'Melhor ficar perto de mim, amigo, é um
    mundo perigoso lá fora.'
  name: o guarda de Graye
  vnum: '010205705706'
- description: um diabinho rosnando para você.
  keywords:
  - diabinho
  - diabo
  long_desc: |-
    Ele parece um diabinho inofensivo, mas seus dentes afiados poderiam machucar
    se ele mordesse seu braço.
  name: o diabinho
  vnum: '010205705707'
- description: Um demônio menor salta em sua direção saindo das sombras!
  keywords:
  - menor
  - demonio
  long_desc: |-
    O demônio aparenta ser um pequenino amontoado de carne viva, cartilagem e
    dentes.  Ele o fita com muita fúria em seus olhos.
  name: o demônio menor
  vnum: '010205705708'
- description: Um cidadão de Graye passa correndo olhando por sobre os ombros.
  keywords:
  - cidadao
  - graye
  - homem
  long_desc: |-
    O homem parece preocupado - Você também estaria se sua cidade estivesse
    sitiada por demônios.
  name: o cidadão Graye
  vnum: '010205705709'
- description: Uma cidadã de Graye passa correndo olhando por sobre os ombros.
  keywords:
  - cidada
  - mulher
  long_desc: |-
    A mulher parece preocupada - Você também estaria se sua cidade estivesse
    sitiada por demônios.
  name: a cidadã de Graye
  vnum: '010205705710'
- description: Um demônio maior está aqui a espreita.
  keywords:
  - demonio
  - maior
  long_desc: |-
    Você olha bem dentro dos olhos dessa besta.  Você não nota nenhuma razão ou
    conhecimento a não ser uma imensa sêde de poder e destruição.
  name: um demônio maior
  vnum: '010205705711'
- description: Um espectro de sombra aparece violentamente em seu caminho.
  keywords:
  - guardiao
  - gruta
  - espectro
  long_desc: Tudo que você vê é um nevoeiro com dois grandes olhos vermelhos brilhando...
  name: o guardião da gruta
  vnum: '010205705712'
- description: Um carcereiro ronda por aqui, chicoteando os prisioneiros.
  keywords:
  - guarda
  - cela
  - carcereiro
  long_desc: |-
    O guarda parece ser..  Bem...  Quase humano.  Ele está coberto por feridas e
    tufos de pelos.  Ele te avista com seu único olho bom e diz, 'Abaixe as
    armas..  Prisioneiro!'
  name: o carcereiro
  vnum: '010205705713'
- description: O conselheiro do rei está aqui, soluçando.
  keywords:
  - rymat
  - conselheiro
  long_desc: |-
    Ele olha para você e implora, 'Por favor!  Eles o levaram!  Eu vejo que é um
    destemido aventureiro..  Por favor traga-o de volta para nós!' O conselheiro
    lhe dá as costas e continua a lamentar-se, tremendo incontrolavelmente.
  name: Rymat
  vnum: '010205705714'
- description: O Arque-Demônio emerge das sombras.
  keywords:
  - irgon
  - arque
  - demonio
  long_desc: |-
    Irgon olha para você com desprezo.  Suas costas oleosas refletem a luz das
    tochas.  Uma grande garra branca aponta em sua direção e ele profetiza,
    'Prepare-se para morrer.'
  name: o Arque-Deomônio Irgon
  vnum: '010205705715'
- description: Scrytin, o discípulo do senhor dos demônios, sorri para você.
  keywords:
  - scrytin
  - demonio
  - discipulo
  long_desc: |-
    Scrytin olha para você com ternura e de repente você se sente em paz e
    relaxado.  Você o encara diretamente nos olhos e se sente adormecer
    profundamente mais e mais...NÃO!!!!  Scrytin, percebendo que você saiu de
    seu transe grunhe, 'Não quer ser meu escravo hein?..  Então você deve
    morrer'
  name: Scrytin
  vnum: '010205705716'
- description: O bom Rei Relnar está aqui.
  keywords:
  - relnar
  - rei
  long_desc: |-
    Você olha dentro de seus olhos e nota sua descendência direta de Graye e
    agora é capaz de compreender porque sua cidade é tão próspera e feliz.
  name: rei Relnar
  vnum: '010205705717'
