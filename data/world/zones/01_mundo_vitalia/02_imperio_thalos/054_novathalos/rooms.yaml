    southeast:
      target_vnum: '010506906918'
  name: Do Lado de Fora do Portão Sul de Nova Thalos
  vnum: '010205405411'
- description: |-
    Andando através da ponte você vê as apressadas águas do Rio Ishtar.  Ao
