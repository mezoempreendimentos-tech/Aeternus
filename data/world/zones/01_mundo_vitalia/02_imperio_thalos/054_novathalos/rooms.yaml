    madeira servindo de base para a estrutura.  As escuras águas turvam sua
    visão quando você olha ao oeste, mas você acha que pode haver um portão de
    ferro nesta direção.
  exits:
    down:
      target_vnum: '010100300339'
    up:
      target_vnum: '010205405697'
    west:
      target_vnum: '010205405699'
