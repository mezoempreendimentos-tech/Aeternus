- description: |-
    Uma grande fonte natural brota do coração da montanha e flui montanha abaixo.
    Parece que houve um terrível terremoto aqui, há não muito tempo atrás, e o
    caminho que leva a leste através das montanhas é coberto de pedras,
    dificultando a passagem.
  exits:
    east:
      target_vnum: '010205405654'
    west:
      target_vnum: '010205405661'
  name: A Nascente do Rio Negro
  vnum: '010205405660'
- description: |-
    O rui flui montanha abaixo através de uma cratera ao oeste e segue pelas
    montanhas ao leste.
  exits:
    east:
      target_vnum: '010205405660'
    west:
      target_vnum: '010205405662'
  name: No Rio Negro
  vnum: '010205405661'
- description: |-
