    west:
      target_vnum: '010205405663'
  name: No Rio Negro
  vnum: '010205405662'
- description: |-
    As paredes rochosas a seu redor vão ficando mais baixas enquanto o rio
    flui para foras das montanhas em direção às planícies.
  exits:
    east:
      target_vnum: '010205405662'
    west:
      target_vnum: '010205405664'
  name: No Rio Negro
  vnum: '010205405663'
- description: O rio continua a leste e oeste daqui, abaixo das montanhas ao sul.
  exits:
    east:
      target_vnum: '010205405663'
    south:
      target_vnum: '010205405665'
  name: No Rio Negro
  vnum: '010205405664'
- description: |-
    O rio, seguindo um lento caminho em sua margem de fendas e torções.
    Altas montanhas podem ser vistas ao sul e ao leste.
  exits:
    north:
      target_vnum: '010205405664'
    south:
      target_vnum: '010205405666'
  name: No Rio Negro
  vnum: '010205405665'
- description: O rio faz uma extensa volta aqui em volta da montanha.
  exits:
    north:
      target_vnum: '010205405665'
    west:
      target_vnum: '010205405667'
  name: No Rio Negro
  vnum: '010205405666'
- description: |-
    O rio flui ao oeste daqui em direção ao coração da montanha e a leste
    através das rochas mais uma vez.
  exits:
    east:
      target_vnum: '010205405666'
    west:
      target_vnum: '010205405668'
  name: No Rio Negro
  vnum: '010205405667'
- description: |-
    Você mal pode compreender o que há em frente de você enquanto o rui flui
    silenciosamente através desta passagem.
  exits:
    east:
      target_vnum: '010205405667'
    south:
      target_vnum: '010205405669'
  name: No Rio Negro
  vnum: '010205405668'
- description: |-
    O rio flui suavemente ao oeste através do coração da montanha.  Há
    pequenas fendas nas paredes da passagem ao norte, onde você deverá ser capaz
    de sair da água.
  exits:
    east:
      target_vnum: '010205405668'
    north:
      target_vnum: '010205405672'
    south:
      target_vnum: '010102002110'
    west:
      target_vnum: '010205405670'
  name: No Rio Negro
  vnum: '010205405669'
- description: |-
    O rio continua a leste e oeste daqui, fluindo ao sul para uma escura
    borda do rio.
  exits:
    east:
      target_vnum: '010205405669'
    west:
      target_vnum: '010205405671'
  name: No Rio Negro
  vnum: '010205405670'
- description: |-
    O rio segue ao sul através de uma estreita parte de uma passagem que
    segue pelas entranhas da montanha.
  exits:
    east:
      target_vnum: '010205405670'
    south:
      target_vnum: '010205005005'
  name: No Rio Negro
  vnum: '010205405671'
- description: |-
    Você sai da água nesta estreita borda para ver se ela o leva para dentro
    das montanhas.  Infelizmente, a borda é grande o suficiente para apenas você
    descansar um pouco e não parece haver nenhuma saída a não ser de volta para
    o rio.
  exits:
    south:
      target_vnum: '010205405669'
  name: Em uma Pequena Borda
  vnum: '010205405672'
- description: |-
    A entrada para a guilda se parece mais com a entrada de uma caverna
    subterrânea.  As paredes de pedra são recobertas por runas, indicando que o
    lugar inteiro está protegido por forte magia.  Grandes tochas iluminam as
    câmaras mais profundas.  Ao norte você volta para as ruas de Nova Thalos.
  exits:
    down:
      target_vnum: '010205405674'
    north:
      target_vnum: '010205405431'
  name: A Entrada para a Guilda dos Druidas
  vnum: '010205405673'
- description: |-
    Você está dentro da caverna que é usada como guilda dos druidas.  Várias
    tochas presas às paredes da caverna dão uma agradável iluminação ao local.
    Você percebe veios de pedras preciosas na rocha das paredes, mas acha melhor
    não olhar demais (cuidado com a ganância!)...  A caverna continua para o
    leste, e você vê a saida da caverna para o norte.
  exits:
    east:
      target_vnum: '010205405675'
    up:
      target_vnum: '010205405673'
  name: O Interior da Caverna
  vnum: '010205405674'
- description: |-
    Você está na sala onde os druidas se reúnem e trocam idéias.  Toda
    mobília foi entalhada em uma espécie de cristal, sendo muito bonito o efeito
    que a luz das tochas produz quando incide sobre algumas das peças.  A leste
    você percebe um aposento mergulhado no mais profundo breu.
  exits:
    east:
      target_vnum: '010205405676'
    south:
      target_vnum: '010205405490'
    west:
      target_vnum: '010205405674'
  name: Um Grande Salão
  vnum: '010205405675'
- description: |-
    Você está no imenso salão onde os druidas aprendem sobre suas tradições,
    leis e poderes.  Megalitos foram, como que por mágica, dispostos em um
    grande círculo, tendo como centro um altar feito de rocha azulada.  Sobre um
    pedestal de ouro, junto ao altar, duas grandes esferas de fogo violeta
    iluminam o Círculo com seu estranho brilho.
  exits:
    west:
      target_vnum: '010205405675'
  name: O Círculo Druídico
  vnum: '010205405676'
- description: |-
    Mesmo sem qualquer música ser tocada, você sente que ela é parte desse
    lugar.  Aqui, os mais aclamados mestres da arte estiveram tanto como pupilos
    quanto como professores.  Deixaram os sons de suas obras aqui, impregnados
    em suas paredes repletas de retratos, nos instrumentos espalhados sobre as
    mesas, no cheiro doce de flores misturado com a comida e bebida lá debaixo.
    E você, só de entrar no recinto, começou a deixar sua própria música no ar,
    numa suave melodia que conta a sua vida.
  exits:
    down:
      target_vnum: '010205405650'
  name: A Sala de Estudos
  vnum: '010205405677'
- description: |-
    Você está em uma grande extensão gramínea.  Ao sul daqui ficam os portões
    Norte de Nova Thalos.  A leste e oeste os campos gramíneos seguem-se e ao
    norte, há alguma distância você vê algumas árvores.
  exits:
    east:
      target_vnum: '010205405681'
    north:
      target_vnum: '010205405682'
    south:
      target_vnum: '010205405567'
    west:
      target_vnum: '010205405681'
  name: Nas Planícies
  vnum: '010205405681'
- description: |-
    Você está em um gramado aberto.  A floresta ao norte parece próxima, mas
    ainda sim é um pouco longe.  Ao sul um pequeno caminho sujo foi aberto,
    levando a Nova Thalos.
  exits:
    east:
      target_vnum: '010205405682'
    north:
      target_vnum: '010205405683'
    south:
      target_vnum: '010205405681'
    west:
      target_vnum: '010205405682'
  name: Nas Planícies
  vnum: '010205405682'
- description: |-
    Você esta no limite de uma grande floresta.  As árvores continuam até
    onde seus olhos alcançam ao leste e oeste.  Um grande campo gramíneo pode
    ser visto ao sul.
  exits:
    east:
      target_vnum: '010205405683'
    north:
      target_vnum: '990014014000'
    south:
      target_vnum: '010205405682'
    west:
      target_vnum: '010205405683'
  name: O Limite da Floresta
  vnum: '010205405683'
- description: |-
    O rio se alarga ainda mais aqui, e suas águas se tornam escuras.  O
    cheiro de água salgada chega do leste.  O Mar do Dragão não deve estar
    longe.  Ao leste você pode ver o esboço lânguidos de uma cidade e ao norte
    você vê um grande campo gramíneo.
  exits:
    east:
      target_vnum: '010205405685'
    west:
      target_vnum: '010205405626'
  name: O Rio Ishtar
  vnum: '010205405684'
- description: |-
    Aqui é onde o rio desemboca no Mar do Dragão.  O encontro das águas
    revolveu muita areia onde o Rio termina e começa o mar azul.  Olhando ao
    oeste, tudo o que você pode ver é água em todo o horizonte.  Ao norte há uma
    pequena doca e você pensa que consegue chegar lá sem muito esforço.  O rio
    segue ao oeste, em direção de Nova Thalos.
  exits:
    east:
      target_vnum: '010205405686'
    west:
      target_vnum: '010205405684'
  name: O Delta do Rio
  vnum: '010205405685'
- description: |-
