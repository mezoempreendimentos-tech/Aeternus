    Passeio do Sultão continua ao norte e ao sul.
  exits:
    east:
      target_vnum: '010205405400'
    north:
      target_vnum: '010205405421'
    south:
      target_vnum: '010205405419'
    west:
      target_vnum: '010205405558'
  name: O Passeio do Sultão
  vnum: '010205405420'
- description: |-
