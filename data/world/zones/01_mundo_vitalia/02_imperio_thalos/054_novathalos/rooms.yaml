  exits:
    east:
      target_vnum: '010205405406'
    north:
      target_vnum: '010205405414'
    south:
      target_vnum: '010205405408'
    west:
      target_vnum: '010205405426'
  name: A Praça Ocidental do Mercado
  vnum: '010205405409'
- description: |-
    Pessoas passam por você falando umas com as outras, ou descansam seus
