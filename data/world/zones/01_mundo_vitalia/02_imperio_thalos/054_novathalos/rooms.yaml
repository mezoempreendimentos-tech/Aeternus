    north:
      target_vnum: '010205405514'
    south:
      target_vnum: '010205405409'
    west:
      target_vnum: '010205405521'
  name: A Praça Noroeste do Mercado
  vnum: '010205405414'
- description: |-
    Você está em uma das mais habitadas partes da cidade.  Ao norte fica o
    Palácio de Nova Thalos e o Casbah, a leste, oeste e sul daqui o agitados
