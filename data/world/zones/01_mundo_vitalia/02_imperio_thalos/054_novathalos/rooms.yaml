  exits:
    east:
      target_vnum: '010205405437'
    north:
      target_vnum: '010205405403'
    south:
      target_vnum: '010205405494'
    west:
      target_vnum: '010205405436'
  name: A Praça Comum
  vnum: '010205405410'
- description: |-
    Você diante de si um extenso Deserto Oriental.  Você deve ter ouvido
