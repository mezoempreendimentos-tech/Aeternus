- description: 'Você flutua em uma extensão interminável de névoa prateada, onde o
    chão e o céu são indistinguíveis.

    Não há horizonte, apenas um brilho difuso que parece emanar da própria realidade.
    O silêncio aqui tem

    peso, uma quietude densa que antecede o trovão. Fragmentos de memórias de vidas
    passadas — ou futuras —

    dançam na periferia da sua visão como vagalumes embriagados.

    Este é o ponto zero. O lugar entre os mundos.

    '
  exits:
    north:
      desc: Uma fenda na realidade revela o cheiro de especiarias e pedra molhada.
      target_vnum: '01010000001'
  flags:
  - safe
  - indoors
  - lawless
  name: O Nexus do Vazio
  sector: ethereal
  vnum: '0'
