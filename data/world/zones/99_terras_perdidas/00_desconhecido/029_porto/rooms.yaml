  name: Estrada Gaivota Sul
  vnum: '990002902990'
- description: |-
    Bem contrário ao mercado lotado a leste, esta rua é de alguma forma pacífica.
    Isso pode ser apenas por causa das patrulhas de guardas musculosos que passam
    em intervalos regulares. O cheiro de peixe que é tão prevalente em outros
    lugares de Porto está quase ausente do ar aqui, sendo substituído pelo aroma
    salgado da brisa marinha ao sul que está carregando o perfume doce das flores
    em sua direção. Ao sul a brancura alta da torre projetando da mansão que fica
    lá é como um dedo de osso levantado na percepção da resposta a uma pergunta
    urgente.
  exits:
    east:
      target_vnum: '990002902992'
    south:
      target_vnum: '990002902914'
    west:
      target_vnum: '990002902990'
  name: Estrada Gaivota Sul
  vnum: '990002902991'
