- description: |-
    As pessoas se apertam de todos os lados! Sob o tecido brilhante, remendado e
    colorido, não existe tal coisa como céu. Há apenas pessoas vagando pelo
    mercado lotado, homens carregando vagões e mercadores. Oh, os mercadores!
    Vestidos em trajes extravagantes e com todos os tipos de sotaques, os
    mercadores gritam sobre suas mercadorias, disputando sua atenção. Em uma
    multidão como esta, capaz de deixar até você claustrofóbico, seria sábio
    manter suas mãos perto da sua bolsa.
  exits:
    east:
      target_vnum: '990002902994'
    north:
      target_vnum: '990002902979'
    west:
      target_vnum: '990002902992'
  name: Mercado de Peixes Lotado
  vnum: '990002902993'
- description: |-
    Pessoas empurram ao passar, com pressa para chegar onde quer que seja que
    estão indo. Você pode ouvir os praguejos de vários homens em carroças e vagões,
    tentando levá-los e suas mercadorias através da multidão. Próximo ao leste
    toldos coloridos costurados ondulam na brisa marinha rígida e salgada. Os sons
    de mercadores gritando suas mercadorias e pessoas gritando umas com as outras
    em geral são quase esmagadores. Ao sul a multidão se afina em uma multidão, e
    ao norte você vê o mesmo tipo de encontro que vê aqui.
