  vnum: '990002902996'
- description: |-
    A brisa do sul sopra um aroma de peixe em sua direção, e através da pressão
    das pessoas nesta estrada serpenteante relativamente estreita você pode
    vislumbrar o portão de Porto ao norte, e flashes de toldos coloridos em algum
    lugar ao sul. Sobre o tilintar de cascos nas pedras e gritos de vizinhos uns
    para os outros você pode ouvir o rugido surdo de fundo do surf marinho batendo
    nas rochas. O ar está quente e úmido o suficiente para tornar a brisa leve
    refrescante.
  exits:
    north:
      target_vnum: '990002902998'
    south:
      target_vnum: '990002902996'
