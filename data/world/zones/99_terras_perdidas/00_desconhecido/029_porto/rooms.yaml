    com suas cabeças baixas.
  exits:
    north:
      target_vnum: '990002902946'
    south:
      target_vnum: '990002902973'
  name: Beco da Luna
  vnum: '990002902974'
- description: |-
    As tábuas estão molhadas com o borrifo das ondas batendo contra as rochas
    abaixo. Você chega muito perto da borda, e o vento rápido o pega e o joga sobre
    os limites das tábuas molhadas. A espiral do vento o atira para baixo na água
    que gela os ossos com um SPLASH!! Quando você vem à superfície, antes de ter
    mesmo o menor tempo para reagir, você é atirado contra as rochas irregulares
    pelas ondas batendo.
  exits: {}
  name: Contra as Rochas
  vnum: '990002902975'
- description: "Aqui há uma praia arenosa serena. Pessoas se deitam na areia, e aqueles\
    \ que\ntêm o dia todo longe do trabalho podem tomar sol o dia todo, dormindo sob\
    \ as\nestrelas à noite. A areia fina é macia, a praia alisada pelos ventos\nconstantemente\
    \ varrendo-a. A água aqui é quente e calma, lambendo em ondas\nsuaves. Crianças\
    \ da cidade nadam alegremente, até as rochas irregulares. Ondas\nse chocam forte\
    \ contra o outro lado daquelas rochas, jogando borrifo no ar. Ã\x89\numa coisa\
    \ boa que essas rochas estejam lá para agir como quebra-mares, ou esta\npraia\
    \ bela não seria nadável."
  exits:
    east:
      target_vnum: '990002902968'
    north:
      target_vnum: '990002902961'
    west:
      target_vnum: '990002902933'
  name: Praia Bela
  vnum: '990002902976'
- description: |-
    Há muito tráfego nesta estrada serpenteante. Muitas das pessoas indo ao norte
    estão puxando carroças cheias de peixe, enquanto muitas das pessoas indo ao sul
    estão puxando carroças vazias, sorrindo enquanto suas bolsas cheias tilintar de
    seus quadris. Ao norte você pode vislumbrar toldos coloridos e multidões de
    pessoas, enquanto ao sul você pode ouvir o estrondo de ondas quebrando nas
    rochas. Se você forçar a vista talvez possa ver um pouco do azul cintilante da
    luz refletida onde a estrada serpenteante quebra entre as muitas casas e
    estabelecimentos.
  exits:
    north:
      target_vnum: '990002902978'
    south:
      target_vnum: '990002902971'
    west:
      target_vnum: '990002902932'
  name: Estrada do Mercado
  vnum: '990002902977'
- description: |-
    Ao norte o cheiro de peixe, a pressão das pessoas e o barulho de um mercado
    movimentado tudo se torna maior. Em ambos os lados da estrada você pode ver a
    multidão de pessoas se movendo em todas as direções. Você também pode
    vislumbrar o grande portão de Porto ao sul, e flashes de toldos coloridos ao
    norte. Alguém pode se perguntar por que tantas pessoas seriam atraídas a um
    mercado de peixe, de todas as coisas.
  exits:
    north:
      target_vnum: '990002902994'
    south:
      target_vnum: '990002902977'
  name: Estrada do Mercado, perto do mercado
  vnum: '990002902978'
- description: |-
    As pessoas se apertam de todos os lados! Sob o tecido brilhante, remendado e
    colorido, não existe tal coisa como céu. Há apenas pessoas vagando pelo
    mercado lotado, homens carregando vagões e mercadores. Oh, os mercadores!
    Vestidos em trajes extravagantes e com todos os tipos de sotaques, os
    mercadores gritam sobre suas mercadorias, disputando sua atenção. Em uma
    multidão como esta, capaz de deixar até você claustrofóbico, seria sábio
    manter suas mãos perto da sua bolsa.
  exits:
    east:
      target_vnum: '990002902995'
    south:
      target_vnum: '990002902993'
    west:
      target_vnum: '990002902980'
  name: Mercado de Peixes Lotado
  vnum: '990002902979'
