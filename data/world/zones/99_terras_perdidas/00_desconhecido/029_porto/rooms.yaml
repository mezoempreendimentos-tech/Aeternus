- description: |-
    Uivos semelhantes a animais do norte e sul bloqueiam os sons do vento aqui,
    originando de um beco estreito e imundo. Os telhados suspensos o tornam negro
    como breu e os flashes estranhos que você vê vindo da escuridão do beco podem
    ser reflexos de luz em olhos de animais... ou humanos... Não é surpresa que as
    pessoas passem apressadas por este cruzamento com olhares preocupados para o
    norte e sul.
  exits:
    east:
      target_vnum: '990002902988'
    north:
      target_vnum: '990002902973'
    south:
      target_vnum: '990002902986'
    west:
      target_vnum: '990002902949'
  name: Cruzamento da Estrada Gaivota Sul e Beco da Luna
  vnum: '990002902987'
- description: |-
    As casas ao longo da Estrada Gaivota Sul são menores que as que você pode ver
    ao norte, mas ainda são bem bonitas. Esta estrada é irregularmente sombreada
    pelas pequenas árvores em alguns dos pequenos pátios, e canteiros pequenos
    periódicos de flores adicionam seus aromas à brisa que varre as pedras limpas.
    Residentes passeando ocasionalmente passam por você, sorrindo felizes. Talvez
    eles não ouçam as risadas suaves e maníacas que vêm de algum lugar a leste.
  exits:
    east:
      target_vnum: '990002902989'
    west:
      target_vnum: '990002902987'
  name: Estrada Gaivota Sul
  vnum: '990002902988'
- description: |-
    As casas ao longo da Estrada Gaivota Sul são menores que as que você pode ver
    ao norte, mas ainda são bem bonitas. Esta estrada é irregularmente sombreada
    pelas pequenas árvores em alguns dos pequenos pátios, e canteiros pequenos
    periódicos de flores adicionam seus aromas à brisa que varre as pedras limpas.
    Residentes passeando ocasionalmente passam por você, sorrindo felizes. A estrada
    vira ao sul aqui, enquanto ao norte um prédio opulento tem portas abertas, que
    derramam uma luz dourada rica na rua. Através da pequena janela com grades você
    pode capturar vislumbres de guardas bem armados e uma pilha cintilante do que
    parece ser moedas de ouro.
  exits:
    north:
      target_vnum: '990002902958'
    south:
      target_vnum: '990002902990'
    west:
      target_vnum: '990002902988'
