  vnum: '990002902962'
- description: |-
    Ao sul o que anteriormente parecia arenoso é agora uma rocha gigante e
    irregular de pedra preta brilhante. A brisa sudeste deriva os gritos felizes de
    crianças em sua direção. Ao norte a porta de uma das casas da família de
    pescadores fica aberta, o residente da casa não está lá. Talvez tenham saído
    com pressa para a praia para buscar uma criança, ou talvez tenham ido ao
    mercado para alguns suprimentos de última hora. O vento assobia através das
    rachaduras nas rochas e faria ranger os dentes de qualquer pessoa exceto as
    surdas.
  exits:
    east:
      target_vnum: '990002902939'
    north:
      target_vnum: '990002902981'
    west:
      target_vnum: '990002902962'
  name: Caminho Arenoso
  vnum: '990002902963'
- description: |-
    Este caminho está um pouco lotado, estando bem entre uma das melhores seções
    residenciais de Porto, a Estrada Gaivota Norte, e a seção comercial principal
    de Porto, o mercado. O tráfego aqui, embora mais do que você pode ver ao norte,
    só piora à medida que você vai mais ao sul em direção aos toldos coloridos.
    Lojas forram o leste, mas parece que a maioria dos proprietários está fora no
    mercado. Uma loja ainda está aberta, uma com uma placa pendurada pregada acima
    da porta, retratando um frasco fumegante.
  exits:
    east:
      target_vnum: '990002902966'
    north:
      target_vnum: '990002902942'
    south:
      target_vnum: '990002902965'
  name: Caminho do Mercado
  vnum: '990002902964'
- description: |-
    Ao sul o barulho e os cheiros do mercado são tantos que são quase dolorosos.
    Aqui a multidão é mais silenciosa, sendo principalmente pessoas carregando a
    descoberta do dia no mercado de volta para suas casas. Há apenas uma loja com
    sua porta ainda deixada aberta, implorando por negócios. Ela tem uma placa
    pregada acima da porta, uma de uma espada e maça cruzadas.
  exits:
    east:
      target_vnum: '990002902957'
    north:
      target_vnum: '990002902964'
    south:
      target_vnum: '990002902980'
  name: Caminho do Mercado
  vnum: '990002902965'
- description: |-
    Este quarto é enfumaçado e cheira intensamente a incenso. As contas pendendo
    da porta balançam enquanto você as empurra de lado para entrar, fazendo Tia
    notar sua presença antes de se virar de volta para seu caldeirão, adicionando
    uma pitada de uma erva de cheiro estranho ao pote espumante. Outras ervas
    variadas pendem do teto e frascos e garrafas vazios e cheios enchem as
    prateleiras na parede.
  exits:
    west:
      target_vnum: '990002902964'
  name: Boticário da Tia
  vnum: '990002902966'
- description: |-
    Contrário ao norte, onde as ondas batem nas rochas e agitam todo o oceano em
    uma espuma branca, aqui navios mercantes forram as docas de madeira elevadas na
    água profunda e segura. Você pode dizer que são embarcações mercantes, pois
    nenhum pescador com carroças ou qualquer outra coisa corre para cima e para
    baixo de suas pranchas como fazem para os navios mais abaixo. As embarcações
    mercantes têm velas de muitas cores, com bandeiras de reinos variados. Ao norte
    a rua está um pouco distante, enquanto ao sul há algumas das famosas
    embarcações de pesca de Porto.
  exits:
    north:
      target_vnum: '990002902936'
    south:
      target_vnum: '990002902935'
  name: Nas Docas
  vnum: '990002902967'
- description: "Aqui há uma praia arenosa serena. Banhistas sorrindo felizmente se\
    \ espalham\nna areia, fazendo aqueles que desejam caminhar pela praia terem que\
    \ observar\nseus passos ou pisar em um membro saliente. A areia fina é macia,\
    \ a praia\nalisada pelos ventos constantemente varrendo-a. A água aqui é quente\
    \ e calma,\nlambendo em ondas suaves. Crianças em sua roupa íntima, provavelmente\
    \ crianças\nda cidade, nadam alegremente, até as rochas irregulares contra as\
    \ quais as\nondas se chocam do outro lado, jogando borrifo no ar. Ã\x89 uma coisa\
    \ boa que\nessas rochas estejam lá para agir como quebra-mares, ou esta praia\
    \ bela não\nseria nadável."
  exits:
    north:
      target_vnum: '990002902962'
    west:
      target_vnum: '990002902976'
  name: Praia Bela
  vnum: '990002902968'
- description: |-
    Contrário ao caminho pavimentado arenoso correndo ao norte, ficar nesta areia
    aparentemente estável resulta em você afundando na areia movediça aquosa até
    seus joelhos antes que seus pés entrem em contato com algo sólido. A leste há
    outro pequeno trecho de praia de areia movediça antes das docas começarem. Ao
    sul o mar começa, batendo contra as rochas irregulares na água que se aprofunda
    rapidamente.
  exits:
    north:
      target_vnum: '990002902971'
    west:
      target_vnum: '990002902970'
  name: "Ã\x81gua atÃ© os Joelhos"
  vnum: '990002902969'
- description: |-
    Contrário ao caminho pavimentado arenoso correndo ao norte, ficar nesta areia
    aparentemente estável resulta em você afundando na areia movediça aquosa até
    seus joelhos antes que seus pés entrem em contato com algo sólido. A oeste
    estão os pilares grossos e altos que sustentam as docas enormes. A área sob as
    docas está escura. Ao sul o mar começa, batendo contra as rochas irregulares na
    água que se aprofunda rapidamente.
  exits:
    east:
      target_vnum: '990002902969'
    north:
      target_vnum: '990002902937'
    west:
      target_vnum: '990002902925'
  name: "Ã\x81gua atÃ© os Joelhos"
  vnum: '990002902970'
- description: |-
    A estrada pavimentada de Porto aqui está quase coberta por uma camada fina
    de areia, com mais constantemente soprando na brisa marinha vinda do sul. Há
    também o início do mar ao sul, a areia intercalada com muitas rochas irregulares
    nas quais as ondas se quebram. A oeste o Caminho Arenoso, merecedor de seu nome,
    viaja ininterrupto. A leste há uma cabana de madeira com uma placa retratando
    um barco pregada sobre a porta.
  exits:
    east:
      target_vnum: '990002902972'
    north:
      target_vnum: '990002902977'
    south:
      target_vnum: '990002902969'
    west:
      target_vnum: '990002902937'
  name: Cruzamento da Estrada do Mercado e Caminho Arenoso
  vnum: '990002902971'
- description: |-
    Ao entrar na cabana você vê um velho enrugado parado sobre uma peça de cota
    de malha quase terminada, adicionando os toques finais. Há todos os tipos de
    armaduras e roupas penduradas do teto e montadas nas paredes. O velho levanta
    os olhos quando você entra, rapidamente pulando atrás de um balcão contra a
    parede leste. Atrás do balcão há uma porta baixa levando a um quarto dos fundos,
    presumivelmente a oficina de Aramut.
  exits:
    east:
      target_vnum: '990002902934'
    west:
      target_vnum: '990002902971'
  name: Vestuário Protetor de Aramut
  vnum: '990002902972'
- description: |-
    O beco estreito é sinuoso, escuro e cheio de lixo podre. Os nichos nas
    paredes contêm olhos que brilham o reflexo de sua própria luz de volta para
    você, e risadas ecoam no espaço próximo junto com gibberish e gritos, parecendo
    vir de todos os lugares e lugar nenhum ao mesmo tempo. Ratos correm ao redor de
    seus pés e observam você das sombras, hostis e quase tão grandes quanto gatos
    pequenos. Não é muito de se admirar que as pessoas de Porto evitem este lugar.
    Os habitantes desta pista se esquivam da pequena quantidade de luz correndo do
    sul e da interseção, seus olhos acostumados à escuridão e machucados pela luz
    natural.
  exits:
    north:
      target_vnum: '990002902974'
    south:
      target_vnum: '990002902987'
  name: Beco da Luna
  vnum: '990002902973'
- description: |-
    O beco estreito é sinuoso, escuro e cheio de lixo podre. Os nichos nas
    paredes contêm olhos que brilham o reflexo de sua própria luz de volta para
