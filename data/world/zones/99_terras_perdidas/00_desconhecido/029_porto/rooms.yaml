- description: |-
    Pessoas passam apressadas por este cruzamento, lançando olhares preocupados
    para o sul como se esperassem que algo monstruoso saltasse do beco a qualquer
    segundo. De lá os odores pungentes de lixo e outros cheiros desagradáveis
    derivam em sua direção. Risadas insanas e gargalhadas e gibberish variado
    também podem ser ouvidos da escuridão criada pelos telhados suspensos.
    Realmente não é surpresa que as pessoas passem apressadas com seus narizes
    cobertos por lenços.
  exits:
    east:
      target_vnum: '990002902945'
    south:
      target_vnum: '990002902974'
    west:
      target_vnum: '990002902947'
  name: Cruzamento da Estrada Gaivota Norte e Beco da Luna
  vnum: '990002902946'
- description: |-
    A leste há um pequeno cruzamento, enquanto a oeste a Estrada Gaivota Norte
    termina. A Estrada Gaivota Norte é pacífica, embora ainda tenha algum tráfego.
    Ela passa pela seção residencial de Porto, e ao sul há principalmente casas. As
    pedras aqui estão limpas, e o cheiro de sal é forte. Ao norte a terra se
    inclina para cima, mantendo Porto em seu vale belo. Ao sul a cidade se espalha
    diante de sua vista como um mapa colorido.
  exits:
    east:
      target_vnum: '990002902946'
    west:
      target_vnum: '990002902948'
  name: Estrada Gaivota Norte
  vnum: '990002902947'
- description: |-
    Aqui, a Estrada Gaivota Norte se cruza com a Caminhada do Rio. A Estrada
    Gaivota Norte vai a leste através da seção residencial enquanto a Caminhada do
    Rio vai ao sul, perto da margem do riacho que corre rapidamente. O que antes era
    um rio gigante e corrente que havia esculpido o vale em que Porto agora se
    encontra não é agora mais que um riacho rápido. Do outro lado do riacho começa
    uma floresta densa, a folhagem frondosa e vegetação rasteira densa tão espessa
    que você não consegue ver mais nada.
  exits:
    east:
      target_vnum: '990002902947'
    south:
      target_vnum: '990002902951'
  name: Quina da Estrada Gaivota Norte e Caminhada do Rio
  vnum: '990002902948'
- description: |-
    As casas ao longo da Estrada Gaivota Sul são menores que as que você pode ver
    ao norte, mas ainda são bem bonitas. Esta estrada é irregularmente sombreada
    pelas pequenas árvores em alguns dos pequenos pátios, e canteiros pequenos
    periódicos de flores adicionam seus aromas à brisa que varre as pedras limpas.
    Residentes passeando ocasionalmente passam por você, sorrindo felizes. A oeste
    está o cruzamento com a Caminhada do Rio, que dificilmente tem mais pessoas que
    a própria Estrada Gaivota Sul. Há bancos brancos nos quais você pode descansar.
  exits:
    east:
      target_vnum: '990002902987'
    west:
      target_vnum: '990002902953'
  name: Estrada Gaivota Sul
  vnum: '990002902949'
- description: |-
    Sob os conveses está escuro, não tendo janelas ou fontes de luz externa.
    Nenhuma lâmpada está acesa aqui embaixo, sendo um perigo de incêndio no navio
    balançante. Beliches estão aqui em fileiras organizadas, aparafusados ao chão.
    Há também um pequeno grupo de mesas perto daqui, obviamente um refeitório. Ao
    norte barris de água estão firmemente amarrados, no caso dos marinheiros e
    pescadores ficarem presos no mar por uma tempestade.
  exits:
    up:
      target_vnum: '990002902931'
  name: Sob os Conveses
  vnum: '990002902950'
- description: |-
    Esta caminhada é agradavelmente sombreada por árvores crescendo no lado oeste
    da estrada, em pequenas áreas diante de casas agradáveis. A leste além de uma
    pequena margem gramada o riacho rápido gorgoleja alegremente em seu caminho
    para o sul e o mar. Pessoas caminham lentamente, aproveitando a sombra e
    olhando para o rio.
  exits:
    north:
      target_vnum: '990002902948'
    south:
      target_vnum: '990002902952'
  name: Caminhada do Rio
  vnum: '990002902951'
- description: |-
    Esta caminhada é agradavelmente sombreada por árvores crescendo no lado oeste
