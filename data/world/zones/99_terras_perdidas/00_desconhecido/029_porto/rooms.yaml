    east:
      target_vnum: '990002902929'
    south:
      target_vnum: '990002902924'
  name: Sob Porto
  vnum: '990002902930'
- description: |-
    O navio balança suavemente nas ondas, fazendo a maioria dos terrestres quase
    perder o equilíbrio. Uma rede foi espalhada pelo convés, absolutamente
    amontoada com todos os tipos de peixes enormes. Muitos marinheiros forram o
    convés do navio, seus braços enormes e musculosos arremessando peixes por
    cima da amurada rapidamente, seus movimentos quase um borrão. Homens mais
    magros correm aqui e ali, o que estão fazendo é bem pouco aparente para você.
    Há um alçapão levando para baixo dos conveses não muito longe de onde você
    está, enquanto ao sul está a porta de uma cabine.
  exits:
    down:
      target_vnum: '990002902950'
    east:
      target_vnum: '990002902935'
    south:
      target_vnum: '990002902901'
  name: Convés Dianteiro da Embarcação de Pesca
  vnum: '990002902931'
- description: |-
    Embarcações de pesca forram as docas aqui, suas pranchas puxadas para cima e
    os navios escuros. Aparentemente elas terminaram de descarregar a carga e
    deixaram seus homens irem para a cidade. A leste há uma área nua, molhada e
    varrida pelo vento das docas. Engraçado, mas apesar de todo o tráfego em outros
    lugares, ninguém está naquela seção.
  exits:
    east:
      target_vnum: '990002902975'
    west:
      target_vnum: '990002902935'
  name: Entre os Navios
  vnum: '990002902932'
- description: "A praia aqui é calmante para os nervos. Banhistas habitam a areia,\
    \ felizmente\ndesperdiçando seu dia pegando bronze e relaxando na areia muito\
    \ fina. A areia\né macia e a praia lisa pelo vento constante. A água aqui é quente\
    \ e calma,\nlambendo em ondas suaves. Crianças da cidade nadam alegremente, até\
    \ mesmo até\nas rochas irregulares contra as quais as ondas se chocam do outro\
    \ lado,\njogando borrifo no ar. Ã\x89 uma coisa boa que essas rochas estejam lÃ¡\
    \ para agir\ncomo quebra-mares, ou esta praia bela não seria nadável."
  exits:
    east:
      target_vnum: '990002902976'
    north:
      target_vnum: '990002902959'
  name: Praia Bela
  vnum: '990002902933'
- description: |-
    Através da porta atrás do balcão de Aramut fica sua oficina, onde ele trabalha
    em suas armaduras. Há ferramentas espalhadas ao redor de uma bancada e uma mesa.
    Sobre a mesa jaz o início de uma peça de malha, com várias horas de trabalho
    restantes antes que se torne um dos belos artesanatos de Aramut. A 'parede' sul
    da oficina está aberta, com vários pés de queda para a água profunda e rochas
    irregulares abaixo. Seria sábio não chegar muito perto - o vento além da
    entrada é rápido, embora o interior da oficina seja estranhamente calmo. Há um
    baú marítimo pesado contra a parede leste.
  exits:
    south:
      target_vnum: '990002902975'
    west:
      target_vnum: '990002902972'
  name: Oficina de Aramut
  vnum: '990002902934'
- description: "A leste as docas continuam, mas a oeste há um navio de pesca enorme.\n\
    Definitivamente não é o pequeno barco de um homem só que as palavras 'barco de\n\
    pesca' provavelmente trariam Ã  mente. Ã\x89 monstruoso! Marinheiros com carroÃ§as\n\
    ficam esperando enquanto peixes enormes são constantemente arremessados para\n\
    fora do navio. Outros homens ficam em fila, esperando que a carroça da frente\n\
    seja enchida e corram para o mercado para que possam subir e ter suas próprias\n\
    carroças cheias. Uma rampa de prancha leva para cima até o convés."
  exits:
    east:
      target_vnum: '990002902932'
    north:
      target_vnum: '990002902967'
    west:
      target_vnum: '990002902931'
  name: Entre os Navios
  vnum: '990002902935'
- description: |-
    As docas de Porto são rumorizadas como sendo um lugar maravilhoso - ou assim
    dizem as conversas que você ouviu entre cidadãos e viajantes cansados. Mas daqui
    você não consegue ver muito delas. Há simplesmente tráfego demais. Em ambos os
    lados das docas aqui há areia de aparência molhada mais próxima da costa,
    enquanto mais longe as ondas se chocam contra rochas traiçoeiras. Há uma escada
    de corda escorregadia do lado aqui, pendendo na escuridão sob as docas.
  exits:
    north:
      target_vnum: '990002902938'
    south:
      target_vnum: '990002902967'
  name: Nas Docas
  vnum: '990002902936'
- description: |-
    O som do mar contra as rochas ao sul é calmante para os nervos. O caminho
    largo tem algum tráfego, mas embora haja homens com carroças correndo tanto
    para o mercado quanto para as docas, a largura da estrada o torna de alguma
    forma menos lotado. Há canto alto e licencioso em algum lugar a leste, e uma
    praia arenosa ao sul, estranhamente plana.
  exits:
    east:
      target_vnum: '990002902971'
    south:
      target_vnum: '990002902970'
    west:
      target_vnum: '990002902938'
  name: Caminho Arenoso
  vnum: '990002902937'
- description: |-
    O caminho arenoso não é tão arenoso aqui, a areia sendo regularmente varrida
    das pedras pela passagem rápida de pés. Ao sul há uma grande rampa levando às
    docas. Marinheiros empurrando carroças em ritmos furiosos aceleram, e é
    surpreendente que não se choquem uns com os outros. Longe ao longo das docas
    você pode ver homens correndo para dentro e fora de embarcações de pesca
    gigantes, e até mesmo alguns navios coloridos. Ao norte há um prédio baixo,
    em bom estado. A porta aberta derrama os cheiros de cerveja e bebidas mais
    fortes na rua, junto com as canções licenciosas de bebedeira que os fregueses
    estão cantando. Acima da porta está pregada uma caneca rachada.
  exits:
    east:
      target_vnum: '990002902937'
    north:
      target_vnum: '990002902940'
    south:
      target_vnum: '990002902936'
    west:
      target_vnum: '990002902939'
  name: Diante das Docas
  vnum: '990002902938'
- description: |-
    Este caminho tem pouco tráfego comparado ao resto de Porto. As poucas pessoas
    aqui estão vagueando tranquilamente, apreciando a paisagem. De algum lugar a
    leste tentáculos de canções licenciosas chegam aos seus ouvidos, rapidamente
    levadas pela pressa da brisa marinha sempre presente. Olhando para o leste você
    pode ver a correria de homens entrando e saindo da entrada das docas que está
    lá, enquanto a oeste a área é pacífica.
  exits:
    east:
      target_vnum: '990002902938'
    west:
      target_vnum: '990002902963'
  name: Caminho Arenoso
  vnum: '990002902939'
- description: |-
    Este é bem obviamente um bar de pescadores, desde a rede pendurada pelo teto,
    que está sendo usada atualmente para pendurar lanternas, até o peixe troféu
    gigante pendurado nas paredes. Tanto os cheiros de cerveja quanto de fumaça de
    cachimbo pairam pesadamente no ar do quarto enfumaçado, e as mesas estão
    espalhadas bem próximas no chão sujo. Ao norte um barman baixo, musculoso e
    jovem está polindo copos com um pano sujo quando não está servindo bebidas.
  exits:
    south:
      target_vnum: '990002902938'
  name: Dentro da Caneca Rachada
  vnum: '990002902940'
- description: |-
    Aqui não está nem perto de tão lotado quanto a área perto do portão que você
    pode ver a leste. A Estrada Gaivota Norte é pacífica, embora ainda tenha algum
    tráfego. Ela passa pela seção residencial de Porto, e ao sul há principalmente
    casas. As pedras aqui estão limpas, e o cheiro de sal é forte. Ao norte a terra
    se inclina para cima, mantendo Porto em seu vale belo.
  exits:
    east:
      target_vnum: '990002902998'
    west:
      target_vnum: '990002902942'
  name: Estrada Gaivota Norte
  vnum: '990002902941'
- description: |-
    Este cruzamento está ligeiramente mais lotado que as partes da Estrada Gaivota
    Norte que você pode ver a leste e oeste. Ao sul está o Caminho do Mercado, e
    além disso você pode ver flashes de cor. Ao norte a terra continua a se inclinar
    para cima, mantendo Porto em seu vale belo.
  exits:
    east:
      target_vnum: '990002902941'
    south:
      target_vnum: '990002902964'
    west:
      target_vnum: '990002902943'
  name: Cruzamento da Estrada Gaivota Norte e Caminho do Mercado
  vnum: '990002902942'
