- description: |-
    Porto está localizada ao sul distante da capital. A cidade prospera porque é a
    principal fornecedora de peixes e outros produtos do mar para a capital. A
    localização da cidade oferece uma bela paisagem. Há montanhas a leste e floresta
    a oeste. Mais uma selva, na verdade. O mar fica ao sul da cidade com uma bela
    praia arenosa, interrompida abruptamente pelas montanhas a leste e uma série de
    penhascos intransponíveis não muito longe da linha da floresta a oeste. A Estrada
    do Sul (o povo de Porto sempre riu deste nome, já que daqui ela na verdade vai
    para o norte) começa logo fora de um maravilhoso portão da cidade. O portão é
    mais para exibição do que para proteção, já que Porto nunca teve nada a temer
    devido à sua localização remota. Afinal, que senhor se interessaria por alguns
    peixes? Isso realmente não mudou, mesmo com a vinda da estrada do sul, já que
    patrulhas regulares de soldados de elite são designadas para protegê-la e
    guarnecer a própria cidade.
  exits: {}
  name: A Cidade de Porto
  vnum: '990002902900'
- description: |-
    A cabine parece confortável, mas não exatamente opulenta ou rica. As janelas
    redondas estão abertas para deixar entrar a brisa salgada. Há um sofá sob uma
    delas, feito de crina de cavalo e com aparência muito macia. Mapas do mar
    forram as paredes, junto com os muitos instrumentos usados na navegação. Há
    também uma cama e um pequeno fogão aqui, ao lado da escrivaninha. Todos os
    móveis estão firmemente fixados ao chão, não sendo afetados pelo balanço do
    navio. A porta ao norte leva de volta aos conveses.
  exits:
    north:
      target_vnum: '990002902931'
  name: A Cabine do Capitão
  vnum: '990002902901'
- description: |-
    Interessante. O Senhor de Porto é obviamente um homem com um vício. Mulheres
    com pouca roupa enchem este quarto. Há pilhas de sedas e almofadas por todo o
    chão, parecendo confortáveis para simplesmente descansar. Há uma pilha
    particularmente grande das almofadas mais macias contra a parede oeste. Talvez
    sejam para a garota favorita de Degruziel.
  exits:
    down:
      target_vnum: '990002902904'
  name: Sala do Harém
  vnum: '990002902902'
- description: |-
    Este quarto tem o chão coberto por um tapete vermelho luxuoso, macio e quase
    chegando aos tornozelos. As cortinas estão abertas sobre as janelas, oferecendo
    uma vista maravilhosa do jardim. As paredes aqui são brancas, onde não estão
    obscurecidas por tapeçarias dos deuses e deusas locais. Contra a parede
    próxima à única saída, a porta pela qual você entrou, há um grande guarda-roupa
    de carvalho. Com muito espaço interno. O que chama e prende sua atenção, no
    entanto, é a enorme cama no centro do quarto. Poderia acomodar confortavelmente
    três pessoas, mas parece mais do gosto de duas. Parece confortável.
  exits:
    west:
      target_vnum: '990002902904'
  name: Câmara Privada de Degruziel
  vnum: '990002902903'
- description: |-
    O quarto no topo da escadaria não é tão grande, nem tão elegante, quanto os
    quartos do andar inferior. Estes quartos no segundo andar devem ser quartos
    privados, não destinados aos olhos do público. Embora não seja tão bem
    iluminado quanto a área no andar de baixo, você ainda pode ver bem pelas
    tochas que forram as paredes de pedra. Há uma janela com cortinas voltada para
    fora, enquanto também há entradas levando ao norte e leste. Uma escadaria
    simples contra a parede oeste leva para cima, à torre da Mansão de Degruziel,
    sendo a porta lá em cima trancada com uma fechadura MUITO GRANDE. Há uma
    janela com cortinas voltada para fora, para o sul e o mar. Ao norte há uma
    porta simples e baixa.
  exits:
    down:
      target_vnum: '990002902907'
    east:
      target_vnum: '990002902903'
    north:
      target_vnum: '990002902905'
    up:
      target_vnum: '990002902902'
  name: Topo da Escadaria
  vnum: '990002902904'
- description: |-
    O quarto está lotado, mas uma brisa fraca perfumada com cheiros do jardim
    entra por uma janela aberta. Deve estar sendo canalizada ao redor da torre,
    porque a janela está voltada para o norte, e o vento geralmente sopra do sul.
    Há várias esteiras estendidas no meio do chão, e uma cortina puxada separa o
    quarto em seções. As esteiras, embora cheias apenas de palha, parecem bastante
    confortáveis.
  exits:
    south:
      target_vnum: '990002902904'
  name: Aposentos dos Criados
  vnum: '990002902905'
- description: |-
    Você entra na umidade escura da câmara da prisão... E a pesada porta de ferro
    se fecha rapidamente atrás de você! Você está preso no quarto úmido. Você
    consegue distinguir grilhões na parede norte. Uma pilha suja de tecido está
    amontoada contra a parede oeste.
  exits:
    west:
      target_vnum: '990002902921'
  name: "Uma CÃ¢mara de Masmorra Ã\x9Amida"
  vnum: '990002902906'
- description: |-
    Contra as paredes norte e sul há pares gêmeos de belas escadarias. São braços
    de mármore cor de salmão curvando-se em um abraço ao centro do quarto, onde
    fica uma fonte. A fonte de mármore requintada é de um peixe empoleirado em sua
    cauda, água jorrando de sua boca. De volta ao leste o tapete vermelho começa
    novamente, enquanto as escadas levam ao segundo andar da Mansão.
  exits:
    east:
      target_vnum: '990002902908'
    up:
      target_vnum: '990002902904'
  name: A Escadaria Dupla
  vnum: '990002902907'
- description: |-
    Este quarto só é chamado de corredor porque conecta um quarto da Mansão a
    outro, não por causa de seu tamanho. Tapeçarias lindamente bordadas forram as
    paredes, cada uma com sua própria história para contar. Esculturas, estátuas,
    pinturas e todos os tipos de formas de arte estão espalhados ao redor, alguns
    pendurados e outros em pedestais de mármore que são eles próprios esculturas.
    Aqui o chão de pedra foi coberto com tapete vermelho rico. Ao norte há uma
    pequena porta simples, e ao oeste há um conjunto duplo de escadarias
    majestosamente curvadas.
  exits:
    east:
      target_vnum: '990002902910'
    north:
      target_vnum: '990002902909'
    west:
      target_vnum: '990002902907'
  name: Um Corredor Artístico
  vnum: '990002902908'
- description: |-
    Através da porta fica um pequeno escritório, onde Degruziel gosta de realizar
    seus compromissos, conselhos internos, audiências e outras funções similares.
    Há uma mesa redonda no centro do quarto, com seis cadeiras, e uma escrivaninha
    no canto mais próximo. A escrivaninha está empilhada com todos os tipos de
    papéis, pergaminhos e utensílios de escrita. Os castiçais tanto na mesa quanto
    na escrivaninha são elegantes, como tudo mais no quarto, mas também têm um ar
    de utilidade sobre eles ao invés da opulência simples do corredor que você
    acabou de deixar. As paredes de pedra são forradas com prateleiras cobertas de
    livros. Atrás da cadeira de madeira de espaldar alto há uma pequena pintura, e
    na parede norte há uma janela voltada para o jardim.
  exits:
    south:
      target_vnum: '990002902908'
  name: Câmara de Audiências de Degruziel
  vnum: '990002902909'
- description: |-
    Este deve ser onde Degruziel, o Senhor de Porto, recebe seus convidados. Há
    cadeiras confortáveis e sofás espalhados pelo centro do grande quarto. Acima da
    lareira maciça há uma grande pintura do deus do mar. Diante da lareira há uma
    longa mesa de jantar de mogno, grande o suficiente para acomodar doze pessoas.
    Tapeçarias cobrem as paredes de pedra. Do arco a leste vêm cheiros agradáveis,
    enquanto a oeste, através de uma distância repleta de arte, você pode ver uma
    escadaria dupla curvada.
  exits:
    east:
      target_vnum: '990002902912'
    north:
      target_vnum: '990002902911'
    west:
      target_vnum: '990002902908'
  name: Salão de Degruziel
  vnum: '990002902910'
- description: |-
    O caminho de carroça aqui leva tanto para leste em direção aos estábulos,
    onde alguém pode visitar os cavalos, ou para o norte através do jardim e de
    volta à rua. Ao sul está a varanda opulenta do Senhor de Porto e a porta da
    frente. O corrimão da varanda é esculpido para se assemelhar a uma videira se
    retorcendo sobre si mesma, enquanto os postes são requintadamente esculpidos
    em peixes sentados em suas caudas, com suas bocas ao redor do corrimão. Seus
    olhos adornados com joias piscam na luz. A porta é uma grande e fantasiosa
    miríade de esculturas retratando uma lenda local.
  exits:
    east:
      target_vnum: '990002902913'
    north:
      target_vnum: '990002902914'
    south:
      target_vnum: '990002902910'
  name: A Varanda da Mansão
  vnum: '990002902911'
- description: |-
    Criadas se movimentam apressadamente por todo este quarto de cheiro agradável.
    Está muito quente aqui, por todo o calor sendo emanado pelos muitos fogões,
    fornos e lareiras. As bancadas neste quarto estão todas polvilhadas com farinha,
    assim como as criadas apressadas. Uma grade de resfriamento para pão está fixada
    contra uma parede, enquanto uma entrada do porão não está muito longe do arco
    que leva de volta ao salão.
  exits:
    down:
      target_vnum: '990002902982'
    west:
      target_vnum: '990002902910'
  name: Cozinha de Tiama
  vnum: '990002902912'
- description: |-
    O interior dos estábulos é escuro, mas você pode distinguir muitas fileiras
    de estábulos bastante espaçosos e grandiosos. Um pouco demais para cavalos e
    tal, mas se essa é a maneira que uma pessoa quer gastar seu dinheiro... Os
    cheiros de feno e cavalos são fortes, e os sons suaves dos cavalariços
    acalmando alguns dos cavalos mais nervosos que se assustaram com sua entrada
    podem ser ouvidos no fundo do complexo sobre o balançar de caudas e o relincho
    periódico.
  exits:
    west:
      target_vnum: '990002902911'
  name: Os Estábulos da Mansão
  vnum: '990002902913'
- description: |-
    O caminho serpenteante de carroça que passa da rua pela varanda frontal do
    Senhor e adiante até os estábulos também passa por seu magnífico jardim de
    flores. Os tons suaves de roxos, vermelhos, brancos, amarelos e azuis descansam
    os olhos de todas as outras atrações na cidade. O perfume das flores sempre
    florescentes enche o ar agradavelmente, misturando-se com a brisa salgada do
    mar. Videiras pendem festivamente dos galhos das muitas árvores, e animais
    brincam sob elas, sem medo. O caminho de carroça continua tanto em direção à
    rua quanto em direção à varanda, cabe a você escolher o caminho.
  exits:
    north:
      target_vnum: '990002902991'
    south:
      target_vnum: '990002902911'
  name: O Jardim de Flores do Senhor
  vnum: '990002902914'
- description: |-
    Este quarto, além de qualquer um dos outros, está abarrotado com muitos
    produtos roubados. Tudo desde rolos de tapetes até baús de moedas e joias estão
    aqui, cuidadosamente embalados para serem vendidos no mercado negro. Algumas
    das torres são tão altas que se você não for cuidadoso e cauteloso com seus
    passos elas podem desabar, esmagando você. Este é obviamente onde os habitantes
    atuais do Esconderijo armazenam a maioria de seu saque.
  exits:
    east:
      target_vnum: '990002902916'
    north:
      target_vnum: '990002902917'
  name: Um Quarto Cheio de Produtos Roubados
  vnum: '990002902915'
- description: "O chão deste quarto está forrado com rolos de cama, sua única vela\
    \ não\najudando a iluminar muita coisa no quarto escuro. Os sons de pessoas dormindo\n\
    se filtram através, como se o quarto estivesse muito ocupado. Este quarto está\n\
    muito escuro para ver as bordas, mas ecoa como se a câmara fosse muito grande.\n\
    Ã\x81gua goteja em algum lugar a leste, pingando no fundo de um pote invisÃ­vel."
  exits:
    west:
      target_vnum: '990002902915'
  name: O Quarto Comum
  vnum: '990002902916'
- description: |-
    Este quarto está carregado com produtos roubados, desde as tapeçarias
    penduradas nas paredes até o único castiçal de ouro que segura a única vela
    deste quarto, até os tapetes importados caros no chão. As sombras neste quarto
    são profundas e sinistras. Você tem a sensação de que seria sábio manter um
    olho aberto para problemas.
  exits:
    north:
      target_vnum: '990002902922'
    south:
      target_vnum: '990002902915'
  name: Um Quarto no Esconderijo dos Ladrões
  vnum: '990002902917'
- description: |-
    Ao empurrar de lado a cortina de veludo preto você percebe que este quarto
    está silencioso e obviamente não usado pela espessa camada de poeira no chão.
    Também está escuro, o pedaço preto de cera na mesa indicando a vela que uma vez
    iluminou este quarto queimou há muito tempo. Este quarto pode ter sido
    esplêndido uma vez, mas agora suas tapeçarias brilhantes estão desbotadas e
    cobertas de poeira, o tapete vermelho apodrecido e pronto para desmoronar.
    Mesmo o retrato de tamanho real na parede leste está desbotado além do
    reconhecimento.
  exits:
    east:
      target_vnum: 9900029-0001
    south:
      target_vnum: '990002902919'
  name: Além do Santuário
  vnum: '990002902918'
- description: |-
    Este é o quarto mais brilhantemente iluminado que você viu em todo o
    esconderijo dos ladrões, com várias velas pequenas e de chama baixa dispostas
    sob uma imagem de uma mulher bonita. As cores das velas variam de vermelho
    brilhante, a sangue seco, ao preto mais profundo da meia-noite. Você sente
    como se não fosse prudente falar acima de um sussurro neste quarto. O ar aqui
    é sério e melancólico, com as tábuas do chão e tanto as paredes de pedra quanto
    o teto pintados de preto. A pequena corrente de ar fluindo ondula o tecido
    preto cobrindo o arco ao norte.
  exits:
    north:
      target_vnum: '990002902918'
    south:
      target_vnum: '990002902922'
  name: Um Pequeno Santuário
  vnum: '990002902919'
- description: |-
    Ao entrar no quarto, luzes mágicas traçam uma escrita pelo ar,
    @R'Toque em minhas coisas e eu te encontrarei e te matarei. Trianne.'@n
    Baús meio apodrecidos se alinham nas paredes, suas barreiras mágicas ainda em
    pé embora a madeira sobre a qual os feitiços foram lançados esteja em estado
    de deterioração avançada. Pepitas douradas e joias de todas as cores brilham
    através das fendas na madeira, refletindo luz do feitiço de luz lançado sobre
    um globo de rocha no centro do quarto. Tão tentador... Que pena que você não
    pode tocá-las.
  exits:
    west:
      target_vnum: '990002902918'
  name: Esconderijo Secreto de Trianne
  vnum: '990002902920'
- description: |-
    Este quarto tem carpete simples em preto, realçando a aparência das sombras
    projetadas pela única vela preta, cuja chama queima azul no quarto. Ela fica
    na mesa simples, o único móvel. Uma tapeçaria bastante simples repousa
    pendurada na parede leste.
  exits:
    east:
      target_vnum: '990002902906'
    west:
      target_vnum: '990002902922'
  name: Um Quarto Tedioso
  vnum: '990002902921'
- description: |-
    Você se encontra em uma passagem do esconderijo dos ladrões, arcos em todos
    os lados de você. O leste é esculpido simplesmente, o oeste tendo uma cabeça
    de leão sobre ele, o norte de um lobo, e o sul de um urso. Outra vela simples
    ilumina este quarto, projetando sombras longas ao redor dos móveis
    incompatíveis e tapeçarias roubadas.
  exits:
    east:
      target_vnum: '990002902921'
    north:
      target_vnum: '990002902919'
    south:
      target_vnum: '990002902917'
    west:
      target_vnum: '990002902923'
  name: Passagem
  vnum: '990002902922'
- description: |-
    Quando uma pessoa pensa em Porto com seu Mercado Lotado e suas patrulhas de
    guardas de elite, não se pensa frequentemente em um quartel-general de ladrões.
    Mas isso é o que você se encontra - um esconderijo de ladrões habilmente
    escondido e muito seco. Tapeçarias forram as paredes, muito provavelmente tão
    roubadas quanto os móveis confortáveis espalhados pelo chão de madeira. A luz
    é fraca - uma única vela deixa muitas sombras conspícuas ao redor do quarto.
    Há também um brilho através do arco a leste.
  exits:
    east:
      target_vnum: '990002902922'
    up:
      target_vnum: '990002902924'
  name: Esconderijo dos Ladrões
  vnum: '990002902923'
- description: |-
    Esta deve ser uma parte do antigo sistema de esgoto de Porto quando era uma
    pequena cidade. Agora as paredes do esgoto desmoronaram, deixando uma piscina
    gigante de água aberta, coberta no fundo por pedras velhas. A água se estende
    muito além de seus olhos e sua luz em alguns lugares. O chão é feito de uma
    lama aquosa, consistindo de água, areia, algas marinhas podres e algumas outras
    coisas em que você nem quereria pensar. A lama é rasa, apenas até seus joelhos.
    Ela se agita violentamente em alguns lugares, como se houvesse coisas vivas
    embaixo dela. Há uma caixa de madeira no canto aqui, afundada na lama.
  exits:
    down:
      target_vnum: '990002902923'
    east:
      target_vnum: '990002902926'
    north:
      target_vnum: '990002902930'
  name: Sob Porto
  vnum: '990002902924'
- description: |-
    Está bem escuro sob as docas, embora a areia seja estável. A água está calma
    aqui, sendo cercada por rochas que quebram as ondas, deixando você em água
    estagnada até os joelhos. As docas aqui descem para a rua ao norte, forçando
    você a se agachar, enquanto ao sul há um buraco nas rochas que pode ser o
    covil de um caranguejo-rei. Uma escada de corda pende das docas acima, verde
    com musgo que prospera no ar úmido. Seria um aperto apertado, mas você também
    acha que pode conseguir se esgueirar entre a madeira e as rochas ao norte, mas
    sua capacidade de retornar é realmente questionável.
  exits:
    east:
      target_vnum: '990002902970'
    north:
      target_vnum: '990002902938'
    west:
      target_vnum: '990002902927'
  name: Sob as Docas
  vnum: '990002902925'
