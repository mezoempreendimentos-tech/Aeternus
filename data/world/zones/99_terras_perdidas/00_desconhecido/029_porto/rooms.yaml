  vnum: '990002902956'
- description: |-
    Esta loja está cheia de armas de todos os tipos. De fato não seria sábio
    chegar muito perto das paredes, pois o grande número de coisas afiadas nuas
    penduradas das prateleiras de madeira ali o despedaçariam se qualquer uma das
    estruturas delicadas desabasse. Pode ser uma boa ideia perguntar ao dono da
    loja por que ele não tem prateleiras de aparência mais resistente... Mas por
    outro lado, talvez ele as tenha frágeis por uma razão. Não há maneira de um
    ladrão conseguir pegar qualquer uma daquelas sem a máxima cautela. A porta
    aberta a oeste leva de volta ao Caminho do Mercado, enquanto Mithroq o minotauro
    fica atrás de um balcão ao leste, afiando uma espada gigante e parecendo pronto
    para ajudá-lo.
  exits:
    west:
      target_vnum: '990002902965'
  name: Instrumentos de Destruição de Mithroq
  vnum: '990002902957'
- description: |-
    Através da porta fantasiosamente esculpida que você escolheu entrar, você se
    encontra dentro de um quarto rico e bem iluminado. Você só pode entrar na menor
    parte dele, no entanto, com um grande balcão de madeira separando você e a
    pilha enorme de ouro que ocupa muito da outra metade do quarto. Um guarda fica
    atrás do balcão, preparado para problemas com sua mão descansando levemente no
    punho de sua espada. Há também um cavalheiro baixo e magro aqui em roupas de
    seda ricas, obviamente Milos, o Banqueiro de Porto. A porta ao sul leva de
    volta à Estrada Gaivota Sul.
  exits:
    south:
      target_vnum: '990002902989'
  name: Escritório de Milos, o Coletor de Impostos com Hobby Bancário
  vnum: '990002902958'
- description: |-
    Aqui a Caminhada do Rio se transforma em Caminho Arenoso. O riacho a oeste
    borbulha alegremente para o oceano, onde se junta com o resto da água. O som
    de ondas batendo contra rochas em algum lugar ao sul enche o ar, junto com os
    gritos de aves marinhas variadas. A brisa salgada sopra uma neblina fina e
    refrescante no seu rosto.
  exits:
    east:
      target_vnum: '990002902960'
    north:
      target_vnum: '990002902956'
    south:
      target_vnum: '990002902933'
  name: Quina da Caminhada do Rio e Caminho Arenoso
  vnum: '990002902959'
- description: |-
    Aqui as pedras cobertas de areia do Caminho Arenoso não estão muito lotadas.
    Aqueles que passam aqui ou se apressam em direção ao leste ou caminham
    tranquilamente para o sul. O som distante de ondas batendo contra rochas chega
    fracamente aos seus ouvidos. Ao sul há uma praia arenosa bela, e os gritos de
    crianças podem ser ouvidos misturados com os cries das gaivotas.
  exits:
    east:
      target_vnum: '990002902961'
    west:
      target_vnum: '990002902959'
  name: Caminho Arenoso
  vnum: '990002902960'
