- description: |-
    Esta cabana é bem pequena, mas parece muito confortável. Contra a parede leste
    três beliches estão empilhados um sobre o outro de tal forma a se encaixar, mas
    para dar a cada pessoa espaço suficiente para se deitar confortavelmente. Há um
    pequeno fogão contra a parede norte, suas brasas vermelhas iluminando o quarto.
    Uma rede pende sobre a única janela voltada para o sul e o Caminho Arenoso,
    servindo como cortina. Há uma lata de peixe, alimento básico principal de Porto,
    contra a parede oeste. O pequeno chão, o que não está coberto por um tapete, é
    terra varrida organizadamente.
  exits:
    south:
      target_vnum: '990002902963'
  name: A Cabana do Pescador
  vnum: '990002902981'
- description: |-
    Este não é exatamente o porão que as portas davam a entender que seria.
    Parece que o Senhor Degruziel não é exatamente popular com todos. O quarto está
    fracamente iluminado por um braseiro brilhante cheio de brasas vermelhas
    quentes. Há também uma vara de ferro quente no braseiro, e não parece muito
    amigável. Você pode mal distinguir uma prateleira de instrumentos de tortura
    reluzentes na parede distante, bem à esquerda da donzela de ferro. Alguns
    daqueles instrumentos fariam até mesmo os mais duros de coração e malignos do
    reino hesitar. Há uma porta de ferro pesada a oeste, com uma pequena fenda
    para olhar dentro para verificar os prisioneiros.
  exits:
    up:
      target_vnum: '990002902912'
    west:
      target_vnum: '990002902906'
  name: A Câmara de Tortura da Mansão
  vnum: '990002902982'
- description: |-
    Você entra na luz criada por muitos feixes queimando de tecido embebido em
    óleo, obviamente tochas improvisadas, que iluminam esta praça aberta. Pilhas
    de trapos imundos estão amontoadas contra as paredes, servindo como camas para
    aqueles sem casas. Há uma cadeira de madeira velha contra a 'parede' leste da
    praça. Ela pode ter sido magnífica uma vez, a praça, mas agora sua fonte uma
    vez bela é apenas uma poça estagnada incrustada de granito, e a própria praça
    está horrivelmente suja e em estado de abandono.
  exits:
    down:
      target_vnum: '990002902928'
    west:
      target_vnum: '990002902984'
  name: Praça da Luna
  vnum: '990002902983'
