    armeiro de Porto. Ele bate impacientemente os dedos no balcão enquanto espera
    que você lhe diga o que deseja dele.
  name: Aramut
  vnum: '990002902973'
- description: Um carroceiro está aqui, vasculhando na traseira de sua carroça.
