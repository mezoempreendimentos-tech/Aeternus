- description: Bahamut, o deus dos bons dragões está aqui, emitindo um celestial brilho.
  keywords:
  - Bahamut
  - dragao
  - platina
  long_desc: |-
    Você observa um magnífico dragão de platina com uma postura imponente e um
    brilho celestial.  Bahamut é um dos cinco filhos primogênitos de Yo, o
    senhor de toda a criação.  Ele foi o primeiro dragão metálico do mundo.
    Forjado com lava vulcânica, gases tóxicos e venenosos e fundido com pureza
    e honestidade.  Bahamut é o deus supremo e senhor de todos os bons dragões.
    No início dos tempos, após o nascimento dos cinco filhos primogênitos de Yo,
    Bahamut e Tiamat reproduziram, criando vários filhotes descendentes de
    variadas cores e tipos.  Bahamut reina triunfantemente em seu monumental e
    majestoso castelo flutuante.  Bahamut possui maravilhosas escamas
    branco-prateadas, suas asas possuem uma envergadura gigantesca e dois
    pequenos chifres em suas extremidades próximas a cabeça, um em cada asa e
    deles surgem brilhantes e surpreendentes raios que seguem para o chifre
    oposto.  Todos os dragões dourados são leais e fiéis a Bahamut, porém sete
    magníficos dragões dourados servem o glorioso Bahamut como reais
    conselheiros.
  name: Bahamut
  vnum: '990013813800'
- description: Um magnífico dragão negro metálico está aqui, olhando fixamente para
    você.
  keywords:
  - dragao
  - negro
  - platina
  - filho
  - metalico
  long_desc: |-
    Você observa o intrépido filho do celestial senhor dos dragões, Bahamut e da
    perversa e demoníaca Tiamat, a rainha dos dragões maléficos.  Em seu coração
    uma intensa batalha é eternamente travada.  A pureza e a honestidade do pai
    contra a perversidade e crueldade da mãe.  Você observa o musculoso corpo
    coberto por brilhantes escamas negras metálicas e os impetuosos olhos desta
    criatura que carrega um fardo tão pesado em seu coração.
  name: o magnífico dragão negro de platina
  vnum: '990013813801'
- description: Um dragão vermelho metálico está aqui, olhando para você com sarcasmo.
  keywords:
  - dragao
  - cobre
  - vermelho
  - metalico
  long_desc: |-
    Você observa um enorme dragão de cobre com magníficas asas e três grandes
    chifres na cabeça.  Suas escamas possuem uma beleza sublime.  Elas são
    vermelhas e possuem um brilho fantástico.  Seus ataques são bastante
    perigosos, entre eles a jorrada de ácido e a nuvem de gás.  Ao olhar mais
    uma vez para está gigantesca criatura, você percebe um sorriso sarcástico em
    seu rosto.
  name: um gigantesco dragão de cobre
  vnum: '990013813802'
- description: Um grande dragão de latão está aqui, filosofando sobre a sua prole.
  keywords:
  - dragao
  - latao
  long_desc: |-
    Você observa um magnífico dragão de lindas escamas metálicas.  Em sua cabeça
    você percebe uma imponente coroa de chifres.  Suas garras são enormes e
    resistentes, e com certeza seriam capazes de decapitar o maior dos gigantes.
    Seus hálitos de gases soníferos e de nuvens de calor, o tornam um oponente
    respeitável.
  name: um enorme dragão de latão
  vnum: '990013813803'
- description: Um majestoso dragão de escamas roxas está aqui, orando para Chronepsis.
  keywords:
  - dragao
  - pedra
  - ametista
  long_desc: |-
    Você observa um belo e monumental dragão de pedra ametista.  Suas escamas
    roxas são bastante resistentes e fortes, além de maravilhosas.  Você percebe
    um único chifres entre os olhos desta magnífica criatura.  Os dragões de
    pedra ametista são uma variedade dos maravilhosos dragões de gemas.
  name: um majestoso dragão de pedra ametista
  vnum: '990013813804'
- description: Um magnífico dragão de escamas azuis está aqui, protegendo seu território.
  keywords:
  - dragao
  - pedra
  - safira
  long_desc: |-
    Você observa um poderoso e magnífico dragão de pedra safira.  Seu corpo
    bastante musculoso é revestido por maravilhosas escamas azuis escuras.  Os
    dragões de pedra ametista preferem um acordo de paz ou um diálogo do que
    sangrentas batalhas.  São neutros em relação às lutas dos dragões perversos
    e dos bondosos e benévolos.  Contudo, ele é dono de um poderosíssimo e
    ensurdecedor ruído.  Os dragões de pedra safira são uma variedade dos belos
    dragões de gemas.
  name: um magnífico dragão de pedra safira
  vnum: '990013813805'
- description: Um belo dragão de escamas verdes está aqui, nervoso com a sua presença.
  keywords:
  - dragao
  - pedra
  - esmeralda
  long_desc: |-
    Você observa um belo dragão de pedra esmeralda.  Suas escamas verdes são
    tão belas quanto os mais lindos campos verdes do paraíso dos dragões de
    Vitália.  Os dragões de pedra esmeralda são paranóicos com a presença de
    estranhos em seu território.  Eles vivem preparando armadilhas e alarmes nas
    proximidades da sua toca.  Os dragões de pedra esmeralda são uma variedade
    dos magníficos dragões de gemas.
  name: um belo dragão de pedra esmeralda
  vnum: '990013813806'
- description: Um dragão de escamas amareladas está aqui, ferozmente olhando para
    você.
  keywords:
  - dragao
  - pedra
  - topazio
  long_desc: |-
    Você observa um imponente e maravilhoso dragão de pedra topázio.  Suas
    escamas amareladas são bastante resistentes e fortes.  Sobre sua cabeça você
    observa uma linda coroa amarelada de seis chifres enormes.  Os dragões de
    pedra topázio vivem isolados e não gostam de intrusos.  Eles não são cruéis
    e nem malévolos, porém pelo seu comportamento imprevisível são de difícil
    socialização com outras raças.  Sua mais poderosa arma é seu perigoso hálito
    da desidratação.
  name: um imponente dragão de pedra topázio
  vnum: '990013813807'
- description: Um sublime dragão de cristal está aqui, com sua beleza celestial.
  keywords:
  - dragao
  - cristal
  long_desc: |-
    Você observa uma das mais maravilhosas criaturas de Vitália.  O magnífico e
    formoso dragão de cristal.  Suas escamas são de uma beleza extraordinária.
    Brilham como as mais celestiais estrelas do universo.  O dragão de cristal é
    o mais amigável e social dos dragões de gemas.  Este poderoso dragão possui
    um dos hálitos mais temidos pelos seus inimigos:  O magnífico hálito de
    cacos de cristais brilhantes.
  name: um sublime dragão de cristal
  vnum: '990013813808'
- description: Um imponente dragão de ouro está aqui, servindo com sua lealdade a
    Bahamut.
  keywords:
  - dragao
  - ouro
  - guardiao
  long_desc: |-
    Você observa um gigantesco e poderosíssimo dragão de ouro.  Com imensas
    garras e belíssimos chifres.  Suas escamas douradas reluzem com o sol.  Este
    magnífico dragão de ouro é um dos sete dragões de alta lealdade que servem
    como guardas, companheiros e conselheiros de Bahamut.  Uma antiga lenda
    conta que Bahamut acostuma se disfarçar de um ermitão velho, acompanhado de
    sete canários que cantam docemente.  A lenda conta também que ele nunca
    teria sido descoberto neste disfarce se não fosse um grupo de ogros e trolls
    que tivessem pegado o ermitão para comer, para a infelicidade deles.
  name: um magnífico guardião do reino do céu
  vnum: '990013813809'
- description: Um impetuoso dragão aquático está aqui, exibindo sua maravilhosa beleza.
  keywords:
  - dragao
  - aquatico
  long_desc: |-
    Você observa um belíssimo dragão de escamas azul escuras que emitem um belo
    brilho.  Seu corpo é bastante semelhante ao de uma serpente gigante, porém
    ele possui fortes e resistentes patas.  Você observa a ausência de chifres e
    de garras nesta linda criatura, contudo sua boca esconde enormes dentes
    afiados.  O dragão aquático possui um poderosíssimo sonar capaz de causar
    danos eternos a audição de seus inimigos.
  name: um impetuoso dragão aquático
  vnum: '990013813810'
- description: Um velho ermitão está aqui, acompanhado por sete belos canários dourados.
  keywords:
  - ermitao
  - dragao
  - bahamut
  long_desc: |-
    Você observa um simples e velho ermitão acompanhado por sete canários
    dourados que cantam doces melodias.  Em seu rosto você observa as marcas
    deixadas pelo tempo e um olhar encantador.
  name: um velho ermitão
  vnum: '990013813811'
- description: Um filhote de dragão está aqui, observando atentamente os passos da
    mãe.
  keywords:
  - filhote
  - dragao
  long_desc: |-
    Você observa um pequenino filhote de dragão com dois pequenos chifres e
    pequeninas garras afiadas, olhando atentamente os passos da mãe e brincando
    com os outros alegres filhotes.
  name: um filhote de dragão
  vnum: '990013813812'
- description: Chronepsis, o dragão mudo do destino, morte e julgamento está aqui.
  keywords:
  - chronepsis
  - dragao
  long_desc: |-
    Você observa o majestoso Chronepsis, o dragão mudo do destino, morte e
    julgamento.  Chronepsis conhece o destino de todas as criaturas, desde seu
    nascimento até o fim dos seus dias, contudo guarda esse conhecimento com o
    mais absoluto silêncio e neutralidade.  Chronepsis é o mais velho dos cinco
    filhos primogênitos de Yo e é respeitado por todos os dragões.
  name: Chronepsis
  vnum: '990013813813'
- description: Aasterinian, a mensageira alada de Yo está aqui.
  keywords:
  - Aasterinian
  - dragao
  long_desc: |-
    Você observa a magnífica Aasterinian, a mensageira alada do glorioso Yo.
    Aasterinian é uma dos cinco filhos primogênitos de Yo.  É bastante cultuada
    e adorada pelos dragões de cobre e de latão.
  name: Aasterinian
  vnum: '990013813814'
- description: Faluzure, o dragão da noite está aqui, reinando entre os morto-vivos.
  keywords:
  - faluzure
  - dragao
  long_desc: |-
    Você observa o terrível dragão da noite que reina entre os morto-vivos e os
    caídos, Faluzure.  Um dos cinco filhos primogênitos de Yo.  Faluzure odeia
    todos os seus irmãos e principalmente Yo.  Ele está sempre envolvido nas
    paixões do mundo mortal, manipulando-o, por causa de sua necessidade de se
    alimentar constantemente da morte e decadência das outras criaturas.  Apenas
    os mais desajustados dos dragões do mal seguem Faluzure, a maioria
    dracoliches ou com ambição de se tornar um.
  name: Faluzure
  vnum: '990013813815'
- description: Um belíssimo dragão vermelho está aqui, com um belo olhar penetrante.
  keywords:
  - dragao
  - vermelho
  - diamante
  long_desc: |-
    Você observa um maravilhoso dragão de escamas pequenas e com um majestoso
    chifre de rubi e esmeralda.  Seus olhos azuis e sua sublime beleza, fazem
    dos raros dragões de diamante vermelho, com certeza uma das mais magníficas
    e esplendorosas famílias do arquipélago de Yo.  Os dragões de diamante
    vermelho são sábios, justos, benevolentes e amáveis.  Semeiam a honra e não
    podem de forma alguma matar ou machucar humanos, ou criaturas pequenas em
    relação ao seu tamanho normal.  Quando essa lei é quebrada, esses dragões
    cometem suicídio ou o chamado "Tunadyon", que na língua desses dragões
    mágicos, quer dizer "eutanásia":  Eles retiram seu próprio chifre.
  name: um magnífico dragão de diamante vermelho
  vnum: '990013813816'
- description: Um estranho elfo negro está aqui, caminhando lentamente.
  keywords:
  - dragao
  - profundezas
  - elfo
  - negro
  long_desc: |-
    Você observa um estranho elfo negro caminhando lentamente com um olhar
    misterioso.  Sobre a sua pele você observa inúmeros símbolos negros e
    vermelhos.
  name: um dragão das profundezas
  vnum: '990013813817'
- description: Uma misteriosa sombra move-se em sua direção.
  keywords:
  - dragao
  - sombras
  long_desc: |-
    Você observa uma imensa sombra movendo-se na sua direção...De repente você
    percebe a presença de um gigantesco dragão com pequenas escamas semelhantes
    a grandes pedras ônix, de brilho opaco, e um negro misterioso.
  name: um dragão das sombras
  vnum: '990013813818'
- description: Yo, o celestial senhor dos dragões está aqui, protegendo seus filhos.
  keywords:
  - Yo
  - dragao
  - criador
  long_desc: |-
    Você observa Yo, o celestial dragão da criação.  Pai dos cinco primeiros
    dragões:  Bahamut, Tiamat, Faluzure, Chronipses e Aasterinian.  Yo é
    conhecido por sua bondade, pureza e benevolência.  Yo derramou seu próprio
    sangue para acabar com a primeira guerra dracônica, onde todas as raças de
    dragões estavam espalhados pelo mundo atacando uns aos outros.
  name: Yo
  vnum: '990013813819'
- description: Uma terrível horda de dracoliches marcha em sua direção.
  keywords:
  - horda
  - dracoliches
  long_desc: |-
    Você observa uma horda horripilante de dracoliches, seguidores do terrível
    Faluzure, o dragão da noite.  Seus ossos brilham protegidos pela maléfica
    magia negra de Faluzure e seus olhos emitem raios vermelhos que destroem e
    queimam qualquer coisa que possua vida.  A horda de dracoliches é temida até
    pelos mais poderosos dragonslayers.
  name: uma assustadora horda de dracoliches
  vnum: '990013813820'
- description: Um lindo pássaro está aqui, cantando sem parar belas melodias.
  keywords:
  - passaro
  long_desc: |-
    Você observa um maravilhoso pássaro de penas coloridas que emitem um brilho
    intenso e magnífico.
  name: um lindo pássaro
  vnum: '990013813821'
