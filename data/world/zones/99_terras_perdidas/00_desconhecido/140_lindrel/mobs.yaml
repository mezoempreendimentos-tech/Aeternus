- description: Uma bela fada parece envolver você em sua fascinante aura negra.
  keywords:
  - ellora
  - fada
  - rainha
  - negra
  long_desc: |-
    Ellora, junto com sua irmã gêmea Eldora, é a rainha das fadas que habitam
    esse lugar.  Ela é bem maior que as fadas comuns, tendo mais ou menos sua
    altura.  Suas grandes asas de borboleta, negras com detalhes violáceos,
    batem emitindo uma suave música e espalhando um fino pó negro-perolado.  Os
    longos cabelos, da cor da noite, caem nas costas da rainha como uma cascata
    negra que quase toca o chão, emoldurando um par de grandes olhos verdes.
    Ela é conhecida como a Fada Negra, de misteriosa e acolhedora beleza
    noturna.
  name: Ellora, a fada rainha
  vnum: '990014014000'
- description: Você se sente fascinado pela aura branca de uma bela fada.
  keywords:
  - eldora
  - fada
  - rainha
  - branca
  long_desc: |-
    Eldora, com sua irmã gêmea Ellora, é a rainha das fadas de Lindrel.  Ela tem
    quase sua altura, sendo maior que a maioria das fadas.  Um par de grandes
    asas de borboleta, alvas com pequenos desenhos em azul, batem
    incessantemente, parecendo tocar uma cristalina música e espalhar um claro
    pó madrepérola.  Seus cabelos, tão longos que quase tocam o chão, são de
    radiante dourado, moldura perfeita para seus grandes olhos escuros de
    estranho brilho púrpura.  Aqui, Eldora também é conhecida como a Fada
    Branca, bela e suave como o cair de um floco de neve.
  name: Eldora, a fada rainha
  vnum: '990014014001'
- description: Uma pequena fada voa alegremente por entre as carteiras.
  keywords:
  - margarida
  - fada
  - pequena
  long_desc: |-
    A pequena Margarida é uma fada bastante jovem e alegre.  Suas pequenas asas
    de borboleta, amarelas com desenhos vermelhos, batem rapidamente, espalhando
    uma fina poeira brilhante onde quer que passe.  No momento, ela prepara a sua
    próxima aula.
  name: Margarida
  vnum: '990014014002'
- description: Uma fada de ar sério voa pela classe, tentando arrumar a bagunça.
  keywords:
  - violeta
  - fada
  - seria
  long_desc: |-
    Violeta é uma fada bastante séria.  Ela é a professora de cúlinária,
    considerada uma arte pelos habitantes de Lindrel.  A última aula deve ter
    sido um desastre, pois até ela, que anda sempre impecavelmente arrumada,
    está com os restos da aula sobre a roupa.
  name: Violeta
  vnum: '990014014003'
- description: Uma veloz fada de asas azuis voa em sua direção.
  keywords:
  - alamanda
  - fada
  - veloz
  long_desc: |-
    A ligeira Alamanda vê tudo: seus olhos argutos não perdem nada do que
    acontece por aqui...  Por adorar novidades (incluindo fofocas e afins),
    Alamanda vive atrás de grandes acontecimentos.  Talvez você seja algo do
    tipo, não acha?
  name: Alamanda
  vnum: '990014014004'
- description: Uma delicada fada canta para os bebês.
  keywords:
  - acacia
  - delicada
  - fada
  long_desc: |-
    Acácia é uma fada bastante miúda e delicada.  Uma de suas funções, que é a
    que mais gosta, é a de cuidar das flores mais jovens, contando-lhes
    histórias e ensinando as coisas que toda flor deve saber.  A pequena fada
    parece bastante preocupada pois você, um ser bastante barulhento, acordou
    uma das "crianças".
  name: Acácia
  vnum: '990014014005'
- description: Uma fada passa borboleteando por aqui, enquanto procura alguns pincéis.
  keywords:
  - malva
  - fada
  long_desc: |-
    Malva, a professora de artes, adora a cor rosa.  Tudo que ela usa é rosa, e
    tudo que ela pode transformar em rosa, ela transforma.  Ela é um tanto
    amalucada, mas isso a faz ser muito querida por aqui.  Cuidado para ela
    não fazê-lo virar alguma coisa... rosa.
  name: Malva
  vnum: '990014014006'
- description: Uma rabugenta fada coleta néctar de algumas flores.
  keywords:
  - azaleia
  - fada
  long_desc: |-
    Azaléia é uma fada já bem idosa.  Apesar das fadas não envelhecerem, ela
    escolheu aparentar a idade que tem pois ela descobriu que assim possui ainda
    mais regalias.  Não que ela seja interesseira, mas ela é muito prática e
    eficiente: ninguém é tão boa na coleta de néctar como ela.
  name: Azaléia
  vnum: '990014014007'
- description: Um jovem duende assovia enquanto por aqui caminha.
  keywords:
  - hibisco
  - duende
  - jovem
  long_desc: "Você pensava que os duendes não eram nada bonitos, mas Hibisco prova\
    \ o\ncontrário: o jovem duende é um belo rapaz que contagia tudo por onde passa\n\
    com seu jovial assoviar. As jovens fadinhas o vêem e dão pequenas risadinhas,\n\
    fazendo com que o duende fique encabulado. Ã\x89 sempre assim..."
  name: Hibisco
  vnum: '990014014008'
- description: Um agitado duende parece não gostar de ver um forasteiro aqui...
  keywords:
  - lirio
  - duende
  - agitado
  long_desc: |-
    Lírio é, em Lindrel, o que chamaríamos de soldado perfeito.  Alto (para um
    duende), robusto e ágil, ele é um excelente guerreiro, ocupando o posto de
    principal guardião da entrada para o pequeno reino. Não faça nada de errado
    aqui, ou Lírio terá de agir...
  name: Lírio de Lindrel
  vnum: '990014014009'
- description: Um duende de aparência idosa e bonachona o cumprimenta.
  keywords:
  - absinto
  - bonachao
  - duende
  - saltitante
  long_desc: |-
    Absinto já é um senhor de bastante idade, mas não perde a jovialidade.
    Boatos dizem que ele tem um fraco por qualquer tipo de bebida, mas você sabe
    como são esses boatos...  De qualquer forma, você simpatizou muito com esse
    gentil velhinho de rosto rosado e barba longa, que é o dono da aconchegante
    taverna O Velho Carvalho.
  name: Absinto
  vnum: '990014014010'
- description: Uma fada-bebê olha para você com curiosidade.
  keywords:
  - dalia
  - fada
  - bebe
  - fada-bebe
  long_desc: |-
    Dália é uma criaturinha adorável.  Do tamanho de seu dedo mínimo, ela é um
    bebêzinho sorridente e esperto.  Suas asinhas, ainda muito frágeis, são de
    um rosa claro, com algumas partes mais escuras.  Quando crescer, será uma
    bela fada.
  name: Dália
  vnum: '990014014011'
- description: Um duende passa distraidamente por você.
  keywords:
  - cipreste
  - duende
  long_desc: |-
    O jovem Cipreste está compenetradíssimo na leitura de um pergaminho, não
    dando atenção a nada que ocorra a seu redor.  Ele não parece ser perigoso,
    sendo um duende muito magro e alto, mas possui uma mente que pode
    surpreender.
  name: Cipreste
  vnum: '990014014012'
- description: Um duendinho de feições travessas parece curioso a seu respeito.
  keywords:
  - freixo
  - duendinho
  long_desc: |-
    Freixo é uma criança apenas, mas vive fazendo travessuras que até os mais
    velhos duvidam.  Ele não faz maldades, sempre sendo motivo de boas risadas
    por parte dos mais velhos.  No momento, parece que ele fugiu da aula, mas
    encontrou tempo para sondar a seu respeito.
  name: Freixo
  vnum: '990014014013'
- description: Uma fada concentra-se ao máximo em mexer alguns caldeirões.
  keywords:
  - papoula
  - fada
  long_desc: |-
    Papoula é, há muitos anos, a responsável pela fabricação de poções em
    Lindrel.  Ela vive mergulhada em pós mágicos, seivas encantadas e ervas
    raras, estando sempre um pouco descabelada e com as asas em desordem.  Ah,
    ela também é ótima em consertar varinhas.
  name: Papoula
  vnum: '990014014014'
- description: Uma preguiçosa fada tira um cochilo em cima de uma flor.
  keywords:
  - lilas
  - fada
  long_desc: |-
    Lilás é uma fada desleixada e preguiçosa.  Suas professoras tentam fazer com
    que ela fique mais tempo acordada, mas parece que tudo o que ela gosta de
    fazer é mesmo dormir e comer.  Apesar disso, ela possui um grande coração, o
    que compensa sua falta de juízo.
  name: Lilás
  vnum: '990014014015'
- description: Um duende mal-humorado conserta a cerca de sua casa.
  keywords:
  - arando
  - duende
  - mal-humorado
  long_desc: |-
    Não fale muito com ele: alguém muito mal-educado quebrou a cerca de sua casa
    e não teve coragem nem de pedir desculpas.
  name: Arando
  vnum: '990014014016'
- description: Um duende trovador tange sua lira enquanto canta docemente.
  keywords:
  - alamo
  - duende
  - trovador
  long_desc: "Um louÃ§Ã£o trovador de voz cativante: esse Ã© Ã\x81lamo. A mÃºsica\
    \ que\nescapa de sua lira é bela e alegre, combinando com o lugar pacífico que\n\
    Lindrel é.  Fadas e duendes costumam sentar-se ao seu redor para dançar,\ncantar\
    \ ou apenas ouví-lo, o que sempre termina em festa.  Você parece ter,\nestranhamente,\
    \ se revigorado enquanto ouvia o ensaio do duende."
  name: "Ã\x81lamo"
  vnum: '990014014017'
- description: Uma das fadas anciãs espera para falar com as rainhas.
  keywords:
  - primula
  - fada
  - ancia
  long_desc: |-
    Prímula é uma das mais velhas fadas de Lindrel.  Ela já viajou muito por
    esse mundo, tendo conhecido as mais diversas pessoas e vivido grandes
    aventuras.  Muito querida pelas rainhas, que a viram nascer, essa fada de
    grandes asas vermelhas no momento espera para tratar de importantes assuntos
    com as soberanas.
  name: Prímula
  vnum: '990014014018'
- description: Um apressado duende parece trazer boas notícias às rainhas.
  keywords:
  - cedro
  - duende
  - apressado
  long_desc: |-
    Cedro é uma espécie de ministro das relações exteriores de Lindrel.  Junto a
    Prímula, sua amiga de longa data, ele viaja por toda Vitália mantendo
    contato com os amigos do pequeno reino encantado.  Tendo acabado de voltar
    de viagem, o velho duende traz boas notícias a respeito do mundo exterior
    para as guardiãs daqui.
  name: Cedro
  vnum: '990014014019'
- description: Uma rosa-bebê dorme tranqüilamente.
  keywords:
  - rosa-bebe
  - rosa
  - bebe
  long_desc: A pequena rosa está dormindo... não faça barulho.
  name: uma rosa-bebê
  vnum: '990014014020'
- description: Uma joaninha adoidada esvoaça sobre uma flor.
  keywords:
  - joaninha
  - adoidada
  long_desc: |-
    A adoidada joaninha bate suas asas vermelhas pintadas de negro,
    preparando-se para pousar sobre uma flor, realizando manobras aéreas
    que podem ser consideradas bem "radicais". Ainda bem que ela está
    com equipamento de segurança...
  name: uma joaninha
  vnum: '990014014021'
- description: Um botão de tulipa chora copiosamente.
  keywords:
  - botao
  - tulipa
  long_desc: O pequeno botão parece estar com fome.
  name: um botão de tulipa
  vnum: '990014014022'
- description: Um jovem duende, por trás do balcão, sorri para você.
  keywords:
  - jovem
  - duende
  - abeto
  long_desc: |-
    O jovem Abeto, neto do velho Absinto, é um duende bastante alto e forte.
    Ele auxilia seu avô no balcão quase sempre, sendo requisitado também nos
    serviços mais pesados da taverna.  Muito simpático, ele pergunta o que você
    deseja beber.
  name: Abeto
  vnum: '990014014023'
- description: Uma borboleta alaranjada voa sobre sua cabeça.
  keywords:
  - borboleta
  - alaranjada
  long_desc: A pequena borboleta parece ter gostado de você.
  name: uma borboleta alaranjada
  vnum: '990014014024'
- description: Uma pequena coruja branca dorme pousada numa espécie de balanço.
  keywords:
  - coruja
  - branca
  long_desc: |-
    A pequena coruja parece estar cansada demais para dar-lhe atenção.  Deixe-a
    dormir na paz de seu lar.
  name: uma pequena coruja branca
  vnum: '990014014025'
- description: Uma pequena lagarta come algumas folhas com muito apetite.
  keywords:
  - lagarta
  - pequena
  long_desc: |-
    Ela é feia, muito feia... Porém, seu jeito sorridente e gentil
    (ela lhe ofereceu um pouco de sua comida) faz com que você já imagine
    a linda borboleta que ela será.
  name: a pequena lagarta
  vnum: '990014014026'
- description: Uma falante flor branca desata a contar-lhe fofocas.
  keywords:
  - maria-sem-vergonha
  - flor
  - falante
  long_desc: |-
    Ela adora saber tudo da vida de todos, não importando como. Se você
    quer saber de alguma coisa de alguém, pergunte a ela. Como ela mesma diz:
    ela sempre tem algum "babado forte" para contar.
  name: a maria-sem-vergonha
  vnum: '990014014027'
- description: Um jovem crisântemo sorri para você.
  keywords:
  - crisantemo
  - jovem
  long_desc: |-
    O jovem crisântemo espera que você esteja gostando de sua estadia em Lindrel.
    Ele o lembra de que aqui, um lugar sempre muito tranqüilo, confusão não é
    bem-vista.
  name: um jovem crisântemo
  vnum: '990014014028'
- description: Uma cigarra de ar preguiçoso parece incomodada com sua presença.
  keywords:
  - cigarra
  - preguicosa
  long_desc: |-
    A pequena cigarra estava tirando um cochilo, mas o barulho que você faz ao
    andar por aí a acordou.  Que falta de respeito..
  name: uma cigarra preguiçosa
  vnum: '990014014029'
- description: Um duende de roupas coloridas procura algo no jardim.
  keywords:
  - azevinho
  - duende
  long_desc: |-
    Azevinho é o jovem auxiliar de Papoula do preparo de poções e manutenção de
    varinhas.  Ele parece procurar algum importante ingrediente no jardim, não
    dando muito atenção para sua chegada.
  name: Azevinho
  vnum: '990014014030'
- description: Um simpático duende oferece flores para você comprar.
  keywords:
  - simpatico
  - geranio
  - duende
  long_desc: |-
    Nem velho, nem moço, Gerânio é um duende bastante sorridente, de olhos
    brilhantes e bochechas rosadas. Ele passa boa parte de seu dia colhendo flores,
    fazendo arranjos e vendendo-os em sua barraca. Que tal comprar uma flor?
  name: Gerânio
  vnum: '990014014031'
- description: Um duende desengonçado parece consertar um dos postes.
  keywords:
  - girassol
  - duende
  - desengonçado
  long_desc: |-
    Girassol é o responsável pela iluminação de Lindrel.  Ele treina os
    vaga-lumes e, caso alguma coisa aconteça com algum dos postes, providencia
    novas esferas ou colunas de madeira.  Parece que de tanto mexer com isso, o
    próprio Girassol brilha no escuro.
  name: Girassol
  vnum: '990014014032'
- description: Uma fada gordinha e sorridente mostra as guloseimas que tem para vender.
  keywords:
  - framboesa
  - gordinha
  - sorridente
  - fada
  long_desc: "Framboesa adora cozinhar e o faz muito bem.  Seus bolos e tortas são\n\
    renomados, tanto pela bela aparência quanto pelo sabor.  Aliás, a fada já\nestÃ¡\
    \ trazendo diversos bolos para vocÃª escolher.  Ã\x89, nÃ£o vai ter jeito..."
  name: Framboesa
  vnum: '990014014033'
- description: Uma fada de ar distraído passa por você.
  keywords:
  - camomila
  - fada
  long_desc: Ela está distraída demais.
  name: Camomila
  vnum: '990014014034'
- description: Um duende já idoso caminha pela sala, ditando algo que você não entende.
  keywords:
  - laricio
  - duende
  long_desc: |-
    Larício é um duende já idoso, sendo completamente careca e tendo um enorme
    bigode escondendo grande parte do rosto e pescoço.  Ele coça o bigode e
    caminha de um lado para o outro enquanto dita para sua ajudante o que parece
    ser algumas fórmulas de magias.  Você, é claro, não conseguiu entender nada
    de útil.
  name: Larício
  vnum: '990014014035'
- description: Um duende está aqui.
  keywords:
  - trevo
  - duende
  long_desc: Não está pronto.
  name: Trevo
  vnum: '990014014036'
