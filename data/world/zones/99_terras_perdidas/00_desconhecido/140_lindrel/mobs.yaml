- description: Uma fada anota tudo que Larício está ditando.
  keywords:
  - calendula
  - fada
  long_desc: |-
    Calêndula, a ajudante de Larício, é uma jovem fada que se interessa muito
    pela confecção de pergaminhos mágicos.  Uma de suas principais tarefas é
    anotar as fórmulas que Larício cria, o que a ajuda a aprender sobre o
    ofício.  Ela foi praticamente adotada pelo duende, que vê muito potencial
    em sua magia.
  name: Calêndula
  vnum: '990014014038'
