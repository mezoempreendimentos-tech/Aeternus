    bebidas provenientes dos quatro cantos do mundo. Há algumas de lugares que
    você não sabia nem que existia!
    Se não for beber nada, a entrada da taverna fica a oeste.
  exits:
    west:
      target_vnum: '990014014010'
  name: O Balcão de Bebidas
  vnum: '990014014011'
- description: "Você está em uma parte mais elevada da taverna por onde se chega através\n\
