    west:
      target_vnum: '990024424480'
  name: O Desafio de Vitália
  vnum: '990024424481'
- description: |-
    Subitamente o caminho sobre o pântano se fecha nas direções leste e sul.
    Uma trilha para o norte (um tanto mais seca poderíamos dizer) parece levar a
    um castelo que você não consegue ver com detalhes deste ponto.
  exits:
    north:
      target_vnum: '990024424483'
    west:
      target_vnum: '990024424481'
  name: O Desafio de Vitália
  vnum: '990024424482'
- description: |-
    O Castelo ao norte se torna mais visível neste ponto e você pode
    contemplar toda sua beleza.  As árvores balançam e uma brisa fresca toca seu
    rosto fazendo você se sentir muito bem.  Seu propósitos nestas terras
    longínquas, entretanto não permite muito descanso e você se prepara para o
    desafio.  O castelo está logo ao norte.
  exits:
    north:
      target_vnum: '990024424484'
    south:
      target_vnum: '990024424482'
  name: O Desafio de Vitália
  vnum: '990024424483'
- description: |-
