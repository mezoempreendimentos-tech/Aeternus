    prosseguir você agradece aos deuses e olha atentamente para todas as
    direções para ver se encontra algo (ou alguém talvez?)
  exits:
    south:
      target_vnum: '990024424492'
    west:
      target_vnum: '990024424490'
  name: O Desafio de Vitália
  vnum: '990024424491'
- description: |-
    A descida segue suave para o sul e logo ao norte uma curva muito perigosa
    ainda pode ser vista.  Você por um momento pensa aonde este caminho irá
    chegar mas isto é algo que infelizmente não é possível prever.
  exits:
    north:
      target_vnum: '990024424491'
    south:
      target_vnum: '990024424493'
  name: O Desafio de Vitália
  vnum: '990024424492'
- description: |-
