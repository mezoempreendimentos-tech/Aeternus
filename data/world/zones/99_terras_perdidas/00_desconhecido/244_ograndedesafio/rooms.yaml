    sensações invadem sua mente e você não consegue prever ao certo o que
    acontecerá daqui por diante.  Algumas árvores cobrem um pouco da luz mas o
    caminho ainda sim é iluminado o bastante.  A terra fofa mostra algumas
    pegadas suas e de outros aventureiros.  Você se movimenta com cuidado pois
    qualquer passo em falso pode ser fatal.
