    entrada daqui.  Você precisa contornar a parede que segue para o norte para
    chegar até ela.
  exits:
    north:
      target_vnum: '990024424407'
    south:
      target_vnum: '990024424483'
  name: O Desafio de Vitália
  vnum: '990024424484'
- description: |-
    Você fez sua escolha e aqui inicia a sua longa jornada rumo ao
    desconhecido.  Este lugar é realmente mágico e você nota um grande poder
    emanando de todos os lados.  Um caminho estreito subindo a encosta da colina
    logo ao se abre para o norte e você parece ouvir um estranho som vindo
    desta direção.  Você verifica seus mantimentos, prepara seu coração para
    grandes emoções e, antes de seguir, faz suas últimas orações.
  exits:
    north:
      target_vnum: '990024424486'
  name: O Desafio de Vitália
  vnum: '990024424485'
- description: |-
    Você inicia sua jornada pela encosta de uma colina íngreme.  O caminho
    estreito segue para o norte e você pode ver que sua subida logo ficará mais
    difícil e cansativa.  O chão é pedregoso e você nota algumas pegadas que
    misturam-se com as suas.
  exits:
    north:
      target_vnum: '990024424487'
    south:
      target_vnum: '990024424475'
  name: O Desafio de Vitália
  vnum: '990024424486'
- description: |-
    A subida parece realmente difícil para o norte mas você não desanima.
    Todo cuidado é pouco e você olha ao seu redor procurando um possível
    oponente.
  exits:
    north:
      target_vnum: '990024424488'
    south:
      target_vnum: '990024424486'
  name: O Desafio de Vitália
  vnum: '990024424487'
- description: |-
    O caminho subitamente muda de direção indo agora para o leste em uma
    subida cada vez mais difícil.  Você hesita um pouco antes de continuar mas
    seus objetivos estão muito claros em sua cabeça e você se sente encorajado a
    seguir nesta direção.  Você ainda poderia voltar e recomeçar sua jornada
    indo para o sul.
  exits:
    east:
      target_vnum: '990024424489'
    south:
      target_vnum: '990024424487'
  name: O Desafio de Vitália
  vnum: '990024424488'
- description: |-
    Finalmente você chega ao cume desta enorme colina e a partir de agora sua
    movimentação é menos pesarosa.  O chão remexido mostra que muitos já
    passaram por aqui e você se sente um pouco..  Atrasado.  Redobrando a
    atenção você verifica se não há aventureiro a sua espreita e toma um bom
    fôlego para continuar sua jornada.
  exits:
    east:
      target_vnum: '990024424490'
    west:
      target_vnum: '990024424488'
  name: O Desafio de Vitália
  vnum: '990024424489'
- description: |-
    A descida é íngreme e você caminha com cuidado, já que qualquer erro pode
    ser fatal.  O caminho segue para o leste.  Neste ponto alguma vegetação pode
    ser vista e um cheiro de mato invade suas narinas.
  exits:
    east:
      target_vnum: '990024424491'
    west:
      target_vnum: '990024424489'
  name: O Desafio de Vitália
  vnum: '990024424490'
- description: |-
