- description: Uma linda donzela de pele carmesim canta sobre as águas douradas.
  keywords:
  - ushas
  - alvorada
  - donzela
  long_desc: |-
    Ushas, a Sempre-Jovem, é a Alvorada que canta e dança embelezando esse reino
    celeste.  Sua pele é carmesim, como os céus do raiar do dia e seus cabelos
    azuis como o céu em plena luz.  De gestos muito graciosos, Ushas dança
    enquanto canta, convidando-o a ficar ali e apreciar o espetáculo de sua
    fonte de luz.  Cuidado, pois uma vez enfeitiçado por Ushas, sempre seu
    escravo.
  name: Ushas, a Alvorada
  vnum: '990011611600'
- description: Uma graciosa menina de rosto radiante protege essas escadarias.
  keywords:
  - marut
  - menina
  - graciosa
  - radiante
  long_desc: |-
    A bela menina, de pele azul como os céus e rosto radiante como as estrelas,
    faz parte da extensa corte que reside em Svarga.  Junto com seus 48 irmãos,
    ela auxilia Lorde Indra na condução de seu terrítorio.  Seus longos cabelos
    negros estão presos em uma grande trança e enfeitados com diversas pedras
    preciosas.  Apesar de sua aparência de indefesa menina, ela é muito mais
    velha que as vidas de vários anciões unidas, sabendo muito bem se defender.
  name: uma Marut
  vnum: '990011611601'
- description: Uma pequena ave parece o seguir, espionando.
  keywords:
  - rouxinol
  - espiao
  - pequena
  - ave
  long_desc: |-
    O pequeno rouxinol parece ter sido mandado aqui para saber quem é o intruso
    que encontrou a entrada de Svarga. Ele parece bastante inofensivo.
  name: um rouxinol espião
  vnum: '990011611602'
- description: Um pequeno peixe dourado nada em sua direção.
  keywords:
  - peixe
  - peixinho
  - pequeno
  - dourado
  long_desc: |-
    O pequeno peixe parece ter vindo da parte mais larga do regato, onde suas
    dimensões já são de um verdadeiro rio.  Provavelmente ele ficou curioso com
    sua presença, coisa que não acontece normalmente com peixes (pelo menos os
    que você conhece).
  name: um peixinho dourado
  vnum: '990011611603'
- description: Um estranho ser de vento tenta derrubar você.
  keywords:
  - yakshini
  - vento
  - ser
  - estranho
  - demonio
  long_desc: |-
    Essa yakshini, feita de vento, parece ter sido mandada para atrapalhar sua
    vida.  Seu corpo é estranhamente feito de vento, sendo que sua aproximação
    dá-lhe a mesma sensação de quando se corre contra uma ventania.  Você a vê
    como sendo um pequeno tornado negro, com dois pequenos olhos brilhantes em
    seu centro.
  name: uma yakshini de vento
  vnum: '990011611604'
- description: O cozinheiro chefe está supervisionando um dos fogões, apreensivo.
  keywords:
  - cozinheiro
  - chefe
  long_desc: |-
    O cozinheiro-chefe é um senhor que não só pratica a arte de cozinhar, como
    também a de saborear...  Ele, como em todo dia de festa, está bastante
    compenetrado em seus afazares, caprichando o máximo que pode na comida feita
    com carinho.
  name: o cozinheiro-chefe
  vnum: '990011611605'
- description: Uma serviçal atende alguns convidados.
  keywords:
  - servical
  long_desc: |-
    Sempre sorridente, essa serviçal atende a todos os convidados que precisarem
    de sua ajuda. Afinal, ela é paga para isso...
  name: uma serviçal
  vnum: '990011611606'
- description: Um belo menino de pele azulada protege essas escadarias.
  keywords:
  - marut
  - menino
  - belo
  - azulada
  long_desc: |-
    Esse menino é um dos famosos 49 Maruts que auxiliam Indra em seus afazeres.
    Sua pele parece imitar o tom dos céus, podendo passar do mais profundo
    negror ao mais radiante vermelho.  Longos cabelos negros tentam esconder um
    par de olhos brilhantes como estrelas.  Cuidado com ele...  Lembre-se que nem
    sempre os rostos mais inocentes são os mais indefesos.
  name: um Marut
  vnum: '990011611608'
- description: Um monstruoso naga dourado se ergue das águas do rio de ouro, ameaçando-o
    com sua arma.
  keywords:
  - kanakajja
  - naga
  - dourado
  - lotus
  - ouro
  long_desc: |-
    Kanakajja, ou Lótus de Ouro, é um naga extremamente grande e musculoso.  Sua
    pele é inteira dourada, não havendo sequer uma listra de outra cor.  Apenas
    seus olhos não são como ouro, sendo, na verdade, completa e assustadoramente
    negros.  Você não tem idéia do motivo que leva esse imenso naga a não
    deixá-lo prosseguir, mas pensa que talvez seja melhor não contrariá-lo...
  name: Kanakajja
  vnum: '990011611609'
- description: Um atento Marut tenta impedir que você acompanhe o filete.
  keywords:
  - nidharta
  - marut
  - atento
  long_desc: |-
    Nidharta, um dos 49 Maruts, todos filhos de Diti, leva muito a sério sua
    tarefa de auxiliar Indra.  Ele tenta de todas as maneiras impedir que você
    chegue até o que há no fim do muro.  Cuidado, Maruts sabem ser mortais...
  name: Nidharta
  vnum: '990011611610'
- description: Um Marut guarda impassivelmente os portões do palácio.
  keywords:
  - idrksa
  - marut
  - guarda
  long_desc: |-
    Idrksa percebe que você o está olhando e lentamente abre seus olhos.  Você
    fica quase cego com o brilho deles, o que faz o sério Idrksa dar uma
    repentina gargalhada.  Ele parece não considerá-lo uma ameaça pois novamente
    assume sua impassível posição, de olhos cerrados.
  name: Idrksa
  vnum: '990011611611'
- description: Um entediado Marut guarda os portões do palácio.
  keywords:
  - adrksa
  - marut
  - guarda
  long_desc: |-
    Adrksa parece profundamente entediado.  Bocejando constantemente, ele tenta
    se distrair exercitando alguns golpes com sua arma.  Cuidado para não chamar
    muito a atenção dele: não será nada bom se você for escolhido para
    "ajudá-lo" em seus exercícios...
  name: Adrksa
  vnum: '990011611612'
- description: A estátua de uma menina dançando parece tentar impedir que você saia
    daqui.
  keywords:
  - menina
  - estatua
  - jyoti
  - marut
  long_desc: |-
    A estátua da pequena Marut graciosamente executa os passos de uma antiga
    dança.  Você fica extremamente surpreso com o espetáculo, principalmente
    porque essa não é Jyoti, e sim uma estátua dela.  As estátuas desse lugar
    parecem todas enfeitiçadas...
  name: a estátua de Jyoti
  vnum: '990011611613'
- description: A estátua de um jovem herói exercita suas habilidades com armas.
  keywords:
  - jovem
  - heroi
  - rama
  - estatua
  long_desc: |-
    O jovem príncipe Rama, ou melhor, sua estátua, conta-lhe qual motivo o traz
    aqui: sua querida esposa, Sita, foi raptada pelo terrível rei dos rakshasas,
    Ravana.  Sendo assim, ele escolheu aquele lugar para treinar antes de
    travar a batalha final contra o demônio e resgatar sua amada.
  name: a estátua de Rama
  vnum: '990011611614'
- description: A estátua de uma gigantesca nagini monopoliza toda sua atenção.
  keywords:
  - estatua
  - kadru
  - nagini
  long_desc: |-
    Kadru, antiga ancestral dos nagas, é uma das mulheres de Kasyapa.  Sua
    estátua consegue afetá-lo da mesma maneira que uma verdadeira nagini
    afetaria: hipnotiza-o com sua beleza e com sua lenta e perigosa dança.
    Cuidado com Kadru...  Ela é extremamente inteligente e astuta, já tendo
    enganado até o sábio Indra ao roubar a amritá que estava sob sua guarda.
  name: a estátua de Kadru
  vnum: '990011611615'
- description: A estátua de um robusto touro branco parece preparar-se para atacar.
  keywords:
  - touro
  - branco
  - robusto
  - nandi
  - estatua
  long_desc: |-
    O robusto Nandi flexiona uma de suas patas dianteiras e bufa, olhando-o
    desconfiado. Ele é considerado o guardião da entrada dos templos, o que
    o faz realmente detestar estranhos... Cuidado com essa estátua...
  name: a estátua de Nandi
  vnum: '990011611616'
- description: A estátua de um senhor escrevendo aparece do nada na sua frente.
  keywords:
  - vyasa
  - sabio
  - estatua
  long_desc: |-
    Essa estátua representa um renomado sábio a quem é atribuída a atual
    organização dos Vedas.  Vyasa também é o autor do Mahabharata, dos dezoito
    Puranas e dos Brahma Sutras.  Que senhor importante, não?
  name: a estátua do sábio Vyasa
  vnum: '990011611617'
- description: Um dos guardas do palácio dorme tranqüilamente em uma das camas.
  keywords:
  - guarda
  - dorminhoco
  long_desc: |-
    Ele parece ter tirado uma "folguinha" para tirar um cochilo... Se bem que
    é provável que ninguém consiga acordá-lo, pois nem o barulho que você fez nessa
    ala fez com que ele parasse de roncar.
  name: o guarda dorminhoco
  vnum: '990011611618'
- description: Um guarda está batendo seus talheres na mesa, exigindo que a comida
    chegue logo.
  keywords:
  - guarda
  - faminto
  long_desc: |-
    Ele parece realmente com fome, o que piora com o delicioso cheiro da refeição sendo
    preparada na cozinha, bem próxima daqui.
  name: o guarda faminto
  vnum: '990011611619'
- description: Um guarda está aqui, treinando combate sem armas.
  keywords:
  - guarda
  - treinamento
  long_desc: |-
    Muito alto, esse homem é realmente forte. Ele parece estar passando por um treino
    intensivo de combate desarmado e, apesar da aparência cansada, continua obtinadamente
    a atingir uma estranha máquina.
  name: um guarda em treinamento
  vnum: '990011611620'
- description: Um dos guarda parece entretido com a leitura de um livro.
  keywords:
  - guarda
  long_desc: |-
    Esse homem de feições sérias parece estar estudando atentamente um livro que
    parece ser bastante velho e precioso.  Ele parece alheio a tudo que acontece
    a seu redor, mas seria melhor você não chamar sua atenção...
  name: um guarda
  vnum: '990011611621'
- description: Um dos cozinheiro parece muito zangado com seus ajudantes.
  keywords:
  - cozinheiro
  long_desc: |-
    Ele está muito atarefado... Uma festa de gala está sendo dada no palácio,
    e os cozinheiros estão desesperados tentando fazer com que tudo relacionado
    à comida saia perfeito. Tente não atrapalhar.
  name: um cozinheiro
  vnum: '990011611622'
- description: Uma ajudante separa alguns vegetais que ainda serão usados.
  keywords:
  - ajudante
  - cozinha
  long_desc: |-
    A jovem ajudante separa alguns vegetais já lavados e entrega-os para
    outro ajudante cortar. O trabalho quase mecânico, initerrupto, parece
    não cansá-la.
  name: uma ajudante de cozinha
  vnum: '990011611623'
- description: Um ajudante de cozinha corta alguns ingredientes.
  keywords:
  - ajudante
  - cozinha
  long_desc: |-
    O simpático rapaz é muito habilidoso no manejo do cutelo. Ele
    corta e pica rapidamente qualquer tipo de ingrediente, sempre no
    mesmo ritmo e sempre deixando tudo do mesmo tamanho.
  name: um ajudante de cozinha
  vnum: '990011611624'
- description: Uma cozinheira procura na despensa os ingredientes que precisa.
  keywords:
  - cozinheira
  long_desc: |-
    A cozinheira parece bastante aborrecida por não encontrar tudo
    que precisa... Talvez ela seja nova aqui.
  name: uma cozinheira
  vnum: '990011611625'
- description: Um ajudante de cozinha está pegando alguns ingredientes.
  keywords:
  - ajudante
  - cozinha
  long_desc: |-
    Ele parece estar com pressa, pegando todos os ingredientes que acabaram
    na cozinha e são indispensáveis na preparação dos petiscos e do banquete.
  name: um ajudante de cozinha
  vnum: '990011611626'
- description: Um serviçal passa apressado.
  keywords:
  - servical
  long_desc: |-
    O pobre homem está como a maioria dos empregados do palácio: fazendo de
    tudo para que nada saia errado.
  name: um serviçal
  vnum: '990011611627'
- description: Um homem de aparência arrogante fala sem parar.
  keywords:
  - convidado
  - nobre
  - homem
  - arrogante
  long_desc: |-
    Ele é muito chato. Todo pomposo, fala sem parar sobre a vida da nobreza
    e como os "plebeus" são desagradáveis. Você conclui que não gosta dele...
  name: um nobre convidado
  vnum: '990011611628'
- description: Um sacerdote muito velho escuta os problemas de uma jovem senhora.
  keywords:
  - convidado
  - sacerdote
  long_desc: |-
    Apesar de muito velho, esse senhor é muito saudável. Suas roupas humildes
    escondem um homem riquíssimo em conhecimento e sabedoria. No momento, ele
    pacientemente ouve uma jovem relatando seus problemas.
  name: um sacerdote convidado
  vnum: '990011611629'
- description: Uma refinada jovem, um tanto aflita, parece procurar a ajuda do sacerdote.
  keywords:
  - convidada
  - dama
  - refinada
  - jovem
  long_desc: |-
    Muito bonita e educada, a jovem dama parece estar com algum problema grave.
    Ela, procurando os conselhos de alguém sábio, relata seus problemas ao velho
    sacerdote.
  name: uma dama convidada
  vnum: '990011611630'
- description: Uma senhora muito bem-vestida sorri para você.
  keywords:
  - senhora
  - convidada
  - bem-vestida
  long_desc: |-
    De impecável postura, essa senhora parece ver mais do que se pensa.  Ela
    olha para você e sorri, pois percebeu que você não foi exatamente convidado
    para a festa.  E agora?
  name: uma senhora bem-vestida
  vnum: '990011611631'
- description: Um elegante senhor assiste maravilhado o movimento das dançarinas.
  keywords:
  - senhor
  - elegante
  long_desc: |-
    Esse elegante homem já não é jovem, mas conserva os traços da beleza da mocidade.
    Ele parece encantado com a dança das ninfas do castelo, assim como muitos outros
    convidados...
  name: um senhor elegante
  vnum: '990011611632'
- description: Um estranho mensageiro espera ser dispensado.
  keywords:
  - mensageiro
  - estranho
  long_desc: |-
    Ele é uma estranha criatura... Não é meio homem, meio serpente, como são
    os nagas. É um enorme homem de traços reptilianos, como se um crocodilo tivesse,
    por estranha magia, se transformado parcialmente. Sua pele possui indícios de
    escamas, sendo esverdeada. Seu nariz resume-se em apenas dois orifícios logo acima
    da larga boca, esta repleta de pontiagudos dentes. Parece que ele trouxe um recado
    que fez com que Lorde Indra saísse imediatamente do salão...
  name: o estranho mensageiro
  vnum: '990011611633'
- description: Uma linda ninfa dança graciosamente ao som de uma música.
  keywords:
  - dancarina
  - ninfa
  - apsara
  long_desc: |-
    Nascida da espuma do mar de leite, essa apsara, assim como todas as outras,
    foi trazida por Lorde Indra para essa palácio no intuito de, além de
    permanecer a salvo, entreter o grande senhor com sua dança.  Ela usa uma
    estranha maquiagem que realça seus belos olhos, destacando ainda a brancura
    de sua pele e os longos cabelos negros, que estão soltos. Você agora sabe
    porque a dança das apsaras é tão famosa: elas simplesmente parecem flutuar...
  name: uma linda apsara
  vnum: '990011611634'
- description: Uma verdadeira rainha está sentada em um dos tronos.
  keywords:
  - indrani
  - mulher
  - rainha
  long_desc: |-
    Indrani, esposa de Indra, é uma belíssima mulher de pele azeitonada e
    cabelos e olhos negros como azeviche. Seus traços fortes foram destacados
    com a tradicional maquiagem usada pelas mulheres daqui, e sua aparência é
    ainda mais majestosa devido às ricas jóias que ostenta. Conhecida por ser
    implacável, Indrani parece muito contrariada. Alguma coisa está acontecendo
    por aqui e ela não está gostando disso...
  name: Indrani
  vnum: '990011611635'
- description: Uma sorridente mulher parece fazer uma lista de nomes que nunca acaba.
  keywords:
  - diti
  - sorridente
  - mulher
  long_desc: |-
    Muito velha, mas aparentando juventude, Diti é uma mãe muito orgulhosa.
    Ela, tendo muito filhos, enumera no momento o nome de cada um e diz o que
    eles estão fazendo. Pelo que você entendeu, quarenta e nove deles moram no
    palácio, sendo que você já pode considerá-los "velhos conhecidos"...
  name: Diti
  vnum: '990011611636'
- description: Um homem de aparência sinistra observa todos os seus movimentos.
  keywords:
  - rudra
  - homem
  - sinistro
  long_desc: |-
    Rudra é perigoso...  Possuidor de grande poder, ele é cruel com aqueles que
    lhe desagradam, mas assim como facilmente se torna devastador, pode ser
    compreensivo e bondoso.  Ele é exatamente como os ventos, sua arma
    favorita...
  name: Rudra
  vnum: '990011611637'
- description: Um belo e jovem guerreiro demonstra estar muito preocupado.
  keywords:
  - arjuna
  - belo
  - jovem
  - guerreiro
  long_desc: |-
    Arjuna, um dos filhos de Indra, é um renomado guerreiro e explorador.  Ele é
    um dos poucos homens que se atreveram a explorar Patala inteira, sendo esse
    motivo de orgulho para seu pai.  Tendo participado de muitas aventuras,
    Arjuna pode lhe dizer que um dos acontecimentos mais importantes de sua vida
    foi o emprendizado com Krishna, na época considerado apenas um simples
    auriga.  No momento, o jovem príncipe está preocupado com a movimentação no
    palácio...
  name: Arjuna
  vnum: '990011611638'
- description: Um magnífico cantor preenche seus ouvidos com uma bela canção.
  keywords:
  - cantor
  - gandhava
  long_desc: |-
    Membro da corte de Lorde Indra, esse cantor é um dos estranhos seres
    celestiais cujos poderes e sabedoria vão além do que aparenta.  Sua canção
    sublime, chamada a "Voz da Natureza", faz com que você realmente tenha a
    impressão de estar ouvindo a música por trás do Mundo.
  name: um gandhava
  vnum: '990011611639'
- description: Um preocupado Marut ronda o salão.
  keywords:
  - guardiao
  - marut
  long_desc: |-
    Esse Marut parece muito preocupado.  Seu senhor, Lorde Indra, teve de deixar
    às pressas o salão para cuidar de um problema.  Ele e alguns de seus irmãos,
    então, se prontificaram a proteger a corte caso alguma coisa de ruim
    acontecesse...
  name: um guardião Marut
  vnum: '990011611640'
- description: Um dos músicos celestiais toca com maestria seu intrumento.
  keywords:
  - gandhava
  - musico
  long_desc: |-
    Dizem as lendas que quando um mortal ouve a canção dos gandhavas,
    ele passa a saber coisas que nunca saberia nem que vivesse milhares de
    vidas. Sendo assim, você se sente um pouco mais sábio ao ouvir a "Voz da
    Natureza", a música daqueles que sabem o segredo da fabricação do soma.
  name: um gandhava
  vnum: '990011611641'
- description: Uma apsara descansa sentada em algumas almofadas.
  keywords:
  - urvasi
  - apsara
  long_desc: |-
    Uma das mais conhecidas apsaras, Urvasi acabou de se apresentar.
    Ela está muito cansada e no momento descansa sobre algumas almofadas.
    Não a perturbe.
  name: Urvasi
  vnum: '990011611642'
- description: Um guarda está imóvel em sua posição de guardar o salão.
  keywords:
  - guarda
  long_desc: |-
    Ele nem pisca... Você pode fazer qualquer coisa que ele não se moverá.
    Esse guarda apenas deixará sua posição caso ocorra alguma coisa que
    realmente exija sua interferência.
  name: um guarda
  vnum: '990011611643'
- description: Um dos guardas mais velhos está aqui, treinando outros guardas.
  keywords:
  - guarda
  - velho
  - treinador
  long_desc: |-
    Um sábio na antiga prática da luta, o velho guarda é um dos mestres
    preferidos dos mais jovens.  Sabendo impor disciplina, com paciência ensina
    sua arte, conseguindo ainda passar importantes lições sobre a vida.
    Ele é um respeitado nobre da casta guerreira.
  name: um treinador da guarda
  vnum: '990011611644'
