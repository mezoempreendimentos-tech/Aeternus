- description: Um grande cardume de peixes translúcidos nada à sua frente.
  keywords:
  - cardume
  - peixes
  - cristal
  long_desc: |-
    Esses peixes, de uns 30 centímentros de comprimento, nadam em um grupo de
    meio milhar de seres brilhantes e translúcidos como cristal puro.  Não
    parecem perigosos, apesar das afiadas nadadeiras.
  name: um cardume de peixes de cristal
  vnum: '990011311300'
- description: Uma serpente de escamas douradas nada em volta de você.
  keywords:
  - serpente
  - dourada
  long_desc: |-
    A serpente é bastante longa, mais ou menos seu tamanho em comprimento, e de
    corpo muito robusto.  Suas escamas douradas, radiantes como se fossem
    polidas, são largas, possuindo algumas delas pequenas pedras coloridas que
    se assemelham a gemas.  Os olhos amarelos, com uma fenda negra no centro,
    acompanham seus movimentos enquanto seu corpo faz voltas em torno de você,
    da mesma forma que a língua bifurcada se move de um lado para outro junto a
    um par de compridos bigodes.
  name: uma serpente dourada
  vnum: '990011311301'
- description: Um naga de ar grave abençoa as águas do centro do templo.
  keywords:
  - naga
  - sacerdote
  - sumo-sacerdote
  - nihar
  long_desc: |-
    De aparência madura, fartos cabelos negros começando a esbranquecer nas
    têmporas, Nihar é um naga de muito poder em Patala.  Ele é responsável
    pelo templo de Sesha de Bhogavati, sendo este o principal deste mundo, além
    de ser um dos mais próximos conselheiros do rei.  Ele se veste com
    simplicidade, cobrindo seu corpo com um alvo tecido de bom algodão,
    carregando como item de valor apenas o sinal do templo.
  name: Nihar, o Sumo-Sacerdote
  vnum: '990011311302'
- description: Uma graciosa nagini caminha entre as oferendas, organizando-as.
  keywords:
  - anjali
  - nagini
  - graciosa
  - sacerdotisa
  long_desc: |-
    Anjali é uma nagini bastante miúda, de rosto quase infantil. A pele
    de sua parte humana é alva, enquanto a de sua metade serpente é coberta
    com escamas que vão de um rosa muito claro até intenso rubro, quase negro,
    na ponta de sua cauda. Seus grandes olhos, negros, percorrem toda a sala
    de oferendas como se procurassem algo fora do lugar. Caso achassem, ela
    iria correndo arrumar, esquecendo-se do intruso no templo.
  name: Anjali, a sacerdotisa
  vnum: '990011311303'
- description: Um enorme naga se curva perante um altar enquanto entôa estranho cântico.
  keywords:
  - shashwat
  - naga
  - enorme
  - sacerdote
  long_desc: |-
    Shashwat mais parece um soldado do que um sacerdote: ele é muito alto (você
    diz que ele tem, pelo menos, dois metros e meio), corpo musculoso e queimado
    de sol, cabelos negros aparados muito curtos, barba feita.  Sua parte
    serpente, de escamas cor-de-mogno, se enrola a seu redor, totalmente imóvel.
    O sacerdote está, no momento, utilizando-se de um antigo cântico naga para
    curar as feridas de alguém que pediu que lhe enviasse suas preces.
  name: Shashwat, o sacerdote
  vnum: '990011311304'
- description: Há uma nagini sentada no centro da sala, em profunda meditação.
  keywords:
  - Sapni
  - sacerdotisa
  - nagini
  long_desc: |-
    Sapni está com a mente e espírito em outro lugar.  Enrolada sobre sua cauda,
    ela move lentamente seu tronco de um lado para o outro, como um pêndulo que
    se destaca na fraca iluminação.  Você não enxerga detalhes sobre ela,
    percebendo apenas que as escamas de sua cauda têm uma aparência metálica, já
    que refletem um pouco da luz do lugar.
  name: Sapni, a sacerdotisa
  vnum: '990011311305'
- description: Um concentrado sacerdote procura algo entre alguns pergaminhos.
  keywords:
  - pramsu
  - naga
  - sacerdote
  long_desc: |-
    Pramsu, um naga de cabelos longos, lisos e brancos, procura entre um
    amontoado de pergaminhos algum específico.  Seus grandes olhos cinzentos, de
    fenda oblíqua muito fechada, movem-se de um texto para o outro, sem prestar
    atenção em você, sendo acompanhados por mãos jovens de dedos magros e unhas
    aparadas.  A barba alva, curta e bem-cuidada, envelhece o rosto jovial.
  name: Pramsu, o sacerdote
  vnum: '990011311306'
- description: Uma nagini muito sorridente pede que você se aproxime de um dos balcões.
  keywords:
  - nagini
  - sorridente
  - mira
  - atendente
  long_desc: |-
    A sorridente Mira, que cuida das vendas na joalheria de sua família, é uma
    bela nagini de pele e cabelos rosáceos.  Os olhos, brilhantes como duas
    gemas rosadas lapidadas, parecem sorrir junto da generosa boca de perfeitos
    dentes brancos.  Ela parece disposta a mostrar a bela coleção de sua loja.
  name: Mira
  vnum: '990011311307'
- description: O atendente da armoraria o observa por de trás do balcão.
  keywords:
  - dhiraj
  - atendente
  - naga
  long_desc: |-
    Dhiraj parece um pouco enfastiado por ficar atrás do balcão.  Ele
    provavelmente prefere auxiliar na oficina, mas por algum motivo está
    atendendo na armoraria.
  name: Dhiraj
  vnum: '990011311308'
- description: O atendente do arsenal parece divertir-se ao golpear o ar com uma espada.
  keywords:
  - atendente
  - naga
  - balraj
  long_desc: |-
    Balraj está entre muitas armas, o que o deixa muito satisfeito.  Ele, no
    momento, cuida do atendimento do arsenal, mas também trabalha na oficina
    auxiliando Twashtri em seu trabalho.  Os melhores artefatos nascem pelas
    mãos do mestre, sendo um privilégio tocá-los, como ele faz, durante as
    vendas.
  name: Balraj
  vnum: '990011311309'
- description: O mestre dos artesãos está aqui, trabalhando em mais um projeto.
  keywords:
  - twashtri
  - mestre
  - artesao
  long_desc: |-
    Twashtri é um artesão de divinos poderes.  Sua arte é tão perfeita que
    recebeu o título de mestre dos artesãos, tendo recebido livre acesso a até a
    Cidade das Jóias, mesmo não sendo um naga.  Recurvado de tanto trabalhar
    sobre seus tesouros, esse senhor de tantas centenas de anos possui ainda um
    par de olhos muito brilhantes, azuis como as águas de um mar no verão, que
    parecem tão jovens quanto geniais.  As mãos, apesar do trabalho de tantos
    anos, são delicadas como as de um instrumentista, um tanto queimadas pelo
    calor da forja, assim como o são os musculosos braços.  Um engraçado bigode
    branco, com alguns pinduricalhos dourados, cobre a boca e parte das
    bochechas, sendo amarrado em uma trança logo abaixo do queixo.  Os cabelos,
    também brancos, já são ralos, e os poucos fios são aparados muito rentes à
    cabeça, fazendo-o parecer completamente calvo.  Ele parece concentrado
    demais para prestar atenção em você.
  name: Twashtri
  vnum: '990011311310'
- description: Uma nagini de olhos dourados limpa o balcão.
  keywords:
  - hemadri
  - nagini
  long_desc: |-
    Hemadri, de estranhos olhos dourados, parece bastante irritada pois alguém
    derramou uma poção que produz água sobre o grande balcão da loja.  Pelo
    jeito a poção é muito eficaz, pois a água parece surgir do nada por sobre o
    balcão e começa a escorrer, tendo já molhando todo o chão do Caldeirão.
  name: Hemadri
  vnum: '990011311311'
- description: Uma nagini enrolou-se em sua cauda e caiu no sono enquanto "trabalhava".
  keywords:
  - nagini
  - recepcionista
  - mishti
  long_desc: |-
    A função de Mishti é receber e atender aqueles que desejam se hospedar na
    Pedra Preciosa, ou que já estão hospedados, é claro.  Para alegria da bela
    nagini de cauda alaranjada, o movimento hoje foi quase nulo, podendo ela
    tirar uma boa soneca sem que ninguém a interrompesse.
  name: Mishti
  vnum: '990011311312'
- description: Um naga prepara bebidas atrás do balcão, enquanto conversa com clientes.
  keywords:
  - kshiraj
  - barman
  - naga
  long_desc: |-
    Kshiraj conhece bebidas de quase todos os lugares em que se consome álcool.
    Não há o que ele não faça.  Muito simpático, esse naga, bastante magro em
    relação ao normal, consegue manter uma boa conversa com qualquer um que se
    aproxime.  Talvez até com você...
  name: Kshiraj
  vnum: '990011311313'
- description: Um pequeno grupo de yakshas, todos bêbados, canta alegremente.
  keywords:
  - grupo
  - yakshas
  - bebados
  long_desc: |-
    Parecendo vir de noroeste do Ikshumati, esses yakshas são pequenos mercadores
    que não dispensam uma parada no Cobra Voando para saborear as deliciosas
    bebidas aqui oferecidas.  Os demônios desse grupo têm corpos de carne e
    osso, o que os faz poderem ser vistos normalmente: são baixos, de pele rosa
    muito enrugada, com alguns pêlos roxos; os olhos são grandes, de íris negra,
    no alto da cabeça ovalada; as orelhas pontudas parecem grandes chifres
    partindo das laterais do crânio, sendo elas repletas de argolas douradas.  A
    boca larga, cheia de dentes, está sempre sorrindo. Eles cantam uma alegre
    melodia conhecida por você. Coisas de bêbado...
  name: um grupo de yakshas bêbados
  vnum: '990011311314'
- description: Um atarefado garçom passa carregando duas grandes bandejas.
  keywords:
  - garcom
  - naga
  long_desc: |-
    O pobre naga anda de um lado para o outro anotando pedidos e entregando
    bebidas.  Ele segura uma bandeja com uma mão e outra com a cauda.  Com a
    outra mão segura um pano para limpar as mesas.
  name: um garçom
  vnum: '990011311315'
- description: Um naga de aparência entediada bebe lentamente de uma caneca.
  keywords:
  - naga
  - entediado
  long_desc: |-
    Provavelmente esse naga não tem o que fazer e veio procurar a animação da
    taverna, mas não consegiu livrar-se do tédio.  Só uma boa briga parece que
    Irá satisfazê-lo.
  name: um naga entediado
  vnum: '990011311316'
- description: Um pequeno demônio de ferro espera sua vez de jogar os dardos.
  keywords:
  - pisacha
  - metal
  - ferro
  - demonio
  long_desc: |-
    Baixo e magro, o pisacha possui o corpo coberto por duras escamas de ferro.
    Sua cabeça é de forma humana, apenas mais arredondada e da cor do metal de
    suas escamas.  Os olhos pequenos, negros, estão franzidos enquanto olham
    para o alvo de dardos: ele logo irá jogar.
  name: um pisacha de ferro
  vnum: '990011311317'
- description: Um naga prepara-se para lançar mais um dardo em um alvo.
  keywords:
  - naga
  long_desc: |-
    O naga, de rosto e cauda marcados por cicatrizes, ensaia amplos movimentos
    antes de lançar um pequeno dardo de ponta aguda na direção de um velho alvo
    a alguns metros de distância.  Ele parece bem concentrado.
  name: um naga
  vnum: '990011311318'
- description: Um rastreador descansa em uma das poltronas, abraçado às suas armas.
  keywords:
  - naga
  - rastreador
  - belo
  long_desc: |-
    Como todos os rastreadores, esse naga não possui cor definida de pele e
    escamas: elas se transformam de modo que ele está quase sempre camuflado.
    Durante o sono, quando está mais vulnerável, ele fica totalmente cinzento,
    lembrando a tonalidade das nuvens de uma tempestade.  Por esse motivo, os
    rastreadores quase nunca dormem, sendo a visão de um deles dormindo algo
    realmente raro.
  name: um rastreador
  vnum: '990011311319'
- description: Uma habilidosa rakshasi examina atentamente um baralho.
  keywords:
  - demonio
  - rakshasi
  - habilidosa
  long_desc: |-
    Ela verifica atentamente o baralho que tem em mãos, contando as cartas e
    procurando marcas.  Perita em trapaça, essa rakshasi é sempre chamada para
    procurar irregularidades em tudo o que estiver ligado a jogos de azar,
    evitando ações de má-fé por parte dos jogadores.  Ela já teve seus dias de
    criminosa, mas agora trabalha pela lei.
  name: uma habilidosa rakshasi
  vnum: '990011311320'
- description: O Senhor Kalidas, dono da loja, cumprimenta você, com simpatia.
  keywords:
  - kalidas
  - naga
  - senhor
  long_desc: |-
    O velho Kalidas, antes um grande viajante, agora alegra-se em vender o fruto
    de suas viagens e, vez ou outra, partir em busca de mercadorias.  É um naga
    alto, de pele acobreada, olhos escuros e cabelos já brancos.  Suas escamas
    da parte serpente são avermelhadas, possuindo listras negras e amarelas,
    sinal de grande força.  Apesar de forasteiros não serem bem-vindos aqui, ele
    o recebe bem, pois já conhece viajantes como você.
  name: o Senhor Kalidas
  vnum: '990011311321'
- description: A chefe dos mensageiros organiza algumas cartas a serem enviadas.
  keywords:
  - darshani
  - nagini
  - mensageira
  - chefe
  long_desc: |-
    Darshani é a chefe dos mensageiros do Serviço Postal de Bhogavati e Região.
    Ela no momento está verificando se todos os maços de cartas a serem enviados
    estão separados para serem levados pelos mensageiros certos, pois um erro
    pode ser fatal.
  name: Darshani, a mensageira-chefe
  vnum: '990011311322'
- description: Um naga distraidamente afina um instrumento.
  keywords:
  - distraido
  - gaurang
  - naga
  long_desc: |-
    Gaurang é o dono da Sublime Música, tendo a herdado de seu pai, que a herdou
    de seu avô, que a herdou de seu bisavô e assim por diante.  Dizem que os
    melhores instrumentos músicais produzidos em Patala vêm da oficina da
    família de Gaurang, sendo que entre seus compradores estão até os celestiais
    gandhavas.  O esbelto naga de escamas verde-oliva, quando não está
    trabalhando na loja, está construindo instrumentos na oficina ou compondo
    novas melodias.
  name: Gaurang
  vnum: '990011311323'
- description: O vendedor de barcos, por de trás do balcão, acena para você.
  keywords:
  - nadish
  - naga
  - vendedor
  - barcos
  long_desc: |-
    Nadish é um naga de baixa estatura e músculos bem desenvolvidos, de um
    marinheiro de muitos anos de experiência e viagens.  O rosto, castigado pelo
    sol, é de um homem muito sério que às vezes explode em gargalhadas,
    surpreendendo a todos.  Seus barcos são velozes e resistentes, mais até do
    que ele se permite admitir.
  name: Nadish
  vnum: '990011311324'
- description: Seu mestre-guia ora aqui a seu Deus, com fervor.
  keywords:
  - mestre-guida
  - clerigos
  long_desc: |-
    Os olhos cerrados escondem o brilho que a iluminação divina traz, permitindo
    que esse homem, de aspecto calmo e bondoso, caminhe por entre seus irmãos
    sem mostrar totalmente a imponente luz de sua alma.
  name: o mestre-guia dos clérigos
  vnum: '990011311325'
- description: Um mulher encapuzada está de pé aqui, apoiada em uma das paredes.
  keywords:
  - mestre-guia
  - mulher
  - encapuzada
  - ladina
  long_desc: |-
    Você consegue ver apenas o queixo e a boca vermelha de sua mestra.
    Seus movimentos são graciosos, rápidos, sua fala macia e cuidadosa.
    Ela está totalmente coberta por um capuz e capa negra, sendo possível
    perceber, de relance, muitas armas brilhando à luz das poucas tochas.
  name: a mestra-guia dos ladinos
  vnum: '990011311326'
- description: Uma druidesa de rosto gentil pede para você se aproximar um pouco mais.
  keywords:
  - druidesa
  - gentil
  - mestre
  - guia
  - druidas
  long_desc: |-
    Um pouco envelhecida, mas de olhos e sorriso jovial, sua mestra recebe você
    com a alegria de uma velha professora que recebe um aluno querido.  Ela
    parece ficar mais radiante quando começa a falar dos ensinamentos que pode
    lhe passar.
  name: a mestra-guia dos druidas
  vnum: '990011311328'
- description: Seu mestre-guia observa sua chegada com seus argutos olhos de guerreiro.
  keywords:
  - guerreiro
  - mestre-guia
  long_desc: |-
    De beleza quase selvagem, seu guia é um homem que está no auge de sua força
    e que atingiu completa maestria das artes da guerra.  Sua força, imensa,
    emana dos olhos profundamente negros emoldurados pela cabeleira que começa a
    acinzentar, e das grandes mãos que manuseiam qualquer arma como se fosse uma
    extensão de seu próprio corpo.  Ele pode lhe ensinar muito.
  name: o mestre-guia dos guerreiros
  vnum: '990011311329'
- description: Um velho mago sorri ao ver mais um aluno chegar.
  keywords:
  - mestre-guia
  - magos
  long_desc: |-
    Ele olha para você com seus velhos, muito velhos, olhos azuis, fazendo com
    que você se perca nas eras que seu mestre viveu.  De volta ao normal, você
    repara em como parece ser desgastante para seu mestre permanecer em um corpo
    que restringe o poder que seu grande espírito possui, mas apesar disso ele
    não demonstra preferir abandonar seus pupilos para viver seu pleno poder.
    Ele considera sua vida já plena.
  name: o mestre-guia dos magos
  vnum: '990011311330'
- description: Um naga de grande poder guarda a Irmandade.
  keywords:
  - naga
  - feiticeiro
  long_desc: |-
    Membro da Irmandade de Magos, esse feiticeiro de olhos e escamas cor-de-vinho
    é um feiticeiro cuja experiência e habilidade em magias de defesa e ataque
    lhe rendeu o posto de guardião. Ele sabe ser fatal.
  name: um feiticeiro naga
  vnum: '990011311331'
- description: Uma nagini guarda, impassível, a entrada da Congregação.
  keywords:
  - nagini
  - templar
  long_desc: |-
    Treinada para proteger os membros da Congregação, essa nagini
    é tão fria quanto o cinza de seus olhos e escamas. Ela é uma clériga de
    habilidades guerreiras, mas você dificilmente a imagina rezando e abençoando
    alguém.
  name: a nagini templar
  vnum: '990011311332'
- description: Oculta pelas sombras, uma nagini protege a entrada da Sociedade.
  keywords:
  - assassina
  - nagini
  long_desc: |-
    Olhos furtivos, mãos ágeis, habilidade em matar: ela se oculta nas sombras
    como se fosse uma perigosa parte delas. Sua cauda, marrom-escuro, possui
    em sua extremidade alguns espinhos afiados, vermelhos como sangue, usados
    como arma. Será muito difícil sobreviver a ela.
  name: a nagini assassina
  vnum: '990011311333'
- description: Uma nagini guarda impaciente a entrada da Associação.
  keywords:
  - nagini
  - guerreira
  long_desc: |-
    Uma das mais habilidosas dentro da casta guerreira, essa nagini especializou-se
    em inúmeras táticas de combate e artes marciais. Por adorar utilizar-se
    de sua grande capacidade de guerra, acha muito monótona a tarefa
    de guardar a entrada da Associação. Ou seja: adoraria comprar uma briga
    aqui, e agora.
  name: a nagini guerreira
  vnum: '990011311334'
- description: Um naga de aspecto paciente parece meditar em pé, enquanto guarda a
    Confraria.
  keywords:
  - druida
  - naga
  - paciente
  long_desc: |-
    Ele olha para além do horizonte, perdido em pensamentos.  Mas uma parte de
    sua mente está alerta e pronta para defender a Confraria utilizando-se de
    todo seu grande poder druídico, custe o que custar.
  name: o druida naga
  vnum: '990011311335'
- description: Uma pequena serpente de rubi mergulha e salta das águas.
  keywords:
  - serpente
  - pequena
  - rubi
  long_desc: |-
    A pequena serpente, de corpo feito de rubi, faz todo tipo de piruetas que
    consegue fazer na água.  Ela não parece se intimidar com sua presença.
  name: uma pequena serpente de rubi
  vnum: '990011311336'
- description: Uma serpente de esmeralda mergulha e salta das águas.
  keywords:
  - serpente
  - esmeralda
  long_desc: |-
    Verde pela esmeralda que constitui seu corpo, essa serpente mágica sente-se
    à vontade para brincar nas límpidas águas.
  name: uma serpente de esmeralda
  vnum: '990011311337'
- description: Uma tartaruga de casco feito de opala azul bóia sobre as águas.
  keywords:
  - tartaruga
  - opala
  - azul
  long_desc: |-
    O casco dessa tartaruga mágica, de opala azul, brilha em diversas
    tonalidades à medida que a luz é refletida e seus olhos se aproximam ou
    afastam dele.  Sua grossa pele é feita de um translúcido cristal
    azul-escuro.
  name: uma tartaruga de opala azul
  vnum: '990011311338'
- description: Um pequeno lagarto negro navega sobre uma folha dourada.
  keywords:
  - lagarto
  - ônix
  - negro
  - pequeno
  long_desc: |-
    Pequeno, de grandes olhos vermelhos e saltados, esse lagarto cintila com
    suas escamas de ônix polida.  Ele parece muito tranqüilo, como um pequeno
    marinheiro navegando em sua folha-navio.
  name: um lagarto de ônix
  vnum: '990011311339'
- description: Uma serpente de marfim nada tranqüilamente perto de você.
  keywords:
  - serpente
  - marfim
  long_desc: |-
    O branco polido do marfim que forma o corpo da serpente forma um bonito par
    com as pontas douradas de suas escamas e olhos.  Sua língua bifurcada, que é
    exposta vez o outra, parece feita de rubi.  Provavelmente é uma criatura
    mágica.
  name: uma serpente de marfim
  vnum: '990011311340'
- description: Um membro da Guarda está aqui, pronto para defender a cidade.
  keywords:
  - membro
  - guarda
  - naga
  - joias
  - safira
  long_desc: |-
    Dentro da Guarda, os sentinelas são chamados classe Safira, recebendo
    uniformes e armas que possuem a pedra de sua divisão.  São todos eles
    robustos, de escamas azuis, ocres ou verdes, cabelos da cor da cauda
    cortados acima das orelhas, barba raspada e com uma característica
    pintura negra nas maçãs do rosto.
