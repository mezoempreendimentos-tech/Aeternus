  long_desc: |-
    Os kshatryias são uma grande divisão na Guarda das Jóias, um verdadeiro
    exército formado de nagas guerreiros.  Esses nagas distribuem-se em vários
    postos, sendo eles denominados classe Ouro, e o posto de vigia subclasse
    Ouro e Esmeralda.  Os vigias estão entre os membros mais altos da guarda
    (entre dois metros e quarenta e três metros), de corpo maciço, escamas de
    diversos tons de verde, cabelos lisos longos, sempre negros, donos de
    brilhantes olhos cor de avelã e alva pele, que eles cobrem com pinturas em
    henna.  São os primeiros a perceberem ataques à cidade, protegendo os
    portões e controlando o canal a seu redor.
  name: um kshatryia-vigia da Guarda das Jóias
