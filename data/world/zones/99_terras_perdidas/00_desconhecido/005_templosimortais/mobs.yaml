- description: |-
    A pureza do elemental a sua frente, reflete mais sua força que sua
    ingenuidade.
  keywords:
  - elemental
  - pureza
  long_desc: |-
    Em um tom austero o elemental da pureza fica parado esperando sua decisão.
    Com muita tranquilidade ele pergunta novamente, "Você está pronto para seguir
    a peregrinação pelo caminho da purificação?"
  name: o Elemental da Pureza
  vnum: '990000500500'
- description: A personificação da sabedoria está em pé, à sua frente.
  keywords:
  - elemental
  - sabedoria
  long_desc: |-
    Ao olhar para esta figura, uma sensação de preenchimento invade o seu
    coração, preenchendo de sabedoria sua alma.  Todas as suas dúvidas parecem
    desaparecer no exato instante em que você olha para ele.  Mas essa sensação
    desaparece quando você ouve sua voz calma dizendo: "A sabedoria consiste em
    ter o conhecimento de que ninguém é sábio a ponto de não poder aprender mais
    nada".
  name: o Elemental da Sabedoria
  vnum: '990000500501'
- description: A mais bela das criaturas personifica a humildade e está em pé diante
    de você
  keywords:
  - elemental
  - humildade
  long_desc: |-
    Ao olhar para esta figura, ela retorna o olhar com bondade e benevolência,
    dizendo: "Imagine um universo inteiro...  É uma dádiva podermos imaginar,
    você não acha?"
  name: o Elemental da Humildade
  vnum: '990000500502'
- description: Um forte espectro parado e pronto para dar sua vida por @GVitália@n.
  keywords:
  - elemental
  - lealdade
  long_desc: |-
    Ao olhar para este espectro, você sente que sua força está além da sua
    compreensão.  Seu coração é puro e ele daria com prazer a vida pelo @GMundo de
    Vitália@n.  De fato, em sua juventude ele parece ter sido um leal Semi-Deus,
    defendendo seu belo mundo contra tudo e contra todos.  Agora ele, como se
    sempre tivesse existido, personifica a LEALDADE.
  name: o Elemental da Lealdade
  vnum: '990000500503'
- description: De pé em sua frente a personificação da Sinceridade.
  keywords:
  - elemental
  - sinceridade
  long_desc: |-
    A transparência desse elemental chega a assustar por sua beleza.  Sua alma é
    visivel à primeira vista.  É agradável olhar para ele e você se sente a
    vontade para falar sobre qualquer assunto que lhe aflija.
  name: o Elemental da Sinceridade
  vnum: '990000500504'
- description: Você vê a Bondade em pessoa parada diante dos seus olhos.
  keywords:
  - elemental
  - bondade
  long_desc: |-
    Como é agradável olhar para este elemental..  Também, o que você esperava da
    personificação da bondade?
  name: o Elemental da Bondade
  vnum: '990000500505'
- description: A personificação da justiça está de pé diante de você.
  keywords:
  - elemental
  - justica
  - justiça
  long_desc: |-
    Ao olhar para esta figura você sente que todos são iguais perante ela...  Do
    mais simples e menor à mais nobre e maior das criaturas.  Todos são iguais
    perante a justiça.
  name: o Elemental da Justiça
  vnum: '990000500506'
- description: Um belo elemental está voando aqui.
  keywords:
  - elemental
  - liberdade
  long_desc: Liberdade... É tudo que você pensa ao olhar para esta bela figura...
  name: o Elemental da Liberdade
  vnum: '990000500507'
